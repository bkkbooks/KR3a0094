body:
  text: 格物通卷九十一明湛若水撰省國費四冗官冗食冗兵冗役附唐徳宗建中四年五月初行税間架除陌錢法時河東澤潞河陽朔方四軍屯魏縣神䇿永平宣武淮南浙西荆南江西沔鄂湖南黔中劒南嶺南諸軍環淮寧之境舊制諸道軍岀境則仰給度支帝憂恤将士毎出境加給酒肉本道糧仍給其家一人兼三人之給故将士利之各出境纔踰境而止月費錢百三十餘萬緡常賦不能供判度支趙賛乃奏行二法所謂税間架者毎屋兩架者為間上屋税錢二千中税千下税五百吏執筆握筭入人室廬計其數或有宅屋多而無他資者出錢動數百緡敢匿一間杖六十賞告者錢五十緡所謂除陌錢者公私給與及賣買毎緡官留五十錢給他物及相貿易者約錢為率敢隠錢百杖六十罰錢二千賞告者錢十緍其賞錢皆出坐事之家於是愁怨之聲聞於逺近臣若水通曰徳宗憤王靈之不振而思有為則當省費休養足食足兵而民信俟時而動則可以制梃而鞭笞天下之不庭一詔所出而從命所謂丕應徯志者矣顧乃不然無故而動十六道之兵出境環戍所謂冗兵之尤者也諸将士出境而止以叨兼三人之給所謂冗費之尤者也以冗兵動冗費而間架除陌之征起焉其殃民禍之尤者矣邦本蹙絶愁怨聲聞彼强鎮者方幸災樂禍而起乃至䧟都邑迫乗輿呼而謂民曰不奪汝商税僦質矣不税汝間架陌錢矣徳宗至是星行露宿求税駕於旦夕而不可得况望其振王靈乎宋儒范祖禹曰自古不固邦本而攻戰不息必有意外之患真知言哉建中四年八月翰林學士陸贄以兵窮民困恐别生内變乃上奏其畧曰将不能使兵國不能馭将非止費財翫冦之弊亦有不戢自焚之災又曰無紓目前之虞或興意外之患人者邦之本財者人之心其心傷則其本傷其本傷則枝幹顛瘁矣又曰人揺不寧事變難測是以兵貴拙速不尚巧遲若不靖於本而務救於末則救之所為乃禍之所起也又論關中形勢畧曰今關輔之間興發已甚宫苑之内備衛不全萬一将帥之中又如朱滔希烈或負固邉壘誘致豺狼或竊發郊畿驚犯城闕未審陛下復何以備之贄請追還神䇿六軍明勑涇隴邠寧但令嚴備封守仍令更不徴發使知各保安居又降徳音罷京城及畿縣間架等雜税則冀已輸者弭怨見處者獲寧人心不揺邦本自固帝不能用臣若水通曰書稱撫我則后虐我則讎甲胄啟戎干戈省躬蓋以兵動干戈則糜國用虐生民矣是以聖人戒之徳宗喜功而窮兵然窮兵則好貨好貨則横歛横歛則民亂民亂則禍生而危亡至矣陸贄見微知著而盡言之冀其改也乃猶不悟不思民財匱則心傷民力竭則心悖趙襄子所謂竭民膏血以實之又因而殺之其誰與我者也卒之滻水操戈大呼不守贄之言驗矣後世之君知以徳宗為戒而節省國費盍有取於贄之言哉徳宗貞元三年閏五月庚申大省州縣官員收其祿以給戰士張延賞之謀也時新除官千五百人而當減者千餘人怨嗟盈路臣若水通曰徳宗從張延賞之言大省州縣官員而李泌乃請復之其言曰户口雖減而事多於承平且十倍吏得無増乎且所減皆有職而冗官不減此所以為未當也蓋設官分職以為民也冗職可減也有職不可減也夫收官之祿以給戰士延賞之計行得損益之宜矣李泌之言以冗官易州縣之官亦權時之宜不失公私之利未必不為得也夫増其所宜増減其所宜減者其在人君秉吾心之權衡而為之輕重乎憲宗元和六年六月丁卯李吉甫奏自秦至隋十有三代設官之多無如國家者天寳以後中原宿兵見在可計者八十餘萬其餘為商賈僧道不服田畆者什有五六是常以三分勞筋苦骨之人奉七分待衣坐食之軰也今内外官以税錢給俸者不下萬員天下三百餘縣或以一縣之地而為州一鄉之民而為縣者甚衆請勑有司詳定廢置吏員可省者省之州縣可併者併之入仕之塗可減者減之臣若水通曰傳有之官多則民病病在剥食其膏脂也夫設官之多至唐極矣吉甫所謂以三分勞筋苦骨之人奉七分待衣坐食之軰是已然則民何為而不困財何為而不竭邪人君能於其可去者去之亦足財裕民之大道也穆宗長慶二年春正月中書舍人白居易請詔光顔選諸道兵精鋭者留之其餘不可用者悉遣歸本道自守土疆蓋兵多而不精豈惟虚費衣糧兼恐撓敗軍政故也今既祇留東西二帥請各置都監一人諸道監軍一時停罷如此則衆齊令一必有成功又朝廷本用田布令報父讎今領全師出界供給度支數月已來都不進討若更遷延将何供給此尤宜早令退軍者也若兩道止共留兵六萬所費無多既易支持自然豐足自古安危皆繫於此伏乞聖慮察而念之䟽奏不報臣若水通曰選省冗兵則兵精而用節其養豐其氣充其志一如鋭小之人精神充滿遇豐大而寡力者必能出入之矣則亦何戰而不勝哉居易之論可謂盡之矣為國家事計者其思之可也敬宗寳歴二年三月罷修東都上自即位以來欲幸東都宰相及朝臣諫者甚衆上皆不聽决意必行已令度支員外郎盧貞按視脩東都宫闕及道中行宫裴度從容言於上曰國家本設兩都以備巡幸自多難以來兹事遂廢今宫闕營壘百司廨舎率已荒弛陛下儻欲行幸宜命有司嵗月間徐加完葺然後可往上曰從來言事者皆云不當往如卿所言不往亦可㑹朱克融王庭湊皆請以兵匠助脩東都三月丁亥勑以脩東都煩擾罷之臣若水通曰脩東都煩擾此義理之説羣臣之所已言也朱克融王庭湊請以兵匠助修此禍福之釁事機之所已動者也史言脩東都之役非以羣臣論諫而罷特畏幽鎮之稱兵而罷爾臣謂是未得盡其情也夫義理之心人孰無之言之不悟者必有所蔽爾及夫禍患之機警發而通之則沛然矣雖然自古拒諫之君固由其心之不明抑亦進言者過於訐直有以激成之也然則敬宗罷東都之役以息傷財害民之患豈亦裴度諷諫之力歟嗚呼此人臣所以貴於諷諌也宋真宗咸平三年正月帝至自大名上之在大名也詔諭丁夫十五萬脩黄河監察御史王濟以為勞民請徐圖之乃命濟馳往經度還奏省其十六七臣若水通曰脩河非冗役也至於丁夫十五萬則役至冗矣夫役冗則罷民力竭財用歛衆怨而揺國本其患有不可勝言者矣可不慎哉宋仁宗寳元元年六月詔省浮費時陜西用兵調費日蹙命近臣及三司議省浮費詔自乗輿服御及宫掖所須務從簡約若吏兵祿賜毋得輙行裁減時論者或欲損兵吏俸賜帝曰祿廪皆有定制毋遽更變以揺人心宜申諭之臣若水通曰易云損上益下民説無疆仁宗此舉則上雖損君之服用而君道愈光下則子庶民體羣臣而臣民説矣其誠賢君也哉宋仁宗皇祐元年八月汰諸路兵文彦愽龎籍建議省兵衆以為不可帝以為疑彦愽籍共奏曰公私困竭正坐冗兵果有患臣請死之帝意遂决於是簡汰陜西及河北諸路羸兵為民者六萬減廪糧之半者二萬又詔減陜西兵屯内地以省邉費臣若水通曰紓國家之急莫如豐財所謂豐財者非求財而益之也去事之蠧財者而已國有冗兵乃蠧財之尤者而去之則老弱無能不得以幸食財不求益而自無不益也以此推之則汰兵者務實食其力夫兵實食其力則財不虚用豐財之道也徽宗政和五年六月作三山河橋先是蔡京以孟昌齡為都水使者鑿大伾三山兩河創天成聖功二橋調征夫數十萬民不聊生至是畢工未幾水漲橋壞臣若水通曰先王之政嵗十一月徒杠成十二月輿梁成不過因時而脩之以利民爾至於三山二橋者役夫數十萬非冗役害民者乎自古國家之亡未有不由於奸邪奸邪亡國之計未有不由于大興作以肆遊觀開邉隙以邀事功酷聚歛以誇富侈如蔡京之為以蠱惑君心者爾噫明君能知奸邪之蠧國必逺而去之則公私不費而安富尊榮之福自臻矣宋理宗寳祐四年九月監察御史朱熠乞汰冗吏不報熠言境土蹙而賦歛日繁官吏増而調度日廣景徳慶歴時以三百二十餘郡之財賦供一萬餘員之奉祿今日以一百餘郡之事力贍二萬四千餘員之冗官邉郡則有科降支移内地則欠經常納解欲寛民心必汰冗員帝嘉之而不能用臣若水通曰唐虞稽古建官惟百夏商官倍周官三百六十極矣官得其人而祿有餘裕是以分田制祿上下相濟而不相病也理宗之時疆土蹙而賦歛日繁如賈似道史嵩之麾下干進之吏不知幾百誠如朱熠所言者矣使理宗嘉其言而用之剛明獨斷則費省而民富兵强恢復之圖亦不難遂矣元成宗大徳七年詔蒙古軍居山東河南者免戍甘肅簽樞宻院齊諾言蒙古軍在山東河南者戍南甘肅動渉萬里毎行必鬻田産甚或賣妻子戍者未歸代者當發困苦日甚今日邉陲無事而虚殫兵力誠為非計乞以近甘肅之兵戍之而山東河南前戍者令有司為贖其田産妻子從之臣若水通曰山東河南之去甘肅萬里自此往戍豈特鬻田産賣妻子而已道途之勤饑寒之苦風土之不宜縱脱死亡亦皆痡憊以若愁思妻子之衆就死氣息奄奄之餘而攻守焉其奚以能支敵哉夫枵腹待哺于國有傷而剜肉醫瘡于彼何補元成宗以邉陲無事不欲虚殫兵力免河南山東之戍而以近甘肅之兵代之上以節國用下以全民力誠得計矣元武宗至大三年冬十月詔減宫人膳尚書省言宣徽院廪給日増儲㣥雖廣亦不能給帝曰比見後宫飲膳與朕無異其覈實減之臣若水通曰元武宗因尚書省言宣徽院廪給日増儲供不給乃併後宫飲膳而覈實減之此可謂賢矣或曰人主茍有天下之大惠則後宫飲膳之小費奚用減焉夫一飲一膳民膏民脂故人君欲節用而愛人必自身自家始矣故禹卑宫室菲飲食惡衣服豈禹以天下不能周其身哉武宗之心本亦何異於禹之心也誠見所以飲膳者皆吾民之膏脂也宫人可以薄其口腹不可使吾民之剥其膏脂故感於尚書省之言而觸其不忍人之心爾嗚呼以此心而節天下之財則天下安得不樂從而風動者哉後之論世者不可謂元無人也宋儒程顥䇿云所謂費益廣者不曰待哺之兵衆乎歲幣之遺重乎游食之徒煩乎無用之供厚乎為今之計兵之衆豈能遽去之哉在汰其冗而擇其精歲幣之遺豈能遽絶之哉在備於我而圖其後游食之徒煩則在禁其末而驅之農無用之供厚則在絶其源而損其數然其所以制之者有其道也臣若水通曰四者散財之流也取於民者其源一而已矣夫取之者一而散之者四譬之一源而四流欲水之不竭不可得也一木而四蠧欲根之不㧞不可得也今之欲省費者省其流而已矣是故其流塞而源之來自無窮矣夫財國之本也無其財則國非其國矣故人君節用之為貴焉楊時日録王安石曰臣見陛下於殿檻上蓋氊尚御批減省以此知不肯用上等匹帛縻費於結絡上曰本朝祖宗皆愛惜天物不忍横費如此縻費圖作甚漢文帝曰朕為天下守財爾安石曰人主若能以堯舜之政澤天下之民雖竭天下之力以充奉乗輿不為過當守財之言非天下之正理臣若水通曰安石主行新法爭天下之利以富國矣至此又開人主侈用之端何邪充其説不至於取之盡錙銖用之如泥砂者哉且謂人主若能以堯舜之政澤天下之民雖竭天下之力以充奉乗輿不為過當夫堯舜土階茅茨禹惡衣菲食文武卑服未聞行堯舜之政者而反竭天下以自奉也安石之學術可見矣嗚呼世常慮有臣而無君當是時有其君矣而臣莫與之将順其美禁其欲而反有以啟之傳曰畜君者好君也安石豈有愛君之心乎噫其亦不忠甚矣惜乎神宗惑而不悟爾後世近君之臣當以安石為戒焉楊時經筵講義有云思愛人必先於節用節用而不以制度則儉而或至於廢非所以為節也夫先王所謂理財者非盡籠天下之利而有之其取之有道用之有節而各當於義之謂也取之不以其道用之不以其節而不當於義則非理矣臣若水通曰財者民之膏脂也故至仁之君兼所愛必兼用節節其膏脂則愛其身也至矣節其財用則愛民也至矣故觀其所節而其視民如傷之仁可知矣用之者節故能取之有道恭儉之君也傳曰儉者徳之共也夫儉君子之所尚也而不當於義焉則亦固而已矣是故儉所宜儉中正之道也後之人主其試思之楊時述周憲之奏云比年以來吏多額外而行移者多違日限故中外以為病今若依官制元立吏額及行遣日限則無冗員滯事而得併省之實効矣臣若水通曰冗吏所以耗財者也在人主沙汰節制之爾若楊時之言可為萬世省費之法矣張栻曰紹興六年王司諫􅀈進對言陛下憂勤恭儉圖濟中興往歲金翠之禁自内庭始天下風靡而近者庫藏供瑇瑁坑冶採青綠未必以為器玩設飾之用然恐下之人妄意好尚縁類而至願深戒明皇之失終始惟一以永無疆之休臣若水通曰慎厥終惟其始則治可成業可保矣昔者唐明皇即位之初焚錦綉珠玉於殿前致開元之治其終也侈心一動窮天下之欲而天寳之亂幾不能自免是皆不能慎終之咎也貽譏後世宜哉詩云靡不有初鮮克有終故知慎終之難為人君者尤宜戒謹也國朝辛丑七月甲子宋思顔曰近句容有虎為害上既遣人捕獲之今豢養民間飼之以犬無益太祖欣然即命取二虎并一熊皆殺之分其肉賜百官臣若水通曰書云惟天惠民惟辟奉天人君奉天以愛民惟去其民害而已矣茍以養民之物而養害民之獸則是違道逆天也豈為君之道哉惟我太祖髙皇帝仁聖天縱有不忍人之心故一聞思顔之言沛然除之書云􅎇禽竒獸不畜于國此之謂也聖子神孫所宜視法焉乙巳春太祖将經理淮甸親閲試将士命鎮撫居明率軍士分隊習戰勝者賞銀十兩其傷而不退者亦勇敢士賞銀有差且徧給酒饌勞之仍賜傷者醫藥因諭之曰刃不素持必致血指舟不素操必致傾溺弓馬不素習而欲攻戰未有不敗者吾故擇汝等練之今汝等勇徤若此臨敵何憂不克爵賞富貴惟有功者得之顧謂起居注詹同等曰兵不貴多而貴精多而不精徒累行陳近聞軍中募兵多冗濫者吾特為戒之冀得精鋭庶幾有用也臣若水通曰兵貴精不貴多不精而多是冗兵也冗兵是冗食也耗國用傷民財莫甚於此者是故兵不可廢也在精之而已矣太祖深知其義是以親試将士分隊習戰驗其勇怯等其賞勞所以精其兵而省其食不使蠧國害民也可謂得豐財之道也由今觀之行伍之兵老幼衰弱冗濫害財之患亦有識者之所深憂也聖明尚體察於一念之間以太祖之言勇决行之則去冗兵以節餘財其不致乆安長治之休也哉洪武元年十一月中書及禮部定奏天子親祀圜丘方丘宗廟社稷若京師三皇孔子風雲雷雨聖帝明王忠臣烈士先賢等祀則遣官致祭郡縣宜立社稷有司春秋致祭庶人祭里社土糓之神及祖父母父母并得祀竈載諸祀典餘不當祀者並禁止太祖皇帝諭之曰凡祭享之禮載牲致帛交於神明費出已帑神必歆之如庶人陌紙瓣香皆可格神不以非薄而弗享者何也所得之物皆己力所致也若國家倉廪府庫所積乃生民膏脂以此為尊醪爼饌充實神庭徼求福祉以私于身神可欺乎惟為國為民禱祈如水旱疾疫師旅之類可也臣若水通曰語云務民之義敬鬼神而逺之夫財出於民傷財則害民矣茍以非禮之神祀而費有益之民財智者固如是乎我太祖髙皇帝有見於此諸不在祀典者並禁止之嗚呼庸君世主之陋習一日盡革斯世斯民何其幸哉洪武元年十二月上退朝還宫皇太子諸王侍上指宫中隙地謂之曰此非不可起亭館臺榭為遊觀之所今但令内使種蔬誠不忍傷民之財勞民之力爾昔商紂崇飾宫室不恤人民天下怨之身死國亡漢文帝欲作露䑓而惜百金之費當時民安國富夫奢儉不同治亂懸判爾等當記吾言常存儆戒臣若水通曰詩云貽厥孫謀以燕翼子書云慎乃儉徳惟懷永圖祖考者子孫之所觀法不可不示之以儉徳也教家以儉其後猶奢教家以奢其弊可勝言哉觀太祖謂宫中隙地不起亭䑓為遊觀之所財無浪費矣但令種蔬地無遺利矣是克勤克儉也至於以商紂之奢漢文之儉判治亂之原指之以示太子諸王不惟家法之善實有以培植宗社之大本也其崇儉防奢之意深矣聖明率由祖宗之家法尚當求之於心焉洪武五年九月上念驛傳重繁故元之民有役馬夫而至破家者乃諭中書省臣曰善治者視民猶己愛而勿傷不善者徴歛誅求惟日不足殊不知君民一體民既不能安其生君亦豈能獨安厥位乎譬之馭馬者急衘勒厲鞭䇿求騁不已鮮不顛蹶馬既顛蹶人獨能無傷乎元之末政寛者失之縱猛者失之暴觀其驛傳一事盡百姓之力而苦勞之此與馭馬者何異也豈可蹈其覆轍邪自今馬夫必以糧富丁多者充之庻幾其力有餘有司務加存恤有非法擾害者罪之臣若水通曰伏覩我聖祖因元驛傳害民之弊而哀矜之至有視民猶已之諭聖祖之心即文王視民如傷之心也及以君之治民如以人馭馬衘勒鞭䇿求騁不已則傾蹶同之至切矣至於寛猛暴縱之言非執中御民之道乎書曰予臨兆民凛乎若朽索之御六馬為人上者柰何不敬乎今之民力民財日蹙矣聖明尚思惟於一念之間節其力以厚其財省其役以阜其生則上下充足而治安矣祖宗丕緒可永於無疆焉洪武八年九月詔改建大内宫殿上謂廷臣曰唐虞之時宫室朴素後世窮極侈麗習尚華美去古逺矣朕今所作但求安固不事華麗凡雕飾技巧一切不用惟朴素堅壮可傳永乆使吾後世子孫守以為法至於臺榭苑囿之作勞民費財以事遊觀之樂朕决不為之其勑所司如朕之意臣若水通曰人君欲固邦本不可不節財用欲節財用不可不去冗費是故臺榭在所可無而宫殿在所當建也於其所可無者而興作與其所當建者而華飾皆足以費財而害民也太祖知之傷今追古節費裕民敦朴垂後之意至矣儉德永圖固聖子神孫萬世之宜法守也洪武十三年五月命㑹寧侯張温雄武侯周武往河南理務時上以河南造周王宫殿恐軍民服役勞苦故命温等往撫之仍諭之曰河南將士疲勞多矣宜善撫之凡役萬人者可役千人役千人者可役百人使得更休毋盡其力臣若水通曰國之所以為國者民而已矣民之與國安危同焉故治國之道在節用愛人節用則税斂薄力役寛民安而國亦安矣故寛一役則得一人之安薄一斂則民享一分之食力舒而財豐矣太祖受命而興為民造福者也觀其因造王府惟恐軍民服役勞苦乃命官撫之且諭恤勞減役使得更休以寛其力一念之愛天地生物之仁也聖明為國保民尚以太祖為法國朝皇明祖訓曰四方諸夷皆限山隔海僻在一隅得其地不足以供給得其人不足以使令其不自揣量来犯我邊則彼為不祥彼既不為中國患而我興兵輕伐亦不祥也吾恐後世子孫倚中國富強貪一時戰功無故興兵致傷人命切記不可但諸部與西北邊境相密邇者累世戰争必選將練兵時謹備之臣若水通曰此聖祖戒勿輕伐四夷之言也夫四夷之人僻處塞外何係於中國之輕重也但後世人主有喜功之心輕兵數戰以殃其民以耗其國家何益哉故我聖祖切切以輕伐為戒其四夷邊境但𨕖將練兵令謹備之天地包含之仁裁制之義並可見矣天順二年冬十一月聖節及冬至例宴羣臣英宗皇帝顧學士李賢曰節固當宴不惜所費但計牲畜甚衆尚有正旦慶成一歲四宴朕欲減之何如賢曰大禮之行初不在此減之亦是由是每嵗二宴至於正旦亦減惟慶成一宴嵗不缺云臣若水通曰我朝四節之中慶成其最大者也其三節則其小者爾禮之大者不可不宴禮之小者可以宴可以無宴與其宴而傷財孰若省之以從禮易曰節以制度不傷財不害民侈用而至於害民豈人君之心哉我英廟省宴之舉遂為著令裕民足國其有既乎惟聖明引而伸之觸類而長之安民裕國之要在是矣格物通卷九十一
