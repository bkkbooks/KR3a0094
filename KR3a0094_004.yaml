body:
  text: 格物通卷四明湛若水撰立志下漢光武建武五年詔徴處士太原周黨會稽嚴光等至京師黨入見伏而不謁自陳願守所志詔曰自古明王聖主必有不賔之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹罷之帝少與嚴光同遊學及即位以物色訪之得於齊國屢徴乃至拜諫議大夫不肯受去耕釣於富春山中以夀終於家臣若水通曰黨願守所志所謂不降其志志於隱逸者也若子陵者非志道之士耶故子陵之不受諫議非為髙者也其與魯兩生皆王佐才如用之禮樂其可興乎是故抱天民之志不可以小成也故逃名以多修多修不可以詭俗同器也故違時以獨善獨善不可以忘世也故應物以觀兆見兆不可以茍從也故全身以遂志是故懷仁輔義崇德致用道斯修矣道德以崇禮樂具矣久要同遊觀由察微叵同器矣物色幣聘感其幾矣咄嗟諫議兆斯決矣耕釣富春志正終矣其處也龍蟄其出也雲遊其去也鳳翔樂則行之憂則違之獨立而不為離羣見世而不為隨時彼得湯武之君則伊吕何尚焉圖讖之惑狂奴之鄙其如禮樂何哉此子陵之所以見幾而作乎晉愍帝建興二年陶侃在廣州無事朝運百甓於齋外暮運於齋內人問其故答曰吾方致力中原過爾優逸恐不堪事故自勞耳臣若水通曰侃之運甓自勵其亦卧薪嘗膽之志乎以致夫平定中原之力其志大矣此其所以髙出於王謝諸人之表哉晉明帝太寧三年陶侃嘗語人曰大禹聖人乃惜寸陰至於衆人當惜分隂豈可但逸遊荒醉生無益於時死無聞於後是自棄也臣若水通曰人之志勵於勤而荒於惰故古之聖人憂勤惕厲不敢懈惰荒寧為志故也晉之風俗惟尚清談放逹相髙以至風頽俗敗禍延國家侃乃慨然以憂勤自厲可謂超然自拔於流俗豪傑之士也哉晉元帝永昌元年譙王氶曰吾志欲死於忠義豈可貪生茍免為奔敗之將乎事之不濟令百姓知吾心耳乃嬰城固守氶音拯臣若水通曰若氶所謂國君死社稷志士也孟子曰志士不忘在溝壑勇士不忘喪其元氶也有焉後之守土者望風而降或力竭勢去甘為臣虜亦獨何心哉唐太宗貞觀二年六月上曰梁武帝君臣惟談苦空元帝為周師所圍猶講老子朕所好者堯舜周孔之道以為如鳥之有翼魚之有水失之則死不可暫無爾臣若水通曰唐太宗自以好堯舜周孔之道似乎有志者矣又以為如鳥翼魚水失之則死非有志而知道者能為此言乎然貞觀之治不能並隆堯舜者何也抑所志者徒區區於堯舜周孔文為之末而不講於大道故邪孔子曰志於道夫道本諸身行諸人倫而達諸天下者其本則曰允執厥中而已一以貫之而已太宗所志堯舜周孔之文為與梁武所談之空過猶不及爾故人君有志於學其所志可不講乎唐太宗貞觀十一年魏徴上疏以為陛下欲善之志不及於昔時聞過必改少虧於曩日譴罰積多威怒微厲乃知貴不期驕富不期侈非虛言也臣若水通曰語稱匹夫不可奪志而况人主乎而况志於道者乎茍志於道則凡遷善改過無一而非為志也夫然後富貴貧賤處之一確乎不可奪矣惜太宗不講於此而徒以氣質用事有時而易矣唐太宗貞觀十一年上賜手詔褒美魏徴曰昔晉武平吳之後志意驕怠何曾位極台司不能直諫乃私語子孫自矜明智此不忠之大者凡得公之諫朕知過矣當置之几案以比弦韋臣若水通曰太宗知晉武平吳而志驕而不自知其志漸不克終於治定功成之時者何邪凡以志之不立也其志既立則不變塞焉至死不變何前後衡決邪大抵三代之下人主精一之學不講而往往假仁義以行之無怪乎其不克終矣雖然弦韋之喻又後之世主所不及也賈誼曰志有四興朝廷之志淵然清以嚴祭祀之志愈然思以和軍旅之志怫然愠然精以厲喪紀之志漻然㵞然憂以愀臣若水通曰夫志一而已矣何也天理一而已矣天理存於中而為志流動而不居隨處而發見在朝廷為清嚴在祭祀為思和在軍旅為精厲在喪紀為憂愀無一而非天理也是故一志立而萬善出矣為人君者可不務乎資政殿學士汝南公范仲淹所學必以忠孝為本其所志則先天下之憂而憂後天下之樂而樂其有所為必盡其力曰為之自我者當如是其成與否有不在我者雖聖賢不能必此諸葛武侯不計成敗利鈍之誠心也臣若水通曰所謂志者不可奪之謂也固不以成敗利鈍而易心矣其可以奪者謂之意氣則可謂之志則不可仲淹所志以天下之憂樂為己之憂樂庶幾伊尹之志矣顧其不能俾其君為堯舜而無一夫之不獲者何邪豈一德之學未之講邪使仲淹志伊尹之志以一其德則以其憂樂擴而充之將與天地萬物同體而王道可行矣故君子之學以志道為至宋徽宗政和五年置太子詹事陳邦光于池州蔡京獻太子以大食國琉璃酒器羅列宫廷太子怒曰天子大臣不聞以道義相訓乃持玩好之具蕩吾志邪命左右碎之京聞邦光實激太子諷言者擊逐之臣若水通曰太子不以蔡京所獻琉璃酒器蕩其志誠若有志矣惜乎其明知京之姦邪而不能去反聽京以計逐邦光有志之主固如是乎書云任賢勿二去邪勿疑必百志惟熙之主而後可然則為人君者可不以立志為先務乎宋孝宗淳熙八年著作郎吕祖謙卒祖謙既卧病而任重道逺之志不衰臣若水通曰伯恭任道之志卧病而不衰庶乎曾子所謂仁以為己任死而後己者矣獨不知其當時所任重者果孔門之所謂仁乎否也雖然世之人君以思得頗牧之心而思得如伯恭志道之流以與之遊從講習亦庶幾能引君當道志於仁者矣元世祖至元十九年殺宋少保樞密使信國公文天祥初天祥開督府置僚屬一時知名者四十餘人而遙請號令稱幕府文武士者不可悉數然皆一念向正至死靡悔廬陵鄧光薦曰天祥奉詔勤王獨行其志屢躓而愈奮故其軍日敗勢日蹙而歸附日衆從之者亡家沈族而不悔雖人心嚮中國思趙氏亦由天祥之神氣意度足以感悟之也臣若水通曰天祥其古之所謂志士者邪彼其一念恢復之志起而踣踣而復起故其開府南劒而忠義所激雖勤王之師不少得志于元而衆志不挫有以也夫觀其就義數語孔曰成仁孟曰取義惟其義盡所以仁至蓋其所志有素定也宋之人主使天祥得行其志于初年則董宋臣遷都之論必不行賈似道之姦必斥宋之國家豈至亂亡哉宋不出此如久病之人氣息奄奄扁鵲望之而走者而使忠節之臣抱志與國同斃不能不掩卷為之太息流涕宋儒周惇頥通書曰志伊尹之所志臣若水通曰伊尹之志志於仁者也伊尹恥君不為堯舜一夫不獲以為已辜與物同體矣推其本自樂堯舜之道中來也是故君子欲志伊尹之志者當先志於道夫伊尹王佐也人君欲復三王之治者宜求如伊尹之臣同其志而咸有一德焉可也張載理窟曰學者所志至大猶恐所得淺况可便志其小茍志其小志在行一節而已臣若水通曰心之本體與天地同大也君子之學復其初焉爾矣故必見大然後能志大所志係於所見也志於大而局於小者有之矣未有志於小而能大者也故子貢曰賢者識其大者不賢者識其小者孟子曰從其大體為大人從其小體為小人君子小人賢否之别顧其所識所從大小之辨爾故志不可不早定也程皓上殿劄子有云君道之大在乎稽古正學明善惡之歸辨忠邪之分曉然趨道之正故在乎君志先定君志定而天下之治成矣所謂定志者一心誠意擇善而固執之也夫義理不先定則多聽而易惑志意不先定則守善而或移惟在以聖人之訓為必當從先王之治為必可法不為後世駁雜之政所牽制不為流俗因循之論所遷惑自知極於明信道極於篤任賢勿二去邪勿疑必期致世如三代之隆而後己也臣若水通曰萬化生於心故萬善始於志也志定而不能善其事者未之有也志不定而能善其事者亦未之有也故君子定志之為貴一定志而天下之治成矣程子斯言萬世人君所當服膺而從事者也問人有少而勇老而怯少而廉老而貪何為其然也程子曰志不立為氣所使故也志勝氣則一定而不可變也曽子易簀之際其氣微可知也惟其志既堅定則雖死生之際亦不為之動也况老少之異乎臣若水通曰人有恆言志其帥也氣其卒徒也帥欲進則進欲止則止此其機猶非一身也志其心也氣其手足也心欲持則持欲行則行在我而已矣故君子養其志而氣斯至焉故志立而氣隨則老少死生不能移矣程頥應詔上英宗皇帝書曰今言當世之務者必曰所先者寬賦役也勸農桑也實倉廪也備災害也修武備也明教化也此誠要務然猶未知其本也臣以為所尤先者有三焉請為陛下陳之一曰立志二曰責任三曰求賢今雖納嘉謀陳善算非君志先立其能聽而用之乎君欲用之非責任宰輔其孰承而行之乎君相協心非賢者任職其能施於天下乎三者本也制於事者用也有其本不患無其用三者之中復以立志為本君志立而天下治矣所謂立志者至誠一心以道自任以聖人之訓為可必信先王之治為可必行不狃滯於近規不遷惑於衆口必期致天下如三代之世也臣若水通曰孔子稱為政在人取人以身是故庶政之務本於責任求賢而求賢責任又本於立志立志在於求道而體道在乎誠心志道要矣誠心急焉人君務學以致治可不知乎真德秀曰志者進德之基若聖若賢莫不發軔乎此志之所趨無逺不逹窮山窮海不能限也志之所向無堅不入鋭兵精甲不能禦也善惡二途惟道與利而已志乎道則理義為之主而物欲不能移志乎利則物欲為之主而理義不能入堯桀舜跖之所繇以異也可不謹乎臣若水通曰真德秀論志之言可謂切至矣然以為基以為發軔則似若以為始而未究其終者夫志者人道始終之貫也故孔子自十五志學至於不踰矩皆一志之所至也後之學者可不辨志以為終身之地乎張栻作桂陽軍學記有云學者當以立志為先不為異端訹不為文采眩不為利祿汩而後庶幾可以言讀書矣臣若水通曰異端利祿之奪志夫人皆知之也文采讀書之奪志雖宿學者未必知之也志立而讀書以發於文采猶樹木之根發於枝葉花實皆一氣之貫爾周惇頥曰聖人之訓入乎耳存乎心藴之為德行行之為事業程皓謂謝顯道曰玩物喪志黃魯直曰以我觀書處處得益夫志立則我立我立則讀書文采不能喪志而皆可以養志矣惟聖明留神焉國朝永樂三年正月壬子先是太宗皇帝命翰林院學士兼右春坊大學士解縉等於新進士中選才質英敏者俾就文淵閣進其學至是縉等選修撰曾棨等二十八人入見太宗諭勉之曰人須立志志立則功就天下古今之人未有無志而能建功成事者汝等簡拔於千百人中為進士又簡拔於進士中至此固皆今之英俊然當立志逺大不可安於小成為學必造道德之微必具體用之全為文必並驅班馬韓歐之間如此立心日進不己未有不成者古之文學之至豈皆天成亦積功所致也汝等勉之朕不任爾以事文淵閣古今載籍所萃爾各食其祿日就閣中恣爾玩索務實得於己庶國家將來皆得爾用不可自怠以孤朕期待之意臣若水通曰臣伏覩太宗文皇帝選庶吉士教之於祕閣而進其學先之以立志本之以道德全之以體用發之以文章可謂知本矣大哉皇言至矣皇教其後諸臣往往事業有可觀但未聞以道德顯名者豈亦未盡副聖教期望之盛心乎洪惟聖子神孫法祖立教拳拳於庶吉士之訓甚盛典也為庶吉士者宜以聖賢為志以道德為本以文藝為末庶無負於列聖相傳教養之本意也格物通卷四
