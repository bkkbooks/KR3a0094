body:
  text: 格物通卷十六明湛若水撰畏民上易屯象曰以貴下賤大得民也臣若水通曰陽為貴隂為賤初九當屯難之時以陽而來居隂下為以貴下賤之象如是則羣隂歸從之以濟屯難故有大得民之象書曰民可近不可下君下視其民而不恤民斯逺矣以貴下賤近民之謂也故上愛民如子則民亦愛之如父母矣非畏民之君其能然乎虞書大禹謨帝曰可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願四海困窮天祿永終臣若水通曰此乃帝舜命大禹之言元后大君也欽敬慎謹也可願謂人心所可願欲之事謂善也終絶也舜言可愛非君乎可畏非民乎衆非君則何所奉戴是君誠可愛也君非民則誰與守邦是民尤可畏也其可以不敬乎人君當謹其所居之地敬修其所可願欲者茍有一毫之不善生於心害於政則民不得其所者多矣四海之民不得其所至於困窮則君之天祿一絶而不復續豈不深可畏哉此又極言安危存亡之戒以深警之雖知其功德之盛必不至此然猶欲其戰戰兢兢無敢逸豫而謹之於毫釐之間此其所以為聖人之心也夫君之與民義雖相須而民尤為重不可不畏也人君知其可畏則能保其可愛否則可愛者不足恃矣夫禹以大聖帝舜所以戒之者如此况後世之君其可恃尊位以忽民哉虞書臯陶謨天聰明自我民聰明天明畏自我民明威達於上下敬哉有土臣若水通曰此臯陶陳謨於舜欲其敬民也威古文作畏明者顯其善畏者威其惡上天也下民也敬者心無所慢也有土有民社者謂人君也臯陶言所謂天之聰明者非别有他視聽也即民之視聽便是天之聰明所謂天之明畏者非别有他好惡也即民之好惡便是天之明畏所以然者蓋由天人同氣上下一理通達流行更不分别故記亦曰人者天地之心民心所存即天心之所在故忽乎民即慢乎天也民若可忽也天顧可慢乎有天下民社之寄者可不知所以敬乎民而敬乎天哉我朝戒石之詞曰下民易虐上天難欺蓋亦有見於此矣伏願聖明體臯陶之言鑒祖宗之戒敬畏小民以承天心幸甚夏書五子之歌皇祖有訓民可近不可下民惟邦本本固邦寧臣若水通曰此五子述禹之訓也皇大也君之與民以勢而言則尊卑殊分以情而言則一體相須故勢踈則離離則下情親則合合則近言其可親而不可踈之也且民者國之本本固而後國安其可以下之乎夫惟其勢之不侔故難親而易踈惟其情之相須故可親而不可踈親則民心歸歸則共戴而為人主踈則民心離離則孤立而為匹夫矣故曰民惟邦本譬如草木必先有根而後有幹而後有枝葉詩曰顛沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世此之謂也周書曰畏于民嵓為人主者可不存畏民之心乎夏書五子之歌豫視天下愚夫愚婦一能勝豫一人三失怨豈在明不見是圖豫臨兆民凛乎若朽索之馭六馬為人上者奈何不敬臣若水通曰此亦五子歌以警太康之語豫五子自稱以寓警太康一能勝豫者謂君失人心則為獨夫獨夫則愚夫愚婦皆可以勝我也三失者言所失者衆也怨豈在明不見是圖者民心怨背豈待其彰著而後知之當於事幾未形之時而圖之也朽腐也朽索易絶六馬易驚以朽索而馭六馬以喻其民心之難收為可畏之甚也愚夫愚婦人君孰不以為可罔也然得其心則得天下失其心則失天下故黎民咸二太康之所以失位也一能勝豫之言豈不可驗且民心之怨其上敢怒而不敢言豈待其昭著而後知之能於事幾未形之時圖之則能銷其變亂於未然若其已成則噬臍何及雖悔何追君人者可不敬畏之哉五子此言最為迫切哀痛萬世君人者所宜深玩猛省也商書太甲民非后罔克胥匡以生后非民罔以辟四方臣若水通曰此伊尹告太甲之言也后君也胥匡相正也辟君也言民非君則強凌弱衆暴寡不能相正以生君非民則孤立於上誰與為君者言民固不可無君而君又不可無民君民一體相須如此為人君者可以不敬其民乎商書太甲民罔常懷懷于有仁臣若水通曰此亦伊尹告太甲之言也言民順之則向逆之則背何有常懷惟有仁者則懷之蓋仁者心之生理與物同體痛癢相關得乎民心故民懷之自有不期然而然者矣為人君者可不體仁以懷天下之民哉周書泰誓天矜于民民之所欲天必從之臣若水通曰此武王誓師之言也矜憐也言天矜憐於民凡民有所欲天必從之如民好善天則福其善民惡淫天則禍其淫故民欲亡紂則天意去商也必矣是故明君不畏方張之強敵而畏大可見之民心民心即天地之心也其可忽乎周書康誥恫瘝乃身敬哉天畏棐忱民情大可見小人難保往盡乃心無康好逸豫乃其乂民臣若水通曰此武王告康叔之言最切於君道夫人主不愛其民皆由視民與吾身有形骸之隔故痛癢不相關茍能視民之不安如疾痛之在乃身則將無所不用其愛矣此大君宗子之責聖人一體之仁誠不可以不敬也又言天命雖甚可畏然誠則輔之民情雖大可見而小民最為難保若如恫瘝乃身則誠矣將見難保之民可保而可畏之天命亦輔之矣盡心云者如上文恫瘝乃身至誠惻怛而無一毫虛假之謂自安則不便於民好逸豫則有妨於政凡此皆不能盡心故又繼之曰無康好逸豫為人君者先戒逸豫然後能盡心能盡心然後能視民如傷能視民如傷然後能保難保之民而天命歸之矣可不加之意乎詩唐風揚之水我聞有命不敢以告人臣若水通曰此詩見民情之向背不常可畏也桓叔將以傾普普人作詩興起揚之水而言我亦聞其有命而不敢以告人也何哉蓋以普微弱而沃盛強普人不克胥匡以生故欲叛而歸之聞其命而不敢以告者為之隱也為之隱者欲其事之必成也嗚呼人情至此亦甚可畏矣以此觀之人主有國家者茍不能及時修德強仁以庇其人民惟昏淫自肆徒以奄奄之氣而欲繫將散之人心不亦危哉故叛普者固國人之罪而不能強於自治以致國人之叛者普侯亦不得辭其責矣此為君者之所宜鑒也商頌殷武天命降監下民有嚴不僣不濫不敢怠遑命于下國封建厥福臣若水通曰此詩頌髙宗之德能畏民以受福也書曰天明畏自我民明威民之所以可畏者以其心也君之所以畏民者亦以同此心也五子之歌曰豫臨兆民凛乎若朽索之御六馬為人上者奈何弗敬此詩言上天監視於下非有耳目好惡也蓋以民心即天心下民則甚可嚴畏也故髙宗則不僣不濫不敢怠遑蓋以民雖至愚心與天通吾賞或僣是喜違於民也吾刑或濫是怒違於民也吾怠遑自恣是欲違於民也違民心者民心亦違之民心違之即天命違之矣髙宗畏民之心如此即所以畏天也故天命於下國而大建其福天人交相與也髙宗畏民而受福如此則後之人主忽民自尊恣其喜怒妄行賞罰民將叛之而天禍至矣古之聖君不敢侮鰥寡虐無告豈非畏天命邪春秋莊公八年秋師還臣若水通曰甚哉莊公之棄其民也莊公八年春帥師以次郎夏及齊以圍郕厯三時而秋始還焉夫民吾赤子也驅之於鋒刃之間固以置之死地矣又久之以困苦是自戕其赤子也可謂仁乎民罔常懷懷於有仁使三軍懷不仁之怨則赤子皆敵國也一念向背之間爾可畏非民乎民可畏而不畏甚矣莊公之不仁也僖公二年冬十月不雨三年春王正月不雨夏四月不雨臣若水通曰詩稱僖公儉以足用寬以愛民務農重穀則誠賢君也其有志乎民審矣穀梁子曰不雨者勤雨也每時而一書閔雨也閔雨者有志于民者也夫國以民為天民以食為天知天之天者昌不知天之天者亡僖公憂民之憂惟懼民之失其所天君不能以獨存也謂非有愛民之心者能之乎禮記緇衣子曰大人溺於民夫民閉於人而有鄙心可敬不可慢易以溺人故君子不可以不慎也臣若水通曰人與天對天則理人則欲也閉於人者閉塞於人欲也鄙心者鄙陋之心也雖閉而鄙然至愚而神也故可以誠敬感以血氣用事也故不可以慢易治君慢而縱欲而無敬愛之心斯亂亡繼之矣故曰易以溺人也夫君猶舟也民猶水也水能載舟亦能溺舟故水可畏也民尤可畏也古之君子所以顧畏於民嵒者其以兹哉緇衣曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡臣若水通曰宇宙一氣也君民一體也故君為心民為體心與體一也心莊以肅則容體舒且敬矣不容間也故志之所至氣必至焉君之所好民必從焉心之全非自全也體全故也心之傷非自傷也體傷故也君之存亡以民心之存亡也一體而已矣知其體一所以仁也仁則民安而君安矣論語子路問君子子曰修己以敬曰如斯而已乎曰修己以安人曰如斯而已乎曰修己以安百姓臣若水通曰夫敬德之聚也敬則合內外該心事通衆寡物我兩盡者也言約而義博齊家治國平天下盡之矣故安人安百姓不越乎修己以敬之一言而盡之爾子思曰君子篤恭而天下平其亦有得於此乎此有人民百姓之寄者之所當知也孟子曰民為貴社稷次之君為輕臣若水通曰恆人之情莫不以君為貴民為輕也殊不知社稷所以為民也君之所以為君者以有民也故無民斯無君矣無君斯無社稷矣戰國之君率禽獸而食人肉至於爭城爭地則糜爛其民而不恤焉非惟有害於同體之仁其於固本寧邦之計亦踈矣孟子之言雖為當時發實為萬世居民社之寄者告也格物通卷十六
