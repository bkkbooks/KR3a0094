body:
  text: 格物通卷三十七明湛若水撰養太子下秦始皇帝三十七年趙髙者生而隱宫始皇聞其強力通於獄法舉以為中車府令使教胡亥決獄胡亥幸之漢文帝六年賈誼曰夏殷周為天子皆數十世秦為天子二世而亡人性不甚相遠也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子乃生固舉以禮有司齊肅端冕見之南郊過闕則下過廟則趨故自為赤子而教固已行矣孩提有識三公三少明仁孝禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫三代之所以長久者以其輔翼太子有此具也及秦則不然使趙髙傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若刈草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也臣若水通曰刑獄者天地肅殺之氣也人君陰慘之政也刑官不得與於祭齊則不行刑懼其氣之感也顧可使太子親其事而近其人乎太子始生輔之以正猶懼不正况習與不正者處乎此賈生以此而決秦之所以不二世而亡也秦之覆轍未遠漢文之教太子猶不知鑑焉何哉漢昭帝元鳳四年初衛太子之子史皇孫生子病已號皇曽孫生數月遭巫蠱事太子男女妻妾皆遇害獨皇曽孫在亦坐收繫獄丙吉受詔治巫蠱獄吉心知太子無事實重哀皇曽孫無辜擇謹厚女徒令乳養曽孫置間燥處曽孫髙材好學然亦喜遊俠以是具知閭里姦邪吏治得失及昌邑王廢霍光與張安世諸大臣議所立未定丙吉奏記光曰武帝曽孫名病已者至今十八九矣通經術有美材行安而節和願將軍定大策光與丞相敞上奏曰武帝曽孫病已年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後皇太后詔曰可迎曽孫即皇帝位臣若水通曰丙吉護皇曽孫於艱險之時必擇謹厚女徒養之得蒙以養正之道矣皇曽孫髙材好學行安節和恭儉仁慈教養之功不可誣也及立為宣帝漢室復興焉傳曰以能保我子孫黎民其丙吉之謂乎向非吉之仁則漢統絶矣何望乎中興之業哉漢光武建武十三年光武在兵間久厭武事且知天下疲耗思樂息肩自隴蜀平後非警急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及臣若水通曰太子天下本本正而天下正矣故素教預養之者不可以不正光武因皇太子問攻戰之事戒之以孔子不對問陳之事豈亦養之以正者哉卒之建武永平之政為東都首稱君子皆歸於養正之功焉漢光武建武十九年六月上以沛國桓榮為議郎使授太子經榮辨明經義儒者莫之及特加賞賜帝使左中郎將汝南鍾興授皇太子及宗室諸侯春秋賜興爵關內侯興辭以無功帝曰生教訓太子及諸王侯非大功耶興曰臣師少府丁恭於是復封恭而興遂固辭不受臣若水通曰世祖天資雖美非知帝王教養太子之道者也其使桓榮授經太子特加賞賜鍾興授春秋而賜以侯爵且追封其師丁恭尊師教子之禮亦隆矣所惜者二臣徒事章句口舌之間而無格心一德之道其於世祖不有負哉使世祖而知學尊嚴光以為之師則懷仁輔義之學必能成太子之德業而漢為三代矣漢光武建武二十八年上大會羣臣問誰可傅太子者羣臣承望上意皆言太子舅陰識可博士張佚正色曰今陛下立太子為陰氏乎為天下乎即為陰氏則陰侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕況太子乎即拜佚為太子太傅以博士桓榮為少傅賜以輜車乘馬臣若水通曰古者三公不惟其官惟其人傅太子之官亦當如之所謂其人者必如伊傅之一德斯可矣光武善張佚之言而以佚為太傅若佚者固知其正直矣然正直而不聞道者有之也帝豈知佚為其人而以應對之間遽取之哉若佚者以為諫議大夫可也若敷求哲人以稱其任有嚴光在焉漢昭烈章武三年詔敕太子曰人五十不稱夭吾年巳六十有餘何所復恨但以卿兄弟為念爾勉之勉之勿以惡小而為之勿以善小而不為惟賢惟德可以服人汝父德薄不足效也汝與丞相從事事之如父臣若水通曰古之明王所以教養太子者亦惟傅之以正人命之以正言而已昭烈病革命太子父事丞相亮是養之以正人也又言勿以善小而不為勿以惡小而為之是養之以正言也使能體先帝之德意而親賢去佞為善去惡何恢復之業不可圖哉奈何孔明不祿黃皓用事曽不旋踵遂爾覆宗嗚呼何以見其先人於地下耶謹録之以為嗣君顛覆典刑者之戒晉元帝大興元年帝以賀循行太子太傅周顗為少傅庾亮以中書郎侍講東宫帝好刑名家以韓非書賜太子庾亮諫曰申韓刻薄傷化不足留聖心太子納之臣若水通曰韓非刑名之學也王衍何晏祖尚其説已致禍亂元帝中興亦可監矣顧乃教誨太子以韓非刻薄之書庾亮雖諫以止之特救弊補偏者爾使進丹書之訓則刑名邪説不能入矣三代教養太子之道不講中原不復有由然哉陳宣帝太建五年周左宫正宇文孝伯言於周主曰皇太子四海所屬而德聲未聞且春秋尚少志業未成請妙選正人為其師友調護聖質猶望日就月將如或不然悔無及矣臣若水通曰古之養太子者必有師友之臣所貴師友在正人所貴正人在道德故道德由師友有之其任豈不重乎後之太子之官三太三少非無師友之名但惟其官不惟其人至有學術不齒於庸人者望其成太子之德豈不難哉臣請以此廣孝伯之説陳宣帝太建八年周以左民部尚書江總為詹事吏部尚書孔奐奏曰江總文華之士今皇太子文華不少豈藉於總願選敦重之才以居輔導之職臣若水通曰古之教太子之道有師保傅之官師者道之教訓保者保其身體傅者傅之德義而文華不與焉若江總浮靡之士豈輔養太子者哉孔奐之言是矣但謂太子文華不少豈藉於總然則文華不足者可藉總耶於是乎猶惜其信道不篤而未知帝王之學不在文華而文華適為聖學敦本之纍也故教太子不以三代之法鮮有不敗德喪邦者矣此可以為人君愛養太子者之鑒唐太宗貞觀七年十二月帝謂左庶子于志寧右庶子杜正倫曰朕年十八猶在民間民之疾苦情偽無不知之及居大位區處世務猶有差失況太子生長深宫百姓艱難耳目所未涉能無驕逸乎卿等不可不極諫太子好嬉戲頗虧禮法志寧與右庶子孔頴達數直諫上聞而嘉之各賜金一斤帛五百匹臣若水通曰禮云禁於未發之謂豫發焉後禁為力難矣故三代明王之教太子必有師傅教之道德禮義陳善以閉其邪所謂禁之於未發也發而後諫斯為下矣惜乎太宗不知而于杜諸人學不足以及此無怪乎太子承乾嬉戲虧禮而卒於見廢也唐太宗貞觀十七年定太子見三師儀迎於殿門外先拜三師答拜每門讓於三師三師坐太子乃坐其與三師書前後稱名惶恐黃門侍郎劉洎上言以太子宜勤學問親師友今入侍宫闈動踰旬朔師保以下接對甚稀伏願少抑下流之愛𢎞遠大之規則海內幸甚上乃命洎與岑文本褚遂良馬周更日詣東宫與太子遊處談論臣若水通曰自古帝王擇師傅以教太子固有定法太宗定太子見三師儀所以養其尊師重傅之誠可謂善矣然不於立承乾之日而於更立晉王治時要亦有所懲而至是始悟也奈何治竊太子之位縱欲崇侈乞優供給雖劉岑褚馬諸賢日與遊處談論亦不能消其逸志吁哀哉唐太宗貞觀十七年嘗謂侍臣曰朕自立太子遇物則誨之見其飯則曰汝知稼穡之艱難則常有斯飯矣見其乘馬則曰汝知其勞不竭其力則常得乘之矣見其乘舟則曰水所以載舟亦所以覆舟民猶水也君猶舟也見其息於木下則曰木從繩則正后從諫則聖臣若水通曰太宗因事而誨太子可謂愛之深矣然而太子之未善者豈亦身教之未至耶唐德宗貞元十九年七月初翰林待詔王伾善書王叔文善棋俱出入東宫娛侍太子叔文詭譎多詐太子嘗欲諫宫市事叔文以不宜言外事止之由是大愛幸與王伾相依附叔文因為太子言某可為相某可為將幸異日用之密結翰林學士韋執誼及當時有名而求速進者陸淳吕溫李景儉韓曄韓泰陳諫栁宗元劉禹錫等定為死友而凌凖程異又因其黨以進日與遊處蹤迹詭祕莫有知其端者藩鎮或陰進資幣與之相結臣若水通曰賈誼云太子乃生而見正事聞正言行正道左右前後皆正人三代之所以長久也夫養太子以正猶恐不正而况教之以不正乎德宗之於太子使小技博奕之羣小彚進教之竒巧可謂正事乎止宫市之諫以為不言外事可謂正言乎陰受資幣而不以為非可謂正道乎死友十人皆輕佻不逞之徒以若人而與之前後左右可謂正人乎然則順宗之不肖德宗養之也可以為萬世養太子者之戒矣唐憲宗元和元年夏四月元稹上書勸上早擇修正之士使輔導諸子以為太宗自為藩王與文學清修之士十八人居後代太子諸王雖有僚屬日益疏賤至於師傅之官非眊瞶廢疾不任事者則休戎罷帥不知書者為之其友諭贊議之徒尤為冗散之甚搢紳皆恥為之就使時得僻老儒生越月踰時僅獲一見又何暇傅之德義納之法度哉夫以匹夫愛其子猶知求明哲之師而教之况萬乘之嗣繫四海之命乎上頗嘉納其言時召見之臣若水通曰元稹勸憲宗擇修正之士使輔導諸子是矣至引太宗之事為比則非也夫太宗開館延賢先儒固已論其非况所講者又不過文籍而已亦何益哉使知有格物窮理之學則不致蹀血之禍矣是故人君欲養太子者必擇正人論正學夫然後可以輔成其德也賈誼新書曰殷周之君有道之長而秦無道之暴也其故可知也昔者周成王幼在襁褓之中召公為太保周公為太傅太公為太師臣若水通曰師保傅皆與太子遊處者也傅者傅之義理太傅以身少傅以言申教之也師者教之德行物則民彛皆懿德也保者保其身體起居動息皆天理也其歸於行義道德一也而皆得其人以修其職焉太子之德業其有不成而治化其有不長乎宋理宗開慶元年六月立忠王樭為皇太子帝家教甚嚴太子雞初鳴問安再鳴回宫三鳴往會議所參決庶事退入講堂講經史將晡復至榻前起居問今日講何經答之是則賜坐賜茶否則為之反覆剖析又不通則繼以怒明日須更覆講率為常臣若水通曰養太子之道必擇正人以左右之薰陶其氣質涵養其德性傅之詩書以發其良知參之幾事以宏其大用是故人已交修內外夾持而後德業合一並進也理宗之教太子之嚴如此然究其所講文義爾至於朝夕問安則亦庶乎文王世子之道不可誣也雖然觀度宗嗣位之日惟拱手於賈似道之權姦則昔日之所養可知也宋室之日淪於亡其亦不講於三代有道之長教養太子之法然哉宋儒程皓曰勿謂小兒無記性所厯事皆能不忘故善養子者當其嬰孩鞠之使得所養全其和氣乃至長而性美教之示以好惡有常至如養犬者不欲其升堂則時其升堂而撲之若既撲其升堂又復食之於堂則使孰從雖日撻而求其不升不可得也養異類且爾况人乎故養正者聖人也臣若水通曰易云蒙以養正言養之於初也又云立不易方言養之於常也初則易入常則不變易入而不變則可以成性矣此程皓之論雖為常人言亦可為教養太子之法者歟程頥論經筵劄子有云昔者周公輔成王幼而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成今士夫家善教子弟者亦必延名德端方之士與之居處使之薰染其性故曰少成若天性習慣如自然伏以皇帝陛下春秋之富雖睿聖之資得於天稟而輔養之道不可不至所謂輔養之道非謂告詔以言過而後諌也在涵養薰陶而已大率一日之中親賢士大夫之時多親寺人宫妾之時少則自然氣質變化德器成就欲乞朝廷慎選賢德之士以侍勸講講讀既罷常留二人直日夜則一人直宿以備訪問皇帝習讀之暇遊息之間時於內殿召見從容宴語不獨漸磨道義至於人情物態稼穡艱難積久自然通達比之常在深宫之中為益豈不甚大臣若水通曰涵養氣質薰陶德性此教養太子之上䇿而規諫不與焉然非得盛德之士動物之誠者不可也故三王之養太子必先其人焉書曰侍御僕從罔非正人以旦夕承弼厥辟出入起居罔有不欽蓋以此也若徒拱手默坐當講者立案傍解釋數行而退則亦何益之有夫人皆能之又奚必擇其人為哉是故國家以養太子為先以擇賢德為急矣伏惟皇上講學之際一留念焉程頥上太皇太后書云古人生子能食能言而教之大學之法以豫為先人之幼也知思未有所主便當以格言至論日陳於前雖未曉知且當薰聒使盈耳充腹久自安習若固有之雖以他言惑之不能入也若為之不豫及乎稍長私意偏好生於內衆口辨言鑠於外欲其純完不可得也臣若水通曰教子者以豫為貴蓋人之心恆主於先入之言也學記曰禁於未發之謂豫此之謂也夫人少之時天性未鑿知思未有所主導之正則正矣正則邪不能入矣故君子豫之為貴易曰蒙以養正聖功也是蒙不可以不養也况夫太子天下之本也生民利害之所關社稷存亡之所係尤不可以不養伏惟皇上為社稷重之國朝洪武元年正月戊寅劉基陶安言於皇祖曰適聞中書及都督府議倣元舊制設中書令欲奏以太子為之皇祖曰取法於古必擇其善者而從之苟惟不善而一槩是從將欲望治辟猶求登髙岡而却步渡長江而回楫豈能達哉元氏北人事不師古設官不以任賢惟其類是與名不足以副實行不足以服衆豈可取法且吾子年未長學未充更事未多所宜尊禮師傅講習經傳博通古今識達機宜他日軍國重務皆令啓聞何必效彼作中書令乎乃令詹同取東宫官制觀之謂同等曰朕今立東宫官勳德老臣兼其職老成舊人動有典則若新進之賢者亦選擇參用夫舉賢任才立國之本崇德尚齒尊賢之道輔導得賢人各盡職故連抱之木必以授良匠萬金之璧不以付拙工同對曰陛下立法垂憲之意實深遠矣臣若水通曰太子固貴乎善養而善養莫先於親賢尊禮師傅所以啓沃其心也講習經傳所以開發其心也博通古今識達機宜所以擴充其心也帝王之學心學也其心一正則天理日以流行國體日以諳練天下事物皆其度內而無難理者矣皇祖治天下深重國本是以立東宫官擇老成以輔導之大本立而大治成矣今日所以久安長治者不有在於此乎七月戊子上謂皇太子曰天子之子與公卿士庶人之子不同公卿士庶人之子係一家之盛衰天子之子係天下之安危爾承主器之重將有天下之責也公卿士庶人不能修身齊家取敗止於一身一家若天子不能正身修德其敗豈但一身一家之比將宗廟社稷有所不保天下生靈皆受其殃可不懼哉可不戒哉臣若水通曰皇祖謂天子之子係天下之安危與公卿士庶人之子係一家之盛衰者不同至哉聖心乎大哉聖言乎蓋天下之本在國國之本在家家之本在身身之本在心人君能務學以格物則知至而意誠心正而身修家以之齊國以之治天下以之平宗社隆長生靈樂育有必然者君若不能豫養太子於平日至於繼體宴安之餘縱欲敗度安危利災皇祖所謂不但一身一家宗廟社稷之不保天下生靈之受殃者豈能免哉洪武七年正月上召太子宫臣諭之曰汝知所謂重器乎對曰豈非商彛周鼎乎上曰汝所謂商彛周鼎者非重器也太子者天下之重器人有鼎彛尚知寶愛太子承主器之重豈得不寶愛之乎寶愛之者必擇端人正士以為輔翼朝夕與居使其熟聞善言不見詖行自然漸漬以成其德若惟委之於便嬖近習是委重器於途而不知寶愛之矣汝等日輔太子講論之時必道之以正使其道明德立才器充廣庶幾他日克勝重任可以副朕所望臣若水通曰太子固天下之重器而聖德尤天地之至寶也必得至寶然後可以成重器矣我皇祖諭太子宫臣之言教養太子之道備矣是故寶愛重器在於涵養涵養本原在於親賢故必輔以端人正士朝夕與居使其熟聞善言不見詖行便嬖近習不入其聰明如是則道心有所養而德性有所成所謂天地之至寶在太子之身矣此皇祖拳拳諭宫臣而以三代望其後也歟天順二年禮部請太子出閣讀書英宗皇帝召學士李賢曰卿可定擬講讀等官卿宜時常照管且曰先讀何書對曰四書經史次第講讀宜先大學尚書上曰然及擬講讀官將二十人上一一品其人物皆當其才臣若水通曰書曰一人元良萬邦以貞記稱教世子必以禮樂立之師傅古之慎教太子如是之重也英宗欲教太子詔李賢而惓惓焉以擇人講讀為務其慎教之心可謂至矣其垂裕之道可謂盡矣聖子神孫其以先德為念哉格物通卷三十七
