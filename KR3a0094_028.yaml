body:
  text: 格物通卷二十八明湛若水撰進德業三左傳莊公八年夏師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種德德乃降姑務修德以待時乎秋師還君子是以善魯莊公臣若水通曰孟子云仁人無敵於天下蓋言有仁則强弱非所較也齊之於魯猶齊魯之於郕也其大小强弱之不敵皎然矣以齊魯之大而可加於郕之小則夫以齊之强而可加於魯之弱也不難矣向使魯莊計不出此徒欲以逞一時其不為郕者幾希不用慶父之言而惟修德是務則固已無敵矣是故君子善之僖公十九年宋人圍曹討不服也子魚言於宋公曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至于兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動臣若水通曰宋襄急於求霸不顧省德惟務伐人圍曹之役是也至於鹿上之盟反欲以小國爭盟公子目夷之所憂以為禍者其證成矣子魚之言雖不見用然其引文王之事則固可法然子魚之意蓋欲以善服人而文王則修德而人服者也進德業者又不可以不辨宣公十一年晉郤成子求成于衆狄衆狄疾赤狄之役遂服于晉秋會於櫕函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非德莫如勤非勤何以求人能勤有繼其從之也詩曰文王既勤止文王猶勤况寡德乎臣若水通曰成猶言和好也櫕函地名召謂召其來會也非德猶言寡德也前此郤成子為趙宣子謀者善矣特其言爾今觀不欲召狄之會乃欲往而從之拳拳以勤為言則以身踐之非徒能言之而已也用此道也雖得志於天下可也于衆狄也何有國語周語有神降于莘王問於內史過曰是何故國有之乎對曰有之國之將興其君齊明𠂻正精潔惠和其德足以昭其馨香其惠足以同其民人神饗而民聽民神無怨故明神降之觀其政德而均布福焉臣若水通曰齊一也𠂻中也馨香芳香之升聞者同猶一也夫人君之德所以協上下而致休徴通于神明者一理之感應然也故夏興而祝融降於崇山商興而檮杌次于丕山非其大驗邪內史謂莘神降以觀德政有天下者可不務修德政以為天地神人之主乎周語富辰曰夫義所以生利也祥所以事神也仁所以保民也不義則利不阜不祥則福不降不仁則民不至古之明王不失此三德者故能光有天下而和寧百姓令聞不忘臣若水通曰富辰周大夫也三德仁義祥也有此三德則福利民至理之自然非為三者而後修德也周鄭兄弟之國也武莊之平桓有大勳勞者也如以遊孫伯之故而棄之則周亦不義不祥不仁矣尚何以昌其業乎是故光有天下而令聞赫然必其謹是三德者也為人君者其可不勉諸晉語范文子曰夫王者成其德而逺人以其方賄歸之故無憂臣若水通曰大學曰是故君子先慎乎德有德此有人有人此有土有土此有財有財此有用故古之明王必文德修備然後逺人來歸方物畢至反之則憂在我矣奚其樂此厲公伐鄭文子止之以見惟德為能動人也伏惟皇上為天下四方之主而四夷各以方物入貢豈非聞風慕義而來乎惟益修德以賓服之幸甚晉語范獻子曰人之有學也猶木之有枝葉也木有枝葉猶庇䕃人而况君子之學乎臣若水通曰學以成德德以潤身是故可以知本矣范獻子以人猶木也學猶枝葉可以庇䕃得矣惜乎不知枝葉之暢荗由於根本也語曰君子務本本立而道生是故道生則仁民愛物而可以保䕃四海矣故人君求聖學以修德以庇天下不可以不知本漢武帝建元元年董仲舒告漢武帝引曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在乎他在乎加之意而已臣若水通曰心學之不明也久矣是以道化不明而卒無善治髙明光大吾心之本體也加之意在反求之而已耳仲舒之告武帝誠知德業之本矣他如一則曰王心未加焉二則曰設誠於內合而觀之豈非以二帝三王之心學望武帝乎惜乎內多欲而外施仁義其蔽固已深矣漢光武中元二年光武受尚書通大義召桓榮入說甚善之每朝㑹輒令榮敷奏經義帝稱善帝每旦視朝日昃乃罷數引公卿郎將講論經理夜分乃寐皇太子見帝勤勞不怠諫曰陛下有禹湯之明而失黃老養性之福願頥愛精神優遊自寧帝曰我自樂此不為疲也臣若水通曰夫學所以進德業也光武雖孜孜經術惜乎徒事講說不能體於身心而明善誠身之功未之聞也然榮固徒事稽古者也格心之學引君當道而志於仁者則榮非其人爾故光武雖光復舊物身致小康然父子夫婦君臣之間不能無可憾者焉後之人君欲進德修業者請自明善誠身始漢明帝永平二年上幸辟雍初行養老禮禮畢引桓榮及弟子升堂上自為下說諸儒執經問難于前下詔賜榮爵關內侯上自為太子受尚書于桓榮及即位猶尊榮以師禮臣若水通曰孔子云德之不修學之不講蓋言德業不可不兼進也宋儒胡寅曰顯宗事師之意百千年鮮有其儷可謂人主之髙致惜乎桓榮受業専門章句不知修身治天下之大義故其君之德業止於如是臣愚於顯宗未見其為德業特為一時之美觀爾向使顯宗以其尊師重傅之心榮有格心之輔修德以為之本講學以為之資德業合一太甲髙宗何尚焉而君臣之間皆不能然未幾崇信西佛而遣使求之佛入中國自永平始孔子曰攻乎異端斯害也已孟子曰我亦欲正人心息邪說距詖行放淫辭以承三聖者夫德業在心術之微其端一而已爾顯宗事異端壞心術可謂之德業乎仰惟聖明好學不倦立心以為德業之大本而講學以培養之則髙出百王矣天下幸甚漢章帝元和二年帝之為太子也受尚書于東郡太守汝南張酺及巡幸東郡引酺及門生掾史並會庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮臣若水通曰宋儒真德秀云章帝尊經事師不愧前人又惜其以嚴憚不得久在左右所以輔成德業如是而止臣謂德業生於心者也尚書所載皆帝王修德業之要張酺徒能講說而不能啓心沃心以輔君德豈非格心之學未聞乎漢獻帝建安十五年吳主孫權謂呂䝉曰卿今當塗掌事不可不學䝉辭以軍中多務權曰孤豈欲卿治經為博士邪但當涉獵見往事爾卿言多務孰若孤孤嘗讀書自以為大有所益䝉乃始就學及魯肅過尋陽與䝉論議大驚曰卿今者才略非復吳下阿䝉䝉曰士别三日即當刮目相待大兄何見事之晚乎肅遂拜䝉母結友而别臣若水通曰權語䝉以學是矣但其所謂學止於涉獵讀書爾而孔門默識德行之學未聞曽是以為學乎雖然䝉就學未幾而論議驚人亦其氣質之小變邪抑其矜伐之心形於詞氣所謂以學問驕人者非邪雖曰學臣不敢信也宋儒胡寅謂權䝉皆以學進而大其益過矣夫權奸雄之邪心未損豈古人之所謂學易之所謂益者乎晉武帝泰始九年周魴之子處膂力絶人不修細行鄉里患之處嘗問父老曰今時和嵗豐而人不樂何邪父老歎曰三害不除何樂之有處曰何謂也父老曰南山白額虎長橋蛟並子為三矣處曰若所患止此吾能除之乃入山求虎射殺之因投水摶殺蛟遂從機雲受學篤志讀書砥礪節行比及期年州府交辟臣若水通曰成湯懋德不吝改過聞過非難改過為難改過非難而不吝尤難周處聞父老三害之言除蛟虎以自勵其行可謂勇於改過而得處仁遷義之法矣以其果敢之資茍自得師聞孔孟之學則下為子路上為成湯其德業可量邪而師機雲下不過辭章記誦上不過節行不聞大道之要豈非學負其質哉陳文帝天嘉四年周太傅燕國公于謹對周武帝曰去食去兵信不可去願陛下守信勿失又曰言行者立身之基願陛下三思而言九慮而行勿使有過天子之過如日月之食人莫不知願陛下慎之臣若水通曰易曰言行君子之樞機于謹以為立身之基是也殊不知言心聲也行心迹也言行由中則發皆天理而動無不善若徒求無過於三思九慮之間誠使發皆中節亦謂之克伐怨欲不行其誠僞何如也此何故歟不見天理故也孔子曰言顧行行顧言顧也者其體認天理之謂乎唐太宗於𢎞文殿聚四庫書二十餘萬卷置𢎞文館於殿側精選天下文學之士虞世南禇亮姚思廉歐陽詢蔡允恭蕭德言等以本官兼學士令更日宿直聽朝之隙引入內殿講論前言往行商確政事或至夜分乃罷臣若水通曰太宗聚書於𢎞文館選文臣以更直講論古今亦云盛矣其果古之博學審問之謂邪帝王之學格物而已誠意正心修身齊家治國平天下皆隨處體認天理以格物者也豈徒講說而已邪太宗不知大學之道群臣皆非正學之人而昧聖學之本故學不純而心不正治不古以雜于霸有由然矣伏惟我祖宗有君臣同遊輪直文華講習文樓之典甚盛舉也仰惟皇上聖學日新今年盛暑不以例輟講廢學詔日講經筵官日各輪一員入直文華是能復祖宗之舊章而唐不足論矣臣愚謂人君之學貴知本也方今道學漸明之時正心一德之臣布於中外四方茍選取入京以本官兼文職俾之入侍日講經筵之班則其誠意德氣亦足以薰陶㴠養而正君心矣誠為莫大之益天下幸甚唐太宗貞觀二年六月戊子上謂侍臣曰朕觀隋煬帝集文辭博奧亦知是堯舜而非桀紂然行事何其反也魏徴對曰人君雖聖哲猶當虛已以受人故智者獻其謀勇者竭其力煬帝恃其俊才驕矜自用故口誦堯舜之言而身為桀紂之行曽不自知以至覆亡也上曰前事不逺吾屬之師也臣若水通曰魏徴虛之一言庶乎知德業之本矣虛明者心之本體也亦在乎盡心與否而已譬之鑑焉今日明燭妍媸非加光也不翳於塵爾明日一物莫燭非始無光也蔽之深爾君子能去其蔽光者則本體自見矣是之謂盡心而知性隋煬帝知是堯舜非桀紂心之本體有時而明然而身口頓異身為桀紂陷於亡而不知非其欲蔽之深乎揆厥所由惟其不學故無以成其德業爾或曰煬帝著書三十萬卷謂之不學可乎噫不立其本而徒事夫文詞之末雖曰充棟祗足以為惑爾奚學之云學也者其聖狂之判乎唐太宗貞觀三年十二月上問給事中孔頴達曰論語以能問於不能以多問於寡有若無實若虛何謂也頴達具釋其義以對且曰非獨匹夫如是帝王亦然帝王內藴神明外當𤣥默故易稱以蒙養正以明夷涖衆臣若水通曰曽子此言謂昔者吾友嘗從事於斯則此乃孔門之學所從事者也蓋學以虛心受人為本唐太宗之問可謂善矣頴達者宜以此義開其君之心心虛則善日生帝王之學可基矣不知出此徒具訓釋以對遂使論語之義晦而孔門之學不明也噫有君如此而不遇格心之臣以佐之此太宗之所以多慚德而貞觀之治不克終豈非輔臣之罪哉唐太宗貞觀十五年指殿屋謂侍臣曰治天下如建此屋營構既成勿數改移茍易一榱正一瓦踐履動搖必有所損若慕竒功變法度不恆其德勞擾實多臣若水通曰太宗以殿屋喻治道且戒慕竒功變法度而又本於其德之恆若太宗可謂知進修矣向使當時有知學之臣將順其美必曰屋以基為本如道以心為本帝恆德之言若知本矣屋之榱瓦之損小而基崩之害大人君之治法度之損小而壞心之禍大心恆則德恆德恆則無法度之變矣德業之成豈至貞觀之不終乎唐德宗建中四年十一月陸贄上疏曰臣聞仲虺贊成湯不稱其無過而稱其改過吉甫歌誦周宣不美其無闕而美其補闕是則聖賢之意較然著明惟以改過為能不以無過為貴蓋為人之行已必有過差上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其德日新遂非則其惡彌積臣若水通曰改過遷善進德之基也陸贄以是而告德宗可謂對病之藥矣惜乎剛愎自任而不能此其所以卒成亂階也歟賈誼新書曰人主仁而境內和矣故其士民莫弗親也人主義而境內理矣故其士民莫弗順也人主有禮而境內肅矣故其士民莫弗敬也人主有信而境內貞矣故其士民莫弗信也臣若水通曰仁義禮信人之性也性也者心之理也是故心性感於上而民心應於下其心同也故進德修業存之於身孚之於家國天下之人而治道具矣可不重乎劉向說苑曽子曰君子修禮以立志則貪欲之心不來君子修禮以修身則怠惰慢易之節不至君子修禮以仁義則忿爭暴亂之辭逺臣若水通曰立志修身居仁由義君子之德業備矣禮也者理也體用之貫也故在心則志立在身則身修在事則仁義而無貪欲怠慢爭亂之邪焉何患乎德業之不成哉陸贄奏議曰愚智兼納洪纎靡遺蓋之如天容之如地埀旒黈纊而黜其聰察匿瑕藏疾而務於包涵不示威而人畏之如雷霆不用明而人仰之如日月此天子之德也臣若水通曰天子之德與天同體者也與天同覆而無外與地同載而不遺與日月同明而不蔽與雷霆同威而不怒所以復德之本體而配天者也其德崇矣其業廣矣修之者非在乎他在吾心之本體始爾伏惟皇上加之意焉因陸贄之言而求之本心廓天地日月雷霆之德以治天下幸甚格物通卷二十八
