body:
  text: 格物通卷九十六明湛若水撰薄斂下唐高祖武德七年夏四月庚子初定均田租庸調法丁中之民給田一頃篤疾減十之六寡妻妾減七皆以十之二為世業八為口分每丁嵗入租粟二石調隨土地所宜綾絹絁布嵗役二旬不役則收其傭日三尺有事而加役者旬有五日免其調三旬租調俱免水旱蟲霜為災什損四以上免租損六以上免調損七以上課役俱免凡民資業分九等百户為里五里為鄉四家為鄰四鄰為保在城邑者為坊田野者為村食祿之家無得與民爭利工商雜類無預士伍男女始生為黃四嵗為小十六為中二十為丁六十為老嵗造計帳三年造户籍臣若水通曰唐之立法雖非皆古之制而亦古之遺意也曰租者粟米之征也曰調者布縷之征也曰庸者力役之征也豐年則取之凶年則損之此民不困於誅求而貞觀之斗米三錢有以哉後世惟竭民之財以恣己之欲不知損下則上下俱損益下則上下俱益君民一體而貧富豈容二致耶今天下公私俱竭而病於國家之冗費未去其取諸民者亦重矣伏惟聖明崇儉以節用損上以益下天下幸甚唐太宗貞觀九年三月上謂魏徴曰齊後主周天元皆重斂百姓厚自奉養力竭而亡譬如饞人自啖其肉肉盡而斃何其愚也臣若水通曰君民相為一體者也何者天地萬物與吾一體者也知其一體則所以愛之而不傷者無所不至矣其忍重斂以自殘乎太宗啖肉充飢之喻近之矣噫刲巳則痛戚至於截人肢體而不恤者氣血不相關而己是蓋未能真見天地萬物一體之道則一膜之外已為秦越夫焉得不重斂相殘邪故人君之學莫大乎體仁易曰君子體仁足以長人貞觀十一年八月侍御史焉周上疏以為自古以來國之興亡不以畜積多少在於百姓苦樂且以近事驗之隋貯洛口倉而李密資之東郊積布帛而世充資之兩京府庫亦為國家之用至今未盡夫積畜固不可無要當人有餘力然後收之不可強斂以資冦敵也夫儉以息人陛下已於貞觀之初親所服行在於今日為之固不難也陛下必為長久之謀不必逺求上古但如貞觀之初則天下幸甚臣若水通曰焉周之言切矣國之興亡係於民之苦樂故厚斂以病民則民怨苦而喪其樂生之心則亂亡安得不至也使太宗能從其言如貞觀之初政何其治之不可長哉貞觀十六年十一月壬申上曰朕為兆民之主輕徭薄斂使之各治生業則皆富矣若家給人足朕雖不聽管絃樂在其中矣臣若水通曰民吾同胞痛癢欣戚相關者也孟子曰樂民之樂者民亦樂其樂太宗欲薄斂以富民而言樂在其中蓋近於樂民之樂矣貞觀之盛斗米三錢外户不閉行旅不齎糧民之樂其樂豈無所自哉唐代宗元年冬十月京兆尹第五琦言什一稅法民苦其重多流亡十一月甲子日南至赦改元悉停什一稅法臣若水通曰十畝稅一唐之法與古名同而實異也代宗始不知而誤行之及聞民苦其重多所流亡即赦停其法所謂勇於改過不失為愛民之主賴有此耳人君之於民其愁苦之聲可不聞哉德宗建中元年春正月丁卯朔赦天下始用楊炎議命黜陟使與觀察刺史約百姓丁産定等級改作兩稅法比來新舊徴科色目一切罷之二稅外輒率一錢者以枉法論唐初賦斂之法曰租庸調有田則有租有身則有庸有户則有調玄宗之末版籍浸壞多非其實及至德兵起所在賦斂迫趣取辦無復常凖賦斂之司增數而莫相統攝各隨意增科自立色目新故相仍不知紀極民富者丁多率為官為僧以免課役而貧者丁多無所伏匿故上户優而下户勞吏因緣蠶食旬輸月送不勝困弊率皆逃徙為浮户其土著百無四五至是炎建議作兩稅法先計州縣每嵗所應費用及上供之數而賦於人量出以制入户無主客以見居為簿人無丁中以貧富為差為行商者在所州縣稅三十之一使與居者均無僥利居人之稅秋夏兩徴之其租庸調雜徭悉省皆總統於度支上用其言因赦令行之臣若水通曰唐初租庸調之法雖不及三代然亦取之有制民未稱病也楊炎乃倡為兩稅之議德宗用之以赦天下悉除新舊征科色目孰不以為寬也殊不知法愈煩而病民終不免於流弊然則人君其可以畜聚斂之臣亂舊章以誤國家哉建中二年五月淮南節度使陳少逰奏本道稅錢每千請增二百五月詔他道皆如淮南又鹽每斗價皆增百錢十一月加少逰同平章事臣若水通曰大學云長國家而務財用者必自小人矣孟子曰長君之惡其罪小逢君之惡其罪大德宗好利之心非楊炎諸羣小從諛之耶是時已稅商錢括富商僦質而少遊者請增稅錢非所謂逢君之惡而長之耶繼是而往稅架間陌錢無虛日而四方解體亂臣乘之而逆節矣向使帝能節用愛人於平時則固不致興兵而侈用矣若非唐命未改而諸將死綏瓊林大盈之積其不為巨橋鹿臺也哉為人君者所宜戒也德宗貞元四年九月庚申元友直句檢諸道稅外物悉輸户部遂為定制嵗於稅外輸百餘萬緡斛民不堪命諸道多自訴於上上意窹詔今年已入在官者輸京師未入者悉以與民明年以後悉免之於是東南之民復安其業臣若水通曰友直之為句檢使以諸道稅外之緡輸京師此小人以利逢德宗之欲者也民不堪命邦本將蹙矣李泌為相宜斥友直之非而止德宗之欲也乃無一言由是而推之乃其前日受淮南二十萬之運悉輸之大盈者啓之是泌欲為德宗豐其私財而不知斂天下之怨也及諸道自訴而上始免未入之稅吁亦晚矣故司馬光曰李泌欲弭德宗之欲而豐其私財是欲啓其門而禁其出也嗚呼孰謂李泌之賢而有此邪德宗貞元十三年十二月先是宫中市物令官吏主之隨給其直此嵗以宦者為使謂之宫市抑買人物稍不如本估其後不復行文書置白望數百人於兩市及要閙坊曲閲人所賣物但稱宫市則斂手付與真偽不復可辨而敢問所從來及論價之高下者率用直數百錢買人直數千物多以紅紫染故衣敗繒尺寸裂而給之仍索進奉門户及腳價錢人將物詣市至有空手而歸者名為宫市其實奪之商賈有良貨皆深匿之每勑使出雖沽漿賣餅者轍棄閉門諫官御史數奏諫不聽徐州節度使張建封入朝具奏之帝頗嘉納以問工部侍郎判度支蘇辨辨希宦者意對曰京師遊手萬家無土著生業仰宫市取給帝信之故凡言宫市者皆不聽臣若水通曰易稱何以守位曰仁何以聚人曰財故聚人之道必在於理財而理財之道必在於仁而後可安其位也德宗嗜利其稅於民極矣又為宫市索進奉取腳錢以困商民民將何極邪言官諫之而不聽及張建封具奏帝嘉納若有感悟之幾矣蘇辨黨宦寺而詭言以沮焉由是斂愈急人愈散而位愈危以至奔走郊原求食不得餉絶命危得韓滉一餽而以得生為賀向之所暴斂果安在也徒足以為君人者之戒耳唐穆宗長慶元年五月壬子鹽鐵使王播奏約𣙜茶額每百錢加稅五十右拾遺李珏等上疏以為𣙜茶近起貞元多事之際今天下無虞所宜寬橫斂之目而更增之百姓何時當得息肩不從臣若水通曰自𣙜酤之法一興而不已遂至於𣙜茶又不已遂至王播又奏於稅百錢之上而加五十焉民何以堪哉嗚呼民就窮而斂愈急穆宗之謂也此其所以再失河朔而不能復歟唐懿宗咸通元年五月壬申右拾遺供奉薛調上言以為兵興以來賦斂無度所在羣盜半是逃户固須翦滅亦可閔傷望敕州縣稅外毋得科率仍敕長吏嚴加紏察從之臣若水通曰自古盜賊之生起於賦斂之重及其為害也乃從而翦滅之不知兵愈繁而斂愈急斂愈急而盜愈滋滅於東而生於西奈之何不展轉以亡也薛調知盜賊起於賦斂無度請盡除橫暴之斂加賙恤之仁招叛亡之衆庶猶可以止也不知出此而但令州縣禁稅外之科率而已是猶放飯流啜而問無齒決也烏能大有濟哉後唐莊宗同光三年閏十二月帝以軍儲不足謀於羣臣豆盧革以下皆莫知為計吏部尚書李琪上疏以為古者量入以為出計農而發兵故雖有水旱之災而無匱乏之憂近代稅農以養兵未有農富給而兵不足農損瘠而兵豐飽者也今縱未能蠲省租稅茍除折納紐配之法農亦可以小休矣帝即敕有司如琪所言然竟不能行臣若水通曰兵以護國農以養兵故人君在薄斂以豐農農給而兵足矣此李琪探本之論也唐莊宗亂亡之事非一及軍儲不足乃謀於羣臣除折納紐配之法亦晚矣然又竟不能行其後甚至於豫借民稅以給軍至是豈復可為耶事機之往雖有善者亦無如之何矣謀國者盍亦謹之於其始哉後晉高祖天福五年秋九月辛未李嵩奏諸州倉糧於計帳之外所餘頗多上曰法外稅民罪同枉法倉吏特貸其死各痛懲之臣若水通曰上發以意則下承其事人君誠有薄斂愛民之心則臣下必不敢違其意以厚斂倉吏數外斂民上之意可知矣貸死抵罪徒空言何益乎賈誼新書曰衛懿公好鶴鶴有飾以文繡而乘軒者賦斂繁多而不顧其民翟冦遂入衛君奔死遂喪其國臣若水通曰衛君奔死喪國不在於奔亡之時而在於賦斂繁多之日賦斂繁多不在於賦斂之日而在好鶴乘軒之前書曰玩人喪德玩物喪志德志皆喪則重微物輕人民厚斂以供禽獸則民怨日生盜冦日至此亂亡之道也可不戒哉劉向説苑曰魯哀公問政於孔子對曰政有使民富且夀哀公曰何謂也孔子曰薄賦斂則民富無事則逺罪逺罪則民夀公曰若是則寡人貧矣孔子曰詩云愷悌君子民之父母未見子富而父母貧者也臣若水通曰欲富欲夀雖民之情而君之富夀亦於是乎在矣蓋君與民為一體相因者也民富且夀君豈有獨貧之理哉民貧且死君豈有獨富之理哉先王經土地而井牧其田野為之井邑邱甸縣都以任事而令貢賦即所以藏富於民也薄其稅斂則萬邦惟正之供亦猶子弟有餘而奉養於父母者無不足矣奚必箕會大盈竭四海而帑藏之然後謂之富哉此人君之所以長治久安祈天永命者在是夀孰有大於此者耶孔子之言萬世人君之龜鑑也不可不加之意焉宋仁宗皇祐五年十一月詔減畿內諸縣稅端明殿學士張方平言王畿賦斂之重詔開封府諸縣兩稅於元額減二分永為定式臣若水通曰畿內者天下根本之地諸縣所供視天下之州縣為尤繁故薄斂之政所宜先焉者也張方平此言可謂得矣然王者與天地同體以四海為家四海之民猶畿內之民也方平能知王道則必請行王政立什一中正之法由王畿以達之天下則博施濟衆而仁澤及於無窮矣惜乎其學不足以及此宋理宗景定元年五月蒙古左丞張文謙罷遂求出宣撫大名臨發語中書平章政事王文統曰民困日久况當大旱不量減稅賦何以慰來蘇之望文統曰上新即位國家經費止仰稅賦茍復減損何以供給文謙曰百姓足君孰與不足至任蠲常賦什之四商酒稅什之二臣若水通曰文統知在官之為富而不知在民之為富且無殃也後世之聚斂之臣欲為富國之計如文統者每每厚征于民殊不知民散則國雖富孰與守是富而有殃矣如紂之鹿臺巨橋唐德宗之瓊林大盈是也故薄斂者國賦雖損國富則益張文謙謂百姓足君孰與不足其善於謀國者矣若文統其文謙之罪人乎元世祖至元二十一年詔盧世榮行鈔法下御史中丞崔彧吏罷之世榮既入中書即日奉詔理鈔法之弊自謂其生財有法用其法當賦倍增而民不擾翰林學士董文用謂曰此錢取于右丞家耶將取之民耶取于右丞家則吾不知若取于民則有説矣牧羊者嵗當兩剪其毛今牧人日剪以獻主者固悅其得毛之多然羊無所避寒熱既死且盡毛又可得乎民財有限右丞將盡取之得無有日剪其毛之患乎世榮不能對臣若水通曰財出於民未有不擾民而賦倍增者也盧世榮理鈔法之弊自謂其生財有法用其法當賦倍增而民不擾嗚呼天下寧有是理哉以此欺人罔上何異于指鹿為馬者乎夫益上則必損下自然之理也乃謂賦增而民不擾豈天雨而鬼輸之耶文用以牧羊剪毛喻之宜世榮之無辭以對矣然謂之剪毛猶可後之斂民者猶并其膏血食之矣獻子曰與其有聚斂之臣寧有盜臣獻子所以惡聚斂之臣者以其剝民而必為之辭也吁世榮可謂聚斂之臣矣人君茍喜其能豐財而信任之則未有不耗國之元氣以亡者可不慎歟程氏遺書曰今之稅實輕於什一但斂之無法與不均耳臣若水通曰什一天下之中正也而云宋之稅反輕於此焉若賢於堯舜禹湯文武之制矣然民不受惠而無補於治亂之數者橫征多門一也轉輸數倍二也所過掊克三也有是三者則又倍於什一者不知其幾矣此名同而實異治亂之所以不倫乎為人君有愛民之心者其可務虛名而不行實惠哉橫渠張載曰野九一而助郊之外助也國中什一使自賦郊門之內通謂之國中田不井授故使什而自賦其一也臣若水通曰郊外都鄙之地也助藉其力也郊門之內鄉遂之地也自賦使民自賦乃古之貢法也古之聖人班爵有等而受祿皆因之以為差故財散於下不困民以自奉也是以十夫有溝八家同井耕則通力而作收則計畝而分上下各足職是故耳秦漢以來時君不知天地之財上下公共之義乃剝民奉巳爭為奢泰至於民貧國亡而不自知也其亦可哀也夫伏惟聖明酌古凖今逺宗三代之法則民富國足而自不必厚斂矣區區漢唐敝政何足言哉張栻云嵗受民租總賦者輒對糴以給軍先時民輸一以七合為羡其後並緣十倍之至是又欲以七升為額張棁曰作法於貪其弊將可窮邪力沮止之臣若水通曰糴以給軍舊法也變而為七合之羡又變而為十倍之征又變而為七升之額蓋人君有無窮之欲宜其無一定之制而奉承者由之而日滋也上下相殘亂安得不作耶此張梲所以力沮止之也雖然民者君之天也君不愛其民是自賊其天也不智孰大焉故人君雖貴於謀國之良又當慎於用人之善華陽范祖禹曰自井田廢而貧富不均後世未有能制民之産使之養生送死而無憾者也立法者未嘗不欲抑富而或益助之不知富者所以能兼并由貧者不能自立也貧者不能自立由上之賦斂重而力役繁為國者必曰財用不足故賦役不可以省盍亦反其本矣臣若水通曰井田廢則賦已煩賦已煩則民日貧也久矣賦役之困民恆由於財用之濫費范祖禹所謂本者在是矣為人君者誠能存心於天下加志於窮民崇儉黜奢量入為出則財恆足矣何必重賦而煩役哉若然上下貧富皆有其分均天下之道其在兹乎國朝洪武十二年十一月甲午朔上觀漢武帝紀顧謂翰林待制吳沈曰人君理財之道視國如家也一家之內父子不異貨其父經營儲積未有不為子計者父子如異貨家必隳矣君民猶父子也若惟損民以益君民衣食不給而君獨富豈有是理哉臣若水通曰伏觀皇祖感於漢武之紀以諭侍臣即有若百姓足君孰與不足百姓不足君孰與足之義也至於以天下為一家以君民猶父子則又有如保赤子之心也是心也天理之公也茍有公心何所不至雖博施濟衆亦由此心擴充之爾故由理國之財之心以為理民之財之心則民財足而國用足矣聖諭所謂一家父子不異貨其父經營儲積未有不為子計者是已故為子經營儲積而已財足矣此人人能公於家者之心人君能以之公於國則天下其有不平乎惜乎漢武不足以知此洪武十三年六月上謂户部臣曰曩者姦臣聚斂深為民害稅及天下纎悉之物朕甚恥焉自今如軍民嫁娶喪祭之物舟車絲布之類皆勿稅爾户部其榜示天下使其周知臣若水通曰孟獻子曰百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣甚言其聚斂之臣不可有也夫剝民之膏血以奉上怨將誰歸乎蹙邦本以供淫欲禍將誰咎乎我皇祖一念之仁視民如傷知聚斂之姦臣深為民害乃痛絶之以稅及天下之纎悉為恥即諭户部軍民嫁娶喪祭之物舟車絲布之類皆勿稅且榜示天下防其壅蔽而欲小民之受惠也仁心仁政之施此其急務也今日之民皇祖之民也今日纎悉之稅果如皇祖之勿稅乎惟聖明體察於心以擴充於政焉天下之民幸甚洪武二十年十二月辛未河間阜城驛馬户以孳生馬來進上曰馬户應役惟仰於馬然芻豆之給其費不輕故嘗命兵部榜諭凡驛馬孳生聽民畜賣今復有來進者豈朕言不信於民耶無乃有司奉行之不至其即還之臣若水通曰孟子云用其一而緩其二夫養馬之役亦賦之一事而尤勞費者也孳生上進亦不得已之義也聖祖之諭乃謂馬户應役惟仰於馬芻豆之給其費不輕誠體悉民隱之至矣遂命還之聽其畜賣至責有司奉行之過誠緩征恤民之至仁矣蓋馬進於君不見其益也養馬於民祗見其損也故損下益上則無所不損矣損上益下則無所不益矣仰惟聖明體聖祖之仁心知損益之大義保天命人心於無窮可焉洪武二十四年九月庚子詔建寧嵗貢上供茶聽茶户採進有司勿與敕天下産茶去處嵗貢皆有定額而建寧茶品為上其所進者必碾而揉之壓以銀板為大小龍圑上以重勞民力罷造龍團惟採茶芽以進其品有四曰探春先春次春紫筍置茶户五百免其徭役俾専事採植既而有司恐其後時嘗遣人督之茶户畏其逼迫往往納賂上聞之故有是命臣若水通曰孟子云賢君必恭儉取於民有制茶課之征民尤病焉至於茶造龍圑物小而費大也自唐以來用茶皆為末製片碾用而所謂龍團者茶末則蒸而碾合以諸香以為餅始於丁謂而成於蔡襄歐陽修曰君謨士人何至作此事蓋譏其啓無益之費也張詠鎮蜀見民植茶者令易之以桑恐其貽征斂之患於後也則茶課固已病民久矣皇祖於茶户乃免徭役罷造龍團實以厚民力又以防奢漸即大禹菲飲食之心而陋宋人之為矣人君天理之心體認之功一有不純則物欲得以乘之一欲之肆有以貽天下之害一身之奉有以費天下之財可不慎歟𢎞治十一年孝宗皇帝欽依問刑條例凡審編均徭從公查照嵗額差使於該年均徭人户丁糧有力之家止編本等差役不許分外加增餘剩銀兩貧難下户并逃亡之數聽其空間不許徴銀及額外濫設聽差等項料差違者聽撫按等官糾察問罪奏請改調容隱不舉各治以罪鎮守衙門不許干預均徭臣若水通曰古云寬一分民受一分之賜上有遺力則下有遺惠嵗額之役民力已不堪又增之以餘剩之銀而括及貧亡之户益之以額外之設其可支乎陸贄曰財者民之心黃庭堅曰民膏民脂喻之誠切矣夫刲其心食其膏而民不叛者未之有也我孝宗皇帝時使薄斂垂十八載深仁厚澤民不能忘伏惟聖明申明而嚴禁之民其少瘳乎格物通卷九十六
