body:
  text: 格物通卷十三明湛若水撰敬天上易益六二王用享于帝吉臣若水通曰六二以虛中受益虛者誠也祭祀以誠為享王者之享帝萬物本乎天也所以報本也虛中則齊一齊一則誠誠至則格矣黍稷非馨明德惟馨吉孰大焉故曰惟聖人為能享帝復象曰雷在地中復先王以至日閉關商旅不行后不省方臣若水通曰雷在地中一陽始復之時生生之機萬化之本也弗靜則弗養弗養則弗固先王順天道者也閉關於冬至之日使商旅不行后不巡狩也夫天人一氣也禁乎人而安靜以養乎天也養則固固則生物勃然矣仁者天地生物之心於人則為陽也人君致養於始發則發之沛然及於四海矣所以贊化育而配天者也敬天其至矣書虞書堯典乃命羲和欽若昊天歷象日月星辰敬授人時臣若水通曰此乃史臣記帝堯敬天勤民之政也羲氏和氏主歷象授時之官也若順也昊天廣大之天厯是紀數之書象是觀天之器如璣衡之屬是也日陽精一日而繞地一周月隂精一月而與日一會星者二十八宿衆星為經金木水火土五星為緯皆是也辰以日月所會分周天之度為十二次也人時謂耕穫之候凡民事早晚之所關也夫在天成象在人為時天象各有常度四時各有常運不得乖違人君代天理民者也非敬則不能順天度以厯象不順即不敬也不敬順乎天以厯象故隂陽不序而寒暑反易安能定四時以敬授乎民使知耕穫之候人事之序乎此堯放勳之治首汲汲於此故聖人先天而天弗違后天而奉天時始終一敬爾為人君者奉天理民可不敬乎舜典肆類于上帝禋于六宗望于山川遍于羣神臣若水通曰此乃帝舜於受終觀象之後即祭祀上下神祗所以致誠敬也肆遂也類禋望皆祭名非常祀而祭告於天其禮依郊祀為之故曰類上帝天神也禋精意以享之謂宗尊也所尊祭者其祀有六謂祭時祭寒暑祭日祭月祭星祭水旱是也山川名山大川五嶽四瀆之屬望而祭之故曰望遍周遍也羣神謂丘陵墳衍古昔聖賢之類是也人君為天地百神之主故舜於受終觀象之後即祭祀上下神祗乃攝位之始事也類禋望遍其為祭之名不同而所以感格之者不越乎此心之誠敬而已人君祭天地百神可不致其誠敬乎詩大雅板敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾遊衍臣若水通曰序以此為凡伯刺厲王之詩渝變也王往也言出而有所往也旦亦明也及爾出王言無所往而不與天俱也及爾遊衍言無一遊息而不與天俱也程皓曰天人一也更不分别故人性情形體皆天也喘息呼吸皆天也飲食起居命討典禮皆天也故此詩語敬天曰昊天曰明及爾出王昊天曰旦及爾遊衍豈人之外别有所謂天者哉曰及爾出王遊衍則我之出王遊衍者皆天之所為也天與人其氣一也其心一也其理一也茍動靜食息心有不敬焉是不敬天矣人而至於不敬天是得罪於天也可不畏哉周頌敬之敬之天維顯思命不易哉無曰髙髙在上陟降厥士日監在兹臣若水通曰此成王受羣臣之戒而述其戒之之辭蓋羣臣之意欲王持敬以保天命也敬者主一之謂中庸所謂戒慎恐懼也即天理也言天理至為顯著人君當敬之以顧諟天之明命也思語辭也不易言難保也士事也存天理則天命眷之失天理則天命去之其去就豫奪之幾無常而難保也是以人君與天其勢雖若懸絶然事之隱顯大細逺邇天無不陟降而日監視之人君當無一念而不敬以合乎天理則天命歸之矣然則吾心即天也有天下者烏可謂天為髙逺忽而不敬乎於戲天人一理也伏惟聖明凝神於斯則敬立而天命自永矣春秋隱公三年春王二月己巳日有食之臣若水通曰胡安國曰經書日食三十六行有常度然每食必書示後世遇災而懼之意也臣謂日者衆陽之宗人君之象也食則以隂乘陽君德蒙蔽之象故書之將以警懼乎君也為人君者果能欽若昊天用慎厥身凡權臣之竊柄內寵之扇惑隂崖寒谷之隱情不得聞於上者悉旁燭無疆則更化善治萬邦惟慶亦猶日之晦而復明也故曰君子之過如日月之食焉其更也人皆仰之莊公十一年秋宋大水臣若水通曰左傳秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎既而聞之曰公子御説之辭也臧孫逹曰是宜為君有恤民之心臣謂萬物本乎天地人君者天地人物之宗也敬天者人君之所以事天也宋公感淫雨之變以不能敬事天地為罪引咎責躬其亦可謂賢矣文公十五年齊侯侵我西鄙遂伐曹入其郛臣若水通曰左傳齊侯侵我西鄙謂諸侯不能救也遂伐曹入其郛討其來朝魯也季文子曰齊侯其不免乎已則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣臣謂天者理而已矣大之字小小之事大順天之所為理而已矣故湯事葛文王事昆夷齊魯鄰國也懿公不能修殷聘世朝之禮又怒曹而伐之是棄天褻天矣棄天我之罪也褻天亦我之罪也不棄不褻而畏天樂天固保國保天下者之責也成公五年梁山崩臣若水通曰梁山者韓國之鎮天下之具瞻也崩者紀綱淪替法度廢弛之象匪天之警乎一國也將以警乎天下也天將以警乎天下御天下者因之而自警若成湯六事自責髙宗克正厥事宣王側身修行使三綱不至於淪九法不至於斁則梁山之崩不能為國家之災矣當時君臣無畏天之心不知出此惜乎禮記月令曰日長至隂陽爭死生分君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節嗜欲定心氣百官靜事無刑以定晏隂之所成又曰日短至隂陽爭諸生蕩君子齊戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待隂陽之所定臣若水通曰靜事無刑者不以隂助隂也定猶順也夫天人一也人之氣天之氣也故隂陽消長之際君子必謹於身謹於身所以事天也吾身即天也仲夏日長極矣陽盡午中隂眇重淵故爭焉於是乎陽死而隂生矣是以君子齋戒有五事焉所以調陽躁而備隂疾也仲冬日短極矣隂往而陽來之交也故爭焉於是乎萬物之生機動矣是以君子齋戒有五事焉易所謂先王以至日閉關養微陽也文言曰後天而奉天時此之謂也郊特牲曰器用陶匏以象天地之性也又曰祭之日王被衮以象天臣若水通曰人君事天莫大乎郊是故聖人之制郊也有質以示內心之敬有文以示外心之勤器用陶匏以象天地之性者所以尚質也祭之日被衮以象天者所以尚文也聖人之心一而已矣何有內外之别蓋質以示內天之性也文以示外天之象也其實一也故事天者因丘以壇掃地以位藁秸以席素車以乘皆以廣內心之質也鎮圭以執繅藉以采旗龍以章黃鍾以鈞皆以廣外心之文也故曰事天者內外合一情文兼備然後敬天之事畢矣玉藻曰若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐臣若水通曰君子之事天如子之事父母父母怒而不畏者非孝子也天怒而不畏者非仁人也故疾風迅雷甚雨者天之怒也晝則必變其容貌夜則必興而衣冠所以致敬也昔者舜於大麓烈風雷雨弗迷孔子於迅雷風烈必變以其敬心存也後之人君欲事天者必以存心為本祭法燔柴加牲玉于上欲氣通于天於泰壇即圓丘祭天也瘞埋於埋牲幣也太圻即方丘祭地也用騂犢句埋少牢羊豕於太昭壇名祭時也相近當作祈禳於坎壇祭寒暑也王宫壇名祭日也夜明祭月之坎祭月也幽宗星之隱也祭星也雩宗求雨之處祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之臣若水通曰祭法此言祭天地六宗山川羣神之禮敬天之道也何以為敬天也凡地之所載皆天也是故祭天而燔尚升陽也祭地而瘞尚降隂也然而天地之祀正矣四時不忒則于太昭寒暑不時則于坎壇王者日之象也祭日于王宫夜明月之坎也祭月于夜明幽宗之隱以祭星也雩宗之禱以祭水旱也然而六宗之祀正矣祭四方則于坎壇以至山林川谷丘陵所謂百神者天子皆得祭之諸侯在其地則祭之然而山川羣神之祀正矣若此者皆天也氣之所貫無一而非天也敬也者通乎天地而無不貫者也是故敬則誠誠則郊而天神格廟而人鬼享而敬天之事盡矣伏惟聖明為天地神人之主惟聖教日躋以盡事天之道則保佑命之自天申之於無疆矣祭義唯聖人為能饗帝臣若水通曰饗帝謂祭天也天人一理也聖人之誠純亦不己與天一也與天一故不違不違故感之而能應記曰祭則受福又曰郊則天神格匪夫神之格也精誠之極也後之人君欲事天者可不素養其誠敬乎孔子間居天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私臣若水通曰易曰大人者與天地合其德與日月合其明言其公也聖人公天下之心故與之合是故三王之治天下者亦惟奉若天道而已蓋以其至公無私之心發而為兼臨溥照之德而萬物得所故三光全寒暑時天地位萬物育矣後之有志于三王之治者盍于兹乎法焉表記子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私褻事上帝臣若水通曰人君無時而非事天也郊社祭祀特其事之顯著者爾是故三王之祀天地其心足以有享矣而猶不敢不卜日焉言無一而不稟之於天地神明而不敢以己私主之也不敢褻也不敢也者不敢也敬天之至也雖然後之人君之於天匪徒卜日之為敬也當無時而不敬則無時而非事天然後謂之敬天焉表記曰天子親耕粢盛秬鬯以事上帝臣若水通曰粢盛謂黍稷也秬者一稃二米和氣所生者鬯鬱金香草以秬鬯作酒以祭也以天子之尊耕非無人也而必親耕者以力養也夫天子者天之宗子也天子之事天猶子之養父母也舜曰我竭力耕田以養父母知人子以力養親之道則知天子親耕之義乃敬天之至者也惟聖明其留神焉周禮地官救日月則詔王鼓臣若水通曰日月天之精也天人一體欣戚相通者也日月薄蝕天之大變如痛之切身人君於此能不動心乎故詔告之者欲其恐懼修省親伐鼓以救之所以致敬於天也孟子曰以大事小者樂天者也以小事大者畏天者也樂天者保天下畏天者保其國臣若水通曰天者理而已矣大事小小事大皆天之所為乃天理也仁智之樂天畏天雖有保國保天下之殊然而一於敬天矣詩曰敬天之怒無敢戲豫敬天之渝無敢馳驅此為人君者所宜三復以養之於素也左傳僖公三十一年夏四月四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也臣若水通曰四卜凡四卜也不從不吉也免牲不郊也望謂祭山川也魯之郊也其非禮矣牲成而卜郊又非禮也四卜不從而後止之又非禮也不郊而猶三望又非禮也是之謂瀆故瀆禮斯瀆天矣宜春秋書之以為人君事天之戒也格物通卷十三
