body:
  text: 格物通卷七十六明湛若水撰修虞衡上貢賦附易繫辭傳作結繩而為網罟以佃以漁蓋取諸離臣若水通曰此是聖人制網罟之器以為佃漁取離卦之象也作者創始之名網以取獸曰佃罟以取魚曰漁網罟興於伏羲佃於山以取禽獸漁於澤以取魚鱉取諸離離者麗也二卦相麗又二火相麗又六爻一隂一陽皆有兩目相承為網罟而物麗之之象也蓋愛物者聖人之仁而不能不取之者義也為祭祀為賔客為充庖而不取者非義也竭山澤而盡取之者非仁也禁其利而不與民同者非仁非義也故文王之囿民以為小子釣不綱弋不射宿聖人取物之義愛物之仁同物之公盡之矣書虞書舜典帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞臣若水通曰此帝舜修虞衡之初政也疇誰也若順也上下謂山林澤藪也虞者掌山澤之官周禮分為虞衡屬於地官帝舜言誰能順我山林澤藪草木鳥獸之性取之以時用之以節使各遂其生各得其所者而用之乎在朝衆臣同舉伯益帝舜乃然其舉呼益而命之曰汝作朕之虞官也夫聖人所以育萬物理隂陽足財用莫重於虞衡之官宋大儒程皓上王道劄子於朝亦必以此職為要務後之虞衡之官雖設而其任太輕豈帝王為治之意乎詩國風騶虞彼茁者葭一發五豝于嗟乎騶虞彼茁者蓬一發五豵于嗟乎騶虞臣若水通曰此詩人美南國諸侯被文王之化仁澤及於物而見王道之成也茁生出壯盛之貌葭蘆也亦名葦發發矢也豝牡豕也一發五豝猶言中必疊雙也蓬草名一歲曰豵亦小豕也于作吁歎美之辭也騶虞獸名白虎黑文不食生物不履生草仁獸也南國諸侯承文王之化修身齊家以治其國而其仁民之餘恩又有以及於庶類故其春田之際曰葭曰蓬生出壯盛則草木茂矣曰豝曰豵一矢得五則禽獸多矣夫草木之茂非自茂也禽獸之多非自多也蓋由諸侯仁民之餘恩有以及之故茂且多爾詩人既述其事以美之且嘆之曰騶虞仁獸也諸侯仁心自然不由勉強是真所謂騶虞矣夫文王之化能使諸侯仁澤及物其廣如此蓋意誠心正之功不息而久自有所不能已者豈智力之私所能及哉是則草木鳥獸虞衡之事也虞衡之修先王愛物之仁盡物之性而贊天地之化育者也君天下者可不務邪春秋桓公七年春二月己亥焚咸丘臣若水通曰咸丘魯地焚咸丘者焚林而田也夫先王盛時山林川澤皆有厲禁而撙莭愛養之意寓焉故易稱王用三驅在禮天子不合圍諸侯不掩群皆愛物之仁也推此心以及物所以鳥獸若草木蕃矣春秋之時王政不行聖學不明仁民愛物之道息而淫獵之事興矣禮記王制曰凡居民材必因天地寒暖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜修其教不易其俗齊其政不易其宜臣若水通曰此聖王仁民愛物之政盡人物之性者也居材者生養儲積其材用也秋冬為寒春夏為暖上原為燥下澤為濕廣谷大川乃材用之所出也異制所謂順天時以興地利也其愛物之仁如此民生其間異俗異齊異和異制異宜謂其性情食味器械衣服因山川分氣而俗尚由之也教者三綱五典也俗者如上數事之異也政者禮樂刑政也俗雖不同而同於政教之道夫不同者人也其所同者天也故聖人之政不責同於人而求同於天天也者性之本也其仁民之政又如此王制曰獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田不麛不卵不殺胎不夭夭不覆巢臣若水通曰此王者順時漁獵所以廣仁也蓋物生有時春夏生長之時也於此時而山澤無檢制焉則天地之生意遏矣其何仁之有故先王立山澤之官而重為之防於十月之中獺得魚將食而祭天則魚長大矣然後得使漁人入澤梁以取魚焉於九月十月之交豺得獸將食而祭天則獸壯長矣然後使得以田獵而取獸焉八月之時鳩化為鷹禽鳥之長也然後得以設罻羅以取禽鳥焉十月之時草木零落則生意歸根矣天地之氣肅殺矣然後斧斤得以入山林而取材木焉故春夏生長之時昆蟲未藏蟄則不以火而田恐傷昆蟲也鹿麛之小鳥之卵獸之孕胎者夭稚者巢將育者皆禁之不取不殺不夭不覆焉可見先王漁獵之制順天之時因地之利仁之至義之盡也此所以鳥獸草木昆蟲無不咸若後世乃有竭澤而漁焚林而狩者曽是以為仁義乎曽子曰草木以時伐焉鳥獸以時殺焉短一樹殺一獸不以其時非孝也人君為天之子其念之哉月令曰是月也樹木方盛命虞人入山行木毋有斬伐臣若水通曰此季夏之令也季夏樹木方盛王者命山虞之官而巡行之所以禁其斬伐恐傷方盛之氣也孟子論王道曰斧斤以時入山林材木不可勝用也然則虞衡之修非其所當急者邪嗚呼王者之政山林有禁如此而後世之斬伐無時至於童其山而不恤者亦獨何哉月令曰乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨於下其有若此者行罪無赦臣若水通曰此孟冬之令也水虞漁師者澤衡之吏漁師善取魚者也賦者稅也收賦以正也戒侵削防濫取而使天子取怨於百姓兆民又言有犯者加罪無赦也月令曰山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦臣若水通曰此仲冬之令也𬞞食野菜也野虞虞人小吏也教道者教訓引導以取之之方法也仲冬之時開山澤之禁故以此時教道之也所以教民共利聖人之仁也戒其侵奪聖人之義也周禮大宰以九職任萬民一曰三農生九穀二曰園圃育草木三曰虞衡作山澤之材四曰藪牧養蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂疏材九曰間民無常職轉移執事臣若水通曰九職者民之職業也三農者山澤平地也九穀者黍稷稻粱秫菰麻麥豆也虞衡者掌山澤之官也藪者澤之無水處也牧牧地也八材者珠曰切象牙曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰析也商賈貨賄者行曰商坐曰賈金玉曰貨布帛曰賄也嬪者婦人之美稱也絲繭之已繅者枲麻之未緝者也臣妾者男女之賤者也疏材者百草根實之可食者也間民者非若八者之有常職也轉移執事若今之雇傭為工者也於此見先王之時無一職不得其養無一民不任其職者山澤之利修所以盡人物之性裁成天地之道輔相天地之宜其參贊之功用豈小也哉天官司會以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用臣若水通曰此周禮天官之職也下供於上曰貢貢之法有九曰祀貢曰嬪貢曰器貢曰幣貢曰財貢曰貨貢曰服貢曰斿貢曰物貢是也謂之致者使之自至而用者適於用而已上取於下曰賦賦之法亦有九曰邦中之賦曰四郊之賦曰邦甸之賦曰家削之賦曰邦縣之賦曰邦都之賦曰關市之賦曰山澤之賦曰幣餘之賦是也謂之田野除關市邦中幣餘之外而餘則取於田概言之也以至九功者即九職以任萬民者也而其目則曰三農生九穀曰園圃育草木曰虞衡作山澤之材曰藪澤畜鳥獸曰百工飭化八材曰商賈阜通貨賄曰嬪婦化治絲枲曰臣妾聚斂疏材曰間民無常職轉移執事之類是也又有九式之法以用財而其目則曰祭祀之式曰賔客之式曰喪荒之式曰羞服之式曰工事之式曰幣帛之式曰芻秣之式曰匪頒之式曰好用之式是也謂之均者即量入為出之謂也由前貢賦功三者論之則先王取財之法可見由後九式之用論之則先王用財之法亦可知也所以著為一定之式而太宰皆得與聞者誠以財之出於民也有限而用之費於上也無窮而况人主侈心一生極天下之奉而不足以供其欲先王獨見於此創法立制匪徒為太平之美觀而已為可繼也詩曰有典有則以貽子孫其斯之謂歟地官山虞掌山林之政令物為之厲而為之守禁仲冬斬陽木仲夏斬隂木凡服耜斬季材以時入之臣若水通曰此周禮地官之職也虞衡掌山林澤藪之官也其職則每物先别其類厲以限之而後設其人以守之又設其法以禁之是故陽木有生意者而斬之時必以仲冬欲其堅也隂木枯木無生意者而斬之時必以仲夏蓋急於用不拘時禁也服車材也耜農器也季稚也服耜用季材者尚其柔韌之性也斬木必以時者恐其物之竭也即所謂先王以茂對時育萬物聖人之仁及於草木也地官川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之祭祀賔客共川奠臣若水通曰此周禮地官之職也川衡之官所以掌川澤者也流水曰川鍾水曰澤平其守者平其所出之物舍其守者按其所守之舍犯其禁令者又從而誅罰之則人有所懲於前而警於後矣然川澤之物果何所用哉將以供祭祀賔客之需也川奠謂籩豆之實魚鱐蜃蛤之屬也觀此可見先王制法非以專於自奉而已一為祭祀一為賔客此奉宗廟和神人之大事也取之以義不亦可見哉山師掌山林之名辨其物與其利害而頒之於邦國使致其珍異之物川師掌川澤之名辨其物與其利害而頒之於邦國使致其珍異之物臣若水通曰名者山林川澤之名也物謂其所産者也利害者物之可用及其毒惡螫噬者也珍異之物若岱畎絲枲嶧陽孤桐則自山林而致之者也泗濵浮磬淮夷蠙珠則自川澤而致之者也聖王非貴異物供耳目玩好而已所以備禮樂之用因地而貢不責有於無也仁義兼得之矣論語子曰因民之所利而利之斯不亦惠而不費乎臣若水通曰此孔子因子張之問從政而告之以此利者天地自然之利而民利之為服食器用以生者也導以利其利者人君之惠也利生於天地而力勤於民及其惠也以歸於君何也順天之時因地之利撙節愛養以左右民使遂其生者則在乎君也易曰弗損益之其人君生財之道乎孟子曰數罟不入汙池魚鱉不可勝食也斧斤以時入山林材木不可勝用也臣若水通曰此孟子因梁惠王行小惠欲望民之多於鄰國故舉王道之事以告之也蓋王道以得民心為本也欲得民心者亦惟因天地自然之利而撙節愛養之爾數密也數罟者取魚密網也汙窊下之地水所聚也斧斤者伐木之器也山林者材木所出之處也數罟不入汙池者澤梁之處必有厲禁網罟必用四寸之目非四寸之網不得入聚水之汙池魚不滿尺市不得粥人不得食則不至盡汙池而取之而魚鱉之多用之不竭矣時謂草木黃落之時春則材木勾萌夏則暢茂茍旦旦而伐之則生長之意息矣亦必設為厲禁必草木黃落然後斧斤入山林以採伐為宫室為器械之用則不至盡拱把而伐之而材木之積取之無窮矣夫如是則養生喪死皆有所備而無不足之憾而民心得矣王道不於此而基乎惜夫惠王蔽錮日深聖學不講徒知移民移粟之小而不知有王道之大使孟軻王道之事徒託諸空言也噫孟子曰澤梁無禁臣若水通曰此文王治岐仁政之一而孟子舉之以告齊宣王者也澤者瀦水之處梁者絶澤而畜魚者也澤梁之利天之生物以利斯民者也文王不為之禁取魚鱉者往焉取螺蛤者往焉因民之所利而利之也先王於山林川澤之利皆有禁然所禁者時爾非禁民之利也此獨言澤梁者舉一以互見之爾王道以得民心為本文王行之其即王道之始而為三分有二之本乎噫以四十里之囿而為阱於國中他可知也已齊宣曷足以語此哉左傳昭公二十年齊侯疥遂痁期而不瘳梁丘據與裔款言於公曰君盍誅於祝固史嚚以辭賔公説告晏子對曰不可為也山林之木衡鹿守之藪之薪蒸虞候守之暴征其私淫樂不違民人苦病夫婦皆詛祝有益也詛亦有損君若欲誅於祝史修德而後可公説使有司寬政毁關去禁薄斂已責臣若水通曰疥當作痎痁謂因痎變為􅒻疾也梁丘據裔款齊嬖大夫也衡鹿官名粗曰薪細曰蒸虞候亦官名毁關謂毁逼介之關也夫先王虞衡之官以為山林川澤也其利廣矣而晏子若以為不可而告其君者何也蓋虞衡可也守之而弗與民公共不可也自夫官為之守也始有殺其麋鹿與殺人同罪者矣壅其利也而民怨之孰若文王之囿與民共之而民樂其樂乎當是時非無虞衡之官也為之厲禁而已利不專於上而公於民理財之大道也晏子非知王道者也一言而悟景公毁關去禁薄斂已責先王之遺法復見其利也不亦慱乎國語周語單子曰虞人入材甸人積薪臣若水通曰虞人掌山澤之官也甸人掌田賦芻草之事者夫位事建官所以制周故周之秩官奠厥攸司而虞衡之利興焉罘山網澤各供其材凡祭祀賔客於此焉需惟正之供備而無缺神人上下咸以懷協財之用大矣為人君者可不愛天地自然之利以制國用哉齊語管子曰山澤各致其時則民不茍臣若水通曰時謂虞衡之官禁令各順其時則民之心不茍得也夫先王之制草木零落然後斧斤入山林獺祭魚然後漁人入澤梁所以撙節愛養天地自然之利以富國足民也人君治天下有志於先王之治者可不修復之哉格物通卷七十六
