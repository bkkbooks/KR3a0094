body:
  text: 格物通卷八十明湛若水撰抑浮末下禁淫巧奢侈附賈誼新書曰民棄完堅而務雕鏤纎巧以相競髙作之宜一日今十日不輕能成用一嵗今半嵗而弊不耕而多食農人之食是天下之所以困窮而不足也故以末與民民大貧以本與民民大富臣若水通曰耕桑者本也工巧者末也本末之勢相趨而日相逺是故知有耕桑則不知有工巧矣知有工巧則不知有耕桑矣一夫耕之百夫食之一婦蠶之百人衣之豈有不窮以亂乎不耕不蠶危亂立至故抑末則財足財足則民從善而天下平矣劉向説苑李克曰上不禁技巧則國貧民侈國貧窮者為姦邪而富足者為淫泆則驅民而為邪也民以為邪因以法隨誅之不赦則是為民設陷也臣若水通曰舜至質故貴陶禹卑宫室故尊匠湯疾禮樂之壞而尊梓武王疾上下失其服飾而尊輿古之聖帝明王未有不以儉為天下倡者後世之君不知反朴而民偽日滋姦邪淫泆寧能免哉及陷於罪從而誅之是罔民也豈仁人之所為邪然則人君欲禁之有道矣在以身先之耳韓愈錢重物輕狀曰臣愚以為錢重物輕救之之法有四一日在物土貢夫五穀布帛農人之所能出也工人之所能為也人不能鑄錢而使之賣布帛榖米以輸錢於官是以物愈賤而錢愈貴也今使出布之鄉租賦悉以布出綿絲百貨之鄉租賦悉以綿絲百貨去京百里悉出草三百里以粟五百里之內及河渭可漕入願以草粟租賦悉以聽之則人益農錢益輕穀米布帛益重二曰在塞其隙無使之泄禁人無得以銅為器皿禁鑄銅為浮屠佛像鐘磬者蓄銅過若千斤者鑄錢以為他物者皆罪死不赦禁錢不得出五嶺買賣一以銀盜以錢出嶺及違令以買賣者皆坐死五嶺舊錢聽人載出如此則錢必輕矣三曰更其文貴之使一當五而新舊兼用之凡鑄錢千其費亦千今鑄一而得五是費錢千而得錢五千可立多也四日扶其病使法必立凡法始立必有病今使人各輸其土物以為租賦則州縣無見錢州縣無見錢而榖米布帛未重則用不足而官吏之祿俸月減其舊三之一各置鑄錢使新錢一當五者以給之輕重平乃止四法用錢必輕穀米布帛必重百姓必均矣臣若水通曰此狀韓愈之所以獻之於朝廷者也其何以錢重物輕為議蓋五穀布帛非可與錢比而錢顧有以重之是乃率其本輕者而易夫至重則宜乎天下不能生活而生理為之窮絶也况夫布帛穀米之在天下猶夫水火不可一朝而無而錢之為用所以為此而設也今使之賣布帛穀米以輸錢於官是物何賤而錢何貴也故韓愈之意寧以彼易此而不欲以此易彼也所以拳拳曰出布之鄉租賦悉以布出綿絲百貨之鄉租賦悉以綿絲百貨以至欲人無得以銅為器皿為浮屠佛像鍾磬等物而又嚴以死刑之令至於更其文以一當五去其弊而使法必立所以主張乎錢不得以重而穀米布帛不得以輕也其抑末崇本之意至切矣我國朝貴五榖而賤金玉百姓誠蒙夫樂利之休也韓愈之説於是乎有驗焉宋仁宗天聖元年春正月立計置司時承平既久兵籍益廣吏員益衆佛老冦敵蠧耗中國百姓縱侈而上下困於財三司使李咨請省浮費鹽鐵判官俞獻卿亦言天下穀帛日耗稻苗未生而和糴桑葉未吐而和買自天禧以來日甚一日宜與大臣議救正之上納其言乃立計置司以張士遜吕夷簡魯宗道領之臣若水通曰明王制民之産百畝之田勿奪其時五畝之宅樹之以桑而又飲食衣服宫室器用各有檢制不得僣越蓋重本抑末之道也後世以侈靡相尚賤五穀而貴金玉風俗日偷民生日困坐此弊耳李咨俞獻卿建省浮費救正之論此計置司之所以立也向使因二子之言一修先王之制則禮有定則用有常經浮費自省流弊不救而自正矣何憂乎縱侈遂末哉宋徽宗宣和三年正月童貫承詔罷蘇杭應奉局花石綱初帝以東南之事付童貫且日如有急即以御筆行貫至吳見民困花石之擾衆言賊不亟平坐此耳貫即命其僚董耘作手詔罪己罷諸應奉造作局及御前花石綱運并木石彩色等場務而帝亦黜朱勔父子弟姪之在職者吳民大悅臣若水通曰書云不作無益害有益功乃成不貴異物賤用物民乃足此帝王恭儉之實德也花石綱者徒以供玩好非所謂異物而無益者邪應奉之局一開則奔走承順於道路者日亦不足勞民傷財欲民之足難矣罷之誠是也獨惜徽宗不以詢諸大臣而以御筆付之童貫反啓宦侍矯詔之漸耳雖然徽宗此舉非特無實德亦非實心也特以方臘縱于內金遼迫于外上下矯飾於一時徒以鎮服人心耳不然何正月罷應奉局五月方臘就平即從王黼之請而復之則矯偽之事豈可久哉孟子曰侮奪人之君惡得為恭儉恭儉豈可以聲音笑貌為哉是故恭儉實德也未有無實心而可以為實德者亦未有無實德而能禁淫巧者後之人君欲抑末崇本則盍求其道矣元成宗大德九年八月賈胡獻寶珠西域賈人有獻珍寶求售者議以六十萬錠酬其直省臣有謂左丞尚文者曰此所謂押忽大珠也六十萬酬之不為過矣文問何所用之答曰含之可不渴尉面可使目有光文曰一人含之千萬人不渴則誠寶也若一寶止濟一人則用已微矣吾之所謂寶者米粟是也有之則百姓安無則天下亂以功用較之豈不踰於彼乎臣若水通曰書云不寶逺物則逺人格寶珠之獻賈人所以中人主之欲以窺中國也使以六十萬錠酬其直則不免為其所中而彼所以視中國亦輕矣則逺人之不服豈不由此乎夫民為國之寶粟帛為民之寶寶得其寶則所濟者博矣豈若以一寶濟一人者哉尚文之言亦可謂知所本矣雖然大學之教有財原於有土有土原於有人有人原於有德治天下之道莫要於修德矣元英宗至治元年正月罷元夕張燈于禁中帝欲以元夕張燈禁中為鼇山時張養浩以禮部尚書參議中書省事遂具疏因拜住以諫曰世祖臨御三十餘年每值元夕閭閻之間燈火亦禁况闕庭宫掖之嚴邃尤當戒慎今燈山之構所玩者小所繫者大所樂者淺所患者深帝大怒既而喜曰非張希孟不敢言即罷之賜養浩尚服金織幣以旌其直臣若水通曰闕庭宫掖所以風示天下之地而人主一身又天下臣民之主也茍於禁中為鼇山張燈之戲而欲禁閭閻之燈火亦難矣茍一人為侈靡之倡而欲萬民為質朴之俗亦難矣此張養浩所以有玩小繫大樂淺患深之諫也英宗始而怒繼而喜罷其事而旌之亦可謂勇于悔過善于納諫者矣雖然人君與其能改過不若無過之可改與其能納諫不若無失之可諫其要在謹獨循天理以遏人欲矣伏惟聖明留神焉元順帝至元三年二月定服色器皿輿馬之制時服飾上下無别帝初禁民間服麒麟鸞鳳白兔靈芝雙角五爪龍八龍九龍萬壽字赭黃等服至是復詔定其制尋禁倡優盛服及戴笠乘馬臣若水通曰先王之治天下必議禮制度服色器皿輿馬之制皆有等威非徒為觀美也蓋以一乎民之心而禁其淫侈也夫禮莫大乎分分莫大乎名此而不謹則倡優后飾庶人帝服而異政殊俗僣亂之所由起矣故孔子為政必以正名為先而繁纓之微猶必惜之凡以名器之不可假人耳人主深居九重之上豈能家察而人禁之惟定其制度躬儉朴以為天下先則無惡無射庶幾可以永終譽矣宋儒程頤劄子有云古者四民各有常職而農者十居八九故衣食易給而民無所苦困今京師浮民數逾百萬遊手不可資度觀其窮蹙辛苦孤貧疾病變詐巧偽以自求生而常不足以生日益歲滋久將若何事已窮極非聖人能變而通之則無以免患豈可謂無可奈何而已哉此在酌古變今均多恤寡漸為之業以救之爾臣若水通曰務末機巧萬狀而恆不足者何也為無本也是故明君制民之産而使浮食遊手者各歸耕其土則人知務本矣人知務本則地之所出者無窮而人之所資者不竭然後家可足也父母斯民者其念之哉程皓曰村市酒肆要之蠧米麥聚間人妨農工致辭訟藏賊盜州縣極有害臣若水通曰沫邦淫酗酒誥乃作是故酒肆之設王政之所必禁也何也逐末者日滋致亂之道也喪德喪邦皆由於此可不戒哉是故欲五害之息必自嚴酒肆之禁而始矣長民者可不任其責耶潛室陳植曰秦自商君立法欲民務農力戰故重耕戰之賞以商賈務末不能耕戰故重為謫罰以抑之所以立致富強臣若水通曰商君立法欲民務農此古帝王之遺意也豈不可哉而事末者又有謫罰以抑之宜其立致富強也但以之為力戰之謀則開人主窮兵之端嚴刑督責之慘則去先王之道逺矣是又人主不可以不辨者張栻諭俗文云一訪聞鄉落愚民誘引他人妻室販賣他處謂之捲伴詞訟到官追治監錮押往尋覔緣此破蕩者前後非一不知懲戒其捲伴之人官司自合嚴行懲治外亦緣細民往往不務安業葺理農事多往南州興販逐錐刀之利動經年嵗不返鄉閭妻室無依以至為他人捲伴前去自今各仰依分安常營生自守保其家室無致招悔臣若水通曰逐末者所以趨利也至於妻子為他人所誘害孰大焉故曰求利未得而害己隨之然則人之大利莫如葺理農事而妻子相保以樂天性矣張栻諭俗之文及此可謂能以利害開其迷而導其明抑末務本之意至矣為人上求治理者取之為法焉可也國朝辛丑七月甲子太祖視事東閣時天熱坐久汗濕衣左右更衣以進皆經浣濯者參軍宋思顏曰臣見主公躬行節儉舊衣皆浣濯更進禹之惡衣服誠無以加矣真可以示法於子孫也臣恐主公今日如此而後或不然願始終如此太祖喜曰思顔之言甚善他人能言或惟及目前而不能及於久逺或能及其己然而不能及於將然今思顔見我能行於前而慮我不能行於後信能盡忠於我也乃賜之幣以彰其直復謂思顔曰汝在前朝頗有善譽為主者不能知汝及歸於我數進讜言斯固可嘉臣若水通曰聖人之恭儉必有為之本者非強制於外所能久也伏覩我太祖髙皇帝衣浣濯之衣而參軍宋思顔以為禹之惡衣服無以加而有始終之願可謂忠矣然未知太祖恭儉之心與禹之心一也此所謂本也故能始終如一耳不然何以喜其及於久逺而賜以彰之哉聖子神孫宜取法焉吳元年二月癸酉下令禁種糯田曰余自創業江右十有二年德薄才菲懼弗勝任但以軍國之需不免科徵于民而吾民效順樂於輸賦固為可喜然竭力畎畝所出有限而取之過重心甚憫焉故凡有益于民者必有行而又申告之曩以民間造酒破費米麥故行禁酒之令今春來麥稍平豫以為頗有益於民然不塞其源而欲遏其流不可也其令農民今嵗無得種糯以塞造酒之源欲使五榖豐積而價平吾民得所養以樂其生庶幾養民之實也臣若水通曰天之生物惟榖於人為最急不可一日無者是以自古善為治者莫不重穀而糜榖者莫過於酒也是酒者侈靡之端而禁糯者止酒之源也先王既設官以幾謹之又作誥以示戒之然未有能禁絶其源者也我皇祖敬天愛民充好生之實心為養民之實政重穀必先禁用酒禁酒必先止種糯則造酒之源塞而五榖之積豐國用由是以足邦本由是以固不煩酒誥之諄諄而自禁矣是令也其先王重本抑末之微意歟大抵夏禹以惡酒而興商受以􅒬酒而廢興廢係一念之微耳人君能體認於心則天理日明人欲日消用酒有節而榖不可勝食矣生財之道何以加此洪武十八年九月太祖諭戶部曰人皆言農桑衣食之本然棄本逐末鮮有救其弊者先王之世野無不耕之民室無不蠶之女水旱無虞飢寒不至自什一之制湮竒巧之技作而後農桑之業廢一農執耒而百家待食一女事織而百夫待衣欲人無貧得乎朕思足食在於禁末作足衣在於禁華靡爾宜申明天下四民各守其業不許遊食庶民之家不許衣錦繡庶幾可以絶其弊也臣若水通曰語有之衣食足而後禮義興衣食之於人也大矣食之不足者恆起於遊食之多而衣之不給者每由於奢侈之過此我太祖髙皇帝所以拳拳於禁末作華靡之令也足衣足食之道豈外是哉可謂慮民之深者也聖子神孫其則不逺矣伊尹之告太甲曰王懋乃德視乃烈祖無時豫怠敢舉以為今日聖明獻焉洪武二十三年五月癸巳朔以沈清為工部尚書誥曰昔聖人之世淳朴民俗敦厚宫室什器制不飾華故所司之工皆無異技竒巧然而功務雖簡其成也必精其廢也必當故一舉而無再為一廢而無再造所以民逸者多勞者少因是而官稱賢君稱聖後之人受職任事則不然矣凡臨事之際或務為淫巧以勞人或假公營私而害政所為如斯豈有福臻而愆消者也所以古人重其事而選用必在得人今朕設工部必法古制將以爾清為工部尚書當敬事信工無弊上下汝惟良哉臣若水通曰古之儉今之奢人心豈固相逺哉此無他理欲之分爾即其宫室什器而觀之土階茅茨之朴與瓊宫瑶臺之華同一宫室爾汙樽陶匏之質與象箸玉杯之竒巧同一什器爾理欲之萌其流不得不爾也夫工簡而器必精然財省而民逸矣工煩而器亦靡然財費而民勞矣實用之與虛飾何如哉皇祖之誥沈清深以淫巧為戒且責其敬事信工以追古尚實致君臣同有聖賢之美譽得用人理財之道矣是故儉者天理之所以存也奢者人欲之所以肆也是知崇儉去奢明君風化之本也沃心將順者大臣輔治之責也司天監進元主所製水精刻漏備極機巧中設二木偶人能按時自擊鉦鼓上覽之謂侍臣曰廢萬機之務而用心於此所謂作無益害有益也使移此心以治天下豈至滅亡命左右碎之臣若水通曰書云不作無益害有益功乃成不貴異物賤用物民乃足元主昧此而廢我皇祖達此而興興廢之間在一念儉侈之微爾夫更漏以審時刻固為政者之不可無也元主製以水精設以木偶能按時自擊鉦鼓則其異而無益傷功害民孰甚焉皇祖疾其用心之侈至命碎之其杜奢示朴之意至矣聖子神孫能致謹於心術之微而不役於耳目之好則功成民足永保丕緒而前元之侈靡徒為覆轍爾國朝稽古定制官民房屋墳塋碑碣服飾器用斟酌損益著為定制其在京功臣宅舍地寬者後留空地十丈傍留五丈若舊居窄隘左右前後皆軍民居止仍舊不許那移其京城官員之家往往窺覷近宅空地日侵月占圍作蔬園池塘甚妨軍民居住且泄地脈今後有多留空地者追出給還軍民庶民所居房舍不許用斗拱及綵色裝飾官員人等衣服帳幔並不許用玄黃紫色及龍鳳織紋臣若水通曰天地之間其所産有限故剝下則歸上損上則益下俗奢則財散民儉則財聚聚散損益者乘除之數也開國之初俗染元侈聖祖卑宫惡衣而以節儉化之不特禁令之頒而已今又治久俗靡駸駸乎華侈之風矣臣願聖明益加縞素以風天下幸甚國朝憲綱一斛斗稱尺照依原降式樣較勘相同官民通用仍將官降式樣常於街市懸挂聽令比較母容勢利之徒增減作弊欺詐小民一時估每月初旬取勘逐一覆實依期開報母致髙擡時估虧官損民臣若水通曰周禮有市官治市平物價息爭競賦里布征夫家所以抑逐末崇務本也是故謹權量定估值而民知所趨向矣格物通卷八十
