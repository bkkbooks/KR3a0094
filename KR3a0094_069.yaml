body:
  text: 格物通卷六十九明湛若水撰任相上易渙六四渙其羣元吉渙有丘匪夷所思臣若水通曰天下以一而治以渙而亂六四柔順居正之臣上承九五剛正之君道之同而任之專剛柔相濟以一天下之渙而羣之乖者合散者聚大善之吉也民歸於一統而無異志其聚若丘之大矣夫渙者天下之變也渙而濟者天下之功也有高天下之見而後成天下之功豈常人之思慮可及哉人君得斯人以爲之相天下有不足治矣書虞書舜典舜曰咨四岳有能奮庸熈帝之載使宅百揆亮采惠疇臣若水通曰此帝舜任大禹作相之言咨嗟也四岳一人而主四方諸侯之事者也奮起也熈廣也載事也亮明也惠順也疇類也舜言有能奮起事功以廣帝堯之事者使居百揆之位以明亮庶事而順成庻類也臣惟百揆乃唐虞之相職亮采惠疇即周官三公論道經邦爕理隂陽三孤貳公𢎞化寅亮天地也周分二職六人唐虞皆統於百揆我朝建官有三太三少其制最爲近古然三公或未能常與天子坐而論道三孤或不能與三公貳而𢎞化是以隂陽未盡爕和天地未盡位育耳仰惟聖明修唐虞盛典復祖宗故事時召公卿與之論道爕理以和隂陽以位天地以致祥瑞以消災變天下幸甚書商書咸有一徳任官惟賢才左右惟其人臣爲上爲徳爲下爲民其難其慎惟和惟一臣若水通曰此伊尹陳告太甲以用人之道也官百官也臣總百官大臣而言也賢有徳者也才有能者也左右者輔弼大臣也坐與天子論道爕理非碩徳重望不可故曰惟其人難者不輕易之意所謂進賢如不得已也慎者謹擇之意所謂真知灼見也旣得人而用之則又惟和而可否相濟惟一而始終如一以爲上則禆益君徳以爲下則惠愛兆民臣職所繫之重如此此所以當慎也人君欲成徳以下布於民者可不謹於用人乎商書說命爰立作相王置諸其左右命之曰朝夕納誨以輔台徳臣若水通曰此商高宗命傅說爲相之事也爰於也左右言常相親近也台我也史臣記高宗以夣得說之後審知其賢於是立之爲相又常置諸王之左右而親炙之蓋欲近其人以學也乃命之以朝夕納誨無時不進善言以輔其徳可謂知所本矣臣謂徳者吾心之理也人人同此心人人同此理况人君聰眀出衆者乎但爲衆欲之攻比之匪人故徳日壞若與善人居則或因事納忠或應時諫正所以涵養氣質薰陶徳性其功至大蓋人君天下之本而君心又人君之本君心正則萬幾不足理矣孟子曰人不足與適也政不足間也惟大人爲能格君心之非高宗命說納誨不曰規過而曰輔徳真所謂知所本哉說命官不及私昵惟其能爵罔及惡徳惟其賢臣若水通曰此傅說告高宗之言也官者六卿百執事也爵者公卿大夫也官非才能不能理故曰能爵非有徳無以稱故曰賢所用而惟賢惟能則治矣所用而私昵惡徳則亂矣是故治亂由人而生者也人君欲撥亂圖治者必審於用舎之際哉周書召誥今冲子嗣則無遺夀耉曰其稽我古人之徳矧曰其有能稽謀自天臣若水通曰此召公告成王崇信老臣之言也冲幼冲也嗣者繼位也遺忘棄也夀耉老成之臣也稽考也矧况也幼冲之主於老成之臣尤易踈逺故召公言今王以幼冲嗣位不可遺棄老成輔相之臣所以然者蓋言其老成能稽考古人之徳蓋自堯傳之舜舜傳之禹禹傳之湯湯傳之文武皆是一徳老臣能知之是固不可遺也况言其能稽謀自天蓋人與天一也老臣得天之理故謀合天之心知天之所爲是尤不可遺矣無遺壽耉蓋君天下之要務後之人君欲稽古敬天可不重耆舊之臣乎君奭我聞在昔成湯旣受命時則有若伊尹格于皇天在太甲時則有若保衡在太戊時則有若伊陟臣扈格于上帝巫咸乂王家在祖乙時則有若巫賢在武丁時則有若甘盤臣若水通曰此周公舉殷六臣之輔殷者以留召公也格至也太戊者太甲之孫也伊陟伊尹之子也保衡即伊尹也巫咸臣姓名祖乙太戊之孫也巫賢巫咸之子也武丁高宗也甘盤高宗之師也召公欲告老而去周公留之言我聞昔成湯旣受天命而爲天子當此時則有伊尹輔之故其功至於與天作配其後尹又輔太甲若太戊之時又有伊陟臣扈二人輔之故功格于上帝又有巫咸治王家之事若祖乙之時則有巫賢武丁之時則有甘盤輔之周公歴舉言之欲召公匹休於前人未可言去也臣謂六臣皆殷之賢相也臣每讀書至此未嘗不起敬欽慕之人君世主必思得如是之賢相而相之則格天格帝之功烈不難致矣立政周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任凖人綴衣虎賁周公曰嗚呼休兹知恤鮮哉臣若水通曰此周公率羣臣同戒成王以立政用人之言也拜手稽首者手至首又至地也嗣天子王者言成王繼位爲天子也咸皆也常伯者牧民之長也常任者任事之公卿也凖人者守法之有司也綴衣掌服噐者虎賁執射御者此見周公率羣臣進戒一時首尾相承言語氣象當羣臣拜手稽首之時周公從旁先贊之曰拜手稽首告嗣天子王矣於是羣臣用皆戒曰王左右之臣有常伯切於牧民者有常任切於任事者有凖人切於守法者三事之外有綴衣有虎賁雖執服器射御之小然朝夕狎近君徳尤所係重羣臣言未終周公即嘆息繼言之以盡其意曰羙哉此官然知憂恤者鮮矣夫三宅大臣所以贊㐮治道國家倚爲休戚誠不可不得其人矣若綴衣虎賁乃左右奔走之役周公乃慎重之至與三宅之官並稱焉何也蓋人主朝夕與居而氣體之習染心術之轉移常必由之故曰僕臣正厥后克正僕臣諛厥后自聖所繫豈小小哉伏惟皇上於公卿大臣慎擇其人有徳望者居之至如外則錦衣衛内則衣服食御之司左右近侍之人必擇誠實謹厚老成者用之則内外夾持涵養君徳輔成王道有不難矣立政古之人迪惟有夏乃有室大競籲俊尊上帝迪知忱恂于九徳之行乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃凖兹惟后矣臣若水通曰此亦周公率羣臣進戒成王之言也迪行也競强也籲俊求賢也宅任也事即常任也牧即常伯也凖即凖人也迪知者蹈知而非茍知也忱恂者誠信而非輕信也九徳者即臯陶言寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而㢘剛而塞彊而義者也言古之人有能行此慎於任用之道者惟有夏之君大禹當王室大强之時而求賢以爲事天之實也而夏之大臣蹈知誠信於九徳之行乃敢告教其君曰今臣等拜手稽首於我后矣而言曰能任爾任事之公卿能任爾九州之牧伯能任爾守法之有司兹惟后矣言如此然後稱其爲君之實也由是觀之則人君之道在奉天以致治致治之要在用人而已矣帝舜所以無爲而治者有人以任之耳雖然孔子告哀公曰人道敏政故爲政在人取人以身修身以道修道以仁夫君道在求仁而已矣仁存則徳立徳立則道行道行則身修身修則得人得人則君臣上下交泰而政治出矣伏願聖明留心講求焉立政亦越成湯陟丕釐上帝之耿命乃用三有宅克即宅曰三有俊克即俊嚴惟丕式克用三宅三俊其在商邑用恊于厥邑其在四方用丕式見徳臣若水通曰此亦周公與羣臣告成王之言也亦越者繼前之辭也陟升也丕大也釐治也耿光也三宅即常伯常任凖人之官也三俊謂有三宅之才者湯自七十里升爲天子大理上天之光命敦典庸禮命徳討罪皆天命昭著於天下然丕釐耿命在用人以共理故湯所用三宅實能就是位而不曠其職所稱三俊實能就是徳而不浮其名也蓋三宅三俊所以輔君之治人君所以理天之事者也知君之事即天之事即知不容以不謹於擇人以圖治矣此在人君所汲汲以求之者也立政亦越文王武王克知三有宅心灼見三有俊心以敬事上帝立民長伯臣若水通曰此亦周公述文武用人之家法以告成王也三宅三俊文武克知灼見皆曰心者真知其心術之善不但取其才可辦事而已知之旣真然後推心委任之宅俊所司莫非天職故曰以敬事上帝長伯如王制所謂五國以爲屬屬有長二百一十國以爲州州有伯蓋當時宅俊有出而爲藩封者故曰立民長伯於此可見古之用人必欲知其心後世徒謀諸面或信其言無怪其官使非人而治效之不臻也歟立政繼自今立政其勿以憸人其惟吉士用勱相我國家臣若水通曰此周公戒成王以任用賢才之道也勱勉也上旣言立政用憸人不能訓徳罔顯在厥世矣故此又言成王繼自今以徃立政勿用憸利小人其惟用有常吉士使勉力以輔相我國家也如何爲憸人觀其人舉動輕浮有沾沾便捷之狀者即其人也如何爲吉人觀其人容止可觀進退可度而厚重平易者即其人也一則罔顯在世一則勱相國家一舉措之間而興亡之兆已决矣可不謹乎謹之之道在心誠求之耳周官立太師太傅太保兹惟三公論道經邦爕理隂陽官不必備惟其人少師少傅少保曰三孤貳公𢎞化寅亮天地弼予一人臣若水通曰此成王訓迪百官立公孤之職也經者經綸之也爕理者調和之也孤特也隂陽以氣言易曰一隂一陽之謂道𢎞大也化治化也天地以形言寅亮敬明之也太師太傅太保者賈誼曰保者保其身體傅者傅之徳義師道之教訓此所謂三公是也與天子坐而論道道明則可以經綸邦國使大經人倫各以品叙人事修則和氣致故隂陽調和也然此非經綸天下之大經參天地之化育者豈足以任此故官不必備惟得其人可也又立少師少傅少保所謂三孤者其職在貳三公贊成論道經邦之治化凡人君治化之事皆天地之事也宏化者所以敬明天地之事而輔我一人所謂裁成天地之道輔相天地之宜是也臣謂此自秦漢以來所謂宰相所謂中書省所謂參知政事也我國朝特立三太三少之職所以逺追成周之制至爲崇重故公孤得其人則君徳成治化理隂陽和天地位萬物育矣至若或有不惟其人而徒備其官是則君徳治化隂陽天地萬物之否塞亦必由之仰惟皇上繼天立極以圖化理尤宜慎選此官以答天地之付託以慰天下民物之望幸甚周官推賢譲能庻官乃和不和政厖舉能其官惟爾之能稱非其人惟爾不任臣若水通曰此成王戒卿士以人事君之道也推謂推之使在前也讓謂與之相讓也賢有徳者也能有才者也庻官羣臣也厖雜也稱亦舉也大臣推賢讓能推譲之心乃公心也以公感公公同則和此庻官所以乃和也大臣妬賢疾能妬疾之心乃私心也以私召私私異則乖此庶官所以不和也庻官不和乖戾之萌生於心發於政害於事故政必雜亂而不純矣然其公其私其和其乖其理其亂皆大臣自己分内事也故所舉之人能修其官是亦爾公和氣之所致也故曰惟爾之能舉非其人亦爾私心乖氣之所致也故曰惟爾不勝其任古者大臣與物同體以人事君其責如此雖然爲人君欲知大臣之賢否者又當以此例觀之可也秦誓邦之杌隉曰由一人邦之榮懷亦尚一人之慶臣若水通曰此秦穆公悔用孟明而誓衆之言也杌隉不安也懷安也言國之危殆不安繫於所任一人之非國之尊榮安富繫於所任一人之是夫所任之是非一人耳似無足爲邦之安危也殊不知一賢進則衆賢以類而進一邪入則衆邪以類而入泰之彖繫小徃大來則曰天地交而萬物通也否之彖繫大徃小來則曰上下不交而天下無邦也泰則至於萬物通否則至於天下無邦焉曽謂一人之是非有不足爲邦之安否者乎爲人君者所以貴於擇相也詩小雅節南山尹氏太師維周之氐秉國之鈞四方是維天子是毗俾民不迷不弔昊天不宜空我師臣若水通曰此周家父所作以刺王之詩也太師官名氐本也均平也維持也毗輔也弔愍也空窮也師衆也言太師尹氏爲周家百官風化之本而秉國之均平即所謂統百官均四海者宜維持四方使綱舉而目張以上輔天子上下交通而民不至於迷可也今乃不爲均平不見愍於上天而使我衆空乏至於四海困窮矣抑以下文觀之所謂弗躬弗親所謂弗問弗仕所謂式夷式已無小人殆𤨏𤨏姻婭則無膴仕則見王委政於尹氏尹氏委政於姻婭之小人而以未嘗仕未嘗問者欺其君四者皆失相體之大者也而尹氏則兼之顧乃位於太師秉國均衡則均不均衡不衡其不能維持四方毗輔天子喪亂國家必矣雖然致亂者固尹氏而用尹氏者乃王心之蔽於小人而不明不斷耳故任相者必明且斷則奸邪不惑相道得而萬國理矣商頌長發昔在中葉有震且業允也天子降于卿士實維阿衡實左右商王臣若水通曰此商人祫祭之詩頌成湯功徳之辭也中葉中世也震懼也業危也允信也天子指湯也降言天錫之也卿士伊尹也阿衡伊尹官號也詩言昔在中世之時國祚中衰亦震懼而危業矣以成湯之聖敬故天降伊尹以爲之阿衡於是伊尹相湯而左右輔弼乎湯焉夫謂阿衡左右不過輔弼以得其平可謂盡相之道矣其本在於有莘之野樂堯舜之道之時其體固已具矣故能以天下爲己任相湯伐夏以王天下皆自其本發之耳故人主欲爲天下得相者必有伊尹之志而後可茍非能自立其大者而付之鼎鼐覆公之餗必矣春秋定公十年齊人來歸鄆讙龜隂田臣若水通曰鄆讙龜隂皆魯舊三邑所謂汶陽之田是也歸者復其舊物也不曰歸而曰來歸者齊人心服而歸之也魯之田入於齊乆矣一旦曷爲而來歸焉蓋定公得孔子爲之攝相也故能深服齊人之心化强暴而爲效順耳定公㑹齊侯于夾谷孔子攝相事具左右司馬以從斬侏儒却萊夷之兵罷享禮于野凜乎邪正内外之防此齊人所以心服而還所侵之疆相之得人之效也使當時不用孔子吾見魯其岌岌矣乎况能復數十年之侵疆耶相之得人其效有如此者然而猶攝相之耳使委心任之舉國以聼則魯之治豈不爲東周哉故國之有相猶屋之有楹所任重矣可不慎歟禮記緇衣子曰大臣不親百姓不寧則忠敬不足而富貴已過也大臣不治而邇臣比矣故大臣不可不敬也是民之表也臣若水通曰此言人君當親敬宰相也大臣即宰相也富貴已過者謂徒爵禄之也言人君不能視之如手足腹心而親信之大臣者人君之股肱君徳頼之以輔佐天下頼之以治安者也苟信任之不專則何以得行其道於天下哉是故百姓之弗寧也然所以致此由君之敬臣者不足臣之忠君者尚歉而徒富貴之耳是以大臣不親則不得治事而近侍之臣得以潛窺上意以傾覆之矣然臣觀三代而下君之待臣有敬焉者而臣不必其忠宋神宗之於王安石是也臣之事君有忠焉者而君不必其敬蕭望之之於漢元帝是也夫君臣相遇之難也故將大有爲之君其任大臣也必擇天下碩徳王佐之才以居之而信之必專任之必篤保之必固不爲浮言所惑不為讒言所間則可以坐収太平之效矣孟子故將大有爲之君必有所不召之臣欲有謀焉則就之其尊徳樂道不如是不足與有爲也故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而覇臣若水通曰大有爲非常之君有志於盛徳大業者所不召之臣謂其君不召之所以尊禮之也若有大疑以資其决擇則顧其廬造其室而請焉蓋吾以其徳可尊而尊之也以其道可樂而樂之也使其無尊徳樂道之誠如此則賢者必以徳自尊以道自樂而不屑與之共治則君之徳何由而成業何由而立哉故伊尹成湯之相也成湯之於伊尹必從之學而咸有一徳然後立之爲相故伐夏救民而室家胥慶以致徯后之歸矣管仲桓公之相也桓公之於管仲必從之學一則曰仲父二則曰仲父然後以之爲相故能九合諸侯而成一匡天下之業矣夫桓公之覇不足道也猶能學焉而臣况人君志於成湯之王道者可無學焉而臣之相哉左傳僖公二十三年晉公子重耳之及于難也遂奔狄從者狐偃趙衰顛頡魏武子司空季子過衛及齊及曹曹共公聞其駢脇欲觀其裸浴薄而觀之僖負覊之妻曰吾觀晉公子之從者皆足以相國若以相夫子必反其國反其國必得志於諸侯臣若水通曰曹僖負覊之妻一女子耳乃能識晉從者皆足以相何其明於知人也曰不徒夫人言之也楚子玊亦嘗有言晉公子文而有禮其從者肅而寛忠而能力夫寛肅忠力相之體也矧其用人又頗得古人推賢遜能之意當其艱闗入國之初得數子焉亦足以霸矣特所惜者有介子推焉蓋超於功名之表者卒使隱而死綿上之田徒以志過亦何益於敬賢之道哉國語晉語叔向告單靖公之老曰居儉動敬徳讓事咨而能辟怨以爲卿佐其有不興乎臣若水通曰叔向晉卿單靖公王之卿士老靖公家臣之長也叔向聘於周而歸其老送之故語其老稱靖公之賢而卜周之再興如此夫卿相輔天子以爕理隂陽寅亮天地者也史佚曰動莫若敬居莫若儉徳莫若讓事莫若咨單子有之相道得矣如是而貳之以無私重之以不殽不亦能逺怨乎羊舌肹以是稱之可謂明於任相之術者矣魯語季文子相宣成無衣帛之妾無食粟之馬仲孫它諫曰子爲魯上卿相二君矣妾不衣帛馬不食粟人其以子爲愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食麤而衣惡者猶多矣吾是以不敢人之父兄食麤而衣惡而我羙妾與馬無乃非相人者乎且吾聞以徳榮爲國華不聞以妾與馬臣若水通曰它魯孟獻子之子子服它也愛吝也夫爲相之道爲上爲徳爲下爲民所以佐承君徳以下於民者也季文子見國人之貧不忍有衣帛之妾食粟之馬是足以爲國華矣為君者必求如是之人而相之可也格物通卷六十九
