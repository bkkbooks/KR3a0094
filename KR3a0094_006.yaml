body:
  text: 格物通卷六明湛若水撰謀慮下左傳成公八年晉侯使申公巫臣如吳假道于莒與渠丘公立於池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉况國乎臣若水通曰書稱制治于未亂保邦于未危此古之聖王思患預防之道也莒子以國僻忘虞非謀國深逺之慮也申公巫臣其智矣乎襄公二十五年子大叔問政於子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思如農之有畔其過鮮矣臣若水通曰夫學與政合一者也孔子論政本於修道以仁又曰居之無倦行之以忠子産雖未知聖學之道其言政暗與之合其曰思其始而成其終無倦之謂也又曰朝夕行之行無越思以忠之謂也使子産從事於聖門之學則必知王道之政教而不徒以乗輿濟人於溱洧矣故君相以知學為貴襄公二十八年公如楚及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也子服惠伯曰君子有逺慮小人從邇饑寒不恤誰遑其後不如姑歸也叔孫穆子曰叔仲子專之矣子服子始學者也滎成伯曰逺圖者忠也公遂行宋向戌曰我一人之為非為楚也饑寒之不恤誰能恤楚姑歸而息民待其立君而為之備公遂反臣若水通曰魯襄公之行止而謀之臧否决矣且公之如楚果為楚國邪則仲叔之言似為是抑為康邪則子服子之言似為是公将奚適哉或曰為康王者從邇也為楚國者圖逺也利民者寜逺毋寜邇是皆不然公謀行之初志結康王之好以孚楚國之人為是謀者遂哭於康王之尸畢平生之志出及楚國是兩得也惜乎其不出此故善謀必本於學穆子之言得之矣國語魯語叔孫穆子曰君子是以患作作而不𠂻将或導之是昭其不衷也臣若水通曰穆子魯卿叔孫豹患作慮患其所作也衷中也不得衷以亂事也季武子背盟伐莒以動諸侯之兵穆子幾不免矣廼能慷慨舎生不為貨免且懼作之不衷以携世卿之心可謂明且逺而慮患深卒以庇魯之宗宜矣然則君天下者其可不作事謀始而思所以善其後乎晉語宫之竒曰唯忠信者能留外冦而不害除闇以應外謂之忠定身以行事謂之信臣若水通曰宫之竒虞大夫留外㓂謂舎晉軍於國也去闇應外之忠安身行事之信皆謀慮之深者也虞公舎晉軍於國而導之虢可謂能去闇安身深長之慮乎使虞公能用宫之竒言豈至危亡也哉後之為人君者觀此亦可以為不用臣下謀慮之戒也已晉語郭偃曰夫衆口禍福之門也是以君子省衆而動監戒而謀謀度而行故無不濟内謀外度考省不倦日考而習戒備畢矣臣若水通曰偃晉大夫監察衆口以為戒謀事揆義而後行内謀於心外度於事日自考省不倦習而行之戒備之道畢於是矣天民一也輿人之言天心在焉君子鍳恵公之隕師亦可以知懼矣為人君者誠能内外謀度戒而後行則動罔不臧而天人恊應矣可不慎哉楚語藍尹亹曰君子臨政思義飲食思禮同宴思樂在樂思善臣若水通曰思者衆善之原也平仲立威於樽俎子罕慟哭於陽門自古忠賢之臣未有不慷慨竊歎於時者也然孰與訏謨逺猷之為賢哉茍能隨事而致思不溺於飲食宴樂之間則撥亂反正變危為安猶反掌爾而何以徒付之竊歎為乎此吳楚之辯子西自屈於藍尹亹也為人君者其慎之哉漢獻帝建安十年冬十月秘書監侍中荀悦作申鑒五篇奏之時政在曹氏天子恭己恱志在獻替而謀無所用故作是書臣若水通曰荀悦申鑒稱為政之術先屏四患乃崇五政闗於國家興亡之大致其立論逺而慮患深矣時君不之省而禍亂遂不可救也惜哉後之有志於天下之治者宜無忽於忠謀焉劉備詣諸葛亮凡三往乃見因屏人曰漢室傾頽姦臣竊命孤不度徳量力欲信大義於天下而智術短淺遂用猖獗至於今日然志猶未巳君謂計将安出亮曰今曹操已擁百萬之衆挾天子而令諸侯此誠不可與爭鋒孫權據有江東已歴三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資将軍也益州險塞沃野千里天府之國劉璋闇弱張魯在北民殷國富而不知存恤智能之士思得明君将軍既帝室之胄信義著於四海若跨有荆益保其巖阻撫和戎越結好孫權内修政治外觀時變則霸業可成漢室可興矣備曰善於是與亮情好日宻闗公張飛不悦備解之曰孤之有孔明猶魚之有水也願諸君勿復言關張乃止臣若水通曰謀貴逺不貴近貴大不貴小孔明有荆益定三分人皆以其謀之善而不知其為第二義而其志則逺矣大矣盖有荆益以為國資而不在於荆益也定三分以為己援而不在於三分也恢復大業非此莫能遽濟爾惟杜甫詩云三分割據紆籌策訏謨逺猷甫盖知之矣晉恵帝元康九年太子洗馬江統作徙戎論曰闗中土沃物豐帝王所居未聞外寇宜在此土也非我族類其心必異今因其衰敝宜及兵威方盛反其舊土使屬國撫夷情安集之又曰聖賢之謀事也為之於未有治之於未亂道不著而平徳不顯而成其次則能轉禍為福因敗立功值困必濟遇否能通若憚蹔舉之小勞而忘永逸之𢎞策惜日月之煩苦而遺累世之㓂敵非所謂能創業垂統謀及子孫者也又曰夫為邦者憂不在寡而在不安以四海之廣士民之富豈須殊族在内然後取足哉臣若水通曰詩稱戎狄是膺荆舒是懲古之聖王嚴中外之辨非特人道爾其天道陰陽之介當然也江統之論察微知著超然為識治君子矣惜其論不及此使中外之義未明於天下而徒以區區利害計之爾洪惟我聖祖髙皇帝迅掃元人驅之北土明中外之分辨陰陽之介人道明天道清真所謂刷恥酬百王除兇報千古萬世之逺猷矣近聞河套之寇嵗居其土漸以為安可慮也聖明宜訏謨逺計逐而出之使不知我土之可安而中外不至混淆也萬世幸甚齊明帝建武元年春正月乙亥魏主如洛陽西宫中書侍郎韓顯宗上書以為陛下耳聽法音目翫墳典口對百辟心虞萬機景昃而食夜分而寢加以孝思之至隨時而深文章之業日成篇卷雖叡思所用未足為煩然非所以嗇神養性保無疆之祚也伏願陛下垂拱司契而天下治矣帝頗納之臣若水通曰書稱不役耳目百度惟貞百度者心思之則也心思正而萬變决矣故大學能慮本於知止明帝多役其耳目心志之神可謂之訏謨逺猷乎韓顯宗諫之是矣惜乎其止於嗇神養性保夀而已是故人君之學必養心存神以神天下之化可焉唐太宗貞觀元年十二月上謂黄門侍郎王珪曰國家本置中書門下以相檢察中書詔勑或有差失則門下當行駁正人心所見互有不同茍論難往來務求至當捨己從人亦復何傷比來或䕶己之短遂成怨隙或茍避私怨知非不正順一人之顔情為兆民之深患此乃亡國之政也煬帝之世内外庻官務相順從當是之時皆自謂有智禍不及身及天下大亂家國兩亡雖其間萬一有得免者亦為時論所貶終古不磨卿曹各當徇公忘私勿雷同也臣若水通曰語有之並聽則公唐之政事謀始於中書審駁於門下所以集衆人之見以同歸於公是也然而謀生於心也有公天下之心而後能謀天下之事人君不在於得謀而在於得人使居中書門下者皆無非人則謀無不臧而同於是矣煬帝之世人皆尚同於非爾用非其人安得不至於是邪劉向說苑曰聖王之舉事必先諦之於謀慮而後考之於蓍龜白屋之士皆關其謀芻蕘之役咸盡其心故萬舉而無遺籌失䇿臣若水通曰人君之於天下一日萬幾而謀慮不可以不謹也故舜典曰朕志先定詢謀僉同鬼神其依龜筮恊從言先諸己詢諸人而後謀之卜筮而鬼神無不依也向之所言似合於聖人之指矣但先諦於謀慮乃訪之白屋詢于芻蕘而後考於蓍龜可也若先考於蓍龜矣而又闗之白屋芻蕘焉不已䙝神之謀邪此洪範稽疑之序所以必先諸己次之以人而終之以神而謀無不善也雖然謀慮尤其基也誠能隨事體認務有以察見天理之實天人固莫違矣否則中無所主又何假於外哉此人君之心所以貴有主也班固白虎通曰天子下至士皆有蓍龜者重事决疑示不自專尚書曰女則有大疑謀及卿士謀及庻人謀及卜筮臣若水通曰謀之臧否事之廢興成敗闗焉是故物我人神一理也謀及卿士庻人人謀恊矣謀及卜筮鬼謀恊矣合人鬼於一心夫然後能一天下之理也其古之深謀逺慮者歟張載理窟曰思慮要簡省煩則所存都昏惑中夜因思慮不寐則驚魘不安某近來雖終夕不寐亦能安靜却求不寐此其驗也臣若水通曰善謀慮者之於政治也猶其於學也善謀事者於平心得之善為學者於中思得之張載之學盖得之於精思者也故有得則疾書之程頥謂之曰大率有强探力索之状而無優㳺自得之氣願更完養思慮他日自當調暢然則載之此言盖深有感悟於程頥之説也乎夫虚靈不昧者心之體也吾心之體立則天下之理是是而非非者見矣於思慮也何有舎是則憧憧往來朋從爾思本體惑矣安能善謀乎程顥劄子有云或謂人君舉動不可不慎易於更張則為害大矣臣獨以為不然所謂更張者頋理所當爾其動皆稽古質義而行則為慎莫大焉豈若因循茍簡卒致敗亂者哉臣若水通曰語有之琴瑟不和必取而更張之乃可鼔也夫更張所以求其和也更張之當否在謀慮之是非不可忽也何者當否見于事也是非生於思也故更張非以為害也非其道則為害也是故君子必慎之於思也易曰革言三就夫革而至於三就則亦慎之至矣伏惟聖明處大寜之世容有不和之弊矣如有所更張焉盍求之易哉程頥曰君子之志所慮者豈止其一身直慮及天下千萬世小人之慮一朝之忿不遑恤其身臣若水通曰夫慮之逺近繫於學焉而已矣君子所學者大故所慮者逺小人不學故不知所慮也嗚呼一念之發忘其身以至於禍及其親雖追悔亦無及矣甚矣學之不可不豫也易曰懲忿窒欲其學之道乎從事於此其寡過矣學者尚勉旃哉張栻經筵講義有云夫治常生於敬謹而亂常起於驕肆使為國者而每念乎稼穡之勞而其后妃又不忘乎織絍之事則心不存焉寡矣何者其必嚴恭朝夕而不敢怠也其必懐保小民而不敢康也其必思天下之饑寒若已饑寒之也是心常存則驕矜放肆何自而生豈非治之所由興也歟臣若水通曰天下之事治亂敬肆二言盡之矣天下之治亂生於敬肆敬肆生於一念茍一念而敬焉則上下内外化之皆思勞勞則善心生然而不治者未之有也茍一念而肆焉則上下内外化之皆思逸逸則惡心生然而不亂者未之有也故敬謹驕肆之審實為萬世長乆之謀也嗚呼讀所其無逸之篇則知周之所以興誦休其蠶織之章則知周之所以亡夫興亡之迹相去之逺如此其初也直一念之微爾為人君者可不鑑哉司馬光曰宴安怠惰肇荒滛之基竒巧珍玩發奢泰之端甘言卑辭啓僥倖之徒附耳屛語開䜛賊之門不惜名器導僣逼之源假借威福授陵奪之柄凡此六者其初甚微朝夕狎翫未覩其害日滋月益遂至深固比知而革之用力百倍矣臣若水通曰初也者端也端也者事之始也易曰君子作事謀始夫六者之端啓而天下亂矣救其亂則難為力治其端則易為功故君子圖難於其易以逺禍亂也雖然敝未極而可以救藥者未見其可畏也敝而至於見其可畏則恐無所用其畏也己為人君者鑒光之言其可謀之不臧也哉程顥曰為惡之人未嘗知有思有思則為善矣思至於再則已審三則惑矣臣若水通曰孔子稱學而不思則罔故曰思者聖功之本思之於人也大矣故凡天下之為惡者弗思爾思之思之又從而思之思之不通鬼神将通之非鬼神之力乃精誠之極也雖然君子可思也不可過也如其過也弊斯至矣此季文子所以不見與於孔子歟今之學者必思無邪而後可也國朝洪武甲辰四月上謂徐達等曰人之行事固欲盡善然一時智慮有未周及既行之後思之有未盡善亟欲更之已無及矣與其追悔於既往曷若致謹於其初大抵更涉世故則智明久歴患難則慮周近日紀綱法度粗若有緒其間有未盡善者諸公宜執正論亟為更張庻幾上下之間各得其便茍有不善豈徒予之過亦汝等之責也臣若水通曰我皇祖諭侍臣及此即君子作事謀始之心也始者念之方萌易之所謂深與幾也謀者心之妙用易之極與研也惟能極深研幾則由中達外天理充融智慮洞徹自能通天下之志而成天下之務至於過舉而能悔之更之者鮮矣理茍未明於初而欲智慮周悉於後胡可得哉皇祖極研幾之神而猶欲羣臣輔之其靡盈之盛節矣乎洪武元年四月皇祖命工畫古孝行及身所經歴艱難起家戰伐之事為圖以示子孫謂侍臣曰朕家本業農祖父皆長者世承忠厚積善餘慶以及於朕今圖此者使後世觀之知王業艱難也起居官詹同等頓首曰陛下昭徳垂訓莫此為切太祖曰富貴易驕艱難易忽久逺易忘後世子孫生長深宫惟見富貴習於奢侈不知祖宗積累之難故示之以此使朝夕覽觀庻有所警也臣若水通曰夫立教者言不如意意不如象圖所以示象也觀其象則意得而言忘矣我太祖髙皇帝建極之初思亂亡恒起於安寜也遂命工畫古孝行及艱難戰伐之事為圖以傳子孫俾之朝夕觀覽盖其意不以開萬世帝王之業為難而以保萬世帝王之業為貴可謂貽謀之逺者矣故後世子孫處富貴而不驕享治平於不替良以遺訓之具在也伏惟皇上時加觀覽警於心謹於身勤於政以能保帝業於無疆則天下幸甚洪武十二年上與翰林侍制吳沈論持身保業之道上曰人當無所不謹事雖微而必慮行雖小而必防不慮於微終貽大禍不防於小終虧大徳謹小行而無己者則可以成大善忽細事而不戒者則必成大惡常人且然况人君乎沈對曰聖慮及此誠社稷永安之道上曰安生於危危生於安安而不慮則能致危危而克慮則能致安安危治亂在於能謹與否爾臣若水通曰人君保業之道在於持身持身之功在於慎獨皇祖所謂微與小即獨也一念之方萌也於此而慮則察之精矣於此而防則守之宻矣慮且防則遏其欲而存其理矣由是微而顯小而大皆天理流行成天下之善治獲社稷之久安矣反是所謂禍與危豈能免哉皇祖諭侍臣及此得慮微防小之要而知安危倚伏之機也邪人君處富貴宴安之餘忽畧於微小多矣茍欲無惡於志尚當以皇祖之言為法格物通卷六
