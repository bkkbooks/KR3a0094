body:
  text: 格物通卷十四明湛若水撰敬天下漢明帝永平三年秋八月壬申晦日有食之詔曰昔楚莊無災以致戒懼魯哀禍大天不降譴今天之動變儻尚可救有司勉思厥職以匡無徳臣若水通曰人恒生於憂患死於安樂何也葢憂患則敬心生安樂則怠心生此死生之辨也故國有天變之譴必惕然思敬矣明帝日食之詔其知道乎後之君天下者幸無忘事天之敬焉明帝永平八年冬十月壬寅晦日有食之既詔羣司勉脩職事極言無諱於是在位者皆上封事各言得失帝覽章深自引咎以所上班示百官詔曰羣僚所言皆朕之過民寃不能理吏黠不能禁而輕用民力繕脩宫宇出入無節喜怒過差永覽前戒竦然兢懼徒恐薄徳久而致怠爾臣若水通曰明帝因日食求言反己自責又恐久而致怠孔子曰學如不及猶恐失之明帝有焉可謂能敬天者矣永平之政為東都首稱謂不本於是乎吁後之人主遇日食則曰曰天之常數也天不可知也謂之敬天可乎晉穆帝永和十二年夏四月長安大風發屋㧞木秦宫中驚擾或稱賊至宫門晝閉五日乃止秦主生推告賊者刳出其心左光祿大夫强平諫曰天降災異陛下當愛民事神緩刑崇徳以應之乃可弭也臣若水通曰大風㧞木天惡秦主生之暴也于此恐懼脩省猶懼弗勝矧可益加毒虐也邪然而生遭非刑死獲惡諡豈不宜哉晉穆帝升平二年九月秦大旱秦王堅减膳徹樂命后妃以下悉去羅紈開山澤之利公私共之息兵養民旱不為災臣若水通曰符堅何人也遇大旱猶能敬天憂民而旱不為災而况天下英明之主不為符堅者乎齊武帝永明元年二月有司以天文失度請禳之上曰應天以實不以文我克己求治思隆恵政若災𤯝在我禳之何益臣若水通曰語云獲罪於天無所禱也孔子曰丘之禱久矣故天文失度非禳可免者一時有司皆鄙夫也武帝克己隆政以應天其庶㡬乎隋文帝開皇九年朝野皆稱封禪秋七月丙午詔曰豈可以薄徳而封名山用虚言而干上帝非朕攸聞而今而後言及封禪宜即禁絶臣若水通曰封禪者其昉於秦之侈心乎聖王致中和位天地育萬物功徳莫大焉未聞有封禪之事也内以自欺外以欺人下以欺山川上以欺天書曰矯誣上帝此之謂也至有為天書符命以亂天下皆充此心而已觀隋文帝却羣臣之言其亦賢矣哉唐髙祖武徳九年十二月前幽州記室直中書省張藴古上大寳箴其畧曰聖人受命拯溺亨屯故以一人治天下不以天下奉一人臣若水通曰書云惟天惠民惟辟奉天故人君之道在體天之心而已矣能體天心則以一人治天下而所以富夀安逸之者無不至矣是之謂事天是之謂仁人是之謂天之孝子為人君者可不務乎唐宣宗大中元年二月癸未上以旱故减膳徹樂出宫女縱鷹隼止營繕命中書侍郎同平章事盧商與御史中丞封敖踈理京城繫囚大理卿馬植奏稱盧商等務行寛宥凡抵極法一切免死彼官典犯贓及故殺人平日大赦所不免今因踈理而原之使貪吏無所懲畏死者􅋦寃無告恐非所以消旱災致和氣也昔周饑克殷而年豐衛旱討邢而雨降是則誅罪戮姦式合天意雪寃决滯乃副聖心也乞再加裁定詔兩省五品以上議之臣若水通曰人君奉若天道春生秋殺仁育義正行天之理而已矣馬植所言欲誅罪戮姦雪寃决滯庶乎合天心矣宣宗尚何疑議之也哉後梁均王龍徳元年秋七月呉徐温勸吳王祀南郊或曰禮樂未備且唐祀南郊其費巨萬金未能辦也温曰安有王者而不事天乎吾聞事天貴誠多費何為唐每郊祀啓南門灌其樞用脂百斛此乃季世奢泰之弊又安足法乎臣若水通曰饗帝貴誠茍誠矣雖二簋可也徐温庶乎知先王制禮之意矣外此而惟求侈泰之務焉是䙝天矣可謂之能事天乎後漢隠帝乾祐三年閏五月宫中數有怪癸巳大風發屋㧞木吹擲門扉起十餘歩而落震死者六七人水深平地尺餘帝召司天監趙延乂問以禳祈之術對曰臣之業在天文時日禳祈非所習也然王者欲弭災異莫如脩徳延乂歸帝遣中使問如何為脩徳延乂對請讀貞觀政要而灋之臣若水通曰延乂所謂弭災莫如脩徳是矣而謂請讀貞觀政要而灋之恐非弭災之急務也葢脩徳莫先於誠敬使延乂能知先王敬徳祈天之學由一心以達之政事之間無往而不敬焉則事天之道盡而天意可回矣惜乎延乂不足以及此賈誼新書曰晉文公出畋前驅還白前有大蛇髙若堤横道而處文公曰還車而歸其御曰請以從吾者攻之文公曰我有失行而天招以戒我若攻之是逆天命也乃歸齋宿而請於廟臣若水通曰招作昭言天明示以戒也文公出畋人欲也因大蛇而知天之戒則天理矣是之謂敬天故五罪陳蛇魚爛而成覇業天人之際如此夫劉向説苑齊桓公問管仲曰王者何貴曰貴天桓公仰而視天管仲曰所謂天者非蒼蒼莾莾之天也君人者以百姓為天百姓與之則安輔之則强非之則危背之則亡詩云人而無良相怨一方臣若水通曰臯陶云天聰明自我民聰明天明畏自我民明威逹于上下敬哉有土故善觀天者觀諸民心而已矣管仲之言誠不誣也古有畏民之君是以無可畏之民君人者顧諟天之明命則動罔非天一念之微恵及天下則上天之所謂聰明明威不必求之民心而在吾之心矣班固白虎通曰冬至所以休兵不舉事閉闗商旅不行何此日陽氣微弱王者承天理物故率天下靜不復行役扶助微氣成萬物也臣若水通曰人之喘息呼吸通乎天人之氣即天之氣也冬至不動兵不舉事禁商旅所以養微陽也敬天之至也然則後世事日多欲日熾得無損天地之氣乎宋欽宗靖康元年六月天狗星隕彗出紫微垣長數丈北拂帝座掃文昌大臣有謂此乃外域將衰非中國憂也提舉醴泉觀譚世勣面奏垂象可畏當脩徳以應天不宜惑其諛説詔除民間疾苦十七事臣若水通曰天民一理而徳者所以感格天人上下之㡬也故敬天之實在恤民恤民之要在脩徳譚世勣之告欽宗以敬天之道而欽宗能除民間疾苦之事可謂得敬天之實矣惜乎脩徳之學猶未之聞是以一時恤民之政雖行而不知脩徳以為之本爾書言咸和萬民在於疾敬徳豈虚語哉後之人君欲敬天勤民則盍反其本矣宋孝宗乾道七年正月帝作敬天圖帝謂輔臣曰無逸一篇享國長乆皆本於寅畏朕近日取尚書所載敬天事編為兩圖朝夕觀覽以自警省名曰敬天圖虞允文對云惟陛下盡躬行之實敬畏不已必有明效大驗帝深然之臣若水通曰記曰人者天地之心人即天也人君能自敬即敬天矣豈求之外邪天固在我敬又何形可圖求之於外而惟形是圖此孝宗之所以不競也虞允文躬行敬畏之言庶乎知本矣帝雖然之果能行之乎後之人君欲敬天者當如成湯顧諟天之明命而後可宋儒伊川程頥治平二年應詔上英宗皇帝書曰臣聞水旱之沴由隂陽之不和隂陽不和繫政事之所致是以自昔明王或遇災變則必警懼以省躬之過思政之闕廣延衆論求所以當天心致和氣故能消弭變異長保隆平臣若水通曰語有之人定者勝天故能易天之成數者人也堯有九年之水湯有七年之旱豈徳政有缺是或常數而終不能為災者堯湯之徳政有以勝之也商王中宗有桑榖之祥髙宗有雊雉之異二王増脩徳政王道復興此已然之大效也人主之遇災變其可不思所以消弭之術哉程頥代吕公著應詔上神宗皇帝書曰伏覩詔勑以彗出東方許中外臣僚直言朝廷闕失臣伏觀前史所載彗之為變多矣鮮有無其應者葢上天之意非徒然也今陛下既有警畏之心當思消弭之道且以今日之變孰從而來書曰天視自我民視天聽自我民聽豈非政之所致歟如曰非政之由則經為誣矣臣復何言詔之所求亦為虚設若以為政之所致則改以順天在陛下而已臣若水通曰傳云天之有彗以除穢也又曰所以除舊布新也人君於此茍能悔過遷善則可變災而為福不然禍將及矣故晏子曰可祝而來可禳而去也伏惟聖明或遇此災變亦嘗凝神自省思所以除舊布新以為消變之本乎朱熹曰王者知有天而畏之言行必信政教必立喜怒必公用舍必當黜陟必明賞罰必行臣若水通曰人莫不有天也己即天也則夫言行政教喜怒用舍黜陟賞罰皆天也人惟不知其有爾夫天者理也王者知而畏之則存諸心施之政達諸事無一而非天理矣後世庸主則罔知而不畏是以言行之不信政教之不立喜怒之不公用舍之不當黜陟之不明賞罰之不行而與天相違矣然則為人君者可不知其天以敬之乎五峰胡宏曰君子畏天命順天時故不行驚衆駭俗之事而常中小人不知天命以利而動肆情妄作故行驚衆駭俗之事必其無忌憚而然也臣若水通曰天命天時一中而已矣惟君子而知畏之順之焉故不敢過其中也小人不知畏而順之故失其中而過焉君子小人之分一念之敬肆也人主其可不知所以取舍也哉國朝呉元年六月乆旱皇祖日減膳素食宫中皆然既而大雨羣臣請復膳曰亢旱為災實吾不徳所致今雖得雨然苗稼焦損必多縱自食奚能甘味得乎民心則得乎天心今欲弭天災但當謹於脩己誠以愛民庶可荅天之眷乃詔免今年田租臣若水通曰民心即天心也天心即君心也故感之而無不應焉皇祖因旱致齋宫中其心可謂克謹天戒矣既而雨應雖有羣臣復膳之請然猶自責下免租之詔一念敬天之誠無息也何災之不可弭邪洪武元年八月太祖髙皇帝謂中書省臣曰近京師火四方水旱相仍朕夙夜不遑寧處豈刑罰失中武事未息徭役屢興賦歛不時以致隂陽乖戾而然邪卿等同國休戚宜輔朕脩省以消天譴叅政傅瓛等對曰古人有言天心仁愛人君則必出災異以譴告之使知變自省人君遇災而能自警懼則于變可弭今陛下脩徳省愆憂形於色居髙聽卑天實鑒之顧臣等待罪宰輔有乖調爕貽憂聖𠂻咎在臣等太祖髙皇帝曰君臣一體茍知謹懼天心方回卿等其盡心力以匡不逮臣若水通曰臣伏覩我皇祖因火災水旱自責省愆而叅政傳瓛引咎調爕君臣警懼宛然虞廷勑天之氣象矣此其所以克協天心而長保無疆之福者也伏惟聖明當法皇祖敬天之心而宰輔諸臣宜法傅瓛調爕之咎而後君臣克艱而可變災為祥矣洪武四年十月太祖髙皇帝謂中書省臣曰祥瑞災異皆上天垂象然人之常情聞禎祥則有驕心聞災異則有懼心朕嘗命天下勿奏祥瑞若災異即時報聞尚慮臣庶罔體朕心遇災異或匿而不舉或舉不以實使朕失致謹天戒之意中書其行天下遇有災變即以實上聞臣若水通曰末世之君類皆以祥瑞為喜觀天馬之歌神雀之號可見也至於災異則厭聞焉或聞之若罔聞焉者衆矣我聖祖命天下勿奏祥瑞若災異即時報聞而且有欺蔽之慮非惡祥瑞也惡其有以開人主之驕心也非喜災異也喜其有以起人主之懼心也是故驕心生則人欲肆亂之所由成也懼心生則天理長治之所由成也若太祖者豈非髙世之智為敬天之至乎伏惟皇上身體而法行之洪武十二年三月戊辰朔上御華盖殿皇太子侍上問曰比日講習何書對曰昨㸔書至商周之際上曰㸔書亦知古人為君之道因諭之曰君道以事天愛民為重其本在敬身人君一言一行皆通於天繫於民必敬以將之而後所行無不善也盖善必天鑒之不善天亦鑒之一言而善四海䝉福一行不謹四海罹殃言行如此可不敬乎汝其識之臣若水通曰臣伏觀皇祖人君言行皆通於天之一語其可謂知道矣以之諭皇太子可謂得養太子之本矣三代之所以有道之長皆原於此葢人主知天之在己則凡所以敬其身者何所不至乎則凡所以惠於民者何所不至乎由是言之言行不善則逆乎天殃乎民而為禍無窮矣為人君者可不敬乎洪武二十年四月丁卯上御華葢殿侍臣進講因論人之善惡臧否亦有不得其常者上曰為惡或免於禍然理無可為之惡為善或未䝉福然理無不可為之善人惟脩其在己者禍福之來則聽於天彼為善而無福為惡而無禍者特時有未至爾臣若水通曰伊訓曰作善降之百祥作不善降之百殃然有不得其常者或者疑焉殊不知非不常也天未定也皇祖之諭獨歸之理與時焉夫然後千古之惑可定矣故自天子以至於庶人積善而福終不至者未之有也積惡而禍終不及者亦未之有也洪武二十一年四月乙酉五色雲見翰林學士劉三吾進曰雲物之祥徵於治世舜之時形於詩歌宋之時以為賢人之符此實聖徳所致國家之美慶也上曰古人有言天䧏災祥在徳誠使吾徳靡悔災亦可弭茍爽其徳雖祥無福要之國家之慶不專於此也臣若水通曰聞祥瑞則多喜聞災異則多懼多懼則戒慎之念存多喜則驕泰之心縱矣皇祖因五色雲見學士以為美慶乃諭之以災祥在徳然則災曰脩徳祥亦曰脩徳一災一祥皆懲勸成徳之具也惟聖明以法祖敬天為心以脩徳致治為本天下幸甚聖祖改前代司天臺為欽天監臣若水通曰監名欽天表敬天也堯典曰欽若昊天敬授人時人君敬以直内又必齊七政建五行定四時以示天下之臣民使之知氣候之早晩時序之後先以興作寢息焉盖先天而天弗違後天而奉天時敬天之至也是故聖祖於是監改前代司天曰欽天者其敬授人時乃所以敬天也諸司職掌儀部傳制凡大祀前三日陳設如常儀文武官各具朝服詣丹墀拜位鍾聲止儀禮司跪奏請陞殿樂作皇帝御華葢殿具皮弁服出升座樂止鳴鞭訖賛四拜傳制官詣御前跪傳制由東門出至傳制位稱有制賛跪宣制云洪武某年正月某日大祀天地於南郊爾文武百官自某日為始致齊三日當敬慎之臣若水通曰人君之所敬者惟天而已爾於此不用其誠惡乎用其誠我聖祖創制立法凢大祀天地命百官致齋三日君臣上下一於誠敬聖子神孫世守以為家法可謂盡事天之道矣永樂十一年春正月朔日有食之先是禮部以正旦朝賀宴㑹上請太宗皇帝曰古者日食天子素服脩政用謹天戒朕既乖於治理上累三光而衆陽之宗薄食於元旦咎孰甚焉爾文武羣臣尚思勉輔朕躬調爕隂陽消弭災變新正朝賀宴㑹之禮悉罷之臣若水通曰新正朝賀宴㑹大禮也我太宗文皇帝因日食之變輙廢之其自責自艾而敬天之威者至矣宜其受天之福而流慶無疆也聖子神孫其可不法祖宗以事天乎天順四年閏十一月十六日早見月食欽天監失於推算英宗皇帝召學士李賢曰月食人所共見乃失推歩如此因言湯序以侍郎掌監凡有災異隠蔽不言或天文有變必曲為解説甚至書中所載不祥字語多自改削而進遇天文喜事却詳書以聞且朝廷正欲知災異以見上天垂戒庶知脩省而序乃隠蔽如此豈臣下盡忠之道賢曰自古聖帝明王皆畏天變實同聖意序若如此罪可誅也於是下序獄左遷太常少卿臣若水通曰序所謂熒惑主心矯誣上帝者也罪莫大焉我英宗皇帝獨能灼知序之姦至禠職而不貸其敬天之心信乎卓冠羣倫矣格物通卷十四
