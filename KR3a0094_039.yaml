body:
  text: 格物通卷三十九明湛若水撰嚴內外下漢章帝建初四年夏四月有司連據舊典請封諸舅帝以天下豐稔方垂無事癸卯遂封衛尉廖為順陽侯車騎將軍防為潁陽侯執金吾光為許侯太后聞之曰吾少壯時但慕竹帛志不顧命今雖已老猶戒之在得廖等並辭讓願就關內侯帝不許廖等不得已受封爵而上書辭位帝許之臣若水通曰以戚畹而與朝憲固非國家之令典亦非外戚之福也馬氏三舅辭避不已受封爵而辭位就第蓋由廖慮美業難終一念發之也及其享積善履謙之祐亦何負於廖等哉要皆太后德化之所漸染而廖之盛德不可誣也豈若後世以皇戚而肆無厭之求而卒以取敗者哉漢章帝建初八年中郎將竇憲恃宫掖聲勢以賤直請奪沁水公主園田發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙高指鹿為馬久念使人驚怖國家棄憲如孤雛腐鼠爾憲大懼皇后為毁服深謝良久乃得解漢章帝建初八年皇后兄憲為侍中虎賁中郎將弟篤為黃門侍郎並恃宫省賞賜纍積喜交通賓客司空第五倫上疏曰願陛下中宫嚴敇憲等閉門自守無妄交通士夫防其未萌慮於無形令憲永保福祿君臣交歡無纎介之嫌此臣之所至願也臣若水通曰前諸馬爭欲入宫章帝能遂楊仁之嚴拒而不聽其譖今明知竇憲奪沁水之田指鹿為馬而不終究及諸竇又得以並恃宫省妄通賓客而不能禁何耶豈前則明於公義後則溺於私愛也歟然而終貽外戚之禍實非忠愛之道也欲嚴內外者尚鑒之哉漢章帝章和二年春正月帝崩太子即位年十歲尊皇后曰皇太后三月太后臨朝竇憲兄弟皆在親要之地憲客崔駰以書戒憲曰傳曰生而富者驕生而貴者傲今寵祿初隆百僚觀行豈可不庶幾夙夜以永終譽乎昔馮野王以外戚居位稱為賢臣近陰衛尉克已復禮終受多福漢興以後迄于哀平外家二十保族全身四人而已書曰監于有殷可不慎哉漢和帝永元九年閏月辛巳皇太后竇氏崩甲子追尊母梁貴人為皇太后追封梁竦為褒親愍侯封子棠為樂平侯棠弟雍為乘氏侯雍弟翟為單父侯位皆特進梁氏自此盛矣臣若水通曰竇氏之禍起於太后之臨朝梁氏之禍起於三侯之並封可以為內外不嚴之覆轍矣然和帝以幼沖能誅竇氏之惡而不能禁梁氏之禍於未萌豈欲故害之也溺愛不明爾漢殤帝延平元年八月鄧太后詔告司隸校尉河南尹南陽太守曰每覽前代外戚賓客濁亂奉公為民患苦咎在執法怠懈不輒行其罰故也今車騎將軍隲等雖懷敬順之志而宗門廣大姻戚不少賓客姦猾多干禁憲其明加檢敇勿相容護自是親屬犯罪無所假貸臣若水通曰鄧氏此詔雖有感於竇氏之敗要亦自讀書中來也然稱制終身號令自出亂內外之政長諸鄧之惡何耶太后徒號讀書而不能知內外二字雖多亦奚以為此史氏所以譏之也漢順帝陽嘉元年春正月立貴人梁氏為皇后后父商加位特進頃之拜執金吾二年三月封商子冀為襄邑侯尚書令左雄諫曰梁冀之封事非機急宜過災厄之運然後平議可否六月帝問以當時之敝為政所宜李固對曰宜令步兵校尉冀及諸侍中還居黃門之官使權去外戚政歸國家臣若水通曰梁氏之權至此始盛左雄李固言之而帝不悟其漸將有不可制者矣如二臣之言則國家無弒逆之禍而梁氏亦無赤族之誅豈不兩全也哉漢質帝本初元年沖帝立尊梁后為皇太后臨朝沖帝尋崩復立質帝質帝少而聰慧嘗因朝會目梁冀曰此跋扈將軍也冀聞深惡之閏月甲申冀使左右置毒於煮餅而進之帝苦煩而崩冀迎蠡吾侯志即皇帝位時年十五太后猶臨朝政臣若水通曰梁氏弒君之禍由太后臨朝踰內外之禮執纍世之權為之也且春秋之義臣弒其君凡在官者殺無赦梁冀弒君之賊法所必誅而朝臣縮舌太后甘心雖賴桓帝誅之然不能正其不赦之罪吁可嘆也哉漢桓帝永康元年桓帝崩無嗣竇后為皇太后臨朝䇿立解瀆亭侯宏是為靈帝太后父大將軍武謀誅宦官中常侍曹節等殺武遷太后於南宫漢靈帝中平六年帝崩皇子辨即位尊何后為皇太后臨朝后兄大將軍進欲誅宦者反為所害後董卓專政遷太后於永安宫為所弒臣若水通曰後漢皇后紀云主幼時艱必委成冢宰簡求忠賢未有專任婦人斷割重器漢權歸女主外立者四帝臨朝者六后莫不定䇿帷帟委事父兄貪孩童以久其政抑賢明以專其威臣按四帝安質桓靈也六后竇鄧閻梁竇何也嗚呼既以中壼而預國政又以外家而攬朝權卒之並嬰禍敗也宜矣尚鑒兹哉魏文帝黃初三年詔曰婦人與政亂之本也自今以來羣臣無得奏事太后后族之家不得輔政臣若水通曰太后與政后族輔政二者交濟其惡而亂成矣其在春秋毋使婦人預國事魏文無足取者而此詔合春秋之大義保國保家之令典也豈可以人廢言哉梁武帝普通六年魏太后頗事裝飾數出遊幸元順面諫曰禮婦人夫沒自稱未亡人首去珠玉衣不文采陛下母臨天下年垂不惑修飾過甚何以儀刑後世太后慚而還宫召順責之曰千里相徵豈欲衆中見辱耶順曰陛下不畏天下之笑而恥臣之一言乎臣若水通曰元順之諫可謂切直矣然不以古人男女內外之禮正其出遊之非而徒論其裝飾女事之末所謂放飯流啜而問無齒決者非耶宜乎不能服后之心也使知內外之禮則防間嚴而出幸息婦容之事在所不必論也梁武帝天監十五年魏胡太后數幸宗戚勳貴之家侍中崔光表諫曰禮諸侯非問疾弔喪而入諸臣之家謂之君臣為謔不言王后夫人明無適臣家之義夫人父母在有歸寧沒則使卿寧漢上官皇后將廢昌邑霍光外祖也親為宰輔后猶御武帳以接羣臣示男女之别也今帝族方衍勳貴增遷祗請遂多將成彛式願陛下簡息遊幸則率土屬賴含生仰悅矣臣若水通曰男女有别而後家道正天下之事可從而理胡后以正位之尊而下幸勳舊之室甚哉其不正也前有元順之諫而徒慙今有崔光之諫而不悟未幾穢德彰聞彼既自賊其子人亦共殺其身而魏之天下因亦亂矣嗚呼其可戒哉隋文帝開皇十一年二月吐谷渾可汗世伏立使其兄子無素奉表稱藩并獻方物請以女備後庭上謂無素曰若依來請他國聞之必當相效何以拒之朕情存安養各令遂性豈可聚斂子女以實後宫乎竟不許臣若水通曰四夷者又天下內外之大間也故聖人之教嚴焉奉職修貢禮之常也無故獻女非禮之誘也故責之以禮則中國尊貪其非誘則外夷慢中外之防孰大於是為人君者不可以不謹唐中宗神龍元年桓彥範上表以為易稱無攸遂在中饋貞吉書稱牝雞之晨惟家之索伏見陛下每臨朝皇后必施帷幔坐殿上預聞政事竊觀自古帝王未有與婦人共政而不破國亡身者也且以陰乘陽違天也以婦陵夫違人也伏願陛下覽古今之戒以社稷蒼生為念令皇后專居中宫治陰教勿出外朝干國政臣若水通曰易女正位乎內男正位乎外禮男不言內女不言外故王率公卿大夫士以聽陽政后率妃嬪夫人以理陰政中宗每臨朝皇后必施帷幔預政是廢男女內外陰陽之大間矣此彥範所以直諫而不避也唐中宗神龍二年四月處士韋月將上書告武三思潛通宫掖必為逆亂帝大怒命斬之黃門侍郎宋璟固執不奉詔蘇珦等皆以為方夏行戮有違時令帝乃命與杖流嶺南過秋分一日平曉廣州都督周仁軌斬之唐中宗景龍四年四月定州人郎岌上言韋后宗楚客將為逆亂韋后白帝杖殺之五月許州司兵參軍燕欽融復上言皇后淫亂干預國政宗族強盛安樂公主武廷秀宗楚客圖危宗社帝召欽融面詰之欽融頓首抗言神色不撓帝默然宗楚客矯制令飛騎撲殺之投於殿庭石上折頸而死楚客大呼稱快帝雖不窮問意頗怏怏不悅由是韋后及其黨始憂懼臣若水通曰莫大之禍起於一念之不忍羞惡之心誰則無之中宗不忍於韋后之愛三思廷秀楚客得以出入禁庭而不能制親為點籌而不知恥及穢德彰聞又不忍私愛而殺月將之直言又不忍聽韋后而殺郎岌又不忍遂使楚客等得矯制殺欽融而不問至是徒怏怏不悅而亡身亂國之禍至矣語曰小不忍則亂大謀惟其不忍故棄先王內外之大防一至於此極也嗚呼帝之愚惑不足論矣仁軌獨非夫人之子歟何其無人心也唐穆宗長慶四年春正月庚午上疾復作壬申大漸命太子監國宧官欲請郭太后臨朝稱制太后曰昔武后稱制幾危社稷我家世守忠義非武氏之比也太子雖少但得賢宰相輔之卿輩勿預朝政何患國家不安自古豈有女子為天下主而能致唐虞之理乎取制書手裂之臣若水通曰郭太后此言深明先王內外之禮懲戒纍朝稱制之非真可為萬世母后之龜鑑矣唐稱賢后孰有過於郭太后者哉後唐莊宗同光元年前蜀王王衍以文思殿大學士韓昭內皇城使潘在迎武勇軍使顧在珣為狎客陪侍遊宴與宫女雜坐或為豔歌相唱和或談嘲謔浪鄙俚褻慢無所不至蜀主樂之臣若水通曰男女無别亂亡之道也不以為恥而反以為樂豈蜀主果無羞惡之心哉孟子曰樂其所以亡者蜀主之謂也嗚呼本心一失其顛倒錯亂一至於此史稱其有陳後主之風是矣有國家者可不戒哉宋仁宗天聖七年帝每以歲且冬至率百官上太后壽于會寧殿遂同御大安殿以受朝祕閣校理范仲淹上疏曰天子奉親于內自有家人禮今顧與百官同列北面而朝虧君體損主威非所以垂法後世也疏入不報臣若水通曰禮家無二主國無二王奉親上壽者家人之禮也百官北面者朝廷之禮也家人之禮行於家內政也故人子得以伸無二主之敬朝廷之禮行於國外政也故天子得以享無二王之尊仁宗乃欲與羣臣同列上壽太后是二王矣亦豈所以尊太后乎悖經失禮莫此為甚仲淹之言亦不見報仁宗賢君也他尚何望哉宋高宗建炎三年禁內侍干預朝政詔內侍不得與主兵官交通及饋遺假貸借役禁軍干預朝政外官非親戚亦不得往還如違並行軍法臣若水通曰建炎之令可謂內外人已兼盡者矣禁內侍不得預朝政者所以治內也禁外官不得通內侍者所以治外也治內非病內也使不預政則無敗事乃保全其福爾治外非病外也使不交通則無玷行乃保全其德爾內外不亂則朝廷自正而安富尊榮享無疆之休故曰內外人已兼盡者也雖然高宗此令固善矣而使姦檜專制國命殺忠良虧元氣而宋祚日以就亡豈減於內侍預政之禍哉宋儒楊時述曽肇奏疏有曰伏見太皇太后聽政以來止於延和殿垂簾視事受契丹人使朝見亦止御崇政殿未嘗出踐外朝蓋外朝天子之正寧太皇太后崇執謙德不欲臨御以為天下後世法臣若水通曰延和崇政非外朝也外朝天子南面以聽天下之所也髙太后知內外之分如天地陰陽之不可易不敢以或違嗚呼賢哉國朝洪武十七年七月丁酉敕內官毋預外事凡諸司毋與內官監文移來往上謂侍臣曰為政必先謹內外之防絶黨與之私庶得朝廷清明紀綱振肅前代人君不鑒於此縱宦侍與外臣交通覘視動靜夤緣為姦假竊威柄以亂國家其為害非細故也間有發奮欲去之者勢不得行反受其禍延及善類漢唐之事深可嘆也夫仁者治于未亂知者見于未形朕為此禁所以戒未然爾臣若水通曰內外之防乃天地之大義陰陽之大分不可紊焉者也我皇祖敕內官毋預外事諸司毋通內官雖所以絶覘視杜夤緣振紀綱清朝廷亦所以懲前代內外之禍而欲兩全其福祿也夫仁者圖治於未亂智者見禍於未形非我皇祖體仁智之至者曷足以及此惟聖子神孫其永鑒于兹哉洪武十八年九月庚午上御華蓋殿文淵閣大學士朱善講周易至家人上曰齊家治國其理無二使一家之內長幼內外盡其分事事循理則一家治矣一家既治達之一國以至天下亦舉而措之爾朕觀其要只在誠實而有威嚴誠則篤親愛之恩嚴則無閨門之失善對曰誠如聖諭臣若水通曰家人者治家之道也在易家人彖曰男女正天地之大義也此我聖祖嚴之謂乎其九五象曰王假有家交相愛也此我聖祖誠實親愛之謂乎是則家人之道不在易而在聖祖之心矣夫惟嚴以涖之愛以結之而後齊家之道盡嚴愛皆出於心也伏惟聖明體而行之則家齊國治而天下平矣幸甚國朝祖宗於門禁出入其法最嚴每四孟享太廟夜間出鑰於門隙早朝亦於御前奏知各門監守官及各衛官軍遇有出入者必須有牌面方許其入逮其出也必搜檢之其入也不許携寸鐵其出也不許帶一物臣若水通曰此祖宗嚴宫禁之良法也夫宫禁之嚴閨門之約束也閨門之道治化之根本也是故古先哲王罔不於斯而致謹焉致謹於斯猶或有穢德亂正者況不嚴於斯乎此我祖宗宫禁立法之至意也然欲嚴於此者必嚴於心心苟放肆無嚴禁之不弛矣可不戒哉格物通卷三十九
