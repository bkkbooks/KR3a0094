body:
  text: 格物通卷六十五明湛若水撰舉措三隋文帝開皇十九年九月以太常卿牛𢎞為吏部尚書𢎞選舉先德行而後文才務在審慎雖致停緩其所進用並多稱職吏部侍郎高孝基鑒賞機悟清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之唯𢎞深識其真推心委任隋之選舉得人於斯為最臣若水通曰古之才德合而為一故八元八凱謂之才子孔子稱才難不其然乎後世德與才判而為二故稱其德者以為未必可致用而有文才者不必求其德也孔子曰如有周公之才之美使驕且吝其餘不足觀也已易曰貞固足以幹事夫貞固德也而有幹事之才矣驕吝無德者也雖有周公才美不足觀故君子不謂之才矣嗚呼才德異而天下無全人也故用人者主德行而才能在其中矣今人才陶鎔於國家之化久矣其德行之士世未嘗無之司銓衡者擇之僚寀居僚寀者擇之選舉則賢者在位能者在職雍熙和平之治豈不與三代比隆耶唐髙祖武德九年九月房玄齡嘗言秦府舊人未遷者皆嗟怨上曰王者至公無私故服天下之心當擇賢才而用之豈以新舊為先後邪必也新而賢舊而不肖安可捨新而取舊乎今不論其賢不肖而直言嗟怨豈為政之體乎臣若水通曰爵賞者天子馭天下之術不可以私情與之也與以私情則爵賞者非天命有德矣書曰任官惟賢位事惟能太宗以之以玄齡之賢且有此言幾敗乃公事矣太宗貞觀二年上謂魏徵曰為官擇人不可造次用一君子則君子皆至用一小人則小人競進矣對曰天下未定則專取其才不考其行喪亂既平非才行兼備不可用也臣若水通曰易云開國承家小人勿用用人惟以純德君子耳豈論未定與既平邪程皓曰才與誠一則周天下之治天下豈有無行之才哉才與行分此世之所以無真儒矣後世以治煩劇者為才謹踐履者為行而才行始二矣安有才行二而可以言學乎其所謂才行者各成於氣質之近而無學問變化之道此二者所以判而二之也噫魏徵非知聖學者其為此對無足怪矣貞觀二年十一月太宗曰為朕養民者惟在都督刺史朕嘗疏其名於屏風坐卧觀之得其在官善惡之迹皆注於名下以備黜陟縣令尤為親民不可不擇乃命內外五品以上各舉堪為縣令者以名聞臣若水通曰都督臨刺史刺史臨縣令縣令近民民之安否治亂之所由生也故刺史縣令不可不察也但患其逺於君而無以察之耳太宗疏都督刺史之名於屏風而注其善惡之迹以黜陟之至於縣令則命五品以上各舉其人焉則都督刺史縣令之賢否日寓於目日聞於耳舉措無有不當是都督刺史縣令下親於民上親於君所謂天威不違咫尺而各勉於善而懲其惡民安而天下治矣方今聖明以知府為重而令三品以上各舉其賢者任之天下皆有樂得其父母之幸矣但知縣尤為近民不能不厪聖念若與知府通行之法太宗疏名屏風故事推而上之至於公卿亦然則上有以察乎下而不忽下畏上之察而不敢肆賢才修職而天下豈有不舉之政哉貞觀三年閏月濮州刺史龎相夀坐貪汚解任自陳嘗在秦王幕府上憐之欲聽還舊任魏徵諫曰秦王左右中外甚多恐人人皆恃恩私足使為善者懼上欣然納之謂相夀曰我昔為秦王乃一府之主今居大位乃四海之主不得獨私故人大臣所執如是朕何敢違賜帛遣之相夀流涕而去臣若水通曰魏徵之諫有見於人之多寡無見於賞罰一人而千萬人之知勸懲太宗之言有見於事之是非無見於心之邪正惟仁人能愛惡人也夫相夀之貪汚可惡也徇幕府之舊而容惡以暴民仁者固如是乎是雖有感於魏徵之諫而曰不敢違焉夫仁人之心至公無私非不敢違於人也不能違於心也人君反求諸心之公則舉措鮮不當矣豈待人言而改之邪貞觀七年十一月壬辰以開府儀同三司長孫無忌為司空無忌固辭曰臣忝預外戚恐天下謂陛下為私上不許曰吾為官擇人惟才是與茍或不才雖親不用襄邑王神符是也如其有才雖讎不棄魏徵等是也今日所舉非私親也臣若水通曰臣之事君不恃於親者忠也君之用賢不疑於親者公也有如無忌之賢太宗任之不疑固也乃若吕王之輩而假其權漢之危岌岌矣故富貴其身而不與以大政乃我國家親親之仁保全之義兼得之矣貞觀九年十一月以光祿大夫蕭瑀為特進復令參預政事帝曰武德六年以後髙祖有廢立之心而未定我不為兄弟所容實有功髙不賞之懼斯人也不可以利誘不可以死脅真社稷臣也因賜瑀詩曰疾風知徑草板蕩識誠臣臣若水通曰記稱好而知其惡惡而知其美者天下鮮矣蕭瑀當將欲易儲之際不以利誘死脅可謂忠正矣宜為太宗所惡及登帝位反以是取瑀可不謂惡而知美者邪獨惜廢立之事未定而利害之決攸存瑀也不能以太伯勸建成而帝無叔齊之清也遂致蹀血禁門慚德彰著矣噫貞觀十一年馬周上疏曰百姓所以治安惟在刺史縣令茍選用得人則陛下可以端拱無為今朝廷惟重內官而輕州縣之選所以百姓未安殆由於此疏奏上稱善久之謂侍臣曰刺史朕當自選縣令宜詔京官五品已上各舉一人臣若水通曰刺史縣令民之父母一失其人民受其殃太宗納馬周之説而鄭重其選矣獨謂刺史朕當自選何邪孟子曰左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢而後察之見賢焉然後用之博訪於人而決斷於獨夫然後庶幾賢人可得也太宗所謂自選者焉知其不溺於私也哉貞觀十一年魏徵曰今陛下立政致治必委之君子事有得失或訪之小人其待君子也敬而疏遇小人也輕而狎狎則言無不盡疏則情不上通夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠猶未免有敗况內懷姦宄其禍豈不深乎夫雖君子不能無小過茍不害於正道斯可略矣既謂之君子而復疑其不信何異立直木而疑其影之曲乎陛下誠能慎選君子以禮信用之何憂不治不然危亡之期未可保也臣若水通曰內君子而外小人則為泰內小人而外君子則為否待君子也雖敬而疏亦所謂外之也遇小人也雖輕而狎亦所謂內之也此魏徵所以進諫而有危亡之慮乎唐髙宗上元元年劉曉上疏論選以為今選曹以檢勘為公道書判為得人殊不知考其德行才能况書判借人者衆矣又禮部取士專用文章為甲乙故天下之士皆捨德行而趨文藝有朝登甲科而夕陷刑辟者雖日誦萬言何關理體文成七步未足化人况盡心卉木之間極筆煙霞之際以斯成俗豈非大謬夫人之慕名如水趨下上有所好下必甚焉陛下若取士以德行為先文藝為末則多士雷奔而四方風動矣臣若水通曰成周取士先六德六行而後及於六藝劉曉德器為先文藝為末之言有先王之遺法也古今選舉之法惟聖明審焉髙宗永淳元年四月魏玄同上言銓選之弊以為人君之體當委任而責成功所委者當則所用者自精矣故周穆王命伯冏為太僕正曰慎簡乃僚是使羣司各求其小者而天子命其大者也乃至漢氏得人皆自州縣補署五府辟召然後升於天朝自魏晉以來始專委選部夫以天下之大士人之衆而委之數人之手用刀筆以量才案簿書而察行借使平如權衡明如水鏡猶力有所極照有所窮况所委非人而有愚暗阿私之弊乎願略依周漢之規以救魏晉之失疏奏不納臣若水通曰銓選之善周為上漢次之魏晉專任選部固不能無弊矣孔子曰舉爾所知爾所不知人其舍諸成周之法各舉其僚以天下之聰明為聰明也漢法由自辟而升猶為近古至於一任選部是以一人之聰明盡天下之聰明雖聖哲亦有所不能誠如玄同之論矣而帝不之納惜哉後之用人者宜考於斯焉中宗嗣聖八年薛謙光上疏以為選舉之法宜得實才取舍之間風化所係要在文吏察其行能武吏觀其勇略考居官之職否行舉者賞罰而已臣若水通曰薛謙光之説一行則司銓衡者黜陟不視為虛文為人才者進退有關於實政仕路清而奔競之風息考核嚴而尸素之習逺治化烏有不成者哉惜乎女主姦政之朝不能信用其言也玄宗天寶十二載中書舍人宋昱知選事前進士廣平劉乃以選法未善上書於昱以為禹稷臯陶同居舜朝猶曰載采采有九德考績以九載近代主司察言於一幅之判觀行於一揖之間何古今遲速不侔之甚哉借使周公孔子處今銓廷考其辭華則不及徐廋觀其利口則不若嗇夫何暇論聖賢之事業乎臣若水通曰察言於一判觀行於一揖選法之莫不善於此者也使宋昱能用斯言慎重銓選何用人之不當哉慎選舉者宜察之代宗廣德元年六月禮部侍郎楊綰上疏論進士明經之弊請令縣令察孝廉取行著鄉閭學知經術者薦之於州刺史考試升之於省任各占一經朝廷擇儒學之士問經義二十條對䇿三道上第即注官中第得出身下第罷歸左丞賈至議以為自東晉以來人多僑寓士居鄉土百無一二請兼廣學校保桑梓者鄉里舉焉在流寓者庠序推焉勑禮部具條目以聞七月綰上貢舉條目秀才問經義二十條對䇿五道國子監舉人令博士薦於祭酒試通者升之於省如鄉貢法明法委刑部考試或以為明經進士行之已久不可遽改事雖不行識者是之臣若水通曰成周之教與其取士之法一而已矣故或以德行或以道藝或以行舉或以言揚其所謂德行者德乎其所謂道藝言揚者業乎德業舉業合一其亦猶古之道也故二者不可偏廢也德業而舉之以文則猶源泉之水放之四海而不竭徒舉業者所謂溝澮之水耳矣故不易業而進於德者舉業也不易志而有助於舉者德業也綰之斯奏實欲兼焉而或者沮之唐之不幸也雖然又在主選者之明且公耳茍得公且明者主之則先王之德行道藝之化將見於今矣何其幸代宗大歷十四年八月沈既濟上選舉議以為選用之法三科而已曰德也曰才也曰勞也今選曹皆不及焉考校之法皆在書判簿歷言詞俯仰而已夫安行徐言非德也麗藻芳翰非才也纍資積考非勞也執此以求天下之士固未盡矣今人未土著不可本於鄉閭鑒不獨明不可專於吏部臣謹詳酌古今謂五品以上及羣司長官宜令宰臣進敘吏部兵部得參議焉其六品以下或僚佐之屬許州府辟用其牧守將帥或選用非公則吏部兵部得察而舉之罪其私冒不慎舉者小加譴黜大正刑典責成授任誰敢不勉夫如是則賢者不奬而自進不肖者不抑而自退衆才興起而官無不治矣臣若水通曰曰德曰才曰勞選用之三科也其成周之德行道藝虞廷之三載考績之意乎唐之選曹考校知不及此欲其得人也難矣此沈既濟所以建選舉之議也後之人君果能本之三科責成慎舉則君子自進小人自退百官治而萬事理矣天下其有不平哉大歷十四年十二月德宗問為政之要關播對曰為政之本必求有道賢人與之為理上曰朕比已下詔求賢又遣使臣廣加搜訪庶幾可以為理乎對曰下詔所求及使者所薦惟得文詞干進之士耳安有有道賢人肯隨牒舉選乎上悅臣若水通曰為政固當求有道賢人也然必人君致敬盡禮尊德樂道乃可得之非下詔遣使可致也下詔遣使而惟文詞干進之求此有道賢人之所以不至也代宗能悅關播之言而不能繹惜哉德宗貞元十年夏四月陸贄上奏其略曰夫登進以懋庸黜退以懲過二者迭用理如循環進而有過則示懲懲而改修則復進既不廢法亦無棄人惟纎芥必懲而用材不匱故能使黜退者克勵以求復登進者警飭而恪居上無滯疑下無蓄怨臣若水通曰用人之道公而已矣進而有過則懲懲而改過則復進進退在彼已何與焉若有一毫芥蒂于其間非大公之道也雖然陸贄此疏為德宗猜忌而言耳若夫進賢如不得已盡左右大夫國人之公然後察則用無非人矣非謂用人者必伺其有過而退退而改過而復進也德宗貞元十年帝性猜忌不委任臣下官無大小必自選而用之宰相進擬少所稱可羣臣一有譴責往往終身不復收用好以辨給取人不得敦篤之士艱於進用羣材淹滯陸贄上疏諫其略曰以一言稱愜為能而不核虛實以一事違忤為咎而不考忠邪其稱愜則付任逾涯不思其所不及其違忤則罪責過當不恕其所不能是以職司之內無成功君臣之際無定分帝不聽臣若水通曰孔子告仲弓曰先有司赦小過舉賢才三者為政之要務也雖為為宰告而治天下之道不外乎此矣德宗之進擬少可不先有司矣一譴不用不赦小過矣不進敦朴之才不舉賢才矣夫其甘於違背而不自惜者何也良由學問之功不加而以氣質用事故耳使其玩索涵養以體認於心身則聰明可發氣質可變以之治天下則舉措得人庶事康而庶績熙矣故曰明君以務學為急惟聖明念之憲宗元和七年帝嘗於延英謂宰相曰卿輩當為朕惜官勿用之私親故李吉甫權德輿皆謝不敢李絳曰崔祐甫有言非親非故不諳其才諳者尚不與官不諳者何敢復與但問其才器與官相稱否耳若避親故之嫌使聖朝虧多士之美此乃偷安之臣非至公之道也茍所用非其人則朝廷自有典刑誰敢逃之帝曰誠如卿言臣若水通曰人主之職在論相而己相而果賢則所舉雖親必賢所措雖讎必不肖茍非其人不肖以親而舉賢以讎而措人主何所賴哉易曰方以類聚物以羣分又曰同聲相應同氣相求非親故乎不察乎此而徒以舉措責諸相亦未矣噫堯明峻德而後用舜舉元凱措四凶武王亶聰明而後用周公握髮吐哺以勞天下之士善論相者盍亦反其本與周世宗顯德四年冬十月戊午設賢良方正直言極諫經學優深可為師法詳間吏理達於教化等科臣若水通曰五代之時取士之法不行久矣周世宗獨舉而行之其知為治之要者歟此五代之治所以莫盛於世宗之朝也然其曰文理優長人物爽秀則亦為取人之疵耳賈誼新書曰王者官人有六等一曰師二曰友三曰大臣四曰左右五曰侍御六曰厮役與師為國者帝與友為國者王與大臣為國者伯與左右為國者強與侍御為國者若存若亡與厮役為國者亡可立待也臣若水通曰賈誼官人六等之差誠確論也夫師者以道道者大同也友者以德德者大化也大臣者以功功者伯道也左右者科科者富強而已侍御厮役固不足與議之矣然則為人君圖天下之治者將自擇於何者哉劉向説苑樂羊為魏將以攻中山中山懸其子以示樂羊樂羊不為衰志攻之愈急中山因烹其子遺之樂羊食之盡一杯中山見其誠也不忍與之戰果下之遂為魏文侯開地文侯賞其功而疑其心孟孫獵得麑使秦西巴持歸其母隨而鳴秦西巴不忍縱而與之孟孫怒而逐秦西巴居一年召以為太子傅左右曰西巴有罪於君今以為太傅何也孟孫曰夫以一麑而不忍又將能忍吾子乎臣若水通曰孟子稱不信仁賢則國空虛以言當急於用仁賢也西巴不忍之心及於麑可謂仁矣樂羊貪功而殺其子可謂仁賢乎當時之君惟以是而定賞罰則足以勸天下之仁賢矣賞而疑罪而用之何賞罰之不明而舉措之不正耶説苑齊景公出獵上山見虎下澤見蛇歸召晏子而問之曰今寡人出獵上山則見虎下澤則見蛇殆所謂不祥也晏子曰國有三不祥是不與焉夫有賢而不知一不祥知而不用二不祥用而不任三不祥也臣若水通曰孟子言不祥之實蔽賢者當之又曰不用賢則亡彼見虎蛇者常耳若夫不用賢則危亡隨之天下之至不祥莫過於此晏嬰之言得孟子之意矣夫後世之君犯此三不祥者多矣可不懼哉唐陸贄奏議贄告德宗曰君子小人用捨不並國家否泰恆必由之君子道長小人道消於是上下交而萬物通此所以為泰也小人道長君子道消於是上下不交而萬物不通此所以為否也夫小人於蔽明害理如目之有眯耳之有充嘉穀之有蟊梁木之有蠧也是以古先聖哲之立言垂訓必殷勤切至以小人為戒者豈將有意讎而阻之哉誠以其蔽主之明害時之理致禍之源博傷善之釁深所以有國有家者不得不去耳户部侍郎裴延齡者其性邪其行險其口利其志凶其矯妄不疑其敗亂無恥以聚斂為長䇿以詭妄為嘉謀以掊克斂怨為匪躬以靖譛服讒為盡節總典籍之所惡以為智術冒聖哲之所戒以為行能可謂堯代之共工魯邦之少卯伏惟陛下協放勳文思之德而鑒其方鳩僝功體仲尼天縱之明而辨其順非堅偽則天討斯得聖化允孚小往大來孰不欣幸臣若水通曰舉措國之大典治道關焉故夫君子進則為泰小人進則為否否泰之幾安危存亡之兆此固有國者所宜慎也德宗之朝裴延齡方以言利得幸陸贄之賢終以直言見疏舉措若兹危亡之禍豈可免哉格物通卷六十五
