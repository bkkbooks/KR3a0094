body:
  text: 格物通卷八十八明湛若水撰省國費一冗官冗食冗兵冗役附易損曷之用二簋可用享臣若水通曰此文王損卦之彖辭示人於損下益上之時當儉其用也二簋者禮之至薄也享者祭享也言當損之時既損下以益上矣夫既損下而益己則已亦當自損其用然當何所損哉雖二簋之至薄亦可以用於祭享也夫鬼神無常享享於克誠多儀備物以表其誠者也雖多儀而誠不足則神不享矣雖損其物而誠敬益至也則神必享矣故曰曷之用二簋可用享夫於祭祀能損其用如此則其他賓客軍國之用可知矣故於宫室而知損則無峻宇雕牆於飲食而知損則無酒池肉林於征伐而知損則無窮兵黷武凡當損之事皆能損之以節用矣節彖曰天地節而四時成節以制度不傷財不害民臣若水通曰此孔子傳節之彖而極言節之之道也天地一氣之運而節也者隂陽之相推也寒極則節之以暑為春為夏暑極則節之以寒為秋為冬分至啓閉不爽其候而春夏秋冬之四時成矣體天地之節者聖人也人有無窮之欲聖人有一定之節名物器用各循其制度之則故財以給用者有常經而民之輸財有常賦不至於掊克民之膏脂而虐害其下矣是故節之道大矣天地之成歲功聖人之成治功夫豈能外於節也哉詩國風揚之水彼其之子不與我戍申懷哉懷哉曷月豫還歸哉臣若水通曰此平王遣畿內之民以戍申國而戍者怨思之辭也揚悠揚也水緩流之貌彼其之子戍人指其室家而言也戍者屯兵以守也申姜姓之國平王之母家也懷思也詩言彼水之悠揚而室家則不與我而俱往戍於申乎遂懷思不已而嘆其何月而得歸也蓋畿內之民不可戍也平王遣之而逺為申侯以戍守徒知有母而不知有其父知有申侯立己之恩而不知斯民為邦國之本師行而糧食役冗而民勞傷財害民莫甚於此則民心安得而不怨哉後之人君宜以此詩為鑒戒以省役節財為得民保國之計焉可也大雅桑柔維彼惠君民人所瞻秉心宣猶考順其相維彼不順自獨俾臧自有肺腸俾民卒狂臣若水通曰此芮伯刺厲王之詩惠順也順於義理也宣遍也猶謀也相輔也狂惑也古者官不必備惟其人茍非其人而徒備其員則冗矣官冗則食冗以有限之民財而供無益之冗費非生財之道也故詩言維此順理之君秉持其公心以宣遍其謀猶以謹慎考察其輔相之臣其能與否也必衆以為賢者而後用之而所謂冗濫者在所必汰矣彼不惠順義理之君秉心不公為謀不審自是其私見而以為善自有其肺腸而不通衆志於沙汰之法或踈如此事本一人之職或倍之數員此官本不可充位猶姑留在職徒以虛縻廩祿而無益於事所以使民眩惑卒至於狂亂也所謂受若直怠若事又盜若貨器得罪於民者不少矣故欲節冗費者在省冗官爾大雅常武赫赫明明王命卿士南仲太祖太師皇父整我六師以修我戎既敬既戒惠此南國臣若水通曰此宣王自將以伐淮北之夷而親命太師以三公治其軍事也卿士即皇父之官也太祖始祖也曰南仲太祖者稱其世功以美大歆動之也太師皇父之兼官而皇父其字也整治也六師六軍也天子六軍戎兵器也夫國家之事莫重於軍而其費亦莫甚於軍宣王之伐淮夷也赫赫其威明明其整蓋王命卿士有南仲太祖者承世功之藉有太師皇父者整治其從行之六軍選其精鋭汰其冗濫簡其什伍修其器械以除淮夷之亂以惠南國之人焉若宣王可謂深得治兵之法者也此其所以兵不冗食不濫而動有功大振中興之業豈無自而然哉春秋莊公九年冬浚洙臣若水通曰此魯莊畏齊之來侵故浚洙水以備之也洙水名在魯北通齊之路也胡安國曰固國以保民為本輕用民力妄興大作邦本一搖雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足慿而况洙乎書浚洙見勞民於守國之末務而不知本為後戒也臣謂妄興民役則濫費國用匪但搖邦本又將傷其心蠧其根株而邦國隨以滅亡也可不戒哉莊公三十年冬齊人伐山戎臣若水通曰此山戎伐燕齊桓公救之遂往伐焉然則曷為而書譏妄用兵也曷為知其譏也夫山戎燕之外戎也以齊至燕之邊千里之外矣王者不治四裔不窮兵於逺今齊為山戎不職貢於燕之故上無天子之命下無與國之㑹而率意妄興師於千里之逺以伐帝王不治之夷勞中國而事四夷舍近政而貴逺略困吾民之力爭不毛之地其勞人費食有不可勝言者矣後之人君宜以齊侯為戒也莊公三十有一年春築臺于郎夏築臺于薛秋築臺于秦臣若水通曰胡安國云何以書厲民也天子有靈臺以候天地諸侯有時臺以候四時去國築臺於逺而不緣占候是為游觀之所厲民以自樂也厲民自樂而不與民同樂則民欲與之偕亡雖有臺豈能獨樂乎臣謂莊公末年無敵國外患之警肆其崇侈縱欲之心一歲三時築臺于郎于薛于秦者凡三焉其勞民也費時也傷財也亦三失焉春秋書之其譏之不一而足矣夫長府之為重本也閔子猶止之曰何必改作蓋恐其勞民傷財也莊公為民父母不能休養而生息之固已非矣又重以一嵗築臺之三役其何以為民父母哉成公元年三月作丘甲臣若水通曰何以書譏益兵也魯成憂齊難方殷慮武事之未備於是作丘甲以備乎齊焉古者九夫為井四井為邑四邑為丘四丘為甸甸地方八里旁加一里為成所取於民者出長轂一乘此司馬一成之賦也今焉增一甲於一丘之內取百人於一甸之中兵愈冗而食愈費矣故書作以譏之也禮記王制曰冢宰制國用必於歲之杪五穀皆入然後制國用用地小大視年之豐耗以三十年之通制國用量入以為出臣若水通曰古者國用之制於冢宰而用未嘗不足何也隨其凶豐量入以為出今之賦幾倍於古矣而大司農動必告乏何也出入無經故也夫人之常情其資少饒其欲寖廣一旦而荒歉以民力有限之積為情欲無窮之求其何以能支之哉是以民窮而斂急斂急而用益困即有緩急則束手無措必至於僨事矣司國計者尚其念之哉王制曰國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂臣若水通曰蓄積也國非其國者言財不足以守之也一年三年之食謂其餘積如此也通三十年之耕則有九年之蓄矣故雖有水旱民無菜色以其有備也如是則國用長足民生可遂而人君之食乃可下咽天子食日舉以樂者萬物得其所然後和故樂日作焉月令曰收祿秩之不當供養之不宜者臣若水通曰此季秋之令也收謂奪之也祿秩不當謂不應得而濫錫之者供養不宜謂僣侈踰制者夫國用之不足冗食蠧之也人君欲足國用而不去其所以蠧財者而惟財之務是猶以水注漏巵而欲其滿也其可乎故祿秩有定序而於不當者則收之不應得而濫錫之者無有矣供給各有常分而於不宜者則收之而僣侈踰制者無有矣二者既收則國用無冗濫費有常經而財恆足矣我國家今日因秩頒祿固無有不當不宜者矣抑猶或有之則為國用無窮之計誠有仰於聖明之留心逺慮焉月令曰是月也不可以稱兵稱兵必天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀臣若水通曰此孟春之令也稱舉也謂我興兵也不得已而禦冦猶可也若兵自我起是無事而興兵則變天之生道斷地之生理亂人之生事故變天則傷生絶地則傷財亂人則傷力矣其可以不戒乎玉藻曰君無故不殺牛大夫無故不殺羊士無故不殺犬豕臣若水通曰無故者無祭祀賓客享食之事也無故不殺先王節用之禮也又曰年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬臣若水通曰年不順成者隂陽不和故五穀不生也衣布著布衣也士以竹為笏以象飾本搢本者君插士之笏也關梁者關市魚梁年凶免其租稅也山澤之利皆不使之賦凡板築之工皆不舉大夫禁不造車馬皆自貶以省用也夫君相所以燮理隂陽者也隂陽不和百穀不蕃君相之責也故節縮財用使不至於困乏先王之制國用隨其年之豐凶而節之也雜記孔子曰凶年則乘駑馬祀以下牲臣若水通曰先王之於財也視年之凶豐以上下其用仁之至也休戚之極相與流通猶之癢疴疾痛然觸則覺之無所不至國有凶荒則殺其禮所乘者駑駘之馬所祭祀者下品之牲所以順變也其心有不容已焉者以其性之一也性一則情通惟先王為能通天下之情則所存者可識矣若夫民就窮而斂愈急豈所謂仁者損上益下之心哉周禮太宰以九式均節財用一曰祭祀之式二曰賓客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式臣若水通曰此周禮太宰之職也式者用財之節度也均平也喪荒者有喪又年凶也羞者飲食之物也工者作器物也幣帛所以贈勞賓客者也芻秣者養牛馬木穀也匪頒者王所分賜羣臣也好用者燕好所賜豫也然皆有節度焉不得以或過也是故用有常經而取有定制上下皆省矣後世此禮既廢而軍國之用無節至於工事賜豫燕好任其君喜好之情而不以禮則安能節財之流而使財恆足也哉冬官廩人凡萬民之食食者人四釜上也人三釜中也人二釜下也若食不能人二釜則令邦移民就穀詔王殺邦用臣若水通曰此周禮冬官廩人之職也六斗四升曰釜謂之四釜三釜二釜者一月所食之米也而其食不能人二釜者蓋以年之不足也是故為人上者不忍坐視斯民之困而略不加之意於是有救荒之術移民以就都鄙之有粟者又進而告於王凡國之常費一切省用焉所以上回天變下救民窮雖有饑荒而亦不至於困也後世如梁惠王移民就食而使狗彘食人之食是不免於率獸食人豈先王殺邦用之仁哉左傳僖公十九年梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某冦將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁臣若水通曰梁亡者梁國之滅也不書其主者不書取梁者之國名也土功謂營繕城築之事溝公宫謂鑿池而塹其宫也子夏云信而後勞其民未信則以為厲已也梁伯信未孚於民役民以土功難矣況又懼之以冦將襲是又教之以不信矣民以為厲不亡奚待然則秦非亡梁也梁自亡爾僖公二十八年晉侯圍曹三月丙午入曹數之以其不用僖負羈而乘軒者三百人也臣若水通曰數之者數曹之罪僖負羈曹之賢者也軒大夫車也晉數曹不用僖負羈之賢無德而居大夫之位者三百人也夫朝無幸位則食者寡固大學生財之道也曹蕞爾小國其賦入無幾也一僖負羈而不能用乃至乘軒者三百人焉甚矣制祿之無經也國欲不貧得乎晉文公入而數其罪也宜矣國語晉語史蘇曰昔者之伐也起百姓以為百姓也是以民能欣之故莫不盡忠竭勞以致死臣若水通曰昔者謂古明王也為百姓為百姓除害也欣欣戴也傳曰以佚道使民雖勞不怨先王利用征伐除殘去暴凡以為民也故勞而能忘死不怨殺獻公之伐驪戎是亦不可以已乎又使太子將下軍其賊親罷民莫甚焉為國者宜以為戒士蒍曰古之為軍也軍有左右闕從補之成而不知是以寡敗若以下二上闕而不變敗弗能補也變非聲章弗能移也聲章過數則有釁有釁則敵入敵入而凶救敗不暇誰能退敵臣若水通曰左右左右部也不知者敵不能窺其有闕也聲金鼓也章旌旗也釁隙也軍法進旗鼓有數過數則有隙凶恐懼也退卻也夫軍有左右左右各專則有闕從而補之是以變合無迹敵莫能窺兵之神妙也苟以下軍二上軍則有掣肘有闕而莫知從補則釁彰而敵入豈善治軍者乎晉語公屬百官賦職任功棄責薄斂施舍分寡救乏振滯匡困資無輕關易道通商寬農茂穡勤分省用足財臣若水通曰屬㑹也賦授也授職事任有功也棄責除其宿責也施施德也舍舍禁也分寡分少財也救乏救乏絶也振拯也拯淹滯之士也匡正也正窮困之人也輕關輕其關稅也易道除盜賊也寬農寬其政不奪其時也秦伯納衛三千人實紀綱之僕而省費之道無弗具焉且國何以用曰財財何以充曰儉苟費出無經則公私並耗國求其植得乎故善理財者去不急之官省無益之費而冗兵冗役一切檢制然後用舒而財足也君天下者可不以是為首務乎魯語仲尼曰任力以夫而議其老幼於是乎有鰥寡孤疾有軍旅之出則征之無則已臣若水通曰力謂徭役以夫以夫家為數也議其老幼老幼則有復除也又議其鰥寡孤疾而不役也征徵鰥寡孤疾之賦也已止也無軍旅之出則止而不賦夫力役之征聖王所不免而又議其人與力焉征之者義也議之者仁也仁義並行帝王之術也故閭左亡秦景陽亡隋征力於民者可不法仲尼之訓乎格物通卷八十八
