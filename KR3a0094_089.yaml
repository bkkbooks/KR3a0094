body:
  text: 格物通卷八十九明湛若水撰省國費二冗官冗食冗兵冗役附漢武帝元封元年桑𢎞羊領大農盡管天下鹽鐡作平凖之法令逺方各以其物如異時商賈所轉販者為賦而相灌輸置平凖於京師都受天下委輸盡籠天下之貨物貴即賣之賤則買之欲使富商大賈不得牟大利而萬物不得騰踴至是天子巡狩郡縣所過賞賜用帛百餘萬匹錢金以巨萬計皆取足大農臣若水通曰議秦者謂其取之盡錙銖用之如泥砂漢武帝以𢎞羊言利而寵之以賜爵用其計盡籠天下之利與民争利盡錙銖矣及其巡狩所過賞賜幣帛金錢以巨萬計非所謂如泥砂乎然而取之盡則足以斂怨用之費人亦不以為恩向無輪臺之悔漢其為秦乎大學曰長國家而務財用者必自小人矣彼為善之小人之使為國家菑害並至其漢武與𢎞羊之謂乎新莽三年王莽恃府庫之富欲立威匈奴乃遣孫惠等率十二將分道並出嚴尤諫曰匈奴為害所從來久矣未聞上世有必征之者也後世三家周秦漢征之然而未有得上䇿者也周得中䇿漢得下䇿秦無䇿焉今天下比年饑饉北邊尤甚大用民力功不可必臣伏憂之莽不聽臣若水通曰嚴尤三䇿吕祖謙謂其所言誠是也其所與言之人則非也信矣臣愚獨取其所謂未聞上世有必征之者及比年饑饉大用民力之語蓋匈奴可不必征征必師行糧食費多食於饑饉之年與勞民力於萬里之外無一可者也後世好大喜功之君其亦可以為戒哉漢光武建武二年冬十月詔徵鄧禹還曰慎毋與窮冦争鋒赤眉無穀自當來降吾以飽待饑以逸待勞折箠笞之非諸將之憂也無得復妄進兵建武六年六月詔曰張官置吏所以為民也今百姓遭難户口耗少而縣官吏職所置尚繁其令司𨽻州牧各實所部省减吏員縣國不足置長吏者併之於是併省四百餘縣吏職减損十置其一臣若水通曰建武二年之詔罷兵而以飽待饑六年之詔省官而以寡御衆斯二計者皆不易之良圖也其成中興之業光復舊物不亦宜乎夫外無冗兵朝無冗員則所謂食之者寡用之者舒則財恒足矣世祖罷兵省官之詔真可以為人主足國之法矣建武十三年時兵革旣息天下少事文書調役從簡寡至乃十存一焉初平帝時河汴決壞久而不修建武十年光武欲修之浚儀令樂俊上言民新被兵革未宜興役乃止臣若水通曰春秋重民力謹土功光武於兵革旣息之餘調役務從寛簡議修汴河亦以諫止則所以勞民力傷民財者鮮矣其亦仁矣哉建武二十七年五月詔曰務廣地者荒務廣德者彊今無善政災變不息而復欲逺事邊外乎誠能舉天下之半以滅大冦豈非至願苟非其時不如息民自是諸將莫敢復言兵事者臣若水通曰兵凶器戰危事聖人伐罪弔民不得已而用之也無事而興兵則費國家之財戕生民之命可勝言哉若世祖罷邊息民之詔世之窮兵者可以鑒矣漢明帝永平十四年初作壽陵制令流水而已敢有所興作者以擅議宗廟法從事臣若水通曰工役之興與食相為糜費者也明帝作壽陵惟令流水可謂省役以省大費者矣至於滹沱之役豈亦能推其類也乎漢章帝建初三年四月罷治滹沱石臼河初顯宗之世治滹沱石臼河從都慮至羊腸倉欲通漕太原吏民苦役連年無成章帝以鄧訓上言詔罷其役更用驢輦嵗省億萬計全活徒士數千人臣若水通曰滹沱之役死者無算民甚苦之章帝用鄧訓之言罷其役更用驢輦多所全活前可以為戒後可以為法矣章帝建初八年正月欲為原陵顯節陵起縣邑東平王蒼上疏諫曰造無益之功虚費國用帝乃止臣若水通曰書曰不作無益害有益示人不可傷財以害民也夫財者軍國之所賴可謂有益矣章帝欲興大役為原陵顯節陵起縣邑果何益乎賴東平一言而止仁人之言其利溥哉漢殤帝延平元年六月己未太后詔减大官導官尚方内署諸服御珍膳靡麗難成之物自非供陵廟稻粱米不得導擇朝夕一肉飯而已舊大官湯官經用歳且三萬萬自是裁數千萬及郡國所貢皆减其過半悉斥賣上林鷹犬離宫别館儲峙米糒薪炭悉令省之臣若水通曰大官典天子御膳者也導擇也導官掌擇御米者也尚方掌作御刀劒諸器物内署掌内府衣服湯官丞主酒屬大官令臣謂延平一省冗官去靡費遂裁减數千萬郡國减過半則上下皆足而國家可保矣此為人君者之所當法也安帝永初二年春正月御史中丞樊準以郡國連年水旱民多飢困上疏請令大官尚方考功上林池籞諸官食减無事之物五府調省中都官吏京師作者太后從之三年太后以隂陽不和軍旅數興詔歲終享遣衞士勿設戯作樂减逐疫侲子之半臣若水通曰侲善也善童子逐疫之人也災異荐臻隂陽不和之所致也永初二年三年减官役减長物去戯禁樂以寛水旱饑民之困可謂知重民力而不作無益矣抑不知隂陽不和水旱為災皆女主之應耳以鄧后之賢而不能歸政嗣君委任宰輔和人心順天道以消災異祈休祥何明於彼而昧於此耶漢桓帝永壽三年閏月庚辰晦日有食之京師蝗或上言民之貧困以貨輕錢薄宜改鑄大錢事下四府群僚及太學能言之士議之太學生劉陶上議曰當今之憂不在於貨在乎民飢夫欲民殷財阜要在止役禁奪今民衆而無所食群小競進並噬無厭恐卒有役夫窮匠投斤攘臂使愁怨之民響應雲和雖方尺之錢何能有救其危也遂不改錢臣若水通曰衣食之於人大矣人而無食雖父母之至愛不能以保離散之子雖皇羲之純德不能以保愁怨之民豈不可畏也使桓帝能因劉陶之言不但不改錢而已必能止役禁奪則民殷財富而國可安矣惜乎其不足以語此桓帝延熹六年冬十月丙辰上校獵廣成遂幸函谷闗上林苑光禄勲陳蕃上疏諫曰安平之時遊畋宜有節况今有三空之戹哉田野空朝廷空倉庫空加之兵戎未輯四方離散又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非聖賢恤民之意也書奏不納臣若水通曰遊獵禽荒也冗役也桓帝當三空兵亂之時乗農田種藝之候肆其遊獵而不知恤民欲國之不亂亡得乎書之以為人君侈費之戒漢靈帝光和三年十二月作罼圭靈昆苑司徒楊賜諫止帝以問侍中任芝樂松對曰昔文王之囿百里人以為小齊宣王四十里人以為大今與百姓共之無害於政也帝悦遂為之臣若水通曰靈帝與文王之囿所謂天理人欲同行異情者矣文王經始勿亟庶民子來靈帝免於民怨乎文王之囿以蕃草木鳥獸芻蕘雉兔者往焉靈帝之囿遊觀而已寧免以麋鹿而殺人乎楊賜之諫帝欲止役而卒為之者芝松二臣妄引古義以逢君之惡以殃民者也豈容於堯舜之世哉雖然崇侈縱奢而不恤民食者亦帝之心素蠱矣二臣特巧中其欲耳人怨天譴何所逃哉晉武帝咸寧五年十二月詔問朝臣政之損益長史傅咸上書以為公私不足由設官太多舊都督有四今并監軍乃盈於十禹分九州今之刺史幾向一倍户口比漢十分之一而置郡縣更多虚立軍府動有百數而無益宿衞五等諸侯坐置官屬諸所廩給皆出百姓此其所以困乏也當今之急在并官息役上下務農而已臣若水通曰傅咸此書切中時弊矣夫官多則民擾役重則民困朝廷設官分職本以為農民也而反冗官冗役以病農如此而望天下之治可得乎咸寧五年十二月又議省州郡縣吏半以赴農功中書監荀朂以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清静民以寧一所謂清心也抑浮説簡文案略細苛宥小失有好變常以徼利者必行其誅所謂省事也以九寺併尚書蘭臺付三府所謂省官也臣若水通曰荀勗省吏省官省事清心之説善矣昔者禹為司空兼任百揆一人而兼任四岳當時之事亦無不治正以能清心故也第惜勗知清心之説而不知聖賢精一執中為清心之道乃以蕭何清静當之由學之不講也晉惠帝永寧元年嵇紹與齊王冏書曰唐虞茅茨夏禹卑宫今大興第舍及為三王立宅豈今日之急耶臣若水通曰唐虞夏禹當豐亨之盛而猶儉於用財而不敢侈晉之時何時也奸臣擅權兄弟相殘兵戈四起天下民窮財盡極矣而冏猶營造不已糜財困民而不恤雖以稽紹之言而不知禁止此所以卒至敗也歟晉愍帝建興元年三月漢主聰欲作䳨儀殿廷尉陳元達切諫以為天生民而樹之君使司牧之非以兆民之命窮一人之欲也晉氏失德大漢受之蒼生引領庶幾息肩是以先文皇帝身衣大布居無重茵后妃不衣錦綺乗輿馬不食粟愛民故也陛下踐阼以來已作殿觀四十餘所加之軍旅數興餽運不息饑饉疾疫死亡相繼而益思營繕豈為民父母之意乎臣若水通曰同一財也散之於下則為兆民之命聚之於營作則供一人之欲而已一人之欲無窮兆民之命有限幾何而不怨以叛乎劉聰暴虐不足與圖存者其窮奢極欲所謂安其危利其災樂其所以亡者乎元達之言後之人君所當戒也元帝太興四年張茂築靈均臺基高九仞武陵閻曽夜叩府門呼曰武公遣我來言何故勞民築臺有司以為妖茂曰吾信勞民曾稱先君之命以規我何謂妖乎乃為之罷役臣若水通曰勞民築臺此冗役也冗役必有大費民之膏脂竭矣閻曽託武公以為諫權而不失正者也張茂聞言即止其庶幾能補過者乎晉明帝大寧三年十二月凉州將辛晏據枹罕不服張駿將討之從事劉慶諫曰霸王之師必須天時人事相得然後乃起辛晏凶狂安忍其亡可必奈何以饑年大舉盛寒攻城乎駿乃止晉穆帝永和元年燕參軍封裕上疏謂今官司猥多虚費廩禄茍才不周用皆宜澄汰臣若水通曰冗兵冗官皆國家之大蠧也劉慶之諫駿乃息兵封裕上疏虚禄沙汰冗費去而國用舒矣亦曰有利哉宋武帝大明二年二月魏以髙允為中書令魏起太華殿給事中郭善明性傾巧説帝大起宫室髙允諫曰太祖始建都邑其所營立必因農隙况建國已久永安前殿足以朝㑹西堂温室足以宴息紫樓足以臨望縱有修廣亦宜馴致不可倉猝今計所當役凡三萬人老弱供餉又當倍之期半年可畢一夫不耕或受之飢况四萬人之勞費可勝道乎此陛下所宜留心也帝納之允好切諫朝廷事有不便允輒求見帝常屛左右以待之或自朝至暮或連日不出群臣莫知其所言語或痛切帝所不忍聞命左右扶出然終善遇之臣若水通曰魏文成一納髙允之諫而所省役四萬人財費饋餉稱之為利不亦溥哉當是時南北𤓰分一時之君興亡倐忽若槿華之開落獨拓跋氏享國久長蓋其君類知用賢納諫省費足國故耳况中華之大君而率由是道其國家永命寧有旣邪宋文帝元嘉十九年魏文成帝從冦謙之奏作静輪宫必令其髙不聞鷄犬以上接天神功費萬計經年不成太子晃諫曰天人道殊卑髙定分不可相接理在必然今虚耗府庫疲弊百姓為無益之事將安用之必如謙之所言請因東山萬仞之髙為功差易帝不從臣若水通曰魏文成作宫欲髙接天神功費萬計所謂矯誣上帝暴殄天物者矣太子之諫深切著明帝迷而不悟不知格天有道也民怨天咎勞民傷財其不為天神所厭者幾希矣明帝泰和七年以故第為湘宫寺備極壯麗欲造十級浮圖而不能乃分為二新安太守巢尚之罷郡入見上謂曰卿至湘宫寺未此是我大功德用錢不少適直散騎侍郎會稽虞愿侍側曰此皆百姓賣兒貼婦錢所為佛若有知當慈悲嗟愍罪髙浮圖何功德之有侍坐者失色上怒使人驅下殿愿徐去無異容臣若水通曰明帝侈事浮圖自以為出己財而不知民之妻子膏脂也自以為功德而不知其實府辜功也雖以虞愿之直言而不悟猶且怒之愚亦甚矣宋祚之競難矣哉齊髙帝建元三年四月庚辰魏孝文帝臨虎圏詔曰虎狼猛暴取捕之日每多傷害旣無所益損費良多從今勿復捕貢臣若水通曰書云珍禽竒獸不畜於國蓋以其無益而損財也人君為天地民物之主其道在於養民而俾萬物各遂其性也奈何捕虎以滋民害設圏以違物情使之食人之食哉魏主罷之其亦知務者矣梁武帝天監元年春正月大司馬蕭衍下令凡東昏時浮費自非可以習禮樂之容繕甲兵之備者餘皆禁絶臣若水通曰撥亂反正者必先去奢從儉然後民安國富而天下可得而保也梁武初立即下令以禁絶先朝之浮費庶乎知節用愛民矣然而不旋踵捨身傾國以奉浮屠而不恤民之窮書曰四海困窮天禄永終可不鑒哉梁武帝普通七年十一月時魏盜賊日滋征討不息國用耗竭豫征六年租調猶不足乃罷百官所給酒肉又稅入市者人一錢及邸店皆有税百姓嗟怨吏部郎中辛雄上疏以為中外之民相聚為亂豈有餘憾哉正守令不得其人百姓不闕其命故也宜及此時早加慰撫但郡縣選舉由來共輕貴遊雋才莫肯居此宜改其弊分郡縣為三等清官選補之法妙盡才望如不可並後地先才不得拘以停年三載黜陟有稱職者補在京名官如不歴守令不得為内職則人思自勉枉屈可伸彊暴自息矣不聽臣若水通曰孔子云茍子之不欲雖賞之不竊人君不能去其欲則取民無制盜賊繁興征討日起財用愈窘則橫征益煩民益去而為盜其不亡者鮮矣盜賊之起國用之煩雖守令者之奉行過暴亦由君心之欲有以使之耳魏帝正宜清源正本信辛雄之言下罪己之詔罷厚斂以省民擇守令以撫綏則猶可及止矣釋此不務卒使窮兵暴斂相持民怨變生雖有善者亦末如之何矣梁武帝大同十一年冬散騎常侍賀琛啟陳四事其二以為今天下所以貪殘良由風俗侈靡使之然也今之燕喜相競誇豪積果如丘陵列殽同綺繡露臺之產不周一燕之資而賓主之間裁取滿腹未及下堂已同臭腐又畜妓之夫無有等秩為吏牧民者致貲巨億罷歸之日不支數年率皆盡於燕飲之物歌謠之具所費事等丘山為歡止在俄頃乃更追恨向所取之少如復傅翼増其搏噬一何悖哉其餘淫侈著之凡百習以成俗日見滋甚欲使人守廉白安可得耶誠宜嚴為禁制道以節儉糾奏浮華變其耳目夫失節之嗟亦民所自患正恥不能及群故勉彊而為之茍以純素為先足正彫流之弊矣其四以為今天下無事而猶日不暇給宜省事息費事省則民養費息則財聚應内省職掌各檢所部闕京師治署邸肆及國容戎備四方屯傳邸治有所宜除除之有所宜减减之興造有闕急者徵求有可緩者皆宜停省以息費休民故畜其財者所以大用之也養其民者所以大役之也若言小事不足害財則終年不息矣以小役不足妨民則終年不止矣如此則難可以言富彊而圖逺大矣臣若水通曰此賀琛告梁武帝之言也巨億者億億也傅讀曰附言罷官家食之人復出為官猶不能奮飛之鳥復傅之羽翼也治理事之所署舍止之所邸諸王列第及諸郡朝宿之區肆市列也國容禮樂車服旗章也戎備用兵之器備也屯軍屯也傳驛傳也臣謂靡俗成於下而肇於上工役興於上而害於下皆君之責也人君示民以朴則侈靡息而公私足矣罷兵息民則用不費而財力紓矣琛之言誠救時之急務也梁武不能用以自取滅亡無足怪矣有國家者知二者之弊皆出於己則知所謹而裕民足國之道不外是矣格物通卷八十九
