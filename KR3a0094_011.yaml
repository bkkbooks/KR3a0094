body:
  text: 格物通卷十一明湛若水撰儆戒三唐太宗貞觀二年二月上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之監臨下憚羣臣之瞻仰兢兢業業猶恐不合天意未副人望魏徵曰此誠致治之要願陛下慎終如始則善矣臣若水通曰唐太宗不敢自恃其尊而畏天憚臣可謂能自儆矣然而愆度敗禮乃有為庸人之所不為何也不察天理之正爾天理不察而外施仁義徒用智以服人卒成覇功尚望其上合天心下副人望邪魏徵之徒初無格君之學而徒以繩愆補過為能其視商周一徳之君臣何如也唐太宗貞觀二年四月突厥頡利可汗請入朝帝謂侍臣曰曏者突厥之彊控弦百萬憑陵中夏用是驕恣以失其民今自請入朝非困窮肯如是乎朕聞之且喜且懼何則突厥衰則邊境安矣故喜然朕或失道他日亦將如突厥能無懼乎卿等宜不惜苦諫以輔朕之不逮也臣若水通曰易曰其亡其亡繫于苞桑書曰無怠無荒四夷來王言不可不戒也人主有儆戒之心固足以進徳業而保大位矣太宗貞觀之初中國人安突厥入朝乃曰朕或失道他日亦將如突厥得而不忘喪安而不忘危推是心也何所不至然貞觀之美雖庶幾成康而無學問擴充之道所以漸不克終也故儆戒善矣擴充要焉唐太宗貞觀五年康國求内附帝曰前代帝王好招來絶域以求服逺之名無益於用而靡弊百姓今康國内附倘有急難於義不得不救師行萬里豈不疲勞百姓以取虚名朕不為也遂不受魏徵曰内外治安臣不以為喜唯喜陛下居安思危爾臣若水通曰古之明君治而不忘亂安而不忘危所以存儆戒也太宗因康國來附深懐勞民之慮而絶之其亦近是乎雖然他或以兵克而郡縣之者豈今乃悔心之萌乎抑亦未能充其類也乎唐太宗貞觀十一年三月庚子上宴洛陽宫西苑泛積翠池顧謂侍臣曰煬帝作此宫苑結怨於民今悉為我有正由宇文述虞世基裴藴之徒内為謟諛外蔽聰明故也可不戒哉臣若水通曰鑒善不如鑒惡以其懲戒之心切也鑒惡之心不切則其為善之志不勇矣故觀其宫室則思峻雕之戒觀其臺榭則思瓊瑶之戒然而不善者未之有也詩曰殷鑒不逺在夏后之世其太宗之於煬帝之謂乎唐太宗貞觀十一年魏徵上疏曰且以隋之府庫倉廩户口甲兵之盛考之今日安得擬倫然隋以富彊動之而危我以寡弱靜之而安安危之理皎然在目昔隋之未亂也自謂必無亂其未亡也自謂必無亡故賦役無窮征伐不息以至禍將及身而尚未之寤也夫鑒形莫如止水鑒敗莫如亡國伏願取鑒於隋去奢從約親忠逺佞以當今之無事行疇昔之恭儉則盡善盡美固無得而稱焉夫取之實難守之甚易陛下能得其所難豈不能保其所易乎臣若水通曰人之常情無所懲於前則亦無所戒於後故太宗恭儉之心以懲創於隋亂之初也漸不克終之咎以自滿於貞觀之後也後之人君又宜鑒戒於斯云唐太宗貞觀十二年上問侍臣曰創業與守成孰難房𤣥齡曰草昧之初與羣雄並起角力而後臣之創業難矣魏徵曰自古帝王莫不得之於艱難失之於安逸守成難矣上曰𤣥齡與吾共取天下出百死得一生故知創業之難徵與吾共安天下常恐驕奢生於富貴禍亂生於所忽故知守成之難然創業之難既已往矣守成之難方當與諸公慎之臣若水通曰創業實難守成不易二者一道也故人主常念創業之難則思守成之道矣二者並行而不悖可也書曰慎厥終惟其始願治之君其留意焉唐太宗貞觀十五年上謂侍臣曰朕有二喜一懼比年豐稔長安斗粟直三四錢一喜也北寇乆服邊鄙無虞二喜也治安則驕侈易生驕侈則危亡立至此一懼也古人儆戒無虞正以此爾臣若水通曰堯舜之間治化極矣而猶曰儆戒無虞推而至於無怠無荒四夷來王充此念爾太宗以二喜不忘一懼得非唐虞儆戒之意乎然而君臣無精一之學故徒有一念之善而不能擴而充之此所以雖一致貞觀之治而漸不克終後之人君有志圖治而不講於聖學者又當儆戒於斯焉唐髙宗永淳元年七月監察御史裏行李善感諫曰陛下封泰山告太平致羣瑞與三皇五帝比隆矣數年以來菽粟不稔餓殍相望四夷交侵兵車嵗駕陛下宜恭黙思道以禳災譴乃更廣營宫室勞役不休天下莫不失望臣忝備國家耳目竊以此為憂也臣若水通曰記有之致中和天地位焉萬物育焉時和嵗豐民物安阜然後祥瑞可致彼髙宗宜因荒歉兵侵之災恐懼修省可也而乃封泰山五嶽勞民興役可謂無忌憚者矣中外以言為諱者幾二十年而李善感獨能直諫人皆有鳯鳴朝陽之稱而髙宗不知悔悟後世聼言之君尚鑒之哉唐則天垂拱元年秋九月己巳雍州言新豐縣東南有山踊出改新豐為慶山縣四方畢稱賀江陵人俞文俊上書言天氣不和而寒暑併人氣不和而疣贅生地氣不和而塠阜出今陛下以女主處陽位反易剛柔故地氣塞隔而山變為災陛下謂之慶山臣以為非慶也臣愚以為宜側身脩徳以答天譴不然殃禍至矣可不儆哉臣若水通曰夫地隂道也臣道也女道也地而出山武氏以臣妾主天下隂陽反易之徵也武氏不知儆所謂利其災矣舉朝四方不能言而反賀焉號為慶山所謂矯誣上帝者歟文俊布衣能言之一時之臣又寧不厚顔乎唐𤣥宗開元二年張廷珪等皆上疏以為上春秋鼎盛宜崇經術邇端士尚樸素深以恱鄭聲好遊獵為戒上雖不能用咸嘉賞之臣若水通曰天理人欲不容並立經術端士樸素崇而鄭聲遊獵之事逺矣𤣥宗即位再朞更置左右教坊以教俗樂又選樂工自教法曲於梨園又選妓女置宜春院於西内其溺意於滛聲艶色甚矣張廷珪等上疏以為宜崇經術邇端士尚樸素深以悦鄭聲好遊獵為戒其遏人欲以存天理之意亦切矣惜乎體認天理之學不講而徒經術端士樸素之崇無克復之本至使天理不足以勝人欲如以一杯水救一車薪之火晩年霓裳羽衣之好又益甚焉吁可鑒哉唐肅宗至徳二載李泌曰建寧廣平之事臣所以言之者非咎既往乃欲使陛下慎將來爾昔天后有四子長曰太子𢎞天后方圖稱制惡其聰明酖殺之立次子雍王賢賢内憂懼作黄臺𤓰辭冀以感悟天后天后不聼賢卒死於黔中其辭曰種𤓰黄臺下𤓰熟子離離一摘使𤓰好再摘使𤓰稀三摘猶為可四摘抱蔓歸今陛下已一摘矣慎勿再摘上愕然曰安有是哉卿錄是辭朕當書紳對曰陛下但識諸心以自儆何必形於外也臣若水通曰詩主文而譎諫言之者無罪聞之者知所戒李泌述雍王黄臺𤓰辭以告肅宗而肅宗惕然知戒矣帝欲書諸紳泌以不若識諸心將順其美矣廣平王之功不危而良姊之忌譛不行有以也夫泌厯事肅代徳三朝皆能言人所不能言皆藥石也果能從其言而識之於心豈非國家之福哉唐憲宗元和七年春三月丙戌上御延英殿李吉甫言天下已太平陛下宜為樂李綘曰漢文帝時兵不血木無刃家給人足賈誼猶以為厝火積薪之下不可謂安今法令所不能制者河南北五十餘州犬戎腥羶近接涇隴烽火屢驚加之水旱時作倉廩空虚此正陛下宵衣肝食之時豈得謂之太平遽為樂哉臣若水通曰佞臣惟恐君不樂忠臣惟恐君不憂樂則肆肆則慢天忽民而可憂者至矣憂則敬敬則畏天䘏民而可樂者至矣觀諸吉甫與綘之言而忠佞見矣幸憲宗之明有以别白之也嗚呼後之人君於臣下之言尚毋喜其徇己而惡其逆已也哉唐宣宗大中七年冬十二月左補闕趙璘請罷來年元㑹止御宣政上以問宰相對曰元㑹大禮不可罷况天下無事上曰近華州奏有賊光火刼下邽闗中少雪皆朕之憂何謂無事雖宣政亦不御也臣若水通曰鎮撫百姓爕理隂陽此宰相事也賊刼下邽闗中少雪而宰相以為無事可宴樂是佞臣也宜以上方劒斷其頭以示中外宣宗知其説之非而以為憂亦可謂知所儆戒者矣惜其不能正佞臣之罪而旌趙璘之忠與不知儆戒者同爾唐之不競有以也夫後唐明宗長興三年冬十月壬申大理少卿康澄上書曰國家有不足懼者五有深可畏者六隂陽不調不足懼三辰失行不足懼小人訛言不足懼山崩川涸不足懼蟊賊傷稼不足懼賢人藏匿深可畏四夷遷業深可畏上下相徇深可畏亷耻道消深可畏毁譽亂真深可畏直言蔑聞深可畏不足懼者願陛下存而勿論深可畏者願陛下脩而靡忒優詔奬之臣若水通曰天人一也天變之不測由人事之不順也人君所懼者天爾誠知所以懼天變則知所以脩人事矣人事脩則天變消矣康澄直言人事之不順為可畏而曰天變不足懼冀以勸其君脩人事之實而不知又啟其君忽天變之心非所以論天人之理也劉向説苑曰福者禍之門也是者非之尊也治者亂之先也事無終始而患不及者未之聞也臣若水通曰福者禍之伏也是者非之始也治者亂之起也是故君子福而不忘禍是而不忘非治而不忘亂憂勤惕厲之心未嘗一日而少懈也然不知所謹則患不旋踵矣益曰儆戒無虞君天下者可不念歟劉向曰福生於微禍生於忽日夜憂懼惟恐不足臣若水通曰天人有交勝之理禍福有倚伏之機何也其所由來者漸矣不知其萌而謹之則福將日替而禍將日熾矣可不畏也惟能反之於心而乾乾以終日則人可勝天禍可使福故曰禍福無門惟人所召禍福無不自己求之者惟明主獨觀禍福之原而謹之於豫可也劉向曰楚莊王曰明主有三懼一曰處尊位而恐不聞其過二曰得意而恐驕三曰聞至言而恐不能行臣若水通曰益陳儆戒之道而歸之無怠無荒蓋處尊位未至於過也而恐過者存焉得意未至於驕也而恐驕者存焉聞至言未至於不能行也而恐不能行者存焉故或須臾儆戒之不存則是怠荒之所由起也楚莊王其知儆戒之道乎人君知此三者則必觸類知儆而無怠荒焉庶乎免矣班固白虎通曰天所以有災變何所以譴告人君覺悟其行欲令改過脩徳深思慮也臣若水通曰人君之於天如子之於父母不可不識父母之心也天心仁愛人君人君貴識天心而已茍能識之災變雖洊見而儆戒之心彌篤如父母怒不悅而撻之流血起敬起孝安有父母之心不可回者乎子不改故父之心斯不得而不逐之矣君不悔過則上天斯絶之矣有國者儆之戒之哉韓文韓愈守戒曰詩曰大邦維翰書曰以蕃王室諸侯之於天子不惟守土地奉職貢而已固將有以翰蕃之也今人有宅於山者知猛獸之為害則必髙其柴援而外施䧟穽以待之宅於都者知穿窬之為盗則必峻其垣墻而内固扃鑰以防之此埜人鄙夫之所及非有過人之智而後能也今之通都大邑介於崛强之間而不知為之備噫亦惑矣野人鄙夫能之而王公大人反不能焉豈材力為有不足歟葢以謂不足為而不為爾天下之禍莫大於不足為材力不足者次之不足為者敵至而不知材力不足者先事於思則其禍也有間矣彼之崛强者帶甲荷戈不知其多少其綿地則千里而與我壤地相錯無有丘陵江河洞庭孟門之闗其間又自知其不得與天下齒朝夕舉踵引頸冀天下之有事以乗吾之便此其暴於猛獸穿窬也甚矣嗚呼胡知而不為之備乎哉賁育之不戒童子之不抗魯鷄之不期蜀鷄之不支今夫鹿之於豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之資殊也曰然則如之何而備之曰在得人臣若水通曰韓愈守戒之言其知道乎原患之成而起於無畏要治之本以歸于得人夫無畏則肆肆則不豫開敵之隙固其自為之爾惟畏則心存心存則慮審得人而備自有不容己焉者畏之所生也則又得人者之本也是故安危之道豈逺乎哉畏肆之間而已矣冦敵之馭崛强之防天子諸侯其道一也古之人安不忘危治不忘亂有備故無患也而况危亂之秋乎若愈之言可以為萬世人君告也格物通卷十一
