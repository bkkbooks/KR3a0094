body:
  text: 格物通卷四十明湛若水撰恤孤幼詩小雅角弓騂騂角弓翩其反矣兄弟昏姻無胥遠矣臣若水通曰此詩刺王不親九族也騂赤色角弓張之則張弛之則反以比兄弟不相親也長我者為兄少我者為弟昏姻內外親戚也胥相也凡人之情近則親遠則踈詩言角弓之騂騂其相反則翩然矣王處兄弟骨肉之間昏姻戚屬之類庶幾尊其祿位同其好惡無為大相反相遠而不相親愛乎雖然堯典序堯德業之大亦曰克明峻德以親九族中庸九經親親亦本於修身蓋親親之恩本於德德之盛者其親親德之薄者其親踈後世恩德衰薄至有身為天子極享富貴九族之中有孤寒微賤下同匹夫者曹植親為帝弟至有煮豆燃萁同根相煎之詠則其所厚者薄亦可知矣此角弓之所以作為薄骨肉者之刺也夫惟行葦之詩乎其曰戚戚兄弟莫遠具邇所以篤親親之義也騂騂角弓翩其反而此所以恩義之薄也揆厥所自特由其心之不仁爾不仁故不知同根一體之義骨肉相殘何所不至哉故嘗觀戞羔之封而悲漢髙無人君之度覩德昭之事而憫宋太宗之秉心亦已忍矣骨肉如此况他人乎春秋昭公元年夏秦伯之弟針出奔晉臣若水通曰針者秦桓之愛子景之弟也書弟書出奔晉者罪景之不友於弟至不能容於我土也夫為人兄者能念天顯念父母鞠子哀則必根於天性推其同氣之恩以慈其弟尊其位重其祿同其好惡共安富貴可也何至使之出奔乎雖為大被長枕共榻可也何至使之奔晉乎景也殘忍刻薄忮害同支使之出奔越境無異於路人此天倫所由壞也不然弗去懼選何為其母亦誨之耶春秋以能友責人兄故罪景以為後戒禮記月令曰安萌芽養幼少存諸孤臣若水通曰此仲春之政令也安者無摧折也存亦安也萌芽草木之生意初發者幼少稚弱之嬰孩孤者幼而無父之人也夫仁民而後愛物施恩之序也今先萌芽者因萌芽而及幼少因幼少而及諸孤所以對時而育物也漢光武建武二年夏四月封兄縯子章為太原王興為魯王十三年二月以太原王章為齊公魯王興為魯公十五年夏四月追諡兄縯為齊武公帝感縯功業不就撫育二子章興恩愛甚篤以其少貴欲令親吏事使章試守平陰令興緱氏令其後章遷梁郡太守興遷𢎞農太守臣若水通曰光武之於兄子章興先封王矣由王而公由公而守令者何耶蓋先惑而後悟也孔子曰愛之能勿勞乎生而王之非所以至愛也光武撫兄二孤盡恩至使降富貴親吏事試守令所以勞之非禽犢之私矣愛之不亦深乎上恤孤則民不倍此光武之所以中興而平天下也漢和帝永元十五年夏四月甲子晦日有食之時帝遵肅宗故事兄弟皆留京師有司以日食陰盛奏遣諸王就國詔曰甲子之異責由一人諸王幼稚早離顧復弱冠相育常有蓼莪凱風之哀選懼之恩知非國典且復宿留臣若水通曰和帝幼沖而能友愛兄弟宿留京師不以有司之請而少間蓋其親親之仁根於天性故如此彼蹀血禁門推刃同氣者獨何心哉漢安帝建光元年初汝南薛包少有至行父母亡弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所治意所戀也器物取其朽敗者曰我素所服食身口所安也弟子數破其産輒復賑給帝聞其名令公車特徵至拜侍中包以死自乞有詔賜告歸加禮如毛義臣若水通曰薛包孝友之行讓財之善皆由所安隱於無迹蓋有泰伯之風矣慈幼之道豈不為百世之師哉使人人能是則比屋有可封之俗矣安帝聞其名徵以公車加以殊禮其知風化之本也不亦善哉宋文帝元嘉十八年春正月彭城王義康至豫章辭刺史甲辰以義康都督江交廣三州諸軍事前龍驤參軍巴東扶令育詣闕上表稱昔袁盎諫漢文帝曰淮南王若道路遇霜露死陛下有殺弟之名文帝不用追悔無及彭城王義康先朝之愛子陛下之次弟若有迷謬之愆正可數之以善惡導之以義方奈何信疑似之嫌一旦黜削遠送南垂草萊黔首皆為陛下痛之廬陵往事足為龜鑑恐義康年窮命盡奄忽于南臣雖微賤竊為陛下羞之陛下徒知惡枝之宜伐豈知伐枝之傷樹伏願急詔義康返於京甸兄弟協和君臣輯睦則四海之望塞多言之路絶矣何必司徒公揚州牧然後可以置彭城王哉若臣所言於國為非請伏重誅以謝陛下表奏即收付建康獄賜死臣若水通曰孟軻稱孩提無不知愛親敬兄為人之良知良能所不慮而知不學而能者也曽參亦曰未有學養子而后嫁者也是慈孝乃人之本心固有者也文帝於彭城王義康削黜遠投獨無良知良能乎及巴東扶令育之言宜悟矣而反殺之詩曰他人有心豫忖度之帝果無人心矣哉唐中宗神龍元年二月初武后誅唐宗室有才德者先死惟吳王恪之子鬱林侯千里褊躁無才又數獻符瑞故獨得免上即位立為成王拜左金吾大將軍武后所誅唐諸王妃主駙馬等皆無人葬埋子孫或流竄嶺表或拘囚歷年或逃匿民間為人傭保至是制州縣求訪其柩以禮改葬追復官爵召其子孫使之承襲無子孫者為擇後置之既而宗室子孫相繼而至皆召見涕泣舞蹈各以親踈襲爵拜官有差臣若水通曰孟軻曰未有仁而遺其親者也唐中宗收宗室子孫於武后誅殘之餘死者禮葬生者襲封仁慈之推燕及煢嫠澤逮枯骨不遺幽明矣既而幼孤相繼召見涕泣舞蹈謂非仁心之感召哉唐玄宗素友愛近世帝王莫能及初即位為長枕大被與兄弟同寢聽朝罷多從諸王遊在禁中拜跪如家人禮飲食起居相與同之於殿中設五幄與諸王更處其中謂之五王帳宋王成器尤恭慎未嘗議及時政與人交結帝愈信重之故讒間之言無自而入臣若水通曰書云孝乎惟孝友于兄弟施於有政詩云刑于寡妻至于兄弟以御于家邦語曰孝弟也者其為仁之本與孝友根於天性惟孝故弟惟弟故慈惟慈故有刑于之化以及家邦皆推此仁而已矣明皇友愛之至而於兄弟寢食遊息動與之俱可謂篤於天顯者矣使能充是心而廣之慈以畜其子義以處其妻恩以逮其臣下則必不以讒殺其子不以嬖黜其妻不以無罪殄戮臣下而疑忌宗室幽閉骨肉之事必無矣寧不為全德之主乎惜其明於此暗於彼不能學以充之也孟軻氏曰茍能充之足以保四海茍不充之不足以事父母君天下者可不念哉唐文宗太和七年宰相李德裕言昔玄宗以臨淄王定內難自是疑忌宗室不令出閣天下議者皆以為幽閉骨肉虧傷人倫嚮使天寶之末建中之初宗室散處方州雖未能安定王室尚可各全其生所以悉為安祿山朱泚所魚肉者由聚於一宫故也陛下誠因册太子制書聽宗室年髙屬踈者出閣且除諸州上佐使携其男女出外婚嫁此則百年弊法一且因陛下去之海內孰不欣悅帝曰兹事朕久知其不可方今諸王豈無賢才無所施爾八月庚寅册太子因下制諸王自今以次出閣授緊望州刺史上佐竟以議所除官不決而罷臣若水通曰三代之君所以分封同姓而布之天下各有寧宇蓋推一念之孝慈以及之爾非有所為而為也至於藩垣屏翰王室有賴焉唐明皇友愛兄弟枕被五帳起居與處此仁心矣至於疑忌宗室不令出閣是為能充其類也乎文宗聽德裕之言雖制諸王以次出閣而除官不決不可謂勇於為義者矣大抵玄宗之孝友兄弟有所為而發故不能推其恩文宗之制諸王有所牽而滯故不能遂其志使文宗決而行之雖不能如三代封建之制而刺史上佐猶可以盡其才能庶幾蕃其枝葉以固其本根則唐之祚本支百世豈至傾覆相尋而卒無靈長之福哉宋儒楊時云夫仁人之親愛其弟非徒富貴之而已亦必為之節之也富貴而不為之節使之驕慢陵僭以速禍敗則其親愛之也適所以害之爾臣若水通曰孟子稱仁人之於弟親愛之而已又言舜封象於有庳富貴之也然必天子使吏治其國不得暴彼民焉故愛弟者如愛寶矣愛寶者必防護不使物壞焉愛之至也後世之為宗室者以驕慢陵僭而受誅者多矣是皆不能防慎之於始也是故聖人之於宗室也有愛之之仁有節之之義焉楊時之言蓋本於孟子而我國家之所已行者矣為宗藩者其尚深體仁義之愛也哉國朝孝慈髙皇后性慈惠嘗語諸王妃公主曰無功受福造化所惡吾與若屬被錦繡美飲食終日無所為當勤女工以報造物者太子諸王雖愛之甚篤勉令務學諄切懇至嘗曰汝父尊臨萬國身致太平亦由學以聚之爾小子當思繼繼繩繩以不辱所生又曰汝輩異日有人民社稷之寄尤必積纍忠厚乃可長世切不可自恃而不務德謂事有偶然也汝切識之諸王或以衣服器皿相尚者髙皇后曰唐堯虞舜茅茨土階夏禹文王惡衣卑服汝父猶惡奢麗日夜憂勤以治天下汝輩無功錦衣玉食猶欲以服御相加何志氣不同如是乎惟當親師取友講論聖賢之學開明心志自無此氣習也臣若水通曰孔子曰愛之能勿勞乎蓋愛之不得不勞而勞之乃所謂愛之深也我孝慈髙皇后性本慈惠故其訓戒太子諸王妃公主拳拳以勤女工務講學崇忠厚尚節儉而教之甚嚴豈非美質與孔子之意暗合歟臣謹録之以為聖子神孫誦法之獻永樂三年十月太宗皇帝賜諸王皇明祖訓且諭之曰皇考所以垂訓子孫至要之道具在此書朝廷常守之可以永安宗室藩王常守之可以長保富貴朝廷與藩王本同祖宗所出但能皆以祖宗之心為心則自然各盡其道前代有帝王不能保全宗室者如宋太宗亦有宗室不能自保全者如周王監漢七國此皆是不能以祖宗之心為心朕與諸弟各勉之臣若水通曰祖宗之於子孫如其心之於四肢百體無尺寸之膚不愛則無尺寸之膚不保全也惟其愛之也深則其慮之也至仰觀聖祖述創業之艱為皇明祖訓以詔孫子貽謀遠矣太宗文皇帝既以之賜諸王而又諭以保守之道焉其恤孤幼之仁至矣伏惟聖子神孫以祖宗之心為心以其法為法則帝王之業永保無疆矣永樂二十二年十一月仁宗皇帝諭侍臣曰守成之主動法祖宗斯鮮過舉書曰監于先王成憲其永無愆後世嗣位者往往作聰明亂舊章而卒致喪敗可為鑒戒朕十有餘歲侍太祖皇帝側親見作祖訓屢更改易而後成書是時秦晉周世子皆在太祖間暇即召太孫及諸世子於前分條逐事委曲開諭之皆持身正家以至治天下之要道為天子為藩王能每事遵守豈不福祿永遠者朕寤寐不忘今已命司禮監刊印將賜諸子及弟姪侍臣對曰陛下此心即太祖皇帝之心也臣若水通曰盈成之世易至於驕肆也惟其愛之也深故其戒之也屢太宗文皇帝既以祖訓賜諸王矣及仁宗嗣位之初又命司禮監刊印賜諸子及弟姪嗚呼祖宗之心其愛子孫屢屢無窮有如此也為子孫者茍能推是心焉則家可齊矣家齊而國可治矣於天下也何有伏惟聖明留心焉幸甚格物通卷四十
