body:
  text: 格物通卷三十四明湛若水撰事親長上易蠱六五幹父之蠱用譽象曰幹父之蠱承以德也臣若水通曰山下有風回而撓物壞亂有蠱壞之義然五以尊為蠱之主而以柔中與九二剛中之臣應能治蠱者故為幹前人之蠱蠱者前人之墜緒待其後而振者也六五之君當蠱之時也修廢舉墜而一新之其蓋父之愆善繼而成令名者也象又釋其義云非五之自能如此也虛心應九二之賢承之以剛中之德輔相之功也如成王太甲皆用賢而致譽者也故天下之才孰非人君之才不用人而自用則蠱日深矣六五其明於用人而孝於事親者歟家人彖傳家人有嚴君焉父母之謂也臣若水通曰凡人之心必有所主而嚴憚乃能自治有天下者天下之主也有一家者一家之主也父母以主乎一家有君道焉家人之所取則焉者也嚴而敬之則倫理正恩義篤而家道理矣不然情勝禮恩勝義而家道亂矣善事其親者事之如事君則父母之命行而一家無不率者矣家其有不齊耶書虞書堯典瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦臣若水通曰此四嶽稱舜之孝友以告帝堯也瞽者無目之名舜父號瞽䏂母舜後母也頑者心不則德義之經嚚者口不道忠信之言象舜後母弟也傲驕慢也諧和也蒸進也乂治也格至也克諧以孝蒸蒸乂不格姦者言舜遭父母兄弟之變而能和順之以孝道使之進進以善自治而不至於為大姦惡也所謂允若底豫是已觀此可見天下無不可事之親顧吾所以事之者未若舜爾臣愚竊以為大舜之心當時惟自見其實有未盡分處爾非心知其親之不是而姑若是順從也昔羅從彥語云舜只為天下無不是底父母陳瓘聞而善之曰惟如此而後天下之為父子者定彼臣弒其君子弒其父者嘗始於見其有不是處爾此言足以深明舜之心事後之欲盡孝弟之道以法堯舜者當熟玩之商書伊訓立愛惟親立敬惟長始於家邦終於四海臣若水通曰此太甲新嗣位伊尹告之之言也立植也立愛於天下使天下之人各愛其親者必自吾之親始立敬於天下使天下之人各敬其長者必自吾之長始所謂老吾老以及人之老長吾長以及人之長也始于家達于國終而措之天下矣夫家邦四海之人可謂衆矣其於人君勢若相懸矣然感之而無不應者何也以其心同也孝弟人之真心所不慮而知所不學而能所謂良知良能者也是心也放之四海而凖故君人者可不盡之於心行之於家而達之於國於天下乎周書君陳惟爾令德孝恭惟孝友于兄弟克施有政臣若水通曰此書君陳篇成王命君陳之言也君陳臣名令善也善事親曰孝善事上曰恭成王言君陳有令善之德事親孝事上恭又言惟其孝友於家是以能施政於邦也臣謂政也者正也故能孝則可以正一國之孝矣能恭則可以正一國之恭矣成王即其孝友於家而知其必能施政於邦者家國無二理齊治無二機也孔子曰居家理故治可移於官且管蔡之監殷也惟其不孝不友故至為逆亂不順之事今君陳孝友如此其能代周公化訓殷民格其舊染之俗而一新之必矣此東郊之命成王所以拳拳以屬於孝弟之君陳也漢之賢主詔求孝弟力田之人蓋猶有古人之遺意也後之人君用人化俗必求如君陳孝弟之人而使之毋汲汲於利口嗇夫也乎詩小雅小宛題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生臣若水通曰題視也脊令鳥名飛鳴相顧以比兄弟也邁征皆往也而汝也此大夫遭亂而兄弟相戒之詩也言我視彼脊令之鳥且飛且鳴而相顧矣今我日斯邁而汝亦月斯征矣當夙興夜寐不遑暇逸以求無忝父母所生之性勿自取於禍可也為此詩者其知事親之道乎曰日斯邁月斯征夙興夜寐而無忝者則其愛親之誠雖以終身可矣蓋慮日月之征邁而夙夜之興寐者惟求無忝所生爾父母之於子一氣而已氣一則理一是理也即天之命也人之性也純粹至善天地萬物一體而無間者也父母全而生之子全而歸之乃為克肖克肖乃為無忝故宇宙性分茍有一之未盡則吾心不能無愧於父母之所生者是得為全歸乎故必日斯邁日而乾乾月斯征月而乾乾夙興夜寐夙夜乾乾自強不息及天遊衍自一念以至於萬事以至於萬物以至於天地無一而不求盡吾此心此理以復吾父母所生之性則無愧於天下無忝於父母矣雖然大君猶父母宗子民胞物與其責又有大焉者故或行一不義殺一不辜一民之未安一物之失所天髙地下一行不得其序皆其性分之有闕有忝於父母宗子矣可不念哉大雅行葦曽孫維主酒醴維醹酌以大斗以祈黃耉黃耉台背以引以翼夀考維祺以介景福臣若水通曰曽孫主祭者之稱主謂主祭也醹厚也大斗勺五升徑六寸柄長三尺蓋用挹酒以注於尊黃耉老也背有鮐文行葦所以燕父兄也觀其既燕以燕之射以樂之末復祝頌之曰主祭之曽孫燕飲之酒厚矣以大斗酌此酒祈其夀考又引導翼輔之享夀考而維祺吉以介景福也蓋不徒愛敬之而已必欲其相與引導輔翼以進修於德業德業修則所以享夀年而大祺福者無窮而愛敬之者亦無窮矣故行葦者其得親親之道乎至於後世此義不明故漢之文帝亦可謂能篤於親親者矣然恩有餘而義不足縱之過而防或踈卒之淮南諸王不能保全蓋不知此詩之義爾故有國家者能篤親親之恩必求保終之道德業相勸是乃保終之道也春秋桓公九年冬曹伯使其世子射姑來朝臣若水通曰曹伯身當疾革而遣儲副以聘魯曹宣固不父矣使射姑能子將必裁之以義也顧乃供事魯庭舍藥膳而不視焉雖有當享之嘆果何及耶阿意曲從庸得為孝乎僖公八年秋七月禘于太廟用致夫人臣若水通曰太廟者魯周公廟也成風僖公之母也周公臣爾禘以天子之禮可乎成風妾爾尊為夫人可乎使周公成風而有知焉吾知其不享矣是知生事葬祭一當以禮不以非所得而加之乃為孝也禮記曲禮凡為人子之禮冬溫而夏清昏定而晨省在醜夷不爭臣若水通曰溫以禦寒凊以致涼定其袵席省其安否所以安親也醜類也夷等也不爭思辱親也可謂孝矣曲禮夫為人子者出必告反必面所遊必有常所習必有業恆言不稱老年長以倍則父事之十年以長則兄事之五年以長則肩隨之羣居五人則長者必異席臣若水通曰告謂告親以所往也反者還也面者見親也有常有定處也異席者席容四人若五人則長必别一席也夫人子之事親出入告面敬之至矣遊必有常謹之至矣習有恆業孝之至矣立身行道顯其親矣言不稱老尊親之至矣其父事兄事肩隨者盈天地之間民胞物與均之有父子之義也均之有兄弟之義也故其少長之序天理然爾異席所以長長也曲禮從於先生不越路而與人言遭先生於道趨而進正立拱手先生與之言則對不與之言則趨而退從長者而上丘陵則必鄉長者所視臣若水通曰先生者有齒德可師者也步趨應接主乎所尊也進退語默視乎所尊也所以致尊敬之道也向長者所視所以候長者也檀弓事親有隱而無犯左右就養無方服勤至死致喪三年臣若水通曰有隱者子為父隱也無犯者不可犯親也無方者無一定之方順親之情不泥於一也致者極其哀毁之節也內則在父母舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖遊不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔不有敬事不敢袒裼不涉不撅褻衣衾不見裏父母唾洟不見冠帶垢和灰請潄衣裳垢和灰請浣衣裳綻裂紉針請補綴五日則燂湯請浴三日具沐其間面垢燂潘請靧足垢燂湯請洗少事長賤事貴共帥時臣若水通曰應之辭唯為恭旋轉而周也齊心之齊也噦嘔逆聲噫噫氣也鼻有聲曰嚏咳嗽聲也欠氣之乏也伸體之疲也跛偏任也倚身倚物也睇視傾視也洟自鼻出者襲重衣也袒裼露臂不敬事也撅攝也不因涉水則不攝裳也不見裏為其可穢也孝子愛敬存於中發於氣形於動靜見於其衣服孝敬之至也不見謂即刷除之也潄浣皆洗也紉針以線貫針也燂溫也浴洗身也沐洗髮也其間三日五日之間也潘淅米汁也靧洗面也帥循也時此禮也潔親之體以及其親於體者所以保養神氣愛之至也內則曽子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之孝子之身終終身也者非終父母之身終其身也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎臣若水通曰樂其心諭於道養其心也不違其志養其志也樂耳目安寢處飲食忠養養其體也愛敬之至矣然此不過終父母之身爾愛親之所愛敬親之所敬終已之身焉可也終親之身有窮也終已之身無窮也是之謂能繼其孝矣內則父母有過下氣怡色柔聲以諌諌若不入起敬起孝説則復諌不説與其得罪於鄉黨州閭寧孰諌父母怒不説而撻之流血不敢疾怨起敬起孝臣若水通曰孝經云父有爭子則親不陷於不義人子之諌親也必孝敬以為之本矣和諌而不入惟起孝敬焉曰我孝敬之未至也熟諌而不恱亦起孝敬焉曰我孝敬之未至也是故孝敬者諌父母之道也為人子者可不務乎祭義孝子之有深愛者必有和氣有和氣者必有愈色有愈色者必有婉容孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之嚴威儼恪非所以事親也成人之道也臣若水通曰孝子之愛根乎天性所謂深也然而誠矣誠則著著則形由氣而色由色而容皆愛之著焉誠之不可掩也由是則如執玉如奉盈不敢肆也洞洞然直而通也屬屬然貫而續也如弗勝如將失之不敢少忽也敬之至也愛所生也愛以生敬敬以成愛愛而弗敬其失也以恩掩義敬而不愛其失也嚴威儼恪故愛敬兼致而後孝道可盡也何以為成人之道也夫孝者不失其赤子之心者也老萊子孝奉二親斑衣戲綵於膝下失跌為嬰兒之啼以娛其親忘乎其為成人之老也此其所以為至孝乎祭義曽子曰孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而弗忘父母惡之懼而無怨父母有過諌而不逆父母既沒必求仁者之粟以祀之此之謂禮終臣若水通曰用力者能養能養庶人之孝也用勞者能弗辱能弗辱諸侯卿大夫士之孝也德教加於百姓刑于四海天子之孝也而四海之內各以其職來助祭焉故曰不匱是之謂大孝伏惟聖明推純孝之心以及天下則光于四海通于神明天下幸甚祭義孔子曰父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣臣若水通曰身者父母之所遺而萬物皆備可謂全矣唯聖人為能踐形以全其歸是故孝子一舉足而不敢忘父母則遊荒之欲不滋于左右矣一出言而不敢忘父母則背謬之語不下于朝廷矣天理流行德教洋溢而天地付與萬物皆備之全體始無忝也於此觀之則知事親事天之道豈外乎吾心而求之哉論語孟懿子問孝子曰無違樊遲御子告之曰孟孫問孝於我我對曰無違樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮臣若水通曰此聖人告懿子之問孝蓋因三家之僣禮而發然自天子以至於庶人上下皆通也禮者朱熹曰天理之節文臣謂天理則自有條理便是節文便是中正處不可過不可不及也人之所以事親者不合於天理中正即不以君子之道待其親雖欲尊親實非所以尊親不惟失所以尊親亦不可以為子矣故聖人必合生事葬祭始終而言之以見不容一毫之或苟也故胡氏曰人之欲孝其親心雖無窮而分則有限得為而不為與不得為而為之均於不孝所謂以禮者為其所得為者而已然則事親可不講求於天理之正乎孟子曰天下大恱而將歸已視天下恱而歸已猶草芥也惟舜為然不得乎親不可以為人不順乎親不可以為子舜盡事親之道而瞽瞍底豫瞽瞍底豫而天下化瞽瞍底豫而天下之為父子者定此之謂大孝臣若水通曰孔門之論孝多矣孟子此章又發出得親順親一節如此夫父子之愛天性也乃人之真心即所謂天理也蓋天下恱而歸已是亦可以樂矣舜則視之如草芥之輕所重者在父母舜以為若不得父母之歡心則不可為人不諭父母於道則不可以為子舜父頑母嚚嘗欲害舜然舜惟積誠引咎盡其道以事之至於親亦底豫焉感發其真心蓋有以得其歡而順於道而舜為人子之心始可解矣卒之天下之為父子者皆感發興起其同然之心化於慈孝而止其所而無不各有定天下之人之孝皆舜之孝也此舜之孝所以為大足以法天下而傳後世也歟昔羅從彥語此云只為天下無不是底父母陳瓘聞而善之曰惟如此而後天下之為父子者定彼臣弒其君子弒其父者嘗始於見其有不是處爾然則後之事親者其必以舜為法乎孝經曰身體髮膚受之父母不敢毁傷孝之始也立身行道揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身臣若水通曰身體髮膚親之遺體也不敬其身則毁傷毁傷則是傷其親也豈得為孝故少而敬謹守身不敢毁傷孝由此始也及壯而出仕以事君則推父母之所生者以盡忠爾故曰事君不忠非孝也故為孝之中及其由少而壯而老體道於身而身立則體父母所生而全歸名於天下傳於後世是即父母所生之道傳名於後世而孝道畢矣左傳隱公元年鄭伯置薑氏于城潁而誓之曰不及黃泉無相見也既而悔之潁考叔為潁谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之公曰爾有母遺繄我獨無潁考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融薑出而賦大隧之外其樂也泄泄遂為母子如初君子曰潁考叔純孝也愛其母施及莊公詩曰孝子不匱永錫爾類其是之謂乎臣若水通曰父子之愛天性根於心而不可解者也莊公以叔段之故遂置其母私欲蔽之也既而悔焉天理之不容泯滅也考叔因其善端而開發之蓋亦因其所固有者而擴充之爾非莊公所本無而考叔能錫與而外益之也雖然考叔純孝人也事親孝故忠可移於君然則人君欲孝其親者可不講學以擴充之乎故曰苟能充之足以保四海此又孝之大者昭公十九年夏許悼公瘧五月戊辰飲太子止之藥卒太子奔晉書曰弒其君君子曰盡心力以事君舍藥物可也臣若水通曰禮父母疾飲藥子先嘗之季康子饋藥孔子受之而不敢嘗謹疾故也父母惟其疾之憂况人子養親之疾乎原止之進藥也未必有弒親之心其卒也以飲止之藥止弒之也既曰無之哀慟以自絶可也奔晉何為故人子之事親飲食起居無一而不致其敬謹焉爾否則止之罪有所必至何以逃於天地之間乎定公五年葉公諸梁之弟后臧從其母於吳不待而歸葉公終不正視臣若水通曰葉公之於后臧同母兄弟也母同則恩同者也吳入楚獲母而去獨后臧為可從哉比其反也棄母不顧后臧固不孝矣葉公不義其弟弟獨無辭乎國語魯語夏父弗忌為宗蒸將躋僖公宗有司曰非昭穆也曰我為宗伯明者為昭其次為穆何常之有有司曰夫宗廟之有昭穆也以次世之長幼而等胄之親踈也夫祀昭孝也各致齊敬於其皇祖昭孝之至也臣若水通曰弗忌魯大夫夏父展之後宗伯掌國祭祀之禮蒸祭也僖閔之兄繼閔而立躋僖公逆祀也宗有司者宗人官之有司也父為昭子為穆僖為閔臣臣子一例而升閔上故曰非昭穆也明言僖有明德也長幼先後也等齊也皇大也夫逆祀非禮也非禮之祀神必不享夫神不享猶不祀也可以為孝乎夏父弗忌為宗蒸將躋僖公其亦不知孝子享親之道矣展禽謂後必有殃誠不可逭主祀昭孝者可不念哉格物通卷三十四
