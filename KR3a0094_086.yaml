body:
  text: 格物通卷八十六明湛若水撰勸課易繫辭包犧氏没神農氏作斵木為耜揉木為耒耒槈之利以教天下蓋取諸益臣若水通曰此是聖人制耒耜之器有益卦之象也作者肇於神農而創制之也斵謂削而鋭之起土者耜也揉謂柔而曲之運耜者耒也益之上巽二陽象耒之自地上而入下震一陽象耜之在地下而動也耒耜興而天下皆知耕矣民無遺力而遊食禁矣地無遺利而閒曠治矣取諸易卦之益者蓋天下之益莫大於農五穀熟而民人育衣食足而禮義生皆農之功也周之有天下皆起於后稷之農畆故國家以農為本為人君者可不知所先務乎書虞書大禹謨禹曰戒之用休董之用威勸之以九歌俾勿壞臣若水通曰大禹陳養民之政此則勸懲以保其治也戒諭也休美也董督責也大禹言今六府三事九功惟敘九敘惟歌矣然人情恒勤於始怠於終則已成之功能保其不廢乎故勤於是者則戒諭而休美之其怠於是者則督責而懲戒之戒之董之雖以激勵其憂勤之心而不能使之優游厭飫自趨事赴工而不已也故復即其前日歌咏之言恊之律吕播之聲音用之鄉人用之邦國以勸相之使歡欣鼔舞趨事赴工不能自已而前日之成功得以久存而不壞也夫農桑者小民衣食之源人君足國之要此大禹所以拳拳於課功之政也為治者宜以為先務焉漢世去古未遠故文景之君頻下勸農詔且設力田之科雖未講於大禹戒董勸歌之政然亦庶幾先王之遺意矣仰惟聖明勵精圖治欲復三代之隆幸於兹而留意焉詩鄘風定之方中靈雨旣零命彼倌人星言夙駕説于桑田匪直也人秉心塞淵騋牝三千臣若水通曰此衞人美文公之詩而述其勸課之事也靈善零落也倌人主駕者也星見星也說舍止也秉操塞實淵深也馬七尺以上為騋言善雨旣落之時東作方興則命駕車之人戴星早駕其車而舍止于桑田之間以勸勞農作之人秉持其心實而且深而騋馬之牝有三千之富矣夫富國之道在豐民財在勤勸課故巡行阡陌勸課農桑亦王政之一事也文公以勸農桑而致富庶有騋牝之盛成興復之功而稱衞之賢君宜哉嗚呼文公秉心塞淵勤於政事特有所感激懲創於破滅之餘猶能有為如此况人主實有勤政之心而居之無倦行之以忠其致富庶興大業於天下又當何如哉小雅甫田曾孫來止以其婦子饁彼南畆田畯至喜攘其左右嘗其旨否禾易長畆終善且有曾孫不怒農夫克敏臣若水通曰此詩述公卿有田禄者力於農事而此則言其省耘勸農之事也曾重也曾孫主祭者之稱饁餉也攘取也旨美也易治也長竟也有多也敏疾也夫國本於食食本於農然人情好逸使上之人不知所以勸課而鼓舞之則亦無以使之盡力於耕耘也故曾孫當黍稷薿薿之餘以省耘而來止適見農夫之婦子來餉耘者於南畆之中其時田畯亦至而喜之乃取左右之饋而嘗其旨否其上下相親如此又見其禾之易治實頴實栗竟畆如一是知其他皆然終當善而且多是以曾孫不怒其惰而農夫益以樂於趨事赴工而為之益疾矣又何食有不足者哉噫下之興起由於上之感動如此則夫勸課之典上之人信有不可不舉者矣禮記月令曰命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休於都臣若水通曰此孟夏之令也野虞虞人之掌田野者高平曰原郊外謂之鄙休于都則遊手不務田矣言孟夏之月則命野虞代天子勞農夫耕作之勞以勸之不可失此耕耘之時又命司徒之官循行縣之都鄙使民勉於耕作禁之不得游手好閒以休逸於都邑也夫古之王者所以重民食也故孟子曰民事不可緩也夫食者民之命農者食之本故天子及農祥之月恐民之怠且荒也則野虞有命司徒有戒所以勸課而督責之者盡矣雖然天子所以立民之食者是其所以自立也後世以田舍翁嗤其昔之人者宜其不足以享國哉月令曰天子乃以元日祈穀于上帝乃擇元辰天子親載耒耜措之于參保介之御間帥三公九卿諸侯大夫躬耕帝藉天子三推三公五推卿諸侯九推反執爵于大寢三公九卿諸侯大夫皆御命曰勞酒臣若水通曰此孟春之令也元日祈穀者郊祭天配以后稷因祈穀也元辰者郊後吉日也參者參乗之人也介者衣甲也參保謂勇士為車右而衣甲者也御也者御車之人也天子在左御者居中車右在右而為參也帝藉藉田千畆也勞酒者勞其耕之勤勞也夫躬耕帝藉者何也民之所生者命也命之所依者食也食之所依者土穀也故天子耕藉上以祭神明下以重民命也是故天下無不耕之人所以示勸課之典也月令曰后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事蠶事旣登分繭稱絲效功以共郊廟之服毋有敢惰臣若水通曰此季春之令也東鄉迎時氣也躬桑親自采桑也禁毋觀不得為容觀之飾也省婦使减省其箴線之事也登成也分繭分布衆婦之繅者也效功校其功之上下也后妃躬桑勸蠶者何也所以重本也故天下無不蠶之婦也所以示勸課之典也以供祭服何也所以致誠敬也月令曰乃命有司趨民収斂務蓄菜多積聚乃勸種麥毋或失時其或失時行罪無疑臣若水通曰此仲秋之令也趨収斂者先有収斂之政此又促之也務蓄菜者以助穀之不足也多積聚者凡可以備歳者皆聚之也勸種麥者所以續舊穀及新穀之際者尤利於民也罪無疑所以重惰民之罰以重麥也廣養民之利也月令曰令告民出五種命農計耦耕事修耒耜具田器臣若水通曰此季冬之令也五種者五穀之種也耦二人相偶也田器鎡基之類也夫季冬而備農事者何也乗陽動也陽事之始也將以為來春播種之計也周禮地官載師凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征以時徵其稅賦臣若水通曰不毛者謂不種桑麻者也布帛也三夫為屋民無職事者謂遊惰也宅不種桑麻者則有罰使出一里二十五家之布所以勸織也田不耕者則有罰使出三家之粟所以勸耕也以至遊惰之民則皆兼不毛無職事二者之惰矣使出一夫百畝之税一家力役之征又所以勸勤業者也夫王者之民宜其鼓舞而不倦而顧有不盡然者此所以廑先王之慮而昭示其罰也尤必取之以時焉者恐其有以病民惟如是庶幾下無所困而上無所匱其視後世頭㑹箕斂并取一時以厲民者大不侔矣國語周語虢文公曰三時務農而一時講武故征則有威守則有財若是乃能媚於神而和於民矣則享祀時至而布施優裕也臣若水通曰優饒也裕緩也先王之政務農為重而講武為輕故四時農居四之三武居四之一則其勸農之義可見矣是故足食足兵而民信兵農合一故征守有備是故神民恊和而外侮不至也魯語公父文伯之母曰社而賦事烝而獻功男女效績愆則有辟古之制也君子勞心小人勞力先王之訓也自上以下誰敢淫心舍力臣若水通曰社春分祭社也事農桑之屬也冬祭曰烝烝而獻五穀布帛之功也績功也辟罪也古之人君勞民勸相與時偕行故賦事於社獻功於烝皆各以其時也否則縱淫心舍力本何以阜成財用以享安富尊榮之福也為人君者不可不修先王勸農之法焉漢宣帝地節四年以龔遂為水衡都尉初遂為渤海太守齊俗奢侈好末技不田作廼躬率以儉約勸民務農桑令口種一樹榆百本薤五十本葱一畦韭家二母彘五母雞春夏不得不趨田畆秋冬課收斂益蓄果實菱芡郡中皆有畜積吏民富實徵為都尉臣若水通曰生財有大道務本以開其源儉用以節其流而已渤海富實有由然哉建武十五年十一月拜張堪漁陽太守堪視事八年匈奴不敢犯塞勸民耕稼以致殷富百姓歌曰桑無附枝麥秀兩岐張君為政樂不可支臣若水通曰農耕者民食之本張堪守漁陽勸民耕稼百姓殷富至有德政之歌此教民務本之明效也有民社者可不法乎章帝建初元年詔二千石勉勸農桑罪非殊死須秋案騐有司明慎選舉順時令理寃獄臣若水通曰章帝建初之詔其要有三曰勸農桑曰明選舉曰理寃獄然三者必以農桑為首令則其重農務本之意可見矣後之君天下者宜視以為法焉漢章帝時秦彭為山陽太守興起稻田數千頃毎於農月親度頃畝分别肥瘠差為三品各立文簿藏之郡縣於是姦吏跼蹐無所容詐彭乃上言宜令天下齊同其利詔以其所立條式頒下州郡臣若水通曰王道莫先於養民養民莫先於仁政後世農桑法廢民旣失養而征斂無經貪暴之吏因縁為奸邦本日蹙有自來矣秦彭為郡乃能開稻田以養貧民立法制以繩姦吏不私於一郡而又推之以與天下同其利焉蓋庶幾仁政保民之公矣獨非百世循吏之法歟北魏孝文帝時元淑為河東太守河東俗多商賈罕事農桑人有年三十不識耒耜者淑下車勸課躬徃教示二年間家給人足為之謠曰秦州河東杼軸代舂元公至止田疇始理臣若水通曰先王制四民之序農次於士而先於商賈所以重農也夫國之貧富興衰視其本末分數而已務本者多雖欲無富不可得也逐末者多雖欲無貧不可得也民富而知禮義雖欲無治不可得也民貧而喪廉恥雖欲無亂不可得也是以先王之世必重農事孟子嘗曰民事不可緩也是故農事舉而百姓可以足食矣元淑化商賈之民而歸之農畆變逐末之俗而使之務本蓋其下車之始勸課教藝一二年間遂有田疇始理之謠誠可以為守令之法矣宋文帝元嘉二十一年正月魏太子晃課民稼穡使無牛者借人牛以耕種而為之芸田以償之凡耕種二十二畆而芸七畆大畧以是為率使民各標姓名於田首以知其勤惰禁飲酒遊戱者於是墾田大増臣若水通曰勸課農桑為政之務也晃立勸課之法令貧者以芸工易牛力標姓名以稽勤惰禁遊飲以専農功三事舉而農政修矣墾田大増宜哉齊武帝永明五年七月春夏大旱魏代地尤甚齊州刺史韓麒麟上表曰古先哲王儲積九稔逮於中代亦崇斯業今京師民庶不田者多遊食之口三分居二自承平日久豐穰積年竟相矜夸遂成侈俗臣請凡珍異之物皆宜禁斷吉凶之禮備為格式勸課農桑嚴加賞罰數年之中必有盈贍臣若水通曰風俗夸侈由於不務本農也韓麒麟請禁珍異定禮式革侈俗斥遊食所以務農桑以崇積蓄以追復古先哲王之治可謂知務矣唐𤣥宗開元十三年二月以御史中丞宇文融兼户部侍郎制以所得客户稅錢均充所在常平倉本又委使司與州縣議作勸農社使貧富相恤耕耘以時十四年上躬耕藉田且命有司勸課農桑明年大熟民遂富安臣若水通曰孔子云先之勞之故人君之欲教民必躬先其勞而後可使從也明皇作勸農社使貧富相恤耕耘以時使不躬耕藉田以為之先雖有勸課農桑之令而民未必從也其何以能臻富安之效也哉宋太祖建隆二年正月度民田周世宗末年嘗命官詣諸州度民田而使者多不稱至是宋主謂侍臣曰度田蓋欲勤恤下民而民敝愈甚今當精擇其人遂分遣官詣諸州尋詔州縣課民種植長吏以春秋廵視著為令又置義倉官所收二稅每一石别輸一斗貯之以備凶歉臣若水通曰度民田周世宗行之宋太祖亦行之矣然而收效有不同者文具之與實政異也宋太祖之實政有三曰精擇人曰課種植曰時廵視三者舉則虛偽者自無所容於其間矣此勸課之要務為人君之所當法焉國朝洪武二十年二月乙未躬耕藉田遣官享先農禮成宴群臣於壇所太祖曰耕藉田古禮也一以供粢盛二以勸農務本也朕即位以來恒舉行之惟欲使民知勸盡力於田畆以遂其生養非事虛文也今禮成與爾群臣享胙於此非徒為宴飲之樂正欲群臣知重農之意臣若水通曰周之興也自后稷以農為務而子孫世其業焉此實王業之根本也我太祖奮起農畆以一華夏之統屢舉藉田之禮所以勸農務本即后稷之藝農業文王之即田功者矣聖子神孫克遵遺烈則所以垂億萬年無疆之休者不在兹乎洪武二十七年三月命天下種桑棗謂工部臣曰人之常情安於所忽飽即忘饑暖則忘寒不思為備一旦卒遇凶荒則茫然無措朕深知民艱百計以勸督之俾其咸得飽暖比年以來時歳頗豐民庶給足田里皆安若可以無憂也然預防之計不可一日而忘爾工部其諭民間但有隙地皆令種植桑棗或遇凶歉可為衣食之助臣若水通曰明主之於民也兼所愛則兼所養凡可以加意於窮民者無所不至矣我皇祖愛養萬民之心其文王惠鮮懷保之心乎旣勸民盡力於農畆以為衣食之本而又憂其凶荒患難之不虞圖為預防之計諭民種植桑棗以為衣食之助勸督之周如此所謂以不忍人之心行不忍人之政矣聖子神孫可不體皇祖之心而思所以裕民於樂利之休也哉國朝教民榜農民有等懶惰不肯勤務農業以致衣食不給已嘗差人督併耕種今出號令止是各里老人勸督毎村置鼓一面凡遇農種時月五更擂鼓衆人聞鼓下田老人㸃閘不下田者責决務要嚴督見丁著業毋容惰夫遊食若老人不肯督勸農人窮窘為非各治其罪教民榜今天下太平百姓除糧差之外别無差遣各宜用心生理以足衣食如法栽種桑麻棗柿綿花每歲養蠶所得絲綿可供衣服棗柿豐年可以賣鈔儉年可當糧食里老常督違者治罪臣若水通曰書言養民之政勸之用休董之用威易曰說以使民民忘其勞古者春省耕秋省斂皆所以勸課乎民為衣食計也蓋人情莫不欲逸率而使之君之道也周公之告成王見於詩有若七月見於書闕二字無逸欲其知稼穡之艱難與小人之闕二字栻以為帝王所傳心法之要端在於闕二字覩闕二字榜此二節所諭樹藝之道勸課之政闕二字非易之說以使民書之董勸無逸詩闕二字月之教乎仰惟闕三字而修之俾勿壞焉則天下萬民之幸格物通巻八十六
