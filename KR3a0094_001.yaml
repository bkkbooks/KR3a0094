body:
  text: 格物通卷一明湛若水撰誠意格凡八目審幾立志謀慮感應儆戒敬天敬祖考畏民臣若水序曰誠意何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也於意焉而至之也至其意之理也是故審幾也立志也謀慮也感應也儆戒也敬天也敬祖考也畏民也皆意之事也人主讀是編焉感通吾意之理念念而知於斯存存而行於斯以有諸己則格物之功庻乎於誠意而盡之矣審幾上夫易聖人之所以極深而研幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至臣若水通曰此言聖人之作易原於心也通猶開也志者物之志也深也者理之未形體也幾也者理之已動用也一體一用變化無方可以觀神矣皆聖人之心易也易不作則聖人之心無以達諸天下何以開物而成務也故作易以極其深而天下之志開發矣研其幾而於天下之務順成矣妙其神而於天下之化溥博矣惟深故幾惟幾故神一理之貫通也人君學易以求得乎吾心之理則其深也動於幾其幾也妙於神通志成務以囿天下於神化之域而能事畢矣子曰知幾其神乎君子上交不謟下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寜用終日斷可識矣君子知微知彰知柔知剛萬夫之望臣若水通曰此易繫釋豫六二之爻辭也無謟無瀆者心之中正本體乃天理之發見所謂幾也知此故能存神有謟瀆之私則人欲也君子見天理之幾介守之如石則定而確矣不終日者知而行之速也如是則動必吉矣故曰先見知幾也者知道也而曰作曰介石不俟終日則行之果矣君子體道之功如此寜不貞吉乎斯道也通微彰合柔剛而一之者也而無不知焉知之至矣在臣則為萬夫之望在君則為天下之望君臣皆有其道則在君為不瀆在臣為不謟上下交而徳業成矣子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祇悔元吉臣若水通曰此釋復之初九之爻辭也殆疑辭庻幾言近善之幾也祗至也不善萌於幾形於事其違道逺矣顔子知幾之不善則善念生而復不逺故曰庻幾不先知其不善則萌於心發於事至於悔然後復則逺矣夫知幾而不行者乾知大始先天之學也祗悔而改過者坤作成物後天之學也先天者聖人之學也後天者賢人之學也孔子之學非顔子不傳故曰學顔子之所學是故蓍之徳圓而神卦之徳方以知六爻之義易以貢聖人以此洗心退蔵於宻吉凶與民同患神以知來知以蔵往其孰能與於此哉古之聰明睿知神武而不殺者夫臣若水通曰易繫辭此章言聖人作易卜筮之功用也圓神謂蓍徳渾然變化不測方知謂卦徳粲然事理可見易以貢謂爻徳變易不居以理告人以此謂蓍卦爻也所謂易道也易道非他也即人心之天理也人惟不見此道故累於私而涉於粗淺矣惟聖人以言乎已則察見道體私意不容而本體澄澈故曰洗心心與道涵淵泉莫測故曰蔵宻以言乎民則蓍神足以知來未然者如有所見卦知足以蔵往已然者妙於無迹蓍以定卦卦以生爻爻以著占使民避凶而趨吉是何以能之哉古之神聖有聰明睿智之資故能深見易道而洗心退藏是以發而為易使人自然趨避不假於怒而威矣此聖人作易之妙用也人君察其幾由於我養其聰明睿智之徳則有以察其道體而本源潔深斯可以用易而有神武不殺之大用矣書虞書益稷禹曰安汝止惟幾惟康臣若水通曰止者至極不遷之名即吾心本體之中正天理是也安之云者勿忘順適乎自然則心純乎天理而止得其止有忘與助焉則人欲肆而天理微不得其止矣惟幾所以致力於一念之微惟康所以致力於事為之著二者皆安止之功夫也誠意之功在虞書益稷謨此章最為切要盖禹得於舜惟精惟一之傳者誠為人君聖學之首務也伏惟聖明體而行之幸甚商書太甲若虞機張往省括于度則釋欽厥止率乃祖攸行臣若水通曰此伊尹告太甲以應幾處事之要也虞謂虞人掌山澤田獵之官機者弩牙也括者矢括也度者法度射者所準望者也釋舍矢也欽敬也止者心之本體義理之所止也率者循也乃祖謂成湯也伊尹告太甲以如虞人之射弩機既張必往察其矢括之所準望者合於法度然後發之否則不輕發也人君處事必度其事之合於吾心之正然後從而舉之否則不輕舉也然萬事皆起於念慮之微善善惡惡皆有定理所謂止也敬乎吾心之所止必戒慎恐懼使念慮之發不失其本體故能廓然大公物來順應一循乃祖成湯之成法精意可以歴乆逺而無弊故不欽乃止則不能率祖之攸行人君可不以法祖為用以欽止為本乎周書召誥嗚呼若生子罔不在厥初生自貽哲命今天其命哲命吉凶命歴年知今我初服臣若水通曰此成周初成召公告成王初政之言也嗚呼嘆辭初服行事之始也召公歎息言王之初服如人之生子然無不在於初生之時初習為善則善矣習於善則自貽其哲命也今天其命王以哲乎命以吉凶乎命以歴年乎皆不可知所可知者今我初行政事如何爾初服而敬徳則亦自貽哲命而吉與歴年矣夫天下之事莫不在於初故經曰慎厥初惟其終是則初事者智愚治亂之幾也初心者善惡邪正之幾也吉凶長短於此焉判為人君欲圖治撥亂者在於初事欲慎初事者在於初心孟子曰今人乍見孺子入井有怵惕惻隱之心乍見之心初心也初心善則事無不善事無不善則吉與歴年反是則凶短折至矣可不慎其幾乎詩小雅鶴鳴于九臯聲聞于野魚潜在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯臣若水通曰此盖陳善納誨於君之辭也比也言鶴鳴于九臯則聲聞于野矣比誠則必形以諷王之誠身也言魚潜在淵則或在于渚矣比理之無定體以諷王之明善也樹檀維蘀比以為美中則有惡石可為錯比以為惡中則有美以諷王之審惡取善也要之三者惟在審其幾耳能審其幾而有以察見天理明善於己取善於人皆所以誠身擴而充之自一念以至於萬幾莫非中正純一之本體則誠能感物而四方風動矣聲聞于野之謂也此詩人含蓄不盡之意聖學心法之至要惟聖明留意焉大雅抑相在爾室尚不愧於屋漏臣若水通曰此衛武公修徳告羣臣規戒之詩也相猶書言頋諟之義尚猶也屋漏室西北隅幽暗之地也夫視存則心存心存則理存理存則不愧矣此天理存亡之幾也故視之準則即本心也心之中正即天理也天理者無動静無隱顯一而已矣君子知其幾察見天理常目在是造次顛沛而必於是在庭在室無不在是無少間斷以操存此理於一室之中雖暗室幾微之際而無乎不在則與天地相似矣何愧之有所謂仰不愧於天者是已屋漏猶且不愧况大廷應接之時乎盛徳大業由是而生矣此千聖心法之要武公能言之其亦聖人之徒也人主茍能頋諟天之明命大廷深宫一心無間何患乎無光明正大之徳業乎禮記少儀曰問卜筮曰義與志與義則可問志則否臣若水通曰卜筮者動乎幾者也動而有義焉有志焉義也者心之天理也志也者心之邪謀也夫易為君子謀不為小人謀故非疑不占非義不占君子於此在審其幾而已矣樂記曰人生而静天之性也感於物而動性之欲也物至知知然後好惡形焉好惡無節於内知誘於外不能反躬天理滅矣夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲者也臣若水通曰人之心寂感而已矣性也者合寂感通動静而一之者也若謂静為性則動果非性邪性即理也理無動静故學者恒知而已矣物至知知然後能節好惡能節好惡則外知不能誘矣是合内外之道也故知也者内外動静之幾也可不審乎論語曾子曰吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎臣若水通曰此曾子省身之學也自省者入善之幾也人惟不知省故人心死而天理滅矣曾子之學常於心上用功故以三事日省日省則無時而不省矣省者心之所以生天理之所以存也三省同一心皆隨處體認之功也盖謀不忠交不信傳不習心皆不實反以自省頃刻知之則頃刻即實而天理存矣此曾子日省所以隨處精察而致謹焉真自治之誠切者歟此即與一貫之學同宜其聞夫子之㫖而即唯也學曾子之學者其尚求諸心以决其幾哉子曰君子喻於義小人喻於利臣若水通曰此章孔子分别君子小人至為痛切君子者極善之名小人者極惡之名君子小人之善惡其端始於一念之萌爾一念義利此善惡幾也喻者皆本其心之念慮而言凡一念之正而無所為者天理天理則義也人知一念之正為是為義則念念皆義心與義一是通曉乎義是君子矣凡一念之邪而有所為者皆人欲人欲則利也人知一念之邪為便為利則念念皆利心與利一是通曉乎利是小人矣盖其始也不能審之於㡬㣲故其終也不能覺之於成性喻義喻利有不期然而然者矣夫今之行路之人呼之以君子之名則喜呼之以小人之名則怒至其處心之際則往往舎義而從利豈其愛身不以君子哉由不早察其幾耳是故以言乎學問則為聖為賢其失為匪人為禽獸以言乎為治則為王道其失為伯術皆於此焉分此固為學者之所當知而人君之治天下國家尤所當慎焉孟子曰先生以利説秦楚之王秦楚之王悅於利以罷三軍之師是三軍之士樂罷而悦於利也為人臣者懐利以事其君為人子者懐利以事其父為人弟者懐利以事其兄是君臣父子兄弟終去仁義懐利以相接也然而不亡者未之有也先生以仁義説秦楚之王秦楚之王悦於仁義而罷三軍之師是三軍之士樂罷而悦於仁義也為人臣者懐仁義以事其君為人子者懐仁義以事其父為人弟者懐仁義以事其兄是君臣父子兄弟去利懐仁義以相接也然而不王者未之有也何必曰利臣若水通曰子罕言利則非不言也易之言利者多矣宋牼一言不利而罷兵罷兵仁義之術也而孟子所以深辯之者何哉盖戰國之時利欲横流其勢滔天况又開其源耶春秋弑君三十六大抵皆起於一念之利而積之其禍又有甚於交兵者是以聖賢不得不嚴其防㧞其本塞其源也噫仁義根於人心利欲生於物我其幾不可不審學之不講義利不明故荀卿猶謂義利人之兩有牼亦遊説之士也心喻之口必言之何怪其然哉故學者莫先辨乎義利之幾中庸莫見乎隱莫顯乎微故君子慎其獨也臣若水通曰此覆申上戒謹不睹恐懼不聞之意也隱者道體之全潛於渾淪也微者道體之小妙於散殊也即上文所謂不睹不聞者也子思言上所謂戒謹不睹恐懼不聞者何哉盖道體用一原顯微無間然而隱微者道之體也見顯者道之用也道之大用皆原於體故曰莫見乎隱莫顯乎微隱微者即其不可見聞而可自知之者也君子有以察識其幾而戒謹恐懼敬慎以存之則中立而和生萬物皆從此出而位育成矣為人君相有位育之責者盍於是求之詩云潜雖伏矣亦孔之昭故君子内省不疚無惡於志君子之所不可及者其惟人之所不見乎臣若水通曰此子思引詩而申之復言下學謹獨之事也引詩言潜者不睹不聞之體雖云幽伏矣而天下之顯見者皆本於此則亦甚昭著焉故君子專用力於此自省其髙明廣大之本體不虧而天之所以與我者不失何愧於心乎於人之所不見而已獨知之者而致謹焉此君子之所以為不可及也故程顥曰中庸語道只無聲無臭括了多少又曰自無聲無臭發而為禮儀三百威儀三千自禮儀三百威儀三千復歸於無聲無臭是足以見體用一原顯微無間矣故求聖學者其幾只在慎獨國語晉語史蘇曰伐木不自其本必復生塞水不自其源必復流滅禍不自其基必復亂臣若水通曰史蘇晉大夫占卜之史也基根本也夫天下之事皆起於幾微君子不可不早見其幾也獻公伐驪戎滅其子而寵其姫起百姓以自封禍将長矣史蘇伐木塞水之喻可謂先見其幾矣人君明於先見之幾而絶其未萌之禍則國家豈至於危亂也哉晉語郭偃曰夫人美於中必播於外而越於民民實戴之惡亦如之故行不可不慎也必或知之臣若水通曰言有美善於中心必播布於外揚越於民下民必或知其善否矣夫誠中形外一善一惡自有不可揜者恵公出共世子而改塟之臭逹於外安能掩其惡於天下後世哉為人君者豈可不謹於善惡之幾乎晉文公問於郭偃曰始也吾以國為易今也難對曰君以為易其難也将至矣君以為難其易也将至矣臣若水通曰文公名重耳以為易則輕忽之心生故其難将至以為難則兢業之心生故其易将至難易之勢係乎敬怠之間為人君者可以知安危之㡬矣善乎文公之問而郭偃之對也仰惟聖明勵精圖治必留神而審其幾焉天下國家幸甚格物通卷一
