body:
  text: 格物通􅃃四十四明湛若水撰事君使臣中論語定公問君使臣臣事君如之何孔子對曰君使臣以禮臣事君以忠臣若水通曰禮是天理之見於實事者忠是天理之發於實心者定公之時君弱臣強上下無道使臣事君之問亦有所感而發也故孔子告之以此葢君之所使於臣之事必其天理之所當為而非所不當為而為者斯乃謂之禮則臣必可奉行矣臣之所事於君之道必由於天理之正而非罔所不正以為正者斯乃謂之忠則君必無過矣然天理一而已矣上以禮感下以忠應有不可誣者君禮臣忠則各盡其道上下交而為泰矣堯舜之克艱亦不過如此聖人之言真萬世君臣之龜鑑歟所謂大臣者以道事君不可則止臣若水通曰大臣即是大人為之所養者大故其徳業亦大所謂大者道是也所謂道者天理是也大臣以此事其君引之當道格其心而志於仁若其言之不聽諫之不行則道有不合矣則去之而不茍留也是其仕也以道止也以道樂則行之憂則違之進退以道確乎而不可㧞矣故嘗論之以道事君者固愛君也不合而去者亦所以愛其君也何也道不合而弗去則將茍焉以徇利是使君輕視其臣謂可以利籠絡之也君而輕視其臣何所不至惟大臣者能以道為去就則足以起其君敬畏之心君而有敬畏之心則大臣雖退猶進也雖去猶留也是之謂愛君之道夫子之不許由求以其無大人之學爾若顔曾冉閔者其人乎惜乎魯之君臣莫能用也子路問事君子曰勿欺也而犯之臣若水通曰犯謂犯顔諫諍也欺謂所犯之言或有不由其誠不當於理而猶涉於欺罔也禮曰事君有犯而無隠書曰予違汝弼汝無面從則事君固貴於面折犯顔然而不免有欺君罔上之言雜乎其間則固已得罪於君又得罪於天矣雖能犯而亦何取故孔子告子路以有勿欺之心而犯則忠直並行而事君之道盡矣後之為臣犯則徃徃有之或由於好名或由於附勢凡有所為而為則欺君之罪已先不能免矣何以望其君之感悟哉孟子曰欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣不以舜之所以事堯事君不敬其君者也不以堯之所以治民治民賊其民者也臣若水通曰孟子此言堯舜為君臣盡人倫之至所以曉告當時君臣取法之也夫堯以道治民君道之至也舜以道事君臣道之至也道者天理是也為君而未至於堯是君道猶有未盡也故猶為賊害其民為臣而未至於舜是臣道猶有未盡也故猶有不敬其君慢君賊民則無道極矣可不懼哉夫後世之為君者與堯之為君同此心也同此理也後世之為臣者與舜之為臣亦同此心也同此理也何後世之為君臣者其去堯舜之君臣若是相逺哉盡心與不盡心爾伏惟聖明求諸臣知堯舜之心學者而講習之焉則君臣咸有一徳而堯舜之治可幾矣左傳僖公九年初晉獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送徃事居耦俱無猜貞也及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如荀息曰將死之里克曰無益也荀息曰吾與先君言矣不可以貳能欲復言而愛身乎里克殺奚齊荀息立公子卓里克殺之荀息死之臣若水通曰荀息之死於所事為忠不食所言為信而公利必為徃来耦俱葢其忠貞之小者固不論也若息者庻可以為事君之法矣後或從而玷之臣不知也僖公九年夏會於葵丘尋盟且修好禮也王使宰孔賜齊侯胙曰天子有事于文武使孔賜伯舅胙齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜下拜登受臣若水通曰周室東遷綱常淪斁以天子而下堂見諸侯則君臣之禮壊也極矣葵丘之㑹尊王之義著而三綱頼以不墜宰孔一言幾敗大事矣桓公卒能尊天顔以就下拜而天地冠屨之大義明此桓公之所以為覇主也歟僖公二十八年冬㑹於温是㑹也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也且明徳也臣若水通曰君臣者天地冠屨之大義不可得而犯也且桓文所恃以服諸侯成功伐者非尊君之義乎晉文方平衛許之訟乃遽召見天子其與齊桓固請下拜天子之賜者何如邪故曰齊桓公正而不譎晉文公譎而不正定公四年初伍貟與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若鄰於君疆場之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣丁姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出臣若水通曰包胥興楚之心猶伍員報楚之心也包胥之興楚也為君伍員之報楚也為親為親者孝為君者忠皆不忘所天者也後之為子者有伍員之孝其為臣必有包胥之忠矣經曰事親孝故忠可移於君其二子之謂乎國語周語劉康公曰臣聞之為臣必臣為君必君寛肅宣惠君也敬恪恭儉臣也寛所以保本也肅所以濟時也宣所以施教也惠所以和民也本有保則必固時動而濟則無敗功教施而宣則徧惠以和民則阜若本固而功成施徧而民阜乃可以長保民矣其何事不徹敬所以承命也恪所以守業也恭所以給事也儉所以足用也以敬承命則不違以恪守業則不懈以恭給事則寛於死以儉足用則逺於憂若承命不違守業不懈寛於死而逺於憂則可以上下無隙矣其何任不堪上任事而徹下能堪其任所以為令聞長世也臣若水通曰劉畿内之國康公正卿王季子也上下君臣也隙瑕釁也君君臣臣則上下交而為泰則徳業成矣劉康公其知道乎夫寛肅宣惠君之道也敬恪恭儉臣之道也知所使事則上事無不徹下任無不堪矣欲為君盡君道欲為臣盡臣道其可不法康公之言乎魯語魯饑臧文仲言於莊公曰今國病矣君盍以名器請糴辰也備卿辰請如齊公使徃從者曰君不命吾子吾子請之其為選事乎文仲曰賢者急病而讓夷居官者當事不避難在位者恤民之患是以國家無違今我不如齊非急病也在上不恤下居官而惰非事君也文仲以鬯圭與玉磬如齊告糴臣若水通曰莊公魯桓公之子同也臧文仲魯大夫名辰告請也選事自選擇其執事也夷平也無違無相違狠也鬯圭祼鬯之圭長尺二寸有瓚以祀廟玉磬鳴璆也夫國病則主憂主憂則臣辱相視一體者也故人君者賴臣之力以宏濟於艱難人臣者濟君之艱以急國家之難而安其民者也此臧文仲事不辭難可謂能事君矣魯語宣公夏濫於泗淵里革斷其罟而棄之曰今魚方别孕不教魚長又行網罟貪無藝也公聞之曰吾過而里革匡我不亦善乎是良罟也為我得法使有司藏之使吾無忘諗師存侍曰藏罟不如置里革於側之不忘也臣若水通曰宣公魯文公之子倭也濫漬也漬罟於泗水之淵以取魚也泗在魯城北罟網也别别於雄而懐子也藝極也良善也諗告也師樂師存名也古之忠臣不從君之欲而引之於志仁古之明君不徒從臣之言而貴於改過魯宣濫於泗淵而里革斷罟公命藏之則君明臣直兩得之矣使若置里革於側其所拾遺補過顧不多歟有天下者能師宣公無忘之心必近忠直之臣其為盛徳大業可量也哉晉語寺人勃鞮曰事君不貳是謂臣好惡不易是謂君君君臣臣是謂明訓明訓能終民之主也臣若水通曰勃鞮寺人披也訓教也夫人臣之事君也不貳其心人君之使臣也不阿其好惡君臣各盡其心而其道盡矣寺人勃鞮雖不足道然其所稱亦有格言矣君子其勿以人而廢言哉晉語夙沙釐曰臣委質於翟之鼓未委質於晉之鼓也臣聞之委質為臣無有二心委質而䇿死古之法也君有烈名臣無畔質敢即私利以煩司寇而亂舊法其若不虞何穆子嘆而謂其左右曰吾何徳之務而有是臣也乃使行既獻言於頃公與鼓子田於河隂使夙沙釐相之臣若水通曰夙沙釐姓名鼓子之臣也鼓本屬翟今為晉所取也䇿死謂書名於䇿必死其事也烈明也無畔質示必死也若夙沙釐之於鼓子可謂忠於事君而穆子之於夙沙釐可謂明於使臣矣後之為臣者當以夙沙釐為法為君者當以穆子之告頃公為法晉語趙簡子曰夫事君者諫過而賞善薦可而替不獻能而進賢擇才而薦之朝夕誦善敗而納之道之以文行之以順勤之以力致之以死聽則進不則退臣若水通曰諫過匡救其惡也賞善將順其美也薦進也替去也死死其難也夫匡惡而順美選賢而薦才道文行效死力知進退簡子論事君之道盡矣真可以為萬世人臣之龜鑑歟周威烈王二十三年趙襄子漆智伯之頭以為飲器智伯之臣豫讓欲為之報讐乃詐為刑人挾匕首入襄子宫中塗厠襄子如厠心動索之獲豫讓左右欲殺之襄子曰義士也吾謹避之爾乃舍之讓又漆身為􅋪吞炭為啞行乞於市其妻不識也其友識之為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易邪何乃自苦如此讓曰不可既以委質為臣而又求殺之是二心也凡吾所為者極難爾然所以為此者將以愧天下後世之為人臣懐二心也襄子出豫讓伏於橋下襄子至橋馬驚索之得豫讓遂殺之臣若水通曰豫讓出百死以圖為智伯報讐事雖不成而不以生死存亡貳其心又不肯委質而求逞志若豫讓可以為社稷之臣矣襄子始以其為義士而謹避之終不能不殺之則何以使人臣之盡忠邪然而以衆人國士之遇而異其報則何自待之不厚矣周赧王三十一年樂毅聞畫邑人王蠋賢令軍中環畫邑三十里無入使人請蠋蠋謝不徃燕人曰不来吾且屠邑蠋曰忠臣不事二君烈女不更二夫齊王不用吾諌故退而耕於野國破君亡吾不能存而又欲刼之以兵吾與其不義而生不若死遂經其頸而死臣若水通曰王蠋之死不事二君之志明矣而所以致之者毅也方其初也以禮聘之至再至三而不起則就其廬而訪焉可也何至不来且屠邑哉封墓之舉亦為徒然矣臣愚於毅不能無憾焉漢髙帝六年項羽已滅田横懼誅與其徒五百餘人入居海島中帝恐其為亂乃使人赦横罪而召之曰横来大者王小者侯不来且舉兵加誅横乃與其客二人乗傳詣洛陽未至三十里自殺帝拜其二客為都尉以王禮葬之横既𦵏二客穿其冡傍皆自刎下從之帝聞之大驚聞其餘五百人在海中使使召之至則聞横死亦皆自殺臣若水通曰二客以不貳心於横而自刎以死則生平之所以事其主者將無所不盡其忠矣田横致二客五百人之從已以死則平日之所以恩禮結之者亦將無所不盡其誠矣可以為後世上下之法也已漢文帝六年賈誼曰人主之尊譬如堂群臣如陛衆庻如地故陛九級上亷逺地則堂髙陛無級亷近地則堂卑髙者難攀卑者易陵理勢然也故古者聖王制為等列内有公卿大夫士外有公侯伯子男然後有官師小吏延及庶人等級分明而天子加焉故其尊不可及也里諺曰欲投䑕而忌器此善諭也䑕近於器尚憚不投恐傷其器况於貴臣之近主乎亷耻節禮以治君子故有賜死而無戮辱是以黥劓之罪不及大夫以其離主上不逺也臣若水通曰人君之使臣謹以擇之於初誠以任之於後因其徳而爵之朝無非徳之大夫也故禮刑不上大夫誼欲文帝禮大臣而有賜死而無戮辱之言過矣葢未知國君進賢如不得已卑踰尊踈踰戚尚不可不謹况加刑乎啟人君賜死之非者必自斯言矣漢武帝天漢元年蘇武使匈奴單于使衛律召武欲降之律謂武曰律前負漢歸匈奴幸蒙大恩賜號稱王擁衆數萬馬畜彌山富貴如此蘇君今日降明日復然空以身膏草野誰復知之武不應律曰不聽吾計後雖欲復見我尚可得乎武罵律曰汝為人臣子不顧恩義畔主背親為降虜於蠻夷何以汝為見律知武終不可脅白單于單于乃幽武置大窖中絶不飲食天雨雪武卧齧雪與旃毛并咽之數日不死匈奴以為神乃徙武北海上使牧羝曰羝乳乃得歸别其官屬常惠等各置他所臣若水通曰蘇武之為人臣孤忠大節可與日月争光有補於天地冠履之大義其功徳茂矣夫何還自匈奴拜為典屬國賜錢田宅而竟不聞以處公卿之位則宣帝使臣之道可知矣漢宣帝元康二年丙吉為人深厚不伐善自曾孫遭遇吉絶口不道前恩故朝廷莫能明其功也會掖庭宫婢自陳嘗有阿保之功辭引使者丙吉知狀上親見問然後知吉有舊恩而終不言上大賢之臣若水通曰書曰汝惟不伐天下莫與汝争功丙吉以之此宣帝所以益賢之也雖然臣子之身皆君父之身所能為者乃可盡分爾何伐之有然則吉之義可以愧天下後世貪薄之夫之矜伐者矣漢成帝元延元年槐里令朱雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下無以益民皆尸位素餐臣願賜尚方斬馬劍斬佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊於地下足矣御史遂將雲去左將軍辛慶忌免冠叩頭殿下曰此臣素著狂直使其言是不可誅使其言非固當容之上意解及後當治檻上曰勿易因而輯之以旌直臣臣若水通曰朱雲位卑而言髙所以取罪然其心實痛禹之邪佞一時近臣無言者故發憤如此然其事上不欺之忠固出於廷臣之上矣成帝始怒欲誅之及悟戒勿易檻以旌其直可謂能補過者哉漢孺子嬰初始三年王莽遣使者奉璽書印綬迎襲勝勝稱病篤使者以印綬就加勝身勝輙推不受謂門人髙暉等曰吾受漢家厚恩無以報今老矣誼豈以一身事二姓語畢遂不復開口飲食積十四日而死臣若水通曰龔勝不受莽之印綬而繼之以死人臣不貳之忠盡矣至云吾受漢家厚恩無以報是又足以愧莽賊之心歟然則後世人君之待臣可不以恩禮耶格物通卷四十四
