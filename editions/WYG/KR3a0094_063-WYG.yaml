body:
  text: 格物通卷六十三明湛若水撰舉措一易泰彖曰内陽而外隂内徤而外順内君子而外小人君子道長小人道消也臣若水通曰陽為徤為君子隂為順為小人泰卦乾陽來居内是徤在内也坤隂往居外是順在外也君子小人之進退國家之治亂所係也何謂内君子内者主之也自朝廷以至百執事皆君子也何謂外小人外者黜之也小人無得以干政也内君子則君子之道長矣外小人則小人之道消矣陽剛之道大為世用隂邪不得而間之人君舉措之公則天下開泰矣書曰任賢勿貳去邪勿疑若使君子小人雜出乎其間則君子以直道而退小人以邪佞而進甚至小人衆而君子獨雖欲不亡不可得已有國者不可以不慎也頥彖曰天地養萬物聖人養賢以及萬民頥之時大矣哉臣若水通曰此彖辭賛頥道之大也夫天地人物一氣者也故天地之於萬物聖人之於萬民因其氣之同而以彼所固有者養之使日益盛耳非謂民物所本無而强附益之也萬物有生意不能以自養養之者天地也雨露霜雪皆天地之致養乎物者也一氣之通也萬民有生理不能以自養養之者聖人也教養刑政皆聖人之致養乎民者也一理之運也然自養賢始必尊其位重其禄以達其用也以賢者而養天下者使承君教養刑政之道以致之民也故天下皆得其所矣萬物與萬民遂其養聖人與天地極其功頥之時大矣哉雖然天地之於物無弗養者至於天下之民之失其養者多矣蓋所養未必賢賢者未必養掊尅在位而民失所生矣故人君養得其賢則萬民遂其養養不得其賢則萬民失其生可不謹哉解六五君子維有解吉有孚于小人臣若水通曰六五以隂居君位為解之主然與三隂同類顧其能去之否耳孚者驗而可信也隂者小人也能解與不能解皆未可决惟驗信於小人之黨能去與否也小人亂天下者也不解則惡黨親而善類逺矣君子小人不相為謀也解則小人去而君子進天下之慶也然難退易進者小人也必其放流之屏逐之小人退而後驗其能解不然則未見其能解也彼見不善而不能退退而不能逺夫豈知解之道哉夬揚于王庭孚號有厲告自邑不利即戎利有攸往臣若水通曰此夬之彖辭孚者信之在中也號者命於衆也厲危也邑者私邑告自邑自治其私也即戎尚武也蓋夬者以五陽决去一隂是君子决小人也不明其罪無以屈其心揚于王庭者聲其罪於公朝使皆顯然明善惡之歸也其揚而號之必誠信由中出以呼號衆類相與合力而後為公然小人在上故尚有危道不敢忘戒懼也必先自治然後可以治人故告自邑先治其已正己以正人也以力角力君子未有能勝於小人不利即戎言不可過用威武也如是而往以决之彼有可伐之罪我無可乘之隙隂類盡而陽道大行矣寧不利於攸往邪夫攻之者君子也主之者君也君不惑于小人而君子得盡其謀矣不然小人之依憑城社又豈得以易决邪井九三井渫不食為我心惻可用汲王明並受其福臣若水通曰渫清潔也汲注也九三以陽剛而得正在井下之上君子之德之純有濟世之才如井之潔清者也困於下而澤不及於人猶井之清潔不食也秉彞好德人皆有之有君子而不用則為人心之惻者亦情也何也其才德之可用猶井之可汲也明王汲之以居於位而其致君澤民之福上下並受之矣故君子之不用豈獨君子之窮哉亦天下之不利也有天下者能使朝野無遺賢之嗟其慶寧有已邪書虞書舜典流共工于幽州放驩兠于崇山竄三苖于三危殛鯀于羽山四罪而天下咸服臣若水通曰此史臣記大舜錯枉之政共工驩兠鯀三臣名三苖國名言舜知共工之象恭滔天故流之於幽州北裔之地使之逺去知驩兠之同惡相濟故放置之於崇山南裔之地使不得他適又知三苗之恃險為亂故竄之於三危西裔之地驅逐而錮禁之又因鯀之悻愎自用湮汩洪水故殛之于羽山東裔之地拘囚困苦之此四人者天下之四兇也各因其罪而罪之舜以至明之心而行至公之法故宋儒程顥曰舜之誅四兇怒在四兇舜何與焉蓋聖人之心如鑑之空物之來也妍􅎀自形鑑何與焉故流放竄殛各適其可而天下咸服其用刑之當罪蓋以得其心之所同然者故也後世之君皆以一己之喜怒而賞罰人故不合乎天下人心之同然何服之有人君用刑可不以此為法乎臯陶謨曰都亦行有九德亦言其人有德乃言曰載采采禹曰何臯陶曰寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而廉剛而塞彊而義彰厥有常吉哉臣若水通曰此臯陶陳知人之謨都者嘆美辭亦者緫也緫言德之見於行者其凡有九載行也采事也亂治也擾馴也而轉語辭彰著也吉美士也臯陶嘆而言觀人者緫言其人之有九德必指言其所行之實某事合某德某事合某德為可信驗而不徒託名溢美矣禹曰何者問其九德之目也臯陶遂言所謂九德者寛𢎞而莊栗也柔順而植立也謹愿而恭恪也有治才而敬畏也馴擾而果毅也徑直而温和也簡易而㢘隅也剛徤而篤實也彊勇而好義也九者皆其成德之自然有中正和樂之懿無偏倚駁雜之私德著之於身而始終有常其吉士矣哉臣謂德者吾心所得之天理也天理一而已矣而以為有九者何邪夫理一而分殊者也存於心者一而見於行者九耳德藴於中而難知行著於外而可見故言人有德必證之於某事某事則有核實之行矣夫德之未成者則不能有其常今日行某事之善而他日或不能然若夫盛德之至則九德雖不必一時並見而其歲月之久則隨感而應隨事而見於是乎九德咸著夫然後知其有常不變而為盛德之至也古之聖賢觀人之詳用人之慎如此後世以文字取士以身言書判選官不亦淺乎伏惟聖明欲復唐虞三代之治當法其觀人用人之道然後可焉周書武成乃反商政政由舊釋箕子囚封比干墓式商容閭臣若水通曰此史臣記武王克商舉措之大政也舊者先王之政也箕子諫紂被囚比干諫紂為紂所殺商容者商之賢人也閭者族居里門也式者憑車前横木以起敬也言武王克商之後乃反紂之虐政其政一由先王之舊箕子為紂所囚則釋其囚而放之比干為紂所殺則即其墓而封之過商容之閭乃式而起敬焉夫人君之政在服人心而已天下之人心好善惡惡一而己好惡之公在得其本心而已故君人者得其本心則好惡公好惡公則能得天下之人之心而天下之政舉矣康誥庸庸祗祗威威顯民臣若水通曰此武王命康叔為衛侯之言也庸用也祗敬也威刑也庸庸者用其所當用用當其賢祗祗者敬其所當敬敬得其人威威者威其所當威刑當其罪言文王用能敬賢討罪一聽於理而已無與焉廓然大公隨感而應物各付物天之理也德誠於已而著於民誠之不可掩而能動物也其造區夏脩友邦怙冐西土皆誠之所感也人君舉措可不一本於誠乎詩小雅正月瞻彼阪田有菀其特天之扤我如不我克彼求我則如不我得執我仇仇亦不我力臣若水通曰此大夫所作以刺幽王用舍之無常也阪田﨑嶇墝埆之田菀者茂盛貌特者特生之苗也扤動也力謂用力也言瞻視彼阪田猶有特生之苗而天之扤我而頓挫之而恐其不我勝焉蓋不敢歸咎於時故歸之於天也又言始焉以我為賢而求之惟恐弗得終焉執之如仇讎又不能用舉措顛倒無常如此者何也蓋由此心之蔽惑而無所定主故或因一人譽而舉之或因一人毁而棄之舉措不由吾心之衡鑑一出於在人之毁譽故輕舉易棄始終無常固如此無足怪也故有國家者於舉措人才之際惟在自正此心之衡鑑衡鑑既定則心有所主心有所主則明明則斷既明且斷不肖者必知之而不舉賢者必舉之而不棄安有始終無常如此者哉故人主不患舉措之不公惟患此心之不明且斷耳春秋桓公五年天王使仍叔之子來聘臣若水通曰胡安國傳云仍叔之子云者譏世官非公選也帝王不以私愛害公選故仕者世禄而不世官任之不以其賢也使之不以其能也卿大夫子弟以父兄故而見任使則非公選而政由是敗矣上世有自耕野釣渭擢居輔相而人莫不以為宜伊陟象賢復相太戊丁公世美入掌兵權不以世故疑之也崇伯殛死禹作司空蔡叔既囚仲為卿士亦不以其父故廢之也惟其公而已矣及周之衰小人得政視朝廷官爵為己私援引親黨分據要途施及童稚賢者退處於蓽門老身而不用公道不行然後四夷侵陵國家傾覆雖有智者不能善其後矣春秋書武氏仍叔之子云者戒後世人主徇大臣私意而用其子弟之弱者居公選之地以敗亂其國家欲其深省之也臣謂安國之説可謂得春秋之㫖矣夫舉措用舍者王政之大端治亂之所由成者也不以其賢惟以其世文王之政至是冺滅無餘矣此王綱之所以不振禮樂征伐不自天子出也惜哉禮記王制命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士升於司徒者不征於鄉升於學者不征於司徒曰造士大樂正論造士之秀者以告于王而升諸司馬曰進士司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後禄之大夫廢其事終身不仕臣若水通曰命鄉論者必鄉人乃知之真也秀者頴出也俊士者才過千人者也不征於鄉免鄉之徭役也不征於司徒者免司徒之役也造士者成就其才德者也司馬者掌爵禄之官也定論者考評其行藝之詳也官之謂初試仕也任官能勝任也爵之謂一命也位即爵也禄之養以禄也官而後爵爵而後禄察之詳矣故不及惡德也廢其事如敗國殄民荒淫亂俗也終身不仕懲之重所以勸後人也夫先王之養士用人命之鄉論之司徒造之樂正告之王辨之司馬論而官官而爵爵而禄焉則其所養所用無非才徳之良天下豈有不治哉緇衣子曰唯君子能好其正小人毒其正故君子之朋友有鄉其惡有方臣若水通曰鄉向也天下之治亂邪正而已矣正人進者治之表也君子以正感正與同類同道故好其正小人以邪召邪而異類異道故害其正君子之所以好其正者以其好同向惡同方也故其進也必㧞茅連茹焉故人君用一君子則百君子進而邦其昌矣用一小人則百小人進而國事非矣是以人君必正其好惡以公其心故能鑒天下之善惡而用舍之則正人出而天下治矣昔在東漢以黨人目君子逮於有宋以偽學斥真儒蓋即其彚征之迹而中傷之而不知為好正之實此亂亡所以不旋踵也吁周禮地官司救凡民之有衺惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空其有過失者三讓而罰三罰而歸于圜土臣若水通曰衺不正也讓責也罰撻之也衺惡在心故為不善者也過失在事誤䧟于惡者也民有衺惡姑以責之責之至三而不改姑又撻之撻之至三而不改然後加以明刑去其冠飾而書其罪狀以示諸人又使之坐于嘉石以恥辱之役諸司空以困苦之過失輕于衺惡故三讓三罰以啓其遷善改過之心不加明刑不坐嘉石不役司空惟犯則收之圜土而已若然則措所當措而民焉有不直者乎地官鄉大夫三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貳之臣若水通曰三年大比者以其三年有成也於是時攷其德行道藝而舉其賢能賢即上之所謂德行者能即上之所謂道藝者鄉大夫三歲考其賢能者以鄉飲酒之禮而禮接以賔興之明日獻賢能之書于王王於是拜受之拜受之者重其賢能也登於天府者蓋崇重之與寳玉同也内史書其副以詔王爵禄之也夫先王之養士取士德行道藝本其心性之所固有者成之而已故用而見之政事成之功業皆其德行道藝之發也故養之以實學用之以實德而國家賴焉為人君者可不務乎論語哀公問曰何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服臣若水通曰此孔子答哀公以舉措之道也哀公魯君名蔣錯者捨置也諸衆也哀公問於孔子以何所為而民心服從孔子對之以為人同此心心同此理欲得民心之服者以舉措得宜合民心之同然故也否則不合民之同然而民心有不服者矣故有徳有才得天理之公正直者也則舉而用之列於公卿大夫士之位其無才無德悖乎天理之公正者則捨而置之是一舉一措合乎民心天理之公矣民何為而不服乎若無才德而頗僻是謂枉者則舉而用之列於公卿士大夫之位而才德方正之士反棄之在野屈之下僚是一舉一措拂乎民性秉彞之公矣民何為而服乎由是言之服民之心者以得民心是非之公也欲得民心是非之公者必得吾是非之本心天理之本體也人君可不加之意乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣臣若水通曰舜有虞之君臯陶其臣也湯有商之君伊尹其臣也樊遲聞孔子舉直錯枉能使枉者直之言而未喻其指子夏既嘆其言之富於此遂釋其兼仁知之意也言帝舜受堯之禪而有天下知臯陶之為仁賢也舉而用之為士師以明刑弼教是舜之知也卒之民協于中皆化而為仁而不仁者逺去矣非帝舜之仁乎成湯放桀而有天下知伊尹之一德也舉而用之為阿衡以堯舜其君民是湯之知也卒之夏民革正皆化而為仁而不仁者逺矣非成湯之仁乎然則用得其人而天下化成矣非具仁知之體用其孰能之哉夫天下之民之仁即臯陶伊尹之仁也臯陶伊尹之仁即大舜成湯之仁也舜湯能舉臯陶伊尹能化天下之民者以其同此心同此仁也然則後之人君欲舉賢以化理者可不先以知明諸心而仁以體之以為本哉故曰為政在人取人以身仲弓曰焉知賢才而舉之子曰舉爾所知爾所不知人其舍諸臣若水通曰仲弓名雍孔子弟子為季氏宰問政孔子既告之以先有司赦小過舉賢才然欲專任人而畧其過必得賢才而後可若不得賢才而先濫及惡德則又將何以畧其過而專任之乎仲弓又慮無以盡知一時之賢才孔子又告之言知賢才者豈能以一人之聰明盡天下之幽逺哉各以其類耳茍自爾一身之聰明所及者知孰為賢而有德孰為才而有能也而舉用之賢者在位能者在職則斯賢也必能舉其所知之賢而我所未知之賢皆以類進矣斯才也必能舉其所知之才而我所未知之才皆以類進矣况由是而推之彼所舉之賢才亦必各舉其賢才近而四境逺而四海其賢者能者皆無遺矣故曰人各親其親然後不獨親其親㧞茅連茹以其類此之謂也夫然後見聖人公天下之心而普天下之智也惜乎時君不能用也噫公叔文子之臣大夫僎與文子同升諸公臣若水通曰文子衛大夫公孫枝之諡也臣者其家臣名僎也文子知其家臣僎之賢遂舉之以同升于公朝而為大夫非智之明心之公者其孰能之夫大臣以人事君者賢才進則已責盡矣尊孰甚焉後世之為人臣見天下之賢必媢嫉而惡之非上天不賦之以辭讓是非之心也惟以己之短忌人之長恐其逼己耳如臧文仲知栁下惠之賢而不與立者是也不公不明孰大於是夫然後知文子之賢出於尋常萬萬矣惜其不得遇孔子之聖而薦用之則其賢又有大於此者矣臣又以悲文子之不幸也孟子左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽諸大夫皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之臣若水通曰好賢惡不肖人人是非之本心也故國人之心即大夫之心大夫之心即左右之心左右之心即人君之心惟衆則公獨則私故不察於一人之獨而必察於衆人之同者其公也然而必人君明其是非之心而後可以辨其毁譽而善惡賢否可得矣不然則左右逺近之交譽如阿大夫者何以能自定其是非邪正之歸邪格物通卷六十三
