body:
  text: 格物通卷六十六明湛若水撰舉措四宋真宗景德二年秋七月增置制舉六科賢良方正等三科久不行至是增置為六科曰賢良方正能直言極諫愽通墳典達于教化才識兼茂明于體用詳明吏理可使從政識洞韜畧運籌决勝軍謀宏逺材任邊寄凡六科詔中書門下試察其材具名奏聞臨軒親䇿之臣若水通曰用人之法虞之九德咸事湯之立賢無方周之六德六行六藝至漢立賢良方正之科猶為近古唐之詞章則求之愈下遺賢多矣宋真宗有志復古則唐虞三代之制可考也否則漢制賢良方正足矣而何多門邪蓋未有賢良方正而不能明體用通墳典詳吏理識韜畧宏軍謀者也然其視九徳同謂之徳無方同謂之賢六徳六行六藝同謂之徳行道藝者有間矣故古之人才出于一後之人才出于六此道徳之所以不一而風俗之所以不同也惟在上者所立耳哲宗元祐元年四月司馬光請立經明行修科歲委升朝文臣各舉所知以勉勵天下使敦士行以示不專取文學之意若所舉人違犯名教必坐舉主毋赦則自不敢妄舉而士之居家居鄉者惟懼玷缺外聞不待舉官日訓月察立賞告訐而士行自美矣於是詔自今凡遇科舉令升朝官各舉經明行修之士一人俟登第日用以升甲臣若水通曰書云舉能其官惟爾之賢稱匪其人惟爾弗任故光建論舉士之法舉主連坐則士務修其行官務舉其賢賢才出而天下治矣然而所謂經明行修者何邪夫古之明經將以修行也徳性禀於天生而蒙長而不學則愚明經學問於師友所以發其蒙而破其愚成其德而行修矣易曰君子多識前言往行以畜其徳又曰修辭立其誠所以居業也夫學一而已矣舉措人者德行之修否而已矣此又為人上者不可不知徽宗宣和七年十二月太學生陳東上書請誅蔡京等六人時天下皆知蔡京等誤國而用事者多受其薦引莫肯為帝明言之東率諸生上書曰今日之事蔡京壊亂於前梁師成陰賊於内李彦結怨於西北朱勔聚怨於東南王黼童貫又從而結怨于二寇創開邊隙使天下勢危如絲髪此六賊者異名同罪伏願陛下擒此六賊肆諸市朝傳首四方以謝天下臣若水通曰帝舜誅四凶而天下咸服舉直措枉天下之心也舉措得當則體統尊紀綱正法度修政事舉仁賢在位而天下安矣京等六人在徽宗之朝各以奸邪惑主危國而徽宗明不足以知之也君臣以酒色相娯屢幸私第禮如家人則體統紊矣開邊生事和議誤國則紀綱頽矣祖宗舊章紛更殆盡則法度壊矣聚斂無經刑殺肆志則政事亂矣斥黜忠直竄死逺方仁賢殄矣舉措若此尚何以安天下乎滿朝縉紳黨京莫言而東為布衣憤忠極論折首而不顧至今猶能使人興起於百代之下也為人君觀此思得如此人者而用之則善人進而國昌矣孝宗乾道五年八月以陳俊卿虞允文為尚書左右僕射並同平章事兼樞密使俊卿以用人為己任所除吏皆一時之選奬廉退抑奔競或材可用而資歴淺者則密薦於帝未嘗語人毎接朝士及牧守自逺至必問以時政得失人才賢否允文為相亦以人才為急嘗籍為三等有所見聞即記之號材館録故所用皆知名士臣若水通曰俊卿允文可謂得為相之體矣夫宰相之於天下能以其身利之者蓋寡也惟以人利之則所謂人各親其親然後不獨親其親其利將普於天下矣故以人事君而宰相之職盡矣故仁不徧愛物急親賢也後之輔相者身為大臣而徒以韋布之行自勵閉門謝客而於天下人之賢否置之而不問其亦異乎俊卿允文之見矣元世祖至元二十四年閏月復置尚書省以僧格特穆爾並為平章政事阿嚕琿薩里為右丞葉李左丞馬紹參知政事莾珠爾多卜丹言自制國用使司改尚書省頗有成效今仍分兩省為宜詔從之安童諫曰臣力不能回天但乞不用僧格别選賢者猶或不至虐民誤國不聽臣若水通曰人皆以元世祖之為賢君臣不信也夫賢君必能用賢去不肖世祖尚書省之復是矣然用人失當則其國必危矧平章丞相參知政事皆朝廷機務所闗乃以特穆爾輩為之可謂能用人乎况僧格之惡安童諫之而不顧舉措如此其不至于虐民誤國者幾希以是知世祖之非賢君也為人君者所宜深鑒宋儒周敦頥曰心純則賢才輔賢才輔則天下治純心要矣用賢急焉臣若水通曰孔子告哀公取人以身身心者取人之本也賢者治天下之輔也故心弗純則用賢弗專用賢弗專則聰明日蔽於上惡政日加於下而國事日見其非矣益曰任賢勿貳蓋一則純貳則雜至於雜則賢才日逺而莫為之用矣有天下者慎之程頥應詔上英宗皇帝書云朝廷至於天下公卿文武百職羣僚皆稱其任而己何以得稱其任賢者在位能者在職而己何以得賢能而任之求之有道而已雖天下常用易得之物未有不求而得者也金生於山木生於林非匠者採伐不登於用况賢能之士傑出羣類非若山林之物廣生而無極也非人君搜擇之有道其可得而用乎自昔邦家張官置吏未嘗不取士也顧取之之道何如耳今取士之弊議者亦多矣臣不暇條析而言大概投名自薦記誦聲律非求賢之道爾求不以道則得非其賢間或得其才適由偶幸非知其才而取之也朝廷選任盡自其中曾不虞賢俊之棄遺於下也果天下無遺賢邪抑雖有之吾姑守法於上不足以為意邪將科舉所得之賢巳足自治而不乏邪臣以為致天下今日之弊蓋由此也臣若水通曰賢才之有益於人國也大矣求之有道則賢才可得也然而求之有道者鮮矣古之於賢者必自上求之後之於賢者必使下自求之則賢者必不肯求求者必非賢者也夫然後賢者退不賢者進而國亂矣如是而謂天下無其人焉不可也是故智者之求賢也必自求之求之之道盡心焉耳矣未有求而不得者也程頥之言最為切至為人君者其念之哉邵雍曰虞舜陶于河濵傅説築于巖下天下皆知其賢而百執事不為之舉者利害使之然也吁利害叢于中而矛㦸森于外又安知有虞舜之聖而傅説之賢哉河濵非禪位之所巖下非求相之方昔也在億萬人之下而今也在億萬人之上相去一何逺之甚也然而必此云者貴有名者也臣若水通曰相臣之不薦賢者非無是非之心而智之弗明也多生於忌嫉耳上者忌其逼已下者忌其軋已故非惡之惡非非之非生焉非無是非好惡之本心也以大舜傅説之賢聖在唐虞商周之隆猶不免焉而况於後世哉殊不知相臣之薦賢乃已職分内事也人君之求賢乃已性分内事也何與於賢者哉故認得為己分内事則忌心釋矣故曰為天下得人者謂之仁惟仁人為能好人君相有國家之責者其亦隱於心哉張載理窟曰萬事只一天理舜舉十六相去四凶堯豈不能堯固知四凶之惡然民未被其虐天下未欲去之堯以安民為難遽去其君則民不安故不去必舜而後因民不堪而去之也臣若水通曰好惡吾心之天理也作好作惡則非中正矣舜舉十六相而天下䝉其福誅四凶而天下服其罪豈有心好惡之哉因民好惡而好惡之也豈堯之時不能誅之舉之而舜獨能之哉時也時然而然天理也民好惡而好惡亦天理也故可舉可措在四凶十六相耳在民之心耳在其時耳帝舜之心何與哉胡宏曰人君聨属天下以成其身者也内選於九族之親禮其賢者表而用之以聮属其親外選於五方之人禮其英傑引而進之以聮属其民是故賢者衆之表君之輔也不進其親之賢者是自賊其心腹也不進其人之賢者是自殘其四肢也臣若水通曰人君以天下為一體者也不禮九族之賢則親心乖離腹心賊矣不禮五方之賢則民心離散四肢解矣故内舉不遺親外舉不遺才蓋欲聮属天下以成一體之義也誠如是也則為君者不至孤立于上而股肱耳目皆有所託矣賢才豈有不用而天下豈有不安哉楊時曰三代兩漢人才之盛風俗之美後世莫能及者取士以行不專以言故也今雖詔内外官舉經明行修之士中第之日優其恩典不獨取之以言又本其行庶乎近古然徒使舉之而不由鄉里之選又無考察之實與斯舉者隨衆牒試於有司糊名謄録校一日之長不惟士失自重之義且於課試之際無以别異於衆人則所謂本其行者亦徒虚文而己謂宜别立一科稍倣三代兩漢取士官人之法因今之宜斟酌損益要之無失古意而已至於投牒乞試糊名謄錄之類非古制者一切罷之待遇恩數盡居詞賦經義等科之上庶使學者尊經術惇行義人人篤於自修則人才不盛風俗不美未之有也臣若水通曰楊時此論真得取士之法矣夫循其名而不責其實信其言而不核其行則羊質虎皮或得以倖進而玉在石中者不得一售矣故三代兩漢人才之盛有由然也伏惟聖明粤稽古昔而惟楊時之言是行焉則人才可以日盛風俗可以日美唐虞三代之治豈難致哉特在一念轉移之問耳張栻䟦司馬光黼座銘藁有云壅蔽者天下之大患也古之明王所以致治者亦去此而已矣其道莫先於虚己莫要於任賢虚己則壅蔽消於内任賢則壅蔽撤於外内外無蔽而下情畢通泰治所繇興也臣若水通曰壅蔽之患大矣心志蔽於内聰明蔽於外則徳業不修而治道隳矣張栻推其要在於虚己任賢致虚以去其蔽於内任賢以去其蔽於外内外無蔽則光大髙明之德業可成矣然以二者論之則任賢尤在乎虚己故易曰君子以虚受人書曰明四目達四聰為人君者其念兹哉羅從彦曰君子在朝則天下必治蓋君子進則常有亂世之言使人主多憂而善心生故天下所以必治小人在朝則天下必亂蓋小人進則常有治世之言使人主多樂而怠心生故天下所以必亂臣若水通曰君子之志在行道以濟時小人之心務阿世以取寵志在行道則憂世之言日進使其君有憂世之心是以大本正而大化出矣志在阿世則治世之諛日進使其君有自肆之志是以大本惑而大亂成矣夫以君子小人之進退而治亂階焉可畏之甚也伊川曰其難其慎官人者其亦辨之於早乎胡安國曰善善而不能用則無貴於知其善惡惡而不能去則無貴於知其惡臣若水通曰不知其善而不用不知其惡而不去曰不知者也猶可言也惟其知善而不能用知惡而不能去豈得諉之於不知乎不可言也夫知而不用則終無用賢之心矣知而不去則卒有濟惡之禍矣其為害也可勝計哉是以人主之學當在於明斷焉而已矣國朝太祖髙皇帝開國之初詔天下曰自洪武三年為始特設科舉以起懐才抱徳之士務在經明行修博古通今文質得中名實相稱其中選者朕將親䇿於廷觀其學識品其髙下而任之以官果有才學出衆者待以顯擢使内外文臣皆由科舉而選非科舉者毋得與官臣若水通曰此太祖始立科舉取士之詔也用人之道盡之矣其與虞庭之九徳成湯之立賢有周之徳行道藝千載同符矣故曰懐才抱德曰經明行修曰博古通今曰文質得中曰名實相稱其為賢則一也必五者純備然後謂之賢也此聖人合一之道也至於䇿之者所以觀其五者之藴如敷奏言揚之道耳非以文章取之也奈何傳世既久逐末忘本而教者與學者皆拘拘於言語華采之間而太祖立法之意澌盡無幾矣仰惟聖明務學崇本修復舊章特易易耳此固養賢用賢之大要不可不重也洪武十六年上御謹身殿東閣大學士吳沈等進講周書國則罔有立政用憸人上曰甚矣國家不可有小人有小人必敗君子故唐虞任禹稷必去四凶魯用仲尼必去少正卯沈進曰書云去邪勿疑所深致其戒上曰國家不幸有小人如人蓄毒藥不急去之必為身患小人巧於悦上忍於賊下人君若但喜其能順適己意任其所喜而不問以為怨將在彼辟如犬馬傷人人不怨畜犬馬者乎沈曰小人中懐奸邪而其所言甚似忠信不可不察上曰然小人善於逢迎彼知人主所樂為者不顧非義乃牽合傅㑹曰是不可不為知人主不樂為者不顧有益於天下國家亦牽合傅㑹曰是不必為此誠國之賊也自古以知人為難而知言亦不易也臣若水通曰君子小人不共國而治如薫蕕不同器而藏也茍不去小人以安君子雖聖人亦不能有為皇祖所謂唐虞用禹稷必去四凶魯用仲尼必去少正卯雖聖王百世不能易矣然欲知君子小人而進退之在於君身人君茍能明諸心以全天理則至明足以燭天下之㣲至公足以滅天下之私於理之可為不可為者知之明斷之果則小人不得以乘其間人主茍於不可為者樂為小人得以阿順曰是不可不為茍於可為者不樂為小人得以阿順曰是不必為此固小人罔上之奸亦由人主之不明不果有以召之也既公而明則牽合傅㑹之説阿諛逢迎之態舉無所容矣皇祖諭講官而審於君子小人之辨真得知人圖治之要矣聖子神孫可不致謹於此哉國朝太祖髙皇帝謂皇太子諸王曰純良之臣國之寳也殘暴之臣國之蠧也自古純良者為君造福而殘暴者為國致殃何謂純良處心忠厚臨民豈弟雖材有不逮者亦不致於傷物所謂日計不足月計有餘者也何謂殘暴恣睢擊搏遇事風生鍜鍊刑獄掊尅聚斂雖若快意一時而所傷甚多故武帝任張湯而政事衰光武褒卓茂而王業盛此事甚明可為深鑒臣若水通曰國之治亂非自天降乃由人生者矣故用人乃為政之急務也聖祖以國之寳與蠧歸於純良殘暴之臣真知言矣然欲知二者之辨而進退之在於反求諸心心存則理明心純乎理則至明足以知人我惟純良也故於人之純良者必知而用之雖才有不逮可恕也我無殘暴也於人之殘暴者必知而去之雖快意一時不取也然而純良用而殘暴者逺矣皇祖諭太子諸王及此欲其知當務之急其深切矣乎洪武十八年七月丙辰上御華蓋殿與羣臣論及治天下之道文淵閣大學士朱善進曰古者人主致治重任人蓋擇衆賢為耳目則視聽周乎四海任衆智為計慮則利澤施於萬民今天下太平惟選任賢才宜留聖慮上曰然任人之道當嚴於簡擇專於任使嚴則庸鄙之人不進專則茍且之意不行然必賢者乃可以專任之非賢而專任者必生奸也是任人為難然人亦有謹於始而怠於終者亦有過於前而敬於後者則固不能保其終始惟終始如一者其懐忠報國之心堅如金石安得不任之若匿詐似信懐奸若忠者决不可任也臣若水通曰孟子曰國君用賢如不得已擇之審也書曰任賢勿貳任之專也皇祖所謂嚴於簡擇專於任使真用人之法也然必擇之審然後可以任之專皇祖之明蓋已洞見其幾㣲矣不然則始終惟一之賢未著而奸詐忠信之人易混矣其禍敗豈小也哉洪武十九年七月詔舉經明行修練達時務之士年七十以下者郡縣禮送京師太祖諭禮部郎中鄭居貞曰古之老者雖不任以政至於咨詢謀謨則老者閲歴多而聞見廣達於人情周於物理有可資者居貞對曰人至六十精力衰耗則不能勝事請六十以上不遣太祖曰政謂比來有司不體朕意士有耆年便置不問豈知老成古人所重文王用吕尚而興穆公不聽蹇叔而敗伏生雖老猶足傳經豈可概以耄而棄之也若年六十以上七十以下者當置翰林以備顧問四十以上六十以下者則於六部及布政司按察司用之臣若水通曰書曰人惟求舊曰無遺夀耉曰無侮老成人夫老成之人其徳成其識逺其更歴也多用之則有補於天下國家也故古之聖帝明王必於老成而重委任焉蓋藉其猷謀之大以匡其所不逮也我太祖髙皇帝知老成之可用也拳拳詔郡縣而禮送焉可謂得為政之首務矣聖子神孫固亦賴賢才以輔理也其以祖宗為法可焉大明令吏令凡在流品人員果有文武長才通曉治體廉潔者臺憲官具實跡奏聞諸司職掌凡各府州縣毎歲於所轄隅廂鄉都内拔選容止端謹無過人材一名申送布政司考覈轉行按察司覆考堪充歲貢開坐考過詞語差人送部應有賢良方正及山林岩穴隱逸之士并通曉經書儒士秀才孝廉俱各訪求到官審無過犯違碍不拘名數差人伴送到部或内外官員人等薦舉人材秀才即便行移原籍官司起取赴部如儒士秀才出題考試果否通經賢良隱逸等項人材量其才能定其髙下仍取本户丁糧數目作何營生及户内有無雜役事故供結明白然後開發送部選用如將鄙陋不堪之人一概朦朧濫舉原舉官吏依貢舉非其人律問罪凡舉保孝廉人材秀才及山林隱逸本部即行所屬委自正官選求民間果係名實相副素無過犯之人有司起送到部咨發吏部聽用臣若水通曰帝王之治天下也惟在得人而已矣大明令諸司職掌三事皆我祖宗舉用賢才之盛典也詳考覈之法以求其能嚴並坐之戒以防其弊可謂至精至密矣惟聖明法而行之則天下治矣諸司職掌一科舉凡遇子午卯酉年則鄉試辰戌丑未年則㑹試畢則殿試其取中舉人咨發吏部應用臣若水通曰此我聖朝科舉之制取士之正途也鄉試㑹試以三年者事業之積以三年而成國之人材以三年而消長也夫以聖王德行道藝之教舉業德業合一之學日就月將而不已焉則三年有成矣以今三年考績黜陟之法則人才之進退三年可定矣此祖宗之立法舉用之者與進退之者應其期而不謬也乎諸司職掌巡按御史所至體知有司等官奉公廉能昭著者隨即舉奏其姦貪廢事蠧政害民者究問如律臣若水通曰惇徳允元而難任人舜之所以咨十二牧也胡安國曰善不䝉賞惡不即刑雖堯為君舜為臣不能以化天下是故舉直錯諸枉孔子蓋拳拳焉臣願當斯任者明以察之徤以斷之則刑賞一人而千萬人勸懲矣仁宗皇帝即位之初命吏部令在京七品在外五品以上文官及知縣於五品以下見任官及軍民中訪舉德性惇篤行止端方或材能出衆政績顯著或文學有稱識見優逺者量材擢用若有蔽賢及濫舉者論罪如律所舉之人後犯贓罪舉者連坐曰朝廷比年數下詔舉賢而奉行者率多徇私背公或以賄賂舉或以親故舉所得實用十不三四政事何由而理生民何由而安自今必嚴舉主連坐之法庶得實材臣若水通曰賢才固國家之利器而濫舉尤為生民之蟊賊也取之有其道防之有其法則才必見用而用者無匪才故仁宗皇帝申舉賢連坐之法所以重蔽賢之責而又嚴濫及之防並行而不悖矣我朝之治所以髙出於漢唐宋者由是道也伏惟聖明勵精圖治法之以求真才以致太平天下幸甚國朝天順間英宗皇帝一日召學士李賢曰吳與弼如何對曰與弼儒者之髙蹈自古聖君莫不好賢下士徵聘隱逸乃命行人賫勑帛造其廬與弼接見即謂蒙朝廷厚意當赴闕謝恩但本意不受官職數月乃至入見命為左春坊左諭德朝士皆悚然驚異以為布衣召至一旦至此次日引至上前問曰久聞髙誼特聘爾來對云臣草茅殘士年二十嬰疾虚怯不能出仕不敢有髙世之心不意聲聞過情為當道論薦䝉皇上以天書幣帛來聘天使到門不勝感愧因而動作老疾復發數月方能起程况年六十有八衰朽之人實不堪供職上曰宫僚亦從容閒暇且宫僚甚衆不專勞先生不允所辭於是賞文帛四表裏羊酒柴米遣太監牛玉送至館上顧謂賢曰此老非迂闊者務令就職與弼終不就三辭間日上謂賢曰與弼既來如何不就職若受職亦不相拘聽其自在賢曰與弼亦願就職第以老疾不愈進退狼狽上曰果然亦難留也既以行人聘來還以行人送歸再與勑令有司供月糧以終其身於是與弼感激條陳十事上之復上表謝恩而去臣若水通曰書曰嘉言罔攸伏野無遺賢而成湯之於伊尹髙宗之於傅説皆所汲汲焉何哉徵聘隱逸所以期實用興治道也與弼常言曰宦官釋氏不除而欲治天下難矣觀其言固非忘天下者然必如是而後可為則亦古天民之志矣善哉英宗之待與弼也迎而送之致敬以有禮其為聖徳之光治化之助豈淺淺哉格物通卷六十六
