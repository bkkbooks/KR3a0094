body:
  text: 格物通卷九十九明湛若水撰賑濟上易益彖曰益損上益下民説無疆自上下下其道大光臣若水通曰此孔子以卦體釋益之名義而極賛益之善也無疆無窮也自上下下猶言自君而施於民也言益之所以為益者以其損上而益下如財利上之所有也則損己之有以益下民之無夫財者民之心損上益下故民恱懌於心而無窮也又言益之為道自上而下乎下為得人君仁民之道故其道大光顯也使其奪民之所有以自益則為貪昧之君昏濁甚矣何大光之有哉夫民惟邦本本固則邦寜民貧而國未有能存者也竭心思以周天下之慮凡可以益民者損己以益之不恤也徳澤流行而天下大悦矣夫損下益上者私也損上益下者公也王道大而無外與天地同其生成其功徳宏著益之道大矣哉然則賑濟者其亦損上益下之一事也歟書周書武成散鹿臺之財發鉅橋之粟大賚于四海而萬姓悦服臣若水通曰此史臣記武王克商所行之大政也賚與也鹿臺紂所積之財也而武王散之鉅橋紂所積之粟也而武王發之以大與四海之民而賑其困窮於是四海之民萬其姓者皆悦而服之矣臣謂鹿臺鉅橋一也商紂聚之而民心怨武王散之而民心歸者何也葢財者民之心也聚財則傷民心民心傷其有不背之者乎散財則得民心民心得其有不向之者乎聚散之間而民心向背由之然則大學財聚民散財散民聚之言為可驗矣有國者可不慎哉詩小雅甫田倬彼甫田嵗取十千我取其陳食我農人自古有年今適南畝或耘或耔黍稷薿薿攸介攸止烝我髦士臣若水通曰此詩述公卿有田禄者力於農事以奉方社田祖之祭而此則言其䘏窮勞民之事也倬明貎甫大也十千謂一成之田地方十里為田九萬畝而以其萬畝為公田葢九一之法也我者食禄主祭之人也陳舊粟也有年豐年也耘除草也耔雝本也薿薿茂盛貎介大也烝進也髦俊也詩言大田嵗取十千以為禄食及積之久而有餘則新者存之舊者散之不足者補之不給者助之以食我之農夫葢以自古有年是以歛散適宜如此也於是適彼南畝見耘耔之勤而黍稷之盛則又將復有年矣凡存新散舊者有所資不足不給者有所頼故於羙大止息之處進秀民而勞之俾相勸告益敏於其事以圖其成焉夫國家之賑濟乃王政之急務然必實有愛民之心然後能時其豐歉而歛散之如此詩之所云則上之所出者不費而下之所受者亦感其惠矣茍無愛民之實心平時暴征苛歛以殘民而顧為賑濟之名所謂割民之肉以充腹腹未必飽而身已先憊矣不亦不仁之甚哉故人君之賑濟必先蓄其仁心於平時以不忍人之心行不忍人之政一遇水旱凶荒而賑濟之則仁之所及者廣矣禮記月令曰天子布徳行惠命有司發倉廪賜貧窮振乏絶開府庫出幣帛周天下臣若水通曰此季春之令也言天子於斯時播布其徳惠如下文所云所以奉若天道也夫王者出帑積以惠天下非出也乃所以為入也葢財者民之所為而民者財之所出故茍得其民則天下財利不必在府庫而後為吾有也不得其民雖府庫之財亦或悖而出也故古之人君布徳行惠賜貧賑乏開府出幣周給天下而因以得天下之心焉豈非所出者小而所入者大乎豈非所出者寡而所入者衆乎大學傳曰仁者以財發身其此之謂矣有天下者可不審諸祭綂曰是故上有大澤則惠必及下顧上先下後耳非上積重而下有凍餒之民也是故上有大澤則民夫人待于下流知惠之必將至也臣若水通曰積重上重積之而不施也夫人猶言人人也夫上下一體也惠必及下然後見其澤之大譬之水焉其流長者必其澤逺也若重積於上則其澤不流而有凍餒之民矣非一體之義也上澤下流其惠􅀶也故君子恤窮之政行而仁覆天下矣祭統曰是故明君在上則境内之民無凍餒者矣臣若水通曰非大君之明無以知民之窮非知民之窮則不能行恤窮之政智以知之仁以行之故惠下之澤可流於無窮矣豈復有凍餒之民哉周禮大司徒以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰𤯝禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊臣若水通曰荒政者救荒之政所以恤民窮也聚萬民者嵗荒則民將流離故聚之也散利者出粟也緩刑者薄罪也弛力者息徭役也舍禁者山林川澤不為之禁也去幾者闗市不征也𤯝禮殺凡禮也殺哀者减凶禮也蕃樂者閉不用也多昏者昏禮不備也索鬼神者祈廢祀也除盜賊者嚴刑以去之恐為民害也是故觀荒政則先王之慮民可謂至詳而其恤窮可謂至切矣論語周有大賚善人是富臣若水通曰此論語終篇述武王之事以明聖學之所傳也賚與也當紂暴虐之時聚財積粟毒痡四海而天下之民失所矣武王克商之後一反商暴虐之政散鹿臺之財發鉅橋之粟以大與四海之民而賑濟之而於賑濟之中又惟善人而加富焉由是觀之則聖人於賑濟之舉仁之至而義之盡矣孟子對曰凶年飢嵗君之民老弱轉乎溝壑壯者散而之四方者幾千人矣而君之倉廪實府庫充有司莫以告是上慢而殘下也曽子曰戒之戒之出乎爾者反乎爾者也夫民今而後得反之也君無尤焉君行仁政斯民親其上死其長矣臣若水通曰此孟子因鄒穆公歸怨於民而對以君行仁政則有司皆愛其民而民亦愛之也夫以飢饉之年民之老弱死溝壑壯者散四方而有司莫肯告君以發倉廪開府庫而賑濟之以救其死徙是有司慢而害民也今民不恤有司之死正反報前日之咎也若君行仁政以賑濟則民報之亦當如是矣夫倉廪府庫君積之以拯乎民者也積之於豐稔散之於荒歉則民心恱必親上死長而忘其身以圖報也夫民忘其身者凡以得其心故也財者民之心也散以財則得其心矣然則為人君者何為愛其財以失民心哉不能反己以恤民此鄒穆公之所以不振也孟子之平陸謂其大夫曰子之持㦸之士一日而三失伍則去之否乎曰不待三然則子之失伍也亦多矣凶年飢嵗子之民老羸轉於溝壑壯者散而之四方者幾千人矣曰此非距心之所得為也曰今有受人之牛羊而為之牧之者則必為之求牧與芻矣求牧與芻而不得則反諸其人乎抑亦立而視其死與曰此則距心之罪也他日見於王曰王之為都者臣知五人焉知其罪者惟孔距心為王誦之王曰此則寡人之罪也臣若水通曰此孟子將言平陸大夫之失職而先以持㦸之士失伍者以諷之也孔距心大夫姓名也孟子因大夫之言而遂直言其失職葢大夫者佐君以惠民為職者也今坐視其飢以死而不發倉廪以賑濟之是失職矣又因距心辭以非己所得専而以為人牧牛羊者責其既不得以濟民而不能去距心遂自服其罪至於齊王聞之亦自服以為己罪夫孟子一言而使齊之君臣各知其不恤民之罪仁人之言其利溥矣雖然平陸之政齊史不聞書之豈非説而不繹從而不改也歟左傳文公十六年宋公子鮑禮於國人宋飢竭其粟而貸之年自七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之材人無不事也親自栢以下無不恤也臣若水通曰公子鮑昭公庶弟也竭粟而貸竭其私家之粟以寛貸飢民也無不饋詒者澤施於老者也無日不數於六卿之門者恩逮於貴者也國之材人無不事宋國之賢人無不尊事之也自栢以下無不恤宋鮑之懿親無不賑恤之也夫宋鮑賑宋之飢惠及於上下親踈可謂廣矣然孔子曰君子惠而不費孟子曰導其妻子使養其老斯王政濟民之大者也以宋鮑濟人之心使聞孔孟之訓焉則其所及之廣豈有涯哉後之有愛民之實者其尚論之襄公九年晉侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下茍有積者盡出國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭臣若水通曰施舍者施恩惠舍勞役也輸積以貸者盡其積聚以貸借於民也無滯積無滯而不散之積無困人無困而不遂之人無禁利無貪民公無専禁民皆知禮也祈以幣更祈禱以幣易牲也賓以特牲待賔以一牲存禮也不作者不作新巧也從給者足以給事也三駕謂三興師也夫晉悼公之歸國也能行賑濟之政則所以息民者至矣非覇業之基乎悼公收之覊絏之餘佐之以一魏絳政有足觀如此故世有愽施濟衆之君必有為上為徳為下為民之佐矣襄公二十九年鄭子展卒子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟户一鍾是以得鄭國之民故罕氏常掌國政以為上卿宋司城子罕聞之曰鄰於善民之望也宋亦飢請於平公出公粟以貸使大夫皆貸司城氏貸而不書為大夫之無者貸宋無飢人叔向聞之曰鄭之罕宋之樂其後亡者也二者其皆得國乎民之歸也施而不徳樂氏加焉其以宋升降乎臣若水通曰民病者病於乏食也餼猶饋也出公粟者出公家之粟以寛貸於民也使大夫皆貸者使諸大夫有積者皆以寛貸於民也貸而不書不書于䇿施而不以為徳也鄭之罕即子皮氏也宋之樂即子罕氏也夫賑恤之典固明君急於愛民憂國者之先務而凡肉食者亦不可以不謀也夫平日之所以衣我食我而給我軍國之需者皆民之力也令不幸而際遇天災衣食不能以自存宜以其出諸民者報乎民寜忍坐視其斃而莫之救乎宋樂鄭罕之事真可以為在位者勸矣國語周語單穆公曰古者天災降戾於是乎量資幣權輕重以振救民民患輕則為之作重幣以行之於是乎有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之又曰備有未至而設之有至而後救之是不相入也可先而不備謂之怠可後而先之謂之召災臣若水通曰戾至也量猶度也資財也權稱也振拯也民患幣輕而物貴則作重幣以行其輕也重曰母輕曰子以子貿物物輕則子獨行物重則以母權而行之子母通融民皆得其欲矣堪任也不任之者弊重物輕妨其用也故作輕幣雜而用之以重者貿其貴以輕者貿其賤子權母者母不足則以子平而行之故錢小大民皆以為利也備國備也未至而設之謂豫備不虞安不忘危至而後救之謂若救火療疾量資幣平輕重之属不相入不相為用也離民匱財是謂召災天生斯民立之司牧以䘏其窮以拯其困所以牧民匪以牧於民也故天降災戾人主量為輕重之幣以賑之若景王廢輕而作重鑄大錢以損民資豈賑匱之道哉漢文帝元年三月詔曰方春時和草木群生之物皆有以自樂而吾百姓鰥寡孤獨困窮或阽於危亡而莫之省憂為民父母將何如其議所以振貸之又曰老者非帛不煖非肉不飽今嵗首不時使人存問長老八十以上賜米肉酒九十已上加賜帛人二疋絮三斤盡除收孥相坐律臣若水通曰漢文賑貸之詔以方春萬物發生有感於窮民之失所庶幾有對時發育仁民愛物之心矣然恐民食已艱而方為議所以賑貸之不亦晚乎使左右之臣素講於王道必如古者蓄積素備九年耕必有三年之積敎其妻子親戚使養其老則天下之窮民未病飢瘠也漢武帝建元六年河内失火延燒千餘家上使汲黯往視之還報曰家人失火屋比延燒不足憂也臣過河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發倉粟以賑貧民請歸節伏矯制之罪上賢而釋之臣若水通曰家人失火災之小者也民飢父子相食傷天地之大和以蹙邦本變之大者也汲黯便宜矯制發倉以賑之急於憂國愛民而忘其身以安社稷其為心可謂忠矣故曰古有社稷之臣黯近之豈獨以其能直諫而然哉漢章帝建初元年春正月詔兖豫徐三州禀贍飢民是嵗南部大飢詔禀給之臣若水通曰三州之飢民困甚矣至於南部大飢則又甚焉漢章帝屢詔給贍之可謂有賑貸之仁矣然古之九年之水七年之旱而民不病飢者以其素有備也使俟其艱食而旋為賑貸之計所謂大寒而後植桑者民之死於凍餒者亦無及矣雖然其視民飢以死而不知發者不猶愈乎漢獻帝興平元年自四月不雨至於七月榖一斛直錢五十萬長安中人相食帝令侍御史侯汶出大倉米豆為貧人作糜餓死者如故帝疑禀賦不實取米豆各五升於御前作糜得二盆乃杖汶五十於是悉得全濟臣若水通曰觀御前作糜一事則獻帝非昏蔽者然威權去已徳澤不施以致旱飢雖有小惠何補哉其不能得其民以保天下宜也使當時能察曹操之暴戾如辨侯汶之姦信任忠義之臣而與謀之聲其罪而誅焉更化善治召和氣以致豐穰則糜不必作民心恱而天命永矣何至禍亂之作哉齊武帝永明六年十二月秘書丞李彪上封事以為漢置常平倉以救匱乏去嵗京師不稔移民就豐既廢營生困而後達又於國體實有虚損曷若豫儲倉粟安而給之豈不愈於驅督老弱餬口千里之外哉宜析州郡常調九分之二京師度支嵗用之餘各立官司年豐糴粟積之於倉儉則加私之二糴之於人如此民必力田以取官絹積財以取官粟年登則常積嵗凶則直給數年之中榖積而人足雖災不為害矣臣若水通曰國有豫備則民遇水旱而不至於飢此賑濟之上䇿也下此皆無為䇿矣李彪之言為明君良有司急於救民者所宜講究者也隋文帝開皇五年夏五月度支尚書長孫平奏令民間每秋家出粟麥一石以下貧富為差儲之當社委社司檢校以備凶年名曰義倉臣若水通曰義倉之制以為賑飢之備至今以為善政平可謂善於謀國者矣至於反為盜資之慮豈君子之所能計哉格物通卷九十九
