body:
  text: 格物通卷四十九明湛若水撰事長慈幼詩幽風七月五月斯螽動股六月莎雞振羽七月在野八月在宇九月在户十月蟋蟀入我牀下穹窒熏鼠塞向墐户嗟我婦子曰為改歲入此室處六月食鬱及薁七月烹葵及菽八月剥棗卞月穫稻為此春酒以介眉夀臣若水通曰此詩周公陳后稷公劉風化之所由以告成王也而此詩豳風之五章六章見敬老慈幼之道至矣二章皆歴叙其自秋而冬時物改易而嵗寒巳至其五章曰嗟我婦子曰為改嵗入此室處者老者嘆嗟語其婦子言今歳暮而將改天寒可以休息而入處於奥矣此可見老者慈幼之仁也其六章曰為此春酒以介眉夀者眉夀謂年老有毫眉秀出也少者當十月穫稻之時以此新穀釀為來春之酒以進夀觥於親長致頌禱之意以助眉夀矣此可見少者事長之義也仁義固人心之天理然而為流俗所陷溺者多矣邠民長幼之間至誠􅈤惻藹然慈孝之交孚豈無所自而然哉蓋由公劉之治其國也推仁義之心以行仁義之政老老幼幼各得其所故仁義之化薰蒸於一國而國人化之亦各老其老而幼其幼天理民彞日用由之而不知爾嗚呼邠乃西戎之地公劉以一心治之而其民風土俗如此之美有非聲華文物之都所可及者況御中土而有天下者能舉斯心加諸彼老吾老以及人之老幼吾幼以及人之幼何時雍之治不可致哉禮記王制曰凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之五十養於鄉六十養於國七十養於學達於諸侯臣若水通曰養老者如三老五更及致仕者與庶人之老有德者皆是也養之之禮春夏飲養陽氣也秋冬食養陰氣也春入學釋菜合禮也秋頒樂合聲也季春大合樂天子視學也燕禮何也獻既畢坐飲酒至醉其牲用狗行於寢也尚和也饗禮何也體薦而不食爵盈而不飲立而不坐尊卑行獻畢而止也尚言也食禮何也有飯有殽設酒不飲以食為主行於廟也尚養也兼之何也春夏用燕饗秋冬用食也兼和嚴以食也故食得其正也是以和而不流其周之盛德乎鄉也者鄉學也國也者國中小學也學也者大學也養於鄉國大學明長長也達於諸侯自天子達也長長老老之政同也孟子葵丘之㑹三命曰敬老慈幼臣若水通曰此齊桓葵丘之㑹申明王禁之辭也蓋有國者不知敬老則無以達吾親親之心不知慈幼則無以達吾幼幼之心而王者仁義之道息矣其何以為國哉然敬老慈幼皆根於天性之固有人心之所同也為君者能體物我同體之意因人心之同而敬慈施於老幼則上老老而民興孝上恤孤而民不倍矣其於治國也何有哉孟子曰五畝之宅樹牆下以桑匹婦蠶之則老者足以衣帛矣五母雞二母彘無失其時老者足以無失肉矣百畝之田匹夫耕之八口之家足以無饑矣臣若水通曰此孟子言文王養老之政如此每夫五畝之宅二畝半在田二畝半在邑於宅牆之下植之以桑使匹婦供其蠶事為繭繅為布帛則五十非帛不暖之老者可以有所衣矣每夫養母雞五母彘二於孕字之時而不失如於仲春之月母用牝育之牲則七十非肉不飽之老者可以有所肉食矣每夫受田百畝以耕之則秋收之餘私田之入上自父母下及妻子凡八口者可以仰事俯育而無饑矣夫文王養老慈幼之政不假乎他不過推其父母萬物之心制常生之産以惠之爾有天下者可不思因民之所利而利之哉左傳隠公元年叔段入于鄢公伐諸鄢五月辛丑大叔出奔共書曰鄭伯克段于鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也臣若水通曰叔段不弟如二君是無事長之義矣鄭伯失教志殺其弟是無友愛之慈矣此宋儒吕祖謙所以深誅其心術之微而不可逭乎惟大舜之仁心篤於親愛之誠故能處傲象而烝乂不格姦也可以為事長慈幼之法矣陳文帝天嘉四年夏四月乙未周主幸太學以太傅燕國公于謹為三老設三老席於中楹南向太師宇文䕶陞階設几大司馬豆盧寧正舄帝跪設醬跪授爵豆以酳親為袒割臣若水通曰三代之學所以明人倫也故曰庠者養也養老之禮其古之帝王敎天下以孝弟之義歟此義廢之久矣周武獨能折節而躬行之豈非後世之一快覩哉其不能追先王治化之隆者不能擴充其善念以達之國家爾曽子曰所藏乎身不恕而能喻諸人者未之有也吾於武帝不能無憾焉唐太宗貞觀十一年三月以禮部尚書王珪為魏王泰師上謂泰曰汝事珪當如事我泰見珪輒先拜珪亦以師道自居珪子敬直尚南平公主先是公主下嫁皆不以婦禮事舅姑珪曰今主上欽明動循禮法吾受公主謁見豈為身榮所以成國家之美爾乃與其妻就席坐令公主執笲行盥饋之禮臣若水通曰笲竹器也以盛棗栗腵脩盥以盤水沃洗手也婦以特豚饋夫弟子之事師長婦之事舅姑禮也王珪傅皇子以師道自居其婦公主行執笲盥饋之儀蓋教之以孝弟之道也其為慈愛孰大於是是故太子從其教以之治天下則平也公主安其分以之閑有家則齊也禮之有益於人大矣後之為君師者可不以禮慈愛其世子公主乎班固白虎通曰君幼稚唯考不黜者何君子不備責童子也禮八十曰耄九十曰悼悼與耄雖有罪不加刑焉臣若水通曰考謂撻之示懲也不黜不退之也耄老而衰憊之貌悼可傷也君子不備責童子何也以其幼也悼耄有罪不加刑者何也以其老也老老之教不行民弗知有長矣慈幼之教不行民弗知恤孤矣弗恤弗長則仁孝之風幾乎息矣故觀於此可以見古人慈幼事長之風矣劉向說苑景公探爵鷇鷇弱故反之晏子聞之不待請而入景公汗出惕然晏子曰君胡為者也景公曰我探爵鷇鷇弱故反之晏子逡巡北面再拜而賀曰吾君有聖王之道矣景公曰何也晏子曰君探爵鷇鷇弱故反之是恤幼也吾君仁愛禽獸之加焉而況於人乎此聖王之道也臣若水通曰景公以爵弱而反之藹然惻隠之心矣晏子賀之以成其恤幼之仁可謂善矣齊宣王不忍牛之觳觫孟子曰是心足以王矣由是心也茍能體認擴充之可以保天下矣惜乎二君聞二臣之言而不能行也意宋儒程顥策云老吾老以及人之老幼吾幼以及人之幼此純王之心也使老者得其養幼者得其所此純王之政也尚慮其未也則又尊國老而躬事之優庶老而時養之風行海流民陶其化孰有怠於親而慢於長者哉虞夏商周之盛王由是道也人倫以正風俗以厚鰥寡孤獨無不得其養焉臣若水通曰人君體同胞之義則於老無所不兼敬也於幼無所不兼愛也故由老老之心而老老之政行焉由幼幼之心而幼幼之政行焉夫以純王之心行純王之政不越乎親長慈幼之間爾夫豈人之所不能哉不為爾為君者在立志焉伊川程頥曰閭閻小人得一食必先以食父母夫何故以父母之口重於己之口也得一衣必先以衣父母夫何故以父母之體重於己之體也至於犬馬亦然待父母之犬馬必異乎己之犬馬也獨愛父母之子却輕於己之子甚者至若仇敵舉世皆如此惑之甚矣臣若水通曰父母與己之身父母之子與己之子皆同氣者也故愛則皆愛慈則皆慈亦各盡其心遂其天性而已矣於此有一薄焉則無所不薄矣後世兄弟賊恩仇敵同氣其亦不仁甚矣或曰事兄盡禮不得兄之歡心奈何程頥曰但當起敬起孝盡至誠不求伸己可也曰接弟之道如何曰盡友愛之道而已臣若水通曰孝慈之道各欲自盡其心爾舍是心而有間焉則己私勝之也程頥之言真可為事長慈幼之法也歟張載西銘曰尊高年所以長其長慈孤弱所以幼其幼臣若水通曰仁人之心無親疎内外之間也而其由親以及疎自内以及外者亦天理之當然爾故吾之長長之而高年無所不尊則天下之長無不長之矣吾之幼幼之而孤弱無所不慈則天下之幼無不幼之矣驅天下長長幼幼而歸之仁人長者之域是即所謂與天地萬物一體者矣施無不􅀶而濟無不衆故堯舜之道孝弟而已矣此在人君自盡其心爾楊時謂李䕫知杭州錢塘縣事有兄弟爭財而訟者累政不能決公至取案牘焚之諭以同氣至情財不足言兄弟感泣拜於庭而去異日公復過錢塘二人猶求見公以謝臣若水通曰孩提之童無不知愛其親及其長也無不知敬其兄天之性也故謂之良知良能爭財致訟情欲相攻而天性滅矣豈刑獄之所能回哉李䕫一言而兄弟感悟其賢於五刑三千者矣何也得心之本然故也張栻謂呉芾少而孝友既孤事母訓弟有聞于其鄉母病瞽踰紀芾精意療治一日復明如初人以為孝誠之感也臣若水通曰孝弟之至通于神明感乎天地蓋人與天地鬼神萬物之氣一也是以能感格王祥之鯉孟宗之笋物固有然者而況於吾親一體之間乎宋呉芾母瞽踰紀積誠精治一日復明乃其感應之必然者也然則人子事親其可不盡孝誠也哉顔之推曰父子之嚴不可以狎骨肉之愛不可以簡簡則慈孝不接狎則怠慢生焉臣若水通曰父子主恩也是以愛生焉相處以敬相接以禮愛之至也狎與簡者可謂之至愛乎曲禮曰君臣上下父子兄弟非禮不定詎不信夫國朝洪武三年二月太祖皇帝行後苑見巢鵲卵翼之勞喟然歎曰禽鳥劬勞若是況人母子之恩乎乃令羣臣有親老者許歸養時故元鎮撫陳興被俘來京恩待甚厚興言有母在嵩州年八十餘欲求歸養即賜白金衣帽遣之興辭太祖顧謂侍臣曰孝弟之性天下皆同陳興雖武夫聞朕言即愴然思歸朕始不知其有母若知之肯令其違逺耶人夀不過百嵗今其母年已八十餘萬一不得相見興有無窮之痛興歸母子相見其樂宜何如侍臣曰陛下以孝治天下推測人情無微不燭非惟一家之老者得所天下之惸獨鰥寡皆䝉其惠矣太祖曰人情莫不愛其親必使之得盡其孝一人孝而衆人皆趨於孝此風化之本也故聖王之於天下必本人情而為治臣若水通曰記曰親親而仁民仁民而愛物齊王不忍牛之觳觫孟子謂其恩足以及禽獸而功不至於百姓太祖皇帝因巢鵲卵翼而感母子之恩令羣臣歸養且及於亡國之俘使全母子之愛非自其天性孝友中來耶是親親仁民愛物仁孝上下周洽立慈孝之教於天下所謂皇建有極也聖子神孫當以聖祖為法焉國朝李貞尚皇姊長公主貞性孝友母太夫人性嚴微忤其意輒加叱責嘗侍養值母怒投其食器於地貞徐拾之恭敬愈至有弟四人父既没求分財異居貞語之曰父没而母在苟分財異居老母得無不可於意乎先人田廬俱俟老母百嵗後隨所欲取之吾不較也諸弟皆愧服臣若水通曰孝弟者人之天性各欲自盡者也故親雖不慈而子不可以不孝弟雖不敬而兄不可以不友古人處變之道固如是也李貞其殆庶幾者乎國朝李文選早喪父事母莫氏至孝具甘旨候寒温晨昏不少懈母喜則喜母或不樂則拜問其故致婉辭以慰之必母喜乃止尤能友愛其兄弟鄉黨稱之無間言臣若水通曰李文選事親處兄弟之道皆本於天性之自然者也孟子曰人有所不學而能者其良能也所不慮而知者其良知也文選其近是耶是足以表風俗也矣格物通卷四十九
