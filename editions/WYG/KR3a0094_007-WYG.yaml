body:
  text: 格物通卷七明湛若水撰感應上易中孚九二鳴鶴在隂其子和之我有好爵吾與爾靡之臣若水通曰此中孚卦九二之爻辭隂幽隠之處也靡作縻慕恱之意也九陽剛二中位以剛德而居中位與九五剛中相應故有鶴鳴子和我爵爾靡之象蓋二臣而五君也君臣感通之道誠而已矣誠者心之實理上下同然者也故彼感此應有不期然而然者若不誠則心貳心貳則勢離亂之所由生也上下一於誠則上下交而其志同如腹心手足之一體矣以之作事何事不成乎然則君臣相與感應之際可不誠哉咸彖天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣臣若水通曰天地之與萬物一氣也故天地之氣相感則太和氤氲而化育成矣聖人之與萬民一心也故聖人感之以吾心之理則丕應徯志而和平致矣天地以氣聖人以心其所以感應者理一而已理一即性一性一即情一情不可見以其所感而見之爾故天地聖人之感人物而無不應者以其情性之同也故即其所感觀之天地萬物之情見矣人君能得人心同然之理有感而必通矣天下其有不和平者乎故不必求之天下之人心而求之吾心焉可也咸大象曰山上有澤咸君子以虛受人臣若水通曰澤雖在下而性好潤山雖在上而土性疏通受潤二物之氣相感通有以虚受人之象君子觀此象而虛其中以受於人虛中者心無一物也心無一物則誠矣故咸感也不從心以無心而感物則物無不應矣是故感通也者心之神也虛也者感通之本也天理也非以虛受以吾心之理相受也書虞書大禹謨禹曰惠迪吉從逆凶惟影響臣若水通曰此大禹陳謨於舜之言也惠迪從逆猶曰順善從惡也禹言吉凶之於善惡猶影響之於形聲天道人事感應之速如此漢儒董仲舒亦曰臣觀天人相與之際甚可畏亦此意也為人君者一念之發即有感召可不慎乎大禹謨三旬苗民逆命益贊子禹曰惟德動天無逺弗屆滿招損謙受益時乃天道帝初于厯山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍䕫䕫齊慄瞽亦允若至諴感神矧兹有苗禹拜昌言曰俞班師振旅帝乃誕敷文德舞干羽于兩階七旬有苗格臣若水通曰十日為旬逆命謂不服征也贊佐也屆至也帝舜也仁覆閔下謂之旻天日非一日也祗敬載事也齊莊敬慄戰懼䕫䕫莊敬戰懼之容也允信若順也誠感物曰諴班還振整也誕大也文德文命德教也干楯羽翳皆舞者所執也兩階東西階也格至也益從禹出征以苗負固未可威服故贊佐於禹以為惟有動天之德者必能感通之逺而無所不至蓋欲禹還兵而増修其德也乃舉天道以為滿則損謙則益欲其法天道以益德也又舉人事言舜耕厯山往田之時日號呼旻天以不順父母之故自負其罪以自引其慝不敢以為父母之罪慝敬其子職之事以見瞽瞍䕫䕫齊慄敬畏小心而盡於事親者如此故舜以誠孝感格雖瞽瞍頑愚亦且信順之而底豫焉然非特人事為然也又推極至誠之道以為神明亦且感格焉夫以天道既如彼而以人事神明又如此而况於苗民乎於是大禹乃還師振旅帝舜乃大修文命德教七旬而有苗來格也夫天道至逺也瞽瞍至頑也鬼神至幽也苗民至難化也而一念修德足以感格之者何邪蓋天地人鬼之理一而已矣故一念之邪正天地鬼神莫不鑒之愚民莫不知之然則人君念慮可不敬謹於獨乎夏書禹貢祗台徳先不距朕行臣若水通曰台我也以禹而言距違也史臣紀禹平水土定土賦建諸侯之外又有敬德之化以先天下則天下自不能違越禹之所行也蓋聖人過化存神感應之妙有如此者亦在乎一心之微爾人君欲致天下之化者當自敬德始焉商書伊訓古有夏先后方懋厥德罔有天灾山川鬼神亦莫不寧暨鳥獸魚鼈咸若臣若水通曰此伊尹告太甲之言有夏先后謂禹也懋勉也方且也暨及也咸皆也若順其性也言夏禹進德之功亹亹未巳上天無有灾異山峙川流鬼神享祀無有不安寧者至於鳥獸魚鼈之微無不順其性也由此觀之罔有天灾亦莫不寧者其天地位乎鳥獸魚鼈咸若者其萬物育乎蓋禹德既修則以吾心之中和召天地萬物之中和感應之速有如此者後世人主以敬為無益謂天不足畏無怪其灾𤯝迭至而覆亡相尋也歟太甲先王子惠困窮民服厥命罔有不恱並其有邦厥隣乃曰徯我后后來無罰臣若水通曰此伊尹告太甲之言也言先王於困窮之民若己子而惠愛之惠之若子則心之愛者誠矣未有誠而不動者也故民服從其命而無不心恱至其隣有邦之民莫不以湯為我君而待其來若來則我無罪矣夫民恱於服命而隣國之民不君其君反以湯為其君而待其來人民之向背無他一心之感應爾矣然則為人君者可不慎所以感之者乎咸有一德非天私我有商惟天佑于一德非商求于下民惟民歸于一德臣若水通曰此伊尹告太甲之言也言天之佑商非天私我商也天之所佑者在一德爾商之得民非商求于民也民之所歸者在一德爾一德者純一之德即天理也夫人心有一毫私意之雜則天理息矣不雜則不息不息則一故天與民歸非歸商也歸一德也蓋一德者天民一者也人君具此一德而上下應之者何邪以一體故也故人君者一念一則天人合一念二三則天人離天人相與之際可不畏哉周書無逸君子所其無逸臣若水通曰此周公作無逸以戒成王篇中語也蔡沈曰所猶處所也君子以無逸為所動靜食息無不在是焉作輟則非所謂所矣臣謂以無逸為所則隨處隨時有兢兢業業之念人心不死而天理常存矣人君居至尊之位多縱驕逸以至安其危利其灾樂其所以亡者皆坐此爾周公無逸之一言真可為萬世人君燕安痼疾之藥石也歟詩大雅文王穆穆文王於緝熈敬止假哉天命臣若水通曰穆穆深逺之意於嘆美辭緝續熈明也止語辭假大也此詩言穆穆之文王嘆其繼續光明而能敬止以膺受天命之大如此有以見天人之一氣也氣一則理一矣理一則心一矣心一則其感應之機一矣是故維天之命於穆不已此天之所以為天也文王之德緝熈敬止純亦不已則其心即天心理即天理氣即天氣實與之脗合無間也感應之理有不期而然者矣茍敬德弗修徒以籲天求應至於封禪禱祀以徼福利特棄天褻天爾後之人主知天人之一理可不敬德以為祈天永命之本乎周頌烈文無競維人四方其訓之不顯維德百辟其刑之臣若水通曰無競者聖人無心之感也不顯者聖人至德之淵深也訓刑皆法之之意夫天下之大感應而已矣感應之道自然而已矣自然者無心者也不顯者也天地之常普萬物而無心故不言而四時行焉百物生焉而物之應者勃然矣聖人之常順萬事而無情故無競而四方訓不顯而百辟刑人之應者翕然矣此無他無心之感不言之化其理同則機之自然者不容己爾故人主不患天下之不應惟患其無所以感之者爾春秋桓公元年秋大水臣若水通曰宋儒胡安國謂大水者隂逆而與怨氣并之所致也桓行逆德致隂沴宜矣臣謂桓之弑逆起於一念之不善而上天隂沴之應其速如此其可畏哉然則為善者感動於天其機亦當如此矣人君戒懼慎獨以養其中和之德致之於國家天下則天地之位萬物之育亦其理勢之必然也道豈逺乎哉功豈難乎哉在一念之微爾成公元年無氷臣若水通曰宋儒胡安國謂寒極而無氷者常燠也洪範傳曰豫恒燠若此政事舒緩紀綱縱弛之象成公幼弱政在三家公室不張其象己見故當涸隂沍寒而常燠應之臣謂天道之陽舒隂慘人君之仁育義正天人未始不相通也成公幼弱縱臣失政亦猶天之隂陽易位故宜寒而燠此感彼應捷於影響有天下者能審其感應之機五服不濫五刑不弛則隂陽合德而慘舒同運矣禮記檀弓魯人有周豐也者哀公執摯請見之而曰不可公曰我其已夫使人問焉曰有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之何施而得斯於民也對曰墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬殷人作誓而民始畔周人作會而民始疑茍無禮義忠信誠慤之心以涖之雖固結之民其不解乎臣若水通曰敬信禮義誠慤人之心不假外而有者也其感其應不假物而然者也故不言之信無心之感天下之至感至信也君天下者躬脩其徳見而民莫不敬言而民莫不信行而民莫不說以純王之心成純王之治有不難矣何也以其先得民心之所同然者也樂記曰人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音臣若水通曰寂然不動心之本體也感物而動心之應用也心之感應故不能無聲聲之感應故不能無音宫商角徴羽之相還清濁高下之定位成焉故音之起由人心生也是故先王慎所以感之者樂記曰是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以亷其愛心感者其聲和以柔六者非性也感於物而後動臣若水通曰噍者竭而無澤也殺者減而不隆也嘽者闡而無餘也緩謂紆而不迫也發者生而不窮也散者施而無積也直者無委曲也亷者有分辨也和不乖也柔致順也皆聲之應也哀樂喜怒敬愛皆心之感也夫聲者心之宣也有是心則有是聲故聲音之道誠之不可掩也是故可以知感應之道矣為人君者可不正其心以為感應之本乎樂記曰夫民有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉臣若水通曰有血氣心知之性無哀樂喜怒之常本其未發者也感物而動本其已發者也故感於可矜而有惻隠之心感於可怒而有羞惡之心感於交際而有辭讓之心感於得失而有是非之心斯真心矣故無惻隠羞惡辭讓是非之心者非人也君子觀其感通之幾而聖學可至矣禮記孔子閒居曰清明在躬志氣如神嗜欲將至有開必先天降時雨山川出雲臣若水通曰聖人與天地如人之一身無不相通其痛癢忻戚無不相應者清明則心無私欲至虛而靈故志氣如神而足以前知是故凡所願欲之事將至必先有以開發其朕兆者猶天將降雨山川為之先出雲聖人一心之感應亦如是而己為人君者可不清心凝神以為感應之本乎論語曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情臣若水通曰甚矣上下感應之速也其機使之然爾曷謂機理一而已矣理也者人心之所同然而上下達之者也禮義信人心天理同然之機也故上有好下必有甚焉者各以其類而應焉如志氣之相感一體之貫通也非夫聖賢之心學足以通天下之志者其孰能與於斯孟子曰以力服人者非心服也力不贍也以德服人者中心恱而誠服也如七十子之服孔子也詩云自西自東自南自北無思不服此之謂也臣若水通曰王霸之辨如玉之與石然究其本則德與力誠與偽而已矣蓋王道則本之德而由於誠霸功則本之力而出於偽以力服人則無以得其心已以偽感人以偽應也以德服人則得其心已以誠感人以誠應也故五霸莫盛於桓文姑以其執轅濤塗侵曹伐衞之事而視夫成湯之興東征而西怨文王之作大畏而小懷其人心之服與不服為何如哉雖然先儒程顥曰有天德便可語王道又曰其要只在謹獨究其德力誠偽之分則又係於人君一念之微爾君天下者有志於王道盍亦反其本矣中庸其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化唯天下至誠為能化臣若水通曰中庸此章言自至誠以下者當用力以求至於誠也蓋天理根於人心雖昏愚之極天理猶有以時發見者孟子所謂四端此所謂曲也人能因其天理微處擴而充之以至其極則無小大充萬殊之善協于克一也是亦無異於至誠矣由是而形則睟面盎背由是而著則暢於四支由是而明則發於事業由是而動則四方風動由是而變則人皆舍舊從新由是而化則人各反其真而不復舊而天下化成矣夫誠也者譬之樹木之根也而形著明動變化則譬之樹木之有枝榦花實而生生不息焉一氣之感應也至此則中和極致而位育兩全有本者如是也人君欲感人心而化成天下者盍於致曲求之左傳隠公元年鄭武公莊公為平王卿士王貳于虢鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周王崩周人將畀虢公政四月鄭祭足帥師取温之麥秋又取成周之禾周鄭交惡君子曰信不由中質無益也明恕而行要之以禮雖無有質誰能間之茍有明信澗谿沼沚之毛蘋蘩蕰藻之菜筐筥錡釡之器潢汙行潦之水可薦於鬼神可羞於王公而况君子結二國之信行之以禮又焉用質風有采蘩采蘋雅有行葦泂酌昭忠信也臣若水通曰天下之禍莫大於間間則疑疑則僣僣則亂矣是故間者聖王之所必去者也平王既任鄭伯父子為卿士而欲貳於虢則是君間其臣也鄭伯怨王則是臣間其君也君臣相間天理滅矣間而不已至於交質又不已至於交惡史從而書之若固然者則冠屨倒置天地反易一時之化人心盡死而九法盡斁矣蓋由平王一念之貳之感應也平王暗弱不足論也鄭伯父子有緇衣之賢者然且至於是鄭之得罪也不尤大歟左傳僖公二十五年冬晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降臣若水通曰晉文公守伐原之信誠矣乎曰誠與偽不容以髮者也易之革曰已日乃孚革而孚者也其曰未占有孚孚而革者也誠豈可以聲音笑貌為之哉文公之伐原也刻日持糧而克諜降退舍而待觀其進退同一貪取之心也其誠邪偽邪夫惟大易之咸聖人之感天下以無心也周語内史興曰禮所以觀忠信仁義也忠所以分也仁所以行也信所以守也義所以節也忠分則均仁行則報信守則固義節則度分均無怨行報無匱守固不偷節度不攜若民不怨而財不匱令不偷而動不攜其何事不濟又曰樹於有禮艾人必豐臣若水通曰忠分則均者謂心中不偏故處物得其平也攜離也樹種也艾報也豐厚也禮者天理之形體也忠信仁義禮之本也忠分仁行信守義節上之所以感人者誠矣無怨無匱不偷不攜下之所以應上者至矣故曰禮以觀德德以卜世晉侯之郊勞恭命則其興可以必矣况天子有天下之大其可不以忠信仁義存心以禮自守以濟豐亨豫大之福哉易曰視履考祥此之謂也格物通卷七
