body:
  text: 格物通卷七十八明湛若水撰抑浮末上禁淫巧奢侈附易繫辭曰日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑臣若水通曰此聖人創為市易有噬嗑之象也日中者當日之中也日中為市者民居有逺近以日中為期會爾交易者以有易無也噬嗑卦上離下震日中而動又虛中可藏貨市之象夫天下之民不同業天下之貨不同用立市以相易則無者有所取積者有所散如是而退各得所資以安其所乃所以相濟而非相病矣然逐末之商多則務本之農少聖王有以為之制交易有時其退有節所以止而抑之者禁其舎本而務末登壟㒺利者也不抑則人心競趨於利而務本者寡矣抑之使歸於農則財恒足矣奚以逐末為哉雖然縱己之欲而抑民之欲難矣故内本外末先自人君始後之人君倡為宫市以率天下之逐末者可嘅也夫禮記哀公問孔子曰即安其居節醜其衣服卑其宫室車不彫㡬器不刻鏤食不貳味以與民同利昔之君子之行禮者如此臣若水通曰安其居不妄遊以害人也節醜者即所謂惡衣服也彫即刻鏤也㡬者漆飾之有㡬限者夫天之生財也有限不在上則在下故上不侈靡暴殄之則財聚於下而民足矣節儉者君人之美德也是故古之人君寧儉以自處而不敢傷天下之財者所以隂遺其利於天下也茍内作色荒外作禽荒而靡所不至則何以利於蒼生哉噫秦皇漢武之事可以鑒矣哀公問又曰今之君子好實無厭淫德不倦荒怠敖慢固民是盡午其衆以伐有道求得當欲不以其所昔之用民者由前今之用民者由后今之君子莫為禮也臣若水通曰好實者充積貨財也固民者取於民者力也午作迕逆人心也當猶稱也不以其所者不問理之所在也夫禮也者理也為禮則理足以制欲而好實淫德荒怠午衆之失自無耳此孔子之所以警哀公者至矣厥后家臣作難而不能安其國得非縱欲敗禮之所致歟使其因孔子之言而改絃易轍則魯固禮義之國烏有不治也乎吁是固千古之大戒也可畏哉論語子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣臣若水通曰此章孔子賛大禹薄於自奉而厚於神民豐儉各適其宜也間謂指其罅隙而非議之也菲薄也惡醜也黻蔽膝也冕冠也溝洫田間水道也言徳之未盛者或得此失彼可得指而議之禹則盛德渾然飲食衣服宫室皆所以自奉禹則惡之菲之卑之祭祀鬼神所以祈報黻冕所以行禮溝洫之設則旱有所灌澇有所洩所以為民之農事也故致孝致美盡力焉豐儉適宜如此將以豐而議之則豐所當豐將以儉而議之則儉所當儉渾然合德誠無罅隙可議矣夫豐儉適宜則國用自舒矣然禹之豐儉非強為於外以舒國用而已蓋允執厥中而汎應曲當所謂由仁義行非行仁義者也若規規於有意而為之非禹之學矣後世師禹之豐儉者當求禹之心學禹之學惟精惟一而後可焉左傳昭公四年楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也諸侯所由用命也夏桀為仍之㑹有緡叛之商紂為黎之蒐東夷叛之周幽為大室之盟戎狄叛之皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聴子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不逺逺惡而後棄善亦如之德逺而後興臣若水通曰六王啓湯武成康穆也二公齊桓晉文也仍國名緡黎亦國名大室中岳也左師宋向戌也愎狠也汰亦侈也十年數之小成也逺惡後棄謂惡及逺方則人棄之也楚靈王示諸侯以侈於是乎不振矣王㑹諸侯於申濟霸之基也而况宋之向戍鄭之公孫僑諸侯之良也實在㑹焉椒舉責之以禮尚慮有失况示之以侈乎二子所以逆知王之敗者誠以其無禮以自檢也然則為天下守財者其可不以禮乎哀公元年吳師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於栢舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇器不彤鏤宫室不觀舟車不飾衣服財用擇不取費在國天有菑癘親廵其孤寡而共其乏困在軍熟食者分而後敢食其所嘗者卒乗與焉勤恤其民而與之勞逸是以民不罷勞死不知曠吾先大夫子常易之所以敗我也今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讎而用之日新夫先自敗也已安能敗我臣若水通曰闔廬吳先君光也子西楚令尹子申也宫室不觀謂所居宫室無觀美䑓榭也三宿以上曰次一宿曰宿用之日新謂用之爭戰日新不已也昔孟子有言生於憂患死於安樂闔廬以勤身節用而興生於憂患者也夫差以過慾敗度而亡死於安樂者也二君奢約之政不同成敗之迹頓異無他亦一在乎敬肆之間而已後之為君者宜鑒焉國語魯語莊公丹桓宫之楹而刻其桷匠師慶言於公曰臣聞聖王公之先封者遺後之人法使無陷於惡其為後世昭前之令聞也使長監於世故能攝固不解以久今先君儉而君侈之令德替矣公日吾屬欲美之對曰無益於君而替前之令德臣故曰庶可以已乎臣若水通曰桓宫桓公廟也楹柱也桷榱頭也為猶使也監觀也觀世成敗以為戒也攝持也先君桓公替滅也屬適也適欲自美之非先君意也已止也夫生財之道本乎節用禁淫巧又節之大者莊公之為桓宫也欲丹其楹而刻其桷廢先人之儉而替其德充是以求何所紀極是故漸不可長也夫人君好淫巧天下法之皆淫巧而天下危困矣人君能戒之以節儉則天下法之皆節儉則天下安富矣可不慎乎晉語知襄子為室美士茁夕焉知伯曰室美夫對曰美則美矣抑臣亦有懼也知伯曰何懼對曰臣以秉筆事君志有之日髙山峻原不生草木松柏之地其土不肥今土木勝臣懼其不安人也臣若水通曰襄子知伯瑶也美麗好也士茁知伯家臣夕見曰夕志記也峻峭也原陸也言其髙險不安故不生草木松柏上茂盛冬夏有廕故土不肥夫堯舜茅茨土階故巍巍莫及焉茍不務修德而徒美其宫以自安焉能庇天下乎是不可以為民上矣士茁以美室而知知氏之不安人也而懼其將亡亦曰知哉為人上者其毋興土木之役可也楚語楚靈王為章華之䑓與伍舉升焉曰䑓美夫對曰夫美也者上下内外小大逺邇皆無害焉故曰美若於目觀則美縮於財用則匱是聚民利以自封而瘠民也胡美之為夫君國者將民之與處民實瘠矣君安得肥且夫私欲宏侈則德義鮮少德義不行則邇者騷離而逺者距違臣若水通曰靈王楚恭王之庶子熊度也章華地名於目則美德則否也縮取也騷愁也離畔也邇境内逺鄰國也蓋嘗聞之國君服寵以為美安民以為樂而土木之崇髙不與焉靈王以章華之䑓為美不亦異乎上下内外小大逺邇怨違胥興而楚之殆也無日矣人君欲上下内外小大逺邇之歸慎乃儉徳無輕動土木之役哉楚語王孫圉曰圉聞國之寶六而已聖能制議百物以輔相國家則寶之玉足以庇廕嘉榖使無水旱之災則寶之龜足以憲臧否則寶之珠足以禦火災則寶之金足以禦兵亂則寶之山林藪澤足以備財用則寶之若夫譁囂之美楚雖蠻夷不能寶也臣若水通曰圉楚大夫玉祭祀之玉也憲法也取善惡之法珠水精故以禦火災金所以為兵也譁囂猶讙譊謂若鳴玉以相者夫天下之寶一也寶得其寶則昌寶失其寶則殃若王孫圉之論六寶是誠國之寶矣就六者而擇之聖為上山林澤藪次之珠龜金玉又次之後之主國家襲世珍以供玩好者謂之尤物移人可也其於寶也何有晉武帝咸寧四年十一月太醫司馬程據獻雉頭裘帝焚之于殿前甲申敇内外敢有獻竒技異服者罪之臣若水通曰書云不貴異物賤用物又曰所寶惟賢故物聚於好也人君能惟賢是寶則異物不至矣不待乎焚之而後絶也雉裘非可焚之物殿前非可焚之地武帝此舉無乃為名矣乎未㡬羊車耽樂儉不克終矣噫人君之德尚務其實恭儉豈可以聲音笑貌為之哉晉武帝太康二年傅咸上書曰先王之治天下食肉衣帛皆有其制竊謂奢侈之費甚于天災古者人稠地狹而有儲畜由于節也今者土廣人稀而患不足由於奢也欲人崇儉當詰其奢奢不見詰轉相髙尚無有窮極矣臣若水通曰財生於天地而聚散則由乎人也故民財聚者民聚而國昌民財散者民散而國亡聚散之機在儉侈之間而已爾晉自石崇王愷以鬬富名天下風俗自趨於靡傅咸之言救弊之藥石也惜乎君不知體儉于上而臣民不知從儉于下晉因以亡矣嗚呼惜哉晉穆帝永和七年三月秦王健分遣使者問民疾苦搜羅雋異寛重斂之稅弛離宫之禁罷無用之器去侈靡之服凡趙之苛政不便于民者皆除之臣若水通曰秦王健氐酋也抑奢從儉善政一行遂據有闗中之地况中華之大君其可不思所以從事於恭儉以為國家不拔之基哉格物通卷七十八
