body:
  text: 格物通卷十明湛若水撰儆戒二孝經曰在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴也滿而不溢所以長守冨也冨貴不離其身然後能保其社稷而和其民人臣若水通曰書云貴不期驕禄不期侈此處冨貴者所以不可不儆戒也能儆戒則高而不危滿而不溢然後冨貴可保社稷可安而人民可和矣為人君處冨貴之極者可不戒乎論語子之所慎齊戰疾臣若水通曰此門人記孔子所謹之大事也然而聖人憂勤惕厲之心何所往而不謹哉學者於身心體認之功固當終日乾乾焉可也先儒曰天位惟艱一念不謹或以貽四海之憂一日不謹或以致千百年之患此尤有天下國家者所當深念云子曰學如不及猶恐失之臣若水通曰所不及與失之者皆謂道即天理是也蓋學貴乎有恐失之心而後有日新之功不日進者必日退理固無中立者故自脩者必能時時省察其功之進既如有所不及矣而其心之切猶恐其或失乎前功焉則天理常存而日新又新人欲無得而間之矣聖賢地位何患不能到哉否則或作或輟終不足以進於道矣堯舜之兢兢業業文王之望道未見皆為此爾子曰出門如見大賓使民如承大祭臣若水通曰如見如承敬之至也夫敬德之聚也能隨處警省而體認焉則天理存而仁不外是矣故程顥曰夫子言仁只說出門如見大賓使民如承大祭㸔其氣象便須心廣體胖動容周旋中禮唯謹獨便是守之之法學者其可不究心乎孔子曰如知為君之難也不幾乎一言而興邦乎臣若水通曰有知難之心則不難矣所謂圖難於其易也禹之告舜曰后克艱厥后夫子之告定公曰為君難意蓋出於此也夫舜大聖也猶相與儆戒如此此古之聖王不以天位為易居而必求盡乎君道故能使四方風動萬國咸寧可不儆戒哉否則易心乘之天理已失荒淫暴虐將無所不至幾何而不至於喪邦也哉孔子曰君子有三畏畏天命畏大人畏聖人之言臣若水通曰天命即天理也於此畏之則必戒慎乎其所不睹恐懼乎其所不聞盡心知性而知天存心養性以事天者豈容有一毫之不至哉大人聖言皆天命之所當畏者惟隨處而加體認之功則隨在而致其謹畏矣雖然君子能畏乎此則有以得乎天命至於心廣體胖則又有可樂者存焉小人不知天命而不畏至於從欲而危則豈勝其戚戚之憂哉故欲得君子之樂者當先存君子之畏孟子曰禹惡㫖酒而好善言湯執中立賢無方文王視民如傷望道而未之見武王不泄邇不忘逺周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦臣若水通曰觀此可以見羣聖人之學矣夫聖人之學心而已矣羣聖之所以為聖者亦惟憂勤惕厲之心須臾不敢自逸而已矣夫理無定在惟敬則常存心具生意惟勤則不死人心不死則天理常存矣故曰堯舜也只是兢兢業業過了一生若夫怠惰荒寧者人欲肆而天理亡矣豈不大可哀哉噫敬忽之間聖狂由判此志聖學者所當自勵云中庸道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞臣若水通曰此所謂道兼體用理一分殊而言也以其原於性命故不可離戒慎不怠之謂恐懼不忘之謂不可睹不可聞者道之體即謂無聲無臭者也二其所字皆有所指孔子曰正明目而視之不可得而見也傾耳而聽之不可得而聞也君子察識乎此敬以存之則有以養其中中立而和出焉則所謂大本達道一以貫之推而達之天地可位萬物可育而學之能事畢矣易傳曰易簡而天下之理得天下之理得而成位乎其中矣人君為天地人物之主可不致力於此乎左傳成公七年春吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也詩曰不弔昊天亂靡有定其此之謂乎有上不弔其誰不受亂吾亡無日矣君子曰知懼如是斯不亡矣臣若水通曰蠻夷内侵上無弔亂舉世不憂而惟季文子憂之庶亦知警矣獨不思所以弔亂之方乎在昔治至堯舜極矣禹之戒舜猶曰無怠無荒四夷來王春秋盟主不知有上徒以怠荒趣之是亦亂而已以亂弔亂其何紀極幾何而不淪胥為蠻夷也邪中國有道守在四夷端有望于今日國語周語召公曰天子聽政使公卿至於列士獻詩􅎩獻典史獻書師箴􅕓賦矇誦百工諌庶人傳語近臣盡䂓親戚補察􅎩史教誨耆艾脩之而後王斟酌焉是以事行而不悖臣若水通曰召公穆公虎也典樂典也史外史也師小師也賦公卿列士所獻詩也誦謂箴諌之語也近臣謂驂僕之屬也補補過也察察政也夫公聽則明偏聽則昏故君失之者臣得之父失之者子得之書曰匹夫匹婦不獲自盡人主罔與成厥功言當悉有衆善也厲王徒得衞巫以監謗是自蔽其耳目而塞其聰明也為人君者可不以召公之言而自儆乎周語單襄公曰昔先王之教茂帥其德也猶恐隕越臣若水通曰單襄公王卿士單朝也茂勉也帥循也勉循其德尤恐隕越戒慎之至也况不循德者可不恐懼乎陳靈公罔念妃匹而率其卿佐以淫於夏氏朝有政弗䘏門有賓弗禮怠棄孰甚焉其顛隕死亡無日宜哉此深可為為人上者之戒魯語公父文伯之母曰天子大采朝日與三公九卿祖識地德日中考政與百官之政事師尹惟旅牧相宣序民事少采夕月與太史司載紏䖍天刑日入監九御使潔奉禘郊之粢盛而後即安諸侯朝脩天子之禁令晝考其國職夕省其典刑夜儆百工使無慆淫而後即安卿大夫朝考其職晝講其庶政夕序其業夜庀其家事而後即安士朝而受業晝而講貫夕而習復夜而計過無憾而後即安自庶人以下明而動晦而休無日以怠臣若水通曰文伯魯大夫公父穆伯之子公父歜也母穆伯之妻敬姜也禮天子以春分朝日示有尊也大采衮織也祖習也地德所以廣生師尹大夫官也掌以善詔王惟陳也旅衆士也牧州牧也相國相也皆百官政事之所及也夕月以秋分紏共也刑法也少采黼衣也載天文也九御九嬪之官主粢盛祭服者即就也怠慢也憾恨也凡若此者皆憂勤惕厲之意易曰君子安不忘危所以昭聖功也故天子至貴不廢宵旰之勞朝脩陽政夕治隂教日中序外事日入課内績是以身安而化成也一或不儆而怠勝敬焉丹書凶危之戒可不鑒哉斯理也自天子至於士庶一也晉語趙襄子曰吾聞之德不純而福禄並至謂之幸夫幸非福非德不當雝雝不為幸臣若水通曰襄子晉正卿簡子之子無䘏也純壹也德不能服人必致冦故非福也當猶任也雝和也言唯有德者任以福祿為和樂也能和樂則不為幸也趙襄子德不足以來逺而卒有伐翟之勝臨飯色恐亦足以見其幸致之福不足樂也然其論福德之言亦庶乎知儆戒者歟後之為人君上者其毋以幸致之福自安也哉晉語士蒍曰戒莫如豫豫而後給臣若水通曰士蔿晉大夫劉累之後隰叔之子子輿也豫備也給及也言先有備而後可以及事若夫後時而戒則緩不及事矣商銘有之嗛嗛之德不足就也嗛嗛之食不足狃也故君子作事謀始斯永終譽若驪姬棄天違人迂求賈怨以是承君之恩是謂不豫不豫則不給不給則後悔無及矣詩曰其何能淑載胥及溺語曰人無逺慮必有近憂此之謂也為人君者其可以溺於目前之欲而貽不及之禍乎惟聖明深思而豫戒之以成聖德幸甚晉語范文子曰吾聞古之王者政德既成又聽於民於是乎使工誦諌於朝在列者獻詩使勿兠風聽臚言於市辨妖祥於謡考百事於朝問謗譽於路有邪而正之盡戒之術也臣若水通曰文子范燮也工矇􅕓也列位也兠惑也風采也臚傳也妖惡也祥善也行歌曰謡術道也夫士資諍友繩愆違也君資諍臣防驕寵也故大禹設鞀周公握髮恒慮昌言之不聞蓋人之心有所儆則覺覺則善心生無所儆則昏昏則邪心生大聖且不忘箴戒况中人乎文子言考德必於觀民審政存乎風聽以盡儆戒之術真可謂至言歟使趙武聞言而信則晉之三恥豈必逞之鄢陵哉甚矣儆戒之術為人主者不可不深致意也晉語范文子曰唯聖人能無外患又無内憂距非聖人必偏而後可偏而在外猶可救也疾自中起是難臣若水通曰偏猶言有一也在外外有患也聖人之心純乎天理兢兢業業故不待外患之警而自泰然故無内憂也若非聖人則必有外患之警而後能脩省故内憂不作也范文子重有感於鄢陵之役以為去外患孰若存之而為内恐懼脩省之地也孟子曰無敵國外患者國恒亡然後知生於憂患而死於安樂也為人君者其可不因外患而自警乎晉語知國曰夫君子能勤小物故無大患臣若水通曰知國晉大夫知氏之族也物事也夫莫大之禍起於須臾之不忍故一念不謹或以貽四海之憂一日不謹或以致千百年之患君子惟其慮也逺故邇亦不泄惟憂也大故細行是矜襄子好大喜盈自謂八柄由己豈知晉陽之難基於藍臺之宴乎夫然後知知國之言真藥石也有國有家者為深長之慮其可以不謹於近小乎楚語昔衞武公年數九十有五矣猶箴儆於國曰自卿以下至於師長士茍在朝者無謂我老耄而舍我必恭恪於朝朝夕以交戒我聞一二之言必誦志而納之以訓道我在輿有旅賁之䂓位宁有官師之典倚凡有誦訓之諌居寢有􅉏御之箴臨事有瞽史之道宴居有師工之誦史不失書曚不失誦以訓御之於是乎作懿戒以自儆也臣若水通曰武公衞僖公之子共伯之弟武公和也箴刺也儆戒也長大夫士衆士也䂓䂓諌也旅賁勇力之士掌執戈盾夾車而趍車止則持輪中庭之左右謂之位門屏之間謂之宁師長也典常也誦訓工師所誦之諌書之於几也事謂戎與祀也瞽樂太師掌詔吉凶史太史也掌詔禮事師樂師工瞽矇也誦謂箴諌也懿即詩大雅抑之篇也衞武公年將盈百而不忘規戒之辭其惕厲之心如此此天理之所以長存而為大賢也歟此所以為有斐君子而民之不能忘也彼子亹以老耄逺謗得非武公之罪人歟後之為人君者其尚以武公為法以子亹為戒漢文帝後元年詔曰間者數年不豋又有水旱疾疫之災朕甚憂之愚而不明未達其咎意者朕之政有所失而行有過與乃天道有不順地利或不得人事多失和鬼神廢不享與何以致此將百官之奉養或廢無用之事或多與何其民食之寡乏也夫度田非益寡而計民未加益以口量地其於古猶有餘而食之甚不足者其咎安在無乃百姓之從事於末以害農者蕃為酒醪以靡榖者多六畜之食焉者衆與細大之義吾未得其中其與丞相列侯二千石博士議之有可以佐百姓者率意逺思無有所隠臣若水通曰九年之水堯曰洪水警予七年之旱湯以六事自責自古帝王未嘗不以儆戒而興治也堯湯大聖且猶儆戒而况其下者乎漢之文帝此詔其亦庶幾近之矣然儆戒與不儆戒乃聖愚之所以分而治亂之所起係於一念之微爾王安石乃曰天變不足畏者豈非長君之惡乎漢武帝征和四年詔深陳既往之悔曰有司奏請逺田輪臺欲起亭隧是擾勞天下非所以優民也朕不忍聞當今務在禁苛暴止擅賦力本農脩馬復令以補缺毋乏武備而已由是不復出軍而封田千秋為冨民侯以明休息冨養民也臣若水通曰胡寅稱人莫難於知過莫難於悔過莫甚難於改過迷而不知者天下皆是也知而悔者百有一人焉悔而改者千萬人有一人焉自力學反躬之士尚鮮不吝之功何况人主而能改可謂明也已矣可為帝王處仁遷義之法秦穆公不得專美於前矣臣竊謂人主知改與否乃在一念之通塞覺與不覺之間爾故曰無輪臺一詔漢幾不免為秦矣危哉晉惠帝太安元年侍中嵇紹上疏曰存不忘亡易之善戒也臣願陛下無忘金墉大司馬無忘潁上大將軍無忘黄橋則禍亂之萌無由而兆矣臣若水通曰懲既往之愆則思將來之善而後愆可免矣嵇紹之言忠矣惜未有遷善之路上無以開昏愚之君下無以塞驕横之門時不知納而從之而亂亡隨至夫豈不宜哉晉元帝太興元年十一月乙夘日夜出高三丈庚申詔羣公卿士各言得失御史中丞熊逺上疏曰聰賊猾夏梓宫未還不遣軍進討一失也羣官不以讎賊未報為恥二失也當官者以治事為俗吏奉法為苛刻盡禮為謟諛從容為高妙放蕩為達士驕蹇為簡雅三失也萬機未整風俗偽薄安得朝有辯爭之臣士無祿仕之志乎且又舉賢不出世族用法不及權貴是以才不濟務姦無所懲若此道不改求以救亂難矣臣若水通曰日陽精也君象也日明于晝照臨下土猶君主中國統御萬方也日出于夜則晝夜反易陽失其所以為陽君失其所以為君天地古今之大變非常者也熊逺三失之說豈足以盡其咎哉天地反覆華夏擾亂冠屨倒置曠古所無之禍者矣而一時君臣於此而不知儆烏乎能儆晉成帝咸康七年劉翔疾江南士大夫以驕奢酣縱相尚嘗因朝貴宴集謂何充等曰四海板蕩奄踰三紀宗社為墟黎民塗炭斯乃廟堂焦慮之時忠臣畢命之秋也而諸君宴安江左肆情縱欲以奢靡為榮以傲誕為賢謇諤之言不聞征伐之功不立將何以尊主濟民乎充等甚慙臣若水通曰晉室播遷雖王謝諸人皆以江左為安者無懲戒前愆之心也飲酒盤遊豈有中原之思生民之念乎劉翔使臣也懇懇以生民宗社為言所以愧晉廷諸臣多矣晉穆帝升平五年范寗好儒學性質直常謂王弼何晏之罪深於桀紂或以為貶之太過寗曰王何蔑棄典文幽沈仁義游辭浮說波蕩後生使搢紳之徒翻然改轍以至禮壊樂崩中原傾覆遺風餘俗至今為患桀紂縱暴一時適足以喪身覆國為後世戒豈能迴百姓之視聽哉故吾以為一世之禍輕厯代之患重自喪之惡小迷衆之罪大也臣若水通曰虐政之害人也淺而近邪道之害正也逺而深故虐政使人知警邪道使人心肆范寗之論王弼何晏似過而不過也然而學術者政事之本故孟子論詖淫邪遁生於其心害於其政發於其政害於其事則夫桀紂之虐政亦王何之流弊也後之人君主正學之權者可不有戒於斯乎王猛病中上疏秦王堅曰夫善作者不必善成善始者不必善終是以古先哲王知功業之不易戰戰兢兢如臨深谷伏惟追蹤前聖天下幸甚臣若水通曰人之心儆與肆而已矣儆則為戰兢臨谷之心以保有大業肆則為投鞭斷流之志而大業以亡夫然後知王猛之言為藥石也晉秘書侍郎趙整作酒德之歌曰地列酒泉天垂酒池杜康妙識儀狄先知紂喪殷邦桀傾夏國由此言之前危後則符堅大恱命整書之以為酒戒臣若水通曰大禹聖人也而惡㫖酒一念好惡天理人欲興喪於此焉分喪德喪邦酒誥盡之矣趙整之言婉而能警其古之善諷諌者歟晉武帝大元十四年徐邈與范寗書曰自古以來欲為左右耳目無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使䜛謟並進善惡倒置可不戒哉臣若水通曰語云大奸似忠大詐似信自古有之矣至於䜛謟並進善惡倒置而禍亂由之是誠不可不戒也戒之何如學而已矣學則本心明而是非不忒不學則本體昧而何以鑑人為人君者尚知所本哉晉恭帝元熈元年凉公歆用刑過嚴又好治宫室從事中郎張顯上疏以為凉土三分勢不支久兼幷之本在於務農懷逺之略莫如寛簡今入嵗以來隂陽失序風雨乖和是宜減膳徹懸側身脩道而更繁刑峻灋繕築不止殆非所以致興隆也昔文王以百里而興二世以四海而滅前車之􅁤得失昭然臣若水通曰人君之有失德人諌不及乃有天譴所以致儆戒也凉歆嚴刑重役天垂戒於上臣進諌於下而不之悟卒以亡國殺身噫可畏哉格物通卷十
