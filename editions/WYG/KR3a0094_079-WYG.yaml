body:
  text: 格物通卷七十九明湛若水撰抑浮末中禁淫巧奢侈附宋文帝元嘉三十年秋七月辛酉朔日有食之詔省細作并尚方雕文塗飾貴戚競利悉皆禁絶中軍録事參軍周朗上疏以為舉天下以奉一君何患不給一體炫金不及百兩一嵗美衣不過數襲而必收寶連櫝集服累笥目豈常視身未時親是櫝帶寶笥著衣也何糜蠧之劇惑鄙之甚邪且細作始并以為儉節而市造華怪即傳於民如此則凡厥庶民制度日侈見車馬不辨貴賤視冠服不知尊卑尚方今造一物小民明已睥睨宫中朝製一衣庶家晩已裁學侈麗之源實先宫閫臣若水通曰夫風俗之侈儉自上倡之自下成之爾周朗之言切中當時之弊且知救弊之原矣惜乎宋主不知信用之使其自求解職徒知禁侈而不知禁人者自其身始無怪其卒為荒滛怙侈之主也哉齊武帝永明五年九月辛未魏孝文帝詔罷起部無益之作出宫人不執機杼者又詔罷尚方錦繡綾羅之工臣若水通曰禹之卑宫菲食文之卑服即功蓋欲損上益下以為民盛德之至也孝文變侈靡之俗修帝王之政而始終一致如此其去撤端門樓焚雉頭裘而不克終者逺矣夫君民一體也内外一道也罷尚方綾錦之工然後定上下貴賤之制於民焉則道德一而風俗同矣惜乎有仁心而不能行先王之道而仁不覆於天下也齊武帝永明六年魏孝文帝訪群臣以安民之術秘書丞李彪上封事以為豪貴之家奢侈過度第宅車服宜為之等制臣若水通曰禮莫大於分分莫大於名惟名與器不可以假人禮者為國之要所當謹也服舎踰度則名器亂而禮以亡禍患之所由起也魏之孝文有志變俗而李彪對以抑奢崇儉之道此魏之治所以為五代之傑出者與梁武帝天監十五年初魏宣武帝作瑤光寺未就是嵗胡大后又作永寧寺皆在宫側又作石窟寺於伊闕口皆極土木之美而永寧尤盛有金像髙丈八者一如中人者十玊像二為浮圖髙九十丈上刹復髙十丈每夜静鈴鐸聲聞十里佛殿如太極殿南門如端門僧房千間珠玉錦繡駭人心目自佛法入中國塔廟之盛未之有也揚州刺史李崇上表以為髙祖遷都垂三十年明堂未修太學荒廢城闕府寺頗亦頽壞非所以追隆堂構儀刑萬國者也國子雖有學官之名而無教授之實何異兔絲燕麥南箕北斗事不兩興湏有進退宜罷尚方雕靡之作省永寧土木之功減瑤光財瓦之力分石窟鐫琢之勞及諸事役非急者於三時農隙修此數條使國容嚴顯禮化興行不亦休哉太后優令答之而不用其言臣若水通曰魏剝天下民之膏脂極土木偶之文彩而不知得為天子者由於丘民而不由於土木偶也失天下之心由於剥民之財而不由於佛寺之不修也魏業之寖衰以亂豈無自哉陳宣帝太建元年五月周髙祖克齊之後雕斵之物並賜貧民繕造之宜務從卑樸臣若水通曰司馬光云周髙祖可謂善處勝矣他人勝則益驕髙祖勝而益儉臣謂驕生於勝而害勝者莫甚於驕何也夫勝心生則無憂無憂則縱欲縱欲則惟知己樂之遂而不知天下之可憂人君之欲至於知有己而以天下奉一人其民不亦毒乎司馬光稱周髙祖之善處勝是也以周髙祖之制欲尚能貶損如此况人君之學聖道以理自勝者乎唐髙祖武德元年萬年縣法曹孫伏伽上表以為隋以惡聞其過亡天下宜易其覆轍務盡下情人君言動不可不慎陛下今日即位而明日有獻鷂鶵者又百戱散樂亡國􅁋聲近太常於民間借婦女裙襦以充妓衣擬五月五日𤣥武門遊戱非所以為子孫法也又言太子諸王參僚宜謹擇其人帝省表大恱下詔褒稱擢為治書御史賜帛三百匹頒示逺近臣若水通曰書云人心惟危豈不信哉人主以儉而興以侈而亡彼隋為殷鑒於唐不逺何臨御未㡬而鷂鶵百戱以進人心可謂危矣向無孫伏伽之諫唐之為隋未可知也幸而天誘其衷一言省悟侈心以消忠諫之臣豈可無哉武德四年五月秦王世民觀隋宫殿歎曰逞侈心窮人欲無亡得乎命撤端門樓焚乾陽殿毁則天門及闕臣若水通曰書以峻宇雕牆未或不亡故侈靡宫室亡國之兆也卑宫惡服興王之基也廢興存亡之機茍不至於昏愚者皆能辨之而况於秦王世民乎鑒隋之亡而去其侈可稱賢主矣其後漸不克終何耶書曰人心惟危道心惟㣲若秦王者豈非精一之學未之講哉武德四年七月諫議大夫蘇世長嘗侍宴披香殿酒酣謂上曰此殿煬帝之所為耶上曰卿諫似直而實多詐豈不知此殿朕所為而謂之煬帝乎對曰臣實不知但見其華侈如傾宫鹿臺非興王之所為故也若陛下為之誠非所宜臣昔侍陛下於武功見所居宅僅蔽風雨當時亦以為足今因隋之宫室已極侈矣而又增之何以矯其失乎上深然之臣若水通曰隋煬帝以侈宫室而亡唐宜鑒于殷矣夫既毁之而復蹈之是惡人之過侈而已則自肆焉而不知者何也語曰人雖至愚責人則明人雖至明恕已則昏豈謂是耶昏明之機天理人欲之主也可不戒哉是故唐髙祖雖悟世長之諫安能毁而焚之如毁隋之宫室者乎唐太宗貞觀七年十二月工部尚書叚綸奏徵巧工楊思齊上令試之綸使先造傀儡上曰得巧工庶供國事卿令先造戱具豈百工相戒無作滛巧之意耶乃削綸階臣若水通曰傀儡木偶人戱也面目機發滛巧之尤者也月令曰母作滛巧以蕩上心書曰工執藝事以諫綸為冬卿見其君之惑於􅁋巧猶當執藝事以諫况又逢君之惡乎孔子曰匹夫熒惑諸侯者罪當誅况天子乎太宗宜正其惑上之誅乃止於削階則過矣豈太宗好侈之根猶在耶是故克伐怨欲之不行未可與其仁矣人主欲崇恭儉者當治其本焉貞觀十七年二月帝問褚遂良曰舜造漆器諫者十餘人此何足諫對曰奢侈者危亡之本漆器不已將以金玊為之忠臣愛君必防其漸若禍亂已成無所復諫矣帝曰然朕有過卿亦當諫其漸朕見前世帝王拒諫者多云業已為之或云業已許之終不為改如此欲無危亡得乎臣若水通曰奢侈者危亡之本而忠臣諫君必防其漸也諫造漆器舜以益聖象箸玉杯紂竟亡殷此遂良防漸之說與魏徵十漸之規所以拳拳為太宗言也太宗即納其言而開其諫其亦賢矣哉唐髙宗永徽三年梁建方大破處月朱邪孤注御史劾奏建方逗遛不進髙德逸敇令市馬自取駿者帝以建方等有功釋不問大理卿李道裕奏言德逸所取之馬筋力異常請實中廄帝謂侍臣曰道裕法官進馬非其本職妄希我意豈朕行事不為臣下所信邪朕方自咎故不欲黜道裕爾二月甲寅帝御安福門樓觀百戱乙夘謂侍臣曰昨登樓欲以觀人情及風俗奢侈非為聲樂朕聞邊人善為擊鞠之戱嘗一觀之昨初升樓即有羣為擊鞠意謂朕篤好之也帝王所為豈宜容易朕已焚此鞠冀杜衆人窺望之情亦因以自誡臣若水通曰髙宗中材之主可導而上下者也即位之初尊禮輔相恭己以聴永徽之政庶㡬貞觀其責道裕駿馬之佞其時侈心未萌也及登樓觀百戱擊鞠之時侈心萌矣猶強遏而飾之曰觀人情奢儉又曰焚鞠自誡然而潜滋暗長者月異而嵗不同不數十年悖謬昏惑則前日之萌芽由拱把而枝葉扶疎雖折斧柯不可為矣卒成武氏之禍皆自其侈心之萌也人君之欲修儉德者當於根本而致力焉可也孔子曰茍志於仁矣無惡也唐中宗嗣聖五年二月侍御史王求禮上書曰古之明堂茅茨不翦采椽不斵今者飾以珠玉塗以丹青鐵鷟入雲金龍隠霧昔殷辛瓊臺夏癸瑤室無以加也太后不報臣若水通曰瓊臺瑤室桀紂以亡唐之宫室珠玉丹青以窮其滛巧夏商之亡續爾王求禮之言可謂切矣而不見聴豈非樂所以亡者哉唐𤣥宗開元二年七月上以風俗奢靡乙未制乗輿服御金銀器玩宜令有司銷毁以供軍國之用其珠玉錦繡焚於殿前后妃以下皆無得服珠玉錦繡戊戌敇百官所服帶刀酒器馬銜鐙三品以上聴飾以玉四品以金五品以銀自餘皆禁之婦人服飾從其夫子其舊成錦繡聴染為皂自今天下更無得采珠玉織錦繡等物違者杖一百工人减一等罷兩京織錦坊臣若水通曰自天子至於庶人其有降殺等威乃天之秩禮非人之所為也明皇乗輿服御金銀則銷之以充軍國之用焚錦繡於殿前而三品四品則聴用金玉之飾自非天之秩人之情也其禁采珠玉織錦繡刻厲節儉雖有善矣君子知其不終焉未㡬遣御史訪珍異於南方卒以奢敗蓋其崇儉去奢非實心而其所以示朴者出於矯情非實德也然則人君可不慎乃儉德以懐永圖哉天寶九載二月以姚思藝為檢校進食使時諸貴戚競以進食相尚水陸珍羞數千盤一盤廢中人十家之産臣若水通曰上有所好下必趨之明皇窮口腹之欲貴戚趨而媚之至此極矣其費非從天而下也不在官則在民爾以十家之産而供一盤之羞有人心者忍下咽耶及夫幸蜀之時日中未食市胡餅獻糲飯回視檢校進食之盛悔將何及哉謹録以告為人君者覆轍之深戒焉唐代宗大厯十四年五月德宗即位在諒隂中動遵禮法閏月詔罷省四方貢獻之不急者罷棃園使及樂工三百餘人又詔天下無奏祥瑞及獻珍禽竒獸怪草異木内莊宅使上言諸州有官租萬四千餘斛帝令分給所在充軍儲放諸國所獻馴象於荆山之陽凡四十有二及豹貀鬬雞獵犬之類悉縱之又出宫女數百人於是中外皆恱淄青軍士至投兵相顧曰明主出矣吾屬猶反乎臣若水通曰記云至誠無息不息則久蓋有純至之心固至誠而不息其次在強勉而已唐德宗其天資刻薄人也徒見代宗弊政即位而強更之若有抑末崇儉之意者軍士投兵固其所矣然特出於一時聲音笑貎之為不數年之後猜忌肆欲遂致大亂回視初年若天淵然本無其誠而強於暫爾胡安國所謂假之不久而遽歸也使由純王之學勉強於誠則天理日明人欲日消湯武之所以反之者何不至哉故人主不可以不學也唐懿宗咸通七年上好音樂宴遊殿前供奉樂工常近五百人每月宴設不减十餘水陸皆備聴樂觀優不知厭倦賜與動及千緡曲江昆明㶚滻南宫北苑昭應咸陽所欲遊幸即行不待供置有司常具音樂飲食幄帟諸王立馬以備陪從每行幸内外諸司扈從十餘萬人所費不可勝紀臣若水通曰人主之治天下當以儉約為先而佚遊之戒滛聲之絶所以養儉德而端大本也懿宗遊宴無度而音樂不離賞賜不惜至使有司隨處以具供應諸王立馬以備扈從可謂暴天物窮人力而不恤者唐之亡也寧不决於斯哉孟子曰師行而糧食饑者弗食勞者弗息睊睊胥䜛民乃作慝方命虐民飲食若流流連荒亡為諸侯憂其懿宗之謂乎此天下萬世之所當鑒也格物通卷七十九
