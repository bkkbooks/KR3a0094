body:
  text: 格物通卷七十四明湛若水撰任將下班固白虎通曰大夫將兵必不御者欲盛其威使士卒一意繋心也故但聞將軍令不聞君命也臣若水通曰將權惟其重而已將將惟其賢而已蓋必將大夫所以尚賢也不御盛威所以重其權也權重故士卒一心是故聞將命不聞君命所以一其心也心一則無敵於天下矣武王曰受有臣億萬惟億萬心予有臣三千惟一心其斯之謂乎雖然使之一心於將者乃所以一心於君也後之人君必求一心之將以専任之而勿疑哉陸贄告徳宗曰凡欲選任將帥必先考察行能然後指以所授之方語以所委之事令其自揣可否自陳規模須某色甲兵籍某人參佐要若干士馬用若干資糧某處置營某時成績始終要領悉俾經綸於是觀其計謀校其聲實若謂材無足取言不可行則當退之於初不宜貽慮於其後也若謂志氣足任方畧可施則當要之於終不宜掣肘於其間也是以古之遣將帥者君親推轂而命之曰自閫以外將軍裁之又賜鈇鉞示令專斷故軍容不入國國容不入軍將在軍君命有所不受誠謂機宜不可以逺決號令不可以兩從未有委任不專而望其克敵之功者也自頃邉軍去就裁决多出宸𠂻選置戎臣先求易制多其部以分其力輕其任以弱其心雖有所懲亦無所失遂令分閫責成之義廢死綏任咎之意衰臣若水通曰古之將將之道始焉擇之精既焉任之專夫選惟精則我之志不疑任惟專則彼之權不撓不然上失其所以待將之道下無以盡其為將之才而衞内捍外之功不可冀矣唐之中葉回紇吐蕃出沒無常有一子儀幸而成功猶未能以盡用也况其他乎若徳宗猜疑之心固非任將之道也矧有權臣如延齡在内而大將能立功矣乎其能免乎是故咫尺長安而不得見李懷光始有負功而叛者矣嗚呼此固陸贄拳拳之意也宋高宗紹興十一年十二月秦檜殺故少保樞宻副使武昌公岳飛飛事親孝家無姬待吳玠素服飛願與交驩飾名姝遺之飛曰主上宵旰豈大將安樂時邪却不受玠益敬服帝欲為飛營第飛辭曰金國未滅何以家為或謂天下何時太平飛曰文臣不愛錢武臣不惜死天下太平矣臣若水通曰岳飛者所謂才徳無全文武具備者也故一鼓而破楊么使遂長驅而北則中原可復矣而秦檜殺之遺千載無窮之恨也飛之被殺固飛之不幸乃亦宋室之不幸也檜之殺飛固檜之罪亦高宗之罪也使髙宗剛明獨斷察檜之奸而必去之知飛之忠而専任之則故物可計日而克復也不幸而至於斯非天乎或曰古之制將在軍君命有所不受飛初為將必有命辭也為飛者知奸臣之誤國而必將害己引命將之制拜表陳情而不受召必長驅收復中原然後歸而請罪則宋之祚未必絶也宗廟未必不血食也北冦未必亂中國而遺千載所無之禍也臣謂此亦一説矣然飛事親孝故事君忠豈忍為是哉宋儒程頥上河東帥書云自古乘塞禦敵必用驍猛招徠撫養多在儒將臣若水通曰後世學絶士無文武全才然必有豪傑之士出乎其間也人君茍得將之儒者而用之則招徠撫養有道皆自其學問心得中來也故升陑之師必在一徳之賢矣舎儒將則不可程頥之言豈非真見哉華陽范祖禹曰昔周宣王任賢使能吉甫征伐於外而王之所與處者張仲孝友也夫使文武之臣征伐而左右前後得正良之士善其君心則讒言不至而忠謀見用此所以能成功也茍使憸邪之人從中制之則雖吉甫無以成其功宣王能復文武之業以致中興者内順治而外威嚴也臣若水通曰將之無成功者必將非其人也將得其人矣而又無成功者相之不賢也内外之不一也故有吉甫於外必有張仲於内然後可成中興之功内外一徳一心而功不成者未之有也雖然亦本於宣王之心之賢爾惟君之賢而後能擇相能擇相而後能用將不然則秦檜在内雖有岳飛之賢將非但不能用爾殺身敗國之禍至矣可不戒哉楊時上欽宗䟽其略曰臣嘗論姚古逗遛當以軍法從事久未䝉施行今太原圍閉累月危急甚矣訪聞大兵尚在威勝軍無一人一騎入太原境者惟范瓊不受姚古節制獨能引兵稍前則諸將逗遛古實為之也奈何惜姚古不誅坐視要重之地而不救乎臣若水通曰語云小不忍則亂大謀時之論姚古是矣姚古知逗遛在軍法所必誅所以然者忍爾欽宗知姚古之不誅則人不效死是無太原重地也所以不行誅者亦忍爾自古之興亡多矣而未有如宋之惨者忍爾如人之患毒疽與命闗者也潰之則痛而可生不潰之則忍而必死宋以禮義而興宜多歴年然都汴則立國已弱當盛之時北遷闗中則猶可延祚而不能者忍爾北寇漸處中國而不去及其盛而各據而不能決戰乃南遷而都杭又忍而不決戰主和議岳飛諸賢且受禍焉是又不忍又遷閩遷廣隱忍以死其禍毒矣如疽之大潰而不可救以死自古亡天下未有如是之慘者也噫可以為萬世戒矣楊時擇將劄子有云宜令兩制而上各舉所知堪為將帥者有智勇足以敵愾待暴久沉下僚未為世用者令監司郡守皆得以名聞或自負材武不為人知者亦使得自陳詢事考言有可採者不次用之則鼓刀販繒之傑必有為時而出者未嘗求之不可謂天下之廣咸無其人焉此尤宜留意也臣若水通曰知人惟難而知將材者為尤難夫以趙括讀父書而人莫能難之及將兵而致敗則將材可以易知乎楊時請令兩制而上各以沉於下僚者上聞是欲嘗試之事也又令自負材武而人不知者得自陳是欲自審於己也二者無遺䇿矣雖然唐虞任官總言九徳至於徂征有苖乃勤儉之禹也將才之選豈在他求哉西山真徳秀曰古之用武者不急於治兵而急於擇將將之勇怯兵實係焉故天下無必勝之兵而有不可敗之將臣若水通曰將也者三軍之司命也兵非可必勝者也全兵固守以活三軍之命者將之能也故兵以十全為上知其可戰不可戰而已此理勢之可必者也人君之於將求得如是之人而任之則萬全常勝之勢可保矣國朝乙巳春太祖御奉天門與劉基論用兵謂基曰克敵在兵而制兵在將兵無節制則將不任將非其人則兵必敗是以兩軍之間决死生成敗之際有精兵不如良將基對曰臣荷聖上厚㤙得侍左右毎觀廟筭初謂未必皆然及至摧鋒破敵動若神明臣由是知任將在上將之勝不若主之勝也然臣觀陛下常不拘古法而勝此尤所難也乃謂之曰兵者謀也因敵制勝豈必泥於古哉朕常親矢石觀戰陣之事闔闢竒正頃刻變化猶風雲之無常勢要在通其變爾亦何暇論古法邪臣若水通曰後世之談兵者不過坐作進退之節撃刺攻守之宜此其迹也臣恐探本之論不如是也何者克敵在兵制兵在將而任將則在君也是故明君慎擇其將而已矣將其賢也則呼吸之間變態百出如疾風之飄忽如迅雷之過耳用正用竒如鬼神之莫測安用夫六韜三略之舊哉韜略者無乃講於平時以開發吾之聰明者爾聪明在我則視聽随寓而用豈可定哉聖祖諭劉基之言可謂不泥於迹而獨能用其神者矣乙巳八月太祖皇帝命中書左相國徐逹為大將軍平章常遇春為副將軍帥師二十萬伐張士誠集將佐諭之曰自大亂以來豪傑並起所在割據稱名號者不可勝數江南亂䧺西有陳友諒東有張士誠皆連地千里擁衆數十萬吾介乎二人之間相與抗者十餘年觀二人所為其志豈在於民不過貪富貴聚淵藪刼奪冦攘而已友諒敗㓕獨士誠據有浙西北連兩淮恃其彊力數侵吳之疆埸頼諸將連歳征討克取兩淮之地今惟浙西姑蘇諸郡未下故命卿等討之卿等宜戒飭士卒毋肆虜掠毋妄殺戮毋發邱壠毋毁廬舎聞張士誠母𦵏姑蘇城外慎勿侵毁其墓汝等毋忘吾言諸將帥務在輯睦勿縱左右欺凌軍士凡為將之功必資士卒善撫恤之大抵克敵者必以成功為效樹徳者必以廣㤙為務卿等勉之諸將皆再拜受命臣若水通曰孟子之於梁襄王既告以定於一又告以不嗜殺人者能一之觀皇祖命將出師以妄殺為戒其古之聰明睿智神武而不殺者乎其平一天下宜矣聖諭曰克敵者以成功為效樹徳者以廣㤙為務群䧺刼冦戡定禍亂非所謂克敵乎曰毋發邱壠毋毁廬墓務在輯睦非所謂樹徳乎克敵者義也樹徳者仁也以仁義之師為弔伐之舉此所以不嗜殺而除民虐應天命而一天下也歟吳元年十月命徐逹為征虜大將軍常遇春為征虜副將軍率甲士二十五萬由長淮入大河北取中原謂逹曰閫外之事汝實任之茲行必自山東次第進取山東古云十二山河之地師行之際須嚴部伍明分數一衆心審進退之機適通變之宜使戰必勝攻必取我虚而彼實則避之我實而彼虚則撃之將者三軍之司命立威者勝任勢者强威立則士用命勢重則敵不敢犯吾嘗與諸豪傑並驅觀其取敗者未有不由威不立而勢輕也汝其慎之臣若水通曰此我聖祖諭徐逹常遇春北征中原之言其要在於識虚實其道在於壯威勢而已進退之機變通之宜所以運用乎此者爾此誠萬世將帥决勝萬全之術也後之為將者不可不取法於斯焉洪武三年六月以大都督府都督僉事張温兼陜西行都督府僉事温先從大將軍攻蘭州有功及是入謝太祖諭之曰蘭州之㨗可謂竒功夫將帥之道有功不伐則功益顯恃功驕恣則名益隳故仁者不矜其功而智者克成其名仁智兼全所向無敵若乏仁義雖有勇士百萬不足恃也古者仁智之將撫摩安輯見情逹變坐而制勝以樹勲立名於當時者國家莫不倚重之功名始終萬古不朽其悍驕恣横之人雖能成功卒至敗亡者蓋勇有餘而仁智不足也古稱髙而不危滿而不溢又曰功蓋天下守之以謙爾能守此為戒則可以長保富貴矣臣若水通曰書云臣罔以寵利居成功夫功名之際難於保終也才有餘而徳不足者鮮有不敗矣是故仁智也者保其位者也我太祖髙皇帝之諭張温而及於此焉實將帥保功名之藥石也後之為人臣者固當自保其終而為人君者亦當保臣之終焉洪武六年上以大將軍徐逹等久出師遣使齎勑諭之曰凡賢人君子不以勤怠異其始終不以富貴忘其艱難卿等與朕平定天下勲業已成而𤨏𤨏殘冦不能盡討致連年出師勞民擾衆孰任其咎朕姑為爾言之今駐師去處皆有房宇妻妾身雖在外實同家居一也肥馬輕裘縱意馳騁不知下人饑寒之憂二也燕樂玩愒因循茍且不能謀事三也軍士連年暴露披堅執鋭朝夕不息意圖决勝爾又失算卒無成功四也昔田單攻狄久之不下問計於魯仲連仲連曰將軍在即墨時飲食起居與士卒同身先於士所以獲生而取勝今將軍東有夜邑之奉西有淄上之娛黄金横帶馳騁於淄澠之間有生之樂無死之心所以不勝也卿等皆起布衣一旦至此遂忘昔日之艱難豈不犯仲連之誚乎卿等宜益懋其功以副朕懐臣若水通曰丹書之戒敬勝怠者吉怠勝敬者㓕臣謂敬者天理之公怠者人欲之私公私係於一念之㣲爾惟能敬則有憂勤惕厲之心而無怠惰荒寧之氣功以之崇業以之廣何所為而不成也皇祖與大將軍諸臣平定天下勲業已成而殘寇尚未盡討譬之為山九仞而功􅃜一簣也所以然者敬於始而怠於終爾皇祖責以四失起病之藥石也所以作其敬儆其怠御將之道至矣詩曰執競武王無競惟烈我皇祖以之洪武十七年二月庚戌上與翰林院侍講學士李翀等論武事翀曰用兵重在任將上曰任將之道固重然必任之專信之篤而後可以成功昔齊用司馬穣苴魏用樂羊可謂任之專信之篤故皆有功若唐肅宗用魚朝㤙憲宗用吐突承瓘為監軍使諸將掣肘以致敗事者惟任將不專信之不篤故也翀曰惟陛下聖明深知此失上曰將必擇有識有謀有仁有勇者有識能察幾於未形有謀能制勝於未動有仁能得士心有勇能摧堅破鋭兼是四者庶可成功然亦在人君任之何如爾臣若水通曰御將之道有二曰專任曰篤信而已為將之道有四曰識曰謀曰仁曰勇而已為將之道在乎臣而御將之道在乎君此皇祖之見萬世不易之論也若非有善御之君則雖有識謀仁勇之將車載斗量不能用也仰惟聖明鋭意文徳不忘武備必修古遣將之法專閫外之制則可謂任之專矣逺讒間之口安展布之心則可謂信之篤矣能斯二者則穰苴樂羊豈無復見於今乎洪武二十四年十一月丙申宋國公馮勝凉國公藍玉等遣使入奏請勒兵廵邉就討西蕃之未附者上遣使報之曰朕觀天象未利征討慎勿輕舉爾勝及左副將軍傅友徳宜還京師玉率諸將駐陜西訓練士馬且多市馬為武備待其有釁而後取之朕當有後命也臣若水通曰兵者所以行征伐也征也者所以討人之不正也此我聖祖所謂待其有釁而後取之者也無釁而動是謂貪兵不但戕民之生抑以害民之財先王耀徳不觀兵蓋以此爾我聖祖養靜待動之説誠得聖人用兵之道矣兵不濫用則食之者寡而君民之財足矣人君茍不體認於一念之間防乎欲以存乎理其不玩兵而害財者幾希矣洪武三十年正月命長興侯耿炳文為總兵官武定侯郭英為副征陜西及甘肅選精鋭歩騎廵西北邉以備邊冦上諭之曰帝王之治天下務安民也今海内無虞民固安矣然邉境之備不可廢弛爾其竭力以副朕心凡有冦盗即殄滅之俾邉民樂業則余汝嘉臣若水通曰邦頼民以守民頼兵以衞兵雖所以安民亦或至於害民也我皇祖安不忘危治不忘亂以義用兵以仁存心及命將備邉乃拳拳以弭盗安民為誡此邦本之所以固而天命之所以永也若秦皇黷武以至危亡漢武窮兵不免虚耗亦獨何哉國朝凡軍器專設軍器局軍裝設針工局鞍轡設鞍轡局掌管時常整㸃若有缺少随即行下本局計料委官監督定立工程如法造完進納内帑遇有闗支奏聞支給其外藩府州縣呈稟成造具奏行下依式造完支撥若各處有司歳造之數起解到部辨驗堪中送庫交收有不堪者坐監造者以罪其各邉軍器弓有二等曰二意角弓曰交阯弓鎗有二等曰魚肚鎗曰蘆葉鎗刀之制有馬軍鴈翎刀步軍腰刀將軍刀凡三等又有馬軍久黒漆䤞子箭紅油圑牌等器械若夫甲胄則有水磨頭盔水磨鎖子䕶項頭盔紅漆齊腰甲水磨齊腰剛甲水磨栁葉剛甲水銀摩挲長身甲併鎗馬赤甲之類臣若水通曰此國朝軍器之制也夫征伐以將卒為先將卒以器械為命一有不備備而不羙雖有良將勇兵亦無如之何矣是故我朝於軍器極加意焉然歳久而事弊生器械不備備而不羙者多矣何以壯士氣哉書曰詰爾戎兵又曰惟事事乃其有備有備無患在今日所宜戒飭焉者也格物通卷七十四
