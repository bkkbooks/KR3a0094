body:
  text: 格物通卷六十二明湛若水撰學校五禮樂政教附一國朝戊戌年十二月辟儒士危祖幹葉儀既至祖幹持大學以進上命祖幹剖析其義幹以為帝王之道自修身齊家以至於治國平天下必上下四旁均齊方正使萬物各得其所而後可以言治上曰聖人之道所以為萬世法吾自起兵以來號令賞罰一有不平何以衆服夫武定禍亂文致太平類此道也甚加禮貌臣若水通曰大學一書帝王修治之道備矣然逆推平天下治國齊家修身正心誠意之功其要必自格物始順循意誠心正身修家齊國治天下平之效其本亦由格物始是格物者大學之所以成始而成終也而意心身天下國家之功效皆在此矣程頥曰格者至也物者理也至其理乃格物也知行並進也茍能立志體認於心以至其天理則知以至意以誠心體以正形於身而身修形於家而家齊形於國而國治形於天下而天下平家國天下無處而非天理之寓則無處而非體認之功皆格物也功至而理融則致中致和有以位天地育萬物而上下四旁均齊方正矣我皇祖體認大學於心而有黙契之妙是以受命以定禍亂者此也興道以致太平者此也至於出入起居號令賞罰無不一於此也而開國之初乃以崇儒為急務故祖幹葉儀輩幡然而出及大學之進遂深喜而嘉納焉且諭以道之所在而能行之又不徒向慕而已此所以能撥亂反正復中國帝王之土宇紹中國帝王之綱常有功於帝王也大矣聖明體皇祖之心而擴夫大學之道則宗社有無疆之休也國朝甲辰五月太祖朝罷退御白虎殿閱漢書侍臣宋濂孔克仁等在側上顧謂濂等曰漢之治道不能純乎三代者其故何也克仁對曰王霸之道雜故也上曰高祖創業之君遭秦滅學之後干戈戰爭之餘斯民憔悴甫就蘇息禮樂之事固所未講獨念孝文為漢令主正當制禮作樂以復三代之舊乃逡巡未遑遂使漢家之業終於如是夫賢如漢文而猶不為將誰為之帝王制作貴於及時三代之王蓋有其時而能為之若漢文有其時而不為也可不惜哉臣若水通曰治定功成而禮樂興此其時也漢文有其時而不為誠如聖諭雖然正使為之亦不能依稀三代之盛也何也無中和之德以為之本也聖祖又以漢祖創業而未暇何天下甫定即命牛諒制禮陶凱作樂邪是又漢祖之所不及也傳曰禮樂積德百年而後興今百六十年來又制禮作樂之大時也夫禮樂者教化之具也聖子神孫一道相守養其中和之德而求所以為制作禮樂之本者時不可失也呉元年七月乙亥上御㦸門召學士朱升及范權領樂舞生入見設雅樂閱視之上親擊石磬命升辨識五音升不能審以宫音為徵音上曰升每言能審音至辨石音何乃以宫作徵邪起居注熊鼎對曰八音之中石最難和故書曰於予擊石拊石百獸率舞上曰石聲固難和然樂以人聲為主人聲和即八音諧和矣因命樂生歌一曲上復笑曰古者作樂以和民聲格神人而與天地同其和近世儒者鮮知音律不知學欲樂和顧不難邪鼎復對曰樂音不在外求實在人君一心君心和則天地之氣亦和天地之氣和則樂亦無不和矣上深然之臣若水通曰記有之天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂鐘皷管磬羽籥干戚樂之器也屈伸俯仰綴兆疾徐樂之文也知其情者能作識其文者能述情也者心之和也人能體認於心以至其天理則心和順矣心和則氣和氣和則聲和而諧之六律宣之八音由是格神人馴鳥獸釐百工以熈庶績與天地大和大順之氣相為流通矣皇祖深知其然乃能辨夫石音探其樂本以諭臣下不惟識其文又能識其情此所以能述之於唐虞擊拊之餘而作之於叔季廢壊之際也然出禮樂者君也輔禮樂者臣也熊鼎之對似矣朱范二子其不汗顔邪國朝太祖皇帝詔畧曰永惟為治之道必本於禮考諸祀典知五嶽五鎮四海四瀆之封起自唐世崇名美號歴代有加朕思之則不然夫嶽鎮海瀆皆高山廣水自天地開闢以至于今英靈之㑹皆受命上帝幽微莫測豈國家封號之所可加瀆禮不經莫此為甚夫禮所以明神人正名分不可以僣差今命依古定制凡嶽鎮海瀆並去其前代所封之號止以山水本名稱其神臣若水通曰書云皇帝乃命重黎絶地天通罔有降格此正名以正人心教化之本也我太祖革前代所封山川之號其同符於此乎夫禮不可瀆也瀆則非禮矣山川嶽瀆加以名號是人其神矣神人幽明不辨而名分不正矣名分不正則妖誕之說興而人心之所以不正也其何能國乎故我太祖於千百年之後慨然一洗瀆禮以復古制神人明矣名分正矣立禮教以正人心其功豈小補之哉洪武二年十月上諭中書省臣曰學校之教至元其弊極矣使先王衣冠禮樂之教幾於蕩然上下之間波頽風靡故學校之教名存實亡況兵變以來人習於戰鬬惟知干戈莫識俎豆朕嘗謂治國之要教化為先教化之道學校為本京師雖有太學而天下學校未興宜令郡縣皆立學禮延師儒教授生徒以講論聖道使人日漸月化以復先王之舊以革汚染之習此最急務當速行之臣若水通曰伏觀皇祖諭中書省臣以立學撥亂反治咸與維新之先務矣夫學校盛於三代衰於漢唐宋大壊於元代聖諭所謂先王衣冠禮樂之教幾於蕩然夫所謂壊者道之壊也及立學中外延師授徒又拳拳以講聖道以復先王之舊為言其所以教人者豈落第二義哉篤其實而藝者書之此聖祖立科舉之法使之讀聖之書藴聖之德行發聖之言因言以觀其藴因藴以授之官此其良法美意也奈何士習既久買犢還珠馳騖於文藝而遺棄其本實遂使德業舉業判為二途而先王德行道藝之教幾乎熄矣易窮則變變則通惟聖人為能通其變必上之所以教下之所以學内外心事合一以舉業為德業之發以德業為舉業之本易其志而不易其業合本末兼體用一以貫之斯賢也斯能也斯俊傑也用之於國則國治用之於天下則天下平然後學校之教名實相須而聖人之道明先王之舊復矣洪武四年上觀大學衍義至晁錯謂人情莫不欲夀三王生之而不傷真德秀釋之曰人君不窮兵黷武則能生之而不傷顧謂侍臣曰晁錯之言其所該者廣真氏之言其所見者切古人云兵者凶器聖人不得已而用之朕每臨行陣觀兩軍交戰出没於鋒鏑之下呼吸之間創殘以之心甚不忍嘗思為君恤民所重者兵與刑爾濫刑者陷人於無辜黷兵者驅人於死地有國所當深戒也臣若水通曰先儒程顥云仁者以天地萬物為一體臣謂認得一體則痛癢相關而民之所好好之民之所惡惡之矣是故聖人至仁足以育萬民大義足以正萬民而陽舒陰慘好惡皆一體矣皇祖觀大學衍義有感於二人之論而言臨陣不忍傷殘以濫刑黷兵為戒其惻隠之心乎至於除殘去暴以安生靈則又仁義並行無非一體之意矣聖明念而體之豈不大得民心以永天命乎洪武四年六月吏部尚書詹同禮部尚書陶凱製宴享九奏樂章成其曲一曰本太初二曰仰大明三曰民初生四曰品物亨五曰御六龍六曰泰階平七曰君德成八曰聖道成九曰樂清寧先是太祖皇帝厭前代樂章率用諛詞以為容恱甚者鄙陋不稱乃命凱等更製其詞至是上之命恊音律者歌之謂侍臣曰禮以道敬樂以宣和不敬不和何以為治元時古樂俱廢惟淫詞豔曲更唱迭和又使北鄙之聲與正音相雜甚者以古先帝王祀典神祇飾為舞隊諧戲殿廷殊非所以道中和崇治體也今所製樂章頗恊音律有和平廣大之意自今一切流俗諠譊淫䙝之樂悉屏去之臣若水通曰九奏樂章大要又本於君德成之一章也使君德既成則制作有地而大禮與天地同節大樂與天地同和風移俗易挽衰世而之古特易易也此我聖祖之謂也不為萬世之永鑒歟洪武五年三月辛亥上命禮部重定官民相見禮先是元俗官僚相見輒跪一足以為禮拜則以叩頭為致敬既拜復跪一足屬官下人見上司官長與為禮即引手於後進若却避之然上甚厭之自即位之初即加禁止然舊習不能盡革至是復定為儀節令頒布之上謂禮部臣曰禮者所以美教化而定民志成周設大司徒以五禮坊萬民之偽而教之中夫制中莫如禮修政莫如禮故有禮則治無禮則亂居家有禮則長幼叙而宗族和朝廷有禮則尊卑定而等級辨自禮不明而天下成俗先王之禮幾乎熄矣而人情狃於淺近未能猝變今命爾稽考典禮合於古而宜於今者以頒布天下俾習以成化庶乎復古之治也臣若水通曰宋儒司馬光云禮之用大矣用之於身則動静有常而百行備用之於家則尊卑有别而家道正用之於鄉則長幼有倫而風化美用之於國則君臣有叙而政治成用之於天下則諸侯賔服而紀綱正臣謂禮也者理也人君必先體天理於心以為之本而後由中應外篤近舉逺莫非禮之用矣至於拜揖跪興之儀先王之典禮具在以為細故而弁髦之習染之久交接之間靡然成為風俗皇祖撥亂反治變之以禮既禁止之而又命禮臣定為儀節俾學校習之天下守之致治成化而聖王之禮法教化復見於今日者皆聖祖天理之一念佑啟之洪休也伏望聖明取法以擴充之焉洪武六年三月禮官上考定禮儀太祖皇帝謂尚書牛諒曰禮者國之防範人道之紀綱朝廷所當先務不可一日無也自一時廢棄禮教因循百年而中國之禮變易幾盡朕即位以來夙夜不忘思有以振舉之以洗汚染之習故嘗命爾禮部定著禮儀今雖成宜更與諸儒叅詳考議斟酌先王之典以復中國之舊務合人心永為定式庶幾愜朕心也臣若水通曰禮者體也與道為體者也禮存則道存道存則國存禮亡則道亡道亡則國亡是故先王之教務焉聖祖以禮為人道之紀綱又曰國之防範蓋深有見於是而鑒元氏之失矣今重熈累洽之世議禮而奉行之者可不謹哉可不謹哉洪武十三年六月勅諭國子監生曰仲尼之道上師天子下教臣民自漢及今未有逾斯道而能久朕統一寰宇君主斯民切惟學校國之首務乃今年春命工曹構廟學越五月而成於是傳選師儒教訓生徒期在育君子以履仲尼之道以助我後嗣以安天下蒼生茍教之不以其道學之不盡其心則恐養非君子用非賢人徒勞民供無益國家爾諸學者當謙柔恭謹存禮義之勇去血氣之剛持守仲尼四勿之訓積日經旬以踰嵗月不變其所學則賢人君子矣由是出為國用致君於堯舜躋民於雍熈顯揚其親永世不磨豈不偉哉宜體朕意立乃志務乃學正爾儀慎爾言務勉進修無間晝夜講於友必正道以相輔問於師必致恭而聽受有乖此禮者監丞糾之勿忽臣若水通曰伏觀聖祖之諭拳拳在於學校教之以其道成賢才以適用也一則曰履仲尼之道二則曰持守仲尼四勿之訓其可謂知要矣夫教學之道莫過於仲尼而仲尼之道惟在乎四勿夫四勿者聖人之心學也蓋視聽言動事也勿之者心也夫聖人之學惟在於性情正其性情者心而已矣然則聖祖以是教人豈非黙契乎帝王心學之傳乎養士如此則體立用行致君澤民之事業皆自其性情中流出矣噫皇祖以是立教後世猶有逐末而忘本重言而輕實是藝而非德者亦獨何哉洪武十四年三月頒五經四書于北方學校上謂廷臣曰道之不明由教之不行也夫五經載聖人之道者也辟之菽粟布帛家不可無人非菽粟布帛則無以為衣食非五經四書則無由知道理北方自喪亂以來經籍殘闕學者雖有美質而無講明何由知道今以五經四書頒賜之使其講習夫君子而知學則道興小人而知學則俗美他日收效亦必本於此也臣若水通曰道本於心所謂良知也養其知者在於書蓋書註吾心者爾故能養也人本於生理所謂元氣也養其元氣者在菽粟布帛蓋菽粟布帛同得此生理者爾故能養也非書能益良知之所無也非菽粟布帛能益元氣之所無也東方西方南方北方之人同此心同此良知也堯舜三代之人與元時之人同此心同此良知也此聖祖所以頒五經四書于北方之學校以覺其心之良知一哉聖心乎其教育之仁如天地之覆載而無間矣洪武十五年四月遷工部侍郎劉敏為刑部侍郎誥曰於戲昔聖人以德化天下故民樂於從善而天下治然聖人之心必欲天下之人皆善無惡有不率者然後刑以齊之故賞當其功罰當其罪而民之不從善者無有也故上曰君聖中曰臣賢下曰民良而天地致和品物咸亨矣後之君臣乏誠意正心之學蔑成已及物之善是以刑罰不當仁義倒施法愈煩而犯愈衆此為世之大病也臣若水通曰賞罰者人主所以教天下之術也賞當功則民知勸罰當罪則民知懲欲賞罰之當者惟在於君臣務誠意正心之學有成已及物之誠則仁以育之義以正之有交濟而無倒施君聖臣賢民良致中和而天地萬物位育矣皇祖之誥及此其任官化民之道豈有加於此哉國朝太祖諭中書省臣曰昔成周之世家有塾黨有庠故民無不知學是以教化行而風俗美今京師及郡縣皆有學而鄉社之民樂覩教化宜令有司更置社學延師儒以教民間子弟庶可導民善俗也臣若水通曰此聖祖諭中書省臣建社學之言也伏考我聖祖未即大位之先即建國學洪武二年詔天下立府州縣學八年又詔立社學何汲汲於學校之建邪蓋天下之治係於賢才而賢才之出在於學校也今之社學其即古之家塾也今之府州縣學其即古之黨庠也今之國學其即古之國學也是故無處無學無人無學所學皆所用所用皆所學然而天下不治者未之有也洪武十六年定生員三等高下凡通四書未通經者居正義崇志廣業堂一年半之上文理條暢者升修道誠心堂二年半之上經史兼通文理俱優者升率性堂升率性堂者方許積分積分之法孟月試本經義仲月試論及内科詔誥章表一季月試史䇿及判語二每試文理俱優與一分理優文劣者與半分文理紕繆者無分嵗内積至八分者為及格與出身不及分者仍坐堂肄業一如科舉之制臣若水通曰此聖祖建國學之制也可謂盡美盡善矣自下而上以漸而進教不躐等也是故其始也正其義崇其志廣其業其中也修其道誠其心其終也則能率其性矣學至於率性焉盡矣學至率性則德也業也混合而無間矣又試之以經義論策自本根而枝葉矣由是而擢之立朝長民由體而達之用矣太祖之立教其盡美盡善矣在教者修而復之耳洪武十七年六月太祖皇帝諭禮部臣曰近命製大成樂器將以頒天下學校俾諸生習之以祀孔子朕思古人之樂所以防民欲後世之樂所以縱民欲其故何也古樂之詩章和而正後世之歌詞淫以奢古之律吕恊天地自然之氣後世律吕出入為智巧之私天時與地氣不審人聲與樂聲不比故雖以古之詩章用古之器數亦乖戾而不合陵犯而不倫矣手擊之而不得於心口歌之而非出於志人與樂判然為二而欲以動天地感鬼神豈不難哉然其流已久救之甚難卿等宜究心於此庶幾可以復古人之意臣若水通曰致樂以治心者也古以平心今以助欲古以宣化今以長怨平心宣化者天理之公也公則和和則與天地之氣一矣氣之一則樂之詩章器數皆吾和順之所寓矣助欲長怨者人欲之私也私則乖乖則與天地之氣戾矣氣之相戾宜其詩章樂器不合不倫判而為二矣不復古禮不變今樂而欲致治者豈不難乎我皇祖體天地之和識大樂之本於大成樂器之制乃諭臣下以古今公私之不同人樂心聲之合一可謂得作樂之要矣洪武十八年八月癸丑太祖皇帝命大都督府官選武臣子弟入國子監讀書太祖諭之曰武臣從朕定天下以功世禄其子弟長於富貴又以父兄早殁鮮知學問宜令讀書知古今識道理俟有成立然後命官庶幾得其實用也昔霍光功非不高身死未久而子孫横肆卒致夷滅者不學故也郭子儀中興唐室功蓋天下位極人臣而心常謙退保全令名而福及後嗣者識道理也今武臣子弟但知習武事特患在不學爾臣若水通曰唐旗門羽林俱授以孝經則匪特勲舊子孫也而治止於唐何哉教之學之無其則徒為文具烏能毛毫益於國家我聖祖命選武臣子弟入國學則必先之以學問本之以道理戒之以横肆皆切問近思之學其過於唐逺矣至於所引霍光子儀之事則勲舊子孫又當謹誦以為戒勉者也洪武二十年七月丁酉禮部奏請如前代故事立武學用武舉仍祀太公建昭烈武成王廟上曰太公周之臣封諸侯若以王祀之則與周天子並矣加之非號必不享也至於立武學用武舉是析文武為二途天下無全才矣三代之上士之學者文武兼備故措之於用無所不宜豈謂文武異科各求專習者乎即以太公之鷹揚而授丹書仲山甫之賦政而式古訓召虎之經營而陳文德豈比於後世武學專誦韜畧不事經訓專習干戈不聞俎豆拘於一藝一偏之陋哉今又欲循舊用武舉立廟學甚無謂也太公之祀正宜從祀帝王廟遂命去王號罷其舊廟臣若水通曰古之學者出于一後之學者出于二二則支離之患興而道之所以不明不行也故夫才與德二非全人矣文與武二世無全材矣伏觀皇祖諭禮部武學武舉之論灼見支離之患而欲天下之學出于一也乎夫才本於德德發而為才則人道全矣由是以附衆飾治則文以戡亂威敵則武觀於太公山甫召虎之賢聖之文武具備則文之與武可二乎哉皇祖謂析文武為二途天下無全材雖先王復起不易斯言矣洪武二十八年十月禮制集要成先是上謂翰林學士劉三吾等曰朕自即位以來屢命儒臣歴考舊章上自朝廷下至臣庶冠婚喪祭之儀服舍器用之制各有差等著為條格俾知上下之分而奸臣胡惟庸等擅作威福謀為不軌僣用黄羅帳幔飾以金龍鳯文邇者逆賊藍玉越禮犯分床帳護膝皆飾金龍文又鑄金爵以為飲器家奴至於數百馬坊廊房悉用九五間數而蘇州府民顧常亦用金造酒器飾以珠玉寶石僣亂如此殺身亡家爾等宜加考定以官民服舍器用等編類成書申明禁制使各遵守敢有仍前僣用者必置之法成器之人如之至是書成其目十有三曰冠服房屋器皿􅏛蓋床帳弓矢鞍轡儀從奴婢俸禄奏啟本式署押體式服制頒布中外臣若水通曰禮之為物也聖人之所以飾人之情而閑其邪僻之具也其文物制度皆因民以為節而為大防而已是禮者理也必聖人在上心純乎天理故制為禮法而致臣民於治化之中也自禮之差等不明而先王之禮法教化蕩然矣是以人多輕玩以至僣亂踰越貴賤等混上下分乖莫有甚於此時也天生皇祖為天下禮樂綱常之主遂以治易亂復乎古而變乎今乃命儒臣歴考舊章上自朝廷下至臣庶冠婚喪祭之儀服舍器用之制各有差等著為成書使頒行遵守貴賤之等於是而嚴也上下之分於是而正也先王之禮教於是而復明也是故聖祖斟酌損益以扶植萬世常行之道但承平日久民心漸玩而僣踰之風或起如顧常之所為者尚不能無也伏願聖明體皇祖之心申明舊制防其漸而遏其流則治平之休垂於無疆矣洪武二十八年戊午詔國子生曰孔子作春秋明三綱叙九法為百王軌範修身立政備在其中未有舍是而能處大事決大疑者近諸生專治他經者衆至於春秋鮮有明之維今宜習讀以求聖人大經大法他日為政臨民庶乎有本臣若水通曰孟子云王者之迹熄而詩亡詩亡然後春秋作春秋天子之事也故正人心扶世道莫大乎春秋孔子之時三綱日隳九法盡斁春秋不得已而作也春秋作則褒貶定而勸懲彰三綱由是而明九法由是而叙苟能於此而明諸心焉則天理日著人欲日消僣亂日逺家以之而齊國以之而治天下以之而平實天下萬世之大經大法也誠如聖祖之所諭者伏願聖明體皇祖之心以明之於上使學校皆明之於下則上下恊一而久安長治之休端有在矣大明令國學生員一品至九品文武官子孫弟姪年一十二嵗以上者充補以一百名為額民間俊秀年一十五嵗以上能通四書大義願入國學者中書省聞奏入學以五十名為額臣若水通曰此見我聖祖法成周公卿大夫士之子與民間俊秀入太學之遺意也教人無間用人有方不以世族求不以寒門遺矣傳世既逺法久易玩他門一啟賢關混淆良法美意獨不可念哉故曰制而用之謂之法舉而行之存乎人此在聖明今日秉公正以立教化之本焉教民榜各處鄉村設立社學教訓子弟使為良善其有司里甲倚此作弊革去今後許令有德之人不拘多少每年十月初開學臘月終罷如丁多有暇常讀常教者聽其有司里老敢有干預攪擾者重法懲治臣若水通曰古者之教家有塾民之子弟八嵗而入後世無聞焉我朝社學之設其亦先王之意乎蓋得䝉以養正之義矣語曰少成若天性習慣成自然其於化民成俗之助豈淺淺也哉有司乃復違令而廢焉甚者因而作弊誠民賊也治之以法豈不宜哉伏惟聖明申明祖宗之制必講求古者小學之教灑掃應對進退之節事親敬長隆師親友之道禮樂射御書數之文而令小子服習之涵養其根本開發其聰明則作聖之功在是矣永樂四年三月太宗皇帝視學先是勅禮部臣曰朕惟孔子帝王之師帝王為生民之主孔子立生民之道三綱五常之理治天下之大經大法皆孔子明之以教萬世朕皇考太祖高皇帝膺君師億兆之任正中夏文明之統復衣冠禮樂之舊渡江之初首建學校親祀孔子御筵講書守帝王之心法繼聖賢之道學集其大成以臻至治朕承鴻業惟成憲是遵今當躬詣太學釋奠先師以稱崇儒重道之意其合行禮儀禮部詳議以聞臣若水通曰此我太宗文皇帝崇儒重道之盛心溢於言表矣其間曰守帝王之心法繼聖賢之道學此二言者實開一代心學之原也至哉此所以人材輩出輔成丕丕之基垂無疆之休也聖子神孫不可不以祖宗為法以求所謂道學心法之妙焉憲綱凡國家律令并續降條例事理有司官吏須要熟讀詳玩明曉其義監察御史按察司官所至之處令其講讀或有不能通曉者依律究治臣若水通曰刑法與禮相出入者也故律例與書相表裏者也蓋律令之頒即古者布法象魏之遺意乃治之具也有治民之責而不能舉其辭況能明允以適厥中哉然任刑莫如任德孔子曰道之以德齊之以禮有恥且格斯百王之律令也歟而所以道之齊之者必自聖明一心始焉爾格物通卷六十二
