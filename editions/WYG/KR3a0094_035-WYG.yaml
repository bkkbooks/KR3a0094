body:
  text: 格物通卷三十五明湛若水撰事親長下漢明帝永平十七年春正月上當謁原陵夜夢先帝太后如平生懽既寤悲不能寐即按厯明旦日吉遂率百官上陵其日降甘露於陵樹帝令百官采取以薦會臣若水通曰晝之所思夜之所夢顯宗當齋戒謁陵之時必有居處笑語之思故其形於夢寐者如此甘露之降謂非孝誠之感通而何哉顯宗由此念而擴充之老吾老以及人之老長吾長以及人之長天下可運於掌矣惜乎其不能也謹附此義以為明君仁孝治天下者告漢安帝建光元年初汝南薛包少有至行父娶後妻而憎包分出之包日夜號泣不能去至被敲扑不得已廬於舎外旦夕灑掃父怒又逐之乃廬於里門晨昏不廢積歲餘父母慙而還之臣若水通曰舜以䕫䕫之誠卒能感頑嚚之親而成底豫之化薛包積誠以感父母既逐復還亦可以見古今聖凡之同然也噫包之父之心即瞽瞍底豫之心瞽瞍之心即舜與包之心人病不求爾魏王祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數歲每見祥被楚撻輒涕泣抱持母母以非理使祥覽輒與祥俱往及長娶妻母虐使祥妻覽妻亦趨而共之母患之為之少止祥漸有時譽母深疾之宻使酖祥覽知之徑起取酒祥爭而不與母遽奪反之自後母賜祥饌覽輒先嘗母懼覽致斃遂止漢末遭亂祥隠居三十餘年不應州郡之命母終毁瘁杖而後起臣若水通曰祥茹繼母之毒而不顯其惡覽篤愛兄之誠而能全其生孝友之至根於天性真後世為人子為人弟之當法也傳曰宜兄宜弟而后可以教國人及祥攝州事而政化大行謂非得其本之明效哉宋明帝泰始七年八月丙午北魏髙祖即皇帝位大赦改元延興髙祖幼有至性前年顯祖病癰髙祖親吮及受禪悲泣不自勝顯祖問其故對曰代親之感内切於心臣若水通曰吮癰之事非出於哀痛廹切之情不能也魏髙祖為之其孝誠根於天性者耶及乎受禪之日悲泣不自勝夫以天下之大而不足以解憂其至孝發乎本心與大舜何以異惜乎不能擴充之以行堯舜之道通于神明光于四海也齊武帝永明八年九月甲戌北魏孝文帝謁陵王公固請公除詔曰比當别叙在心己夘又謁陵太尉王丕等進言曰陛下以至孝之性哀毁過禮伏聞所御三食不滿半溢晝夜不釋絰帶臣等叩心絶氣坐不安席願少抑至慕之情奉行先朝舊典帝曰哀毁常事豈足關言朝夕食粥粗可支任諸公何足憂怖帝因謂游明根高閭等曰聖人制卒哭之禮受服之變皆奪情以漸今則旬日之間言及即吉特成傷理對曰臣等伏尋金冊遺旨踰月而𦵏𦵏而即吉故於下𦵏之初奏練除之事帝曰朕惟中代所以不遂三年之喪蓋由世主初立君德未流故身衮冕行即位之禮朕誠不德在位過紀足令億兆知有君矣於此之時而使情禮俱失深可痛恨高閭曰杜預謂自古天子無有行三年之喪者以為漢文之制闇與古合是以臣等縷縷干請帝曰竊尋金冊之旨所以奪臣子之心令早即吉者慮廢絶政事故也朕今仰奉冊令俯順羣心不敢闇黙不言以荒庶政惟欲衰麻廢吉禮朔望盡哀誠而已如杜預之論蓋亦誣矣秘書丞李彪曰漢明德馬后保養章帝母子之道無間及后崩𦵏不淹旬尋已從吉然漢章不受譏明德不損名願陛下遵金冊遺令割哀從議帝曰朕所以眷戀衰絰不從所議者實情不能忍豈徒茍免嗤嫌而已哉高閭曰陛下既不除服於上臣等獨除服於下則為臣之道不足帝曰先后撫念羣下卿等哀慕猶不忍除奈何令朕獨忍之於至親乎李彪曰三年不改其父之道可謂大孝今不遵冊令恐渉改道之嫌帝曰改父之道殆與此殊羣臣又言古者𦵏而即吉不必終禮此乃二漢所以經綸治道魏晉所以綱理庶政也帝曰既𦵏即吉蓋季俗多亂權宜救世爾二漢之盛魏晉之興豈由簡畧喪禮遺忘仁孝哉平日公卿每稱當今四海晏然禮樂日新可以參美唐虞夏商及今即欲苦奪朕志使不踰於魏晉如此之意未解所由李彪曰今雖治化清晏然江南有未賓之呉漠北有不臣之冦是以臣等猶懷不虞之慮帝曰魯公帶絰從戎晉侯墨衰敗敵固聖賢所許如有不虞雖越紼無嫌而况衰麻乎豈可於晏安之辰豫念軍旅之事以廢喪紀哉遂號慟羣臣亦哭而辭出初太后忌帝英敏恐不利於已欲廢之盛寒閉於空室絶其食三日帝初無憾意乂有宦者譖帝於太后太后杖帝數十帝黙然受之不自申理及太后殂亦不復追問臣若水通曰三年之喪自天子達于庶人三代共之蓋人子於父母之心無貴賤一也漢文以日易月是無三年之愛於其父母矣後世遂為定制豈仁人孝子之心乎不意北朝之君乃有復古之志也雖然非復古也復其本心也一時羣臣累疏固請非惟不能將順其美且又飾辭引辯豈非陷君於不義乎亦可以見魏之諸臣無人心矣後之人君有志於孝理者尚其法諸齊孝昭帝性至孝太后不豫帝行不能正履容色貶悴衣不解帶殆將四旬太后疾小増即寢伏閣外食飲湯藥皆手親之友愛諸弟無君臣之隔臣若水通曰顔之推論孝昭天性至孝而不知忌諱良由不學可謂知言矣然不知之推之所謂學者何學耶孟子曰人之所不學而能者其良能也所不慮而知者其良知也孩提之童無不知愛其親者及其長也無不知敬其兄也親親仁也敬長義也無他達之天下也又曰凡有四端於我者知皆擴而充之矣若火之始然泉之始達茍能充之足以保四海茍不充之不足以事父母夫孝弟者人之真心也善端也所謂良知良能也在擴充之而已達者擴充之謂也充之則仁義不可勝用可放之四海而準矣孝昭天性之美茍能由此真心學問涵養而擴充之何堯舜之德業不可為乎惜乎其不能也人君有孝弟之資者盍求充養之道乎陳宣帝太建六年五月庚申周𦵏文宣皇后於永固陵周主跣行至陵所詔曰三年之喪達于天子但軍國務重湏自聽朝衰麻之節苫廬之禮率遵前典以申罔極百僚宜依遺令既𦵏而除公卿固請依權制帝不許卒申三年之制五服之内亦令依禮臣若水通曰文宣皇后叱奴氏周主武帝也夫父母之喪必三年古今共之不以天子降者貴不敵親也未有無父而貴者也後世以日易月任情加損罪莫大焉周主不從公卿之議而守古制天理民彛之不容已者也推之以及於五服之内悉令依禮可謂孝子錫類者矣傳曰上有好者下必有甚者矣人君之於孝道可不重歟唐太宗貞觀六年冬十月車駕還京師帝侍上皇宴於太安宫帝與皇后更獻飲膳及服御之物夜久乃罷帝親為上皇扶輿至殿門臣若水通曰禮稱文王朝王季而日三膳則視之武王之事文王遵而行之不敢有過焉唐太宗之侍宴獻膳庶幾乎孝矣獨不知能如文武之日三乎抑於車駕還京之日而暫然歟太宗之孝果出於天性則法文武之德業不難為者而不能然暫時之舉史乃一書之則太宗之孝亦疎矣哉貞觀八年十二月中書舎人髙季輔上言宻王元曉等皆陛下之弟比見帝子拜諸叔叔皆答拜紊亂昭穆宜訓之以禮書奏上善之臣若水通曰禮家無二主國無二王尊無二上皇子貴也叔父至親也親屈於帝可也屈於帝之子不可也貴施於人可也施於父之親不可也貴貴親親各有攸宜禮所生也皇子之拜叔父禮也答之非禮也禮也者天下之大防也决其防則勢驕而情惰其害有不可勝言者矣人君教太子以禮則知敬讓知敬讓則知謙抑盛德豈有加哉貞觀二十年十二月癸未太宗謂長孫無忌等曰今日吾生日世俗皆為樂在朕翻成傷感今君臨天下富有四海而承歡膝下永不可得此子路所以有負米之恨也詩云哀哀父母生我劬勞奈何以劬勞之日更為宴樂乎因泣數行下左右皆悲臣若水通曰太宗於生日念劬勞而罷宴樂哀思之誠發於辭氣至今讀者猶為之感愴若太宗者其天資近道者乎其後明皇於生日大陳宴饗創立名節得無愧於祖父也乎人君以仁孝理天下者當以太宗為法焉唐憲宗元和十五年六月太后居興慶宫每朔望上帥百官詣宫上壽臣若水通曰人子之事親無時而或忘雖朝見日三如文武者可也朔望詣宫則其餘不詣可知己曽是以為孝乎唐宣宗大中七年冬十二月上事鄭太后甚謹不居别宫朝夕奉養舅鄭光厯平盧河中節度使上與之論為政光應對鄙淺上不悦留為右羽林統軍使奉朝請太后數言其貧上輙厚賜金帛終不復任以民官臣若水通曰宣宗奉養太后無間朝夕然而不聽其舅之請寧厚賜金幣愛而不從其令以傷其明可謂盡事親之禮者矣後之人君愛敬其親者宜觀於此慎毋以從令為孝哉班固白虎通曰王者父事三老兄事五更者欲陳孝弟之德以示天下也臣若水通曰書云立愛惟親立敬惟長王者孝弟之至由中達外自家而國所以立愛敬於天下也父事三老所以教民孝也兄事五更所以教民弟也是故放諸四海而四海凖矣記曰上老老而民興孝上長長而民興弟仰惟聖明撫盈成之運當禮樂積德百年而興之期宜推躬行之大孝親脩養老之盛典為之割牲奉鼎拜老乞言以風天下曠世之幸莫大焉韓愈曰所謂事親以誠者盡其心不誇於外先乎其質後乎其文者也盡其心不誇於外者不以已之得於外者為父母榮也名與位之謂也先乎其質者行也後乎其文者飲食甘旨以其外物供養之道也誠者不欺之名也待於外而後為養薄於質而厚於文斯不類於欺歟臣若水通曰人子事親誠與欺内與外而已孝愛之心由内則盡心盡心則崇質斯誠而已矣孝愛之名由外則誇矜誇矜則務文斯欺而已矣故名位榮耀飲食供養而無愛敬之實是之謂欺也立身行道體受全歸而無務外之心是之謂誠也夫人子之於親不以誠而以欺豈其良知良能之本心端使然哉其習化之而不自知也故夫世之能孝其親者寡矣盡其心篤其質無忝所生而致名位供養之文所謂立身顯揚而内外情文兼備是之謂大孝愈之為此言善矣然亦未聞其脩身體道之學猶未免三上宰相之書辱親已甚矣尚得為孝乎宋髙宗皇帝事太后韋氏甚謹先意承志惟恐不及或一食稍減輙不勝憂懼常戒宫人曰太后年巳高惟優游無事起居適意即壽考康寧事有所關慎勿令知第來白朕臣若水通曰宋高宗之事韋太后可謂盡孝蓋與文王之事王季武王之事文王無異矣而不得與文武同聖者何耶蓋孝弟之心乃真心也乃孟子所謂良知良能也其真心與文武同而不得稱聖者文武能達之天下而為仁義擴充之以保四海而髙宗則自一念真心之發亦自一念而止不能充之以保四海故不得為仁義之主爾後之人君因一念孝心之萌擴充而達之則放之四海而凖堯舜之道亦不過是而已矣宋孝宗淳熈十四年太上皇崩帝號慟擗踊踰三日不進膳謂王淮等曰晉孝武魏孝文實行三年喪服何妨聽政司馬光通鑑所載甚詳淮對曰晉武雖有此意後來在宫中止用深衣練冠帝曰當時羣臣不能將順其美光所以譏之自我作古何害於是詔曰大行太上皇帝奄棄至養朕當衰服三年羣臣自遵易月之令百官五上表請帝還内聽政不許至十二月辛丑禫祭百官釋服復三上表請御殿聽政不許臣若水通曰記云三年之喪達乎天子父母之喪無貴賤一也蓋天下無無父母而貴者人子之心一也故髙宗諒陰三年亦盡其心勿之有悔焉爾孝宗能舉而行之豈非超出百王豪傑之主乎使其能由此念而擴充之則恢復之圖如反掌爾惜乎其不能不足以保四海人君之大孝其難矣哉宋光宗紹熈三年十一月丙戌日南至丞相畱正率百官詣重華宫稱慶兵部尚書羅㸃給事中尤袤中書舎人黃裳御史黃度尚書左選郎官葉適等上疏請帝朝重華宫不從吏部尚書趙汝愚入對往復規諫帝意乃悟汝愚又屬嗣秀王伯圭調䕶於是兩宫之情始通辛夘帝朝重華宫皇后繼至從容竟日而還都人大悦臣若水通曰光宗與孝宗之事蓋與鄭莊公之於其母先惑而後悟同一機也夫天理之在人心未嘗冺滅物欲蔽之爾莊公因潁考叔之言而悟光宗聞趙汝愚之諫而感俱為父子如初若是者非考叔汝愚能附益之也父子之愛天性也二臣但能發其蔽之者爾及光宗始朝而都人大悦又可見天理之感人心蓋有同然者也然則人君欲感天下之人心者可以知本矣吕希哲曰孝子事親湏事事躬親不可委之使令也嘗觀穀梁言天子親耕以供粢盛皇后親蠶以供祭服國非無良農工女也以為人之所盡事其祖禰不若以已所自親者也此説最盡事親之道臣若水通曰古之聖賢竭力耕田負米養親者豈有他哉盡其心焉爾記曰祭繼養也故天子親耕皇后親蠶無非所以求盡其心而致誠敬於繼養而已也苟委之使令而吾心有弗盡焉如弗祭矣善事其親者固如是乎噫孝親之心自天子至於庶人一也為人君者其亦思之哉吕希哲曰為人子者視於無形聽於無聲未嘗頃刻離親也事親如天頃刻離親則有時而違天天不可得而違也臣若水通曰父母一天地也人在天地之氣一也子通父母之氣亦一也故孝子之事親如事天頃刻而離天是違天也頃刻而忘親是違親也違天不仁也違親不孝也是故惟仁人為能事天惟孝子為能事親矣噫非得聖學之深者不可以語此國朝呉元年四月令懿文太子及諸王往鳳陽祭皇陵臨遣惻然命之曰吾祖宗去世既遠吾父母又相繼早亡每念劬勞鞠育之恩惟有感痛而已今日雖尊為天子富有四海欲致敬盡孝為一日之奉不可得矣哀慕之情昊天罔極今鳳陽陵寢所在特命爾等躬詣致祭以代朕行孔子曰事死如事生事亡如事存爾等敬之因悲咽不自勝太子諸王皆感泣臣若水通曰記云事父孝故事天明事母孝故事地察我太祖皇帝哀慕泣下可謂孝矣此其所以事天地而明察以受眷命乎聖子神孫盍以太祖為法以永無疆之大命哉洪武八年正月淮安府山陽縣民有父得罪當杖請以身代者太祖皇帝謂刑部臣曰父子之親天性也然不親不遜之徒親遭患難有坐視而不顧者今此人以身代父出於至情朕為孝子屈法以勸勵天下其釋之臣若水通曰得罪當刑所以懲也以代親見宥所以勸也古有不孝之刑然則以孝而貸之刑一懲一勸無非教也我聖祖以孝治天下屈一時之法所以伸萬世之綱常也使天下之民皆化而為孝則刑措不用矣此其化行俗美而開萬世之太平乎聖子神孫世世所宜法也洪武十三年韓國公李善長等表請今年天壽聖節受百官朝賀詔不許明日又請上手詔答之曰父母劬勞之恩昊天罔極生辰之日有痛心而已朕於是日所以清晨奉祀靜居終日者念劬勞莫報爾比者卿等數以天下太平朕復年高固請稱賀今不違羣情尚從中制惟禮當而已臣若水通曰先正謂人無父母生日當益悲愴不可因而受賀具宴飲此大孝終身慕親之心也皇祖於萬壽聖節不許百官請賀其孝子慕親之誠乎而羣臣固請朝賀者其人臣尊君之義乎於斯二者將何以處之哉故清晨奉祀所以致哀親之孝也後從稱賀所以致體下之仁也可謂仁孝兩得之矣此皇祖所謂尚從中制而為萬世之法守者乎大明令凡官員祖父母年及七十果無以次人丁自願離職侍養者聽親終服滿方許求叙諸司職掌凡官員父母年七十之上許令移親就禄侍養如果父母老疾去官路遠户内别無以次人丁者方許親身赴京面奏掲籍定奪及吏員人等父母年老别無人丁者務要經由本部移文體勘是實明白奏准方令離役俱候親終服滿起復赴部聽用臣若水通曰帝王以孝治天下人各親其親長其長而天下平矣我聖祖制為法令使臣下各得遂其親親之願孟子曰老吾老以及人之老又曰親親仁也敬長義也無他達之天下也蓋囿天下於孝弟之化此聖祖之盛心乎以此而教後世猶有親老而不恤者永樂十一年仁宗皇帝為太子監國南京七月千秋節禮部請行慶賀禮諭之曰車駕在北京予不得君父前躬致禮乃可受羣臣禮耶其止之自是千秋節遇車駕廵狩並免禮臣若水通曰孝子一舉足而不敢㤀乎親以下原本闕格物通卷三十五
