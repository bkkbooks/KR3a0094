body:
  text: 格物通卷五十五明湛若水撰正萬民上易履象曰上天下澤履君子以辨上下定民志臣若水通曰此履卦大象之詞也乾為天兌為澤履卦上乾而下兌故天在上澤居下上下尊卑理之正也所謂履也人之所履莫大乎禮故為履君子觀此象以辨别上下之分以定其民志孔子曰道之以徳齊之以禮禮者所以一民志於徳者也蓋民之心志同得此理然情蕩而性鑿故有不定若上下之禮旣辨則禮有以制其心而人心之本體以復無將迎而動靜皆定矣故正萬民之道莫大於禮有君民之任者所當深念焉蠱象曰山下有風蠱君子以振民育徳臣若水通曰此蠱卦大象之詞艮為山巽為風蠱上艮下巽故為山下有風之象山下有風山之木以風而摧故其象為蠱也君子體蠱之象而治天下之蠱者當振民以育其徳也蓋徳者人所同得之理也人惟不知修徳而風俗弊壞此蠱之極也治蠱之道無他鼓舞作興使人皆察識其徳性之眞而復其本然者而已耳天下皆知修徳風俗美而至治臻矣蠱之元亨其以此歟噬嗑象曰雷電噬嗑先王以明罰勑法臣若水通曰此噬嗑卦大象之詞也嗑者合也噬者囓也上初皆剛爻中三柔爻其間又有九四一剛爻梗於其中必噬囓之然後可合故為噬嗑欲噬嗑之者必在於刑法以去其梗化之人然非明威則無以用其刑法也雷取其威電取其明雷者震也電者離也上離明下震威而後可以用刑法而噬嗑矣夫法者垂世立教之典也明罰以勑之者懼其法之易墮也蓋法不立則任情以遂其私罰不明則玩法而不知守故約之以法而歸於道懲之以罰而振其法使人皆知循法而行則罰不必用也罰也者待夫犯法者之奸惡也民無有犯則正矣先王正民之道豈有加於此哉繫辭子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校㓕趾旡咎此之謂也臣若水通曰威謂刑罰也校木械也趾足也屨校㓕趾者以木械屨之於趾而傷其趾也仁義人之本心也不仁不義其可恥而畏甚矣小人無惻隱羞惡之心故不恥不畏則無所用恥無復可畏矣然趨利避害小人本心之明也故茍為仁義而利焉則勸矣茍為不仁義而威焉則懲矣上之於民豈能盡以利導之哉必初九為用刑之始加於民者故屨之以校而㓕其趾薄刑於下將以禁於為惡之初是小有所懲使民大有所畏而不為不善則有處仁遷義之機矣其為福孰大於是傳曰君子以義正萬民其刑法之謂乎書商書盤庚永敬大恤無胥絶逺汝分猷念以相從各設中於乃心臣若水通曰此盤庚告庻民之言也恤憂也絶逺不相聯屬也猷圖也相從相與也設立也言汝當永敬我之所大憂念者無相絶逺而上下之心志不相聮屬然後可也汝當分君之所圖而共圖之分君之所念而共念之然必各存中正之心而後可以分猷念以相從不然則心不中正各執己見之偏安能從人乎周書洪範皇建其有極歛時五福用敷錫厥庶民惟時厥庶民於汝極錫汝保極臣若水通曰此洪範皇極之疇也皇君也建立也極者至極之義無過不及之名即天理是也言人君當體天理之純盡人倫之至語父子則極其親而天下之為父子者於此取則焉語夫婦則極其别而天下之為夫婦者於此取則焉語兄弟則極其愛而天下之為兄弟者於此取則焉則極建矣然此極乃人之福詩所謂自求多福也人君集之於身則為已福用敷極於民則為錫民以福當時之民亦皆觀感而化於親義序别信之理與君保守其極而不敢失墜也夫皇極君民所以相與者如此無非一心之感應爾仰惟皇上居皇極之位當日臻聖學以純其心以盡天理人倫之至極立而天下化之所謂君正莫不正矣君陳有弗若于汝政弗化于汝訓辟以止辟乃辟臣若水通曰此成王命君陳治洛之言也若順也政者紀綱法度訓者命令教誡言殷民有不順汝之政不化汝之訓刑之可也然刑期無刑刑必當刑乃可以為戒所謂刑一人而千萬人懼也必如此而刑則可以止刑矣然後可以刑之也夫情偽微曖天下至難辨者莫刑獄若也非秉至公至明之心者其孰能與於此畢命道有升降政由俗革不臧厥臧民罔攸勸臣若水通曰此康王命畢公保釐東郊之言也有升降猶言有隆有汚也世道有隆汚人事氣運之變遷也政由俗革因世道之隆汚而為吾紀綱法度之施也如周公之時殷民方洶洶不靖不得不尚嚴以謹毖之至君陳時民漸式化不得不用寛和是也畢公之時已非周公君陳之時蓋殷民有化而為善者矣善之可也不善厥善民將何所勸乎夫有善不賞有惡不罰雖堯舜不能以治天下豈惟殷民然哉人君欲正天下之民者必致愼乎賞罰之際可焉詩國風鳲鳩鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國臣若水通曰此詩美君子之用心均平專一而儀足以正四國也言鳲鳩之在桑其子則在棘矣善人君子其儀則不忒而可以正四國矣蓋人君者四國之所取正者也故欲正四國之民者在不忒其儀也大學引此詩而言曰其為父子兄弟足法而後民法之也人君欲正萬民在先正其倫理父父子子兄兄弟弟而儀法立焉所謂其儀不忒矣由是四國之民得於觀感而興起者莫不一出於正而罔有邪慝之風焉故君子正己而物正書曰表正萬邦孟子曰其身正而天下歸之皆此意也後之為人上者徒欲正民不先正己而人倫之間慚徳多矣顧乃欲以聲音笑貌矯民於正是謂所藏乎身不恕而能喻諸人者未之有也故曰欲正萬民在正儀表欲正儀表在正一心以為正天下之大本焉春秋莊公二十有二年春王正月肆大𤯝臣若水通曰書肆大𤯝譏失刑也肆者縱也大眚者大罪也夫刑罰之設所以禁奸懲惡使人易避而難犯也書曰眚災肆赦蓋謂過誤者爾若大罪皆肆則廢天討虧國典縱有刑虐無辜惡人幸以免矣吕刑有五刑五罰之赦以其有疑也大眚果有疑乎周官有三宥三赦之法以其有故也大𤯝果有故乎無疑無故肆為輕貸之典則惡不懲而善不勸將何以正民乎禮記王制曰命太師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟臣若水通曰詩之所咏民風寓焉中正則其風美矣淫蕩則其俗惡矣故以是觀民風也物賈之貴賤係民之好惡好質則用物貴矣好侈則玩物貴矣故以是觀民情也以二者而觀之志淫蕩則其好必辟矣是故觀詩觀賈而其俗可知也知其俗而其教可立也王制曰命典禮考時月定日同律禮樂制度衣服正之臣若水通曰此先王巡狩之典所以大一統於天下者也時謂春夏秋冬四時月謂月之大小日謂日之甲乙律謂十二律黄鍾太簇姑洗㽔賔夷則無射仲吕林鍾太吕夾鍾南吕應鍾是也禮者五禮樂者六樂制度者權衡丈尺之類衣服者上衣下裳之制也蓋禮制不定則風俗不同風俗不同則道徳不一而民志且不定矣今之天下一統而民風土俗或有因地而異者矣觀風之臣所以代天子巡狩布王化而一之也其亦有能以耳目之見聞而達之宸聦者乎内則曰后王命冢宰降徳於衆兆民臣若水通曰書曰惟皇上帝降𠂻於下民徳也者固兆民之所自有也而曰后王命冢宰以降之何也蓋百姓日用而不知其裁成輔相固有待夫君相之教矣是上帝之降𠂻降於有生之始也后宰之降徳降於有生之後也君相也上帝也固民性之所以正也坊記子曰小人貧斯約富斯驕約斯盗驕斯亂禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡臣若水通曰禮者分而已矣夫富貴貧賤匪分以定之大亂之道也是故聖王為之井田以養其生為之服采以章其等為之黨序庠校以養其徳夫然故富焉而有制貧焉而有資分定而弗約弗驕弗盗以亂也夏商周運祚靈長者豈不由於此哉嗚呼自井田一壞而亂源始啓矣故富者田連阡陌貧者無立錐之地其不驕而亂則約而盗爾烏望其民徳之正哉坊記曰子言之君子之道辟則坊與坊民之所不足者也大為之坊民猶踰之故君子禮以坊德刑以坊淫命以坊欲臣若水通曰聖王之坊民也至矣故化之不足則以禮坊之所以制其心也禮之不足則以法坊之所以禁其奸也法之不足則以命坊之所以安其義也是故三坊立而民俗正矣周禮天官正月之吉始和布治於邦國都鄙乃縣治象之法於象魏使萬民觀治象浹日而歛之臣若水通曰此周禮天官之職也周以建子為正正月則子月也子月一陽生於地中氣始溫和嵗功將興而王法之所當行矣於是頒布六典以下之事於天下然布之以言不若示之以象尤為著明易曉也故又以治法畫之為象懸於雉門之兩觀以示夫民必至一旬乃已吁此民之所以易於治也旣頒之以典則而又示之於象魏則民徳其有不正民俗其有不正乎地官州長各掌其州教治政令之法正月之吉各屬其州之民而讀法以考其徳行道藝而勸之以糾其過惡而戒之若以嵗時祭祀州社則屬其民而讀法亦如之春秋以禮㑹民而射於州序臣若水通曰州長所掌教治政令之法即所謂三物八刑之屬也讀法讀此而已夫一州必有才徳兼備之士即所謂徳行道藝者也因有以考而勸之所以作興之也一州未必無不率教化之人即所謂過惡者也因有以糾而戒之以禁厲其餘以至春祈秋報嵗時之祭祀則以此時不惟令之以讀法又令之以習射使其容體比於禮節奏比於樂以養其正而禁其邪也先王正萬民之道可謂至矣備矣夏官訓方氏掌道四方之政事與其上下之志誦四方之傳道正嵗則布而訓四方而觀新物臣若水通曰此夏官之政也訓方氏夏官之屬掌訓正萬民者也道四方之政事者道其善政於民也上下之志君臣之善念也四方之傳道傳説往古之善事者也一嵗之始布為教言旣訓以所道又訓以所誦則四方之民所聞無非正言所見無非正道矣又於新物之出陳而觀之以察其民之好惡即王制之命市納賈以觀民之好惡志淫好辟者也夫然則所以正民情正民志正民風俗之道莫備於是矣為人君者可以不法乎周禮大司徒令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓臣若水通曰使之者何各立其長而教令使之也相保者保其不為非也相受者宅舍容其寄託也相葬者助益喪禮也相救者救恤凶禍也相賙者給足其禮物也相賓者賓興其賢者也自比至鄉其人漸多故其責漸大各從其重者言之以互見爾其實比閭族黨州鄉每處數者兼備非謂比則保而不受閭則受而不保也是故比閭族黨州鄉之法行而萬民各得其正矣論語子曰道之以徳齊之以禮有恥且格臣若水通曰孔子此章之言欲為治者知化民之本不可徒恃其末也齊一也格至也蓋徳與禮乃所謂本徳禮皆天理也自其得於心而言則謂之徳自其見於事理而言則謂之禮人心同有此理特蔽於欲溺於習而為不善爾為人上者能以人治人徳以正其心禮以正其行因其所同然者而感觸之良心未有不勃然而興起者感化之效至於恥其不善而且有以至於善去不善以至於善則民皆歸於正矣孟子曰君子反經而已矣經正則庻民興庻民興斯無邪慝矣臣若水通曰孟子此章言正民之道在於自正其道也君子不求於邪道之息而求於正道之興爾經常也君子但明乎君臣之義父子之親夫婦之别長㓜之序朋友之信五者之常道使之復大明於世則庶民同此心同此理者皆勃然興起其同然者矣如此則邪僻不善之説自不能容夫邪正之不容並立者也世衰道微邪説並起以為吾道害要之大經之不正故也歐陽脩云使王政明而禮義充雖有佛無所施於吾民矣意亦如此如今之世異端末學足以妨道者豈少哉司世道者尚求端本澄源之道焉國語周語祭公謀父曰先王之於民也茂正其徳而厚其性阜其財求而利其器用明利害之鄉以文脩之使務利而避害懐徳而畏威故能保世以滋大臣若水通曰茂勉也阜大也大其財求不障壅也鄉方也示之以好惡鄉方也文禮法也保守也滋益也書曰正徳利用厚生惟和謀父之言蓋本諸此乎夫民衣食不足則禮義不興故利用阜財所以厚生而正其徳也夫然後民知務利而避害懐徳而畏威也為萬民之主者可不求諸魯語曹劌曰夫禮所以正民也是故先王制諸侯使五年四王一相朝也終則講於㑹以正班爵之義帥長㓜之序訓上下之則制財用之節其間無由荒怠臣若水通曰王謂來王事天子也嵗聘以脩業間朝以謀禮五年之間四聘於王國將朝天子先相朝也終畢也謂朝畢則習禮於㑹以正爵次序尊卑之義其間朝㑹之間也夫先王之治天下也必立禮以正之羣牧師長講㑹以訓帥之所以正民也是故朝㑹之典各有常期故天子郊則諸侯㑹焉諸侯祀則卿大夫佐焉講㑹以正班爵訓道以制財用故怠荒之心無自而生也為國以禮豈虚語哉魯語公父文伯之母曰昔聖人之處民也擇瘠土而處之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材淫也瘠土之民莫不嚮義勞也臣若水通曰墝确為瘠瘠土利薄又勞而用之使不淫逸不淫逸則向義故長王天下也沃肥美也不材器能者少也善心生故向義也夫善惡之幾思與忘而已矣故天之欲成是人也使之動心忍性増益其所不能思而已爾故能嚮義而知方焉公父文伯之母斯言誠萬世治民之良法也君天下者其可不求諸晉語管敬仲曰畏威如疾民之上也從懐如流民之下也見懐思威民之中也畏威如疾乃能威民威在民上弗畏有刑從懐如流去威逺矣故謂之下其在辟也吾從中也臣若水通曰敬仲夷吾字疾病也懐心也從心所思如水流行民之下行也見懐思威者見可懐則思可畏民之中行也能畏上乃能威下能威民故在人上也弗畏有刑者不畏威則有刑罪也去威逺言徒知可懐而不知思威故相去之逺為下也辟罪也弗畏有刑故曰罪也高不在上下欲避罪故曰從中也夫聖人之治萬民也仁以育之義以正之故徳以化之其仁乎刑以威之其義乎是故使民畏其刑而慕其徳禁其欲心而動其畏敬民不縱欲則不溺於懐民知敬義則必知畏矣管敬仲謂民之上者必畏威民之下者必從懐至於其中則見懐思威也君子之居民上可不觀民以自考耶晉語范文子曰吾聞君人者刑其民成而後振武於外是以内和而外威臣若水通曰刑其民謂以刑正其民成平也天地生萬物而成之以秋聖人正萬民而治之以刑故武也者刑之大者也茍内治不平豈能振武於外故聖人必明刑弼教於其國然後國無不和外無不威而武斯振矣治天下者當以正民為先齊語管子曰昔聖王之處士也使就閒燕處工就官府處商就市井處農就田野令夫士羣萃而州處閒燕則父與父言義子與子言孝其事君者言敬其㓜者言悌少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故士之子恒為士令夫工羣萃而州處審其四時辨其功苦權節其用論比協材以旦莫從事施於四方以飭其子弟相語以事相示以巧相陳以功少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故工之子恒為工令夫商羣萃而州處察其四時而監其鄉之資以知其市之賈負任擔何服牛軺馬以周四方以其所有易其所無市賤鬻貴旦莫從事於此以飭其子弟相語以利相示以賴相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子恒為商令夫農羣萃而州處察其四時權節其用耒耜耞芟及寒擊菒除田以待時耕及耕深耕而疾耰之以待時雨時雨旣至挾其槍刈耨鎛以旦莫從事於田野脱衣就功首戴茅蒲身衣襏襫霑體塗足暴其髮膚盡其四支之敏以從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故農之子恒為農野處而不暱其秀民之能為士者必足賴也臣若水通曰萃集州聚也物事也權平也賴贏也槍樁也芟大鎌也所以芟草也監視也資財也視其貴賤有無也背曰負肩曰擔荷掲也襏襫蓑薜衣也茅或作萌萌竹萌之皮所以為笠也暱近也夫先王之處民也士農工商各有其地所以專其業也地壹則事專事專則業專業專則志定矣民志定則天下治矣齊桓師管子之言猶足以成覇圖况明君聖主本之以誠而化之以道者乎格物通卷五十五
