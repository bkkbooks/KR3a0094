body:
  text: 格物通卷七十五明湛若水撰六官書周官冢宰掌邦治統百官均四海臣若水通曰此成王訓廸百官之言也冢猶長也宰治也天官卿治官之長故謂之冢宰以其所主用人任職以平治天下故云統百官均四海何謂統百官異職用各因其才聫屬以歸於一也何謂均四海異宜使各得其所調劑以得其平也周官司徒掌邦教敷五典擾兆民臣若水通曰此亦成王訓廸百官之言也敷布也擾馴也地官卿主國教化之事布君臣父子夫婦長㓜朋友五者之教又馴擾兆民使之各遂安養也先王之世教養出於一司徒實兼教養之事後世遂以司徒為專主錢榖之官教養遂分而為二非復先王之舊矣周官宗伯掌邦禮治神人和上下臣若水通曰此亦成王訓廸百官之言也宗者以為祭祀所宗而得名伯言其為官之長也春官卿主國禮儀之事治天神地祇人鬼之事和上下尊卑等列如何為天神如祭天享帝及日月星辰寒暑四時水旱皆是如何為地祇如祭地於方丘及名山大川五岳四瀆之類皆是如何謂人鬼如宗廟祖考及古昔帝王先聖先師忠臣烈士之類皆是周官司馬掌邦政統六師平邦國臣若水通曰此亦成王訓廸百官之言也掌主也六師天子之六軍也兵之用所以正人之不正乃政之大者馬乃軍政之急務故以馬名官夏官卿主戎馬之事掌國征伐之政統御六卿之六軍平治諸侯邦國之不庭者使强不得凌弱衆不得暴寡而人得其平也周官司冦掌邦禁詰姦慝刑暴亂臣若水通曰此亦成王訓廸百官之言也謂之禁者刑一人而千萬人懼所以禁之於未然也詰者推鞫窮詢之謂秋官卿主冦賊法禁窮治姦慝以求其情誅刑暴亂之人使各當其罪也周官司空掌邦土居四民時地利臣若水通曰此亦成王訓廸百官之言也謂之司空者主國空土之事也冬官卿主國之土地以居士農工商之四民順天時以興地利也禮記曲禮曰天子建天官先六大曰大宰大宗大史大祝大士大卜典司六典天子之五官曰司徒司馬司空司士司冦典司五衆臣若水通曰此即周官之綱而周官即其目也蓋明王奉若天道謂天下不可以一人理於是而建乎天官大宰者天官之宰大宗者主六宗之事大史主天文之事大祝主祭祀祈禱大士治士者大卜主三兆三易者六大者即天官之屬也先之者以其所掌重於他職也五官者與天官列而為六也五衆者五官屬吏之群衆也我國家稽古定制建官立法一本於此故今之六部即此之謂也而部之有司司之有郎中有貟外郎有主事多寡輕重斟酌損益則又有所謂監百王而成之者矣雖然明王立政不惟其官惟其人蓋得人則庻政惟和萬國咸寧非其人適為國家之蠧焉爾是不可以不謹也程頥有言必有闗雎麟趾之意然後可以行周官之法度則本原之地實有在於聖明者矣周禮少宰以官府之六屬舉邦治一曰天官其屬六十掌邦治大事則從其長小事則專逹二曰地官其屬六十掌邦教大事則從其長小事則專逹三曰春官其屬六十掌邦禮大事則從其長小事則專逹四曰夏官其屬六十掌邦政大事則從其長小事則專逹五曰秋官其屬六十掌邦刑大事則從其長小事則專逹六曰冬官其屬六十掌邦事大事則從其長小事則專逹以官府之六職辨邦治一曰治職以平邦國以均萬民以莭財用二曰教職以安邦國以寧萬民以懷賔客三曰禮職以和邦國以諧萬民以事鬼神四曰政職以服邦國以正萬民以聚百物五曰刑職以詰邦國以紏萬民以除盗賊六曰事職以富邦國以養萬民以生百物臣若水通曰大事從其長者如庖人内外饔共王之食也小事専逹者如宫人掌舎各為一官也官府之六職即太宰之六典也治職以莭財用者分辨財用㑹計也教職以懷賔客者賔興賢能也以事鬼神者掌天神人鬼地祇之祀也以聚百物者掌九穀六畜也以除盗賊者比追胥施刑賞也以生百物者居四民時地利也夫六官各六十屬為三百六十者所以象周天之度也王者奉若天道以立六官所以法之於天也是故大小相維巨細畢舉而邦治辨矣人君之立官宜奉天地而不違勿或過焉勿或不及焉則天道運於上地道位於下人極立於中而三才一矣天官惟王建國辨方正位體國經野設官分職以為民極乃立天官冢宰使帥其屬而掌邦治以佐王均邦國臣若水通曰此周禮天官之職也王者有天下之號建立也辨别也辨方者别東西南北之方也正位者正祖社朝市之位也體國者分營其國中以為宫城門涂如人之有四體也經野者畫治於野外以為丘甸溝洫如織之有經緯也官如冢宰司徒之類職如掌治掌教之類為民極者言王先盡此六官之事以為民之標凖也冢大也宰治也其屬則天官之屬邦治總六官之職佐助也均平也乃立天官冢宰使帥其屬以佐天子而均平天下先曰為民極者何也凡設官分職以為民也况冢宰六卿之長生民休戚所闗朝廷政本所係得其人則輔導其主而善政日加於下如周召是也匪其人則壅蔽其主而虐政日加於下如唐之李林甫盧杞是也觀此則人君為天下擇相可不慎歟地官惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國臣若水通曰此周禮地官之職也掌教者故謂之地官徒者衆也安擾為教之道也立地官掌教者將以盡民之性必敦典庸禮使各順其常是之謂安仁漸義摩使自得於性是之謂擾故書曰司徒掌邦教敷五典擾兆民孟子曰舜命契為司徒教以人倫前後若出一揆此帝王所以同道歟春官惟王建國辨方正位體國經野設官分職以為民極乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國臣若水通曰此周禮春官之職也春官者象春所立之官宗伯者以祭祀之宗主而名也不言司者神􅄦非人所司也邦禮國家之典禮也其經有五其别三十有六以和邦國者即孔子所謂禮之用和為貴是也禮逹而分定禮行而俗淳九族以之而惇叙萬邦以之而恊和皆本於此宋儒司馬光曰禮之為用大矣信哉夏官惟王建國辨方正位體國經野設官分職以為民極乃立夏官司馬帥其屬而掌邦政以佐王平邦國臣若水通曰此周禮夏官之職也司馬為國典兵者也官以馬名兵之所資莫急於馬也國之大事在戎故獨謂之政政者用兵征伐以正彼之不正也其曰平邦國者王者之師無他在於禁暴正亂而已使强不得以凌弱衆不得以侵寡而人皆得其平書曰有罪無罪惟我在曷敢有越厥志此之謂也其視後世窮兵黷武甚至以中官典兵而辱天朝者何哉秋官惟王建國辨方正位體國經野設官分職以為民極乃立秋官司冦使帥其屬而掌邦禁以佐王刑邦國臣若水通曰此周禮秋官之職也秋官獨以冦名者何也天下之亂未有不始於群行攻刼者而刑以懲冦為急故曰司冦防奸之謂禁懲惡之謂刑嘗謂成周之盛宜無事於刑矣而周禮於司冦一官獨拳拳焉易曰先王以明罰敕法孔子曰道之以政齊之以刑刑者輔治之具豈可無哉故制為律令禁之於未然所謂禁也加於有罪刑之於己然所謂刑也嗚呼聖人仁之至義之盡於斯見矣冬官惟王建國辨方正位體國經野設官分職以為民極乃立冬官司空使帥其屬而掌邦土以佐王安擾邦國臣若水通曰此周禮冬官之職也司空者掌土之官舜命伯禹作司空任平水土之責則知掌邦土乃司空之職也凡所以興地利奠民居制封域别丘甸治溝洫設壇壝築城郭令力役作器物皆其職也至秦焚書簡編斷爛而漢得於煨燼之餘遂謂冬官亡矣而以考工記補之蓋不知工作特司空之一事爾幸而先儒互相叅究而冬官不亡所以因其富庶而行其教則其佐王以安擾邦國可見矣左傳成公十八年晉悼公即位於朝始命百官施舎己責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦歛宥罪戾節器用時用民欲無犯時使魏相士魴魏頡趙武為卿荀家荀㑹欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟使士渥濁為太傅使修范武子之法右行辛為司空使修士蔿之法弁紏御戎校正屬焉使訓諸御知義校正主馬之官屬於戎御以訓諸御使知義也荀賔為右司士屬焉使訓勇力之士時使右者御戎之右也司士亦車右之官屬於戎右以訓勇力之士以供君之時使而不逆也卿無共御立軍尉以攝之祁奚為中軍尉羊舌職佐之魏絳為司馬張老為候奄言職佐奚為中軍尉而以絳為之司馬張老為之斥堠也鐸遏冦為上軍尉籍偃為之司馬使訓卒乘親以聽命言偃為鐸遏冦上軍尉之司馬以訓卒乘親以聽命程鄭為乘馬御六騶屬焉使訓羣騶知禮言六閑之騶皆屬於程鄭訓羣騶使知禮也凡六官之長皆民譽也言為民之望譽也舉不失職官不失方爵不踰徳師不陵正旅不偪師民無謗言所以復覇也臣若水通曰施舎者施㤙恵舎勞役也己責者已止逋責之事也逮鰥寡振廢滯恵及窮民振起困滯也匡乏困救災患謂匡其貧困恤其患難也禁淫慝薄賦歛謂禁止淫邪薄其租税也宥罪戾莭器用罪從寛宥用從省節也時用民欲無犯者使民以時不縱欲以奪之也魏相士魴魏頡趙武四人祖父皆有勞於國故使為卿即冢宰之職也荀蒙荀㑹欒書之子黶韓厥之子無忌四人為公族大夫訓子弟即司徒主教之職也士渥濁為大傅脩士㑹執秩之法即秩宗禮官也以右行名辛者能以數宣物定功故為司空也知弁紏能御以和正使為戎御知荀賔有力而不暴故為右戎又以祁奚鐸遏冦為中上軍尉以程鄭為乗馬御而司馬六騶皆其佐即夏官兼司冦也夫周制大國三卿晉以成公三年作六軍故有六卿六卿者六官之長晉悼公即位之始而如此君子是以知其克復覇業也人君之有天下者能因其迹而次第舉之亦主善為師之意也襄公十五年楚公子午為令尹公子罷戎為右尹蒍子馮為大司馬公子橐師為右司馬公子成為左司馬屈到為莫敖公子追舒為箴尹屈蕩為連尹養由基為宫廐尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心詩云嗟我懷人置彼周行能官人也王及公侯伯子男甸采衞大夫各居其列所謂周行也臣若水通曰午公子午即子庚也令尹官名楚上卿執政者也子馮孫叔敖從子也莫敖亦官名箴尹連尹宫廐尹俱楚國之官也夫楚一國也而公子午以下九子萃焉九子之才必皆可用楚康能為官擇人事由以立此楚之所以强也孔子以衞靈公之能用人而曰夫如是奚其喪豈不信哉昭公十七年郯子来朝公與之宴昭子問焉曰少皥氏鳥名官何故也郯子曰吾祖也我知之我髙祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏歴正也𤣥鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也鴡鳩氏司馬也鳲鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也臣若水通曰鳯鳥知天時故以名歴正之官也𤣥鳥即燕燕以春分來秋分去故曰司分伯趙即伯勞伯勞以夏至鳴冬至止故曰司至青鳥即鶬鶊以立春鳴立夏止故謂之司啓丹鳥即鷩雉以立秋来立冬去謂之司閉是分至啓閉皆歴正之屬官也此上乃天官也祝鳩即鷦鳩性孝使為司徒以立教鴡鳩即王鴡鷙而有别使為司馬以立法鳲鳩平均為司空以平水土爽鳩即鷹隼能鷙撃故為司冦以主盗賊鶻鳩即鶻鵰故為司事以主禮務即宗伯也五鳩即上五者并天官而六也鳩聚也民以聚為貴工正取義於五雉蓋便民之器用正丈尺之度斗斛之量也九農取義於九扈扈者正也正民使不淫放工正九農二者司空司徒之屬也然則六官之名已見於少皥之世至周則備矣漢宣帝地節四年北海太守朱邑以治行第一入為大司農臣若水通曰堯舜之治豈有他哉黜陟幽明而已矣太守之於大司農崇卑懸絶也朱邑有治行之最即超選之則凡有才徳者孰不奮庸熈帝之載哉若夫限於資格則賢能與庸衆等爾此宣帝綜核名實所以成中興之治也歟為人君者盍取法焉晉武帝㤗始十三年以山濤為吏部尚書典選十餘年毎一官闕輒擇才資可為者啓擬數人得詔㫖有所向然後顯奏之且甄㧞人物各為題目而奏之時稱山公啓事臣若水通曰山濤晉之名吏部也常法吏部銓官專以資格則賢愚混滯而人主不得知天下之賢而急親之也山濤必擇其才與資序當為者而參酌之以入啓此則不外乎資格而不泥於資格者也為人君者命吏部以資望參酌上聞即以列之内殿屏風朝夕寓目又詢察而有得焉則書所謂真知三有宅心灼見三有俊心六官之事皆得其賢而天下治矣晉恵帝元康九年八月三公尚書劉頌上䟽曰自近世以来法漸多門令甚不一吏不知所守下不知所避姦偽者因以售其情居上者難以檢其下事同議異獄行不平夫君臣之分各有所司法欲必奉故令主者守文理有窮塞故使大臣釋滯事有時宜故人主權斷天下萬事自非此類不得出意妄議皆以律令從事然後法信於下人聽不惑吏不容姦可以言政矣臣若水通曰此刑官之職也唐虞之時明刑弼教吕刑之訓伯夷降典折民惟刑蓋禮刑相出入交濟者也夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也劉頌上言治道其亦當時刑罰不清之故歟然而習俗已成無臯陶以明刑無伯夷以降典已無勸懲之本豈能卒革以歸於正哉然則晉事可知已矣北魏大司馬安定王休執軍士為盗者三人以狥於軍將斬之孝文帝行軍遇之命赦之休不可曰陛下親御六師將清江表今始行至此而小人已為攘盗不斬之何以禁姦帝曰誠如卿言然王者之體時有非常之澤三人罪雖應死而因縁過朕雖違軍法可特赦之既而謂司徒馮誕曰大司馬執法嚴諸君不可不慎於是軍中肅然臣若水通曰此軍政也書云威克厥愛允濟愛克厥威允㒺功軍士之盗宜以軍法從事則賞罰明信而軍威振矣魏孝文乃欲赦之何以示威信乎司馬光曰赦罪人以撓有司之法尤非人君之體也魏孝文知仁而無義宜罔功矣而無敗者豈非幸乎齊主寳卷永元元年十二月魏主恪以侍中郭祚兼吏部尚書祚清謹重惜官位毎有銓授得其人必徘徊久之然後下筆曰此人便已貴矣人於是多怨之然所用者無不稱職臣若水通曰此吏政也唐虞之時三徳而為大夫六德而為諸侯有周之治論定然後官之任官然後爵之則官位豈可以不重惜耶然不得其人則憂得其人則喜可也若授之既以為得人矣而乃徘徊不舎豈宰相樂善之誠哉祚於是乎失相體矣梁武帝天監六年十月以徐勉為吏部尚書勉精力過人雖文案堆積坐客充滿應對如流手不停筆又綜理百氏皆為避諱嘗與門人夜集客虞暠求詹事五官勉正色曰今夕止可談風月不可及公事人咸服其無私臣若水通曰冢宰之任不在多能一公足矣又何必精力應對為哉惟公也故好惡以正而邪正自明建官惟賢位事惟能若狥私情則不賢者進而賢者退天下豈有不亂哉徐勉持正於梁武之朝而却虞暠之請其與李朝隠之裁抑僥倖賈黯之斥桑澤皆可以為吏部之法矣梁天監十八年魏主詡以崔亮為吏部尚書亮奏為格制不問士之賢愚專以停解日月為斷沈滯者皆稱其能臣若水通曰王者奉若天道以分官立職求其賢以治不賢也求其才以治不才也要在量度人物而得其平爾所謂統百官均四海者也亮不逹此乃制年格遂以一定之法用天下之才其害不既多乎沈滯者稱其能則賢才者稱其不能矣後世襲以為常竟不能易若亮者不獨害一時而且害後世者也梁敬帝太平元年正月魏太師泰以漢魏官繁命蘇綽及尚書令盧辯依周禮更定六官以宇文泰為太師大冢宰李弼為太傅大司徒趙貴為太保大宗伯獨孤信為大司馬于謹為大司冦侯莫陳崇為大司空自餘百官皆倣周禮臣若水通曰周禮周公所作治天下之書也泰在魏時為丞相都督中外諸軍事五代志曰泰命尚書盧辯逺師周之建職置三公三孤以為論道之官次置六卿以分司庶務其内命謂王朝之臣三公九命三孤八命六卿七命上大夫六命中大夫五命下大夫四命上士三命中士再命下士一命外命謂諸侯及其臣諸公九命諸侯八命諸伯七命諸子六命諸男五命諸公之孤卿四命侯之孤卿公之大夫三命子男之孤卿侯伯之大夫公之上士再命公之中士侯伯之上士一命公之下士侯伯之中士下士子男之士不命其制祿秩下士一百二十五石中士以上至於上大夫各倍之上大夫是為四千石卿二分孤三分公四分各益其一公因盈數為一萬石其九秩一百二十石八秩至於七秩毎二秩六分而下各去其一二秩俱為四十石凡頒祿視其年之上下畆至四釜為上年上年頒其正三釜為中年中年頒其半二釜為下年下年頒其一無年為凶荒不頒祿臣謂孔子曰其人存則其政舉夫政由人生者也為治而不法先王不智也非其人而法之亦不智也設六典以建官周之制尚矣泰欲舉之於魏雖不可謂無志然以其時難矣非其法之難也得其人之難也知所以官人而遺其所以取人者知所以取人而遺其所以教人者皆不可也故始於教中於用終於任其致之之道必皆得其人然後可也唐太宗貞觀二十年刑部侍郎闕上命執政妙擇其人既而曰朕得其人矣徃者李道裕議張亮獄云反形未具此言當矣遂以道裕為刑部侍郎臣若水通曰此刑官也書云惟明克允又曰哲人惟刑天下之大命在於刑刑獄之大本在刑部必得明哲之賢以司之可也所司者不得其人吾見輕重失當民將無所措手足而天下之法亂矣李道裕議張亮反形未具斯言也欽恤之心藹然矣非所謂明哲耶後世以妖書妖言遽概以為反而戮及人之妻孥三族而不恤者相去逺矣太宗慎重刑部之選而以委之道裕貞觀刑措之風其亦君臣同心之所致歟唐睿宗景雲九年十二月以宋璟為吏部尚書李義盧從愿為侍郎皆不畏彊禦請謁路絶人服其公以姚元之為兵部尚書陸象先盧懷慎為侍郎武選亦治臣若水通曰此吏兵之職也天下文武而已矣文以致治武以定亂而天下之事畢矣吏部掌天下之文臣兵部掌天下之武臣人才之臧否銓法之黜陟皆由之使不得其人則羣枉倖進仕路不清何望乎天下之治也睿宗付托衆賢而文武之選宿弊大革以啓開元君子滿朝之盛夫豈一日之積也哉唐𤣥宗開元元年十月以姚元之同三品元之吏事明敏三為宰相皆兼兵部尚書縁邉屯戍斥堠士馬儲械無不黙記臣若水通曰此古之大司馬兵官也天下兵機之䆳邉務之繁皆由於兵部姚元之以身任之樞機周密庶事畢舉其要在於黙記而已茍存心於黙記何所不至此元之之所以克稱厥職者歟𤣥宗開元元年十二月刑部尚書李日知請致仕日知在官不行捶撻而事集吏皆感悦無敢犯者臣若水通曰此刑官之善者也刑官之道修意為上修法次之故孔子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志夫聽訟者其修法乎畏志者其修意乎日知當則天時吏争為酷乃能獨持平寛不行捶撻是不恃法也感悦無犯是修意矣噫理法􅈠者尚當以日知為法唐徳宗貞元二年正月以給事中崔造同平章事造久在江外疾錢穀諸使㒺上之弊奏罷水陸運使度支廵院江淮轉運使等諸道租賦悉委觀察使刺史遣官部送詣京師令宰相分判尚書六曺齊映判兵部李勉判刑部劉滋判吏部禮部造判户部工部臣若水通曰人君之道一而已矣在擇相為相之道一而已矣在知人相而知人則六官各得其職故六官之任各有所司宰相則兼統乎六官者也使宰相分判六曹則是宰相行六官之事而六曺為虚設矣豈古人設官之本意哉為人君者誠能公其心以任相為相者能公其心以任六官則六曺皆得其人而事無不治矣又何待於分判耶崔造懲錢穀諸使罔上之弊令宰相分判六曹一時救弊之權爾要不可為常法也宋儒程顥上劄子於朝有曰王者必奉天建官故天地四時之職歴二帝三王未之或改所以百度修而萬化理也至唐猶僅存其略當其治時尚得綱紀小正今官秩淆亂職業廢弛太平之治所以未至也臣若水通曰天子之職所以代天理物其道皆法之於天也天地通其氣四時運其化而萬物生焉是故因天地四時以建官而六職備舉則百度修萬化出矣帝之所以帝王之所以王皆是道也自茲以降法制寖壞治不古若宜哉惟我太祖髙皇帝上監百王剗除舊弊掃歴代之陋習修成周之良規故六部之建用迄於今而聖子神孫守為家法不敢易也噫立法之善固如是哉程頥曰人或以禮官為閒官頥謂禮官之責最大朝廷一有違禮皆禮官任其責豈得為閒官臣若水通曰禮官即古之大宗伯也夫宗伯於四時之序為長治天神地祇人鬼之事和上下尊卑等列之序其責任亦匪輕矣茍不能周旋矩度以至於戾天理而乖人事將安逸其罪乎然則禮官豈閒散之任哉楊時云周官六卿皆以上大夫為之而冢宰掌邦之六典雖掌邦治實兼總六職蓋教禮政刑事皆治之具故也故冡宰施法於官府而小宰以六職辨邦治則其兼總可知矣臣若水通曰六卿所以代天工總庶職而冡宰又所以總六卿掌六典者也其任不亦大乎而任之可不知所重乎是故知六卿以冡宰為重則必求其人不敢忽矣忽冡宰則無冡宰矣無冢宰是無六卿也無六卿是無三百六十官也華陽范祖禹曰夫天地之有四時如百官之有六職天下萬事備盡於此如網之在綱裘之挈領雖百世不可易也人君如欲稽古以正名茍不於周官未見其可也臣若水通曰周官三百六十而總之於六卿六卿總之於冢宰冢宰統之於君官不多故其人易擇而天下之政如出一人矣不猶領挈而裘順綱舉而網張者乎噫後世如唐之建官近之矣而無徳以為之本此其治之所以不古若也求其可以繼周者非聖朝而何哉國朝制吏部四司文選驗封稽勲考功户部十三司則分𨽻浙江等十三藩仍量繁簡𢃄領直𨽻府州毎一司内仍各分為民度金倉四科禮部四司儀制祠祭主客精膳兵部四司武選職方車駕武庫刑部十三司如户部之制仍各分為憲比司門都官四科工部四司則營繕虞衡都水屯田也司設郎中員外郎主事以分理各部所掌之職而統於尚書侍郎吏部所掌則天下官吏選授勲封考課之政令户部所掌則天下人民田土户口錢糧之政令禮部則掌天下禮儀祭祀燕享貢舉之政令兵部則掌天下軍衞武官選授戎馬之政令刑部則掌天下刑名徒𨽻句覆闗禁之政令工部則掌百工山澤之政令臣若水通曰此國朝六官之制也六官得人而天下治矣故吏部得人而君子進矣户部得人而財用足矣禮部得人而禮樂興矣兵部得人而軍旅治矣刑部得人而刑罰清矣工部得人而百工飭矣夫君子進則財用足禮樂興軍旅治刑罰清百工飭然而天下不平者未之有也中庸曰取人以身故欲得人者又在於人君心身之徳始也伏惟聖神留意焉格物通卷七十五
