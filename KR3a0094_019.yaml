body:
  text: 格物通卷十九明湛若水撰正心中論語子曰詩三百一言以蔽之曰思無邪臣若水通曰此聖人揭魯頌駉篇之指以示人也夫思者心之神也心體何嘗不正思焉而幾動則善惡分矣心之本體至正而善也私意萌焉則邪惡矣而心中正之體無不在特蔽於私爾思無邪所以復心之本體也人能隨處體認察見本體而涵養之則內欲不萌外誘不纍而心思之神澄然無事是謂無邪也不能見理則私心邪念潜伏於中雖欲規規焉除之不免於滅東生西之患矣欲其無邪也得乎子曰回也其心三月不違仁其餘則日月至焉而己矣臣若水通曰仁者心之生理也程皓所謂心如穀種仁則其生之性是也仁未嘗與心判為二物也蔽於邪私則心為人心而天理滅矣故違而二之顔子克己故禮復禮復則天理流行與心為一故曰不違仁三月言其久也久於仁也其餘日月至焉者蓋或一月之內存乎仁或一日之內存乎仁不能如顔子之久矣如謂必日月而後一至焉豈聖門之賢之學哉先儒謂顔子有王佐之才觀其心不違仁是有天德矣有天德便可以語王道此顔子所以為王佐乎伏惟聖明取顔子之學以志仁為要尤博求天下學顔子之學者以為輔則君臣咸有一德而王道成矣子絶四毋意毋必毋固毋我臣若水通曰此聖門心學之要門人記聖人之所以教人者即子以四教之意也夫心之本體無一物也如天地之至公有物則非本體矣張載曰四者有一焉則與天地不相似四者在人相為終始有則俱有無則俱無惟聖人之心廓然大公物來順應故無四者之病也然此不曰無而曰毋者蓋嘗以禁止學者之辭也學者誠能體認天理不以己與物克去四者之私不為本體之纍矣故程皓曰敬則無己可克始須絶四又曰意必固我既亡之後必有事焉夫四者既亡則天理自見是謂有事否則雖强無之且將失於空虛流於異學而何可以入道哉此學者所當自究竟也孟子曰人皆有不忍人之心先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上所以謂人皆有不忍人之心者今人乍見孺子將入於井皆有怵惕惻隱之心非所以內交於孺子之父母也非所以要譽於鄉黨朋友也非惡其聲而然也由是觀之無惻隱之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也謂其君不能者賊其君者也凡有四端於我者知皆擴而充之矣若火之始然泉之始達茍能充之足以保四海苟不充之不足以事父母臣若水通曰孟子此章直指本心體用全具可謂深切而著明矣不忍人之心即心之生理所謂仁也即下惻隱之心至於羞惡辭讓是非之心即是四端之發隨感而異見爾非謂原有四心也夫惟聖人有是心則有是政者所謂體用一原也君子能知是心而擴充之復其本心也衆人不能則此心雖發將隨發隨泯自暴自棄者也雖然充之則足以保四海不充之不足以事父母是故帝堯之德光被四表後之人主或以天下之大不能恱其親而遂肆欲以危宗廟社稷是心充與不充之間其所係豈細故哉故人君茍不失其本心之正斯不失天下之心而天下國家可保也孟子曰君子之所以異於人者以其存心也君子以仁存心以禮存心臣若水通曰此孟子明君子所存之心示人以正心之學也夫以仁禮存心非謂取諸外以存之也仁即是心之生理禮即是心之天理同是一理茍能體認此理而心存存即無一念而非仁禮矣此乃復吾心本體之正非由外鑠我也我之心也得其心則得仁禮矣失其心則失仁禮矣此君子之所以異於人者乃得人心之常爾豈别有異於人哉故君子之學在於體認天理而存隨感而見施之愛人則為仁施之敬人則為禮本立而道自生矣孟子曰雖存乎人者豈無仁義之心哉其所以放其良心者亦猶斧斤之於木也旦旦而伐之可以為美乎其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足以存則其違禽獸不逺矣人見其禽獸也而以為未嘗有才焉者是豈人之情也哉故茍得其養無物不長茍失其養無物不消孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與臣若水通曰夜氣之說未之前聞也至孟子而始發之於此可以知理氣之合一矣夫仁義之心即吾心之生理所謂性也旦晝不害其性則夜氣益清夜氣既清則旦晝之理益明蓋性之存亡係乎氣之清濁氣得其中正即仁義之性也故曰合一奈何人之轉展相害使夜氣薄濁而仁義之良心亦亡要之良心之消長顧人所以養之者何如引孔子之言正以明心之不可以頃刻失其養也學者誠能隨時隨處察識此心之本體而涵養之造次顛沛必於是旦晝常如夜氣之時則何往而非仁義哉李侗曰孟子夜氣之說於學者極有力有志於學者所宜務焉孟子曰人有雞犬放則知求之有放心而不知求學問之道無他求其放心而已矣臣若水通曰仁人心義人路孟子既重為不由不求者哀矣於此復致意於放心之求者何哉蓋萬事萬變皆本於心千聖千賢皆是心學欲求放心非强制妄想能之也在於學問耳孔子曰吾嘗終日不食終夜不寢以思無益不如學也中庸學問思辨篤行之事是也故學問之道不過只為此心求其放失者而已人才學問則有以管攝此心發明此心不求而復矣所謂博學切問仁在其中也然而人君以一心而受衆欲之攻尤易以放故尤當自力以求之求之匪他惟學問體認天理存存於勿忘勿助之間心存則仁存仁存則義路以由矣存心也者其聖學之要乎孟子曰養心莫善於寡欲其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣臣若水通曰心之本體即天理也欲害之故失其本體爾莊周曰其嗜欲深者其天機淺夫欲去一分則理存一分欲去十分則理存十分而心之本體正矣周敦頥曰聖可學乎曰可有要乎曰一為要一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥庶矣乎然則志於聖學者必自寡欲以去其害心者然後可也左傳莊公四年春王三月楚武王荆尸授師孑焉以伐隨將齊入告夫人鄧曼曰余心蕩鄧曼歎曰王祿盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉臣若水通曰鄧曼知王心之盈蕩而歎王祿之盡是矣特謂先君蕩之則非也王自蕩也人之一心至微而見至隱而顯操舍之機在敬肆之間爾人心皆然而况君心尤易肆者乎荆即楚尸陳孑㦸制楚兵陳法用㦸授師伐隨其心驕盈惟盈故蕩一念之微爾鬼神得以窺之婦人女子得以知之徒以其身而與國俱燼者不足惜也其為後世之永鑑亦至明矣故為人君者當正此心以為天下萬事之本焉昭公二十一年春天王將鑄無射伶州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿也而鍾音之器也天子省風以作樂器以鍾之輿以行之小者不窕大者不摦則和於物物和則嘉成故和聲入於耳而藏於心心億則樂窕則不咸摦則不容心是以感感實生疾今鍾摦矣王心弗堪其能久乎臣若水通曰無射鍾名窕摦鍾之弊病也人之心無所不感也其可以一或不正乎景王之死心疾也心疾之死曷為於無射見之樂記曰凡音之起由人心也人心之動物使之然也無射之摦者心之感於音者乎是故即音以知其心即心以知其疾即疾以知其不久也决矣人君知此蓋必正其心約其情使聲和則氣和氣和則形和形和則天地之和亦至矣昭公二十五年宋公享昭子賦新宫昭子賦車轄明日宴飲酒樂宋公使昭子右坐語相泣也樂祈佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久臣若水通曰哀樂情也情者心之發也敬也者其操之之要乎敬存則心存心存則情正情正則哀樂之發各當其可初非有意為之也宋公之與昭子當宴而泣其得哀樂之正乎心有不存焉故爾宋儒朱熹曰凡人之病皆可治惟心病則難幸毋陷於心病使無下藥之理哉國語周語單穆公曰夫耳目心之樞機也故必聽和而視正聽和則聰視正則明聰則言聽明則德昭聽言昭德則能思慮純固以言德於民民歆而德之則歸心焉臣若水通曰穆公王卿士單靖公之曽孫樞機發動所由也心有所欲耳目為之發動習於和正則心可正矣夫人心之神皆發於耳目故書曰不役耳目百度惟貞百度者心之謂也故耳和目正則心亦正而常存矣夫然後思慮純固言順德昭而民心歸焉為人君者可不慎耳目之好養其心以為化民之本乎伏惟聖明留意焉晉語竇犨曰君子哀無人不哀無賄哀無德不哀無寵哀名之不令不哀年之不登臣若水通曰竇犨晉大夫哀猶慮也登髙也賄財也寵位也年壽也富貴與夀三者皆人之欲也然所欲有甚於此者有德有人令名之謂也孟子曰君子有終身之憂是其所哀者大矣為人上者德修則人歸名從而彼皆所性不存者矣簡子能信竇犨之言則哀樂得其正情不蕩而性不鑿矣乎楚語觀射父曰聖王正端冕以其不違心帥其羣臣精物以臨監享祀無有苛慝於神者謂之一純臣若水通曰觀射父楚大夫端𤣥端之服也冕大冠也監視也不違心謂心思端正則服正端冕夫純心者享神之本也故正端冕無苛慝純心之謂也語曰惟聖人為能享帝心之純也聖人純其心以承天之心故昭孝息民天神來格而錫福無彊也為天地民物之主者可不知所以養其心耶唐太宗貞觀元年上謂太子少傅蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脉理皆邪弓雖徑而發矢不直朕始寤嚮者辨之未精也臣若水通曰夫人與物莫不有心觀物則知人矣弓工之言不為無見其殆輪扁之流乎唐太宗知愛弓而不知愛身知弓之木非其心而不自知其心之非正可謂自知自愛乎骨肉相殘閨門慚德非自其不正之心發之乎易曰正其本則萬事理工之言暗合此矣夫噫一弓之微而尚欲端本如此况人君居天下之尊乎書曰惟木從繩則正后從諫則聖使太宗知愛身如愛弓則必於臣之進諫求正心之術矣而乃不然一時諸臣又未有知正心之學者以將順其美豈不為千載英君之一歎歟唐太宗貞觀十七年上謂侍臣曰人主惟有一心而攻之者甚衆或以勇力或以辨口或以諂諛或以奸詐或以嗜欲輻凑攻之各求自售以取寵祿人主少懈而受其一則危亡隨之此其所以難也臣若水通曰人君以正心為本一心正則羣邪不入矣人心危而道心微一有不正則亂亡相隨太宗蓋知之矣雖然卒未聞其有大學正心之道治不三代何足怪哉唐中宗神龍元年左拾遺李雍上疏以為詩三百一言以蔽之曰思無邪若有神仙能令人不死則秦始皇漢武帝得之矣佛能為人福利則梁武帝得之矣堯舜所以為帝王首者亦修人事而已尊寵此屬何補於國臣若水通曰古先哲王皆以正心為正萬事之要故心思之本體無邪也其有邪者欲誘之也仙道佛教皆其一二也其於身心國家何補哉李雍引思無邪之一言為戒良有以也可以為人君慕仙事佛者之鑒唐憲宗元和三年嘗問裴垍為理之要何先對曰先正其心臣若水對曰惟大人為能格君心之非君正莫不正一正君而國定矣君心克正則用人行政皆出於正而國豈有不治乎裴垍之言善矣惜乎未聞有正心之學足以格君也唐憲宗元和十五年上見夏州觀察判官栁公權書跡愛之卒酉以公權為右拾遺翰林侍書學士上問公權卿書何能如是之善對曰用筆在心心正則筆正上默然改容知其以筆諫也臣若水通曰萬事萬變生於心心正則莫不正矣憲宗聞公權正心之說而改容豈非惻隱之心所發乎然而不能用之使啓心沃心以究正心之學擴充之以保四海惜哉賈誼曰楚懷王心矜好髙人無道而欲有伯王之號鑄金以象諸侯趨君令諸侯聞之以為不宜故興師伐之臣若水通曰心之本體無物也無物故神好矜好髙心之蔽也矜髙者勝心人思以勝心乘之矣勝心者召敵之媒也語曰魚惡其網人惡其上勝心之召也故君子先正其心使克伐不存則天下莫與爭功爭能矣賈誼曰諸侯凡有治心者必修之以道而興之以敬然後能以成也臣若水通曰率性之謂道勿忘勿助之謂敬是故敬立而道修矣道修而治成矣故心也者萬事萬化之大原乎宋太祖建隆三年春正月宋廣東京城宋主既廣汴城且命有司畫洛陽宫殿按圗修之以韓重贇董其役營繕既畢宋主坐寢殿令洞開諸門皆端直軒豁無有壅蔽謂左右曰此如我心若有邪曲人皆見之矣臣若水通曰人君一心之邪正不可掩也心正則天下皆知其正心邪則天下皆知其邪深宫獨處之地淵衷隱微之所潜雖伏矣亦孔之昭故曰莫見乎隱莫顯乎微宋祖以重門端直軒豁比其心心有邪曲人皆見之庶乎能知正心者矣宜乎創業垂統逺過漢唐也惜其正心之道知足以及之仁不能守之此宋之治所以不三代乎宋哲宗元祐四年東平公吕公著卒公著自少講學即以治心養性為本於聲利紛華泊然無所好簡重清靜茍便於國不以利害動其心臣若水通曰孟子言盡心知性而知天存心養性以事天蓋必知所有而後能養所有也史稱公著學以治心養性為本蓋即孟子存心養性之意也獨不知其於盡心知性知天者何如爾茍不知之則所存所養者何事程頥云只被君家學佛公著父子多讀釋氏書故其父子反以程頥兄弟為所見者淺近則史所謂性者又未可知也故君子之學以盡心存心為務以知性養性為要宋髙宗紹興三十二年召張浚入朝以為江淮宣撫使封魏國公帝手書召浚入見浚至帝改容曰久聞公名今朝廷所恃惟公因賜之坐浚從容言人主之學以心為本一心合天何事不濟所謂天者天下之公理而已必兢業自持使清明在躬則賞罰舉措無有不當人心自歸敵讎自服帝悚然曰當不忘公言加浚少傅魏國公宣撫江淮臣若水通曰觀張浚之言似乎得心學之㫖上可以啓君心之明下足以救人心之溺者矣雖然知而不行猶為不知知行並進而後心學可純也浚以吳玠之故殺曲端則行浸潤之譛謂之不明詆李綱趙鼎而不獲大用則以愛憎為用舍謂之不公不明生於不公不公由於不察見天理則亦何貴于心學之說也噫心學不純而欲格君心之非望之為堯舜者未之有也敢附春秋責修賢者之義宋孝宗乾道三年以陳俊卿參知政事劉珙同知樞密院事珙自河南召還初入見首論獨斷雖英主之能事然必合衆智而質之以至公然後有以合乎天理人心之正而事無不成若棄僉謀徇私見而有獨御區宇之心則適所以蔽四達之明而左右私昵之臣將有乘之以干天下之公議者又論羡餘和糴之弊帝皆嘉納之授翰林學士復上言世儒多病漢髙帝不悅學輕儒生臣以為漢髙帝所不悅者特腐儒宿學爾使當時有以二帝三王告之知其必敬信功烈不止此因陳聖王之學所以明理正心為萬事之綱帝稱善遂拜樞副珙因薦張栻汪應辰陳良翰學行于帝臣若水通曰宇宙之內人心一而已矣何則天一而已矣故一人之心即千萬人之心一時之心即千萬世之心孔子曰斯民也三代之所以直道而行也然而一人一時之心或有所蔽故古之聖人必闢四門廣衆論合乎人心之正則天理之公在是矣正心之說首以為孝宗告此劉珙所以度越諸臣也歟宋孝宗淳熙六年詔求直言知南康軍朱熹上疏其略曰天下之務莫大於恤民在人君正心術以立紀綱蓋紀綱不能以自立必人主之心術公平正大無偏黨反側之私然後有所係而立君心不能以自正必親賢臣逺小人講明義理閉塞私邪然後可得而正臣若水通曰人君心術之邪正係君子小人之親踈也小人踈君子親則養之以正君心自不能以不正矣君子踈小人親則養之以邪君心自不能以不邪矣君心正則政莫不正然而不治者未之有也君心邪則政莫不邪然而不亂者未之有也朱熹心術之論真人主之龜鑑也哉宋孝宗淳熙十五年以朱熹為崇政殿說書熹辭不至熹既歸投匭進封事言大本急務大本者陛下之心急務則輔翼太子選用大臣振舉紀綱變化風俗愛養民力修明軍政凡此六事皆不可緩而本在於陛下之一心一心正則六事無不正一有人心私欲介乎其間則雖憊精勞心不可為矣疏入夜漏下七刻帝已就寢亟起秉燭讀之終篇明日除主管西太一宫兼崇政殿說書熹力辭乃以祕閣修撰奉祠臣若水通曰天下之本在乎一人一人之本存乎一心未有心不正而能治天下者也亦未有不加正心之功而能正其心者也故心正而六事舉矣唐虞三代之君正心以成治化有本者如是也使孝宗能用熹之言則宋之治未可量也一齊衆楚指為僞學豈不惜哉宋光宗紹熙五年羅㸃卒㸃孝友端介不為矯激之行或謂天下事非才不辦羅㸃曰當論其心心茍不正才雖過人果何取哉臣若水通曰古之才也出於一今之才也出於二古之所謂才合德而言之者也今之所謂才外德而言之者也易曰貞固足以幹事心正則何事而不可為也又曰開國成家小人勿用心茍不正則何事而可為也羅㸃言人當論其心似矣其曰心茍不正才雖過人不足取者是未知才德合一之道也夫小人無才惟君子有之故能開物成務若夫小人之便捷智不足以周身臣不謂之才也已格物通卷十九
