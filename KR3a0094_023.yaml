body:
  text: 格物通卷二十三明湛若水撰慎言動上易家人象曰風自火出家人君子以言有物而行有恆臣若水通曰家人卦巽在離上故為風自火出君子觀此象知事必由內而出故言行皆由中出者也由中出故所言必有物所行必有恆也物者實體恆者有常皆謂天理也天理存於中則言行謹於外也言動謹則身修家齊國治而天下平矣姤象曰天下有風姤后以施命誥四方臣若水通曰姤卦乾下有巽順居健下故為姤有風行天下之象風行天下在號令而已矣為君后者觀此象謹於施命以誥四方夫風者天之號令鼓舞萬物者也命者君之號令鼓舞萬民者也上有逆命則下有逆詞不可不慎也本吾心之誠以達諸政教焉則置郵之傳者德之流行也命斯達矣其君民協心所感豈不深哉艮六五艮其輔言有序悔亡象曰艮其輔以中正也臣若水通曰言不可以偽為也有德者必有言也五居卦之中故為中正中德在內者也故能艮其口輔而不言非不言也不輕言也言由中德而發者也秩秩德音言滿天下無口過其寡悔矣乎繫辭擬之而後言議之而後動擬議以成其變化臣若水通曰言動根於心也擬議之於易理也易理在吾心也言行之所由發者也擬議以體認於吾心由中而發則言動當其可久而變化言即教動即道而擬議亡矣不然言必信行必果硜硜然爾矣豈知變化之道邪子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎臣若水通曰天下之感應心而已矣言行出於心感應之大者也其於人也為樞機矣善則人應之非私應也得其同然之心也不善則人違之非私違也失其同然之心也應則榮違則辱皆由己以致之也非自外至也豈惟人哉天地之於人一理也天地位與不位言動之感格也人君父母乎天地而繫天下之從違者其於言行之際當知與天地合可也與人合可也顧可徇於一己之私邪書虞書舜典帝曰龍朕堲讒説殄行震驚朕師命汝作納言夙夜出納朕命惟允臣若水通曰此帝舜命龍謹於出納王言之詞龍舜之臣堲疾殄絶也殄行者謂傷絶善人之事師衆也謂其言之不正而能變亂黑白以駭衆聽也納言虞官名在周為內史在漢為尚書魏晉以來為中書門下夫命令人君鼓舞萬民之具誠不可以不謹而納言之官命令之所由出者也讒説之人以非為是以邪為正窺伺間隙迎合主意人君惑之則賞以私喜罰以私怒命令由之而不正矣此帝舜之所以深惡而必慎重於納言之命也以為命令政教由納言而出必使審之既信然後出之否則諫止之不必出可也敷奏復逆由納言而入必使審之既信然後入否則斥逐之可也是故朝廷賞罰豫奪皆出聖斷大權不至下移而讒説無所容其喙矣後世人君惟欲其言而莫豫違使納言之官不得盡其職唯唯奉命以取容説此命令之所以不正而治之不古若也有由然哉夫納言之官今之通政司與夫六科十三道皆其類也如朝廷之喉舌然喉舌壅塞言語不通為身之大患為人君者豈不懼乎大禹謨帝曰惟口出好興戎臣若水通曰此帝舜告禹之言好善也戎兵也言發於口則有召善起兵二者之分利害之幾可畏如此易曰居其室出其言善千里之外應之況其邇者乎出其言不善千里之外違之況其邇者乎人君居天下之上一言一動尤為千萬臣民之瞻聽甚不可不慎其所發也商書説命惟口起羞臣若水通曰此傅説告髙宗之言也言語者所以宣其意而達諸政令者也輕出則有起羞之患夫言行君子之樞機也樞機之發榮辱之主也故一或輕出大則啓禍小則召侮人君之發言可不慎乎周書周官王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷臣若水通曰此成王訓迪百官之言也反者令出不可行而壅逆之謂允信也蓋令者出於上而施於下示趍向於民者也誠不可以不慎敬汝所主之職在於慎令故曰欽乃攸司慎乃出令令欲其行不欲其壅逆而不行此所以當慎也公理私情不容並立公理勝則私情滅以公滅私則所出之令至公無我民將丕應徯志豈有不敬信而懷服者乎故敬職在於慎令慎令在於至公為人上者其可不立至公以為出令之本乎畢命政貴有恆辭尚體要不惟好異商俗靡靡利口惟賢餘風未殄公其念哉臣若水通曰此康王命畢公保釐東郊之言也蔡沈曰對暫之謂恆對常之謂異趣完具而已之謂體衆體所會之謂要政事純一辭令簡實深戒作聰明趨浮末好異之事也成王言政貴有常不常則民無所據守其政之號令辭不體要則失於虛文好異則辭不體要而政不恆矣況商俗靡靡然而尚利口餘風至今不息則有恆體要尤為對病之藥也可不念之哉為人上者欲恆其政當慎其辭令焉詩小雅小辨莫髙匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後臣若水通曰朱熹謂幽王太子宜臼被廢而作此詩言山極髙矣而或陟其巔水極深矣而或入其底故君子不可輕易於其言恐耳屬於垣者有所觀望左右而生讒譖也臣謂言者發於心者也心或受病則隱之所藏顯之所發雖欲禁之不可得矣故君子欲謹其言當先謹其心則言之所發皆由中出正大光明無不可對人者矣故欲無易由言當自無易由心始爾宜臼因被譖而為此詩是有意於謹言矣然徒禁於標末爾李泌諫德宗廢太子立舒王曰願還宫勿露此意若有意於謹言矣然猶禁之於萌芽爾中庸曰君子不動而敬不言而信夫敬信在言動之先則邪意不生而言行可以動天地矣伏惟聖明留心於敬信之學則無意無必而凡刑賞豫奪如天之無迹而左右不得窺伺之矣大雅板天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣臣若水通曰此詩同列相戒亦以諷王也憲憲欣欣也蹶動也泄泄猶沓沓也輯和洽合懌悅莫定也首章憂其出話不然故此繼之以為辭之輯和故民莫不洽合矣辭之懌悅於民心故民心皆莫而定矣蓋上下同此心也同此理也辭當於理而和且悅焉則上無逆命下無逆辭民自無不合無不定矣夫民合而定由言當乎理固也然欲其言之當理豈徒修飾於外哉蓋由平時修辭立誠以涵養此心之天理使之由中達外不能己焉大之為典謨訓誥小之為號令詔敕莫非洋洋之天語所以鼓舞乎萬民者風行草動莫之或違矣不然徒欲修飾其辭而不由中出則雖學典謨訓誥亦偽辭而已矣人君欲民之信從當修信於言前然後可也春秋桓公三年夏齊侯衛侯胥命于蒲臣若水通曰春秋書胥命于蒲褒齊僖衛宣不事盟誓以言而相結也是役也或曰尊王或曰推伯其事之是非不暇論矣獨謂春秋之時大道隱而盟誓興忠信薄而人心疑約劑亂而交質之風成烏有如二國之君一言取信邪衛獻公言於寧喜求復國喜曰必子鮮在不然必敗小邾射以句繹奔魯曰使季路要我吾無盟子鮮季路言出而人服庶幾胥命之遺風也嗚呼春秋非古也而古道猶存以是知天理之在人心不以古今殊也人君敦信修道得人心之同然言而世為天下則矣定公十年夏公會齊侯于夾谷臣若水通曰夾谷之會齊侯弱魯將有萊兵之劫國勢之殆亦甚矣仲尼以從容談論而却敵國之兵何也蓋天下莫大於理而強衆不與焉仲尼之對齊侯曰裔不謀夏夷不亂華於神為不祥於德為愆義聽其言也道德之正自足以折其姦回之心仁義之論自足以消其桀驁之氣故俄頃之間功化如此也否則齊君非不武也晏嬰非不知也胡為而有獲罪於魯謝過以質之言哉故曰仲尼一言威重於三軍禮記曲禮曰毋勦説毋雷同必則古昔稱先王臣若水通曰毋禁止之辭􅒆取他人之説以為己説謂之勦説聞人之説而附和之謂之雷同則猶法也修辭立誠所以進德也古之君子所以致慎於言辭者非欲為觀美也蓋所以謹其心而進德也是故勦説雷同求之於人也言非由中出也言則古昔稱先王非求之於古昔先王也求之我也先王之心我之同然也故求之人者偽也求之我心之同然者誠也故君子立誠之為貴曲禮曰修身踐言謂之善行行修言道禮之質也臣若水通曰修身以踐言言斯道矣踐言以善行行斯修矣言行者君子之樞機也禮之出也必言行以為地是故言行修禮本立矣故禮樂待人而後行哀公問孔子曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不命而敬恭臣若水通曰過言過動謂言動不當理也作如作好作惡之作作辭化其過言也作則化其過動也過言生於心也過行發於身也皆不恭不敬之萌也恭敬存於心言行不過則百姓化而敬恭感應之理則然也君子之於言動其可以不謹乎仲尼燕居曰言而履之禮也行而樂之樂也君子力此二者以南面而立夫是以天下太平也臣若水通曰言出而踐則履矣言無非理是以謂之禮也行發而順則樂矣動無不和是以謂之樂也禮樂出於身天下化之而至理至和焉治之極也緇衣子曰王言如絲其出如綸王言如綸其出如綍故大人不倡遊言可言也不可行君子弗言也可行也不可言君子弗行也則民言不危行而行不危言矣臣若水通曰如絲如綸者發之者小而播之者大也如綸如綍者發之者大而播之者尤大也蓋人君一言之發一訓誥詔令之出而臣下之奉行天下之習尚必有甚焉者矣發之不可不謹也故在審之而已矣一言之發也必思曰他日可行於臣民乎否則不必言也一政之行也必思曰此可對臣民言之乎否則不必行也言必慮其所終行必稽其所敝則言行相顧而天下化之矣雖然理一也合乎理未有可言而不可行可行而不可言者但人君以崇髙之勢或出悖理之言行以為莫豫違者而不知天下之臣民已議其後而莫肯信從矣王者之所發可不慎乎格物通卷二十三
