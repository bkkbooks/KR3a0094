body:
  text: 格物通卷六十四明湛若水撰舉措二左傳莊公九年齊鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治於髙傒使相可也公從之臣若水通曰鮑叔齊大夫子糾桓公之弟管仲召忽子糾臣也受而甘心言自殺之以快意未必殺也生竇堂阜皆地名夫管仲之賢鮑叔知之深矣故忘其讎而薦之用之鮑叔之賢後世孰有能及之者哉當鮑叔帥師之時使無知人之明則夫堂阜之囚何自而稅齊國之相何自而得乎是則用管仲者君之專進管仲者臣之明此管仲所以有生我父母知我鮑叔之感也然鮑叔之心豈為管仲哉為其賢也為其能也後之逞其私忌棄國之賢而敗人國家者鮑叔之罪人也僖公三十年甲午晉侯秦伯圍鄭以其無禮於晉且二於楚也晉君函陵秦君汜南佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出見秦伯秦伯乃還臣若水通曰合秦晉之師以臨鄭鄭蓋岌岌乎危矣斯時也實於燭之武有賴焉鄭伯是時乃悔用之之晚也使早用之則秦晉之師豈至壓境哉一見秦伯鄭得安為東道主而秦亦不至自闕以利晉秦平而晉自退矣昔人有言一賢而止百萬之師也賢才之用舍係於人之國家豈小哉文公十八年莒紀公生太子僕又生季他愛季他而黜僕且多行無禮於國僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司冦出諸竟曰今日必達公問其故季文子使太史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也先君周公制周禮曰則以觀德德以處事事以度功功以食民作誓命曰毁則為賊掩賊為藏竊賄為盜盜器為姦主藏之名賴姦之用為大凶德有常無赦在九刑不忘行父還觀莒僕莫可則也孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也保而利之則主藏也以訓則昏民無則焉不度於善而皆在於凶德是以去之昔髙陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍忠肅恭懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至于堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟恭子孝內平外成昔帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周天下之民謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譛庸回服讒搜慝以誣盛德天下之民謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲狠明德以亂天常天下之民謂之檮杌此三族也世濟其凶增其惡名以至于堯堯不能去縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之叨餮舜臣堯賔于四門流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦魑魅是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰慎徽五典五典克從無違教也曰納于百揆百揆時序無廢事也曰賔于四門四門穆穆無凶人也舜有大功二十而為天子今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎臣若水通曰莒僕弒父之賊也以寶玉奔魯宣公欲納之是黨賊矣季文子執而戮之以謝莒是矣然而不稟命於公朝而自執國命則其去莒僕無幾矣至其援帝舜之事以辨論庶幾明舉措之大義於天下後世焉宣公十六年春晉士㑹帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘晉侯請于王戊申以黻冕命士㑹將中軍且為太傅於是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄氷善人在上也善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也臣若水通曰善人之用舍國之利病由之其于士㑹見之矣夫士㑹於文公七年奔秦為迎子雍之故也十三年還晉為從夀餘之計也晉人不以其患而終疑其臣士會不以其怨而終仇其君此士㑹所以見用而晉盜奔于秦書曰邦之杌􅑾曰由一人邦之榮懷亦尚一人之慶善人之於人國豈可少哉襄公三年晉祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問焉對曰午也可於是羊舌職死矣晉侯曰孰可以代之對曰赤也可於是使祁午為中軍尉羊舌赤佐之君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣解狐得舉祁午得位伯華得官建一官而三物成能舉善也夫惟善故能舉其類詩曰惟其有之是以似之祁奚有焉臣若水通曰祁奚舉解狐其仇也舉祁午其子也人臣事君之道先國家而後己私夫才足以任事惟其人而已內不避親以自嫌外不棄讎以生忌吾庸知其親與讎哉惟其人而已矣自嫌生忌此大臣之所以私也非賢哲盡忠於君而公天下之心也祁奚可不謂之賢乎若臧文仲之竊位者可以少愧矣襄公二十六年初楚伍參與蔡太師子朝友其子伍舉與聲子相善也伍舉娶於王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故聲子曰子行也吾必復子及宋向戍將平晉楚聲子通使於晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之子木曰夫獨無族姻乎對曰雖有而用楚材實多歸生聞之善為國者賞不僣而刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫與其失善寧其利淫無善人則國從之詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寧失不經懼失善也商頌有之曰不僣不濫不敢怠遑命于下國封建厥福此湯所以獲大福也古之治民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬是以將賞為之加膳加膳則飫賜此以知其勸賞也將刑為之不舉不舉則徹樂此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也子儀之亂析公奔晉晉人置諸戎車之殿以為謀主繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師於桑隧獲申麗而還鄭於是不敢南面楚失華夏則析公之為也雍子之父兄譛雍子君與夫人不善是也雍子奔晉晉人與之鄐以為謀主彭城之役晉楚遇於靡角之谷晉將遁矣雍子發命於軍曰歸老幼反孤疾二人役歸一人簡兵搜乘秣馬蓐食師陳焚次明日將戰行歸者而逸楚囚楚師宵潰晉降彭城而歸諸宋以魚石歸楚失東夷子辛死之則雍子之為也子反與子靈爭夏姬而雍害其事子靈奔晉晉人與之邢以為謀主扞禦北狄通吳於晉教吳叛楚教之乘車射御驅侵使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來楚罷於奔命至今為患則子靈之為也若敖之亂伯賁之子賁皇奔晉晉人與之苖以為謀主鄢陵之役楚晨壓晉軍而陳晉將遁矣苖賁皇曰楚師之良在其中軍王族而已若塞井夷竈成陳以當之欒范易行以誘之中行二郤必克二穆吾乃四萃於其王族必大敗之晉人從之楚師大敗王夷師􅑒子反死之鄭叛吳興楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其爵祿而復之聲子使椒鳴逆之臣若水通曰楚以王子牟得戾之故而疑伍舉不明也使懼而奔鄭不公也聲子明足以知其賢故為多辭以警楚而懼子木雖以成其吾必復子之一言然而心則公矣既而伍舉得歸子孫復仕楚聲子之有力於楚也然則為人君者國有杞梓皮革之材毋為四方資哉襄公二十九年吳公子札來聘見叔孫穆子說之謂穆子曰子其不得死乎好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子臣若水通曰大臣之於人不可不擇也上以病國下以殺身可不慎哉季札於叔孫穆子之好善不能自擇而知其不得死焉甚矣小人之為人禍辨之不可不早也好善猶有不擇况不好乎擇之猶懼不明况不擇乎穆子顧以夢求牛竪而不知殺穆子者牛竪也至於饑渴授戈之際乃思季札之言悔無及矣襄公三十一年子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也若果行此必有所害臣若水通曰先王之禮幼學而壯行必四十曰彊而仕所以期其學成而達之政也子皮欲愛人以政子産欲學而入政其得失固相懸絶不暇論也後世之君於先王養士用人之禮廢矣往往及童而進用之至使為人長者乃年少新進之士子産所謂使學者製錦未能操刀而使割者也為人君及主薦士者當思所以抑之期之歸學十數年然後入仕庶乎愛人庇身之道得而治亦未必無大補云國語晉語臼季使見冀缺耨其妻饁之敬相待如賔從而問之冀芮之子也與之歸進於文公公曰其父有罪可乎對曰國之良也滅其前惡是故舜之刑也殛鯀其舉也興禹臣若水通曰臼季胥臣也滅猶蓋也殛誅也鯀禹父夫臧否異人故賞罰異施聖王以其心公天下而不私故賞罰以其人不以其類也故大舜於鯀則殛之於禹則興之豈繫於世類哉臼季與冀缺同升諸公其庶乎得聖人之義矣哉晉語趙宣子曰吾聞事君者比而不黨夫周以舉義比也舉以其私黨也臣若水通曰阿私曰黨忠信為周夫進退賢否是非以公君相之事也匪義比焉則入於私黨矣趙宣子比而舉韓獻子不負所舉兩得之矣晉語陽畢言於平公曰明訓在威權威權在君君掄賢人之後有常位於國者而立之亦掄逞志虧君以亂國者之後而去之是遂威而逺權民畏其威而懷其德莫能勿從若從則民心皆可畜畜其心而知其欲惡民孰偷生若不偷生則莫思亂矣臣若水通曰掄選也君謂平公悼公之子彪也常位謂世有功烈而中微者遂申也逺權謂權及後嗣也畜養也言皆可畜養而教導之也偷茍也夫人君之治天下國家也在明訓明訓之行也在威權明訓以令之威權以勵之則威德並行而民勸於善莫敢不善矣陽畢勸平公以舉措之權可謂達為國之要者歟為人君宜取法焉周威烈王二十三年魏文侯謂李克曰先生嘗有言曰家貧思賢妻國亂思良相今所置非成則璜二子何如對曰居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣文侯曰先生就舍吾之相定矣李克出翟璜曰君召卜相果誰為之克曰魏成璜忿然曰西河守吳起臣所進也君內以鄴為憂臣進西門豹君欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傳臣進屈侯鮒以耳目所睹記臣何負於魏成克曰魏成食祿千鍾什九在外什一在內是以東得卜子夏田子方假干木此三人者君皆師之子所進五人君皆臣之子惡得與魏成比也璜再拜曰璜鄙人也願卒為弟子臣若水通曰大臣以薦賢為功者也故其薦大賢者其功大薦小賢者其功小其功大者受上賞其功小者受下賞則大臣孰不知進賢而賢才孰不欲自效哉今之進人者遺其大而用其小是自小其功也翟璜所舉豈足與子夏之徒為等匹哉以是卜相受上賞矣然璜再拜而自稱鄙人不難於自屈其亦賢於子方之驕人干木之迫切者歟安王二十五年子思言茍變於衛侯曰其才可將五百乘公曰吾知其可將然變也嘗為吏賦於民而食人二雞子故弗用也子思曰夫聖人之官人猶匠之用木也取其所長棄其所短故杞梓連抱而有數尺之朽良工不棄今君處戰國之世選爪牙之士而以二卵棄干城之將此不可使聞於鄰國也公再拜曰謹受教矣臣若水通曰周公無求備於一人其使人也器之故隨材而用木者大匠之職也隨才而用人者君相之職也子思之言可以為萬世人君大臣用人者之法矣周顯王十四年齊威王魏惠王㑹田於郊惠王曰齊亦有寶乎威王曰無有惠王曰寡人國雖小尚有徑寸之珠照車前後各十二乘者十枚豈以齊大國而無寶乎威王曰寡人之所以為寶者與王異吾臣有檀子者使守南城則楚人不敢為寇泗上十二諸侯皆來朝吾臣有盻子者使守髙唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七十餘家吾臣有種首者使備盜賊則道不拾遺此四臣者將照千里豈特十二乘哉惠王有慚色臣若水通曰於此可以占齊魏之彊弱也書曰玩人喪德玩物喪志魏惠王以之楚書曰楚國無以為寶惟善以為寶威王以之威王不惟寶得其人而又烹阿大夫封即墨且審於用人此齊國所以日彊也其後不悟奸人之計而多受間金王賁捽入而卒至於亡彼一齊也前以審人而彊後以不審人而失有國家者可不鑒諸赧王三年燕昭王謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士與共國以雪先王之恥孤之願也先生視可者得身事之隗曰古之人君有以千金使涓人求千里馬者馬已死買其骨五百金而返君大怒㳙人曰死馬且買之况生者乎馬今至矣不期年千里之馬至者三今王必欲致士先從隗始况賢於隗者豈逺千里哉於是昭王為隗改築宫而師事之於是士爭趨燕樂毅自魏往劇辛自趙往昭王以樂毅為亞卿任以國政臣若水通曰天下之風感應而已矣故人君好賢則天下之賢應之人君而好佞則天下之佞亦應之故人君好賢惡佞則其感應之速不旬月而風天下矣燕得樂毅破齊以雪先人之恥蓋由燕王之師郭隗以風動之也况有道之君能以所知之賢才而善用之則四海之賢風動響應皆有帝臣之願不期然而然者矣天下何難於治哉漢髙帝五年夏五月帝置酒洛陽南宫上曰徹侯諸將毋敢隱朕皆言其情吾所以有天下者何項氏之所以失天下者何髙起王陵對曰陛下慢而侮人項氏仁而愛人然陛下使人攻城略地因以與之與天下同其利項羽妬賢嫉能有功者害之賢者疑之此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中决勝千里之外吾不如子房鎮國家撫百姓給餉餽不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此所以取天下也項羽有一范增而不能用此所以為我禽也羣臣悅服臣若水通曰書云知人則哲能官人故用人由於知之深也髙祖論三人之賢而皆自以不如哲足以知之矣故能用之以興帝業項羽之於范增不能用之者雖出於嫉忌之私亦其知之不深也然而髙帝不如之言中亦不無畏憚之心乎此韓信之所以不終也於子房功成智隱固有所不及矣漢哀帝建平三年四月王嘉為丞相嘉以時政苛急郡國守相數有變動乃上疏曰孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有茍且之意其後稍稍變易公卿以下或居官數月而退中材茍容求全下材懷危內顧唯陛下留神於擇賢記善忘過此方今急務也臣若水通曰天地恆久而萬物化生聖人久於道而天下化成久任之說善矣然後世徒知久任之善而不知本則其敗壞又有甚焉茍得善人而久其任則百年而澤愈深茍得惡人而久任焉則其殃民蓋不能旦夕堪者時日曷喪之怨可勝道耶故王嘉之疏有曰擇賢曰記善曰忘過三者其本矣蓋得賢而不記其善記善而不忘其過則賢者不樂於從事茍不擇賢則無可記之善而徒忘其過焉殃民之禍有所不堪矣故三者備矣而行久任之法可也不知務此而徒以久任望其成功烏能保其子孫之皆賢也哉光武建武十一年帝以扶風郭伋為漁陽太守伋承離亂之後養民訓兵開示威信盜賊銷散胸奴逺跡在職五年户口增倍後為并州牧過京師帝問以得失伋曰選補衆職當簡天下賢俊不宜專用南陽人是時在位多鄉曲故舊故伋言及之臣若水通曰立賢無方旁求俊彥此湯之所以王也四海之內四海之外茍有賢者斯用之矣夫用賢任官以為天下之民也非以為鄉曲故舊也光武之用人既以鄉曲故舊至於任公卿之重皆以圖䜟焉謂之賢君猶有此憾也其所以復舊物至小康者㑹時勢之易然爾郭伋其賢矣哉章帝元和元年陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疏咎在州郡有詔下公卿朝臣議大鴻臚韋彪上議曰國以簡賢為務賢以孝行為先是以求忠臣必於孝子之門忠孝之人持心近厚煆鍊之人持心近薄士宜以才行為先不可純以閥閲然其要歸在於選二千石二千石賢則貢舉皆得其人矣彪又上疏曰天下樞要在於尚書尚書之選豈可不重帝皆納之臣若水通曰以閥閲用人亦當時之弊而末世所同也韋彪簡賢以孝行之說可謂近古矣夫為治莫先於用賢得賢又係於薦舉而薦舉則在二千石尚書也使任是二職者果賢則薦舉公賢才進而天下治矣然則人君欲圖治者用人必先於德行而責成於舉主然後可也漢安帝延光元年汝南太守王龔好才愛士以袁閬為功曹引進郡人陳蕃黃憲等憲雖不屈蕃遂就吏潁川荀淑遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閬所問曰子國有顔子寧識之乎閬曰見吾叔度耶時同郡戴良才髙倨傲而見憲未嘗不正容及歸罔然若有失也陳蕃及周舉常相謂曰數月之間不見黃生則鄙吝之萌復存乎心矣太原郭泰少遊汝南先過袁閬不宿而退進往從憲纍日方還或以問泰泰曰奉髙之器譬諸泛濫雖清而易挹叔度汪汪若千頃波澄之不清淆之不濁不可量也臣若水通曰東漢諸賢黃憲其最髙乎而郭泰徐稚次之陳蕃次之若憲者觀其氣象渾然見者化服使在聖門當居顔氏之科矣使當時有君知之如閬淑諸人之明則必舉憲為相以稚泰為傅以蕃等為卿大夫則論道治事有人而漢非止過西都而已矣奈何時之不臧反以黨錮而憲泰徐稚獨不與焉亦可觀人品之髙下哉順帝陽嘉元年尚書令左雄上書曰昔宣帝以為吏數變易則下不安業久於其事則民服教化其有政治者輒以璽書勉勵增秩賜金公卿缺則以次用之是以吏稱民安漢世良吏於兹為盛臣愚以為守相長吏惠和有顯效者可就增秩勿移徙雄又上言孔子曰四十不惑禮稱彊仕請自今孝亷年不滿四十不得察舉若有茂才異行如顔淵子竒自可不拘年齒帝從之久之廣陵所舉孝廉徐淑年未四十臺郎詰之對曰詔書曰有如顔回子竒不拘年齒是故本郡以臣充選郎不能屈左雄詰之曰顔回聞一知十孝廉聞一知幾耶淑無以對乃罷却之臣若水通曰左雄名卿也其論守相長吏久任之制入仕之年皆先王遺意雖百世可行矣自是察選公平多得其人也宜哉為人君者其尚有考於斯云桓帝延熹二年尚書令陳蕃上疏薦五處士豫章徐稚彭城姜肱汝南袁閎京兆韋著潁川李曇帝悉以安車𤣥纁備禮徵之皆不至蕃性方峻不接賔客唯稚來特設一榻去則懸之帝又徵安陽魏桓其鄉人勸之行桓曰夫干祿求進所以行其志也今後宫千數其可損乎廄馬萬匹其可減乎左右權豪其可去乎皆對曰不可桓乃慨然嘆曰使桓生行死歸於諸子何有哉遂隱身不出臣若水通曰徐稚姜肱袁閎韋著李曇皆一世之名賢也陳蕃舉之可謂薦賢為國矣而皆徵不至焉及徵魏桓而卜其不可行者三為人君者聞之亦可以愧矣獻帝建安十五年劉備以從事龎統守耒陽令在縣不治免官魯肅遺備書曰龎士元非百里才也使處治中别駕之任始當展其驥足爾諸葛亮亦言之備見統與善談大器之遂用統為治中親待亞於諸葛亮臣若水通曰士每伸於知己而屈於不知己龎統固非百里之才然無魯肅孔明之薦則終於免官矣何以致昭烈之器重而大任之哉後之公舉錯者不可以不審也建安十九年備之自新野奔江南也荆楚羣士從之如雲而劉巴獨北詣魏公操諸葛亮以書招之巴不從備深以為恨巴遂入蜀依劉璋備攻成都令軍中曰有害巴者誅及三族及得巴甚喜是時益州郡縣皆望風景附獨黃權閉城堅守須璋稽服乃降於是董和黃權李嚴等本璋之所授用也吳懿費觀等璋之婚親也彭羕璋之擯棄也劉巴夙昔之所忌恨也備皆處之顯任盡其器能有志之士無不競勸益州之民是以大和臣若水通曰賢人者衆人之心也故用得其賢則億兆之心歸之矣故君任賢則享天下之福也昭烈擢用西土賢士各盡其能而一時人才樂用州人大和使其不早世則中原舊物可復矣豈但三分之業而已哉建安二十三年初犍為太守李嚴辟楊洪為功曹嚴未去犍為而洪已為蜀郡洪舉門下書佐何祗有才䇿洪尚在蜀郡而祗已為廣漢太守是以西土咸服諸葛亮能盡時人之器用也臣若水通曰君子用人如用器惟其宜而已矣楊洪李嚴之所辟也而守蜀則及於嚴之在犍為何祗楊洪之所舉也而守廣漢則及洪之在蜀用人惟其器而已而何以拘拘於資格為哉此西土之所以咸服諸葛亮能盡器用也吁其可以為君相用人之法矣晉孝武帝太元二年十月朝廷方以秦冦為憂詔求文武良將可以鎮禦北方者謝安以兄子𤣥應詔郗超聞之歎曰安之明乃能違衆舉親𤣥之才足以不負所舉衆以為不然超曰吾嘗與𤣥共在桓公府見其使才雖履屐未嘗不得其任是以知之𤣥募驍勇之士得彭城劉牢之等數人以牢之為參軍常領精鋭為前鋒戰無不捷時號北府兵敵人畏之臣若水通曰安所謂內舉不避親者也可不謂公乎安之不以嫌疑違衆而舉𤣥𤣥之運籌决䇿不負其所舉晉雖偏安猶有鞏固之勢固不待出兵臨敵而識者已知决勝千里矣齊明帝建武三年魏主宏與羣臣論選調曰近世髙卑出身各有常分此果何如李冲對曰未審上古以來張官列位為膏梁子弟乎為致治乎帝曰欲為致治爾冲曰然陛下何為專取門品不拔才能乎帝曰茍有過人之才不患不知然君子之門借使無當世之用要自德行純篤朕故用之冲曰傅說吕望豈可以門地得之帝曰非常之人曠世乃有一二爾祕書令李彪曰陛下若專取門地不審魯之三卿孰若四科著作佐郎韓顯宗曰陛下豈可以貴襲貴以賤襲賤帝曰必有髙明卓然出類拔萃者朕亦不拘此制頃之劉昶入朝帝謂昶曰或言唯能是寄不必拘門朕以為不爾何者清濁同流混齊一等君子小人名器無别此殊為不可我今八族以上士人品第有九九品之外小人之官復有七等若有其人可起家為三公正恐賢才難得不可止為一人渾我典制也臣若水通曰司馬光云選舉之法先門第而後賢才此魏晉之深弊而歷代相因莫之能改也夫君子小人不在於世祿與側微以今日視愚知所共知也當是之時雖魏孝文之賢猶不免斯弊故夫明辨是非而不惑者誠亦難矣陳武帝永定三年六月周左光祿大夫猗氏樂遜上言四事其三曰選曹補擬宜與衆共之今州郡選置猶集鄉閭况天下銓曹不取物望既非機事何足可密臣若水通曰樂遜之言是也古昔用人由鄉里而大司徒凡七八升而至于天子之朝雖欲非賢不可得也後世黜陟之幾由諸文藝舉措之權付之銓司雖曰一時之進用亦或當才而私情好惡亦豈少邪噫好惡以私而欲得用舍之正不亦難乎雖然知州郡者在冢宰知冢宰者在人君取人以身此又在人君之知學格物通卷六十四
