body:
  text: 格物通卷二十一明湛若水撰修身格凡三目正威儀慎言動進德業臣若水序曰修身何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也故大學舊本以修身申格物曰此謂知本此謂知之至也於身焉而至之也至其身之理也是故威儀也言動也德業也皆身之事也人主讀是編焉感通吾身之理念念而知於斯存存而行於斯以有諸己則格物之功庶乎於修身焉而盡之矣正威儀上易小畜象曰風行天上小畜君子以懿文德臣若水通曰宋儒朱熹云風有氣而無質能畜而不能久故不能如大畜多識前言往行以畜德也故為小畜之象文德者文章之外著威儀文辭皆德之流裔故曰文德文章者末也德者本也本末合一其文王孔子之至文乎美其文德雖不離於道而未一於道然下一等則如成帝之威儀非不足觀也本之則無如之何故人君之學必由中以達外震彖傳震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也臣若水通曰邇也下程頥朱熹皆以為脫不喪匕鬯四字夫雷聲震乎百里逺者驚而邇者懼內失其守外忒其儀也威儀也者本諸誠敬以為之主也致祭者灌以降神之時誠敬之至於震驚之甚而不喪失匕鬯其威儀不忒如是而為宗廟社稷之祭主不亦宜乎人君之敬無往而不存故威儀無時而不正也其於祭祀之時尤致謹可也非謹於威儀也敬主於中而威儀外肅矣書周書顧命曰思夫人自亂于威儀爾無以釗冒貢于非幾臣若水通曰此成王顧命羣臣輔康王之言也威者有威可畏儀者有儀可象舉一身之則而言人受天地之中以生是以有動作威儀之則亂喪也釗康王名貢進也幾者動之微善惡之所由分也人之自喪威儀而身之不修蓋由心有不善之幾所發爾故戒羣臣毋以康王進乎不善之幾也為人君者可不慎其幾以正威儀乎詩大雅抑抑威儀維德之隅人亦有言靡哲不愚庶人之愚亦職維疾哲人之愚亦維斯戾臣若水通曰抑抑恭遜之貌隅廉隅也夫內外一理也威儀之恭遜者是其德必嚴正如宫室之制內有繩直則外有廉隅也曾子之言正顔色動容貌孟子之言睟於面盎於背正動而睟盎焉者以其德之存於中者有本如是也武公為此詩其亦知內外合一之道乎故易曰和順積中英華發外中庸曰誠則形形則著著則明孟子曰動容周旋中禮盛德之至也皆此之謂也以此觀之文末也德本也然則専事於德乎曰偏於內而忘其外非內外交養之道也故古之君子周旋必中規折旋必中矩趨以采齊行以肆夏出必鳴鸞行必佩玉所以敬其儀者敬其德也知所以敬德則知合內外之道而修身格物之功備矣魯頌泮水穆穆魯侯敬明其德敬慎威儀維民之則臣若水通曰魯侯之明德以化民頌曰敬慎威儀何哉蓋德化之本也儀者德之符也德藴於中而無迹儀著於外而可觀一或有愆旦失色於朝暮傳笑於國人將易之何以為法於民哉故古之賢君必慎其德由中達外其在朝廷垂衣裳負斧扆執言在左執史在右凜乎不敢肆雖在宫寢猶其在朝廷動止必臧衣冠必整一顰一笑必自愛焉凡俳戲褻慢之事不足以動天顔之一顧則威儀正矣使民望其顔色而化之則而象之畏而敬之人君之於威儀豈細故哉後之人主乃不慎乎此或岸幘箕踞或不冠可奏或鷂匿懷中其於威儀何如哉蓋由不愛其身故內外不檢爾春秋昭公二十五年齊侯唁公于野井臣若水通曰胡安國云齊侯唁公于野井以遇禮相見孔子曰其禮與其辭足觀矣然則何以失國而不反乎禮有本末正身治人禮之本也威儀文辭禮之末也昭公喪齊歸無戚容而不顧娶孟子為夫人而不命政令在三家而不能取有子家子之賢而不能用而屑屑焉習儀以亟能有國乎雖齊侯來唁其禮與辭是矣而方伯連帥之職則未修也又豈所以為禮哉臣謂禮有本末文質誠主於中而達之於儀文是謂文質彬彬能以禮讓為國也何有否則周旋儀文之度偽而已矣其如禮何哉其如國何哉禮記曲禮曰天子穆穆諸侯皇皇大夫濟濟士蹌蹌庶人僬僬臣若水通曰此言人君當敬其威儀以為臣民之則也蓋人君一身諸侯大夫士庶人之望茍無威儀臣下將何所法哉故孟子見梁襄王而語諸人曰望之不似人君就之而不見所畏焉蓋言無威儀也穆穆敬也深逺之貌也詩曰穆穆文王於緝熙敬止是敬止乃穆穆之本人君能敬則穆穆之儀自形而諸侯望之自將皇皇而美大夫士望之自將濟濟蹌蹌而有容至於庶人雖無與為禮亦將僬僬而趨走促數於下矣中庸曰篤恭而天下平言德容之化也茍不此之務而徒以端冕凝旒深居髙拱不動聲色為穆穆焉則淺矣是不可以不慎也曲禮曰國君不乘奇車車上不廣咳不妄指臣若水通曰國君者國人之瞻望在車尤為衆人之視聽而威儀不可以不慎也故奇邪不正之車也廣咳駭人之聽也妄指手容之失也非所乘而乘非所咳而咳非所指而指皆在車威儀之失也一車且不可不正其儀況臨御之時乎曲禮曰若夫坐如尸立如齊臣若水通曰如尸則莊也如齊則敬也莊敬者威儀之則而修身之本也玉藻曰凡行容惕惕又曰足容重手容恭目容端口容止聲容靜頭容直氣容肅立容德色容莊臣若水通曰形色天性也不充其性則形不可得而踐矣故君子一身之間曰惕曰重曰恭曰端曰止曰靜曰直曰肅曰德曰莊所以盡性踐形也玉藻曰燕居告溫溫凡祭容貌顔色如見所祭者喪容纍纍色容顛顛視容瞿瞿梅梅言容繭繭戎容暨暨言容詻詻色容厲肅視容清明臣若水通曰此言容貌隨所寓而變蓋溫溫和易者燕居告語之容也如見所祭者祭容也纍纍而羸憊顛顛而不舒瞿瞿而驚遽梅梅而茫昧繭繭而低微者皆喪容也暨暨而果毅詻詻而整飭嚴厲而莊肅瑩徹而明審者皆戎容也夫容一也隨所在而變者何也主於中者隨感而見也可以見君子慎威儀之至矣孔子間居曰威儀棣棣不可選也無體之禮也臣若水通曰此引弼風柏舟之詩以明無體之禮之意詩言仁人威儀之盛周旋中禮不可選擇夫子釋之以謂威儀之著雖時乎因禮以形然齊莊於間燕之時亦無往而非禮也非無體之禮乎觀於此言則凡人君色莊於臨御之時而怠慢於深宫獨處之地者可以警矣少儀曰言語之美穆穆皇皇朝廷之美濟濟翔翔祭祀之美齊齊皇皇車馬之美匪匪翼翼鸞和之美肅肅雍雍臣若水通曰穆穆和敬也皇皇正大也濟濟和整也翔翔舒張也齊齊致一也皇皇如有求也匪匪翼翼嚴正也肅肅雍雍亦和嚴也美者有儀也在言語則和敬而正大矣在朝廷則和整而舒張矣在祭祀則致一而有求矣在車馬則嚴以正矣在鸞和則和以敬矣然而皆原於德矣容儀之美德之符也周禮秋官司儀掌九儀之賓客擯相之禮以詔儀容辭令揖讓之節將合諸侯則令為壇三成宫旁一門詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓及其擯之各以其禮公於上等侯伯於中等子男於下等其將幣亦如之其禮亦如之臣若水通曰容貌等威各有攸當皆天理也有一失焉則其儀忒而天理滅矣出接賓曰擯入贊禮曰相諸侯有事而會不可茍也故有儀容辭令揖讓之當詔告者又必三重其壇壇外之宫每旁一門凡此欲諸侯之有處所也及諸侯相見之儀又不可槩施也故俯手揖之則謂之土揖見庶姓之儀也平手揖之則謂之時揖見異姓之儀也舉手揖之則謂之天揖見同姓之儀也及其擯之各以其爵之尊卑為禮之隆殺故處公於上等處侯伯於中等處子男於下等自有不容紊者而於幣帛之將祼將之禮亦若是而已噫此豈小哉一有所失則威不振威不振則禍隨之矣而況於辱乎夏官道右掌前道車王出入則持馬陪乘如齊車之儀自車上諭命于從車詔王之車儀臣若水通曰道車王常行大道之車謂象路也王之出入乘則持馬行則陪乘皆如齊車之儀也王行則以車從王有命焉則道右宣王命以諭之也然則車儀如何知升車必正立執綏車中不妄指立視五嶲式視馬尾是也尤必有待於詔告之何也正欲其周旋中禮而端嚴若神矣吁一登車之儀如此況夫在朝蒞政之時乎論語子曰君子不重則不威學則不固臣若水通曰此孔子言君子自修之道也重內厚重也威謂外威嚴也內外相符誠不可掩故內不主敬則內不重矣故其發於容貌動作者必無可畏之威而所學不能得之心身安能動靜堅定而固乎故曾子告孟敬子以動容貌正顔色出辭氣夫動正出由中發外者也故君子以內重為貴曾子曰動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣臣若水通曰此曾子垂沒之言所以告魯之孟敬子者也夫人一身之間固不外乎容貌顔色辭氣而已惟無平日涵養之功固有容貌不免於暴慢顔色不免於偽為辭氣不免於鄙倍者矣茍涵養之功既至則其動由中動正由中正出由中出何有於暴慢不信而鄙倍者哉此見曾子篤實之學有得於一貫之傳者也然敬子為魯之大夫特舉以告之正欲其知修身之要為政之本而知所重焉惜乎敬子不能問以求其用力之要也噫子曰非禮勿視非禮勿聽非禮勿言非禮勿動臣若水通曰此聖人告顔子克己復禮之目如此固非徒使之制乎其外而已也蓋視聽言動皆身之儀見乎其外而其所以視聽言動之者則心也故勿之者亦心也一念之微涉於非禮而即有以勿之則所謂不逺復無祗悔由乎中而應乎外心體威儀之間無適而非天理之流行矣君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎臣若水通曰衣冠瞻視固皆威儀之著見也然威儀者德之表固非聲音笑貌之所能為也故君子之正衣冠尊瞻視而臨民以莊者皆實德自然之形見而民自望而畏焉爾何猛之有哉有德以發之故威而不猛使有意於作威則猛而反害於威矣漢之成帝臨朝淵默尊嚴若神史氏稱其有穆穆天子之容然湛於酒色則其所謂威儀者亦矯飾於外而已爾豈所以為修身之道哉孟子曰動容周旋中禮者盛德之至也臣若水通曰威儀者德之符也禮也者理也動容周旋中禮則無非天理之流行矣故曰禮儀三百威儀三千無一而非性也又曰自無聲無臭散而為三千三百自三千三百復歸於無聲無臭程子之言蓋與此契矣其知一本之道乎中庸齊明盛服非禮不動所以修身也臣若水通曰盛服動作皆威儀之外見者也齊一明清德之存於中者也是合內外之道也身之所以為身二者而已其致一也修身之道豈有外此哉中庸曰修身則道立至於九經則又以修身為之本為人君有天下之責者可不講哉格物通卷二十一
