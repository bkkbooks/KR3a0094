body:
  text: 格物通卷九十八明湛若水撰恤窮下賈誼新書曰楚昭王當房而立愀然有寒色曰寡人朝飯餟醇酒二觛重裘而立猶憯然有寒氣奈我元元之百姓何是日也出府之裘以衣寒者出倉之粟以賑飢者臣若水通曰古之人所以大過人者善推所為而已楚昭王能推己以及於民因其寒而賜之以裘因其飢而賜之以粟可謂有仁恕之心矣此其所以大得民心而克復舊物也歟陸贄奏議告德宗曰昔子夏問於孔子曰何如斯可謂人之父母孔子對曰四方有敗必先知之斯可謂人之父母矣蓋以君人之道子育為心雖深居九重而慮周四表雖恆處安樂而憂及困窮近取諸身如一體之於四肢其疾病無不恤也逺取諸物如兩曜之於萬類其鑒照無不均也故時有凶害而人無流亡恃天聽之必聞知上澤之必至是以有母之愛有父之尊古之聖王能以天下為一家中國為一人用此術也今水潦為敗綿數十州奔告於朝日月相繼若哀其疾苦固宜降㫖優矜儻疑其詐欺亦當遣使巡視安可狥往來之浮說忘惠恤之大猷失人得財是將焉用臣若水通曰天地民物一體者也其感應神速痛癢相關陸贄一體四肢兩曜萬類之言其必有見於此矣茍有痛癢感應之心則民之旱潦窮苦無不兼知則亦無不兼惠矣德宗刻薄好用聚斂之臣其視窮民之無告若秦人視越人之肥瘠而恝然不相關者以其無一體之仁也後之為君者宜味陸勢之言由是以達於聖人仁民之道可焉韓愈曰臣伏以今年已來京畿諸縣夏逢亢旱秋又早霜田種所收十不存一陛下恩踰慈母仁過春陽租賦之間例皆蠲免所徴至少所放至多上恩雖宏下困猶甚至聞有棄子逐妻以求口食拆屋伐樹以納稅錢寒餒道塗斃踣溝壑有者皆以輸納無者徒被追徴臣愚以為此皆羣臣之所未言陛下之所未知者也臣竊見陛下憐念黎元同於赤子至或犯法當戮猶且寬而宥之况此無辜之人豈有知而不救又京師者四方之腹心國家之根本其百姓實宜倍加優恤今瑞雪頻降來年必豐急之則得少而人傷緩之則事存而利逺伏乞特敕京兆府應今年稅錢及草粟等在百姓腹內徴未得者並且停徴容至來年蠶麥庶得少有存立臣至陋至愚無所知識受恩思效有見輒言無任懇欵慙懼之至臣若水通曰韓愈此疏所以欲寬恤窮民如是其懇切者何也蓋君民一體安危同機故書曰四海困窮天祿永終夫百姓既窮君有不能以獨安富者矣此韓愈所以欲廣君之仁而於飢民致厪夫優恤之請也元仁宗延祐四年七月賜衛士錢帛帝出見衛士有弊衣者駐馬問之對曰戍守邊鎮餘十五年以故貧耳帝曰此輩久勞於外留守臣未嘗以聞非朕親見何由知之自今有類此者必言於朕因命賜之錢帛臣若水通曰元仁宗見衛士弊衣詢知其戍邊之苦而賜之錢帛可謂有惻隱之心恤窮之實矣其與禹見罪人而泣之湯見網而解之其心何以異哉然禹湯行仁政而澤及天下而仁宗不能然者何也其不忍人之心一也能擴充與不能擴充是以異耳故人君垂旒蔽目懸纊塞耳而無所不知不見仁澤覆天下者自其本心而推之不在乎見聞之狹也故人君貴乎有恤民之大政而不貴乎分財之小惠焉宋儒張載西銘曰民吾同胞物吾與也又曰凡天下之疲癃殘疾惸獨鰥寡者皆吾兄弟之顛連無告者也臣若水通曰天地萬物本吾一體者也是萬物皆吾同得於天所與之氣故曰吾與而民尤同吾得天地之正氣於吾並生之中乃為同類而至貴者故曰同胞曰同胞則視之如己之兄弟矣而天下之逺兆民之衆有疲癃殘疾惸獨鰥寡之人皆我兄弟之中顛連無告者然則知疲癃殘疾惸獨鰥寡皆吾之同氣則其哀恤之情根於天性自有所不能已者矣程皓在神宗時言不可賣祠部添常平本錢事王安石曰皓所言未達王道之權也男女授受不親禮也嫂溺援之以手權也嫂溺不援是豺狼也今祠部所可致粟四五十萬若凶年人貸三石可得全十五萬性命今欲為凶年計當以凶嵗為之而國用有所不暇故賣祠部所剃三千人頭而所可救活者十五萬人性命若以為不可是不知權也臣若水通曰王安石主賣祠部之說自附於恤窮救荒之權矣臣恐窮未及恤而所以益天下之窮者至矣故楊時曰鬻祠部三千蓋六十餘萬緡固非三千人所能自具也取之於力本之民而已由是得以不蠶而衣不耕而食亦取資於力本之民而已故其徒益繁則其蠧益甚是未及賑飢而先困吾民以資游手也先王之時三年耕必有一年之積故凶年飢嵗民免於死亡以其豫備故也不知為此乃欲髠其人而取其資以是為賑飢之術正孟子所謂雖得禽若丘陵弗為也以是為王道之權豈不謬哉詩云誰生厲階至今為梗王安石之謂乎楊時經筵講義有云古之聖人以天下為心其於居食之際非徒若是而已食而飽必思天下之有未飽者居而安必思天下之有未安者臣若水通曰楊時言一食一居必思天下之未安飽者所以養人君恤民之仁也夫惟飲食起居而不忘天下之窮民則無事必思所以加惠之有災必能有以恤賚之則雖不能使天下皆飽皆安也而安飽之政可由是而推行矣否則素無所養一旦遇天下之災其能沛然行寬恤之惠乎是故人君之心在於素養矣楊時糴買劄子有云産絹縣分每匹不下二千三百足錢而上户有敷及百餘匹者民力固未易辦矣又有非時拋買如燕山絲絹之類所須不一秋成榖未上場而催科之吏及門矣力耕之民日食糠粃而輸官常恐不足欲民之不流亡不可得也臣若水通曰孟子云有粟米之征有布縷之征有力役之征君子用其一而緩其二用其二而民有莩用其三而父子離蓋言取之非其時則民力不堪而困窮極矣人君恤窮之政在寬之而已矣楊時之論誠救弊之良劑也為人君者盍思所以恤其流亡之苦而加之意哉王柏論社倉利害有云淳熙八年朱熹申請社倉指揮若曰其斂散之事與本鄉耆老公共措置州縣並不須干預抑勒至哉言乎此行法者所當共守也今也不然領以縣官主以案吏各鄉又非有德望之人為官吏之所畏敬者俯首聽命茍且逃責利害不敢専决姦弊不敢自懲玩舞虛文壅塞實意吏既慕於前權宜伸縮隨時輕重吏則議其後故賢者不屑與之相抵牾也此立法之不審一也昔之法也先給以米貸以米斂亦以米今也不然斂以錢科以糴若能薄增厥直亦何患民之不樂輸哉價既不平榖不時至勢必至於數擾以抑勒人情之所不堪小民未受其利中産先被其害此立法之不審二也後之繼者慮既貸而民不盡償則社倉之惠窮而追呼之害起矣臣若水通曰法之立也將以為民法之行也反以病民豈其心固如是哉社倉之設本以恤窮也及其官吏承行之弊輸擾抑勒而有追呼之害者安在其能恤窮也况夫人君舉動關天下之欣戚又非一郡邑之比矣其立法行惠可不慎哉國朝戊戌十二月庚辰太祖自宣至徽召故老耆儒訪以民事有儒士唐仲實姚璉者來見太祖問曰喪亂以來民多失業其心望治甚於飢渴吾深知之仲實對曰自大軍克復民獲所歸矣以今日觀之民雖得所歸而未遂生息太祖曰此言是也我積少而費多取給於民甚非得已然皆為軍需所用未嘗以一毫奉巳民之勞苦恆思所以休息之曷嘗忘也仲實等曰誠如是民之生息可待矣太祖曰有不便盍盡言之仲實等皆拜謝乃賜諸父老布帛撫慰之而去臣若水通曰文王發政施仁必先窮民恤窮者治天下之首務也我太祖高皇帝方大軍之後即召耆儒訪知民未遂生即念民之勞苦思所以休息之是心也非堯舜其猶病諸之心乎此萬世人君之所當法也洪武元年七月謂中書省臣曰中原兵難之後老稚孤貧者多有失所宜遣人賑恤之省臣以國用不足為對太祖皇帝曰得天下者得民心也夫老者民之父母幼者民之子孫恤其老則天下之為子孫者恱恤其幼則天下之為父母者恱天下之老幼咸恱其心有不歸者寡矣茍視其困窮而不之恤民將憮然曰惡在其為我上也故周窮乏者不患無餘財惟患無是心能推是心何憂不足今日之務此最為先宜速行之臣若水通曰有天下者有其民也有其民者得其心也夫得民之心何心哉亦惟遂其老老幼幼之願焉耳惟我太祖皇帝明見萬里視天下之民瘼如在目前故不以國用之不足而阻其勤恤之心也伏惟聖明推是心以往則民懷於有仁而無疆之休與天地同其久矣國朝太祖皇帝肇基五年詔天下郡縣立孤老院凡民之孤獨殘疾不能自生者許入院官為贍養每人月米三斗薪三十斤冬夏布一匹小口給三分之二後改孤老院為養濟院其初著之於令曰凡鰥寡孤獨每月給米每嵗給布務在存恤監察御史按察司官常加體察既而著之於律曰凡鰥寡孤獨及廢疾之人貧窮無親屬依倚不能自存所在官司應收養而不收養者杖若應給衣糧而官吏尅减者以監守自盜論又申之以憲綱曰存恤孤老仁政所先仰府州縣所屬凡有鰥寡孤獨廢疾無依倚之人俱收於養濟院常加存恤合得衣糧依期按月支給毋令失所遇有疾病督醫治療臣若水通曰我聖祖於登極之五年即有恤窮之制是即文王發政施仁必先鰥寡孤獨之仁心也使臣下常奉承德意以施行之而不失則仁政之澤可以被於無窮矣是故鰥寡孤獨歸於養濟俾得其所也嵗有衣糧俾不困於飢寒也有司時察防吏姦也應收而不收則杖應給而吏尅減者論以自盜嚴其法也督醫治疾冀其生也仁之至義之盡矣然法久而弊生養濟雖有其名而在京在外乞丐之人盈於道路豈吏之奉法寖弊而無力者不得以入院乎未可知也伏惟聖明體太祖恤窮之仁則堯之不虐無告在是矣國朝太祖登極七年詔天下曰曩因天下大亂死者不可勝數朕日夕慮上帝有責思之再三民間流離避亂父南子北至今不能㑹聚或子殁親老而無養親殁子幼而無依皆朕之過也今詔天下有司具名以言朕當㑹居存養使不失所臣若水通曰兵亂之際流離死徙骨肉不顧誠甚可憫也詩曰哿矣富人哀此煢獨我太祖之心切於仁民故下恤窮之詔拳拳以窮民無依失所為已過而必使有司疏名㑹居存養焉書曰痌瘝乃身其我太祖之謂乎洪武八年正月上命中書省令天下郡縣訪窮民無告者月給以衣食無所依者給以屋舍仍諭之曰天下一家民猶一體有不獲其所者當思所以安養之昔吾在民間目擊其苦鰥寡孤獨飢寒困踣之徒常自厭生恨不即死如此者宛轉於溝壑可坐而待也吾亂離遇此心常惻然故躬提師旅誓清四海以同吾一家之安今代天理物已十餘年若天下之民有流離失所者非惟昧朕之初志於代天之工亦不能盡也爾等為輔相當體朕懷不可使天下有一夫之不獲也臣若水通曰孟子云先王有不忍人之心斯有不忍人之政矣我太祖皇帝方在民間親見鰥寡孤獨之困苦心常惻然則存不忍人之心久矣故五年下詔七年下詔及此八年又以命中書省訪窮民無告者給之衣糧屋舍焉非所謂不忍人之政乎噫可以為萬世帝王之法矣國朝諸司職掌鰥寡孤獨之人行屬將合支衣糧依期按月關給存恤養贍母使失所御史按臨處所審問曽無支給但有欺弊即便究問臣若水通曰昔者文王不敢侮鰥寡蓋以鰥寡孤獨之人無父母妻子之養尤宜加意焉者也我祖宗設養濟之典所以恤窮民使不至於失所其即文王治岐先斯四者之政矣夫天地之大德曰生為有司者果能衣食以時乎治療以醫乎如其不然則上孤君德下絶民生可得謂之良有司哉可謂民之父母哉永樂元年閏十一月河南南陽縣言本縣民多逃徙他縣賦役無所出乞下令捕之太宗皇帝顧謂户部尚書郁新等曰人情懷土誰肯樂去其鄉河南諸郡連嵗水旱蝗螟飢饉相仍守令又鮮能盡撫綏之道不得已舉家逃徙自圖存活之計耳今其鄉田廬生業必已廢棄歸且何依捕之徒益困之耳所言不可聽臣若水通曰君猶腹心也民猶四肢也四肢疾病而腹心不知又從而抑困之非仁者也故知愛心腹者必知護其四肢矣知愛其君者則知愛其民矣南陽縣欲捕逃徙而不恤焉彼豈知忠愛之道者哉我太宗文皇帝聞而拒之曰歸且何依捕之徒益困之耳恤窮之心藹然見於言表矣臣故謹録之以為聖子神孫告焉格物通卷九十八
