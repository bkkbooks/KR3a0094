body:
  text: 格物通卷九十明湛若水撰省國費三冗官冗食冗兵冗役附隋文帝開皇三年十一月河南道行臺兵部尚書楊尚希曰竊見當今郡縣倍多於古或地無百里數縣並置或户不滿千二郡分領具僚已衆資費日多吏卒增倍租調嵗減民少官多十羊九牧今存要去間併小為大國家則不虧粟帛選舉則易得賢良蘇威亦請廢郡帝從之甲午悉罷諸郡為州臣若水通曰古之立官也所以養民今之為官也所以養於民古之養民也寡今之養於民也多此治亂之由分也况其賢不肖之不齊而盜諸民以自私者日益暴也是古之設官也將以利民今之為官也將以暴民此楊尚希之請損於隋利民之大者也後世又不但郡縣之多至於濫設之官又有不可勝計者國計安得而不困民財安得而不竭也哉伏惟聖明察其冗員而損之天下幸甚隋文帝仁夀三年史臣曰帝自奉養務為儉素乘輿御物故弊者隨宜補用自非享燕所食不過一肉後宫皆服浣濯之衣天下化之開皇仁夀之間大夫率衣絹布不服綾綺裝帶不過銅鐡骨角無金玉之飾故衣食滋殖倉庫盈溢受禪之初户不滿四百萬末年踰八百九十萬臣若水通曰儉之為德其至矣一人倡之則萬民化之一人倡之則國有餘財萬人化之則家有餘食衣食足風俗淳禮義興而户口增皆儉之效也故克勤克儉禹以之興邦而創業之君未有不法禹而興者也及至承平之主則侈肆無度蓋未睹於廢興存亡之機在儉侈之間耳人主可不監於此乎唐髙祖武德九年十一月太宗與羣臣論止盜或請重法以禁之帝哂之曰民之所以為盜者由賦繁役重官吏貪求飢寒切身故不暇顧廉耻爾朕當去奢省費輕徭薄賦選用廉吏使民衣食有餘則自不為盜安用重法邪自是數年之後海內升平路不拾遺商旅野宿焉臣若水通曰太宗去奢省費輕徭薄賦有四善焉寡欲一也足國二也裕民三也止盜四也行一事而四善集焉人君安富尊榮之道也善謀國者何憚而不為哉太宗貞觀元年二月分天下為十道初隋末喪亂豪傑並起擁衆據地自相雄長唐興相率來歸上皇為之割置州縣以寵祿之由是州縣之數倍於開皇大業之間上以民少吏多思革其弊二月命大加併省因山川形便分為十道一曰關內二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劒南十曰嶺南臣若水通曰唐太宗以民少吏多併省州縣分為十道臣謂非但為民少吏多而已吏多則食衆民少則賦煩以煩賦之民奉衆食之吏幾何而不貧以死去而為盜為亂也哉省官以節用而安民乃為治之急務也為人君者可不念之哉貞觀四年六月乙卯發卒修洛陽宫以備巡幸給事中張玄素上書諫以為洛陽未有巡幸之期而預修宫室非今日之急務昔漢髙祖納婁敬之説自洛陽遷長安豈非洛陽之地不及關中之形勝邪景帝用朝錯之言而七國搆禍陛下今處突厥於中國突厥之親何如七國豈得不先為憂而宫室可遽興乘輿可輕動哉臣見隋氏初營宫室近山無大木皆致之逺方二千人曵一柱以木為輪則戞摩火出乃鑄鐵為轂行一二里鐵轂輒破别使數百人齎鐡轂隨而易之盡日不過行二三十里計一柱之費以用數十萬工則其餘可知矣陛下初平洛陽凡隋氏宫室之宏侈者皆令毁之曾未十年復加營繕何前日惡之而今日效之也且以今日財力何如隋世陛下役瘡痍之人襲亡隋之弊恐又甚於煬帝矣上謂玄素曰卿謂我不如煬帝何如桀紂對曰若此役不息亦同歸於亂爾上歎曰吾思之不熟乃至於是顧謂房玄齡曰朕以洛陽土中朝貢道均意欲便民故使營之今玄素所言誠有理宜即為之罷役後日或以事至洛陽雖露居亦無傷也仍賜玄素綵二百匹臣若水通曰人主之於天下繫於一念敬肆之間爾敬則恭儉恭儉則土木狗馬之念不生財不傷而民安矣肆則驕奢驕奢則瓊宫瑶室之心莫制傷財而害民矣太宗初毁隋氏之宏侈而不免躬自為之豈非始敬而終肆邪不然何一人之身而前後不同也向非玄素之諫唐不免為隋矣是故天下之廣居者仁也內有廣居之居則外之宫室不足美也不然人心之欲莫甚於此而興天下之害以致覆滅者亦莫踰於此也人主可不慎歟可不求其廣居而居之歟貞觀十一年七月馬周上疏以為三代及漢歷年多者八百少者不減四百良以恩結人心人不能忘故也自是以降多者六十年少者才二十餘年皆無恩於人本根不固故也陛下當隆禹湯文武之業為子孫立萬代之基豈得但持當年而已今之户口不及隋之什一而給役者兄去弟還道路相繼然營繕不休民安得息昔漢之文景恭儉養民武帝承其豐富之資故能窮奢極欲而不至於亂使髙祖之後即傳武帝漢室安得久存乎馬周又曰貞觀之初天下飢歉斗米直匹絹而百姓不怨者知陛下憂念不忘故也今比年豐穰匹絹得粟十餘斛而百姓怨咨者知陛下不復念之多營役故也自古以來國之興亡未有不繫於百姓之苦樂也臣若水通曰馬周二疏可謂切矣以國家之治亂繫於民心以民心之向背繫於賦役以賦役之煩簡繫於營造可謂切矣惜其未能以營造之豐約繫於君心之天理人欲耳故曰正其本則萬事理人君可不求正心之學乎貞觀十一年帝幸洛陽至顯仁宫官吏以闕儲㣥有被譴者魏徴諫曰陛下以儲㣥譴官吏臣恐承風相扇異日民不聊生殆非行幸之本意也昔煬帝諷郡縣獻食視其豐儉以為賞罰故海內叛之此陛下所親見奈何欲效之乎帝驚曰非公不聞此言因謂長孫無忌曰朕昔過此買飯而食僦舍而宿今供頓如此豈得猶嫌不足乎臣若水通曰孝經云髙而不危所以長守貴也滿而不溢所以長守富也太宗於是乎幾於危與溢矣范祖禹云富而不忘貧則能保其富矣貴而不忘賤則能保其貴矣向非魏徴之諫則太宗必遂忘其貧賤之時而侈富貴之欲何以保其有乎傳曰不有君子其能國乎魏徴之謂也貞觀十一年七月乙未車駕還洛陽詔洛陽宫為水所毁者少加修繕才令可居臣若水通曰洛陽之水壞宫室固也使復少有興作則時荒費廣民不聊生為害尤甚是又洪水滔天之患也太宗四年六月因張玄素諫營繕洛陽即為罷役而云他日以事至洛陽雖露居無傷也今復令少加繕修豈前日營造之念其根復萌哉人心惟危此之謂矣貞觀二十二年六月帝以髙麗困弊議明年發三十萬衆一舉滅之或以為大軍東征須備經嵗之糧非畜乘之所能載宜具舟艦為水運隋末劒南獨無冦盜屬者遼東之役劒南復不預及其百姓富庶宜使之造舟艦帝從之七月遣右領左右府長史強偉於劒南伐木造舟艦大者或長百尺其廣半之别遣使行水道自巫峽抵江揚趨萊州偉等發民造船役及山獠雅卭眉三州獠反九月遣張士賢梁建方發隴右峽中兵二萬餘人以擊之蜀人苦造船之役或乞輸直雇潭人造船帝許之州縣督迫嚴急民至賣田宅鬻子女不能供榖價踊貴劒外騷然帝聞之遣長孫知人馳驛往視之知人奏稱蜀人脆弱不耐勞劇大船一艘庸絹二千二百三十六匹山谷已伐之木挽曵未畢復徴庸絹二事併集民不能堪宜加存養帝乃敕潭州船庸皆從官給臣若水通曰孟子云善戰者服上刑為其殃民蠧國之甚也太宗逞其喜功好大之心而不知兵行必巨費費出於民而民心離費出於官而公用窘無一可者夫以四方底定乃復爭利於海嶠小夷殘民力竭國用民脂而為之至於離散而不惜猶以皮膚而困心腹也其亦惑甚矣哉充容長城徐惠以上東征髙麗西討龜兹翠微玉華營繕相繼又服玩頗華靡上疏諌其略曰以有盡之農功填無窮之巨浪圖未獲之他衆喪已成之我軍又曰雖復茅茨示約猶興土木之疲和雇取人不無煩擾之弊又曰珍玩伎巧乃喪國之斧斤珠玉錦繡實迷心之鴆毒上善其言甚禮重之臣若水通曰太宗之初亦崇簡約矣不旋踵而事征伐崇興作尚玩好者何邪克念與罔念之間也鮮克有終此其一矣夫徐惠一婦人爾其言固可傳之萬世也後世之君豈可復蹈太宗之失而重遺徐惠之笑哉唐髙宗乾封二年六月時造蓬萊上陽合璧等宫頻征伐四夷廄馬萬匹倉庫漸虛張文瓘諌曰隋鑒不逺願勿使百姓生怨上納其言減廄馬數千匹臣若水通曰髙宗親承帝範於太宗而不能戒其淫侈之念以耗邦儲殘邦本何邪天理難明而侈欲易縱也雖然太宗亦躬自蹈之矣故人君欲示節儉於子孫者必自身心始矣髙宗總章二年秋八月詔以十月幸涼州來公敏獨進曰隴右户口雕弊鑾輿所至供億百端誠未為易上善其言為之罷西巡臣若水通曰孟子云流連荒亡為諸侯憂後世之君遊幸無度勞民傷財殊非先王巡狩以為民者矣髙宗欲巡視逺俗而宰相以下莫敢諌止獨得來公敏數語以寢其行遂寬下民百端之供億仁人之言其利溥矣髙宗儀鳯三年九月上將發兵討新羅張文瓘輿疾入諌曰今吐蕃為冦方發兵西討若又東征臣恐公私不勝其弊上乃止臣若水通曰張文瓘真忠臣也卧疾于家猶不忘東征之諌幸帝寤而止焉則上而愛君下而惜民公私之益皆得之矣謹録之以為後世之君臣告焉嗣聖十四年十月狄仁傑上疏以為天生四夷皆在先王封略之外故東距滄海西阻流沙北橫大漠南阻五嶺此天所以限遐荒而隔中外也自典籍所紀聲教所及三代不能至者國家盡兼之矣詩人矜薄伐於太原美化行於江漢則三代之逺裔皆國家之域中也若乃用武方外邀功絶域竭府庫之實以爭不毛之地得其土不足增賦獲其人不可耕織茍求冠帶逺夷之稱不務固本安人之術此秦皇漢武之所行非五帝三王之事業也始皇窮兵極武務求廣地死者如麻致天下潰叛漢武征伐四夷百姓困窮盜賊蜂起末年悔悟息兵罷役故能為天所祐近者國家頻嵗出師所費滋廣西戍四鎮東戍安東調發日加百姓虛弊今關東飢饉蜀漢逃亡江淮已南徴求不息人不復業相率為盜本根一搖憂患不淺其所以然者皆以爭蠻貊不毛之地乖子養蒼生之道也臣若水通曰興大役於不毛之地冗兵也動廣費於虛弊之餘害民也夫兵所以衛民而反以害民豈國家之利也哉狄仁傑舉秦皇以為窮兵極武之戒舉漢武以為息兵罷役之勸誠至論也人君有安國子民之心者尚潛玩焉嗣聖十七年太后欲造大佛像狄仁傑上疏諫曰比來水旱不節當今邉境未寧若費官財又盡人力一隅有難將何以救之哉太后曰公教朕為善何得相違遂罷其役臣若水通曰武后佞佛所費不資府庫為虛民不堪命矣而仁傑從容數語竟寢大像之造國用以省民勞以息仁傑之有功於唐也豈可以一二計哉中宗景龍元年九月蕭至忠上疏以為恩幸者止可富之金帛食以粱肉不可以公器為私用今列位已廣冗員倍之干求未厭日月增數陛下降不資之澤近戚有無涯之請賣官利已鬻法徇私臺寺之內朱紫盈滿忽事則不存職務恃勢則公違憲章徒沗官曹無益時政上雖嘉其意竟不能用臣若水通曰蕭至忠謂不可以公器為私用惜名器也其言當矣至謂可富之金帛食之粱肉則國費濫矣奚可哉蓋名器之濫壞禮傷化也而國費之濫傷財害民也國家之患濫名器為上而侈國用次之然而致虛耗成敗亂未有不由此二者其失均耳故明主愛一顰一笑藏弊袴以待有功今至忠之言猶紾兄之臂而奪之食乃謂之姑徐徐云爾中宗景龍二年上及皇后公主多營佛寺辛替否上疏諫曰伏惟陛下百倍行賞十倍增闕疏奏不省唐睿宗景雲元年五月辛替否上疏以為近年以來水旱相繼兼以霜蝗人無所食未聞賑恤而為二女造觀用錢百餘萬緡陛下豈可不計當今府庫之蓄積有幾中外之經費有幾而輕百餘萬緡以供無用之役乎臣若水通曰世濟其惡豈中宗睿宗之謂乎中宗不恤疆場之費而為如來營寺塔睿宗不懲中宗之失不恤飢饉之災而為二女造觀糜費不資以吕元泰辛替否切直之言而不能用惜哉謹録之以為節用愛人之君告焉睿宗景雲元年八月姚元之宋璟及畢構上言先朝斜封官悉宜停廢上從之癸巳罷斜封官凡數千人臣若水通曰國家設官所以為民而保其有者也斜封官始於韋后及二公主私門之啓所以空府庫而耗民財者亦已甚矣睿宗在位雖無可稱而能聼姚宋畢構之言革先朝之弊政其有利於國豈可誣哉唐玄宗開元二年五月己丑以嵗飢悉罷員外試檢校官自今非有戰功及别敕毋得注擬臣若水通曰官冗則費多而况乘之以飢饉乎玄宗罷員外官則嵗雖飢而其費省可謂能自損以從天時初政清明此其一端也然又有所謂别敕者得無開他日之門乎譬之去草猶留其根其後滋蔓日長而淫侈無厭宜矣玄宗天寶元年時天下聲教所被之州三百三十一羈縻之州八百置十節度經略使以備邉凡鎮兵四十九萬人馬八萬餘匹開元之前每嵗供邉兵衣糧費不過二百萬天寶之後邉將奏益兵寖多每嵗用衣千二十萬匹糧百九十萬斛公私勞費民始困苦矣臣若水通曰自古疆域之廣莫過於唐至開元時海內安富行萬里者不持寸兵供億不煩可謂盛矣使帝清心寡欲不至侈費而後人繼之唐雖至今猶存可也奈何侈欲一萌而邉將益兵供億十倍日益月盛公私勞費而民困始極及漁陽倡亂父子顛越自是紛紛多事而帝以憂殂子孫曾玄疲於奔命以至河北陸沉沙陀囊括其禍皆玄宗始之也兵力之衆疆域之廣安足恃哉代宗大厯二年魚朝恩奏以先所賜莊為章敬寺於是窮壯極麗盡都市之財不足用奏毁曲江及華清宫館以給之費逾萬億臣若水通曰代宗身所御衣必浣染再三其自奉可謂儉朴矣至乃信朝恩之惑而大營佛寺浪費民財以至此極何也蓋人主之德不以一己之儉為可貴而以無所不儉者為切要也否則所謂不能三年之喪而緦小功之察豈人君之大德哉大厯二年髙郢上書略曰先太后聖德不必以一寺增輝國家永圖無寧以百姓為本捨人就寺何福之為又曰無寺猶可無人其可乎又曰陛下當卑宫室以夏禹為法而崇塔廟踵梁武之風乎又曰古之明王積善以致福不費財以求福修德以消禍不勞人以禳禍今興造急促晝夜不息力不逮者隨以搒笞愁痛之聲盈於道路以此望福臣恐不然臣若水通曰髙郢之言抑佛寺之崇重民財之惜諄諄於人鬼禍福德怨之辨意亦至矣夫以禍福無不自己求之者若夫崇佛以傷人財徼福而反生禍為人君者盍亦反其本矣格物通卷九十
