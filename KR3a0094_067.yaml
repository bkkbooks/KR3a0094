body:
  text: 格物通卷六十七明湛若水撰課功上易師上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也臣若水通曰師之爲卦坤上坎下内險外順師險道而以順行故爲師師終必有賞功之典上六師之終也故以正功言坤爲土故有裂土封爵之象程頥曰開國封之以爲諸侯也承家以爲卿大夫也承受也象言大君於師終功成之時因其功而命之以爵賞功之大者則封之爲諸侯而開國功之次而小者則封之爲卿大夫而受成家之慶然有貪殺冒功者小人也則黜之而不用葢五爻皆隂故有小人勿用之戒若封之使有國有家則爲政害人必多而爵賞濫及惡徳亦不足以爲勸懲而人心不服矣象又釋之以爲夫大君之爵命者所以報軍旅之功使大小各以其等而得其正也所謂小人勿用者固非正功之典使如此之人而用之必播其惡於衆而亂人國家矣夫立功者人臣之忠也報功者人君之正也故有天下非得而私開國承家亦非得而私因其功而差等之小人不得而與焉天下之正也夫賞之也以天下之正其勿用之也亦以天下之正聖人亦何容心哉謙九三勞謙君子有終吉象曰勞謙君子萬民服也臣若水通曰朱熹云卦惟一陽居下之上剛而得正上下所歸有功勞而能謙臣謂以陽剛之才而上得君下得民其功徳可施是有勞也以九居三得位之正正則不矜伐是能謙也以可爲之才而得正故乆而不變有終而吉也象又釋之以爲君子之有勞有謙如此而萬民之心皆服之矣夫挾勞以傲物小人之情也勞而不自伐知道之君子也以爲功非有加於我也性分之當爲也惡盈好謙人情之公也故民皆服其謙徳之盛莫與之爭功爭能者矣功髙天下而不危位極人臣而不疑其有終而吉也宜矣人君立課功之法天下之公也萬民之公也九三君子之勞謹而不伐人臣當以此自考焉可也書虞書舜典五載一廵守羣后四朝敷奏以言明試以功車服以庸臣若水通曰此史臣記帝舜立朝廵課功行賞之法如此也敷陳也奏進也庸者民功蔡沉曰五載之内天子廵守者一諸侯來朝者四蓋廵守之明年則東方之諸侯來朝於天子之國又明年則南方之諸候來朝又明年則西方之諸侯來朝又明年則北方之諸侯來朝又明年則天子復廵守是則天子諸侯雖有尊卑而一徃一來禮無不答是以上下交通而逺近洽和也諸侯來朝使各陳其爲治之說言之善者則從而明考其功有功則賜車及服以旌之其言不善則亦有以告飭之也臣謂朝廵之禮非特上下交通而已廵守所以觀政於下述職所以報政於上上下交相勸勉於政如是而政不修治不成者未之有也後世此制旣廢而諸侯縱恣遂以爲封建不可行易之以郡縣抑豈反本之論哉舜典三載考績三考黜陟幽明庶績咸熈臣若水通曰此史臣記帝舜考績黜陟之法也考者核實也黜降陟升也三考謂九載也蔡沈傳曰九載則人之賢否事之得失可見於是陟其明而黜其幽賞罰明信人人自力於事功此所以庶績咸熈也此言舜命二十二人之後立此考績黜陟之法以時舉行而卒言其效如此也臣伏覩國朝立三年考察外官六年考察京官之法蓋本於此然以三年進退未至於三考甚者上官苛刻以爲能或逞其喜怒之私多有蒞任一年半歲而蒙黜退者雖使聖賢生於其間如孔子子産徳政未能盡施而人心未易卒恊則亦無以自見也伏願聖明慎任之於初乆任之於後必三載而考三考而黜陟則事皆核實而治可責成矣周書周官六年五服一朝又六年王乃時廵考制度于四岳諸候各朝于方岳大明黜陟臣若水通曰此周官之書史臣紀朝廵之典所以課功也五服者侯甸男采衛也朝者諸侯見天子之名也時廵者以時而廵猶舜之四仲廵狩也考制度者猶舜之恊時月正日同律度量衡等事也建官之體統旣定然無以激厲之則人不能各勉於修職致治故周官之法必諸侯六年一朝於天子而述其職又六年則十二年也王乃分四時廵狩各方諸侯之國考其時日律度量衡之事所以一道徳而同風俗而諸侯則各來朝于方岳天子乃各於方岳大明其黜陟賢而修職者升之不賢而廢職者黜退之所以示勸懲之典使之鼓舞而不已也夫人主所以鼔舞天下者黜陟與奪而已然必施得其當用一人足以爲千萬人之勸退一人足以爲千萬人之懲然後可也詩大雅江漢王命召虎來旬來宣文武受命召公維翰無曰予小子召公是似肇敏戎公用錫爾祉臣若水通曰此詩人羙召穆公平淮南之夷而作旬徧也宣布也召公召康公奭也翰榦也似嗣也肇開戎女也公功也詩人述宣王命召虎來江漢徧治事而布命曰昔文武受命爾祖召公奭爲國之楨榦今爾且勿以予爲言也爾祖之事可以不嗣而開敏汝功乎若然則我當與汝以福矣夫勸功之道在激其心而爵賞次之夫人心激之以義則奮賢臣固不待賞而立功也顧人君所以激之何如耳故激之以忠則以忠奮激之以孝則以孝奮而功業隨之周宣王每於臣子效忠之日必激之以繼先之孝纘戎祖考南仲太祖所以激樊侯皇父也此詩曰文武受命召公維翰無曰予小子召公是似所以激召虎也此諸臣所以皆用命思奮大佐中興之功以復文武之業也豈非由人君感激中來耶後之人主不知此義徒以爵賞畜其臣而不責其功其亦異乎先王之政矣周禮天官大宰嵗終則令百官府各正其治受其㑹聽其致事而詔王廢置三歲則大計羣吏之治而誅賞之臣若水通曰此即書三載考績三考黜陟幽明之典而大宰掌之特加詳焉於一歳之終則令庶府百執事各修其職一嵗之計謂之㑹則受之以聽察其所致之事以此進而告於王無功者則貶削而廢之有功者則轉遷而置之以至於三嵗則又大計羣吏之治於無功者不但廢也而誅行焉於有功者不但置也而賞行焉如此則賞罰當而勸懲嚴矣其視後世校米鹽之利責旦暮之效者豈可同年而語哉天官司㑹以參互攷日成以月要攷月成以歲㑹攷歲成以周知四國之治以詔王及冢宰廢置臣若水通曰事合衆數爲目合衆目爲凢曰參者以凢攷目以目攷數之謂也曰互者凢與數相攷數與目相攷之謂也旣參以考又互以攷則日成無遺矣積日而爲月月合衆凢謂之要故以月要而攷月成積月而爲嵗歲合衆要謂之㑹則以歲㑹而攷歲成如此則治雖在四國之逺可以坐而知矣然此特掌之於司㑹之手而賞罰之典又在於君相故進而告於王及冢宰凡吏治惰而無功者則有廢廢以懲之也吏治勤而有功者則有置置以勸之也此所以成太平之治而垂無疆之休者有由然哉宰夫掌治法以攷百官府羣都縣鄙之治乗其財用之出入凡失財用物辟名者以官刑詔冢宰而誅之其足用長財善物者賞之臣若水通曰羣都者諸采邑也六遂五百家爲鄙五鄙爲縣此云縣鄙六鄉州黨亦在其中矣財者錢榖也用者貨賄也物者百物也辟名謂僞作文書與實不相應也官刑司冦所掌是也夫辟名則財用物三者皆違於是宰夫詔冢宰誅之得辟名則財用物三者皆長足而善矣故賞之賞罰明則課功之典舉孰有怠玩而不戒勉者哉宰夫歲終則令羣吏正歲㑹月終則令正月要旬終則令正日成而以攷其治治不以時舉者以告而誅之臣若水通曰歲有㑹冢宰㑹之而小宰贊之月有要小宰受之而宰夫贊之日有成宰夫受之而皆得以令羣吏正要㑹焉蓋一事之修積而至於無事不修一日之謹積而至於無日不謹故歲㑹月要日成之治宰夫皆得以令之也攷治也者小宰旣有常刑之戒令其有違時令失期㑹者則宰夫告冢宰而誅之以法是司㑹攷於前宰夫正於後課功之典其至詳而至備矣國語周語單襄公曰夫仁禮勇皆民之爲也以義死用謂之勇奉義順則謂之禮畜義豐功謂之仁姦仁爲佻姦禮爲羞姦勇爲賊夫戰盡敵爲上守龢同順義爲上故制戎以果毅制朝以序成臣若水通曰豐大也守和同謂不相與戰而平和也殺敵爲果致果爲毅朝不越爵則政成易曰大君有命以正功也功之不正民焉用勸若卻至佻天以爲已庸不亦異乎單襄公仁禮勇義之論非課功制戎之定法邪魯語展禽曰夫仁者講功而知者處物無功而祀之非仁也不知而不問非知也臣若水通曰展禽魯大夫栁下惠字季講論也仁者心平故可論功也處名也夫古之聖王報徳報功之典所以爲功徳之勸也無故而加焉則不足以爲勸矣仁以行之知以察之夫然後施當其實也爲人君者可不慎其所施乎晉語叔向曰夫爵以建事禄以食爵徳以賦之功庸以稱之臣若水通曰事職事也祿以食爵謂隨爵尊卑也稱副也先王班爵禄之制所以酬徳而報功也故爵以定職祿以稱爵凡以徳與功爲之差等也故絳商雖富足以行賄於諸候然而秪以韋藩木楗而不得金玉其車文錯其服者無爵禄功徳故也秦楚二公子田止一卒爵祿然也豈可回於富而厚薄其祿哉漢髙帝六年始剖符封諸功臣爲徹侯蕭何封鄼侯所食邑獨多功臣皆曰臣等身被堅執銳多者百餘戰少者數十合今蕭何未嘗有汗馬之勞徒持文墨議論反居臣等上何也帝曰諸君知獵乎追殺獸兎者狗也而發縱指示者人也今諸君徒能得走獸耳功狗也至如蕭何發縱指示功人也羣臣皆莫敢言臣若水通曰班固嘗稱蕭何以謹信守管籥功冠羣臣漢高封之食邑獨多宜也發縱指示之喻亦足以服諸臣之心矣然禮擬人必於其倫宋牼說秦楚搆兵以不利孟子言其號則不可君子於其言無所茍而已今以狗功爲喻得無視臣犬馬之心也乎至於𦵔醢誅戮相繼其已幾於功狗之一言矣豈所以報功之典乎故高帝課功則當而其義則非後世所宜法也高帝詔定元功十八人位次皆曰平陽侯曹參身被七十創攻城畧地功最多宜第一鄂千秋進曰羣臣議皆誤夫曹參雖有野戰畧地之功此特一時之事上與楚相距五歲失軍亡衆跳身遁者數矣蕭何常從闗中遣軍補其處又軍無見糧蕭何轉漕闗中給食不乏陛下雖數亡山東何常全闗中以待陛下此萬世之功也今雖亡參等百數何闕於漢奈何欲以一旦之功而加萬世之功哉蕭何第一曹參次之上曰善於是乃賜蕭何帶劒履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖高得鄂君乃益明於是封鄂千秋爲安平侯臣若水通曰功以兵而成兵以食而强蕭何漕餉不絶而兵頼焉故有蕭何則天下自有成參等之功者矣無蕭何則雖百參等無所施也漢定元功十八人位次鄂千秋以蕭何為萬世之功宜第一是不易之論矣故漢祖並封之則非徒足以報何之功且足以報千秋之功也嗚呼天下後世無千秋之見以一時之功而忽萬世之功者豈少哉宣帝甘露三年上以四方賔服思股肱之羙乃圖畫其人於麒麟閣法其形貌署其官爵姓名唯霍光不名曰大司馬大將軍愽陸侯姓霍氏其次張安世韓増趙充國魏相丙吉杜延年劉徳梁丘賀蕭望之蘇武凡十一人皆功徳知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉臣若水通曰功臣之圖始於博陸終於蘇武雖一時人材功業各有可觀然忠節如武者豈盡出於張韓諸人之下哉故論者謂斯舉也正逺人觀聽所係平日知畏者武而已置之於後使中國隠然有虎豹在山之勢耳然則此殆非課功之常典矣宣帝地節二年帝興於閭閻知民事之艱難霍光旣薨始親政事勵精爲治五日一聽事自丞相以下各奉職奏事敷奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜至於子孫終不改易樞機周宻品式備具上下相安莫有茍且之意臣若水通曰漢宣考試功能賞賜異善勸課之典明矣所以然者良由帝起自閭閻備知疾苦勵精爲治智慧益長故其信賞必罰吏稱民安有如此者可謂中興之茂烈矣貞觀開元之治鮮克有終又豈足以望之哉元帝建昭二年京房曰古之帝王以功舉賢則萬化成瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息臣若水通曰天道逺人事邇故以功舉賢則賢者勸上以福於君下以福於民否則誤君殘民之事至矣此所謂人事也房之學雖未知聖賢之道然其爲此舉功成化毁譽廢業之說庶幾得課功之法矣至於區區祥瑞災異而已天道幽逺豈足慿耶明帝永平三年帝思中興功臣乃圖畫二十八將於南宮雲臺以鄧禹爲首次馬成呉漢王梁賈復陳俊耿弇杜茂冦恂傅俊岑彭堅鐔馮異王覇朱祐任光祭遵李忠景丹萬修蓋延邳肜姚期劉植耿純臧宮馬武劉隆又益以王常李通竇融卓茂三十二人馬援以椒房之親獨不與焉臣若水通曰明帝圖畫功臣三十二人於雲臺可謂善繼世祖褒功之志矣而馬援獨以椒房之親不與夫以雲臺之繪報功也夫報功者不以其人之親踈惟以功之大小耳邊功如援斯亦偉矣而乃以嫌掩之像設不及殊非國家賞勸之公恐外戚藉口沮其建功立業之心者未必不由此也然則人君之報功者而可以不公哉永平七年荆州刺史郭賀官有殊政上賜以三公之服黼黻冕旒敕行部去襜帷使百姓見其容服以章有徳臣若水通曰唐虞之典車服以庸昭功徳也郭賀有殊政而帝褒表之使百姓見其容服以章有徳非但報功爾章一人而使千萬人勸則人孰不思自奮於功徳者乎後世有功徳表表者則羣起而忌之從而與碌碌常流同混是不以徳章於百姓也豈不誤哉雒陽令王渙居身平正發姦摘伏外猛内慈京師以爲有神卒於官百姓流涕爲立祠作詩每祭輙絃歌而薦之太后詔以渙子石爲郎中以勸勤勞臣若水通曰仕者世祿先王之仁政也鄧太后追惟王渙之善政官其子石爲郎中以勸勤勞非考據經典何以知此哉人君欲廣賞延于世之意者其勿以鄧后女主之政爲不足法焉安帝延光四年濟隂王即皇帝位楊震門生虞放陳翼諸闕追訟震事詔除震二子爲郎贈錢百萬以禮改塟於華隂潼亭逺近畢至有大鳥高丈餘集震喪前郡以狀上帝感震忠詔復以中牢具祠之臣若水通曰震以畏四知不受暮金跡其清白則忠直賢臣也被宦官之譖見殺忠氣欝積天地神人鑒之而莫伸者久矣濟隂以幼冲即帝位乃能聽其門生之追訟官其二子賜錢禮塟及致異鳥之祥又重以中牢之祠數年忠貞之積一旦獲伸逹於天地神人無間矣嗚呼褒死者於前所以警生者於後帝亦賢哉宋蒼梧王元徽元年正月甲戌魏詔縣令能靜一縣刼盜者兼治二縣即食其祿能靜二縣者兼治三縣三年遷爲郡守二千石能靜二郡上至三郡亦如之三年遷爲刺史臣若水通曰盜賊之起大抵由於守令之貪殘故孔子曰茍子之不欲雖賞之不竊清源正本止欲之道也故能靜二縣三縣之盜則令之徳足以及二三縣矣能靜二郡三郡之盜則守之徳足以及二三郡矣以此而遷秩則賞當其功而守令知勸矣是亦足爲課功之法也齊明帝建武元年九月壬申朔魏主宏詔曰三載考績三考黜陟可黜者不足爲遲可進者太成賖緩朕今三載一考即行黜陟欲令愚滯無妨於賢者才能不壅於下位各令當曹考其優劣爲三等其上下二等仍分爲三六品已上尚書重問五品已上朕將親與公卿論其善惡上上者遷之下下者黜之中者守其本任魏主之北廵也留任城王澄銓簡舊臣自公侯已下有官者以萬數澄品其優劣能否爲三等人無怨者壬午魏主臨朝堂黜陟百官謂諸尚書曰尚書樞機之任非徒總庶務行文書而已朕之得失盡在於此卿等居官年埀再朞未嘗獻可替否進一賢退一不肖此最罪之大者又謂錄尚書事廣陵王羽曰汝爲朕弟居機衡之右無勤恪之聲有阿黨之私今黜汝録尚書廷尉但爲特進太子太保又謂尚書令陸叡曰叔翻到省之初甚有善稱比来偏頗懈惰由卿不能相導以義雖無大賞宜有小罰今奪卿禄一朞又謂左僕射拓䟦贊曰叔翻受黜卿應大辟但以咎歸一人不復重責今觧卿少師削祿一朞又謂左丞公孫良右丞乞伏義受曰卿罪亦應大辟可以白衣守本官冠服祿䘏盡從削奪若三年有成還復本任無成永歸南畆又謂尚書任城王澄曰叔神志驕傲可解少保又謂尚書于果曰卿不勤職事數辭以疾可解長兼削祿一朞其餘守尚書尉羽盧淵等並以不職或解任或黜官或奪禄皆靣數其過而行之臣若水通曰唐虞三載考績三考黜陟幽明其黜陟行於九年之後非賖緩也俗淳事簡在位皆各思盡其職不爲奸欺就有不稱者考而未黜兾其能自盡也其不能盡者曰才力有所逮有不逮耳再考未稱而猶未黜曰才有短長臨事有過誤前考已稱其職今考不稱則必曰過誤也前考不稱今考已稱者則曰能自勉也三考皆不稱其人信不可用矣於是乎黜之此唐虞忠厚之至也周官計羣吏之治旬終則令正日成月終則令正月要嵗終則令正歲㑹三歲則大計羣吏之治而誅賞之是皆無日而不考覈而誅賞則行於三年大計之時蓋俗益薄人益偷而行九年之黜陟則爲賖緩觀魏孝文之考績旣無唐虞敷言明功之實又無成周日成月要嵗㑹之詳而徒以察察爲明雖或巧中恐傷苛刻非有道之氣象也然而不以親而貸又自引咎其善不可誣也梁武帝大同五年東魏丞相高歡以徐州刺史房謨廣平太守羊敦廣宗太守竇瑗平原太守許惇有政績清能與諸刺史書褒稱謨等以勸之臣若水通曰刺史民之父母也得其人則一方之民蒙其福不得其人則一方之民受其殃高歡於政績清能者褒稱之其知所先務者與夫褒一人而衆之賢者莫不知勸其不賢者莫不知懲刺史之職處之而各得其宜矣賢愚混淆則孰肯自勵哉格物通卷六十七
