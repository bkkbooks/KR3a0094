body:
  text: 格物通卷五十二明湛若水撰正朝廷下漢桓帝延熹八年李膺復拜司隸校尉時小黃門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師匿於兄家合柱中膺知其狀率吏卒破柱取朔赴雒陽獄受辭畢即殺之自此諸黃門常侍皆鞠躬屏氣不敢出宫省帝怪問其故並叩頭泣曰畏李校尉時朝廷日亂綱紀頽弛而膺獨持風裁以聲名自高士有被其容接者名為登龍門云臣若水通曰桓帝之時朝廷不正甚矣由權橫猖獗綱紀頽弛之所致也李膺之威望誅貪殘於合柱中朝綱為之一肅然不旋踵黨禍興朝綱至於掃地豈非天哉晉惠帝元康四年司隸校尉傅咸上言貨賂流行所宜深絶時朝政寬弛權豪放恣咸奏免河南尹淡等官京師肅然臣若水通曰晉惠以暗弱之資行寬縱之政朝綱大紊堂陛頽毁矣傅咸持風裁而京師肅然朝廷一正其弛其張在人而已矣傅曰不有君子其能國乎晉成帝咸和元年司徒王導稱疾不朝而私送郤鑒卞壼奏導虧法從私無大臣之節請免官雖事寢不行舉朝憚之時貴遊子弟多慕王澄謝鯤為放達壼厲色於朝曰悖禮傷教罪莫大焉中朝傾覆實由於此欲奏推之臣若水通曰為國以禮禮者國之楨幹也故禮達而朝廷尊矣晉之中朝傾覆皆王謝放棄禮法之疚也然則後之人君欲正朝廷以立國者舍禮何以哉壼不畏強禦言人之所不敢言忠義之氣與日月爭光矣晉穆帝永和二年都鄉文穆公何充有器局臨朝正色以社稷為己任所選用皆以功效不私親舊臣若水通曰朝廷以有人而尊也晉室不綱臣之不職矣若何充者其羣鳥之孤鳯歟臨朝正色社稷自任選用功能朝綱為之一振偉哉晉穆帝升平四年燕太原王恪雖綜大任而朝廷之禮兢兢嚴謹每事必與司徒評議之未嘗專決臣若水通曰朝廷之禮率由權豪壞之也慕容恪當國家危疑之秋而能謹禮法博詢公議可謂能尊朝廷以安社稷矣陳宣帝太建九年梁主入朝于鄴自秦兼天下無朝覲之禮至是始命有司草具其事致積致餼設九儐九介受享於廟三公三孤六卿致食勞賓還贄致享皆如古禮臣若水通曰鄴後周之都周平齊故梁朝於周也積者每積有牢禮米禾芻薪也餼者腥牲也五代志曰梁主之朝周入畿大冢宰命有司致積其餼五牢米九十筥醯醢各三十五甕酒十八壺米禾各五十車薪芻各百車既至大司空設九儐以致館梁王束帛乘馬設九介以待之禮成而出明日王朝受享於廟既致享大冢宰又命公一人玄冕乘車陳九儐以束帛乘馬致食于賓及賓之從各有差致食訖又命公一人辨服乘車執贄設九儐以勞賓王設九介迎於門外明日朝服乘車還贄于公公皮辨迎于大門授贄授贄並於堂之中楹又明日王朝服設九介乘車以見于公事畢公致享明日三孤一人又執贄勞於梁王明日王還贄又明日王見三孤如三公明日卿一人又執贄勞王王見卿又如三孤於是三公三孤六卿又各餼賔並屬官之長為使牢米束帛同三公臣謂君臣之相覲古之制也封建廢而朝覲之禮亡矣周主因梁之朝慨然復古禮之盛其亦曠世之一快覩也周之朝廷於是益尊矣唐太宗貞觀十年魏王泰有寵於上或言三品以上多輕視魏王上怒引三品以上作色讓之曰隋文帝時一品以下皆為諸王所顛躓彼豈非天子兒邪朕但不聽諸子縱橫爾聞三品以上皆輕之我若縱之豈不能折辱公輩乎房玄齡等皆惶懼流汗拜謝魏徵獨正色曰臣竊計當今羣臣必無敢輕魏王者在禮臣子一也春秋王人雖微序於諸侯之上三品以上皆公卿陛下所尊禮若紀綱大壞固所不論聖明在上魏王必無頓辱羣臣之理隋文帝驕其諸子使多行無禮卒皆夷滅又足法乎上恱曰理到之語不得不服朕以私愛忘公義嚮者之忿自謂不疑及聞徵言方知理屈人主發言何得容易乎臣若水通曰朝綱之弛自親貴始也太宗愛寵魏王而怒及羣臣朝廷不正之漸矣向微魏徵引春秋倡大義尊王人振朝綱則貞觀之治不足觀也巳傳曰體統正而朝廷尊其斯之謂乎唐太宗貞觀十四年十二月言事者多請帝親覽表奏以防壅蔽帝以問魏徵對曰斯人不知大體必使陛下一一親之豈唯廟堂州縣之事亦當親之矣臣若水通曰先正有言論治者貴識體所謂體者朝廷上下之禮也元首明股肱良則庶事康是之謂朝廷正矣元首叢脞股肱惰則萬事隳是之謂朝廷不正矣魏徵一言而太宗乃悟此其所以成貞觀之治也歟唐太宗貞觀十五年帝嘗臨朝謂侍臣曰朕為天子常兼將相之事給事中張行成退而上書以為禹不矜伐而天下莫與之爭陛下撥亂反正羣臣誠不足望清光然不必臨朝言之以萬乘之尊乃與羣臣校功爭能臣竊為陛下不取帝甚善之臣若水通曰人主之責在任將相將相得而朝廷尊矣太宗以天子之尊乃欲兼行將相之事而猶矜巳以誇人與羣臣校功爭能矣自卑孰甚焉張行成一言而朝廷之體尊其亦得尊主之道者歟唐肅宗至德元載塞上精兵皆選入討賊惟餘老弱守邊文武官不滿三十人披草萊立朝廷制度草創武人驕慢大將管崇嗣在朝堂背闕而坐言笑自若時監察御史李勉奏彈之繫於有司上特原之歎曰吾有李勉朝廷始尊臣若水通曰武臣驕慢背闕坐笑是不知有朝廷之尊矣御史李勉聲其罪以正體統而朝廷始尊此肅宗之所以歸功於勉也雖然人君不能自尊而賴臣下以尊之亦可悲矣然則自尊之道在正心以正朝廷君人者不可不知唐穆宗長慶元年冬十月裴度上表極陳朋比姦蠧之狀以為逆豎搆亂震驚山東姦臣作朋撓敗國政陛下欲掃蕩幽鎮先宜肅清朝廷臣若水通曰先正有言朝廷者天下之本未有朝廷不正而可以正天下者也裴度謂陛下欲掃蕩幽鎮先宜肅清朝廷可謂得正朝廷以正百官之體矣有天下者其知所務哉唐文宗太和二年春三月己卯上親策制舉人賢良方正昌平劉蕡對䇿其略曰陛下將杜篡弒之漸則居正位而近正人逺刀鋸之賤親骨鯁之直輔相得以專其任庶職得以守其官奈何以褻近五六人總天下之大政禍稔蕭牆姦生帷幄臣恐曹節侯覽復生於今日又曰威柄陵夷藩臣跋扈或有不達人臣之節首亂者以安君為名不究春秋之微稱兵者以逐惡為義則政刑不由乎天子征伐必自於諸侯臣若水通曰唐之季葉內豎弒立藩臣稱兵始於朝廷之不正而紀綱廢壞也劉蕡以布衣發憤一言切中時病可以為社稷之臣矣乃棄而不取胡寅所謂違天理逆人心者是也何以為朝廷哉後唐明宗天成二年吳馬軍都指揮使柴再用戎服入朝御史彈之再用恃功不服侍中徐知誥陽於便殿誤通起居退而自劾吳王優詔不問知誥固請奪一月俸由是中外肅然臣若水通曰五代之世人臣恃功驕恣者良由朝廷不正而紀綱法度之不立爾知誥自劾而中外肅然所謂朝廷正而百官萬民莫敢不正矣陸贄奏議曰風化之大禮讓為先禮讓之行朝廷為首朝廷者萬方之所宗仰羣士之所楷範觀而效焉必有甚者是以朝廷好禮則俗尚恭敬朝廷尊讓則時恥貪競朝廷有失容之慢則凌暴之弊播于人朝廷有動色之爭則攻鬬之禍流于下聖王知其然也故選建賢德以為公卿使人具瞻不諭而化臣若水通曰朝廷四方之極不可以不正也故體統正而朝廷尊天下化服以德宗之猜疑則朝廷何由而崇尊百官何由而承式諸侯固將以解體四方由之而起釁禮讓風化之效胡可得也贄之言德宗不能用至今而始驗也惜哉宋神宗熙寧三年文彥博久居樞密以王安石多變舊典言于神宗曰朝廷行事務合人心宜兼采衆論以靜重為先陛下勵精求治而人心未安蓋更張之過也臣若水通曰鎮之以靜重兼之於衆論協之於人心則朝廷正矣朝廷正則政出於一而天下治矣文彥博老成忠厚之論足以破紛更亂政之惑矣惜乎神宗之心溺於功利之説而不知大不利者在朝廷爾宋哲宗元祐六年二月以劉摰為尚書右僕射兼中書侍郎蘇轍為尚書右丞王巖叟簽書樞密院事轍除命既下右司諫楊康國奏曰轍之兄弟謂其無文學則非也蹈道則未也其學乃學為儀秦者也其文率務馳騁好作為縱橫捭闔無安靜理陛下若恱蘇轍文學而用之不疑是又用一安石也轍以文學自負而剛狠好勝則與安石無異不報巖叟居言職五年正諫無隱及拜簽樞密謝因進曰太后聽政以來納諫從善務合人心所以朝廷清明天下安靜願信之勿疑守之勿失復進言於帝曰陛下今日聖學當深辨邪正正人在朝則朝廷安邪人一進便有不安之象非謂一夫能然蓋其類應之者衆上下蒙蔽不覺養成禍胎爾又曰或聞有以君子小人參用之説告陛下者不知果有之否此乃深誤陛下也自古君子小人無參用之理聖人但云君子在內小人在外則泰君子在外小人在內則否小人既進君子必引類而去若君子與小人競進則危亡之基也兩宫深然之臣若水通曰朝廷之正不正由於用人之邪正爾故一蘇轍立朝則朝廷不正何也不正之類將從之也一王巖叟立朝則朝廷正何也正人之類將從之也所謂正不正之分豈有他哉於心術焉見之也四凶之於十六相其才華孰能辨之哉後之人主欲尊朝廷者當慎於邪正之擇而勿貪人之文采焉可也宋儒程頥上英宗書云朝廷紀綱汗漫離散莫可總攝本源如此治將安出臣若水通曰朝廷之正在紀綱而已矣紀綱者何君臣父子是也禮曰聖人作為君臣父子以為紀綱紀綱既正天下自定是故紀綱壞不足以言朝廷矣程頥此言誠知治國家天下之大要也為人君者其慎之哉范祖禹曰朝廷者四方之極也非至公無以絶天下之私非至正無以止天下之邪人君一不正其心則無以正萬事茍以術御下是自行詐也何以禁臣下之欺乎是以術行而欺愈多知用而心愈勞蓋以詐勝詐未有能相一者也臣若水通曰朝廷何以為四方之極也四方之所取正焉者也故在公正而已矣人君之道如天運於上一正以勝百邪一公以絶天下之私故孟子曰君正莫不正茍以詐術御下已自不正矣何以正朝廷而示天下之正乎朱熹曰發號施令羣聽不疑進賢退姦衆志咸服紀綱得以振肅而無侵撓之患政事得以修明而無阿私之失此所以朝廷百官六軍萬民無敢不出於正而治道畢矣臣若水通曰朱熹之言蓋本於董仲舒正朝廷以正百官萬民之意然非無其本也其要係於君心焉而已爾君心正則萬化隨之然其所以得此心之正者豈有他哉敬而已矣敬則天理日明人欲日消而凡施為注措皆當於義而無愆也太平之治豈不可坐而致哉國朝禮部奏定百官常朝班次及奏事等禮儀太祖皇帝謂中書省臣曰朝廷之禮所以辨上下正名分不以賤加貴不以卑踰尊百官在列班序有倫奏對雍容不失其度非惟朝廷之尊抑亦天下四方瞻仰所在也今文武百官朝參奏事有未間禮儀者是禮法不嚴於殿陛何以肅朝廷乎自今凡新任官及諸武臣禮儀有不間習者令侍儀司官日於午門外演習之且命御史二人監視有不如儀者糾舉之百官入朝失儀者亦糾舉如律臣若水通曰朝廷之禮主於嚴君臣之分主於敬若無嚴敬則上下不辨名分不正豈足以謂之朝廷哉豈足以成天下之治正天下之民哉伏覩我聖祖諭中書省臣之言可謂能正心以正朝廷矣臣願聖明法祖以正朝廷以正百官萬民而天下正矣諸司職掌朝儀凡朝班序立公侯序于文武班首次駙馬次伯自一品以下各照品級文東武西依次序立風憲糾儀官居下朝北紀事官居文武第一班之後稍近上便於觀聽不許攙越如有事奏須要從班末行至御前跪奏不許於班內橫過奏畢即便入班序立臣若水通曰朝廷禮法之所在朝儀不肅則禮法隳矣故必有拜立之節劾奏之儀夫然後上下之間截然名分之不易而禮法行矣禮法行而朝廷焉有不正者哉禮儀定式凡朝參遇有聖諭教誡須當專心致意拱聽分明即便省身克己不許放肆馳心外想臣若水通曰臣子對君之言當尊之如天而不可少忽也是故專心致意誠也拱聽恭也省身克己敬也戒放肆馳心立信也誠敬恭信所以尊君如尊天以尊朝廷也朝廷尊則莫不出於正矣永樂二年十一月刑部尚書鄭賜等奏奉天征討官有以罪繫獄者請論功定議太宗皇帝曰朝廷大公至正之道有功則賞有過則刑刑賞者治天下之大法不以功掩過不以私廢公此輩征討之功既酬以爵賞矣今有犯而不罪是縱惡也縱惡何以治天下其論如律臣若水通曰刑賞者朝廷之大法也所以為朝廷者以其有刑賞之正也刑賞廢紀綱弛焉足以為朝廷哉伏覩太宗文皇帝諭鄭賜之言朝廷大公至正之道不以功而可廢矣仰惟聖明法祖圖治公道大行私恩盡黜則帝王之治可致矣憲綱凡有朝會行禮失儀聽糾儀御史舉劾常朝官奏事理有未當及失儀者聽侍班御史并給事中劾奏依律罰俸臣若水通曰朝廷以禮而尊也故叔孫制禮而漢尊李勉一言而唐尊李綱一入而宋尊非禮儀不足以肅之也然欲使朝廷之尊豈徒聲音笑貌為之哉盍亦反其本矣格物通卷五十二
