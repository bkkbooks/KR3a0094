body:
  text: 格物通卷二十四明湛若水撰慎言動中論語子貢問君子子曰先行其言而後從之臣若水通曰君子之道大矣而孔子於子貢之問惟以言行先後言之者何哉易曰言行君子之樞機不可不慎故行之於先則行專而能力言之於後則言切而有孚君子之於學也察見天理體之於身心而有得焉然後立訓以告人或出言以答問無非體貼吾心所得之實理則行有恆而言有物言顧行行顧言慥慥君子矣臣聞之先師翰林檢討陳獻章曰夫學自我得之自我言之可也其意與此暗合惟聖明留神焉子曰古者言之不出恥躬之不逮也臣若水通曰孔子此章之言至為明白痛切所以警悟學者之意至矣夫行不及言古人所恥是何今人之不古若哉道理平鋪良心固有世之學者豈無所見也不肯體之於身徒事講說之煩競為文字之學依附仁義道德之說與身心略不相涉而莫之耻焉何心哉其習使之然也孔子曰文莫吾猶人也躬行君子則吾未之有得蓋有歎於當時矣無變俗之權爾仰惟聖明居皇極之位握轉移之機使天下學者德業合一篤其實而藝者書之則道德一而風俗同矣天下幸甚南容三復白圭孔子以其兄之子妻之臣若水通曰白圭之詩乃衛武公作之以自警者也曰白圭之玷尚可磨也斯言之玷不可為也其嚴於自飭如此此其所以德躋於睿聖也南容獨取其言而三復焉蓋深有意於謹言矣夫言者心之聲也君子能存其心則言與心應而自無不謹之言矣司馬牛問仁子曰仁者其言也訒曰其言也訒斯謂之仁矣乎子曰為之難言之得無訒乎臣若水通曰司馬牛問仁而夫子告之以謹言者何哉張載曰戲言出於思也言心口一致也蓋言者心之聲心隨言以出入者也言不謹則心放心放則天理滅而仁亡矣故為仁之要在於訒其言而不放也不易其言即是不放其心心存理得則仁在是矣故謹言係於為仁之要有以仁為難之心即有言不易放之心易其言者乃易其心者也然則訒其言則亦有隨處體認之功而心當自存矣於此又有以知內外合一之學云子曰君子恥其言而過其行臣若水通曰古之人非貴於言也言以宣其身心之得以達於用爾已實無得而徒言之是欺天罔人矣豈不可恥乎然聖人之言通乎上下世之人主有徒致飾於制誥命令之間無躬行仁義之實而欲以致大用於天下協神人動天地豈不難哉中庸庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾臣若水通曰此中庸引孔子之言所以推明忠恕違道不逺之意也蓋忠與恕初不相離但欲行乎恕當養其忠言行之謹正所以養其忠也忠立而恕出矣庸常也存於身者謂之常德發於口者謂之常言以其天理之自然故謂之常即上文君子之道也致謹於言行之常皆隨處體認乎此爾如是而君子之道有不造其實者哉能造其實道斯一矣然聖人論道恆以言行言者何歟易曰言行君子之樞機所關者大矣學者皆然人君為甚自一話言之出以至於制誥命令之發皆言也自一念慮之動以至於家國天下事為之著皆行也易曰言出乎身加乎民行發乎邇見乎逺又曰言行君子之所以動天地也禮曰天子動則左史書之言則右史書之噫人君一身之言動近則書之史冊逺則及乎人民大焉則動乎天地然則君天下者尤當致謹於斯云孝經曰非先王之法言不敢道非先王之德行不敢行是故非法不言非道不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡臣若水通曰所謂法者德者皆天理也由是而言則為法言矣由是而行則為德行矣皆云先王者先王能由之先得我心之同然者也故非法則不敢言使口無可擇之言而免於口過矣非道則不敢行使身無可擇之行而免於怨惡矣免於口過怨惡蓋得乎民心之所同然者也人君能如是是之謂能修其身是之謂能孝其先君左傳文公十七年襄仲如齊拜榖之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死夏五月戊戌齊人弒其君商人臣若水通曰偷薄也茍且之謂也人之有言皆本於心言之病者心之疚所由發也孟子知言審諸此爾齊侯以茍且之心發茍且之言因言以察其心根本病且蹙矣魯人之麥未食而死不旋踵人主之於心聲可不謹哉襄公二十五年子産獻捷于晉戎服將事晉人問陳之罪陳及鄭平仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭不為功慎辭哉臣若水通曰孔子嘗謂賜不幸言而中則知君子之不貴言也至於鄭人入陳之役乃多子産之文辭者何居孔子亦曰辭達而已矣子産之辭順則達達足以感人矣君子所以取之也樞機之發榮辱之主可以不慎乎哀公十四年小邾射以句繹來奔曰使季路要我吾無盟矣使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉臣若水通曰千乘之國不信其盟而信仲由之一言者何也蓋自其無宿諾之信以孚之也言諾之於人豈小也哉雖然信所以成義者也不義之信君子弗之貴也小邾雖信仲由之言而仲由不往者守義以成信也然則仲由之言豈不益可信哉國語周語襄王曰夫政自上下者也上作政而下行之不逆故上下無怨臣若水通曰襄王惠王之子鄭也政者謂命令禁戒之言自上下言當從上出也書曰令出惟行弗惟反易曰渙汗其大號管夷吾亦曰出令當如流水以順人心故上以順作之而下以順行之言得其心也否則怨讟用興其何以信於國襄王不從晉文之請以誅衛侯可謂慎於詞令矣為人主者所當致其慎以利於行豈曰惟其言而莫豫違而已哉周語晉孫談之子周適周事單襄公言敬必及天言忠必及意言信必及身言仁必及人言義必及利言知必及事言勇必及制言教必及辨言孝必及神言惠必及和言讓必及敵臣若水通曰言敬必及天者象天之敬乾乾不息也言忠必及意者出自心意為忠也言信必及身者先信於身而後及人也言仁必及人者博愛於人為仁也言義必及利者易曰利物足以和義也言知必及事者能處事物為知也言勇必及制者以義為制勇而不義非勇也辨别也言教必及辨者能别是非乃可以教也言孝必及神者孝於鬼神則存者信矣言惠必及和者致和睦乃能親愛也言讓必及敵者謂雖在匹敵猶以禮讓也若周者其言如此真可謂善言也己語曰夫人不言言必有中詩曰德音秩秩周蓋有之夫以言詞之善而襄公稱之故夫言者真榮辱之主也周語單穆公曰國無經何以出令令之不從上之患也故聖王樹德於民以除之臣若水通曰經者常也謂常行不易之道也樹德即常道也除謂除去令而不從之患夫令之以常道則上令而下從令之不以常道則所令反其所好而民不從民不從令上必危矣故聖王樹德所以立常道以令於民也伏惟聖明於敕㫖命令之發必審當於道以順民心然後發焉天下幸甚周語仲山父曰出令不可不慎也令之不行政之不立行而不順民將棄上臣若水通曰仲山父王卿士令不行則政不立矣至於民棄其上由其不慎順也可不懼乎夫人君居萬民之上皆若有忽棄小民之心仲山父民將棄上之一語深足為為民上者之警也歟晉語寧嬴氏曰夫貌情之華也言貌之機也身為情成於中言身之文也言文而發之合而後行離則有釁臣若水通曰寧晉邑嬴其姓容貌者情之華采言語者容貌之樞機合謂容貌言三者合而後行也夫聽言觀行聖人之至訓也寧嬴氏以言與貌而知陽子不褰裳以赴賈季之難其知哉君子於此可不謹言行以為修身之要乎唐髙祖武德元年六月上嘗有敕而內史不時宣行上責其遲蕭瑀對曰大業之世內史宣敕或前後相違有司不知所從其易在前其難在後臣在省日久備見其事今王業經始事繫安危逺方有疑恐失機㑹故臣每受一敕必勘審使與前敕不違始敢宣行稽緩之愆實由於此上曰卿用心如是吾復何憂臣若水通曰朝廷之上出其言善則天下從之出其言不善則天下違之故不可不慎也君之出令不貴於速而貴於善臣之奉令不患其遲而患其未允君失之臣修之所以交濟其善而期於允也故有臣如蕭瑀君之令不患其不善矣有君如唐祖臣之奉令不患其不允矣後世君以逆令罪其臣臣以順令媚其君及詔令行而天下怨咨所謂言悖而出者亦悖而入也豈非上下不謹言之過歟唐太宗貞觀元年春正月上以兵部郎中戴胄忠清公直擢為太理少卿上以選人多詐冒資蔭敕令自首不首者死未幾有詐冒事覺者上欲殺之胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之而既知其不可復斷之以法此乃忍小忿而存大信也上曰卿能執法朕復何憂胄前後犯顔執法言如涌泉上皆從之天下無寃獄臣若水通曰書云令出惟行弗惟反夫詐冒法止於流爾而太宗令以死戴胄執而不行豈非所謂反邪語曰君子貞而不諒太宗以胄之執法而使己失信豈非所謂諒邪以喜怒行令遂至於如此可不戒乎雖然太宗卒能從胄之言以存先王所傳之律令猶為善補過也矣唐貞觀二年六月太宗曰朕每臨朝欲發一言未嘗不三思恐為民害是以不多言給事中知起居事杜正倫曰臣職在記言陛下之失臣必書之豈徒有害於今亦恐貽譏於後上悅賜帛二百段臣若水通曰以後世觀之人皆壯正倫之言矣以臣觀之正倫殆不及太宗也太宗之謹言恐貽害於民為實也正倫戒太宗之失言恐貽譏於後為名也以名相期其不相率於僞乎是不信也夫言心聲也人君誠能謹於心非法不道自無言語之失矣徒使畏史官之記而不發不知深宫廣內無所忌憚之時將何所警而不妄發也邪況臨朝之時少燕居之時多乎易曰修辭立其誠其內外合一之道也貞觀三年夏四月上始御太極殿謂羣臣曰中書門下機要之司詔敕有不便者皆應論執比來唯睹順從不聞違異若但行文書則誰不可為何必擇才也房𤣥齡等皆頓首謝故事凡軍國大事則中書舍人各執所見雜署其名謂之五花判事中書侍郎中書令省審之給事中黃門侍郎駁正之上始申明舊制由是鮮有敗事臣若水通曰書云大哉王言一哉王心夫詔敕王言也天下因言以知其心也可不慎乎唐太宗初御太極責中書門下久不論執詔敕之不便者卒修五花判事中書令侍郎給事交駁之典所謂詢謀僉同者矣王言其有不善乎書曰謀及乃心謀及卿士謀及庶人所以求人心之同然也仰惟聖明聰明天縱凡有命令尤宜詢之輔臣採其衆論而後行則三代之隆可復而貞觀之治有不足為矣貞觀十八年夏四月劉洎諫曰陛下每降恩㫖假慈顔凝旒以聽其言虛襟以納其說猶恐羣下未敢對揚況動神機縱天辨飾辭以折其理引古以排其議當令凡庶何階應答且多記則損心多語則損氣心氣內損形神外勞初雖不覺後必為纍須為社稷自愛豈為性好自傷乎至如秦政彊辨失人心於自矜魏文宏才虧衆望於虛說此材辨之纍較然可知矣上飛白答之曰非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由兹道形神心氣非此為勞今聞讜言虛懷以改臣若水通曰王者尊重如天王言所以代天語也多記多語非人君之學縱辨飾辭非人君之體語曰天何言哉四時行焉百物生焉彊辨虛說與天不相似矣為天之子者固當爾耶太宗納劉洎之諫而改焉此所以致貞觀之治也歟唐德宗建中四年十二月上以中書所撰赦文示陸贄贄上言以為動人以言所感已淺言又不切人誰肯懷今兹德音悔過之意不得不深引咎之辭不得不盡洗刷疵垢宣暢鬱堙使人人各得所欲則何有不從者乎臣若水通曰書云辭尚體要德宗當播亂之時人心怨詈悔過引咎之辭此其體要也賴有陸贄之言下罪已之詔宜乎民之感泣矣使非其言出於至誠惻怛何以動人耶雖然事變甫定德宗遂忘前日之詔縱恣愈甚雖以贄之賢忠言在耳猶不能安其身人心惟危有如是夫故人君之學修辭以立其誠則始終如一矣格物通卷二十四
