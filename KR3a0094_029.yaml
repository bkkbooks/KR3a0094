body:
  text: 格物通卷二十九明湛若水撰進德業四宋太宗勤于讀書自己至申然後釋卷詔史館修太平御覽一千卷日進三卷宋琪以勞瘁諫帝曰開卷有益不為勞也朕欲周嵗讀遍是書爾每暇日則問呂文仲以經義王著以茟法臣若水通曰宋儒周敦頥有言聖人之訓入乎耳感乎心藴之為德行行之為事業黃庭堅亦言以我觀書則處處得益以書駁我則釋卷而茫然程皓亦以博記為玩物喪志此三言者真讀書之要法也傅説告髙宗學于古訓古訓豈可不學然學之亦有道矣蓋心存則志定志定則我立我立而觀書則聖人之訓感吾心養吾志焉往而非益若我不立心志不定則逐書而移書亦物爾其喪志也必矣人君有志於學古者其深思之宋太宗端拱元年夏五月詔就崇文院中堂建祕閣分三館書籍置其中以侍郎李至兼祕書監帝謂至曰人君當淡然無欲勿使嗜好形見于外則姦佞無自入朕無他好但喜讀書多見古今成敗善者從之不善者改之如斯而已矣至每與李昉王化基觀書閣下帝必遣使賜宴且命三館學士皆預焉臣若水通曰心者進德業之地也淡然無欲則心正德崇而業廣姦佞逺而賢人親矣豈但嗜好不形姦佞不入而已哉但云所好者讀書讀書以明心非以溺心也茍不善讀則程皓以博記為玩物喪志者同一欲爾而君之德業豈不荒矣乎惜乎李至諸臣未聞聖學之要無以究無欲之本周敦頥曰一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥其聖矣乎然則古人成敗之理在吾心之蓍龜矣宋儒周敦頥博學力行為南安司理時通判程珦以其為學知道使二子皓頥往受業敦頥每令尋孔顔樂處所樂何事皓嘗曰自再見周茂叔後吟風弄月以歸有吾與點也之意臣若水通曰自天子至於庶人欲成其德業者不可以不學而學不可不知其所有知其所有而真見焉則仲尼顔子之樂在我其學之進自有不能已者矣周敦頥曰君子修之吉小人悖之凶臣若水通曰修謂治而去之也悖者逆也之字指太極而言即天理是也聖人全體太極無非中正仁義之至矣君子未至於此則敬以修之人心之天理本自完全何待外飾以益之但為私欲汚壞爾故治而去之去其私欲而天理自全所謂克已而復禮也如是則天人協應而動罔不吉矣小人不知天理而悖逆之則縱欲害身而動罔不凶矣君子小人吉凶之别在於修與悖而修與悖在乎一念敬肆之間而已矣為人君者其可弗思也哉周敦頥曰德愛曰仁宜曰義理曰禮通曰智守曰信性焉安焉之謂聖復焉執焉之謂賢發微不可見充周不可窮之謂神臣若水通曰仁義禮智信皆人之得於天以為德者也德即性也性即理也理一也自其惻隱之心而愛人則謂之仁自其發而當宜則謂之義自其所履而理則謂之禮自其通達事理則謂之智自其存之而實則謂之信皆天理也天理在心渾然而不可别發而後五者别焉性此而安之則聖矣復此而守之則賢矣發之微妙而不可見充之周遍而不可窮則聖人之神矣然而千聖千賢同此心也同此天理也更何别心别理孟子曰堯舜性之也湯武反之也又曰聖而不可知之謂神所性所反所不可知只此一理爾途之人之心亦只同此理爾後之人君何憚乃讓其與堯舜湯武之同然者而不為堯舜湯武之德業乎周敦頥曰實勝善也名勝恥也君子進德修業孳孳不息務實勝也德業有未著則恐恐然畏人知逺恥也臣若水通曰恐恐畏懼之意實者實有也譬之形也名也者名其實也譬之影也實有而名名之如形之有影天理之發見也無實而名焉其能無愧恥乎君子忠信內主而德進多識前言往行以蓄其德而業修德業合一內外夾持所以篤吾實也德業未著而畏人知恥名過其實也人君好大喜功而不以實勝為務則直諒多聞之士逺而讒諂面諛之人至矣何以成盛德大業於天下哉故曰好名人主之纍周敦頥曰天地間至尊者道至貴者德而已矣至難得者人人而至難得者道德有於身而已矣臣若水通曰道德也者吾心之天理也以其得於心故謂之德以其行於事故謂之道一而已矣人之所以為人而與天地參為三才者全在於是故曰至尊至貴又曰至難得者人此理人人同有然喪失者多是自棄其至尊至貴之寶藏而失其所以為難得者矣故人之所以為難得者以其全復至尊至貴之天理而有之於身而已矣人君以一人之身居億兆之上是可謂至尊至貴者也然因其所至尊以求諸吾心之至尊因其所至貴以求諸吾心之至貴則大德受命而安富尊榮於無窮矣周敦頥曰至易而行難果而確無難焉臣若水通曰朱熹云實理自然故易人偽奪之故難臣謂果者知之真確者行之篤知行並進果確一心則難者易矣何難之有此進德修業之要學者不可不知也程皓曰所謂定者動亦定靜亦定無將迎無內外臣若水通曰程皓定性書中此數言為一篇之體要皆是本體亦是功夫體用一原故性無內外只是一個定體故動而非隨之往靜而非隨之來故曰定又曰無將迎無內外蓋其本體一定故也學者當察見此本體而存之內外兩忘無動靜往來之間而本體澄然常定大學言知止而后有定者此也大抵只是體認天理一言盡之矣伏惟皇上留心問學兼修德業體認而躬行之幸甚程皓劄子有云古者自天子達於庶人必須師友以成就其德業故舜禹文武之聖亦皆有所從學今師傅之職不修友臣之義未著所以尊德樂善之風未成於天下也臣若水通曰二帝三王皆有師傅賓友者非為美觀虛設也蓋以非師友無以成其德業也師友者所以開君之聰明而養君之德性者也故自天子以達於庶人未有不須師友而能獨成也故古之舜禹文武或學於務成昭或學於西王國或學於太公或學於伊尹是故聖益聖而治益隆也後世不知出此雖具其官而非其人或用其人而不師其道徒為虛設宜其德業不成而治之不古若哉書曰能自得師者王謂人莫已若者亡成敗之決皆在於此也伏惟皇上師法往古以重師傅之任則天下將蒙其休澤矣張載曰人能不疑便是德進蓋已於大本處不惑則雖未加工思慮必常如此積久自覺漸變臣若水通曰學求其不疑而已學問思辨所以求不疑也不疑則洞見本體而天德日進矣然見之真則行必至知行不離者也夫然後可以語變化矣書曰王忱不艱言見之真則行必至也載謂不疑則德進深明易簡之學矣但謂大本不惑雖未加工意思必常如此似分知行為二矣且思慮常如此而積久之非工夫而何此又不可不知也朱熹曰事變無窮機會易失酬酢之間蓋有未及省察而謬以千里者是以君子貴明理理明則異端不能惑流俗不能亂而德可久業可大矣臣若水通曰朱熹明理之論至為千聖千賢大頭腦處理者天理也體認天理則天理日明德可久業可大蓋有本者如是也其不及省察亂於流俗惑於異端而不免千里之謬者皆由於無隨處體認天理之功爾故體認天理而學問之道畢矣學問之道畢而聖賢之事業成矣從事於斯者其勉旃哉張栻作靜江府學記云天之生斯民也則有常性人之立於天地之間也則有常事在身有一身之事在家有一家之事在國有一國之事其事也非人之所能為也性之所有也弗勝其事則為弗有其性弗有其性則為弗克若天矣克保其性而不悖其事所以順乎天地然則捨講學其能之哉臣若水通曰人之同有是心則同有是性同有是性則同有是事宋儒陸九淵曰宇宙內事即已性分內事已性分內事即宇宙內事言其理之一也盡心則盡性盡性則盡事盡事則盡事天之道矣是故君子有講習進修之功所以存此而已心性與事離而二之是二乎天矣德何由而進業何由而修哉噫弊也久矣人主欲盡事天之道當自盡心始臨川吳澄曰所貴乎學者以其能變化氣質也學而不足以變化氣質何以學為哉世固有率意而建功立業者矣亦有肆情而敗國殄民者矣彼其或剛或柔或善或惡任其氣質之何如而無復矯揉克治以成人學者則不如是昏可變而明也弱可變而強也貪可變而廉也忍可變而慈也學之為用大矣哉凡氣質之不美者皆可變而美况其生而美者乎臣若水通曰人之氣質一而已矣中正者則道也偏而邪者即非道也故學之道不過變其偏以歸之中正而已矣學而不能變化氣質又奚庸於學哉是知人不可以不學而學者所以為道也記曰雖愚必明雖柔必強氣質之變也學者其可不加百倍之功也哉國朝乙巳三月起居注宋濂乞歸省金華太祖賜金幣而遣之濂還金華進表謝復致書世子勸以進修太祖覽書喜召世子諭之曰吾自幼極艱難今爾曹冠服華麗飲食甘美安居深宮不思勇於進修是自棄也宋起居之言有益爾其味之復遣使至金華賜書奬諭濂賜以綺帛仍令世子親致書以報人皆歎太祖待士之盛臣若水通曰遜志時敏則德可久業可大而况帝王之學與韋布不同者乎宋濂身處江湖心存廊廟致書世子勉以自修孟子曰責難於君謂之恭若宋濂者可以當之矣此為人臣者之所當法也易曰進德修業欲及時也仰惟皇上春秋鼎盛好學不倦宜推此心上法皇祖之訓及時勉進德業以隆治化永丕基于億萬年幸甚丙午五月皇祖命有司訪古今書籍藏之祕府以資覽閲因謂侍臣詹同等曰三皇五帝之書不盡傳於世故後世鮮知其行事漢武帝購求遺書而六經始出唐虞三代之治始得而見武帝雄才大略後世罕及至表章六經開闡聖賢之學有功於後世又曰吾每於宮中無事思節用而愛人使民以時真治國之良規萬世之師法也臣若水通曰伏觀我聖祖命有司求書籍藏之祕府以資觀覽而拳拳以聖賢之學為言切至矣夫聖人之治本於一心聖人之心見於六經故學六經者所以因聖言以感吾心而達於政治者也後世之學乃以經書資口耳言語之末讓聖賢之道而不為得非買櫝而還其珠之謂哉法皇祖之訓修聖賢之德業以一洗士習之陋誠在今日矣洪武十五年五月十七日上幸國子監謁先師孔子釋菜禮成退御講筵祭酒吳顒等以次講畢上謂之曰中正之道無踰於儒上古聖人不以儒名而德行實儒後世儒之名立雖有儒名或無其實孔子生於周末身儒服行儒道立儒教率天下後世皆欲歸于中正惜乎魯國君臣無能用之者當時獨一公父文伯之母知其賢責其子之不能從卿等為師表正當以孔子之道為教使諸生咸趨乎正則朝廷得人矣復命取尚書大禹臯陶謨洪範親為講説反覆開論羣臣聞者莫不悚悅遂賜宴竟日而還臣若水通曰我皇祖中正之訓深契堯舜禹湯文武周孔相傳執中建極一貫之指矣又嚴儒者名實之辨而以表正之責歸之師儒以為諸生修德業之規誠開一代道德之原也夫何後之士習日異貴名而賤實崇末而棄本溺於記誦辭章之習連篇纍牘皆仁義道德之言至於躬踐其實則羣非之其亦異乎皇祖之訓矣伏惟聖明留意焉洪武二十年二月甲辰御注尚書洪範成上嘗命儒臣書洪範揭於御座之右朝夕觀覽因自為注至是成召贊善劉三吾曰朕觀洪範一篇帝王為治之道也所以敘彛倫立皇極保萬民敘四時成百榖本於天道而驗於人事箕子為武王陳之武王猶自謙曰五帝之道我未能焉朕每為惕然遂疏其旨為注朝夕省覽三吾對曰陛下留心是書上明聖道下福生民為萬世開太平者也臣若水通曰洪範一篇帝王之學三極之道備矣皇祖注解以揭於座右所以埀帝王相傳之道統以佑啓於萬世者至矣聖明繼皇極之統宜憲章祖述以為德業久大之圖焉永樂十二年二月百官奏事太宗皇帝退坐右順門所服裏衣袖敝垢納而復出侍臣有贊聖德者上慨然歎曰朕雖日十易新衣未嘗無但自念當惜福故每浣濯更進昔皇妣躬補緝故衣皇考見而善曰皇后居富貴勤儉如此正可以為子孫法故朕常守先訓不敢忘言已愴然侍臣頓首曰陛下恭儉如此誠萬世之法臣若水通曰勤儉美德也神禹大聖孔子稱之不過惡衣服卑宮室菲飲食而已然則聖人之所以聖亦不外此爾我太宗文皇帝克守先訓惟恭儉是尚非盛德者能之乎書稱克勤克儉聖子神孫宜念兹在兹也哉國朝英宗皇帝言朕一日之間五鼓初起拜天雖足疾亦跪而拜拜畢省奏章復謁八廟禮畢視朝退即朝母后復出親政務有關大臣者召而訪問商確復省章奏乃回宮進膳飲食隨分未嘗揀擇衣服亦隨宜雖著布衣人不以為非天子也大學士李賢曰如此節儉益見盛德若朝廷節儉天下百姓自然富庶惟耳目玩好不必留意自然節儉上又曰朕至申初復省章奏暇則聽內政至晚而休賢曰自古賢君修德勤政莫不皆然陛下持此不衰可以為堯舜之君矣上曰如此亦有何勞否則便於安逸怠荒至矣雖悔何追賢曰陛下言及於此社稷蒼生之福也臣若水通曰昔堯之欽恭舜之兢業禹克勤克儉文王自朝至於日中昃不遑暇食英廟是事也有衆善焉拜天謁祖孝也惡衣惡食儉也省奏清問而以宴安為戒勤也此其所以克終厥德視古之帝王無愧焉國朝英宗皇帝曰書經四書朕皆讀遍如二典三謨真是嘉言賢曰誠如聖諭帝王修身齊家敬天勤民用人為政之事皆在其中貴乎體而行之曰然臣若水通曰傅説之告髙宗曰學於古訓乃有獲古訓者典謨諸書皆是也然徒誦其文而不能體其實則亦何獲之有夫傅説之所謂學者覺也於古訓而覺我之心則非徒知之亦力行之矣此體行之説李賢所以為英廟勸歟惟陛下留意格物通卷二十九
