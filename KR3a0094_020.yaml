body:
  text: 格物通卷二十明湛若水撰正心下宋儒周敦頥曰見其大則心泰心泰則無不足無不足則富貴貧賤處之一也處之一則能化而齊故顔子亞聖臣若水通曰大指天理而言曽點漆雕開己見大意正謂此也泰舒也化即所過者化之化理無富貴貧賤之殊能化其富貴貧賤之念則與道一而去聖不逺矣故曰亞聖夫心廣大髙明天理渾然何嘗不泰人人皆有惟顔子之心不違仁故能見之分明而外物不纍故能化而不滯此所以能亞於聖也學者知其大皆我固有而隨處體認天理焉此入聖之門也荀卿曰養心莫善於誠周敦頥曰荀子元不識誠程皓曰既誠矣心安用養邪臣若水通曰皆一心也自其生理而言謂之性自其實理而言謂之誠自其主一而言謂之敬自其極實無妄而言謂之至誠孟子曰誠者天之道也思誠者人之道也學至於誠極矣誠心又何假於養敬者所以至乎誠者也荀卿惟不識誠也故有養心用誠之説不識性也故有性惡之説不識性與誠是不識心也非二物也是故知性則知誠矣知誠則知心矣故君子之學莫先於知心程皓曰學者須敬守此心不可急迫當栽培深厚涵泳於其間然後可以自得但急迫求之只是私己終不足以達道臣若水通曰守操而不失也急欲速也迫促也進道之功有自然之節度也或失則過焉或失則不及焉皆非自然之本體也孟子曰必有事焉而勿正心勿忘勿助長也夫助則過忘則不及皆不可以進道也故道之進也在於勿助勿忘之間而已矣是故知道者鮮矣知道者鮮而天下無善治矣嗚呼揭離明於長夜冥行之際正有望於今日程皓年十六時好田獵後見周敦頥自謂今無此好矣敦頥曰何言之易也但此心潛隱未發一日萌動復如前矣後十二年暮歸在田野間見田獵者不覺有喜心乃知果未也臣若水通曰心之本體無一物也動於氣而物欲生焉欲之根既生未易得而除也見天理則人欲消矣顧其根未易拔也必體認天理之公久則可奪舊習矣皓天資最髙而猶不能忘少年之習於涵養積久之下者以病根在也然而下皓一等則其欲根之萌技葉扶疏將折斧斤矣而皓獨先知之易曰顔氏之子有不善未嘗不知知之未嘗復行程皓其殆庶幾乎程皓曰天下無性外之物以有限之形氣用之不以其道安能廣大其心也心則性也在天為命在人為性所主為心實一道也通乎道則何限量之有必曰有限量是性外有物乎臣若水通曰性者心之生理也與天地萬物為一體者也何限量之有人惟私欲蔽之而廣大髙明之體始小矣故孟子盡心知性知天盡心者不蔽於物廓其廣大髙明之量而性自見矣既知之存之而不失所以養性事天不外是矣人主留心聖學宜不出於斯二者伏惟深宫之中臨御之時隨處而加察焉程皓曰一人之心即天地之心臣若水通曰記云人者天地之心也程皓之言其本於斯乎夫人一天地也而心果有二乎哉天地之心何心也生生不息者也人其在生生不息之中最靈者爾心果有二乎哉是故人之心即天地之心即鬼神之心即堯舜禹湯文武周孔之心即途之人之心宇宙內只一心而已矣知乎此者可以識心矣故可以知道矣程頥曰聖人之心未嘗有在亦無不在蓋其道合內外體萬物臣若水通曰心非物也神也神妙萬物是故合內外體萬物而不遺是以謂之神聖人之心未嘗有在亦無不在神也無在無不在之間吾心自然之本體乎是故學者勿助勿忘之時而天理見矣滯於物而不通則亦物焉而已矣豈此心神明之本體乎易曰神而明之存乎其人程頥曰公則一私則萬殊人心不同如面只是私心臣若水通曰心一也而不同者非心之本體然也程皓云人能將身在天地萬物中作一例看多少快活是故天體萬物而無外聖人體萬民而不私私心亡而萬殊一矣故宋儒葉采亦曰公則萬物一體私則人己萬殊其知此矣是故君子之道莫大乎公溥邵雍曰聖人所以能立於無過之地者以其善事吾心者也臣若水通曰聖人之心一仁而已矣則亦何過之有哉是以口不失於人也足不失於人也色不失於人也三者盡而聖人之善事其心者可知矣是故聖人之無過以其無違此心也無違心者善事心者也非以此事彼之謂也事之即心也孟子曰存其心養其性所以事天也然則為人君者知善事其心則知善事其天矣張載正蒙曰聖人盡性不以見聞梏其心其視天下無一物非我臣若水通曰人心廣大天地萬物同體者也見聞之念起於軀殼之私則廣大之體蔽而身外皆非我矣聖人盡已之性以盡人之性盡人之性以盡物之性以其性一也其視天下無一物非我也是之謂見大見大則小不足以梏之矣張載曰人病其以耳目見聞纍其心而不務盡其心故思盡其心者必知心所從來而後能臣若水通曰心者人之神明無所不知無所不能者也惟求道於耳目聞見之際而神明之體始纍於是乎有不知不能也見聞何貴於人哉惟曰盡心焉爾矣盡心者廓去其私則本體圓全而心所從來可不求而知矣若復求心之從來則玄矣張載曰天理一貫則無意必固我之鑿意必固我一物存焉非誠也臣若水通曰意必固我私心也非廣大髙明之本體也天理見則私心亡此盛則彼衰消長之理也孔子之戒門弟子以絶四毋意必固我正心之功斯其至矣張載乃推原於天理又發前人所未發也四者絶而天理全則誠可復矣不然則強制之猶為克伐怨欲不行焉爾何足以語誠哉張載理窟曰求心之始如有所得久思則茫然復失何也夫求心不得其要鑽研太甚則惑心之要只是要平曠熟後無心臣若水通曰張載所謂平曠即勿忘勿助之間也得此則得其理矣失此則失其理矣故茫然而失者謂之忘鑽研太過者謂之助過猶不及爾學者於勿忘勿助之間而平曠自然之氣象自見矣張載曰正心之始當以己心為嚴師凡所動作則知所懼如此一二年間守得牢固則自然心正矣臣若水通曰人心之失事遷之也惟執事敬則心事合一而本體立矣本體立則視聼言動無往而非本體之發夫惡得而放之夫人之心不可欺也知其不可欺恆若嚴師之存而本心無不正者矣藍田吕氏論心曰如衡之平不加以物如鑑之明不蔽以垢乃所謂正也臣若水通曰聖人之心與天地相似何有不正常人之心有滯於忿􅓰好樂恐懼憂患故與天地不相似而鑑空衡平之體亡矣正之之功何如曰敬而已矣是故人君一敬立而萬事出天下治矣五峯胡宏曰造車於室而可以通天下之險易鑄鑑於冶而可以定天下之妍醜蓋得其道而握其要也治天下者何獨不觀乎此反而求諸身乎是故一正君心而天下定矣臣若水通曰物皆有要也何獨至於人而疑之夫帝王之業本諸道帝王之道本諸心是故心也者天下之大夲也大本立達道行焉王業以建而天下之能事畢矣孟子曰君仁莫不仁君義莫不義君正莫不正故為人君者莫先於講明正心之學龜山楊時曰戡定禍亂雖急於戎務必本於方寸不學以致知則方寸亂矣何以成帝王之業乎臣若水通曰萬事本乎一心心無主則一籜之墮可以亂我方寸矣况能應天下之大變乎易曰震驚百里不喪匕鬯言有主也人君為天下之主者其可弗之思乎朱熹曰天下之事其本在於一人而一人之身其主在於一心故人主之心一正則天下之事無有不正臣若水通曰一人謂君也人君之於天下萬事萬化皆生於心故心者治化之原也朱熹之言誠為根本之論矣人君之學可不思所以正心以開治化之原乎朱熹答王子合曰心猶鏡也但無塵垢之蔽則本體自明物來能照今欲自識此心是猶欲以鏡自照而見夫鏡也臣若水通曰至虛至明者心之本體也私欲障之則本體昏而物至不能照矣君子之學去其害本體者爾若復以心求心則憧憧往來朋從爾思是非徒無益而又害之者也張栻答劉宰書有云物欲之防先覺所謹蓋人心甚危氣習難化誠當兢業乎此然隨處隨遏將滅於東而生於西紛擾之不暇惟端本澄源養之有素則可以致消弭之力臣若水通曰端本澄源之道在體認天理而已矣天理有見則私欲自消氣習自化若有防檢之心是又生一心也滅東生西豈有窮乎此張栻端本澄源之論所以不可易也張栻擴齋記有云充無欲害人之心而至於仁不可勝用充無穿窬之心而至於義不可勝用仁義之不可勝用豈自外來乎擴而至於如天地變化草木蕃亦吾心體之本然者也臣若水通曰充擴也穿壁踰垣為盜者也夫心之本體一天理而已矣自其隨感而發則有仁義之分然皆本於人之一心爾實非自外至者也我固有之者也是故充其仁義而天地草木咸在其中矣故曰心體天地萬物者也人主誠能知是心之大而加擴充之功則足以保四海而無餘矣象山陸九淵曰古人教人不過存心養心求放心此心之良人所固有惟不知保養而反戕賊放失之爾茍知其如此而防間其戕賊放失之端日夕保養灌溉使之暢茂條達如手足之捍頭面則豈有艱難支離之事臣若水通曰人之所以為人者心也心得其公正即天理也天理至易簡也何有於支離陸九淵存心養心求放心之説蓋本諸孟子是矣但謂防間其戕賊放失之端是放賊之者一心防之者又一心也其端將無窮不可得而除矣且謂暢茂條達非識其根本而立之何以能致所謂根本者天理而已矣察識天理而存養之則戕賊放失之端可以不防而退聽至於本立道生而暢茂條達自不能已矣臣敢以是廣九淵之説伏惟皇上體而用之以為正心正百官萬民之本天下幸甚陸九淵曰人心至靈此理至明人皆有是心心皆具是理臣若水通曰心即理也理即心之中正也一而已矣而云具者是二之也心得其正故靈惟靈故明非有二也不觀之心失其職者乎心失其職則亦血肉之軀殼而已矣何有於靈邪惟不靈故不明此心理合一之驗也周敦頥曰匪靈弗瑩靈明一也九淵顧以明屬於理而屬靈於心豈非二之也哉九淵謂讀論語疑有子之言支離臣亦敢以是疑九淵焉潛室陳植曰人心如鏡物來則應物去依舊自在不曽迎物之來亦不曽送物之去只是定而應應而定臣若水通曰人心如鏡者何也本無物也故物來則照物去不照照與不照而鏡之本體自如也照在物而不在鏡也無將無迎順其自然聖人之心不失其本體如是而已矣故君子之學廓然而大公物來而順應至此焉止矣是故本體得而學問之功終矣故曰學問之道無他求其放心而已矣鶴山魏了翁曰人之一心至近而逺至小而大至微而著臣若水通曰心者廣大而無外周流而無窮者也無逺近無大小無顯微是故近而能逺小而能大微而能著故盡心存心而天下之理盡之矣人君之治天下可不務乎國朝吳元年五月置福建行省以福汀漳泉建寧邵武興化延平八府𨽻之命中書省參政蔡哲為參政太祖諭之曰君子立身行已莫先於辨義利夫義者保身之本利者敗名之源常人則惟利是趨而不知有義君子則惟義是守而竟忘乎利此所以異於常人者也福建地瀕海民物富庶番舶往來私交者衆往時官吏多為利訹陷於罪戾今命卿往必堅所守毋陷其非哲對曰臣以菲薄叨承恩命敢不盡公以報太祖曰公即無私義之謂也私即忘公利之謂也要公之一字亦未易言此心如止水明鏡無分毫私意纍之然後揆事度物廓然無滯若使胸中微有芥蒂即不得為公矣卿宜勉之臣若水通曰臣伏觀太祖髙皇帝諭蔡哲之命大哉皇言一哉皇心先之以義利公私之辨明其幾也終之以止水明鏡之喻明其體也可謂深得心學之要者矣仰惟我皇上當以聖祖為法而在位諸臣亦當以蔡哲為法則君臣咸有一德而治化成矣洪武十八年五月辛酉朔上御華蓋殿文淵閣大學士朱善進讀心針畢上曰人心道心有倚伏之幾蓋仁愛之心生則忮害之心息正直之心存則邪詖之心消羞惡之心形則貪鄙之心絶忠慤之心萌則巧偽之心杜故人常持此心不為情欲所蔽則至公無私自無物我之纍爾臣若水通曰天理人欲不容並立此盛則彼衰乘除之理然也我皇祖諭學士以人心道心倚伏之幾其深得帝王精一之傳乎夫心一而已矣純乎天真謂之道心雜以人偽謂之人心人心之得其正即道心道心之失其正即人心非有二也仁愛正直羞惡忠慤之心皆天理也忮害邪詖貪鄙巧偽之心皆人欲也天理日進則人欲日消人欲消盡則純是天理化之者為聖人故君子之學在隨處體認天理而已矣千聖千賢之貫也此聖祖實開一代心學之源也伏惟聖明留意焉洪武十九年正月上坐東閣因與侍臣論仁智上曰聖人篤於仁賢者不舞智若姑息之仁不為愛物姦欺之智足以禍身又論天人相與之際上曰天人之理無二人當以心為天論儉上曰不可儉者祭祀然祭不可瀆不可儉者賞賚然賞不可濫臣若水通曰天地之吾其體天地之帥吾其性人與天本一理也人茍體認天理於心無私蔽之纍則一念之愛足以利物而不為姑息之小仁一念之明足以周身而不為姦欺之私制一念之節制時豐而豐時儉而儉而不為違道之豐儉皆天理之流行矣天理流行與天心合矣皇祖與侍臣之論及此其天人合一之心乎仰惟聖明體皇祖之心則溥博淵泉而時出之家國天下永荷其無疆之休矣國朝太祖造觀心亭於宫城上親幸其中召學士宋濓謂曰人心虛靈乘氣機出入操而存之為難朕罔敢自暇自逸譬魚之在井雖未免乎跳躑終不能度越範圍况有事於天地廟社尤用祗惕致齋之日必端居亭中返視却聼上契沖漠體道凝神誠一弗二庶幾將事之際對越在天洋洋乎如臨其上卿為朕記之傳示來裔咸知朕志俾弗懈愈虔臣若水通曰人心虛靈常在也蔽之若出覺之若入故在操舍而己皇祖造亭宫城扁曰觀心親幸體認齊一於斯即成湯銘盤之意也有事於天地廟社致齊亭中返觀却聼上契沖漠洋洋如見即文王昭事之敬也惟其操心誠一弗二此所以應天順人肇造鴻業以開萬世之太平善於己而垂諸後其佑啓之意深矣聖嗣尚當以皇祖之心為心存養於未事之先廓然太公靜則定矣及事物之來隨感順應動亦定矣如是則皇祖之心豈不在我而皇祖之緒豈不永之於無窮也哉國朝太祖曰人君一心治化之本存於中者無堯舜之心欲施於政者有堯舜之治決不可得也臣若水通曰天下之治本於善政天下之政本於君心堯舜以精一執中之心行精一執中之治體用一原耳惟皇祖契之故發探本之論也譬之木焉心其根矣政治其枝葉花實矣培植其根則生意滋息枝葉花實固其一本之發也人君能涵養以正其心則天理純全達於政事而治化成矣不立天下之大本而欲致天下之大治是斧其根而溉其葉也豈可得哉仰惟聖明因皇祖之言而反求之即存堯舜之心而致堯舜之治矣愚臣不勝願望之至永樂二年八月翰林學士解縉等進呈大學正心章講義太宗覽之至再諭縉等曰人君誠不可有所好樂一有好樂泥而不返則欲必勝理若心能靜虛事來則應事去如明鏡止水自然是天理朕每退朝默坐未嘗不思管束此心為切要又思為人君但於宫室車馬服食玩好無所增加則天下自然無事矣臣若水通曰心之本體無一物也忿􅓰恐懼好樂憂患四者皆私也而有一焉即失其本體而心不正矣人君居崇髙之位好樂尤為害心不可不深戒也太宗文皇帝因解縉等講大學正心章而尤以好樂為戒真可謂知正心之先務者矣又以虛靜應物比之鏡水自然天理誠至論也夫天理二字千聖千賢之大頭腦也人君於心得其正時認取則天理見矣涵養而擴充之則王道不外是矣宋之人主乃厭聞正心誠意之説無怪乎國祚之不競也惟聖明以堯舜禹湯文武之資求堯舜禹湯文武之心學當近以祖宗正心之論為的幸甚格物通卷二十
