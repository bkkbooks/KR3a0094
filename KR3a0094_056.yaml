body:
  text: 格物通卷五十六明湛若水撰正萬民下漢高帝元年十一月沛公悉召諸縣父老豪傑謂曰父老苦秦苛法久矣吾當王關中與父老約法三章爾殺人者死傷人及盜抵罪餘悉除去秦法諸吏民皆按堵如故凡吾所以來為父老除害非有所侵暴無恐且吾所以還軍霸上待諸侯至而定約束爾乃使人與秦吏行縣鄉邑告諭之秦民大喜爭持牛羊酒食饗軍士沛公又讓不受曰倉粟多非乏不欲費民民又益喜惟恐沛公不為秦王臣若水通曰秦之所以得罪於天下者暴虐之政使民無所措手足爾高祖入關之初而遂除秦苛法約法三章其庶幾仁以育之義以正之者矣此漢之所以興乎史氏揭而書之蓋其仁義之舉雖未足以追配湯武亦庶幾秋殺之中而寓春生之仁乎漢文帝六年冬十月梁太傅賈誼上疏其略曰商君遺禮義棄仁恩并心於進取行之二嵗秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰鋤慮有德色母取箕帚立而誶語抱哺其子與公併倨婦姑不相悅則反唇而相稽其慈子嗜利不同禽獸者亡幾矣今其遺風餘俗猶尚未改棄禮義捐亷恥日甚可謂月異而嵗不同矣臣若水通曰先正有言風俗者起於上而成於下者也故上有好者下必有甚焉者矣秦因商君以其慘刻之心務功利之政風俗薄惡至文帝之世其俗尚在宜乎有更化善治之君也記曰堯舜帥天下以仁而民從之桀紂帥天下以暴而民從之其本則在於君相而已有天下者當正其所好尚好尚正而民心正民心正而天下之風俗正矣漢光武建武十四年秋大中大夫梁統上疏曰臣竊見元帝初元五年輕殊死刑三十四事哀帝建平元年輕殊死刑八十一事其四十二事手殺人者減死一等自是之後著為常凖故人輕犯法吏易殺人經曰爰制百姓於刑之𠂻自高祖至於孝宣海內稱治至初元建平而盜賊浸多皆刑法不𠂻愚民易犯之所致也由此觀之則刑輕之作反生大患惠加姦軌而害及良善也事寢不報臣若水通曰仁育義正古昔聖王所以治民之要道也故天之道非春不生非秋不成故有肅殺所以成其生長之功也元哀二帝法弛而輕縱是失其所以正萬民之道矣及民易犯刑罰何以異設水於前而使之易玩而溺之死也哉梁統之論救正其弊光武不能嘉納其言而用之此東漢之治所以不能追三代之隆也然則光武其亦中才之主也哉漢桓帝元嘉元年十一月詔舉獨行之士涿郡舉崔實詣公車稱病不對策退而論世事名曰政論其辭曰刑罰者治亂之藥石也德教者興平之粱肉也山陽仲長統見其書歎曰凡為人主宜寫一通置之座側臣若水通曰子産惠人也亦鑄刑書水火之喻切矣崔實立政論於漢粱肉藥石之喻得救時正民之道君子有取焉孟子曰以生道殺民其此之謂乎然則人主盍亦酌剛柔之中哉魏無鄉黨之法唯立宗主督護民多隱冒三五十家始為一户內祕書令李沖上言宜準古法五家立鄰長五鄰立里長五里立黨長取鄉人強謹者為之鄰長復一夫里長二夫黨長三夫三載無過則升一等其民調一夫一婦帛一匹粟二石大率十匹為公調二匹為調外費三匹為百官俸此外復有雜調民年八十巳上聽一子不從役孤獨癃老篤疾貧窮不能自存者三長內迭養食之書奏詔百官通議甲戌初立黨里鄰三長定民户籍民始皆愁苦豪強者尤不願既而課調省費十餘倍上下安之臣若水通曰三長既立萬民表正上有經費下無侵害壯有復夫窮有迭養而民俗厚矣李沖之言豈非經國要務哉隋文帝開皇九年二月丙申制五百家為鄉置鄉正一人百家為里置里長一人臣若水通曰鄉正里長即古鄉大夫里宰之遺意也然以正以長為名豈非欲其以公正之德而長之教之親睦戒之刑法以同歸於無偏無黨無反無側之化哉後世失其意而徒以追租之隳突獄訟之交攻為務豈立正長之法固如是哉唐高祖武德七年春正月依周齊舊制每州置大中正一人掌知州內人物品量望第以本州門望高者領之無品秩臣若水通曰古者閭胥書其德族師書其行則民不敢為惡而勉於為善大中正之設雖自唐而用之品量人物則亦古之遺意也夫以中正為名必其人果足以當之可也不然不中不正未有不以賢為不肖以不肖為賢者矣故以中正而察人則易而得其中正之人則難得其人則足以中人之不中正人之不正矣賈誼新書曰以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民之善者或異或道之以德教或驅之以法令道之以德教者德教洽而民氣樂驅之以法令者法令極而民風哀哀樂之感禍福之應也臣若水通曰書曰刑期於無刑民協于中又曰伯夷降典折民惟刑禮義刑罰皆所以正萬民而不可偏廢者也茍禮義不施而惟刑罰之滋焉祗見民未正而天下之亂成矣今夫天道之大也四時之運也徒以秋殺而無春生之仁則萬物其不漸盡而磨滅者幾希矣故為君者德刑兼濟仁義並行陽舒隂慘體天之道夫然後中和致而天地之祥應矣劉向説苑曰聖人之治天下也先文德而後武力凡武之興為不服也文化不改然後加誅夫下愚不移純德之所不能化而後武力加焉臣若水通曰天地之化獨隂不生獨陽不成程頥曰文德所不能服而不用威武何以平治天下由是言之文武並用人君中正之道也君天下者可不知所審哉劉向曰百方之事萬變蜂出或欲持虛或欲持實或好浮遊或好誠必或行安舒或為飄疾從此觀之天下不可一聖王臨天下而能一之臣若水通曰天下民心之不正者風俗之不同也風俗之不同者道德之不一也百方之事雖有萬變所不能變者此心此德耳聖君臨御於上而所以一天下者皆本之身心之正焉則風行草偃自不容己者矣是故人君之正萬民盍求所以一之者哉劉向曰禹出見罪人下車而泣之左右曰夫罪人不順道故使然焉君王何為痛之至於此也禹曰堯舜之人皆以堯舜之心為心今寡人之為君也百姓各自以其心為心是以痛之也書曰百姓有罪在豫一人臣若水通曰宇宙之內一心爾堯舜此心也堯舜之民亦此心也禹此心也禹之民亦此心也故禹之民之心得其正即堯舜之民之心堯舜之民之心得其正即堯舜之心堯舜之民以堯舜之心為心者以得其同然者非謂本無是而求於堯舜也禹之民各自以為心是失其所同然者耳仰惟皇上秉堯舜禹之資其心即堯舜禹之心矣斯民也三代之所以直道而行也今之百姓之心者獨非堯舜之民之心乎顧躬行以率之者何如爾詩曰天之牖民如塤如篪如取如携携無曰益牖民孔易言致同也開聰明擴良知是已蓋凡民自有之矣開之擴之如呼夢者而使寤喚醉者而使醒我但能覺之而已非外與之以寤與醒也顧不易哉茍體認擴充大禹泣罪之心則皇上之心即堯舜禹之心而今天下之民亦莫不以皇上之心為心矣孰謂唐虞三代之治不可復見也周敦頥通書曰天以陽生萬物以隂成萬物生仁也成義也故聖人在上以仁育萬民以義正萬民天道行而萬物順聖德修而萬民化大順大化不見其迹莫知其然之謂神故天下之衆本在一人道豈逺乎哉術豈多乎哉臣若水通曰夫民非仁不育非義不正育之也者生之也正之也者成之也茍生矣而不正之以義則欲動情勝相攻賊滅不可得而成矣奚其正故仁育義正而後君道成春生秋殺而後天德成闕一則偏廢匪順匪化何以成聖人天地之神哉故君民之道在仁義並行矣程皓曰古者鄉田同井而民之出入相友故無爭鬬之獄今之郡邑之訟往往出於愚民以戾氣相搆善為政者勿聽焉可也又時取強暴而好譏侮者痛懲之則柔良者安鬬訟可息矣臣若水通曰明刑所以期於無刑孔子曰聽訟吾猶人也必也使無訟乎此息訟之道也明道勿聽之説蓋一時救弊之言爾何則君子之為政也端本尚矣乃若訟生於前茍無説以開明之則亦迷而不悟而已何以動其自責自咎之念哉臣故曰一時救弊之言為不端本者設也邵雍曰天有隂陽人有邪正邪正之由繫乎上之所好也上好德則民用正上好佞則民用邪邪正之由有自來矣臣若水通曰上者下之倡也孔子曰子帥以正孰敢不正又曰上有好者下必有甚焉者矣下民之邪正在上所以感之者何如爾然則後之人君世主欲正天下之民者可不正其好惡以端其本哉經曰表正萬邦是在君身而已矣蔡沈洪範內篇曰制人為九行臣若水通曰制别也九行謂寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而亷剛而塞強而義也九行人所固有皆一理也聖人别而制之所以示人以德行之實也正民之道豈有外於此哉國朝吳元年皇祖命中書省定官房舍服色等第諭廷臣曰古昔帝王之治天下必定禮制以辨貴賤明等威是以漢高初興即有衣錦繡綺縠操兵乘馬之禁歷代皆然近世風俗相承流於奢侈閭里之民服食居處與公卿無異貴賤無等僣禮敗度此元之失政中書以其房舍服色等第明立禁條頒布中外俾各有所守以正名分臣若水通曰正民之道莫先於正名分正名分莫先於定服器前元以失其政是以名分不正風俗不美奢侈相承貴賤無等閭里之民服食宫室與公卿無異僣禮敗度莫此為甚矣我皇祖明大義於天下頓革舊習乃命中書定服舍器用之制明立禁條以正名分使萬民歸正還古帝王之道昔武王滅商乃反商政政由舊我皇祖之謂乎洪武元年聖祖為大明令一百四十五條頒行天下制曰惟律令者治天下之法也令以教之於先律以齊之於後古者律令至簡後世漸以煩多甚至有不能通其義者何以使人知法意而不犯哉人既難知是啓吏之姦而陷民於法朕甚憫之今所定律令芟繁就簡使之歸一直言其事庶幾人人易知而難犯書曰刑期于無刑天下果能遵令而不蹈於律刑措之效亦不難致兹命頒行四方惟爾臣庶體豫至意臣若水通曰此聖祖頒律令於天下諭民之詔也書曰刑期于無刑民協于中故律令行則民德協中而無不正矣我太祖之臨御臣庶必先立律令以正之其義之盡而仁之至矣國朝太祖作為條訓以示子孫有曰朕自起兵至今四十餘年人情善惡真偽無不歷涉其中姦頑刁詐之徒情犯深重灼然無疑者特令法外加刑使人知所警懼不敢輕易犯法然此特權時處置頓挫姦頑非守成之君所常用以後子孫做皇帝時止守律與大誥並不許用黥刺剕劓閹割之刑敢有請用此刑者犯人凌遲全家處死臣若水通曰吕刑曰刑罰世輕世重故刑亂國用重典刑平國用中典此聖祖承前元之亂既以法外加刑於姦頑之人矣其所謂用重典者乎至是復戒子孫止守律與大誥而禁用黥刺剕劓閹割之刑其所謂用中典者乎世輕世重與時宜之得先王制百姓于刑之中之道矣正民之義何以加此雖然世平法玩久則委靡人尚姑息法就廢弛如久病之人氣息奄奄隨世輕重當思所以振作之術乎此又惟聖祖言外之意也洪武二十二年十一月乙丑上御謹身殿翰林院學士劉三吾侍因論治民之道三吾言南北風俗不同有可以德化有當以威制上曰地有南北民無兩心帝王一視同仁豈有彼此之間汝謂南方風氣柔弱故可以德化北方風氣剛徑故當以威制然君子小人何地無之君子懷德小人畏威施之各有攸當烏可槩以一言乎三吾悚服稽首而退臣若水通曰正民之道中而已矣剛柔強弱中焉而已矣所以能中者心而已矣三吾所謂德化於南威制於北不知民心中正之理矣皇祖諭以地有南北民無兩心其真識本心而得帝王心學之傳者乎人君茍明諸心而得中正之理則至中有以救天下之邪至正足以一天下之動沉潛剛克高明柔克強弗友剛克燮友柔克可以持三德之用正萬民之偏矣大明令庶民男女衣服並不得僣用錦繡許用紵絲綾羅紬絹素紗金首飾一件金耳環一對餘止用銀翠帽頂帽珠並不得用金玉珊瑚琥珀靴不得製造花樣金線粧飾臣若水通曰易曰上天下澤履君子以辨上下定民志夫民志之不定以名分之不明名分之不明以僣侈之無禁古之時農工商賈各勤其事而所享有限故皆有定志而上下之分明矣後世僣侈之風日盛庶民服用上擬王公名分之不明莫此為甚我聖祖著為此令其所以辨上下而定民志者不在是哉教民榜凡民間户婚田土鬬毆相爭一切小事不許輒便告官須經里老理斷違者不問虛實杖六十仍發里老理斷若民自能含忍不願告訴者不許里老風聞尋趂勾引生事違者亦杖六十有贓重論臣若水通曰民生有欲不能無爭爭者小則小理之在里老則情易得而悔易生禁生事則其萌易除而其焰易熄一朝之忿至於亡身及親者可免矣萬民之正有不由於此哉教民榜里老不但與民果決是非務要勸民為善其本鄉本里人民務要見丁著業出入互相周知違者論罪教民榜本鄉本里有孝子順孫義夫節婦及一善可稱者以實迹申奏有司不舉者罪之其無籍刁頑挾制官府者嚴加懲治其強劫盜賊逃軍逃囚及生事惡人里老即須會多人擒拏送官違者治罪臣若水通曰鼓舞萬民之術勸懲舉措而已矣一鄉之人善惡必不能遁其情也故責之以勸戒於前舉措於後而賞罰行焉則民德歸正矣教民榜鄉里人民住居相近父祖以來非親即識其年老者或父祖輩行或伯叔輩行年幼子弟皆須敬讓敢有輕薄不循教者許里老量情責罰若年老者不以禮導生事羅織亦治以罪務要鄰里和睦長幼相愛如此自無爭訟安享太平臣若水通曰史臣贊堯之治化而曰協和萬邦誠使長幼有序老少相得其為協和何如也然堯必先明峻德公孫𢎞曰人主和德於上百姓和合於下蓋必有以本之也其明德和德之學動民之道伏惟聖明留神焉宣德二年七月上御奉天門諭兵部尚書張本等曰近來民有訴妄解充軍者此乃有司之過彼意蓋謂朝廷所重在軍不知民乃國家根本夫朝廷於軍民正如舟車任載不可偏有輕重今後卿等須令有司審實軍則為軍民則為民毋致妄冒違者必罪不恕臣若水通曰古者因井田而制軍賦兵出於農有事從司馬而閲之以擊刺征伐之方無事從司徒而訓之以事君親上之道何有軍民之分降及後世兵農分而為二兵出身以衛農農出粟以養兵故當變故則崇軍旅而輕農氓當治平則重農氓而蔑軍士殊不知文武一道軍民一體而可以偏重乎哉我宣宗之言可以為永鑒矣格物通卷五十六
