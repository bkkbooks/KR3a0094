body:
  text: 格物通卷五十一明湛若水撰正朝廷上易乾九五飛龍在天利見大人臣若水通曰重乾為乾健之至也九為陽德剛健居五為中正具剛健中正之德變化不測有龍之象五為君傳履帝位而有天下龍之飛于天所謂大人也此心此德人人所共有故興起其秉彞之心天下快覩而願見之以其有中正之德澤天下而足以為人之所賴者也其見之不亦利乎由是言之人之利見大人以其有龍德中正也彼有是位而無是德者民將逺之矣故朝覲訟獄者不之堯之子而之舜不之舜之子而之禹其利見大人之謂乎乾彖曰首出庶物萬國咸寧臣若水通曰聖人具體乾道有元亨利貞之德出類拔萃卓冠羣倫而高拱於穆清之表居臣民之上所謂首出庶物也而萬國之臣民䝉聖人之澤感而化之各遂其生各復其性而無不安寧外寧其生內寧其性所謂萬國咸寧也是則聖人具中正之德極其裁成輔相之功猶乾道之變化也澤及於民生養遂而成性復猶萬物之歸根復命也此聖人之利貞也聖人體具乾剛中正之德運諸朝廷之上則朝廷正而天下治矣履彖曰剛中正履帝位而不疚光明也臣若水通曰否德忝位則疚也剛健中正德之至也有是德而受命尊履帝位故不疚也然其所以不疚者以其德之光明爾陽剛中正故光大而高明足以居帝位而臨御朝廷以為臣民之瞻仰又何疚乎離象曰明兩作離大人以繼明照于四方臣若水通曰離為火重離兩火相照故曰繼明日月為明離日之象也離之相麗而作日之至明容光必照也大人禮此象其德之明緝熙而不已猶日之繼也四方之逺庶物之繁無有能遁其情者矣中庸曰唯天下至聖為能聰明睿知足以有臨日月所照莫不尊親凡日之所照大人之德亦照之也夫明德人人所同有人惟蔽於氣禀物欲之私則失其明矣不明不足以照物豈足以立朝廷而臨天下耶故朝廷四方之極君德以高明為主未至於明者其亦反求諸心之所同有者明之而已矣鼎象曰木上有火鼎君子以正位凝命臣若水通曰鼎卦上離下巽以木出火有烹飪之象故為鼎君子觀鼎之象知鼎為法象之器其形端正取之以自正其位以凝承休命位者天位也天之道正也居其位而體天道之正隨所居之位而正焉正其心則思無邪也正其身則正顔色動容貌也正其事紀綱法度也與天合德而天命聚於我矣故人君以此而正位凝命以臨朝廷立四方之極如鼎之定而不遷矣可不慎歟書周書洪範凡厥庶民無有淫朋人無有比德惟皇作極臣若水通曰此箕子衍皇極之疇告武王也淫朋邪黨也人有位之人比德私相比附也言庶民無有邪黨在位之人無有私相比附者惟人君立極於上皇極立則朝廷正矣斯有以化臣民之心使之大公無私爾淫朋比德皆私心為之也堯舜之時公道大明人皆以堯舜之心為心者以堯舜執中之化也人君居臣民之上可不謹於心術之微公私之辨以立朝廷大中至正之矩乎召誥其惟王位在德元小民乃惟刑用于天下越王顯臣若水通曰此召公告成王之言也位君位也德元者謂為德之首也刑儀刑也越猶於也顯明也言居天下之上必有首天下之德君德既立則朝廷以正而小民觀感興起皆儀刑用德於下所謂羣黎百姓遍為爾德是天下小民之德皆王之德也於王之德豈不益光顯矣乎詩大雅棫朴追琢其章金玉其相勉勉我王綱紀四方臣若水通曰此詩詠文王之德也追雕也金曰雕玉曰琢相質也勉勉者勉而又勉純亦不巳之意我王謂文王也大者為綱小者為紀四方之本在朝廷朝廷之本在紀綱紀綱之本在君心故棫朴詠文王之德言其如金玉之質而有雕琢之文蓋其勉而又勉純亦不巳而為四方之綱紀也蓋文王之心純乎天理故運之於綱紀大之而綱人倫統體常張而不弛小之而紀政事節目常理而不亂所以維持統御乎四方者如金玉雕琢之文章也以此觀之人主欲正乎朝廷在先正乎紀綱欲正紀綱在先正乎一心使天理之本體大公至正廣大高明足以為紀綱之本而後施之紀綱者皆此心之管攝運用罔不振肅者矣紀綱振肅則體統尊嚴朝廷罔不正矣朝廷者四方之極也朝廷正而四方敢有不正者乎故曰人主一心萬化之源茍欲正紀綱以正朝廷而不先正此心以立其本則枝葉雖茂本根已蹶形體雖安命脈以危其如紀綱朝廷何哉春秋成公十六年曹伯歸自京師臣若水通曰書曹伯者王與其伯也因魯史之文也書歸自京師譏王之不罪其罪而成其爵也京師者朝廷也朝廷四方之極而命德討罪之所從出也其言自京師王命也言天王之不誅有罪而釋之歸以成其為伯也負芻殺世子而自立王不能因晉之執置諸刑典討罪之權不行矣而使復國則命德之典何在焉命德討罪之典壞之於朝廷又何以為天下之共主哉禮記王制天子無事與諸侯相見曰朝考禮正刑一德以尊于天子臣若水通曰此諸侯朝天子之事也天子無他事故諸侯各以其期見于天子是之謂朝其來朝之事豈徒然哉亦為述職而行也故又考禮正刑一德以尊天子禮者五禮天子嘗因天秩而五庸之矣於是考諸侯之禮合於天子之禮否歟刑者五刑天子嘗因天討而五用之矣乃正諸侯之刑合於天子之刑否歟德者天子嘗因人之固有而教之矣又一諸侯之道德以同風俗果合於天子歟如是則天子之禮刑道德諸侯奉承而不敢違是所以尊天子者至矣天子尊則朝廷尊矣臣民賴天子朝廷之尊以安者也我朝稽古為治三年一朝天下嶽牧郡縣之臣萃而覲之於天子固所以述職也而銓衡亦嘗有殿最之課矣今天下車同軌書同文王制所謂禮刑固不待考正而自同矣獨一道德以同風俗者則在明天子之主盟斯道而輔臣宜贊襄之以成一德之化天下幸甚郊特牲君之南鄉答陽之義也臣之北面答君也臣若水通曰君即天子也答對也南鄉南面也陽盛於南方長養萬物之地也人君對時育萬物故南面以對陽也人臣北面以朝君者對君育養之德也君南面臣北面上下之位定而朝廷正矣玉藻朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服臣若水通曰辨色謂初明之時可辨顔色也視之視朝也詩曰夜向晨庭燎有輝即臣之辨色入朝也所以防微也又曰東方明矣朝既盈矣即君之日出視朝也所以優尊也然入而臣先於君明分守也退而使人視大夫大夫退而後退小寢釋服君後於臣防怠荒也君無怠荒而羣臣守分則朝廷尊矣漢唐以來或五日或三日或旬日始朝我祖宗以勤為治無日不朝仰惟聖明早朝晏罷退御便殿延訪政事可謂逺追帝王近遵成憲者矣持此始終如一不替益䖍豈不休哉哀公問孔子對曰政者正也君為政則百姓從政矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政如之何孔子對曰夫婦别父子親君臣嚴三者正則庶物從之矣臣若水通曰正政者所以正朝廷也正三綱者所以正政也君為臣綱父為子綱夫為妻綱三綱正則五倫正而為政之道得矣此朝廷之所以尊乎仲尼燕居曰以之朝廷有禮故官爵序也臣若水通曰朝廷禮法之所出也故禮用之朝廷則上下辨名分嚴尊卑有等是故官爵序也然則朝廷之禮其可以不肅乎坊記天無二日土無二王家無二主尊無二上示民有君臣之别也臣若水通曰何以天無二日日者天之陽精也陽一而已故日無二何以土無二王王御土中者也土中一而已故王無二何以家無二主主者家之尊也其本一而已故家主無二故三才之道一而已矣天之尊在一日土之尊在一王家之尊在一父何二尊之有哉如此則君臣上下之等威以别而朝廷尊矣表記朝極辨不繼之以倦臣若水通曰朝廷之上君臣上下貴極辨其分而不可紊久則弛而有倦則紀綱弗振而奸邪得以窺伺矣雖然嚴上下之分而必通上下之情然後有都俞吁咈之美也茍一于嚴則秦皇尊君卑臣之儀其可法乎而夫子云然者特感於春秋君弱臣强之弊故傷之也乎周禮大宗伯以九儀之命正邦國之位一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯臣若水通曰儀猶等威也每命異儀也位者貴賤之位也何以謂受職始為正吏受職事如王之下士列國之士子男之大夫之職是也何以謂受服受皮辨之服如王之中士列國之大夫子男之卿之服是也何以謂受位始有列位為王之臣如王之上士及列國之卿位是也何以謂受器始有祭器也如王之下大夫及公之孤有祭器者是也何以謂賜則則者未成國之名也王之下大夫出封則加一等而賜以百里二百里之地也何以謂賜官王六命之卿始得具臣治家邑也何以謂之賜國王之卿出封加一等為侯伯之國也何謂作牧侯伯有功德則加命之得專征伐為一州之牧也何謂作伯上公有功德者加命為二伯是之謂方伯也夫命也受也賜也作也皆出於朝廷主於宗伯所謂天下有道禮樂征伐自天子出而朝廷正矣司士正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之左南面西上司士儐孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右大僕前王入內朝皆退臣若水通曰朝儀者王視朝於路門外之儀也東上其次以東為上也西上以西為上也北上以北為上也王族故士者王之族故為士而宿衛者也虎士者虎賁之士也大僕者侍御之長也大右者司右也大僕從者小臣祭僕之類也擯者詔王出揖也特揖者孤卿尊也旅揖者大夫卑也旁揖者士又卑也還揖左右者在路門左右者皆南面者也大僕前者自本位而前正王視朝之位也內朝者路門之內聽政處也君臣上下貴賤之等其秩然而朝廷尊矣論語子路曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足臣若水通曰名者實之表也其名正則實正實正則朝廷正逺近莫不一於正矣故孔子因仲由之設問而告以正名為先仲由未達於為國以禮之道遂疑其迂濶而逺於事情非今之急務也孔子乃責其不能闕疑而告之以為使名有不正其實俱亡所以言不順事不成禮樂不興刑罰不中其流之弊不可勝言故正名分者所以正治之本而塞亂之源也夫子此言豈特為衛國之所當先耶於凡有國家者舍此不可以自立矣觀其修春秋而於踐土河陽之役去實以全名曰與其名存而實亡猶愈於名實之俱亡是以周室雖微諸侯强盛以齊楚大國卒不敢侮所謂植遺腹朝委裘而不亂者豈非以名分素明而民志素定哉此圖治者所當究心也國語周語祭公謀父曰先王之訓也有不祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修德序成而有不至則修刑於是乎有刑不祭伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又不至則又增修於德無勤民於逺是以近無不聽逺無不服臣若水通曰祭畿內之國周公之後為王卿士謀父字也邦甸之內有違闕不供日祭者先修意以自責畿內近知王意也言號令也文典法也名謂尊卑職貢之名號序謂上五者次序也已成而有不至則有刑誅讓譴責也告謂以文辭曉告之地逺者罪輕也夫大君立極以風四方故必自治而後治人也是故下有不祭不祀不享不貢不王之違上有修意修言修文修名修德之政未嘗舍己而勤人也是以近無不聽逺無不服先正謂朝廷四方之極其是之謂歟君天下者可不正心以正朝廷立四方之極乎晉語僖負羈曰愛親明賢政之幹也禮賓矜窮禮之宗也禮以紀政國之常也臣若水通曰負羈曹大夫幹楨幹也宗本也紀理也夫親親賢賢國之大政也而有賓窮之禮焉所以行其政也故曰國君無親國以為親故不親其親則不能明賢矣不親親明賢則不能禮賓矜窮矣其於禮政夫何有晉重耳出亡於外而國相多從之是終必有興者曹伯舍之而不禮是棄愛親明賢禮賓矜窮之義其能久立乎君子聞僖負羈之言可以知朝廷之體漢文帝寵幸鄧通賞賜纍巨萬申屠嘉嘗入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下愛幸羣臣則富貴之至於朝廷之禮不可以不肅罷朝嘉坐府中為檄召通詣丞相府不來且斬通恐入言上上曰汝第往通詣丞相府免冠徒跣頓首謝嘉坐自如弗為禮責曰夫朝廷者高帝之朝廷也通小臣戲殿上大不敬當斬吏合行斬之通頓首出血不解上度丞相已困通使使持節召通而謝丞相曰此吾弄臣君釋之臣若水通曰朝廷之不正近貴壞之也漢文以堂堂帝王之貴寵幸鄧通之微臣朝廷解體而堂陛陵夷矣幸而申屠嘉之守法使朝廷尊如泰山文帝雖曲護通而終不罪嘉之守法此朝廷之所以反正歟漢武帝元朔元年徐樂上書言天下之患在於土崩秦之末世是也間者關東五穀不登民多窮困重之以邊境之事推數循理而觀之民不安者土崩之勢也故賢主獨觀萬化之原明於安危之機修之廟堂之上而銷未形之患也其要期使天下無土崩之勢而已矣臣若水通曰廟堂者政事之所出也朝廷正則萬事正而民心定而無土崩之患矣徐樂謂賢主獨觀萬化之原其原在修於朝廷自君心之正始也惜乎武帝樂其言而不能用也漢元帝永光二年匡衡上疏曰治天下者審所上而已教化之流非家至而人說之也賢者在位能者在職朝廷崇禮百寮敬讓道德之行由內及外自近者始然後民知所法遷善日進而不自知也臣若水通曰治在風化而巳家至人說則堯舜之聖不能以遍也故賢能任職百僚敬讓則朝廷尊崇而風化之本立矣風化之流自內而外由近而逺有不可禦者焉爾漢光武建武十一年趙王良從帝入夏城門與中郎將張邯爭道叱邯旋車又詰責門候使前走數十步司隸校尉鮑永劾奏良無藩臣禮大不敬良尊戚貴重而永劾之朝廷肅然永辟扶風鮑恢為都官從事恢亦抗直不避彊禦帝常曰貴戚且斂手以避二鮑臣若水通曰朝廷四方之極紀綱之所係焉者也故一人足以壞之趙王良之豪橫是也一人足以正之鮑永之抗直是也向使非永之肅正則上無道揆下無法守其何以立極於四方哉此二鮑之劾奏權貴不避彊禦所以能肅清朝廷而森嚴堂陛也嗚呼賢哉格物通卷五十一
