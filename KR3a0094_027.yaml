body:
  text: 格物通卷二十七明湛若水撰進德業二詩大雅文王無念爾祖聿修厥德永言配命自求多福殷之未喪師克配上帝宜鑒於殷駿命不易臣若水通曰周公戒成王修德而曰永言配命者何蓋人與天地萬物一體也命即天理也天理者即吾心本體之自然者也未發即性已發即情即道即事之得其中正者也合而言之所謂德也故修其德云者以修乎此而已然修德不必求之髙逺索之茫昧惟顧諟天之明命察見此天理而誠敬以存養之戒慎恐懼勿忘勿助自一念之存存以至萬事之應酬無往而非此天理之流行則吾心之本體以全而盛德以成是謂修德之至矣嗚呼天理二字乃千聖傳心之要法修身格物之大端周公發之於此真聖學大頭腦處也人主有志於聖學者其學諸此爾禮記曲禮曰毋不敬儼若思安定辭安民哉臣若水通曰敬者主一之謂乃禮之本也曲禮三千無一而非敬也茍一時不敬則皆為虛文故主一於心而無事無時不敬可也由心而形於身則容貌之端儼而若有所思則敬心存於容貌之禮矣由心而發於言則辭之安定而不躁妄則敬心存於言辭之禮矣由心而見於臨民之時修己以安百姓則敬心存於蒞民之禮矣是則毋不敬自容貌而言辭而臨蒞德業交修而敬以貫之修身之要孰有加於此哉為人上者所宜法焉曲禮博聞強識而讓敦善行而不怠謂之君子臣若水通曰博聞強識開發吾之聰明也而讓焉則心虛矣敦善行擴充吾之德性也而不怠焉則行實矣心虛則受善也無窮行實則進善也不息知行並進則德崇業廣此所以為君子也禮運故人情者聖王之田也修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之臣若水通曰此言人情即指性之發孟子所謂乃若其情則可以為善矣而以為田即此可耕治者也故禮者理也禮以治心者也理以治之則人欲日消如田之耕破草萊開土脈而可種矣義者宜也以制事者也宜以處事則道生不息體立用行如田之布種而可耨矣講學則訂去其偏而養其中正如田之治去稗莠而可收聚矣仁者天理之純本仁則衆德聚於心如田之收成而可安矣樂者樂此者也學不至於樂則不安終非已有故作樂以安之如田之入為已有也此自得之學也自得之則居之安也於是乎治性情之功畢矣由是觀之聖賢之學不過性情焉而已爾性情者不過天理焉而已爾仁義禮樂學問之功豈外此而别有所致力哉玉藻曰君子無故玉不去身君子於玉比德焉臣若水通曰玉者和氣之所鍾也天下莫不貴之者以其衆善之備也君子有喪則廢去喪則佩將以比其仁知禮樂忠信之德也語曰君子有三變望之儼然即之也溫聽其言也厲先儒謂如良玉溫潤而栗然惟隂陽合德者可以比之矣蓋有善比玉於君子者曰追琢其章金玉其相所以貴純也曰有美玉於斯韞櫝而藏諸所以致用也曰瑾瑜匿瑕所以示廣也曰如玉如瑩爰變丹青所以敦素也自古以來比德於玉者多矣非德業純全者其孰能與於此學記故學然後知不足教然後知困知不足然後能自反也知困然後能自強也臣若水通曰學何以知不足也師於人然後知已所未至也教何以知困也無以應人人之求然後自知困辱也知不足則必反求矣知困則必強學矣書曰惟斆學半故教學相長然後德業交修焉學記大德不官大道不器大信不約大時不齊察於此四者可以有志於本矣臣若水通曰君子之學務本而已天下之本見大而已大者天理之全體也以其得於心而言則謂之德以其由於事而言則謂之道以其實而言則謂之信以其發而當可而言則謂之時其實一大而已此大本也不官者非一職可盡也不器者非一材可拘也不約者信在言前也不齊者非可執一求也此大用也大本立而大用隨之矣志本者學之至也大學曰此謂知本此謂知之至也故學以務本為貴樂記是故君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設於身體使耳目口鼻心知百體皆由順正以行其義臣若水通曰君子之學修身而已修身之事德業而已和志順正德之進也比類行義業之修也德主乎心業見乎事體用合一之道也其於德也志之不正其性鑿也情流之也故反其情使合乎中而不至於流則性定而心志和矣其於業也行之不當心忽之也故擬議於心比心而擴充之觸類而長之則行可成矣進修之具禮樂而已姦聲亂色惰慢邪辟淫樂慝禮不使亂吾之聰明身體心術之微順正立而德可久業可大故義行而大用備矣雜記君子有三患未聞之患弗得聞也既聞之患弗得學也既學之患弗能行也臣若水通曰語云學如不及猶恐失之言進修知行貴及時也聞而學之識其所有也學而行之養其所有也故知行並進則德日崇而業日廣君子有弗患矣經解天子者與天地參故德配天地兼利萬物與日月並明明照四海而不遺微小其在朝廷則道仁聖禮義之序燕處則聽雅頌之音行步則有環珮之聲升車則有鸞和之音居處有禮進退有度百官得其宜萬事皆其序臣若水通曰天地人物之理一而已矣故配天地兼萬物照四海而無不感通者固其所同然也是故人君之德業在所養而已矣故道仁義以養其心也聲音以養其耳也居處進退以養其身也間邪存誠此德業之所以盛也百官萬事莫敢不正德業之至矣哀公問仁人不過乎物孝子不過乎物是故仁人之事親也如事天事天如事親是故孝子成身臣若水通曰仁人孝子之心盡分而已矣父母全而生之子全而歸之所謂不過物也事親事天其道一也是故可以言成身矣成身者德業之至也人君有事親事天之責者可不致力乎表記鄉道而行中道而廢忘身之老也不知年數之不足也俯焉日有孳孶斃而後已臣若水通曰道者天理而已學以見理為先則其趨不能已矣何者知之真也鄉道而行則亦中道而廢無真知者也日有孳孶斃而後已真知者也是故君子之學莫大乎體認天理是以進不能自已緇衣故君子多聞質而守之多志質而親之精知略而行之臣若水通曰質猶實也略猶簡也天理至約行之則一故曰略多聞多志所以開發聰明而覺吾心之天理知也守所以行之也行之力故日親切多聞多志即知之精也守而親之則行不支離則行之一也是故知行並進而德業成矣冠義故孝弟忠順之行立而後可以為人可以為人而後可以治人也臣若水通曰孝弟忠順道也何以言為人也道者人之所以生也可為人何以可治人也成已者斯能成物也是故人己兩盡而德業一矣論語有子曰君子務本本立而道生孝弟也者其為仁之本歟臣若水通曰所謂本者何也天理是也吾心之本體也所謂天下之大本也君子之學惟用力於此隨處察識而培養之則大本以立而達道行矣故曰本立道生然所謂本者何也人之本心也故指孝弟以為仁之本者蓋孝弟乃人之初心也乃人之真心也孟子所謂良知良能此天理之本體也朱熹曰良心之發最為切近而精實者即此體認其真心尤為易得故擴充之則親親仁民愛物無不由此本心流出隨處貫通浹洽而天下之達道在是全體大用無虧矣故孟子曰堯舜之道孝弟而已矣此德業之大原而學問之至要人君修身以盡齊治平之道者不可不深致力焉顔淵喟然歎曰仰之彌髙鑽之彌堅瞻之在前忽焉在後夫子循循然善誘人博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之末由也己臣若水通曰此顔子之進修所以造於聖人者也仰鑽瞻忽顔子初以心思想像聖道而無得者也博文約禮顔子得聖教而學之有得者也孔子曰吾嘗終日不食終夜不寢以思無益不如學也學在知行而已博文而曰博我者開發吾心之良知也知也約禮而曰約我者存養吾心之良知也行也皆謂天理也故自詩書六藝以至於凡理之顯設者皆文也自三千三百之致一以至天理之至要者皆約也亦豈必既博之而後約哉隨博隨約察見天理而即涵養於身心博約兼致知行並進而皆不離乎我我者本心也天理也用力之久則天理自然呈見如有所立卓然於前矣欲從末由歎未能有之於已也此章聖人之學最為切至希聖希賢者茍能心顔子之心學顔子之學尚何卓爾之地有不可到哉子夏曰博學而篤志切問而近思仁在其中矣臣若水通曰仁者心之生理德之全也德之進學問思辨篤行而已故君子之於仁也學以覺之問以辨之思以通之篤志以存之則心存理得而仁在我矣此聖門之學知行並進之功也説者謂此未及乎力行而為仁惑矣噫子夏以文學名而其言如此然則古人之所謂學者可知矣後世徒區區於章句之末者烏足謂之文學乎孟子曰子路人告之以有過則喜禹聞善言則拜大舜有大焉善與人同舍已從人樂取於人以為善臣若水通曰易云君子以虛受人孔門之所從事者以能問於不能以多問於寡有若無實若虛聖賢之進德修業在虛而已故小賢則小虛大賢則大虛少有未虛則子路之聞過未必喜大禹於昌言未必拜大舜之取善未必其能樂也喜拜而樂焉皆本於虛虛則能受益受益則能光大矣德業有不崇乎是故君子之學固當虛其心以為進修之地欲致其虛者非深見道體之無窮則亦不能強也孟子曰居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈此之謂大丈夫臣若水通曰廣居謂仁正位謂禮大道謂義皆天理也以其存於心謂之廣居以其履於身謂之正位以其行於事謂之大道其實一理也居之立之行之者皆體認於心身也得志與民由之同此理於人也不得志獨行其道藏此理於已也君子惟有此學故德業之盛而心純天理之公富貴貧賤威武外物無與於性分何足以二其心哉夫天理在於一心之微爾謂之廣居謂之正位謂之大道而皆謂之天下又謂之大丈夫許大德業皆本於一心道豈逺乎哉孟子曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逢其原故君子欲其自得之也臣若水通曰孟子此章之言明自得之學也深造謂造詣之深也道者進為之方如顔子之博文約禮孟子之勿忘勿助是也博約者知行並進之功勿忘助者中正自然之法也如是則人心本體之中正有不假絲毫人力而自然優遊厭飫而得之於心矣心與理一故居之安漙博淵泉故資之深體立用行故左右逢源深造以道者自得之功居安資深逢原者自得之效由是觀之古人之學惟在自得而已矣此心此理人所同得後之學者惟不得其道爾子貢曰得其門者或寡矣程頤曰學以至聖人之道也然則失其道不得其門雖竭終身之力不能至於自得矣可不講乎孟子曰萬物皆備於我矣反身而誠樂莫大焉強恕而行求仁莫近焉臣若水通曰人心與天地萬物同體故其理無不備於我也上智之資明得盡渣滓便渾化誠純乎天理人已兩忘天地同體故曰樂莫大焉此仁也其次則如其心一念善端之萌體認擴充以求復天理之全體故曰近仁此知之成功一也中庸曰誠者天之道也誠之者人之道也又曰誠則明矣明則誠矣言其理一也有志於德業者尚其擇諸中庸子曰好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以修身臣若水通曰知仁勇達德雖有三者之殊求之吾心惟此天理而已見之分明即為智存之純熟即為仁行之果確即為勇非有二也然此何以至之哉在好學力行知恥而已故困知學知者學問思辨求覺乎天理雖未及生知之大知然而去知不逺矣勉行利行者加篤行之功存存勉勉而不間雖未及安行之至仁而去仁不逺矣不能不愧怍於天人而以不如仁知者為恥雖未及於聖人之大勇然而有奮發果敢之志而去勇不逺矣所謂近者何也以其理之一也由是而不已焉則知仁勇之域可至矣學者知此好學力行知恥為入德之門則達德立而達道行所謂修身以道修道以仁之要在是矣於修身何有哉此進德修業之大端孔子為其君哀公告也然則為人君者其可以不知乎博學之審問之慎思之明辨之篤行之有弗學學之弗能弗措也有弗問問之弗知弗措也有弗思思之弗得弗措也有弗辨辨之弗明弗措也有弗行行之弗篤弗措也人一能之已百之人十能之已千之果能此道矣雖愚必明雖柔必強臣若水通曰此孔子告哀公以明善誠身之道也五之字皆有所指即天理是也夫博學審問慎思明辨者皆求察見乎此而已矣謂之篤行即時察見即時操存自念慮以達於事為皆是也豈學問思辨之外别有所謂行也哉故曰知行並進者如此或謂今日知明日行或謂讀盡天下之書窮盡天下之理然後行徒見其支離間脫窮年卒嵗無力行之日也弗學以下因上言其目而此言其下手處也學問思辨與行弗能弗知弗得弗明弗篤而不措至百倍其功者乃所謂學之博問之審思之慎辨之明行之篤也能盡其功則雖困者且知勉強者且能而况學知利行者哉愚而明柔而強氣質之變化也故學在乎變化氣質而已變而化之則士可賢賢可聖聖可天矣魯之君臣能然則亦文武之君臣而文武之政可行也惜乎魯哀徒美其言而不行遺千載之一歎耳故君子尊德性而道問學致廣大而盡精微極高明而道中庸溫故而知新敦厚以崇禮臣若水通曰此子思言修德以凝道之功也性即天命之性此德性至貴忘之則忽助之則褻皆非尊也勿忘勿助尊之至也道由也由乎學問乃有以知其德性之真也佛教亦言心性以不事學問故差也蓋尊德性行之也道問學精之以知也天下未有不精於知而能行之不差者也廣大髙明心之本體禮即理也皆謂德性也致之極之敦厚以崇之皆以在心而言所以尊德性也精微中庸舊聞皆心之應事者盡之道之溫之而使日新所以問學也在心為性在事為學尊德性為行道問學為知知行並進心事合一而修德之功盡矣德修而道自凝矣此聖門合一之學後世支離之弊寖興朱熹與項平父書曰子靜專尊德性而熹平日道問學為多臣謂二者會其全無獨用之理也雖以朱陸大儒未免此説而况於他者乎有志於聖學者誠不可以不講焉格物通卷二十七
