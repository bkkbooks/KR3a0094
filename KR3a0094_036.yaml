body:
  text: 格物通卷三十六明湛若水撰養太子上易蒙䝉以養正聖功也臣若水通曰䝉卦上艮下坎山下出泉泉之始達如物之初生稚小蒙昧未發故謂之䝉在人則赤子之心去正未遠未發之中也於此而養其本體之正最易為力正者人心之本體所謂天理與聖人一者也教人者欲其至於聖也然至知誘物化之時而失其正其去聖遠矣自其䝉稚純一未發之時而養之發其良知堅其良能以充其本體天理之正正則可聖美大聖神以漸而至矣故記曰少成若天性習慣成自然正謂此也夫人豈不可為聖耶教之者之責也太子天下本尤不可不早養也人君重其社稷宗廟之托則所以養其太子之正者亦必有道矣書虞書舜典帝曰䕫命汝典樂教胄子直而溫寬而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和臣若水通曰此帝舜命䕫典樂教養胄子之言也䕫舜臣也胄長也自天子至卿大夫之適子也栗莊敬也志者心之所之也詩者言之成文者也歌者言之長短也聲者五聲宫商角徵羽也律者十二律黃鍾太簇姑洗𬎼賓夷則無射太吕夾鍾仲吕林鍾南吕應鍾也帝言以樂變化胄子使凡直者不可不足於溫寬者不可不足於栗剛者不可過於虐簡者不可過於傲所以抑揚進退以歸於中正之德也然必有中和之樂乃可以養其中和之德故必有詩歌聲律以和人聲為作樂之本然後可被之八音而成樂也心有所之必形於言而成文故以詩而言其志既形於言則必有長短之節故以歌而永其言既有長短則必有髙下清濁之殊故以聲依歌永而作如歌聲長而濁者為宫以漸而清且短則為商為角為徵為羽所謂聲依永也既有長短清濁則又必以十二律和之乃能成文而不亂如黃鍾為宫則太簇為商姑洗為角林鍾為徵南吕為羽蓋以三分損益隔八相生而得之餘律皆然所謂律和聲也人聲既和乃以其聲被之八音而為樂則無不諧協而不相侵亂失其倫次可以奏之朝廷薦之郊廟而神人以和矣抑考周禮大司樂掌成均之法以教國子而孔子亦曰興於詩成於樂蓋所以蕩滌邪穢斟酌飽滿動蕩血脉流通精神養其中和之德而救其氣質之偏者也是故聖人作樂以養性情育人才其功效神速教養太子之具未有切於此者賈誼亦曰天下之命係於太子太子之善在於早教諭與選左右左右正則太子正而天下定矣合是觀之樂以養之左右以輔之故太子乃生而近正人聞正言見正事聽正聲然而不正者未之有也後之為教不過記誦書札之間無乃導欲益偏爾於德性何補於身心何益程皓曰聲音所以養其耳采色所以養其目歌詠所以養其性情舞蹈所以養其血脉今皆無之是以古之成材也易今之成材也難可勝嘆哉伏惟聖明留神念君德太子不可不預養之訓思禮樂百年可興之期修復先王之舊以為教養之本天下幸甚商書伊訓敷求哲人俾輔于爾後嗣臣若水通曰此伊尹舉成湯教養太子之事告太甲也敷廣也俾使也輔佐也後嗣謂太甲也上文述成湯之修人紀以至于有萬邦造大業之難如此然所以守大業於無窮者惟在太子故又言成湯廣求賢人使輔于爾後嗣蓋太子者天下之根本宗社之所由係於長短者也故太子善則大業定宗社固矣伊尹此言真可為萬世人君教養太子之法矣詩周南麟趾麟之趾振振公子于嗟麟兮臣若水通曰麟趾美文王公子也而曰麟之趾振振公子者何耶蓋言文王后妃有仁厚之德故和氣薰蒸而公子亦化於仁厚猶麟性仁厚而其趾亦仁厚不踐生草不履生蟲也是故仁厚者其所以教養太子之本乎故曰天地之大德曰生聖人之大德曰仁仁厚者即天地生生之性也人君教養太子誠有以養其仁厚之心天地之性無驕縱刻薄之風則國家元氣有所培植而天下之大本正矣此社稷生民之福也後世之君見不及此輔養太子付之非人如始皇以趙髙傅胡亥所見者無非刑殺之事故胡亥今日即位明日殺人漢文以朝錯傅景帝所學者無非刻薄之術故景帝方在青宫格殺親戚豈皆其性惡哉輔之者非人養之者非其術也然則人主欲教養太子必內有文王后妃仁厚之化外有端正格心之人內外夾輔使之見正事聞正言行正道則帝王德器有所成此聖人之教也禮記文王世子文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及莫又至亦如之其有不安節則內豎以告文王文王色憂行不能正履王季復膳然後亦復初食上必在視寒暖之節食下問所膳命膳宰曰末有原應曰諾然後退武王帥而行之不敢有加焉文王有疾武王不說冠帶而養文王一飯亦一飯文王再飯亦再飯旬有二日乃間又曰成王幼不能涖阼周公相踐阼而治抗世子法於伯禽欲令成王之知父子君臣長幼之道也成王有過則撻伯禽所以示成王世子之道也臣若水通曰文王之為世子也問安視膳武王之為世子也帥而行之真足以為萬代世子之法及成王幼而周公相又抗其法於伯禽以教之真足以為萬代教世子之法然而文武之所以行周公之所以教亦曰父子君臣長幼之道也夫其所謂道即天理爾豈嘗外於人倫哉文王世子凡學世子及學士必時春夏學干戈秋冬學羽籥皆於東序小樂正學干大胥贊之籥師學戈籥師丞贊之胥鼓南春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠臣若水通曰學謂教也以時教學者所以效天地之變化也干戈者武舞也羽籥者文舞也鼓南者以鼓節二南之詩也誦者口誦樂歌之章也弦者以琴瑟播夫詩章也禮者經禮曲禮之文也書者三皇五帝之紀也凡此皆學之事也曰小樂正曰大胥曰籥師曰丞曰胥曰大師曰執禮者曰典書者皆學之官也於東序於瞽宗於上庠皆學之地也世子於春夏秋冬而無不學之時如此若學士者皆將有輔世長民之責者也故亦使之學世子之所學焉噫先王教養太子之法不失其時如此後之人君於太子之幼則姑息不教至於習惡成性害其身以墮先王之大業豈不可惜哉文王世子凡三王教世子必以禮樂樂所以修內也禮所以修外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文臣若水通曰養太子者養其成性而已矣禮也者理此者也樂也者樂此者也禮樂備而內外一而云修內修外則各言其類也爾矣故五禮六樂無一而非性也禮樂交修成性存存存中發外成性之體用備矣恭敬溫文內敬而外恭內溫而外文內外合一而君德成矣先王之教世子豈責之以所無哉亦使之勿壞其成性而已矣文王世子君之於世子也親則父也尊則君也有父之親有君之尊然後兼天子而有之是故養世子不可不慎也臣若水通曰君謂世子之父也其於世子以親而言則為世子之父是可以教父道矣以尊而言則為世子之君是可以教君道矣世子知為君父之道則可以父母君長乎百姓而能保天下也世子也者繼君而保天下者也故養不可不慎也立君父之道以保天下也可不慎乎文王世子故父在斯為子君在斯謂之臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉父子君臣長幼之道得而國治臣若水通曰學謂教之也父子也君臣也長幼也三者人道之大也君所以建極於天下者也教世子所以立極也故不知子之道則不知父之道矣不知臣之道則不知君之道矣不知幼之道則不知長之道矣故不學則不可以為君父長上矣可不重乎內則異為孺子室於宫中擇於諸母與可者必求其寬裕慈惠溫良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不往臣若水通曰寬裕慈惠溫良恭敬中和之德也以為子之師慈保母養之以中和也蒙以養正聖功也故䝉則有子師慈母保母長則有師傅保之臣則太子不能以不正太子正而天下定矣此先王養子之禮也為人君愛其子愛天下者可不重乎祭義君子設四學當入學而太子齒臣若水通曰四學者虞夏商周之學也有小學大學天子之學建于王宫者小學也建于國都者大學也是故天子之元子八歲則入小學十有五歲則入大學其入于學也與同學者序齒焉而莫之或異夫學所以明人倫也太子而齒于人所以教其孝弟之行養其謙冲之德遏其驕侈之心也有天下深長之慮者宜於此而求之哀公問孔子曰子也者親之後也敢不敬與臣若水通曰子者傳先君之後以為天地宗廟社稷之主故不可不敬也知敬之則必教之矣故古之聖帝明王必於其太子而預養之敬之至也彼漢唐庸君甘心於巫蠱之禍逞意於誅夷之慘詎非先王之讐賊天地宗廟社稷之罪人乎孔子斯言雖以警哀公實足為千古之法也國語晉語士蒍言於諸大夫曰夫太子君之二也恭以俟嗣何官之有今君分之土而官之是左之也吾將諫以觀之乃言於公曰夫太子君之二也而帥下軍無乃不可乎又曰夫太子國之棟也棟成乃制之不亦危乎公曰輕其所任雖危何害臣若水通曰士蒍晉大夫劉纍之後隰朋之子子輿也二副也棟成謂太子之名位已定而更其制使將兵危之道也明王教養太子所以重宗社承天心也獻公溺於驪姬之讒分申生以土而官之又使之將下軍以伐翟豈非責以難能置之危地以陰為易嫡之謀乎夫天下如大厦也太子如大厦之棟也棟成而易焉大厦將顛矣棄人滅天忘宗亂紀無甚於此聞士蒍之言可不戒哉晉文公問於胥臣曰吾欲使陽處父傅歡也而教誨之其能善之乎對曰是在歡也籧篨不可使俯戚施不可使仰僬僥不可使舉侏儒不可使援矇瞍不可使視嚚瘖不可使言聾聵不可使聽僮昏不可使謀質將善而賢良贊之則濟可俟也若有違質教將不入其何善之為臣聞昔者太任娠文王不變少溶于豕牢而得文王不加病焉文王在母不憂在傅弗勤處師弗煩事王不怒敬友二虢而惠慈二蔡刑于太姒比于諸弟詩云刑于寡妻至于兄弟以御于家邦於是乎用四方之賢良及其即位也詢于八虞而咨于二虢度于閎夭而謀于南宫諏于蔡原而訪于辛尹重之以周召畢榮億寧百神而柔和萬民故詩曰惠于宗公神罔時恫是則文王非專教誨之力也公曰然則教無益乎對曰胡為文益其質故人生而學非學不入公曰奈夫八疾何對曰官師之所材也戚施直鐘籧篨䝉璆侏儒扶盧矇瞍修聲聾聵司火僮昏嚚瘖僬僥官師所不材也以實裔土夫教者因體能質而利之者也若川然有原以卬浦而後大臣若水通曰陽處父晉大夫陽子也歡文公子襄公名籧篨偃人不可使俯戚施僂人不可使仰僬僥長三尺不可使舉重侏儒短者不可使抗援也口不道忠信之言為嚚瘖不能言者耳不别五聲之和曰聾生而聾曰聵僮無知者昏暗亂也言質性將自善而賢良之傅贊導之則其成就可立俟也娠有身也不變不變動也少小也溶便也豕牢厠也二虢文王弟虢仲虢叔也刑法也二蔡文王子太姒文王妃詩大雅思齊之二章八虞周八士伯達伯適仲突仲忽叔夜叔夏季隨季騧南宫名適蔡蔡公原原公辛辛甲尹尹佚皆周太史周周文公召召康公畢畢公榮榮公億安也八疾謂籧篨至僮昏也宗公大臣也恫痛也不入謂不入於道也直主也言主擊鍾蒙戴也璆玉磬也不能俯故使之戴磬扶緣也盧矛㦸之柲緣之以為戲也能才也卬迎也言川有原因開利迎之以浦然後大也夫古之明王太子乃生立師保傅三太三少先後左右之必曲盡輔翼之法以引導焉故太子乃生而聞善言見善行行善政故習與性成不能不善也若胥臣之所陳亦詳且明矣然必曰質將善而賢良贊之乃可濟爾豈其然乎孔子曰有教無類易曰童蒙吉亦在有教教之於早焉爾有天下宗社之計者不可不以此為先務也楚語楚莊王使士亹傅太子針辭曰臣不材無能益焉王曰賴子之善善之也對曰夫善在太子太子欲善善人將至若不欲善善則不用故堯有丹朱舜有商均啓有五觀湯有太甲文王有管蔡是五王者皆元德也而有姦子夫豈不欲其善不能故也若民煩可教訓蠻夷戎翟其不賓也久矣中國所不能用也王卒使傅之問於申叔時叔時曰教之春秋而為之聳善而抑惡焉以戒勸其心教之世而為之昭明德而廢幽昏焉以休懼其動教之詩而為之道廣顯德以耀明其志教之禮使知上下之則教之樂以疏其穢而鎮其浮教之令使訪物官教之語使明其德而知先王之務用明德於民也教之故志使知廢興者而戒懼焉教之訓典使知族類行比義焉若是而不從動而不悛則文詠物以行之求賢良以翼之悛而不攝則身勤之多訓典刑以納之務慎惇篤以固之攝而不徹則明施舍以道之忠明久長以道之信明度量以道之義明等級以道之禮明恭儉以道之孝明敬戒以道之事明慈愛以道之仁明昭利以道之文明除害以道之武明精意以道之罰明正德以道之賞明齊肅以耀之臨若是而不濟不可為也且夫誦詩以輔相之威儀以先後之體貌以左右之明行以宣翼之制節義以動行之恭敬以臨監之勤勉以勸之孝順以納之忠信以發之德音以揚之教備而不從者非人也其可興乎夫子踐位則退自退則敬不則赧臣若水通曰莊王楚成王之孫穆王之子旅也士亹楚大夫針恭王名朱堯之子封於丹均舜之子封於商啓禹子也五觀啓子太康昆弟也觀洛汭之地太甲湯孫太丁之子不遵湯法伊尹不能正放之於桐管蔡文王子周公兄也叔時楚賢大夫申公也煩亂也世先王之世系也令者先王之官法時令也故志謂前代之書訓典五帝之書攝固也徹通也夫子指太子退謙退也不與否同夫莊王使士亹傅太子其知教矣乎士亹謂善在太子其知學矣乎是故教之在師傅而學之在太子矣夫教之而不學則申叔時之論雖教導之方何益於太子之善乎是故教與學交致而德業成矣厥後鄢陵之戰幾於覆楚士亹其亦先見之乎易曰童䝉之吉此聖學之明訓也格物通卷三十六
