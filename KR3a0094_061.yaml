body:
  text: 格物通卷六十一明湛若水撰學校四禮樂政教附韓愈曰國子監應三館學士等凖六典國子館學生三百人皆取文武三品已上及國公子孫從三品已上曽孫補充太學館學生五百人皆取五品已上及郡縣公子孫從三品已上曽孫補充四門館學生五百人皆取七品已上及侯伯子男子補充右國家典章崇重庠序近日趨競未復本源至使公卿子孫恥遊太學工商凡冗或處上庠今聖學大明儒風復振恐須革正以贊鴻猷今請國子館並依六典其太學館量許取常參官八品已上子弟充四門館亦量許取無資廕有才業人充如有資廕不補學生應舉者請禮部不在收試限其新補人有冒廕者請牒送法司科罪緣今年舉期已近伏請去上都五百里內特許非時收補其五百里外且任鄉貢至來年春一時收補其厨糧度支先給二百七十四人今請凖新補人數量加支給謹具如前伏聽處分臣若水通曰唐初制國子監應有三館一曰國子館二曰太學館三曰四門館各以資廕子孫視其父祖爵秩補充學生及韓愈時公卿子弟恥遊太學工商凡冗或處上庠是蓋不得不為革正者矣故愈請於國子館則依六典之制於太學館量許常參官八品已上子弟充之於四門館量許有才業者充之夫國公以下八品以上子孫皆得入學則凡在官者世無不教矣夫資廕不補學生者禮部不試冒廕者法司科罪則凡資廕者罔不遊學矣夫工商凡冗屛放不齒人有才業始得侍教則凡在學者罔非賢才矣是何也太學者所以明聖道振儒風而歸之正焉者也茍不沙汰其非人振舉其善類烏用是學為哉後之立學設教者尚考於兹乎韓愈曰周人置虞庠於四郊以養國老教胄子祭統曰天子設四學蓋其制也易傳太初篇曰天子旦入東學晝入南學夕入西學暮入北學蔡雍引之以定明堂之位焉大戴禮保傅篇曰帝入東學以貴仁入南學以貴德入西學以貴義入北學以尊爵賈生述之以明天子之教焉故曰為大教之宫而四學具焉參明堂之政原大教之極其建置之道𢎞也後魏大和中立學于四門置助教二十人隋氏始𨽻于國子而降置五人皇朝始合于太學又省至三人員位彌簡其官尤難非儒之通者不列也四門學之制掌國之上士中士下士凡三等侯伯子男凡四等其子孫之為胄子者及庶士庶人之子為俊士者使執其業而居其次就師儒之官而考正焉助教之職佐博士以掌鼓篋檟楚之政令分其人而教育之其有通經力學者必于嵗之抄升於禮部聽簡試焉課生徒之進退必酌于中道非博雅莊敬之流固不得臨於是臣若水通曰虞夏商周四代之學所以養士也周人之四郊魏之四門隋𨽻於國子唐合於太學雖或制因時異然慎選以充而為養士者則一而已然造之者有其地而師之者有其人固虞夏商周之遺意也然考其養士之功而終有愧於古者何也蓋地有所造而儀文或狃於習師有所啓而大原或未之先此所以道德之風日薄而功利之習日熾也其可望士之成哉嗚呼古之為學也將以養才今之為學也將以壞才其所以養之之本異矣雖然人君者士之表也朝廷者學校之則也正心者養士之本也誠能躬以率之而本無不端由是而擇師焉則師道立矣由師以作士焉則善人多矣朝廷有不正而天下有不治哉孟子曰君正莫不正臣敢獻以為聖明養士之本焉韓愈潮州請置學校牒曰孔子曰道之以政齊之以刑民免而無恥不如以德禮為先而輔以政刑也夫欲用德禮未有不由學校師弟子者此州學廢日久進士明經百十年間不聞有業成貢於王庭試於有司者人吏目不識鄉飲酒之禮耳未嘗聞鹿鳴之歌忠孝之行不勸亦縣之恥也夫十室之邑必有忠信今此州户萬有餘豈無庶幾者乎刺史縣令不躬為之師里閭後生無所從學爾趙德秀才沈雅專靜頗通經有文章能知先王之道論說且排異端而宗孔氏可以為師矣請攝海陽縣尉為衙推官專勾當州學以督生徒興愷悌之風刺史出已俸百千以為舉本收其贏餘以給學生厨饌臣若水通曰學校者教化之本也是故先王務焉韓愈守潮舉趙德以為州學師出俸收息以為學徒饌其亦本德禮以敦學校者矣夫德者何吾心之天理若忠孝之類是也夫禮者何天理之儀文若鄉飲鹿鳴之類是也唐制取士於學也非不舉鄉飲酒禮工歌鹿鳴以示禮也亦非不勸以忠孝之行以崇德也特進士以雜文明經以括帖而不知德禮為身心之實學士無心德之學學無給養之資故也噫韓愈以一州刺史爾尚以德禮教人而使之知為學之本以厨饌養人而使之得為學之資況居君師之位而為教化之主可不加之意哉宋太祖建隆元年正月視學詔增葺祠宇塑繪先聖先賢像自為贊書於孔顔座端令文臣分撰餘贊屢臨幸焉嘗謂侍臣曰朕欲盡令武臣讀書知為治之道於是臣庶始貴文學臣若水通曰聖賢之學本乎心故千萬世之上千萬世之下同此心同此理也五代之亂人心若死天理或幾乎滅矣宋祖為之視學令武臣讀書一時猶為之興起貴文學人心天理不可泯也況本之以道德躬行其感化又當何如也他日濂洛關閩道學大盛其亦宋祖之所培養歟宋仁宗慶厯四年三月詔天下州縣立學行科舉新法時范仲淹意欲復古勸學數言興學校本行實詔近臣議於是宋祁等奏教不本於學校士不察於鄉里則不能核名實有司束以聲病學者專於記誦則不足盡人材參考衆說擇其便於今者莫若使士皆土著而教之於學校然後州縣察其履行則學者修飭矣先策論則文詞者留心於治亂矣簡程式則閎博者得以馳騁矣問大義則執經者不專於記誦矣帝從之乃詔天下州縣皆立學本道使者選部屬官為教授員不足取於鄉里宿學有道業者士須在學三百日乃聽預秋試舊嘗充試者百日而止試於州者令相保任有匿服犯行虧行冒名等禁三場先策次論次詩賦通考為去取而罷帖經墨義士通經術願對大義者試十道臣若水通曰先王之制庠序學校教之地也敬敷在寬教之則也賓興三物教之成也仲淹興學校本行實其庶幾先王之遺意矣宋祁察於鄉里學行修飭尚為不逺至於文辭馳騁之說興則與先王之法背矣淪胥以至於末世德業分而道藝離則所養者果其所用耶所用者果其所養耶仰惟我祖宗立教人科舉之法欲今之學者讀聖賢之書存聖賢之心藴之為德行發之為言辭乃德業合一之道也使有司即其言辭知其德行乃取士合一之法也其所養即所用所用即所養而先王舉選之法暗寓於其間矣臣愚守南京國子監之教曽有二業合一之訓以導諸生蓋以上體祖宗之法而闡明之也伏望聖明盛德大業與日俱新又以主張斯文為任則天下士子知所向風而先王德行道藝之教復見於今矣萬世幸甚宋仁宗慶厯四年夏四月作太學五月帝謁孔子判國子監王拱辰田況王洙余靖等言漢太學二百四十房千八百室生徒三萬人唐學舍亦千二百間今取材養士之法盛矣而國子監才二百楹制度狹小不足以容詔以錫慶院為太學置內舍生二百人講殿既備帝謁孔子故事止肅揖帝特再拜賜直講孫復五品服初海陵人胡瑗為湖州教授訓人有法科條纎悉備具以身率先雖盛暑必公服坐堂上嚴師弟子之禮視諸生如其子弟諸生亦信愛如其父兄從之游者常數百人時方尚詞賦湖學獨立經義治事齊以敦實學及興太學詔下湖州取其法著為令式臣若水通曰養士莫善於太學蓋太學列在京師四方之所仰望而居業者師儒貴得其人科條貴得其道仁宗隆道尊師廣其學舍取胡瑗教法而著之誠可謂知先務者矣然徒知取立經義治事齊之法而未知孔門四科同志於仁故德行為本而言語文學政事乃其因質成就者爾科條於此似為未精也是故堯舜三代之學出於一為人君者盍知務焉宋哲宗元祐元年五月命程頥等修定學制頥大槩以為學校禮義相先之地而月使之爭殊非教養之道請改試為課有所未至則學官召而教之更不考定高下置尊賢堂以延天下道德之士鐫解額以去利誘省繁文以專委任勵行檢以厚風教及置待賓吏師齊立觀光法如是者亦數十條臣若水通曰學校教養之道貴純乎一一者道也程頥所修學制大義數十純乎精金如易考試以禁勝心置尊賢以延道德鐫解額以去利誘省繁文以專委任勵行檢以厚風教立觀光以來遊學無非約之於道揆也此法一行則教化洽先王德行道藝之風可復矣惜乎醜正者衆而黨人之禍起遂使程頥之志徒托諸空言爾宋高宗紹興十三年十二月上謂宰執曰人才須素養太宗置三館養天下之士至仁廟人才輩出為用今日若不興學校將來安得人才用耶臣若水通曰養才將以致用也養與用出于一則賢才出而天下治矣故大養則大用小養則小用顧所以養之者何如爾故有道德之師以養其敬有揖讓進退以養其身體有歌詠采色以養其耳目有禮樂以養其性情有講習以養其業有道義以養其心志則才德成而賢俊不可勝用矣高宗復太宗三館之制不可謂無志者惜乎知養之之效而不知養之之方也宋理宗淳祐元年春正月詔加周敦頥張載程皓程頥封爵與朱熹並從祀孔子廟廷黜王安石從祀詔曰孔子之道自孟軻後不得其傳至我朝周敦頥張載程皓程頥真見實踐深探聖域千載絶學始有指歸中興以來又得朱熹精思明辨表裏混融使大學論語孟子中庸之書本末洞徹孔子之道益以大明于世朕每觀五臣論著啓沃良多今視學有日其令學官列諸從祀以示崇奬之意尋以王安石謂天命不足畏祖宗不足法人言不足恤為萬世罪人豈宜從祀孔子其黜之越二日加封敦頥汝南伯載郿伯皓河南伯頥伊陽伯臣若水通曰祀者先王所以崇德而報功也五臣論著有繼往開來之功從祀孔子廟庭宜也若夫安石者萬世罪人而配祀焉是以德報報惡功報報罪也天翻地覆亘古一見者矣數十年人不知有人心至是一陟一黜而人心始不死矣元世祖至元二十四年閏月初置國子監以耶律有尚為祭酒初太宗設總教國子之官逮至元初乃以許衡為祭酒而侍臣子弟就學者才十餘人衡既去教益廢而學舍未建師生寓居民舍國子司業耶律有尚屢以為言始立國子監設監官增廣弟子員遂以有尚為祭酒臣若水通曰言忠信行篤敬雖蠻貊之邦可行也元自有許衡而孔子之道益尊非所謂可行者耶及衡為祭酒弟子稍進有尚繼之立監設官增士而斯文一新非忠信篤敬斯人一心者哉夫以元代之主猶能興起於一時矧昭代一洗元習大復三代之人心人才之盛固有超越前世者矣元武宗至大四年仁宗立增國子生為三百人初帝命李孟領國子學諭之曰國學人材所自出卿宜課諸生勉其德業至是又諭省臣曰昔世祖注意國學如不忽木等皆䝉古人而教以成材朕今親定國子生為三百人仍增倍堂生二十人通一經者以次補伴讀著為式既而孟等言方今進用儒者而老成日已凋謝四方儒士有成材者請擢任國學翰林祕書太常或儒學提舉等職俾學者有所激勸帝從之詔自今勿限資級果材而賢雖白身亦任用之臣若水通曰元仁宗之于國學其亦知所用心矣勉之德業庶乎養以道藝擢自白身庶乎立賢無方而廣其員名庶乎旁招俊彥矣至於定為三百猶未免失之不廣也洪惟我太祖高皇帝羣彥髦而居之擇師儒而教之人才輩出拔自草茅者屢屢是時野無遺賢官無滯才蓋有以比隆三代而于有元不必言矣列聖相承亦惟率遵是道無拘拘於資級之間則真才出而治益隆矣宋儒周敦頥通書曰古者聖王制禮樂修教化三綱正九疇叙百姓太和萬物咸若臣若水通曰三綱者君為臣綱父為子綱夫為妻綱九疇者一五行二五事三八政四五紀五皇極六三德七稽疑八庶徵九福極也禮樂教化所以立人道而理民物之具也故聖人之治天下禮以理之樂以和之教以道之化以變之此三綱以正九疇以叙而人道立矣和氣薰蒸由是盡人之性而百姓有時雍之化盡物之性而品彚有遂生之休矣禮樂教化之功用至於如此後世不此之務而乃一任刑法以為把持之計是以法日以密而詐日以滋無怪乎治不古若也歟程皓劄子有云治天下以正風俗得賢才為本宋興百餘年而教化未大醇人情未盡美士人微謙退之節鄉閭無廉恥之行刑雖繁而姦不止官雖冗而材不足者此蓋學校之不修師儒之不尊無以風勸養勵之使然爾臣若水通曰賢才者治化之所由出也故曰為政在人然賢才之成必得師儒有以風化之爾故賢才固為政之本而學校又賢才之本也程皓此書具在遺書真王道之要務也惟聖明取而覽之而見之躬行則不嵗月而風動矣其念之哉程頥曰古者八嵗入小學十五入大學擇其才可教者聚之不肖者復之田畝蓋士農不易業既入學則不治農然後士農判在學之養若士大夫之子則不慮無養雖庶人之子既入學則亦必有養古之士者自十五入學至四十方仕中間自有二十五年學又無利可趨則所志可知須去趨善便自此成德後之人自童稚間已有汲汲趨利之意何由得向善故古人必使四十而仕然後志定只營衣食却無害惟利祿之誘最害人臣若水通曰先王之禮所以定分也分定而志立志立而義明所謂君子喻於義也若夫分不定則志不立志不立則知惟利之是趨所謂小人喻於利也是故士農工商各有定業壯仕老休各有定禮禮分不明則童而趨利仕老而不知止禮義廉恥之不興者豈人之性然哉凡以教之不行也程頥曰善言治者必以成就人才為急務人才不足雖有良法無與行之矣欲成就人才者不患其稟質之不美患夫師學之不明也師學不明雖有美質無由成之矣臣若水通曰古者樂正崇四術立四教順先王詩書禮樂以造士蓋以師道委樂正使成就人才為國家利器也後世不求明師故無善學徒具虛器爾雖然在天子亦必有師焉故記曰三王四代唯其師臣以為今日聖明亦宜法古以隆師而必惟其人可也南軒張栻曰三代之學至周而大備自天子之國都以及於鄉黨莫不有學使之朝夕優游於絃誦詠歌之中而服習乎進退揖遜之節則又申之以孝弟之義為之冠昏喪祭之法春秋釋菜與夫鄉飲酒養老之禮固有耳目手足肌膚之㑹筋骸之束無不由於學在上則司徒總其事樂正崇其教下而鄉黨亦莫不有師其教養之也密故其成材也易士生斯時藏修遊息於其間誦言而知味玩其文而㑹其理德業之進日引月長自宜然也於是自鄉論其行而升之司徒司徒又論之而升之國庠大樂正則察其成以告于王定其論而官之其官之也因其才之大小蓋有一居其官至于終身不易者士修其身而已非有求於君也身修而君舉之爾夫然故禮義興行人材衆多風俗醇厚至於斑白者不負戴於道路而王道成矣臣若水通曰於此見張栻之學識其大者自國都以至鄉學備矣首之以絃誦詠歌合乎帝舜命䕫之意矣世之不知以為緩者不亦異乎習之以揖讓釋菜冠昏喪祭養老之禮使耳目手足筋骸皆有所養則禮足以立而德業成矣自鄉論升之司徒升之國庠告于王而官之禮義興風俗厚而王道成矣先王教人用人之法盡之矣伏惟聖明本於躬行之餘舉而修之三代之治不難致也張栻作嶽麓書院記其略曰劉侯之為是舉也豈將使子羣居族談但為決科利祿計乎抑豈使子習為言語文辭之工而已乎蓋欲成就人才以傳斯道而濟斯民也惟民之生厥有常性而不能以自達故有賴於聖賢者出而開之是以二帝三王之政莫不以教學為先務臣若水通曰三代之學皆所以明人倫人倫者道也學所以為傳道計也記曰率性之謂道道也者性也學之以率性明道以達之民民之恆性復而克綏厥猷治之極也嗚呼斯民也三代之所以直道而行也今之民之道之性猶古也今之為師者之道之性猶古也夫何後世倚席不講相視怠散固無足道其臨雍拜老亦豈尊師重傅之實乎伏惟皇上鑒之元儒魯齊許衡曰先王設學校養育人材以濟天下之用及其弊也科目之法愈嚴密而士之進於此者愈巧以至編摩字樣期於必中上之人不以人材待天下之士下之人應此者亦豈仁人君子之用心也哉雖得之何益於用上下相待其弊如此欲使生靈蒙其福可得乎先王設學校後世亦設學校但不知先王何為而設也上所以教人人所以為學皆本於天理民彞無他教也無異學也臣若水通曰王通云周之士也貴非獨士能自貴之也蓋以君臣之間相須之殷而相遇以禮也是故成周之盛追隆古而上之矣後世日趨於弊而世道日降由上之待士士之應上皆以僞而不以實欲救其弊在教之二業合一之道而已所謂合一者令學者於讀書作文之時主一而無適如孔子所謂執事敬程皓所謂作字時甚敬即此是學此德業舉業合一之說也如是則德行道藝兼之矣後之為君相者其念之哉格物通卷六十一
