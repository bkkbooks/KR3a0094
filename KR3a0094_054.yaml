body:
  text: 格物通卷五十四明湛若水撰正百官下唐高祖武德七年三月初定令以太尉司徒司空為三公次尚書門下中書祕書殿中內侍為六省次御史臺次太常至太府為九寺次將作監次國子學次天䇿上將府次左右衛至左右領衛為十四衛東宫置三師三少詹事及兩坊三寺十率府王公置府佐國官公主置邑司並為京職事官州縣鎮戍為外職事官自開府儀同三司至將仕郎二十八階為文散官驃騎大將軍至陪戎副尉三十一階為武散官上柱國至武騎尉十二等為勳官臣若水通曰所謂正百官者非特具其位也正其人也唐之設官內外文武名位兼備矣而治不古若者豈其名職之咎邪書曰官不必備惟其人非其人而官之猶無官也不愼於擇人而詳於設官未見其能治者也故漢有良吏之稱唐則無之唐有藩鎮之禍漢則無之官其可以徒設耶今天下之官大率取法周官可謂具備矣求其人以充之克知三有宅心灼見三有俊心如周之取人者惟君相在焉唐太宗貞觀五年初帝令羣臣議封建魏徴李百藥以為封建不便顔師古以為不若分王宗子勿令過大間以州縣雜錯而居十一月詔皇家宗室及勳賢之臣宜令作鎮藩部貽厥子孫非有大故無或黜免所司明為條例等級以聞至十一年六月詔荆王元景等二十一王長孫無忌等十四人刺史皆令世襲無忌等皆不願之國上表固讓其明年詔停襲封刺史臣若水通曰在易之比地上有水比先王以建萬國親諸侯夫天之立君以主之而已非欲其有之也主之而同其利天下之公也有之而專其利一人之私也堯舜以來封建尚矣至秦乃不然豈秦法可行而堯舜之道不可行乎有天下者自私焉爾矣若太宗者英明出類而有志乎封建之事卒不果行何哉傳曰有關雎麟趾之意然後可以行周官之法度然則太宗蓋未有誠敬以為之本爾故魏徴李百藥迎其意長孫無忌諸人避其嫌可以見之矣我國家創制立法上倣成周下參時宜分封同姓親疏有差省郡雜處師古之論於今行之矣唐太宗貞觀八年十二月中書舍人高季輔上言外官卑品猶未得祿飢寒切身難保清白今倉廩寖實宜量加優給然後可責以不貪嚴設科禁臣若水通曰士之入官則不可並耕而食矣是故祿以代其耕也抱關擊柝者皆有常職以食於上古之制也唐有官而無祿豈設官之道邪忠信重祿所以勸士上之勸之者未至而欲士之不貪豈可得乎故祿以養其亷恥之心也亷恥興而百官正百官正而天下之治無難矣唐睿宗景雲二年分天下置汴齊兖魏冀并蒲鄜涇秦益綿遂荆岐通梁襄揚安閩越洪潭二十四都督各糾察所部刺史以下善惡惟洛及近畿州不𨽻都督府太子右庶子李景伯舍人盧俌等上言都督專殺生之柄權任太重或用非其人為害不細今御史秩卑望重以時巡察姦宄自禁其後竟罷都督但置十道按察使而已臣若水通曰百僚糾察則善有勸惡有懲而百官正矣都督擅權自恣豈無作好作惡偏黨之私者哉或用非其人則百官由是而反側矣向非李盧之言改置十道按察使則唐之禍亂豈小哉後之正百官者其尚愼之唐玄宗開元二十四年二月甲寅宴新除縣令於朝堂上作令長新戒一篇賜天下縣令臣若水通曰太宗嘗謂縣令尤為親民擇之惟愼玄宗猶精是選一時縣令必非庸材矣故宴新除縣令於朝堂復作令長新戒以賜之其崇重如此可謂克繩祖武矣孰不洗心竭力以副德意哉唐代宗大歷元年刑部尚書顔真卿上疏曰郎官御史陛下之耳目今使論事者先白宰相是自掩其耳目也陛下患羣臣之為讒何不察其言之虛實若所言果虛宜誅之果實宜賞之不務為此而使天下謂陛下厭聽覽之煩託此為辭以塞諫諍之路臣竊為陛下惜之臣若水通曰御史朝廷之耳目而使論事先白宰相是借其耳目於人矣耳目之官得其正乎如是而望其視逺惟明聽德惟聰以通天下之壅蔽亦難矣此顔真卿所以盡忠於代宗而召元載之謗為人君者豈可自掩其耳目以成孤立之勢哉唐憲宗元和十二年閏十二月壬辰詔以宦者為館驛使左補闕裴璘諫曰內臣外事職分各殊切在塞侵官之源絶出位之漸事有不便必戒於初令或有妨不必在大上不聽臣若水通曰正百官之分在乎謹內外之防而已成周之制王與公卿大夫士聽外政后與妃嬪夫人聽內政宦者內政之屬也自秦而後古制漸失至於知驛之官唐初猶以御史二人為之舊制也至是乃以宦官代焉是又時事之一變矣防微杜漸之戒可茍也哉裴璘諫之而憲宗不聽惜夫唐文宗太和五年五月辛丑上以太廟兩室破漏踰年不葺罰將作監度支判官宗正卿俸亟命中使帥工徒輟禁中營繕之材以葺之左補闕韋溫諫以為國家置百官各有所司茍為隳曠宜黜其人更擇能者代之今曠官者止於罰俸而憂軫所切即委內臣是以宗廟為陛下所私而百官皆為虛設也上善其言即追止中使命有司葺之臣若水通曰文宗罪宗正之曠官止於罰俸以有司之職分代於宦官名實謬戾百官不正矣史言其優遊不斷之弊為害豈小也哉賈誼新書曰古者聖王制為列等內有公卿大夫士外有公侯伯子男然後有官師小吏施及庶人等級分明而天子加焉故其尊不可及也臣若水通曰加者居其上之謂公卿大夫士輔內治以施外公侯伯子男布外治以承內內外之間官師小吏承德意以致之民內外大小相承而體統不紊則百官正矣此天子之所以為至尊也歟班固白虎通曰王者所以立三公九卿何曰天雖至神必因日月之光地雖至靈必有山川之化聖人雖有萬人之德必須俊賢三公九卿二十七大夫八十一元士以順天成其道臣若水通曰百官之職為上為德為下為民者也故王者立三公九卿各有所統公統卿卿統大夫大夫統元士皆以為德為民也是故百官得其正則上下理百官不得其正則上下亂可不重哉宋仁宗慶歷三年冬十月以張昷之王素等為都轉運按察使先是知諫院歐陽修言天下官吏既多朝廷無由遍知其賢愚善惡乞立按察之法於內外朝官三丞郎官中選強幹亷明者為之使至州縣遍見官吏其公亷無狀皆以硃書於名之下其中材之人以墨書之嵗具以聞詔從之富弼范仲淹復請詔中書樞密通選逐路轉運按察使即委使自擇知州知州擇知縣不任事者皆罷之於是昷之等首被兹選昷之河北王素淮南沈邈京東施昌言河東李絢京西臣若水通曰守令之職最為親民故民之休戚繫於守令守令之賢否繫於按察使按察使得其人以自擇其守守得其人以自擇其令則百官正而膏澤及於民矣歐陽修等請立按察使并其選之之法可謂善矣雖然選按察使者責在冢宰選冢宰者責在君心君心不正則任冢宰非其人冢宰非其人則按察使不得其人按察使不得其人則守不得其人守不得其人則令不得其人而萬民受其殃矣人君之於官人可不愼其始哉宋徽宗崇寧二年九月始定選人階官吏部侍郎鄧洵武言神宗稽古建官既正省臺寺監之職而以寄祿階易空名矣今選人七階自兩使判官至主簿尉有帶知安州雲夢縣而為河東幹當公事者有河中府司録參軍而監楚州鹽場者有瀛州軍事推官充濮州教授者殽亂分錯莫甚於此宜造為新名因而制祿詔悉更之乃改留守節察判官為承直郎書記支使防團判官為儒林郎留守節察推官軍監判官為文林郎防團推官為從事郎令録為通仕郎知令録為登仕郎判官簿尉為將仕郎後改通仕為從政登仕為修職將仕為迪功臣若水通曰孔子稱名不正則言不順言不順則事不成夫正其名將以責其實也如帶知安州雲夢縣而為河東幹當公事者名實乖戾何以責成鄧洵武之言其亦足以正一時之庶官矣人君有志於治者其毋以因循茍且為安當以維新復古為重哉宋孝宗淳熙二年帝謂葉衡等曰朝廷用人止論其賢否如何不可有黨如唐之牛李其黨相攻四十年不解皆緣主聽不明所以致此文宗乃言去河北賊易去朝中朋黨難朕常笑之為人主者但公是公非何緣有黨又曰近來士大夫好倡為清議此語一出切恐相師成風便以趨事赴功者為猥俗以矯激沽譽者為清高駸駸不已如東漢激成黨錮之風深害治體豈可不戒卿等宜書諸紳臣若水通曰朋論一啓則是非異同善惡反易百官不可得而正矣孝宗以朋黨之病在於主聽不明其得正百官之要乎然不知主聽不明之病又安在哉蓋治病者貴拔其根根不拔而徒治其標未見其能去病也主聽不明之病在正心之學未純孝宗能知此則是非昭明而百官正矣奈何此學不講邪人得以指正人為邪偽學之名起而真儒去矣豈非病根之未除乎元仁宗皇慶元年春正月制進翰林國史院秩帝諭省臣曰翰林集賢儒臣須朕自選用毋輒擬奏人言御史臺任重朕謂國史院尤重蓋御史臺是一時公論國史院是萬世公論於是升翰林國史院秩從一品尋敕博選中外才學之士居之臣若水通曰仁宗以國史院繫萬世公論重於御史臺故隆秩而愼選之是矣誠使得德行道藝之士而居之則以其公是公非是非乎天下而天下以勸以懲能使天下勸且懲則世道有賴焉矣其任豈不重也乎若夫徒取文藝小技之流以當之亦豈足以為重哉宋儒程皓曰今之監司多不與州縣一體監司專欲伺察州縣州縣專欲掩蔽不若推誠心與之共治有所不逮可教者教之可督者督之至於不聽擇其甚者去一二使足以警衆可也臣若水通曰正庶官者在感之以誠而畏之以威也故監司之於州縣兩忘其伺察掩蔽之私感之以誠則上下相孚畏之以威則貪頑激勵賢者孚心中人勵行則百官正矣程頥言今日供職只第一件便做他底不得吏人押申轉運司狀某不曽簽國子監自繫臺省臺省繫朝廷官外司有事合行申狀豈有臺省倒申外司之理只為從前人只計較利害不計較事體直得恁地須看聖人欲正名處見得道名不正時便至禮樂不興自然住不得夫禮樂豈玉帛之交錯鐘鼓之鏗鏘哉臣若水通曰禮莫大於分外分以言禮非禮也外禮以言分非分也夫以上下倒行而逆施之百官且不正矣况望其禮樂之興哉是故正百官以圖治者自正名分焉始矣程頥之言真為治者之龜鑑哉國朝乙巳六月以儒士勝毅楊訓文為起居注皇祖諭毅曰吾見元末大臣門下之士多不以正自處惟務諂諛以圖合見其人所為非是不相與救正及其敗也卒陷罪戾爾從徐相國幕下久而無過故授爾是職且盡心所事勿為茍容茍事有差謬皆是為己之纍辟之良玉一有微疵即為棄物不能成器矣諭訓文曰起居之職非專事紀録而已矣要在輸忠納誨致主於無過之地而後為盡職也吾平日於百官所言一二日外猶尋繹不已今爾在吾左右可不盡言且爾素稱謹厚當始終一致茍易其所守則患必生矣辟如馳馬能戒於險阻則不墜肆意於平曠則顛蹶吾每以此自警故以語爾等臣若水通曰人臣以正自處則能以正事人是能正厥官矣皇祖之諭勝毅者其此之謂乎人臣以謹自守則能以謹輸忠是能盡其職矣皇祖之諭楊訓文其此之謂乎雖然人臣固當正已以事君而人君尤當正已以率臣君心一正則羣臣莫敢不一於正矣皇祖之所以正已以正百官者惟聖明念之哉洪武十三年正月己亥胡惟庸等既伏誅上諭文武百官曰朕自臨御以來十有三年矣中間圖任大臣期於輔治故立中書省以總天下之文治都督府以總天下之兵政御史臺以振朝廷之紀綱豈意姦臣竊持國柄枉法誣賢操不軌之心肆姦欺之弊嘉言結於衆舌比朋逞於羣邪蠧害政治謀危社稷譬隄防之將決烈火之將然有滔天燎原之勢賴神發其姦皆就殄戮朕今革去中書省升六部倣古六官之制俾之各司所事更置五軍都督府以分領軍衛如此則權不專於一司事不留於壅蔽卿等以為何如監察御史許士廉等對曰歷朝制度皆取時宜况創制立法天子之事聖裁實為典要但慮陛下日應萬幾勞神太過愚臣以為宜設三公府以勳舊大臣為太師太傅太保總率百僚庶務其大政發兵銓選制禮作樂之類則奏請裁決其餘常行事則修制奉行庶幾臣下絶姦權之患主上無煩劇之勞上然之臣若水通曰明王之治天下在於端大本正大體攬大權而已也我皇祖鑒姦臣之弊收下移之權乃革中書省升六部以分理機務置五軍都督府以分領軍衛雖有內閣以閲總百官庶務而裁決實由於上此大本所以立大體所以正也其法制至精至備此所以為億萬年之規而享久安長治之福也歟洪武三十年正月己卯升翰林院修撰張信為侍讀編修戴彛為侍講上諭之曰官翰林者雖以論思為職然既列近侍且在朕左右凡國家政治得失生民利病當知無不言昔唐陸贄李絳之徒在翰林皆能正言讜論補益當時顯聞後世爾等當以古人自期勿負朕擢用之意臣若水通曰孟子謂君子之事君也務引其君以當道志於仁而已况翰林近臣他日將膺台鼎燮調之任君德之得失治道之興廢繫焉誠不可非其人也茍得賢德之士以充其任則能正身輔德以致主於王道凡國家政治之是非生民之利病皆舉之矣若唐陸贄諸人居翰林之任雖其正言讜論不能無補於當時然君則未志於仁亦豈能盡其職哉皇祖訓迪侍讀侍講之官如此其董正庶官之道至矣洪武禮制一凡文武官常朝視事以烏紗帽圑領衫束帶為公服一品玉帶二品花犀帶三品金鈒花帶四品素金帶五品銀鈒花帶六品七品素銀帶八品九品烏角帶臣若水通曰古者服飾車旗之辨尊卑貴賤之所由分也我聖祖創制立法必致謹乎此其所以辨尊卑之分而正百官之等者皆在是矣諸司職掌凡文武百官出入朝門各照品級第加遜敬如一品以下官遇公侯駙馬加敬禮立則旁立行則後從三品四品官遇一品官加遜禮行立俱後從五品以下官倣此俱不許攙越失儀如有宣召不在此限臣若水通曰朝廷莫如爵序爵所以辨貴賤也聖祖制朝儀凡百官出入朝門各照品級相遜所謂士讓為大夫大夫讓為卿濟濟相讓而國無不治矣其有道之氣象豈不宛然可見乎諸司職掌監察御史職專糾劾凡文武大臣果係姦邪小人搆黨為非擅作威福紊亂朝政致令聖澤不宣災異迭見但有見聞不避權貴具奏彈劾諸司職掌凡百官有司才不勝任猥瑣闒茸善政無聞肆貪壞法者隨即糾劾其外有司擾害良善貪贓壞法致令田野荒蕪民人受害體訪得實具奏提問憲綱風憲任綱紀之重為耳目之司內外大小衙門官員但有不公不法等事在內從監察御史在外從按察司糾舉須明著年月指陳實迹明白具奏若係機密重事實封御前開拆不許虛文泛言若挾私搜求細事及糾言不實者抵罪臣若水通曰風憲之司所以肅百僚貞百度其任重矣然欲正其官者當正其本是故大臣百官之本朝廷四方之本正之在風憲而已風憲之人必公恕存心然後可也蓋公則明而不枉恕則愼而不濫正直忠厚兼備矣聖祖謨訓其風憲之矩範歟憲綱都察院按察司堂上官及首領官各道監察御史吏典但有不公不法及曠職廢事貪淫暴橫者許互相糾舉毋得徇私容蔽亦不許挾私妄奏臣若水通曰風憲之職得其正則百官皆得其正矣所謂正者公而無私也茍為不公過則為作威以削不及則容隱不振不惟無以正人亦且不能正已矣書曰位不期驕祿不期侈此之謂也聖祖之制勉之以秉公戒之以徇私可謂至中至正也是宜治官董正而奕世永昌也乎憲綱凡監察御史按察司官分巡去處但知有司等官守法奉公廉能昭著者隨即舉聞若姦貪廢事蠧政害民者即便拏問應請旨者具實奏聞若知善不舉見惡不拏杖一百煙瘴地面安置有贓者從重論臣若水通曰風憲之職在於舉善去惡而已矣惡不去不足以為懲善不舉不足以為勸故去一惡而千萬人懼舉一善而千萬人慕故懲惡勸善之典行而百官正矣雖然昔姚崇請擇十使朱熹曰本源之地在朝廷二者惟明主圖之禮儀定式凡房舍服色傘蓋器皿床榻鞍轡弓矢各照品級遵用上可以兼下下不可以僣上並不許雕刻龍鳯紋並玄黃紫色金飾硃漆臣若水通曰百官之正在名器而已故降殺之間不可以毫髮僣差也孔子曰惟名與器不可以假人左氏傳曰辨等威異物采皆納民於軌物語謂禁亂之所由生猶防止水之所自來也觀於聖制則與孔子正名謹器之意吻合矣晉文之請隧于奚之請繁纓奚有哉格物通卷五十四
