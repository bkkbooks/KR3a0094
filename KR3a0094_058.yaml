body:
  text: 格物通卷五十八明湛若水撰學校一禮樂政教附易蒙初六發䝉利用刑人用說桎梏以往吝臣若水通曰初六以陰居下而不正下民之䝉者也爻言上之治䝉當有發之之道明刑以示之使知所畏懼而感悟其良知去其蒙蔽如脫去其桎梏焉然必有脫其桎梏之心乃可若過此而往專用刑法以為治則民之䝉不能發矣故有吝也夫人性本然之善蔽於䝉昧猶桎梏也桎梏去而真性全懲之以威去其桎梏者也故書曰明于五刑以弼五教又曰伯夷降典折民惟刑教者以發蒙為功蒙之不亨教者之吝也故威以懲之使歸於德化之中教得其道而䝉者亨矣賢才胥由是出國家曷勝其用耶書虞書舜典舜曰契百姓不親五品不遜汝作司徒敬敷五教在寬臣若水通曰此帝舜命契以掌教之言也親者相親一體之義也五品父子君臣夫婦長幼朋友五者之名位等級也遜順也司徒掌教之官也敷布也五教者以父子之親君臣之義夫婦之别長幼之序朋友之信布而為教令也敬者心之主一而教之本也寬謂寬裕以待之也蓋五者之理出於人心之本然非假外求惟教學不明則無以開發其良心故不相親不相順教也者所以開發其良心而復其本然之理也故舜因禹之讓又申命契仍為司徒使之敬以敷教而又寬裕以待之使其優游浸漬以漸而入則其天性之真自然呈露不能自已矣臣謂由百姓不相親各自以其心為心而無同胞共與之公各以其形骸分爾汝君臣父子夫婦兄弟朋友皆如路人五品所以不順其理也故舜命契敬敷五品之教所以明其相親之理而使相遜則天下無事矣此唐虞三代之治必先於建學立師師之所以教弟子之所以學有司之所以選舉朝廷之所以擢用皆在人倫物理德行道藝之實所養所用皆出於一後世立教或以詩賦或以訓詁詞章徒事口耳而不可推之天下國家此學問政事所以分為二事治之所以不古若也有志於治者尚其考之舜典帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清臣若水通曰此帝舜命伯夷典禮之言也典主也三禮者祀天神享人鬼祭地祇之禮也秩宗者主叙次百神之官伯夷臣名夙早也寅敬也直者心無私曲也帝舜咨問於四嶽在廷之臣有能典主我天神地祇人鬼之禮者乎四嶽遂舉伯夷舜乃然其舉呼而命之曰爾作秩宗之官當早夜致敬敬則內直無有私曲之萌則其心潔清心潔清則德足以通神明而可以感格矣帝舜命伯夷專言祭祀而不及乎他者何耶蓋事神實難而三千三百之禮皆本於敬也益稷䕫曰戛擊鳴球搏拊琴瑟以咏祖考來格虞賓在位羣后德讓下管鼗鼓合止柷敔笙鏞以間鳥獸蹌蹌簫韶九成鳯凰來儀臣若水通曰此䕫述作樂之功用也戛擊考擊也鳴球玉磬也七絃為琴二十四絃為瑟咏者人歌聲也虞賓丹朱也羣后助祭諸侯也下堂下之樂也柷敔節樂之器也笙竹音鏞鍾金音也䕫言樂之始作戛擊鳴球搏拊琴瑟以合歌咏之聲是時丹朱在陪祭之位與助祭諸侯以德相讓則人無不和可知矣始則擊柷以合之終則櫟敔以止之笙鏞之音與咏歌而迭奏是時則見鳥獸無知亦蹌蹌行動相率而舞簫韶至九變則見鳯凰靈鳥亦且來舞而有儀容則物無不和可知矣夫感神人和上下格鳥獸致祥瑞作樂功效之大感通之妙如此為人君欲化成天下位育天地萬物者可不講求之乎周書武成重民五教惟食喪祭臣若水通曰此周史臣述武王政治之大事也五教者君臣父子夫婦長幼朋友五典之教也教以厚倫食以養生喪以送死祭以追逺皆所以立人紀而厚風俗聖人之所以甚重焉者也孟子論王道使民養生送死無憾謹庠序之教申之以孝弟之義其言蓋本於此人君欲行王道者盍於此求之哉洪範凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之而康而色曰豫攸好德汝則錫之福時人斯其惟皇之極臣若水通曰箕子衍洪範皇極之疇此言庶民也有猷謂有謀慮者有為謂有設施者有守謂有操守者念之不忘之謂也不協于極未合於善者也不罹于咎不陷于惡者也受之者受教之也攸所也錫與也福爵祿也有猷有為有守三者其材質可進於大道君之所當念念不忘而進之也未合於善不陷于惡材質中人也進之則可以為善棄之則流於惡君所當受教之而不拒也念而深進之受而與進之各隨其才而輕重以成就之也由前二等之人而造就見於外而有安和之色發於中而有好德之言汝於是既觀其色又聽其言知其為善則錫之以爵祿而是人斯其惟皇之極矣宋儒程皓言於朝曰治天下以正風俗得賢才為本夫人君於天下之人當隨其材而成就之使賢者能者各以時見用於朝則風俗日厚而王道可幾矣後之人君有志於圖治者可不務乎詩大雅棫朴倬彼雲漢為章于天周王夀考遐不作人臣若水通曰倬大雲漢天河也章文章也周王謂文王也文王九十七乃終故言夀考遐何也作者鼓舞振德之意此詩美文王教化成賢之隆也言雲漢之大則為章于天矣文王夀考何不作成人才如是乎養士莫大於學校學校者固教化之地其所以鼓舞而作興之者實本於君心之德爾故棫朴詠峩峩髦士桓桓六師人才可謂盛矣而必曰周王夀考遐不作人蓋必有文王之德享文王之夀而久於其道則在位一日聖德薰蒸于一日在位百年聖德薰蒸于百年然後禮樂興而教化成賢才出而天下治矣不然徒有學校之設茍無聖德以為鼓舞作興之本如漢明帝開辟雍衣冠縉紳環橋門而觀聽者蓋億萬計而卒無以成教化之功學校之設徒為粉飾虛文而已安得真才以為實用哉大雅靈臺虡業維樅賁鼓維鏞於論鼓鍾於樂辟雍臣若水通曰此詠文王教化之詩也虡者植木以懸鍾磬其橫者曰栒業者栒上大版刻之捷業如鋸齒者也樅者業上懸鐘磬處以綵色為崇牙其狀樅樅然也賁鼓大鼓也鏞大鍾也於嘆辭論倫理也雍澤也辟雍天子之學也言文王之樂於其虡業則樅樅然其賁鼓與大鐘既作而有倫文王則樂于辟雍矣文王鐘鼓之樂作於辟雍者何蓋古者首以禮樂而教胄子也故文王於辟雍之中既教之養老習射之禮矣猶懼其一於嚴而情不通則其教有難入矣故又考鐘擊鼓秩然有倫使入乎耳感乎心而辟雍之樂藹如春風和氣之薰蒸所以涵養其性情蕩滌其邪穢優游變化自成其德爾雖然禮樂本於人心非自外也故曰論曰樂文王本之此心一天理中和之極故發之於禮樂自然中正和平有以感人心於和樂也茍無中和之本而徒事其文焉其如禮樂何故曰履中正而樂和平可謂達禮樂之本矣魯頌泮水思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教臣若水通曰此詩頌魯僖公修泮宫之教也教以和樂為主和樂則感人心於易從易從則教化行而人才出矣故舜命契曰敬敷五教在寬謂之寬者即和樂之意也泮水之詩言魯侯蒞止載色載笑匪怒伊教方其蒞學敷教之時假之言笑以通其情斯時也威怒為之泯然惟循循善誘而教養之爾然和樂豈假於外哉實本諸心爾故記曰中心斯須不和不樂則鄙詐之心入之矣鄙詐一入中心安得和樂心不和樂施之教者又安得而和樂哉故心敬而後鄙詐消鄙詐消而後中心自然和樂而施之教者亦無不和不樂優而游之使自求之如春風著物生意勃然矣故人主之和德實學校教化之本也禮記王制天子命之教然後為學小學在公宫南之左大學在郊天子曰辟雍諸侯曰頖宫臣若水通曰凡教自上出者也天子天下之主故必天子命之教然後為學也小學者小子之學也公宫南之左者東南方也生長之地也大學者大人之學也十五嵗入焉郊者郭門之外也辟璧也辟雍環學宫皆水如璧之象頖宫者半水也王制樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉凡入學以齒臣若水通曰樂正掌教之官也術者道路之名也詩書禮樂四者皆入德之路也故謂之四術造士者造就選士俊士而成之也樂主發禮主收故宜於春秋也詩主暢書主藏故宜於冬夏也主乎一而三者輔之也王大子適子也王子支子也羣后諸侯也適子長子也俊升於學者選升於司徒者也以齒不以貴所以興讓也文王世子凡語于郊者必取賢斂才焉或以德進或以事舉或以言揚曲藝皆誓之以待又語臣若水通曰語論才也郊太學也有德者謂之賢有能者謂之才即事也言者敷奏之言也曲藝有一長者也又語再論也古者即學論人之法尚賢而用才故德進為先事舉次之言者事之緒餘故又次之曲藝則僅能一技故為下此論人之序也雖然以德以事以言以曲藝有立賢無方隨材器使聖人之仁不遺乎物也惟我聖明之教如天地之覆載大以成大小以成小無物不育如大匠之於羣材大則大用小則小用而無遺與成周之法同一揆矣文王世子天子視學大昕鼓徵所以警衆也衆至然後天子至乃命有司行事興秩節祭先師先聖焉臣若水通曰此天子視學之禮也於大明之時鼓徵召大衆之至而後天子至焉遂命有司行事舉禮以祭先師先聖所以報本不忘學之所自致崇儒重道之誠而身親學焉以為教者也自漢以來目視學為異事故不曰視學而曰幸學視者親臨之辭所以著重教也幸者寵遇之辭所以見尊君也君尊而崇師重道之意殺矣為人君者可不知所重乎學記古之教者家有孰黨有庠術有序國有學臣若水通曰古人立學二十五家之閭曰闕臣若水通曰中年間一年也離絶也羣者朋儕也古者學校逐年比較之法每一年必有入學之人間一年則進退可知矣於是考其進否之藝即又申其說以為一年所視者離絶其經書之句讀辨别其志向之邪正三年所視者敬其所習而無怠忽樂其朋徒而無暌二五年所視者博習而無限制親師而知嗜好七年所視者論學之微取友之益夫然則學巳小成者也至於九年知類通達而義理無不明卓然强立而外物不能反此之謂大成夫曰經曰業曰羣曰習曰學曰類是所謂業也曰志曰敬曰樂曰博曰親曰通達曰强立是所謂德也德業合一先王之所以教而學者之所以學而成其賢者也今之所教學者不越乎記誦辭章之間豈可謂之成賢哉學記大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨學而無友則孤陋而寡聞燕朋逆其師燕辟廢其學此六者教之所由廢也臣若水通曰學之所由興者有四焉屬於師者三曰禁止其未發之非一也告之以當可之時二也不陵犯節次而施之有序三也屬於友者一曰彼此相觀而摩厲以善是也學之所由廢有六焉屬於師者三其一曰發然後禁而扞格不勝其二曰過然後學而勤苦難成其三曰雜施而使之壞亂屬於友者三焉一曰孤陋而寡聞二曰燕私為朋以逆其師三曰燕遊邪僻以廢其學由是觀之自天子以至於庶人未有不由師而成者然師之為教止於大綱而朋友講習之益尤多也古人重朋友之樂其以此夫禮運五聲六律十二管還相為宫也臣若水通曰十二律管者正五音之具也五音者作樂之本也樂之本由人聲起也五聲者宫商角徵羽也六律者黃鍾大簇姑洗㽔賓夷則無射為六陽律大吕夾鍾仲吕林鍾南吕應鍾為六陰吕均之皆可以言律此云六律者陽可以該陰也十二管者十二律吕之管所以候氣者也還相為宫者以十二律吹之而為聲迭相為宫也夫十二律有吹有候吹之以審聲之高下候之以審陽氣之升而為之調燮以取中也吹以審於聲候以審於氣則無不和而可被於八音為樂其管止於十二者律之正管十二也變律非正律閏月無中氣故不候也候氣應而吹其管則中聲在是矣其為宫也惟十二正律各自為宫以偕五聲之正而周流以遍故為六十調蓋六十調者十二宫也然每宫起調畢曲乃以二變聲濟五聲之不和以六變律續㽔賓以下之不及所以然者無非欲其聲之和夫宫者君也十二宫者皆君德之所吹也故律管之灰半出者為和氣全出者為猛氣不能出者為衰氣和氣者其政平猛氣者其臣縱衰氣者其君暴日别月異以其天與人君交相感應如影響然也作樂之功用豈小也哉樂記是故先王慎所以感之者故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂政刑其極一也所以同民心而出治道也臣若水通曰道猶理也君民相感之際微矣故先王於感人心之道必致其謹焉是故禮樂政刑不同而理同歸於感人心而已爾夫恭敬辭讓人皆有是心也而無以理之或失則過或失則不及矣故禮以理之使無過不及而志正矣既有是志不能無聲聲而不和至於乖戾則無以宣其志之中和故樂所以和其聲也禮制樂作感人者具矣其有不一者於是乎有法制禁令之政焉以一之又不齊則有墨劓剕宫大辟之刑焉以防之夫禮以道之樂以和之政以一之刑以防之果為何物蓋事雖殊而所以為民使循乎天理之正其極則一也後世廢棄禮樂專尚政刑是驅民於罪戾之歸豈先王之意哉嗚呼禮樂政刑出于一此先王之世所以治也禮樂政刑岐而為二此後世之所以亂也為人君者可不慎乎樂記是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也臣若水通曰人生而靜天之性也性本無不正也情蕩之也情本無不中也欲誘之也欲非自內生也形纍之也是故有形而后有欲有欲而后失其情情蕩而性鑿性鑿而人道乖欲動情勝賊滅無倫此大亂之道也是故先王有憂之制以禮樂推而達之天下使自得之禮以制心樂以樂心則口腹耳目之欲不流矣欲不流則好惡之情以平而不蕩各得其中正而性復人道其有興矣此禮樂之用所以為大也哉樂記樂者天地之和也禮者天地之序也和故萬物皆化序故羣物皆别樂由天作禮以地制過制則亂過作則暴明於天地然後能興禮樂也臣若水通曰天高地下萬物散殊天地之序也流而不息合同而化天地之和也和故氣行而物化序故質定而物分此天地自然之禮樂也先王仰觀俯察而有得焉禮樂所以興乎禮樂何以由天地制作也樂也者聲也氣之所為也是故擬之天道焉禮也者形也質之所為也是故擬之地道焉天地之和序盡形于此由是大樂與天地同和大禮與天地同節天地奠位而萬物生參贊之能事畢矣夫何以致於是也天地聖人之道一也先王得天地之道焉合氣與質道之至也和序生于其心繼之以器以文而禮樂出矣禮樂出而和序之心盡矣先王之教何莫而非天地之所為哉是故其始也則深體之其中也則效法之而其終也則參贊之天地聖人其體一也而禮樂也者所以合天人之藴者也噫不聞性與天道而能制禮作樂者末矣過則暴亂其斯之謂歟樂記禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致禮以治躬則莊敬莊敬則威嚴中心斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而易慢之心入之矣臣若水通曰斯須暫時也致者中庸致中和春秋致女禮致爵之致言推而達之於彼也子諒慈良也入謂主之也先王禮樂之化神矣哉蓋先王不能斯須去身推而達之天下亦不欲其斯須去焉廣禮樂之教以成其化也是故樂由中出故推樂于民以治心禮自外作故推禮于民以治躬樂推則民化之易直慈良之心生矣生則樂樂則安安則久久則天天則神不言而信不怒而威矣禮推則民法之故莊敬莊敬則威嚴而無易慢之心矣威嚴則和樂而無鄙詐之心矣夫易直慈良之生也心之治也和也而樂而安而久以至信且威焉躬其有不莊敬者乎莊敬威嚴之著也敬也而和而樂以至易慢鄙詐皆泯焉心其有不和樂者乎易直慈良之或未至也則安久天神之機或幾乎息鄙詐易慢之或主于內也則莊敬和樂之著必有泯然而滅者矣是故心所生也治心也亦所以治躬也治躬也亦所以治心也合內外之道也知內外之合一斯可與語禮樂之全教化之備矣禮運曰先王修禮以達義體信以達順故此順之實也臣若水通曰天地間之祥瑞無不至焉者豈無故哉其禮樂之感應也是故先王修天理秩然之禮於心以達其適宜之義於事體真實之信於心以達其和德之順於事忠信者禮之本也順宜者義之道也修禮所以體信適義所以達順體用之謂也故其瑞應即順氣之實而可見者抑體信達順之道程頥推原上下一於恭敬是也信順者恭敬之謂也以此恭敬修其禮節於吾身則謂之體信以此恭敬達其事宜於天下則謂之達順朱熹亦曰體信者致中也達順者致和也要之一恭敬與致中和皆不外夫先王之禮義也格物通卷五十八
