body:
  text: 格物通卷八十七明湛若水撰禁奪時詩小雅十月之交抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰豫不戕禮則然矣臣若水通曰此詩皇父役民不以其時而致民怨之之詞也抑發語詞時農隙之時也作勤也即就也卒盡也汙停水處也萊草穢也戕害也夫三時務農一時服役固使民之常也然有仁心者尤必憫其勤勞不忍煩其役以疲民之力也今皇父不然故民之怨而作詩言此皇父之役我民不自以其役使之非時而胡為動我以徙而不就我之謀以恤其私使我至於徹其牆屋而家居為之廢毁荒其農畝而卑者以汙高者以萊亦已忍矣然且曰非我戕害於汝民也下供上役乃其禮則然爾是誠何心哉蓋由其心之不仁故痛癢不知休戚不關以致此也然則人君於使民之際誠存不忍之心則必知農事之重而不奪其時矣不奪其時則財阜民安而國家無事矣否則一念不仁則土木煩興戰伐遊田不息而勞民傷財以斂怨於天下亦何所不至哉春秋隱公七年夏城中丘九年夏城郎臣若水通曰隱公魯君名息姑中丘河內之邑郎魯邑也謂之城者完舊也此魯隱將為宋而伐邾是以有中丘之城尋復為鄭伐宋於是有郎邑之築也然則何以書譏不時也夫人君之道在愛其民故土功龍見而戒事火見而致用水昏正而栽日至而畢時也隱公城中丘城郎而皆以夏則妨農務而非時矣其如君國子民之道何哉禮記王制曰用民之力歲不過三日臣若水通曰此古者役民之制也人君之所以尊為其有民也欲得其民心當節其力也役之以道斯民不怨勞而事集矣然恐役之者且不恤其民力之弗堪也故又制為三日以限之三日之限又隨其年之豐者以為等若中年無年則惟一日二日而已爾古人之於民節其力而不盡也如此秦不師古為長城阿房之役而不恤民之怨以至於亡天下然則人君之虐役其民力者非徒以病民且反以自斃也可不戒哉月令曰耕者少舍乃修闔扇寢廟畢備毋作大事以妨農之事臣若水通曰此仲春之令也少舍者播種稍畢可暫息也闔者木門扇者竹門也寢廟者前曰廟後曰寢也大事大興作之事也仲春耕少舍者以養民力也修門者以待風雨也修寢廟以時祭也禁大事以重農也月令曰不可以興土功不可以合諸侯不可以起兵動衆毋舉大事以搖養氣毋發令而待以妨神農之事也臣若水通曰此季夏之令也土功板築之事舉大事者即興土功也合諸侯謂起兵也搖養氣散長養之氣也發令而待謂未及役期先發民待之也神農主農事之神也夫季夏耕耘之時故戒工役戒興兵恐上散養氣下妨農工也論語子曰使民以時臣若水通曰此聖人言治國之要也時農隙之候春耕夏耘秋收之時凡有興作必於此時之隙乃役之也臣謂此章孔子於上文既言道千乘之國敬事而信節用而愛人此又言人君若興土工動大衆而不以其時則妨農害稼民食不足是無愛民之實民貧怨生雖有城郭之固無與守宫室之成無與居臺池之美不得以享其樂矣不可輕用民力也孟子曰不違農時穀不可勝食也臣若水通曰此孟子告梁惠王以王道之始事也違失也時者耕作之時也不可勝食言多也蓋謂凡興土功動大衆不失其春耕夏耘秋收之時則民得盡力於農畝而所入無窮用之不盡矣夫軍國需於五穀五穀成於農時時也者其君民貧富之所關也奪其時是自奪其食矣人君而自奪其食則將何以守國乎是故民事不可緩也而况可以少違之乎蓋食者民之天也民者君之天也民非食罔生君非民罔守然則為人君者可不先於勸農以行養民之政哉左傳莊公二十九年冬十二月城諸及防書時也凡土功龍見而畢務戒事也火見而致用水昏正而栽日至而畢臣若水通曰龍見畢務者謂今九月周十一月龍星角亢晨見東方三務始畢也戒事者戒民以正土功之事也火見致用者謂大火心星次角亢見者致築作之物也水昏正而栽者謂十月定星昏而中於時樹板幹而興作也日至日南至微陽始動故土功息也書曰食哉惟時夫國以民為本而民以食為天時也者民之所由以資食者也為人君而違農時則將何以養民而裕其國乎春秋書莊公以冬城諸及防之役以時也時而書之又以見不違民時者寡而民力所當重也聖人之意微矣襄公十七年宋皇國父為太宰為平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之親執朴以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也臣若水通曰妨農收者謂奪收斂之時也親執朴者親朴杖以董役也然平公之築臺速之者皇國父緩之者子罕也謳者之言似矣子罕始欲緩役終則督役者何邪此蓋子罕分謗弭禍之深意也然而重農務本之意則可法矣昭公八年春石言於晉魏榆晉侯問於師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宫室崇侈民力雕盡怨讟並作莫保其性石言不亦宜乎於是晉侯方築虒祁之宫叔向曰子野之言君子哉臣若水通曰石言者晉魏邑之榆地有石作人言也然春秋不書豈亦傳者之訛乎然師曠以為春築虒祁之應者亦因事獻忠之義爾噫可以為崇工作雕民力興怨讟召災異者之戒矣昭公八年冬築郎囿書時也季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎臣若水通曰昭公築郎囿何以書時也冬者農事之暇也故工築其時也然築囿遊觀之玩無益之役也雖得時矣亦非聖人之所取也特取其不以遊觀無益之務而妨農作之時爾季平子乃欲速成之叔孫昭子是以有速成勦民之言可無囿不可無民之戒可謂知重民事矣後之人君鑒昭公之過取昭子之言念小民之依憫農事之重愛養民力奉若天道實生民之福社稷之福也國語周語單子曰不奪農時不蔑民功有優無匱有逸無罷臣若水通曰農時農作之時也蔑棄也民功農功也優有餘也匱乏也罷勞憊也夫財出於民而農務為本故曰收而場功偫而畚挶營室之中土工其始先王之教藝所以重農務也然則逐末之流爭刀錐競淫巧不亦徒棄農民之功罷百姓之力而匱天下之財乎故市廛之法抑其末而使務本也齊語管子曰陸阜陵墐井田疇均則民不憾無奪民時則百姓富臣若水通曰髙平曰陸大陸曰阜大阜曰陵墐溝上之道也八夫為井井間有溝穀地曰田麻地曰疇均平也民時農務之時也天地養萬物聖人養萬民不過曰時而已故井地雖均違奪其時則慢天虐民民貧而憾怨不可以一朝居矣管子言陸阜陵墐田疇之均而必繼之以不奪民時其知養民富國之道者歟楚語伍舉曰先王之為臺榭也榭不過講軍實臺不過望氛祥故榭交於大卒之居臺度於臨觀之髙其所不奪穡地其為不匱財用其事不煩官業其日不廢時務瘠磽之地於是乎為之城守之本於是乎用之官竂之暇於是乎臨之四時之隙於是乎成之臣若水通曰積土曰臺無室曰榭講習也軍實戎事也凶氣為氛吉氣為祥大卒王士卒也度謂足以臨見之磽確也隙農務空間時也夫先王施令德於遐邇而小大安之未聞侈臺榭以為務也是故僅足以備講武之用而不傷乎稼地官業財用農務之本焉為人君者其可不以為法哉宋文帝元嘉十六年二月荆州刺史義季嘗出畋有老父被苫而耕左右斥之老父曰盤于遊畋古人所戒今陽和布暖一日不耕民失其時奈何以從禽之樂而驅斥老農也義季止馬曰賢者也命賜之食辭曰大王不奪農時則境內之民皆飽大王之食老夫何敢獨受大王之賜乎義季問其名不告而退臣若水通曰田間老父因被斥而出正言戒義季遊畋以妨農時亦其偉矣及賜之食又推以廣惠於境內之民若老父者其有道而隱者與義季不能載之而歸以薦諸朝使其抱負不得盡施以飽天下之民焉惜哉唐太宗貞觀五年春正月有司上言皇太子當冠用二月吉請造兵備儀仗上曰東作方興宜改用十月少傅蕭瑀奏據隂陽不若二月上曰吉凶在人若動依隂陽不顧禮義吉可得乎循正而行自與吉會臣若水通曰書云欽若昊天敬授民時然則重農時以奉若天道其為隂陽之時休祥孰大焉况冠期可改而農時不可改也無害乎冠禮而信隂陽之説以違農事之時瑀可謂惑矣太宗不以私愛而廢民務非明哲之主其能之乎後世務農之君宜取法焉貞觀十四年八月上將幸同州校獵劉仁軌上言今秋大稔民收穫者十才一二使之供承獵事治道葺橋動費一二萬功實妨農事願少留鑾輿旬日俟其畢務則公私俱濟上賜璽書嘉納之臣若水通曰書云若農服田力穡乃亦有秋夫三農舉家勤勞於春夏正以有秋之望也幸而大稔而君乃以校獵違其收穫之期則天固生之君固殺之也家食且無備而國稅將何徵乎劉仁軌上言而太宗竟寢其事其亦有惠於民矣唐髙宗顯慶元年夏謂侍臣曰朕思養人之道未得其要公等為朕陳之來濟對曰昔齊桓公出遊見老而飢寒者命賜之食老人曰願賜一國之飢者賜之衣曰願賜一國之寒者公曰寡人之廩庫安足以周一國之飢寒老人曰君不奪農時則國人皆有餘食矣不奪蠶要則國人皆有餘衣矣故人君之養人在省其征役而已今山東役丁歲則數萬役之則人大勞取庸則人大費臣願陛下量公家所須外餘悉免之上從之臣若水通曰齊國老人所謂不奪農時則國人皆有餘食不奪蠶要則國人皆有餘衣是故勸課農桑則足以衣食四方矣因民之利而利之惠而不費何憚而不為乎唐髙宗因來濟所陳而能從其言以罷山東之役其知重農者矣臣謹録之為人君之取法焉高宗儀鳳二年四月詔遣崔謐等分道存問賑給御史劉思立上疏曰今麥秀蠶老農事方殷敕使撫巡人皆悚忭聚集參迎妨廢不少望且待秋務間出使疏奏謐等遂不行臣若水通曰奪時之事非特行兵工役而已一巡一遊靡不關係焉麥秀蠶老而有巡行存問之舉則其所傷豈小哉夫以農事方殷一年衣食之計一家長幼之望正切於此於此時而遣使以存問則栁宗元所謂雞犬為之不寧名雖為惠實則為暴將以利之適以害之所得不能償其所失矣思立疏以止之其知以民事為重者乎中宗嗣聖十三年十月狄仁傑為魏州刺史前刺史獨孤思莊畏契丹猝至悉驅百姓入城繕修守備仁傑至悉遣還農曰賊猶在逺何煩如是萬一賊來吾自當之百姓大悅臣若水通曰修守備雖以禦寇妨耕農是又無異乎冦之先至者也仁傑蒞魏之初能改前政驅民歸農藹然仁心之發矣且曰萬一賊來吾自當之凛然義氣之激矣是宜百姓之大悅也哉玄宗開元元年修大明宫未畢夏五月敕以農務方勤罷之以待間月臣若水通曰五月乃農夫耘苗之時也一日作之百日食之一夫力之八口仰之可不重歟至於間月乃農功告畢歲晚務間可以興作之時也玄宗罷大明宫之修以待間月可謂重農時矣他日海內富實謂不本於此乎後晉高祖天福三年六月己丑金部郎中張鑄奏竊見鄉村浮户非不勤稼穡非不樂安居但以種木未盈十年墾田未及三頃似成生業已為縣司收供徭役責之重賦威以嚴刑故不免捐功捨業更思他適乞自今民墾田及五頃以上三年外乃聽縣司徭役從之臣若水通曰庶民之心惟其利而趨避之爾利在農則趨農否則有思他適爾今使種木未及十年墾田未及三頃業未成而遽有征徭之責是害生於農也亦何怪其民之他適哉後晉高祖從張鑄之請墾田三年外乃聽役其亦知重農之意歟賈誼新書曰天有常災必與奪民時臣若水通曰孔子曰使民以時蓋使以時則力本者得以自盡故財以時阜民以財富而休徵至矣故天之災人能備之其不能備之者人之災也夫災莫大於奪農時矣故雖有九年之水而民不告病雖有七年之旱而民不致飢者人能備之也劉向説苑晉平公春築臺叔向曰不可古者聖王貴德而務施緩刑辟而趨民時今春築臺是奪民時也夫德不施則民不歸刑不緩則百姓愁使不歸之民役愁怨之百姓而奪其時是重竭也平公曰善乃罷臺役趙簡子築臺於邯鄲天雨而不息謂左右曰可無趨種乎尹鐸對曰公事急歷種而懸之臺夫雖欲趨種不能得也簡子釋然乃釋臺罷役臣若水通曰養民之道地以生之人以作之天以時之不違農功則三才合德而民得其養矣夫先王之政不奪民時故周禮均人凡均力政以歲上下豐年則公旬用三日中年公旬用二日無年公旬用一日凶札則無力政蓋恐民勞逸之不均也先王有潔矩之心故能用民力而民不知倦晉平公罷臺役不忍民重竭趙簡子釋臺罷役使民趨種雖未必合先王均力之政亦庶幾不奪民時矣君人者茍有愛民之心必知民事之艱難知民事之艱難必能愛養夫民力愛養民力而民生不殖者未之有也國朝洪武十八年入月遣使齎敕諭宋國公馮勝時勝督工建周王宫殿於開封府將以九月興役以其時民當種麥敕諭之曰中原民食所恃者二麥爾近聞爾令有司集民夫欲以九月赴工正當播種之時而役之是奪共時也過此則天寒地凍種不得入土來年何以續食自古治天下者必重農時朕封建諸子將以福民今福未及施而先奪民時朕恐小民之怨咨也敕至其即放還俟農隙之時赴工未晚也臣若水通曰孟子云先王有不忍人之心斯有不忍人之政矣蓋仁政由心生者也我皇祖因馮勝督建周王府欲九月興役妨民種麥之時而諭使放還以俟農隙且拳拳於奪時續食之憂諄諄乎分封福民之義可謂不忍人之政矣得非由於一念仁民愛物之心所發乎臣謹録之以為聖子神孫萬代勤恤小民之法焉永樂二十二年十一月仁宗皇帝諭户部尚書夏原吉等曰農者生民衣食之原耕耘收穫不可失時自今一切不急之役有當用人力者皆俟農隙前代蓋有不恤農事而以徭役妨耕作召亂亡者矣不可不謹臣若水通曰民者國之本食者民之心而農時又衣食之本也古者役民於農隙之時蓋有其道矣夫奪其時者奪其食也奪其食傷其心也傷其心而民弗叛國不亡者未之有也仁宗皇帝當嗣位之初鑒前代之失以是諭夏原吉等此蓋仁民之心本於天性者也真能慎農時重民食而保國家於無疆者矣伏惟聖明以仁祖之心為心則天下不勝幸甚格物通卷八十七
