body:
  text: 格物通卷八十一明湛若水撰飭百工易萃象曰澤上於地萃君子以除戎器戒不虞臣若水通曰此聖人於萃卦示人以備器械之義也物萃則争亂之機也除者修而聚之之謂戒猶備也除戎器以防其亂也兊西方金三四五互巽巽木外有兊金戎器之象也坤平地無險阻可恃不虞之象也蓋君子於萃而無虞之時猶治器以戒備安不忘危之心天理之正也鍜乃甲胄礪乃戈盾皆其心之形於警備者也先事有備有備無患而暮夜之戎勿恤矣彼銷鋒鏑以鑄金人與銷兵於不用者豈非狃於安逸而不思其器械之備乎書虞書舜典帝曰疇若予工僉曰垂哉帝曰俞咨垂汝共工臣若水通曰此帝舜命工官之言也疇誰也若順也工者百工之事土工金工石工木工獸工草工皮工皆是也僉衆也咨嗟也垂舜臣名俞者然其舉也共工官名帝舜詢於羣臣言誰能順其理而治我百工之事者乎群臣同辭對曰能順理而治百工者其惟垂哉於是帝舜即然其言咨垂而告之曰汝為我共工之官也然所謂順其理者何也蓋聖人觀象制器莫不各有自然之理焉一不順其理則欲心生欲心生必至於侈靡侈靡則必至於淫巧以蕩上心耗民財僣逼之禍皆起於此矣然則帝王於百工致謹豈曰小小之故哉禮記王制曰作淫聲異服竒技竒器以疑衆殺臣若水通曰淫聲非先王之樂也異服非先王之服也竒技竒器淫巧也是皆滅天理蕩人心亂政治者故不聴而刑所以若天道正人心以保至治而使之不壞者也月令曰百工咸理監工日號毋悖于時毋或作為淫巧以蕩上心臣若水通曰此季春之令也百工者工之事非一也咸理者各治造作之器也監工者工師監臨之官也日號者每日號令下文即其言也言百工之事當因時而制無或悖逆又不得作為過巧之工以獻于上使上恱之而蠱惑其心志也夫百工若小事也以蕩上心則其事之所闗大矣事有甚小而禍不可勝既者非滛巧蕩心之謂乎故監工之日號不特使之順時以善其事而又以滛巧為戒蓋物莫全於質而莫壞於文而人之心因物有遷亦必由之况人君之心衆欲所攻由是而日滋焉豈有紀極耶故象箸之作君子占知其終而瓊宫瑶臺卒用此以喪天下此固往事之明鑑也然則後之人君欲飭百工者則如之何亦惟曰日省月試既稟稱事庶乎其可爾月令曰是月也命工師效功陳祭器按度程毋或作為淫巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情臣若水通曰此孟冬之令也霜降而百工休至此物皆成也故令工師百工之長效其功諸器皆成獨舉祭器者蓋莫尊於祭器君子不敢以其私䙝同其所尊敬故也所謂按度程者觀其體制大小之合式與否而又戒之勿作為淫巧之工以蕩上心恐玩之而奢侈之情或生也必以功致為上惟欲精宻工緻以久於用也必物勒工名以考其誠功有不當如上不合度程或淫巧功不致者則其不誠矣必行其罪罰以窮其情蓋所以稽而警之於後使其不敢不誠于功也如是則不信度作滛巧者無所容矣先王之飭百工如此然則今之命工效物其亦以祭器為先乎而所以先於祭器者亦惟令其可悦於心抑誠於工以久於用乎此固任工者之所當知也周禮地官司市凡市偽飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二臣若水通曰偽飾之禁如用器不中度布帛不中數之類也凡此之禁其目有十二焉一曰圭璧二曰金璋三曰命服四曰命車五曰宗廟之器六曰戎器七曰用器八曰兵車九曰姦色十曰錦文十一曰珠十二曰玉是也故四民皆禁之者以民不得畜商不得資賈不得鬻工不得作如此則國無作偽之人其於治也何有哉夏官槀人掌受財於職金以齎其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之春獻素秋獻成書其等以饗工乗其事試其弓弩以下上其食而誅賞臣若水通曰齎工者給市財用之直也弓六物者王弧夾庾唐大也三等者因人強弱長短為制也弩四物者視弓無王弧也矢八物者枉絜殺鍭矰茀恒庳也箙者載矢者也素者胎素也書等饗工者書其工拙之等降制其饗食之厚薄也乗其事者計其事之成功也試而上下誅賞者考之善則上其食尤善又賞之也不然則罰亦如之故觀於槀人而百工之職其可推矣中庸日省月試既稟稱事所以勸百工也臣若水通曰此孔子告哀公九經中之一事也既讀曰餼餼稟稍食也周官太宰以九職任萬民而必謹於百工飭化八材者以民生日用衣服器械之所由出也而况於公府之地乎不知有以飭之則工不信度矣故日以省之月以試之所以程其能也既以廩之必稱其事而上下之所以償其勞也由是事必效能工必信度而百工自勸器按度程功無不當作竒技淫巧以蕩上心者舉無所容矣百工豈有不飭者哉左傳昭公三十二年士彌牟營成周計丈數揣髙卑度厚薄仞溝洫物土方議逺邇量事期計徒庸慮材用書餱糧以令役於諸侯屬役賦丈書以授師而效諸劉子韓簡子臨之以為成命臣若水通曰計丈數者計所當成之丈數也揣髙卑度厚薄揣版榦髙卑之宜度本末厚薄之制也仞溝洫物土方仞溝洫深淺之凖相取土之方面也議逺邇量事期者議徒役之逺近命時日之多寡也計徒庸慮財用書餱糧者知用㡬人功知費㡬財用知用㡬糧食以令於諸侯使供其役也夫周敬王欲罷戍周之役合諸侯而城之事委諸晉無徵怨於百姓其意良是也范獻子知奉王命而以後事謂晉勿與知其謀則非也士彌牟營城之制亦詳且備矣獨不思君德不修徒欲徼福於成周何為也哉故曰在德不在險國語周語内史過曰庶人工商各守其業以共其上猶恐有墜失也故為車服旗章以旌之臣若水通曰共與供同旌表也車服旗章上下有等所以彰明貴賤為之表識夫百工不飭則利用不興利用不興則不可以為國况天下乎故禹陳三事利用與焉孔陳九經亦來百工故日省月試既稟稱事所以勸之也有天下以内史之言合觀之夫然後知虞廷若工之命為重務也漢景帝後二年夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也農事傷則饑之本女紅害則寒之源夫飢寒並至而能亡為非者寡矣臣若水通曰淫巧之滋非生財之道也夫生財何道也尚儉素而已矣是故民朴素則財用足而風俗美也於風俗而能反其本焉天下其有不治哉易賁之上九曰白賁無咎知白賁之無咎則知後世之事淫巧者皆咎矣為人上者其可不革兹弊乎宋武帝永初三年五月嶺南獻入筒細布一端八丈帝惡其精細勞人即付有司彈太守以布還之并制嶺南禁作此布臣若水通曰竒巧之物人情所好也宋武帝乃獨黜其人而禁其物者蓋亦知竒巧者為滛侈之漸此而不禁則天下從風而靡矣宋武創業之君備嘗艱苦故崇朴戒侈將以風天下遺後嗣也使其子孫世守其朴而不失焉則豈至一再傳而恣淫肆侈卒為蕭氏所乗也哉陳武帝永定二年六月周左光祿大夫猗氏樂遜上言四事其一日頃者魏都洛陽一時殷盛貴勢之家競為侈靡使禍亂多興天下喪敗比来朝貢器服稍華百工造作務盡竒巧臣竊恐物逐好移有損政俗臣若水通曰傳云夫有尤物足以移人豈不信乎甚矣竒巧之能移人心也人君之心一為所移而無主則流於欲而不知蕩其情鑿其性而風俗化之矣然則百工者雖若末務然敦本尚實必自百工始也君天下者可不務乎唐髙宗乾封二年正月耕籍田因閱耒耜有雕刻文飾曰田器農人執之在於朴素豈貴文飾乎乃命撤之臣若水通曰語云上有好者下必有甚焉者矣百工之淫巧起於人主之所喜也是故人主敦本尚質而天下向風矣若髙宗者撤雕文之耒耜豈不足以為法於後世乎書曰不役耳目百度惟貞人主之玩好可不慎哉國朝洪武十九年四月丙戌朔定工匠輪班初工部籍諸工匠驗其丁力定以三年為班更畨赴京輪作三月如期交代名曰輪班匠議而未行至是工部侍郎秦逵復議舉行量地逺近以為班次且置籍為勘合付之至期賫至工部聴撥免其家他役著為令於是諸工匠便之臣若水通曰虞廷九官共工居一周禮太宰以九職任萬民五曰百工飭化八材是則工師之官所掌之事雖若輕而小而其所以闗繫者華朴之間君心之存亡係焉夫人君一心萬化之本天下安危生民休戚皆由乎此茍能體認天理於游藝之時則凡身之所居與夫服飾器用之奉必不事侈靡尚淫巧以費民財勞民力則斂薄役輕而天下安矣我皇祖昭明物理體悉人情知工匠之艱苦命工部驗其丁力定以輪班免以他役無非一念恭儉之發也聖子神孫其視法之哉格物通卷八十一
