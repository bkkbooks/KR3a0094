body:
  text: 格物通卷四十八明湛若水撰立教興化下宋儒周敦頥通書曰聖人立教俾人自易其惡自至其中而止矣臣若水通曰教者所以覺人之良知而歸於中正者也中正也者天理也良知即人心之本體也人之性質一而已矣中正則善偏邪則惡邪者惡者易則中者善者正矣故至其中則正正則天理至矣易惡非拔其本有也至中非益其所無也堯之於變舜之風動禹之不距朕行湯之彰信兆民文武之於昭丕冒洪範之剛克柔克其道豈外求之哉皆易惡至中之教爾故人君之立教豈外於一心邪正善惡之間哉周敦頥曰十室之邑人人提耳而教且不及況天下之廣兆民之衆哉曰純其心而已矣臣若水通曰國家之本在君君之本在身身之本在心純心也者感化人心之本也心有不純則其本先己失矣將何以為教乎故吾心純則有感而天下應放諸四海而凖矣是之謂操約而施博教不必耳提面命於天下而天下勸者也人君立教興化可不知其本乎書曰民心罔中惟爾之中故人君之教在純其心欲純心者必自中始焉伊川程頥曰知道者多即道明知者少即道不明也知者多少亦由乎教以魯國言之止及今之一大州然一時所出大賢十餘人豈不是有教以致然也臣若水通曰道者天理是也此乃人心之所本有也夫豈難知惟物欲不蔽本體澄徹則為聖人之生知也其次有氣拘物蔽者必待教而學之去其蔽道者而道體自見矣知道者漸多則明以相養習以成化如覩青天如覩日星有不待言說而道自顯然矣是由於教之行與不行爾魯國之地未為大也而一時大賢輩出後世之逺天下之大未多見其人焉今之天下即古之天下今之人心即古之人心其人才之多寡相懸何也在教學之興廢所致矣故師道立則善人多有志世道者當以立教為急務焉程頥曰為政之本莫大於使民興行民俗善而衣食不足者未之有也水旱螟蟲之災皆不善之致也臣若水通曰中庸曰致中和天地位焉萬物育焉使民興行非上有以分而與之也中和者人人之所同有也善行者人人之所同有也感發而興起之致其中和之德在一念之間爾致中和則民俗善庶草蕃百穀登萬物若而衣食足矣是故一念之善景星慶雲祥風瑞日至矣一念之惡則災星厲氣凶荒札瘥生矣為人君者可不謹其教化之原哉唐棣問祭起於聖人制作以教人否伊川程頥曰非也祭先本天性如豺有祭獺有祭鷹有祭皆是天性豈有人而不如鳥乎聖人因而裁成禮法以教人爾臣若水通曰聖人之制禮以教人也蓋本之天理爾天理者天性也故三千三百無一而非性也豈但祭祀為然哉故祭所以報本至於豺獺亦有然者矣豈教使之然哉君子於此可以知天性矣聖人之教裁成天性之自然者也人君欲立天下之教者非得於天性之極致其孰能之程氏遺書曰教人者養其善心而惡自消治民者導之敬讓而爭自息臣若水通曰邪正不兩立者也故善心生則惡念消敬讓興則爭訟息故教人者在使之體認天理而己治民者在感發其天理之念而己天理日長則人欲日消而惡與忿爭日化矣茍舍其本而欲治其末徒事刑法以制之吾恐欲民無惡而犯者日多欲民息爭而爭者日熾其端不可得而窮也意盍亦深探其本哉張栻作南康軍新立濂溪祠記有云秦漢以來言治者汩於五霸功利之習求道者淪於異端空虛之說而於先王發政施仁之實聖人天理人倫之教莫克推尋而講明之故言治者若無預於學而求道者反不涉於事孔孟之書僅傳而學者莫得其門而入生民不克睹乎三代之盛可勝嘆哉臣若水通曰心與事不可離則學與政不可二臣於他章張載之說盡之矣今張栻之言蓋與吻合夫言治而不本於學則終於雜霸而天下無善治求道而不涉於事則淪於空寂而天下無真儒故學也者道之本也治也者道之用也道一則二者不可偏廢也故哀公問政而孔子告之以達德達道之學子路問政而孔子告之以先之勞之而無倦然則聖人所以垂世立教之本其意深矣橫渠張載曰凡學官先事士先志謂有官者先教之事未官者使正其志焉志者教之大倫而言也臣若水通曰張載之言官先事謂有官者先教之治民事神之事也士先志謂未官者先正其志使為他日治民事神之本也蓋各就其所先務言之可謂切矣雖然體用一原心事無二合內外之道也學之道未有離事而為志者仕之道未有舍志而為事者故曰學而優則仕仕而優則學言學與仕兼資在力優為之爾學者宜潜心而玩索焉劉蕡曰事天地以教人恭奉宗廟以教人孝養高年以教人弟長字百姓以教人慈幼臣若水通曰恭敬慈孝人心之所同然者也上行之則下效之此無他故矣蓋其所同然者有不期然而然爾故先王事天地奉宗廟養高年字百姓皆盡吾性之不容己者爾民之恭敬孝慈之化豈非感發其所同然者乎故立教者得其心之所同然者則幾矣國朝丙午三月命江淮行省平章韓政率指揮顧時業皇祖謂之曰公卿貴人子弟雖讀書多不能通曉奧義不若集古之忠良姦惡事實以恆辭直解之使觀者易曉他日縱學無成亦知古人行事可以勸戒其民間農工商賈子弟亦多不知讀書宜以其所當務者直辭解說作務農技藝商賈書使之通知大義可以化民成俗至是書成命頒行之臣若水通曰賈誼曰閩越之子生而同聲及其長也纍重譯而不能相通者其習使之然也故士風民俗在素教習之而己爾我皇祖有見於此故於公卿貴人子弟則集古事實以為勸戒之規於農工商賈子弟則作務農技藝書以為化成之具立教興化規模宏逺此其所以定丕丕之基而垂千萬年無彊之休也聖子神孫宜玩索焉洪武五年四月太祖皇帝以海內晏安思化民俗以復於古乃詔有司各行鄉飲於是禮部奏取儀禮及唐宋之制又采周官屬民讀法之㫖參定其儀在內應天府及直𨽻府州縣每嵗孟春正月孟冬十月有司與學官率士大夫之老者行之於學校在外行省所屬府州縣亦皆取法於京師其民間里社以百家為一㑹或糧長或里長主之百人內以年最長者為正賓餘以齒序坐每季行之於里中大率皆本於正齒位之說而賓興賢能春秋習射亦可通行焉所用酒殽毋致奢靡若讀律令則以刑部所編申明戒諭書兼讀之其武職衙門在內各衛親軍指揮使司及指揮使司凡鎮守官每月朔日亦以大都督府所編戒諭書率僚佐讀之如此則衆皆知所警而不犯法矣制曰可臣若水通曰臣伏讀我聖祖此制乃周官之法先王之遺意也是故鄉飲之禮所以尊高年老老而長長也尚有德别賢良異姦頑善善而惡惡也所以敦風化也賓興賢能所以鄉舉而里選也春秋習射所以觀德而成材也讀律讀戒諭所以警其怠也立教興化之道官民文武可謂兼備矣臣竊惟飲射讀律之禮至今行之不替甚為教化之助也惟賓興賢能一事先王之政最為首務今則莫之行爾所取者特文辭之末技取非所用用非所取國家何賴惟聖明慨然以祖宗之法為必可行先王之治為必可復講求修舉之則賢才出而天下治矣洪武初高原侃為監察御史言京師人民循習元氏舊俗凡有喪葬設宴㑹親友作樂娛尸惟較酒殽厚薄無哀戚之情流俗之壞至此甚非所以為治且京師者天下之本萬民之所取則一事非禮則海內之人轉相視效弊可勝言況送終禮之大者不可不謹乞禁止以厚風化太祖皇帝可其言乃詔禮官定官民喪服之制臣若水通曰曽子曰人未有自致者也必也親喪乎故親喪者乃出於人之至情所自致者也禮教不眀小民狃于故俗喪葬宴㑹設樂娛尸喪服失制可謂有人心乎風俗之壞至此極矣三綱淪九法斁天地神明厭之而不可解我聖祖起而大正之定官民喪服之制舊俗一朝而改觀焉真可謂功加百王啓無疆之休者矣但法久易弛今京師之吏民猶有此習餘風未殄伏惟聖明修廢舉墜大復祖宗之法以追蹤三代之治天下萬世幸甚洪武八年御製資世通訓成上謂侍臣曰人君者為臣民之主任治教之責上有帝王道與天同今朕統一寰宇晝夜弗遑思以化民成俗復古治道乃著是書以示訓戒爾侍臣皆曰此臣民萬世之寶也臣若水通曰天生下民作之君作之師人主體上天君師下民之心則所以治而教之者自不容巳矣皇祖之心其天地之心乎有是心故不能無是言此資世通訓之所以作也觀於此書君師之道盡矣今日法守道揆朝信道工信度治隆俗美有不由於此乎洪武二十四年七月壬辰上御謹身殿觀大學之書謂大臣曰治道必本於教化民俗之善惡教化之得失也大學一書其要在於修身身者教化之本也人君身修而人化之好仁者恥於為不仁好義者恥於為不義如此則風俗豈有不美國家豈有不興茍不明教化之本致風俗陵替者民不知趨善欲國家長治久安不可得也臣若水通曰聖祖觀大學書以為其要在於修身至哉皇言蓋與大學古本默契矣大學古本者孔氏之全書未經改本之前載在漢儒十三經之中自明明德於天下逆推其功本於格物又自物格順循其效至於天下平是格物乃大學一篇之本始功夫要約處也下文又曰自天子至於庶人一是皆以修身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也此謂知本此謂知之至也是則以修身釋格物矣聖祖謂大學一書其要在修身者誠為獨見深契古人而治化之本端不外是矣嗚呼㫖哉洪武二十年閏六月太祖皇帝謂禮部試尚書李原名曰尚齒所以教敬事長所以教順虞夏商周之世莫不以齒為尚而養老之禮未嘗廢是以人興於孝弟風俗淳厚治道隆平曩者朕詔天下行養老之政凡耆民年八十以上鄉黨稱善貧無産業者月給米五斗酒三斗肉五斤九十以上嵗加帛一匹綿一斤若有田産能自贍者止給酒肉絮帛其應天鳯陽二府富民九十以上賜爵社士八十以上賜爵里士咸許冠帶復其家尚慮有司奉行不至爾其以朕命申之臣若水通曰播棄黎老商之所以亡也善養其老而周之所以興焉一興一亡昭然可見矣我皇祖之養老也著之詔令以告天下又慮有司奉行不至而敕禮部申命之親親之仁敬長之義達之天下矣宜其教化大行薄海內外以繼堯舜三代之治也子孫萬世之法其在兹矣太祖御製大誥曰鄉飲酒禮不過申明古先哲王教令而己所以鄉飲酒禮序長幼論賢良别姦頑異罪人其坐席間年高有德者居于上年高純篤者並之以次序齒而列其席間有曽違條犯法之人列於外坐同類者成席不許干於良善之席主者若不分别致使貴賤混淆察知或坐中人發覺主者坐以違制姦頑不由其主紊亂正席全家移出化外嗚呼斯禮古先哲王之制妥良善于宇內亘古至今興者鄉里安鄰里和長幼序無窮之樂臣若水通曰此聖祖鄉飲酒之禮也鄉飲之禮所以老老也所以善善而惡惡也老老之化行民知有長幼矣善惡之分嚴民知從事於善矣是故刑賞不必加於天下而天下知勸懲者其惟鄉飲酒之禮乎國朝太祖登極之初制曰凡孝子順孫義夫節婦志行卓異者有司正官舉明監察御史按察司體覆轉達上司旌表門閭臣若水通曰此太祖旌奬之制也旌奬亦教化之一端是故旌一孝子一順孫則凡天下之為人子為人孫者皆孝順矣旌一義夫一節婦則凡天下之為人夫為人婦者皆節義矣何也上有好者下必有甚焉者矣國朝太祖御製教民榜曰每鄉每里各置木鐸一箇於本里內選年高或殘疾不能生理之人或瞽者持鐸循行俱令直言呌喚其辭曰孝順父母尊敬長上和睦鄉里教訓子孫各安生理毋作非為如此每月六次其持鐸之人秋成隨多寡資助糧食臣若水通曰遒人以木鐸徇于道路此先王教化盛典也今木鐸之辭言近而指逺藹然孝友慈睦之風矣語曰天將以夫子為木鐸禮教既衰彞倫攸斁我太祖應時而出仗仁義以興師旅載復萬世之綱常豈非上天厭天下之亂而特眷命以為木鐸繼天立極也耶此在聖子神孫修舉之無斁可焉教民榜父母生育之恩至大其鞠育劬勞詳載大誥今再申明民間有祖父母父母在堂者當隨貧富奉養無缺已亡者依時祭祀展其孝敬為父母者教訓子弟為子弟者孝敬伯叔為妻者勸夫為善如此和睦宗族不犯刑憲父母妻子朝夕相保豈不安享太平臣若水通曰人之至情莫過於父子夫婦之間情之至故親之至親之至故相保愛者至而相摩於道義之行矣舜命契曰百姓不親五品不遜汝作司徒敬敷五教太祖親民之心其堯舜之心乎此令一出則民知胥保惠教誨之道百姓親彞倫叙矣其修道之教以致中和位天地而育萬物者端在此乎教民榜鄉里人民貧富不等婚姻死葬誰家無之今後本里人户凡遇此等互相賙恤每户出鈔一貫便是百貫每五貫便是五百貫雖有貧者亦可措辦如此則衆輕易舉行之日久鄉里自然親愛臣若水通曰凡人相與之情莫善於親莫不善於疏親則如痛癢之相關疏則如秦越之肥瘠也故我聖祖同里死喪相周之令所以親之也孟子鄉田同井出入相友守望相助疾病相扶持則百姓親睦王政然也滕文公不能行之於昔而我聖祖行之於今其仁民之政蓋與三王同符矣教民榜民間子弟或七八嵗或十一二嵗欲心未動良心未喪早令講讀大誥三編誠以先入之言為主使知避凶趨吉日後皆成賢人君子為良善之民免貽父母憂慮不犯刑憲永保身家臣若水通曰善教者禁之於未發豫養之也大誥之作懼民之麗于刑蒙而養之期于無刑此聖祖之仁其與禹泣罪人成湯祝網異世而同符者哉格物通卷四十八
