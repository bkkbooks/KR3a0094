body:
  text: 格物通卷五十七明湛若水撰平天下格凡三綱二十目公好惡用人學校禮樂政教附舉措課功任相任將六官理財修虞衡貢賦附抑浮末禁淫巧奢侈附飭百工屯田授間田水利附馬政轉運勸課禁奪時省國費冗官冗兵冗役之類慎賞賜蠲租薄斂恤窮賑濟臣若水通曰平天下何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也於平天下焉而至之也至其應天下之理也故大學平天下章以潔矩以好惡以忠信以仁義言之無非吾心應天下之理也是故公好惡焉其要矣其用人焉則學校也舉措也課功也任相也任將也六官也其理財焉則修虞衡貢賦也抑浮末也飭百工也屯田水利也馬政也轉運也勸課也禁奪時也省國費也愼賞賜也蠲租也薄斂也恤窮也賑濟也皆天下之事理也人主讀是編焉感通吾心平天下之理念念而知於斯存存而行於斯以有諸己則格物之功庶乎於平天下而盡之矣公好惡詩大雅假樂威儀抑抑德音秩秩無怨無惡率由羣匹受福無疆四方之綱臣若水通曰此詩人願王者之子孫其適為天子者公以任賢也抑抑密也秩秩有常也匹類也羣匹謂衆賢也言願王者有威儀聲譽之美秉其好善惡惡是是非非之公心無私怨私惡以任衆賢是能受無窮之福為四方之綱矣夫好賢而惡不肖人之本心也任賢勿二去邪勿疑必百志惟熙者能之若夫本心不明以異同為好惡則賢者必以忠直而見怨惡怨惡之私生於中人之有技媢嫉以惡之人之彥聖而違之俾不通實不能容以不能保我子孫黎民矣故唯仁人能好人能惡人無怨惡之私故能率用羣賢賢者在位能者在職用賢致治而受安富尊榮之福於無窮而為四方之綱矣君者朝廷之綱朝廷者天下之綱綱舉而萬目張故天下治矣夫以四方之綱無疆之福人才之盛由於一念好惡之公如此可不謹乎成湯之立賢無方武王之建官惟賢位事惟能宣王之任賢使能是皆本於好惡之公而卒獲其應者也伏惟聖明以古聖賢為法存公正之心以為用賢受福之本則休明之治自臻矣斯世斯民何其幸邪大雅泂酌泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母臣若水通曰此詩召康公戒成王而作也泂逺也行潦流潦也餴蒸米一熟而以水沃之乃再蒸也饎酒食也豈弟樂易也君子指王也言逺酌彼行潦之水挹之於彼注之於此而澄渟之則濁者以清猶可以蒸米而為酒食矣况此豈弟之君子能以民心而為己心凡有所好也好民之所好而好以天下凡有所惡也惡民之所惡而惡以天下則好惡通乎民心而一毫己私不以與乎其間矣是以民之仰之戴之者尊之如父而有父之尊親之如母而有母之親自固結而不可解自眷戀而不忍離矣豈不謂民之父母乎是則民之尊親之至者非私之也以君子好惡之公有以動之一天理之自然者也則夫有天下者烏可橫之以私作好作惡而不以天下之心為心邪春秋昭公十五年秋晉荀吳帥師伐鮮虞臣若水通曰左傳晉荀吳帥師伐鮮虞圍鼓鼓白狄之别種也鼓人或請以城叛而降晉荀吳不肯受左右曰師徒不致勤勞而可坐得一城何故不為荀吳曰我聞諸叔向好惡無有過差使民曉然知其好惡之所在則事無不濟也或以吾城叛而歸敵吾所甚惡也今人以城來吾獨何好焉賞所甚可惡者則於甚可好者將何處之若受其叛而不推賞是失信也何以庇民吾力所能則進而取之力所不能則退而舍之量力而行之不可欲急得城而近姦邪之人所喪失滋多矣乃使鼓人殺其叛人而繕修守備臣謂好而知其惡惡而知其美好惡之公也好惡之公實自正其心始心正則誠矣誠則明明則知千萬人之好惡即一己之好惡誠則公公則以一己之好惡而為千萬人之好惡也荀吳却鼓城之叛而自其己之好惡推之庶幾近於道乎惜乎未能擴充之以成王佐之才也歟禮記坊記子云上酌民言則下天上施上不酌民言則犯也下不天上施則亂也臣若水通曰書稱清問下民謀及庶人所以廣聰明也蓋天下之道理無窮而一人之聰明有限故政教之施必參酌乎庶人之言而後盡善盡美也如是則能合人情而宜土俗其行之也無弊其利之也無窮下民之恱之真若天之膏澤之降施於上矣茍惟任一己之私好民之所惡惡民之所好則拂人之性矣故謂之犯上既犯則下亂膏澤不下於民而下民不天上之所施矣豈不背叛而為亂哉或曰九重深邃民言何自而達君亦何自而酌之也曰詢之左右詢之羣臣詢之庶民而又命使以觀風問俗於天下民之利病莫遁其情君則酌其至公至當者而施之則民雖未言君固已逆探其欲言者而播之雖不中不逺矣傳曰如保赤子心誠求之惟聖明留意焉緇衣子曰下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不愼也是民之表也臣若水通曰好惡者不必行勸懲於天下而天下從違而趨避之者也蓋天下之民同此心也同此情也則亦同此好惡也上感而下應蓋有不賞而民勸不怒而民威者矣緇衣子曰有國家者章善疸惡以示民厚則民情不二詩云靖恭爾位好是正直臣若水通曰章明也所謂明明揚側陋也疸病也所謂維王之卭也善者明而揚之為士為大夫為公卿所謂五服五章是也惡者病而去之移之郊遂迸之四夷所謂除惡務本是也夫公好惡者則民化之亦好其所好而惡其所惡矣治天下之要何以外於此哉論語子曰唯仁人能好人能惡人臣若水通曰好善而惡惡天下之同情也但有一毫私意以雜乎其間斯有好而不知其惡惡而不知其美者矣故好惡得正唯仁者能之蓋仁者之心渾然天理廓然而大公物來而順應故因人之善而好之好非以己而無有作好也因人之惡而惡之惡必以物而無有作惡也何有於親愛賤惡之辟哉雖然常人之好惡所係猶小也若夫人君之情有所好惡則或為刑賞或為用舍或為豫奪或為黜陟或為生殺一失其正將拂人之性而使天下蒙其禍且不免於逮身之災矣可不愼歟孟子曰樂民之樂者民亦樂其樂憂民之憂者民亦憂其憂樂以天下憂以天下然而不王者未之有也臣若水通曰此孟子於雪宫告齊宣王之言也因宣王有賢者亦有此樂之問故告之以此言君民一體上下一心為人君者能以民心為己之心如飽暖安逸民之樂也君則見民之樂猶己之樂而歡欣之情有所不能已焉民則曰君之樂吾樂也是愈悅之情同我矣吾胡為而不樂君之愈悅乎飢寒勞困民之憂也君則見民之憂猶己之憂而痛悼之情自有所不能已焉民則曰君之憂吾憂也是哀怛之情同我矣吾胡為而不憂君之哀怛乎夫樂民樂而民樂之是以一己之樂為天下之樂非私樂矣憂民憂而民憂之是以一人之憂為天下之憂非私憂矣夫得民之情是得民心也得民心是得民也如是而不王於天下者寧有是理哉齊王以雪宫為樂是樂以一己之私矣孟子以是告之所以擴天理遏人欲而引之當道志於仁也足為萬世人君審好惡之法矣萬章曰父母使舜完廩捐階瞽瞍焚廩使浚井出從而掩之象曰謨蓋都君咸我績牛羊父母倉廩父母干戈朕琴朕弤朕二嫂使治朕棲象往入舜宫舜在牀琴象曰鬱陶思君爾忸怩舜曰惟兹臣庶汝其于豫治不識舜不知象之將殺己與曰奚而不知也象憂亦憂象喜亦喜臣若水通曰此孟子答門人萬章之言以見大舜憂喜好惡純乎天理之公也萬章以所聞父母與象害舜之事而舜則見而喜之之情為問言舜父頑母嚚象傲日以殺舜為事故使之治粟廩去其梯而焚之又使之掘井舜從旁空而出父母不知又從而以土掩井象言謀掩蓋殺舜於井中者皆我功故牛羊倉廩皆與父母干戈琴弤皆當與我二嫂舜之二妃當治我棲乃往舜宫而舜巳在牀鼓琴矣象乃言我思兄之切鬱陶而氣不得伸故來見爾象此時蓋有忸怩慙愧之色舜乃言曰我有臣庶之衆汝其治之萬章既述此言而問以為舜果不知象之將殺己故喜之如此歟孟子告之以為舜豈有不知象之殺己但舜大聖人也天理之全人倫之至常知有弟之親而不知有象之惡故於象有謨蓋之憂則憂之情亦與象同曰吾何以使弟至此也於象有鬱陶之喜則喜之情亦與象同幸得以遂天倫之樂也一憂一喜皆在象而舜無與焉其好惡一天理之公也人君於人倫物理之際可不以此體認於心乎國語周語王孫説曰聖人之施舍也議之其喜怒取豫也亦議之是以不主寬惠亦不主猛毅主德義而已臣若水通曰説周大夫賞得其人罰當其罪是為德義夫取豫施舍喜怒君之大柄也不擬議以求公正之歸何以執大柄以示好惡之則於人乎為人君者可不取説之言執大柄以御天下哉晉語史蘇曰吾聞君子好好而惡惡樂樂而安安是以能常臣若水通曰史蘇晉大夫占卜之史也好者好之惡者惡之樂則説之安則居之得好惡之正故能有常而不變夫君子平其心以和其情故好惡安樂不違乎天天也者常久不變之道也觀獻公之於申生好惡安樂拂人之情戾天之常甚矣君子是以知其難作也為人君者可不鑒乎梁武帝大同十一年散騎常侍賀琛啓陳四事其三以為陛下憂念四海不憚勤勞至於百司莫不奏事但斗筲之人既得伏奏帷扆便欲詭競求進不論國之大體心存明恕惟務吹毛求疵擘肌分理以深刻為能以繩逐為務迹雖似於奉公事更成其威福犯罪者多巧避滋甚長弊增姦實由於此誠願責其公平之效黜其讒慝之心則下安上謐無僥幸之患矣臣若水通曰此賀琛陳説於梁武帝之言也吹毛以求其疵擘肌以分其理言其苛刻繩逐者繩糾其過失而斥逐之也夫好惡之公私在邪正而已爾故公平之政行則好惡公讒慝之説行則好惡不公矣賀琛之言亦救時之弊也然人君好惡之公在正其心而已心正則孰為公平孰為讒慝孰為邪孰為正而趨舍之歸自定矣唐太宗貞觀五年十二月上謂執政曰朕常恐因喜怒妄行賞罰故欲公等極諫公等亦宜受人諫不可以己之所欲惡人違之茍自不能受諫安能諫人臣若水通曰喜怒情也賞罰政也政生於情也太宗既責臣下之陳諫於君又責以受諫於人可謂能潔矩矣然情生於性性生於心心性者政事之根本也太宗誠知養其心性而臣下之所以輔導者胥不外是則發之而為情逹之而為政無弗善也惜乎君以納諫名臣以直諫顯徒事其末而不深探其本故諫愈多而過愈著其不足以望先王之治有由然矣故君臣相與以有成須於本原求之記曰其本亂而末治者否矣信夫貞觀十年十二月治書侍御史權萬紀上言宣饒二州銀大發采之嵗可得數百萬緡上曰朕貴為天子所乏者非財也但恨無嘉言可以利民爾與其多得數百萬緡何如得一賢才卿未嘗進一賢退一不肖而專言稅銀之利昔堯舜抵璧於山投珠於谷漢之桓靈乃聚錢為私藏卿欲以桓靈事我邪是日黜萬紀使還家臣若水通曰寶藏恆情之所好也而不好焉專利之臣恆情所不惡也而能惡焉輕百萬之緡而重賢才之士太宗之好惡可謂得其正矣然而一事如此而他事或有不然者豈非體認天理之功未知而本原之學未之講邪貞觀十七年四月以楊師道為吏部尚書初長廣公主適趙慈景生節慈景死更適師道師道與長孫無忌等共鞫承乾獄隂為趙節地道由是獲譴上至公主所公主以首擊地泣謝子罪上亦拜泣曰賞不避仇讐罰不阿親戚此天下至公之道不敢違也臣若水通曰太宗謂賞不避仇讐罰不阿親戚此公天下之好惡割骨肉之私愛而公主之請不行所以能成貞觀之治也凡為天下國家者於好惡不可以不愼焉貞觀二十一年上謂侍臣曰自古帝王多疾勝己者朕見人之善若巳有之人之才有能有不能朕取其所長棄其所短人主往往見賢則欲置諸懷不肖則欲推諸壑朕見賢者則敬之不肖者則憐之賢不肖各得其所人主多惡正直隂誅顯戮無代無之朕踐祚以來正直之士比肩於朝未嘗黜責一人自古皆貴中華賤四夷朕獨愛之如一故其種落皆依朕如父母此五者朕所以成今日之功也臣若水通曰不疾勝己不沒人長敬其賢矜其不肖不惡正直兼愛四夷太宗之好惡可謂公矣所以成莫大之功而為唐配天之主也後之人君尚取法之哉宋徽宗崇寧二年九月令州縣立黨人碑蔡京又自書姦黨為大碑頒於郡縣令監司吏廳皆刻石有長安石工安民當鐫字辭曰民愚人固不知立碑之意但如司馬相公者海內稱其正直今謂之姦邪民不忍刻也府官怒欲加之罪民泣曰被役不敢辭乞免鐫安民二字於石末恐得罪後世聞者愧之臣若水通曰人之生也直好惡之公出於性生者也孔子曰斯民也三代之所以直道而行也蔡京以才智自雄黨碑之立是無惻隱羞惡辭讓是非之心矣反不若一石工之明者何哉蓋由安石學術之辟故好惡之僻塗天下之耳目蔽天下之聰明故京迷而不自知也夫豈其智弗若歟其術使之然也若安石者所謂以學術殺天下後世者邪或曰京狐媚也豈足以人道齒之後之人主見如此之人尚謹所好惡焉元仁宗延祐七年四月有獻七寶帶者因近臣以進帝曰朕登大位不聞卿等進賢而為人獻帶是以利誘朕也其還之臣若水通曰亡人無以為寶仁親以為寶此好惡之公也仁宗不愛七寶帶之獻而責近臣以無賢人之進其庶幾近是乎甚矣近臣之難御也狎之則玩其威忽之則投其好故夫明王聖主正身修德防漸謹微必自貴近始使之窺見其隙鮮有不以利誘其君者矣周書曰所寶惟賢則邇人安其仁宗之謂與雖然君人者無乾健離明之德其不為姦臣之所入者幾希矣國朝憲綱風憲存心須用明白正大不可任一己之私昧衆人之公凡考察官吏廉貪賢否必於民間廣詢密訪務循公論以協衆情毋得偏聽及輒慿里老吏胥人等之言顚倒是非亦毋得搜求細事羅織人過使姦人得志善人遭屈又曰所至之處博采諸司官吏行止廉勤公謹者禮待之薦舉之汙濫姦佞者戒飭之糾劾之勸懲得體人自敬服大抵心正無私則事公當臣若水通曰大禹謨曰稽于衆舍已從人罔咈百姓以從己之欲夫是非之心人皆有之故小民至愚而神是非善惡靡不明且公也皇祖以舉措命憲臣而必使之循公論以協輿情人自敬服蓋我是非之心即人是非之心也至於一則曰存心明白正大二則曰心正無私真可謂知好惡之本哉憲綱原設旌善亭申明亭但有損壞行屬修理接示姓名行實使善惡知所懲勸臣若水通曰書云爾惟風下民惟草孔子之告康子亦此意也是故為之旌善為之申明為之榜示行實則好惡明而民之趨善避惡也易易爾昔成湯播告之修不匿厥指豈非豫示好惡於民哉夫明示好惡者在君申好惡之實而達之於民者在有司矣格物通卷五十七
