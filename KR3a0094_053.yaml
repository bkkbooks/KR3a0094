body:
  text: 格物通卷五十三明湛若水撰正百官上書虞書舜典輯五瑞旣月乃日覲四岳群牧班瑞于群后臣若水通曰此舜見諸侯來朝之事也史臣言舜初政之時輯歛五等瑞信以徴五等之諸侯五瑞謂天子始封諸侯所錫之珪公桓珪侯信珪伯躬珪子榖璧男蒲璧五等其珪頭斜銳以合符於天子冒珪之刻小大長短廣狹之度以騐其信否者也旣盡也此正月四方諸侯有至者如四岳為四方之諸侯群牧為九州之牧伯則日日覲見之蓋欲以少接得盡其詢察禮意旣見之後則又頒還其瑞以與天下正始也夫不徒徴之而日日見之然後還其瑞焉見之所以通其意也頒之所以新其始也孚上下之情同道徳之化聖人所以治天下如此今之布政郡州古之諸侯也明主欲同天下之化必因其來朝召見詢之然後心志可一而治化可行也舜典帝曰咨汝二十有二人欽哉惟時亮天功臣若水通曰此帝舜總命羣臣之言咨嗟嘆而告四岳九官十二牧爾二十有二人不可不欽敬爾職以明亮天之事也孔子告哀公問政曰為政在人夫政由人生者也今觀帝舜之初治拳拳於羣臣旣分命之又總告之其丁寧諄復如此成有虞之盛治由此故也伏望聖明留心於用人以追唐虞之治幸甚臯陶謨無曠庻官天工人其代之臣若水通曰此臯陶陳知人之謨於帝舜也蔡沉曰曠廢也言不可用非才而使庻官曠廢厥職也天工天之工也人君代天理物庻官所治無非天事茍一職之或曠則天工廢矣可不深戒哉然則廢人職且不可也而至於廢天工焉可乎商書仲虺之誥佑賢輔徳顯忠遂良兼弱攻昧取亂侮亡推亡固存邦乃其昌臣若水通曰此仲虺以正臣下之道告成湯也蔡沉曰諸侯之賢徳者佑之輔之忠良者顯之遂之所以善善也諸侯之弱者兼之昧者攻之亂者取之亡者侮之所以惡惡也推亡者兼攻取侮也固存者佑輔顯遂也推彼之所以亡固我之所以存邦國乃其昌矣臣謂不但諸侯由諸侯以至於羣臣皆當如此則害治者去而輔治者安而治可幾矣舜誅四凶命十六相天下無為而治可見為治之道非有他惟進賢退不肖爾然則賢愚同混而不亂者未之有也惟聖明留意焉周書洪範人之有能有為使羞其行而邦其昌凢厥正人旣富方榖臣若水通曰此箕子衍皇極之疇言造就羣臣之道也人有位之人也有能有為謂有才幹者羞進也昌盛也正人者在官之人也富禄之也榖善也有能有為者不進於行則徳不勝才非吉士也故必使之進其行焉行者徳之實事才之本也如此不惟有以擴充其才且有徳以將之不至恃才妄作矣由是官使皆賢才而邦國有不昌盛矣乎夫在官之人有禄可仰斯可責其為善而羞行也否則雖欲進行其可得乎周官六卿分職各率其屬以倡九牧阜成兆民臣若水通曰此成王訓迪六卿之言也六卿者冢宰司徒宗伯司馬司冦司空也屬者毎卿六十屬六卿三百六十屬也倡亦率也九牧者九州之牧伯也阜厚也成化也言六卿各分其職不相侵奪各倡其屬勤供職事以為九牧之倡政治明教化洽使兆民之衆莫不阜厚而化成也夫朝廷百官乃萬邦之表率也百官正則萬邦正矣萬邦正則兆民安矣然欲正百官者又在人君正心始也詩小雅巧言亂之初生僣始旣涵亂之又生君子信讒君子如怒亂庻遄沮君子如祉亂庻遄已臣若水通曰此詩乃大夫傷讒之所作也言亂之所以生者由讒人以不信之言始入而王涵容不察其眞偽也亂之又生者則旣信其讒言而用之矣君子見讒人之言惡之如怒則亂庻幾遄沮矣見賢者之言喜之如祉則亂庻幾遄已矣若夫忠讒莫辨善惡不分則百官何由而正哉人主欲正百官必明善惡之歸鑒忠讒之别在正其一心而巳正其心在正其喜怒而已喜怒者發於君心而小人最易於窺伺一或不正則讒邪得入亂之所由生也百官安得正乎禮記王制曰千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯臣若水通曰屬連卒州以大小異其名皆聚之意也長帥正伯亦以大小而異其官也凢此皆因賢侯為之統於外者也二伯統於内者也所謂自陜以東周公主之自陜以西召公主之者也陳澔曰八伯為八州之伯二伯為天下之伯也内外相承而體統立矣王制曰天子三公九卿二十七大夫八十一元士大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人臣若水通曰三公師保傅也象三光也取數於陽也卿大夫元士之數三倍之也所以備陽道之用也次國二卿命於天子殺於大國也小國二卿皆命於其君殺於次國也卿大夫士之數皆竒也取數於陽也佐其君以陽道治人者也生育之義也王制曰制三公一命卷若有加則賜也不過九命次國之君不過七命小國之君不過五命大國之卿不過三命下卿再命小國之卿與下大夫一命臣若水通曰制三公三公命服之制也卷與衮同有降龍無升龍也有加則賜者三公若加一命與王者之後同故賜衮也不過九命者孔穎逹曰三公八命身着鷩冕若加一命則為上公而着衮冕九旒服九章也加賜制特數也不過九示定制也次國之君謂侯伯也及天子之卿出封者皆七命服七章七旒之鷩冕也小國之君謂子男也及天子之大夫出封者皆五命服五章五旒之毳冕也是故制其命數而官爵之禮著矣坊記子云制國不過千乗都城不過百雉家富不過百乗以此坊民諸侯猶有畔者臣若水通曰千乗之國諸侯之國也都城卿大夫都邑之城也家富卿大夫之富也夫名分者人君所以御臣之柄是故大夫而僣卿則卿可僣諸侯諸侯可僣天王天下之亂何時而已乎古之明王聖帝防微於其漸故服采以章之爵位以辨之名分正則百官正而天下定矣於乎寵禄之過其分而弗致三家六卿之黨者臣未之聞也吁可不懼哉表記子曰邇臣守和宰正百官大臣慮四方臣若水通曰邇臣近君者也故欲其守和蓋過於和則流而為同不及於和則過而為亢是故知剛知柔納約自牖者可以語守和之道矣宰者太宰之官掌建邦之六典故以正百官使不越其分不曠其職而百官正矣大臣二伯六卿也爵位旣重故慮四方先天下之憂而憂後天下之樂而樂自不容己矣邇臣太宰大臣各修其職此朝廷所以無不正之官乎周禮天官以八柄詔王馭羣臣一曰爵以馭其貴二曰禄以馭其富三曰予以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過臣若水通曰正百官者當審其馭之之法無法以馭之則亂亂則庻事隳矣是故有爵以貴之有禄以富之有予以幸之有置以行之有生以福之有奪以貧之有廢以罪之有誅以過之八者之柄操而後羣臣之職正故書曰臣無有作福作威玉食故為人主臨莅百官之上在攬其威福予奪之柄而後可天官以官府之六叙正羣吏一曰以叙正其位二曰以叙進其治三曰以叙作其事四曰以叙制其食五曰以叙受其㑹六曰以叙聽其情臣若水通曰叙秩次乃一尊一卑之不容紊者也其曰以官府之六叙正羣吏者何哉蓋位有貴賤治有大小事有先後食有多寡㑹有詳畧情有好惡其分之殊誠不容以弗辨者也以此六叙而正之則莫不一於正矣其於董正治官何難之有哉太宰之職掌建邦之六典以佐王治邦國一曰治典以經邦國以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以和邦國以統百官以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以糾萬民六曰事典以富邦國以任百官以生萬民臣若水通曰擾猶馴也統猶㑹也詰猶禁也任猶使也生猶養也天官冢宰之職統百官是故大司徒以下之官於此亦正焉冢宰建立六者典常之法以佐王之治冢宰掌邦治故一曰治典其曰經曰治曰紀皆其職也司徒掌邦教故二曰教典其曰安曰教曰擾皆其職也宗伯掌邦禮故三曰禮典司馬掌邦政故四曰政典司冦掌邦禁故五曰刑典司空掌邦事故六曰事典其自曰和邦國以下曰統曰諧也曰平曰正曰均也曰詰曰刑曰糾也曰富曰任曰生也皆各以其職也是故六典舉而六官正矣太宰以八法治官府一曰官屬以舉邦治二曰官職以辨邦治三曰官聯以㑹官治四曰官常以聽官治五曰官成以經邦治六曰官法以正邦治七曰官刑以糾邦治八曰官計以弊邦治臣若水通曰府者百官所居也糾察也弊斷也官屬者六官各有屬也屬各六十故以舉邦治也官職者六官各有職也職各有别故以辨邦治也官聯者衆官共舉之而後事得㑹合故曰㑹也官常者非連事通職而各自聽治之故曰聽也官成者官有成事品式依而行之以經紀邦治也官法者當職所主之法度將此以正邦之政治也官刑者官中之刑也官計者平治官府之計也是故八法修而百官無不正矣國語魯語叔孫穆子曰天子有虎賁習武訓也諸侯有旅賁禦災害也大夫有貳車備承事也士有陪乗告奔走也臣若水通曰訓教也虎賁掌先後王而趨舍則守王閑在國則守宫門所以習武教者也旅賁掌戈盾夾車而趨車止則持輪所以備非常禁災害也貳副也陪重也奔走使令也夫自天子以至百官尊卑之分森若堂陛然是故有虎賁之臣有旅賁之士有貳車之御有陪乗之徒上下有章不可以毫髮僣差也文武周公之道不衰周官之法行則楚公子圍以大夫而干諸侯之服者罪不容誅矣漢順帝漢安元年八月遣侍中杜喬周舉守光禄大夫周栩馮羡魏郡欒巴張綱郭遵劉班分行州郡表賢良顯忠勤其貪汚有罪者刺史二千石驛馬上之墨綬以下便輒収舉喬等受命之部張綱獨埋其車輪於雒陽都亭曰豺狼當路安問狐狸遂劾奏大將軍冀河南尹不疑以外戚䝉恩居阿衡之任而專肆貪叨縱恣無極以害忠良謹條其無君之心十五事斯皆臣子所切齒者也書奏京師震竦臣若水通曰激濁揚清人主所以振肅百僚也順帝遣八使分行州郡表賢懲貪可謂知務矣張綱獨埋輪於都亭慨然有芟鋤罪魁之志遂劾梁冀之惡夫冀無忌憚甚至殺賢臣弑幼君釋此不問惡在其為激濁揚清振肅百僚也哉漢桓帝延熹二年以大司農黄瓊為太尉是時新誅梁冀天下想望異政瓊首居公位乃舉奏州郡素行貪汚至死徙者十餘人海内翕然稱之瓊辟汝南范滂滂少勵清節為州里所服嘗為清詔使案察冀州滂登車攬轡慨然有澄清天下之志守令贓汚者皆望風解印綬去臣若水通曰人之恒情必有所懲而後有所勸故舜誅四凶而天下咸服故正百官者在愼勸懲而已黄瓊首居公位力去奸貪而海内翕然范滂案察冀州有志澄清贓吏解去肅僚貞度君子於二臣有取焉晉武帝太康五年劉毅上䟽曰今立中正定九品高下任意榮辱在手操人主之威福奪天朝之權勢公無考校之負私無告詰之忌用心百態營求萬端亷讓之風㓕爭訟之俗成臣竊為聖朝恥之臣若水通曰唐虞取士惟賢惟能成周取士鄉舉里選是以官必稱任士無倖進風動咸寧此其由也自後漢立四科去古未逺魏承漢統立中正之官定九品之制用人之法始弊矣晉踵其失是以官無純徳朝多弊政此劉毅所以懇切為晉武言也惜乎晉武非大有為之君不能更張以新治化遷延不振晉因以亡後之有天下者宜可以鑒矣至於身言書判之法立年格詩賦之制興上旣以言而求人下皆以言而進用是以凢庸者或得以伸於上純徳者或反以屈於下遂使賢能之典舉選之制不見於後世矣嗚呼惜哉晉武帝太康十年劉頌上疏曰古者六卿分職冢宰為師秦漢以來九列執事丞相都總今尚書制斷諸卿奉成於古制為太重可出衆事付外寺使得專之尚書統領大綱若丞相之為嵗終課功校簿當罰而已斯亦可矣臣若水通曰成周公孤之任論道爕理𢎞化寅亮六卿分職率屬阜成兆民未嘗以相侵奪也後世宰輔下侵衆職此百官之所以不正而作威作福之禍興也劉頌之言豈不信哉晉孝武太元十四年徐邈與范寗書曰足下愼選綱紀必得國事以攝諸曹諸曹皆得良吏以掌文案又擇公方之人以為監司則清濁能否與事而明足下但平心處之何取於耳目哉臣若水通曰上下大小體統不紊而後百官得其正故君擇相相擇六曹六曹統監司監司統庻僚如綱之有紀故得一正人則用無非正人百官正而萬事理矣徐邈之言可謂知要哉晉懷帝永嘉二年尚書令楊褒好直言成主雄初得蜀用度不足諸將有以獻金銀得官者褒諫曰陛下設官爵當網羅天下英豪何有以官賣金邪雄謝之臣若水通曰設官所以為民設爵所以待官也故重其爵所以重其官也重其官所以重其民也自輸粟拜爵之制啓而爵始輕爵輕而官不重何以望其有以澤乎民哉故上進之以義則下之進也以義故百官正下懷義以報其上然而不王者未之有也上進之以利則下之進也以利故百官不正下以利而事其上然而不亡者未之有也梁武帝天監元年癸酉詔公車府謗木肺石傍各置一函若肉食莫言欲有横議投謗木函若以功勞才器寃沈莫達投肺石函上身服浣濯之衣常膳惟以菜蔬毎簡長吏務選亷平皆召見於前朂以政道擢尚書殿中郎到漑為建安内史左户侍郎劉鬷為晉安太守二人皆以亷潔著稱漑彦之曽孫也又著令小縣令有能遷大縣大縣有能遷二千石以山隂令丘仲孚為長沙内史武康令東海何逺為宣城太守由是亷能莫不知勸臣若水通曰正萬民必本於正百官正百官必本於正朝廷而正其心始也夫正心者聖學之要也孟子曰我亦欲正人心息邪説梁武帝立謗木肺石通下情也詳於擇守知先務也通下情急先務宜乎百官正而萬民正矣然而不免海内之亂者何哉武帝好尚佛教心術之邪也人君其愼於擇術哉魏太師宇文泰始作九命之典以叙内外官爵改流外品為九秩臣若水通曰書曰不惟其官惟其人魏以九命設官其爵禄之差等辨矣然居之者人也辨其官而不辨其人則高墉之集鼫鼠之羞其召亂必矣故以徳而定爵以能而授官則賢者在位能者在職豈非天下有道之隆邪操用舍之權者愼之哉隋治書侍御史趙郡李諤上書曰士大夫矜伐干進無復亷恥乞明加罪黜以懲風軌臣若水通曰書曰爾惟風下民惟草故正民者先正百官也又曰爾身克正罔敢弗正故欲正百官者先正君身也李諤欲抑干進勵亷恥可謂救時之弊矣然徒欲正其末而不知先正其本未見其能正也已是故人君欲知正百官之道者則盍反其本矣格物通卷五十三
