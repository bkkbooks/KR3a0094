body:
  text: 格物通卷二十二明湛若水撰正威儀下左傳桓公九年享曹太子初獻樂奏而歎施父曰曹太子其有憂乎非歎所也臣若水通曰曹太子射姑來朝魯賓以上卿其禮厚矣於時金石在庭籩豆在列所以觀威儀而省禍福者皆在是我孔熯矣式禮莫愆射姑臨樂而歎威儀愆矣觀此則太子之所養者可知也僖公十一年天王使召武公内史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世臣若水通曰孔子稱大聖必著乎執圭之容而執玉髙卑必徵其死亡之禍一執玉之間而聖狂之所由分禍福之所由辨也夫其容肅者其心敬也其容惰者其心肆也惠公即位之始且承天子之賜命受玉而惰其心驕且肆矣夫初服而驕於人且不可況於天王乎是自滅其天也何長世之有故君子一動容而不敢忘其敬所以敬其天以保天命也為人上者可不敬乎文公九年冬楚子使越椒來聘執幣傲叔仲惠伯曰是必滅若敖氏之宗傲其先君神弗福也臣若水通曰越椒執幣傲一威儀之㣲爾惠伯胡以知其必滅若敖氏也事雖㣲而害徳則大傲凶徳也敬者徳之輿也天道虧盈而益謙鬼神害盈而福謙徳之凶者神必弗福也然則若敖氏之鬼其不血食也矣成公六年春鄭伯如晉拜成子游相授玉于東楹之東士貞伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久臣若水通曰玉重器也於是乎失其儀則安往而不失儀也失之於主得之於相則其儀不忒矣如晉拜成者鄭悼公也相之者公子偃也二者均有事焉授玉兩楹之間禮也而於東楹之東其儀忒矣然而士貞伯獨咎鄭伯之自棄者何曰罪所主也罪其主者何相由主而擇也主棄禮矣而相亦奚辭之有焉成公十三年三月公及諸侯朝王遂從劉康公成肅公會晉侯伐秦成子受脹于社不敬劉子曰吾聞之民受天地之中以生所謂命也是以有動則威儀之則以定命也能者養之以福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受賑神之大節也今成子惰棄其命矣其不反乎臣若水通曰劉子其知道乎夫天命之謂性以命為令先正之言也劉子以天地之中為命是以命為中如所謂命根命脉之云也可以破千載性命之惑矣又以動作威儀之則以定命是動作威儀原於命命原於天地之中深得乎天人體用之一貫矣孰謂春秋之時有知道如劉子者乎此言豈獨為成公發哉人君宜寫一通置諸左右以備朝夕之覽焉可也襄公二十七年齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也臣若水通曰車服以庸彰有徳也是故采菽所以美諸侯也候人所以刺羣小也慶封之來徒美其車而徳不稱一失儀也又當食而不敬二失儀也至於相鼠之譏且猶不知悟而悔禍有識者知其不終也已矣故君子之學在輿則見其倚於衡無終食之間違仁則動不失禮而可以自求多福矣襄公三十一年衛侯在楚北宫文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀言朋友之道必相教訓以威儀也周書數文王之徳曰大國畏其力小國懐其徳言畏而愛之也詩云不識不知順帝之則言則而象之也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降為臣蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法徳行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也臣若水通曰臣始讀劉康公中命儀則之説歎春秋有一知道者及觀北宫文子之論又知有文子也此當與劉康公之言參㸔大都康公之論奥而核文子之論詳而整觀此則威儀之説無餘藴矣仰惟聖明受天明命髙拱穆清之上深惟淵黙之化必以二子之言為念則命於是乎可定上下亦於是乎可固矣臣不勝至願定公十五年春邾隱公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久髙仰驕也卑俯替也驕近亂替近疾君為主其先亡乎臣若水通曰子貢觀二君之不度而知心之亡又知死亡之禍蓋死亡由於不度不度由於心亡此不易之確論也中庸所謂見乎四體不其然乎人君體此必思以立吾心之中正心中正則威儀之間一髙一卑一俯一仰皆有常度而不可以毫髮僭差夫然後事體而身安身安而福亦佑之矣不然驕近亂替近疾疾與亂非天使之然也皆其自致之也人君可不正其心以正其威儀以為福徳之基乎國語周語定王曰歲飫不倦時宴不淫月㑹旬脩日完不忘服物昭庸采飾顯明文章比象周旋序順容貌有崇威儀有則臣若水通曰定王周頃王之子榆也禮立歲為飫歲行飫禮而不倦怠春夏秋冬為時一時之間必有宴禮不至淫湎㑹計也計一月之經用旬脩謂脩十日之中所為者日完完一日之所為者不忘不忘其禮也冕服旗章所以昭有功采色之飾所以顯明徳也文章謂黼黻錦繡之文也比象比文以象山龍華蟲之屬崇飾也詩曰其儀不忒正是四國故王公諸侯之脩飫宴而不淫倦服物采飾文章周旋容貌所以正儀刑也況居天子之尊為諸侯王之表率者可不正其儀以為正四國之本乎周語單襄公曰夫君子目以定體足以從之是以觀其容而知其心矣目以處義足以步目又曰夫目以處義足以踐徳口以庇信耳以聽名者也故不可不慎也偏喪有咎臣若水通曰體手足也心不固則容不正言行相覆為信耳所以聽别萬物之名聲喪亡也步言視聽四者而亡其二為偏喪咎咎及身也夫君子有威有儀食福無替晉侯視逺足髙則威儀忒矣咎將焉避故觀目可以知義觀足可以知徳觀心可以知福不可誣也故君子篤恭而天下平大舜恭已南面無為而治慎威儀立徳脩身而天下化之可不重乎周語晉孫談之子周適周事單襄公立無跛視無還聽無聳言無逺襄公言於頃公曰立無跛正也視無還端也聽無聳成也言無逺慎也夫正徳之道也端徳之信也成徳之終也慎徳之守也守終純固道正事信明令徳矣慎成端正徳之相也臣若水通曰談晉襄公之孫惠伯談也周者談之子晉悼公之名晉自獻公用驪姬之䜛詛不畜羣公子故孫周適周事單襄公睛轉復反為還逺謂非耳目所及也成定也道者徳之道路志定故能終也相猶相貌之相慎成端正徳之相貌也視聽言動本諸心所以定威儀之則也君子之居民上非有異也言有儀也非有塞也言有則也故視聽言動爰立民則一物偏喪為徳之疵詩云民具爾瞻此之謂也晉孫周構䜛出亡遊事襄公而容貌詞氣昭宣令徳宜其三襲嘉祥終昌晉室也況有天下者可不慎威儀以為脩身化民之本歟魯語叔孫穆子曰夫服心之文也如龜焉灼其中必文於外臣若水通曰文謂著見於外者言心所向身必服之也蓋服之不𠂻身之災也中庸曰齊明盛服所以脩身也君子慎物居方亦以寡過而已楚公子圍以大夫而設諸侯之服是服之不𠂻非盛服矣其能保其身乎楚語左史倚相曰君子之行欲其道也故進退周旋惟道之從臣若水通曰倚相楚左史也欲其道欲得其道也進退周旋之中道所以慎其威儀而身脩矣漢武帝元朔五年夏四月大將軍青雖貴有時侍中上踞厠而視之丞相𢎞燕見上或時不冠至於汲黯見上不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此臣若水通曰記曰齊明盛服非禮不動所以脩身也故君子無衆寡無小大無敢慢武帝能正衣冠於所嚴憚之臣而倨傲於所狎侮者焉豈知脩身之道哉漢獻帝初平二年劉備少語言喜怒不形於色備少與河東關羽涿郡張飛相友善與二人寢則同牀恩若兄弟而稠人廣坐侍立終日隨備周旋臣若水通曰威儀者内心之表也詩曰抑抑威儀維徳之隅又曰敬慎威儀維民之則昭烈之喜怒不形其徳之嚴宻可想見矣關張之侍主周旋豈非視之以為法哉梁武帝大同十一年帝雖暗室恒理衣冠小坐盛暑未嘗褰袒對内豎小臣如遇大賓臣若水通曰暗室盛暑衣冠不袒威儀不䙝雖力學自脩之士何以過此若梁武者似有受道之器矣而乃至號為不道莫保其身以禍其國家者何邪異端之學害之也孔子曰攻乎異端斯害也己生於其心害於其政發於其政害於其事而亂亡至矣雖正威儀其猶色莊者乎雖如佛之寂容枯槁何補於國家之理亂乎此又足以為徒事威儀而不知正學者之戒耳唐太宗貞觀元年十二月上好騎射孫伏伽諫以為天子居則九門行則警蹕非欲茍自尊嚴乃為社稷生民之計也陛下好自走馬射的以娛悦近臣此乃少年為諸王時所為非今日天子事業也既非所以安養聖躬又非所以儀刑後世臣竊為陛下不取上悦未幾以伏伽為諫議大夫臣若水通曰九門警蹕天子之儀也走馬射的武夫之技也太宗不脩天子穆穆之容而不忘少年武夫之技欲為天下後世之儀刑得乎詩曰儀刑文王萬邦作孚蓋無誠敬以為之本爾不有伏伽之諫欲為漢唐之中主不可得況稱三宗乎唐宣宗大中十二年上臨朝接對羣臣如賓客雖左右近習未嘗見其有惰容每宰相奏事旁無一人立者威嚴不可仰視奏事畢忽然曰可以閑語矣因問閭閻細事或談宫中遊宴無所不至一刻許復整容曰卿輩善為之朕常恐卿輩負朕後日不復得相見乃起入宫令狐綯謂人曰吾十年秉政最承恩遇然每延英奏事未嘗不汗霑衣也臣若水通曰宣宗對宰相威嚴不可仰視至使汗霑衣可謂能正威儀者矣及其忽然之際乃問閭閻細事或談宫中遊宴則非人君大體矣何其前後不類邪夫人君與宰相論事豈無天下大政可言邪觀此則知宣宗徒事乎威儀末節之間而不知温厲正大之體此其所以不能成中興之業也歟賈誼新書曰夫有威而可畏謂之威有儀而可象謂之文富不可為量多不可數臣若水通曰威儀者徳之符也徳者威儀之基也是故有徳之威可畏則亦可懐也有徳之儀可象則亦可敬也可畏可懐可象可敬則威儀文章之盛又孰得量而數之也故為人上者脩其徳容則民畏而象之不可量數而心化之矣威儀之於人豈小也哉劉向説苑曰陳靈公行僻而言失泄冶曰陳其亡矣吾驟諫君君不吾聽而愈失威儀夫上之化下猶風靡草東風則草靡而西西風則草靡而東在風所由而草為之靡是故人君之動不可不慎也臣若水通曰威儀者本諸恭敬之徳而達諸治化之美者也故盛徳之至然後動容周旋中禮堯之放勲本乎允恭舜之重華本乎温恭豈外致哉泄冶之言徒知人君當慎動而不求其本茍其君聽之亦未見其所以正也何以維民之則乎若靈公言失行僻固不足道也後世有臨朝淵黙尊嚴若神如漢成帝者號稱穆穆天子之容矣然政柄不免於下移者無本故也故欲威儀之正者必由中達外然後可宋太祖建隆元年冬十月翰林學士王著以酒失貶官宋主謂宰相曰深嚴之地當使宿儒處之范質等對曰竇儀清介重厚然己自翰林遷端明矣宋主曰非斯人不可卿當諭以朕意勉令就職即日復入翰林宋主嘗召儀草制至苑門儀見宋主岸幘跣足而坐却立不肯進宋主遽索冠帶而後召入儀曰陛下創業垂統宜以禮示天下恐豪傑聞而解體宋主歛容謝之自是對近臣未嘗不冠帶臣若水通曰詩稱文王雝雝在宫肅肅在廟不顯亦臨無射亦保蓋言聖人敬和之容雖幽隱而不敢肆也宋祖方召儒臣草制岸幘跣足而坐則幽隱可知矣自非竇儀之嚴重則宋祖之威儀何從而正哉自是對羣臣未嘗不冠帶方正補衮之臣人主左右安可少哉使竇儀能以曾子動容貌正顔色之説而益之則知正由中出宋祖所得不可量矣惜乎儀不知聖賢之學無恠其然也宋儒程頥曰范祖禹色温而氣和其人如玉可以開陳是非導人主之意臣若水通曰雖有遜志之言乗之以厲色戾氣則化而為不善矣雖有逆耳之言乗之以怡顔下氣則化而為善矣人臣陳是非導上意乗之以温色和氣則不覺其入之深矣然非所存有中和之徳安能以温和其氣色哉問人之燕居形體怠惰心不慢可否程頥曰安有箕踞而心不慢者昔吕與叔六月中來緱氏閒居中某嘗窺之見其儼然危坐可謂敦篤矣學者須恭敬但不可令拘迫拘迫則難久也臣若水通曰有中和之心然後有中和之氣也是故過焉者則失之拘矣不及焉者則失之肆矣非中和也禮曰斯須而不莊不敬則慢易之心入之矣夫敬以存心則莊見於容内外皆中和也可不慎乎學者且然而況於居九重之上為兆民之表者乎詩曰敬慎威儀維民之則為人君者之所宜慎也張栻語吕祖謙云古人衣冠容止之間不是要作意矜持只是循他天則臣若水通曰天則自然之法也夫中外一貫者也心中正則貌齊莊不期然而然矣不然不失之放肆怠惰則失之作意矜持而中正自然之天則違矣敬也者中正之矩也然則主敬之學豈非人君之所當講者哉宋儒楊時經筵講義有云古之聖人前旒蔽明非禮勿視黈纊塞聦非禮勿聽在車則有和鸞之音行路則有佩玉之聲出入起居容節必比於禮樂人君所以自重其身也臣若水通曰楊時進講之言皆古人培養君徳之遺法也惜乎未盡根本之論爾蓋人主之心如樹木之根天理乃其生意也生意既得則根本已立然後有冕旒黈纊和鸞佩玉容節禮樂所以養其根本也否則所養者何物哉顧乃舍其本惟末之是務何也後世聖學不明類皆趨於支離之歸已乏一徳之臣矣安望其輔成人君一徳之學哉伏望聖明畧其枝葉之煩自立於根本之地以為天下先則道徳可一而風俗可同矣國朝洪武九年正月丁巳太子諸王侍上顧謂之曰汝等聞脩徳進賢之道乎太子對曰每聞儒臣講説知其畧矣未領其要上曰藻率雜佩為身之容恭遜温良為徳之容見於外者可以知其内也古之君子趨蹌有節步降有數周旋跬步而不違於規矩者由其徳充於内而著乎外也所以器識髙明而治道日臻惡行不見而邪僻日逺己徳既脩自然足以服人賢者彚進而不肖者日去天下國家未有不治不務此者鮮不取敗夫貨財聲色戕徳之斧斤䜛佞奸諛杜賢之荆棘當拒之如虎狼畏之如蛇虺茍溺於所好則必為其所䧟矣汝等其慎之臣若水通曰伏觀聖祖諭太子以内外徳容之理與古聖賢一揆矣詩曰抑抑威儀維徳之隅譬如宫室焉内有繩直則外有廉隅徳其繩直矣威儀其廉隅矣人君茍存諸心者渾然天理積中發外自有威可畏有儀可象動容周旋自中乎禮刑于家則齊刑于國則治刑于天下則平由是天下之賢能俊傑莫不彚進以贊治化之盛而䜛謟奸諛之人逺矣此我聖祖垂訓之至意也惟聖明體察焉格物通卷二十二
