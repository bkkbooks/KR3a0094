body:
  text: 格物通卷八十三明湛若水撰屯田下授間田水利附唐髙祖武德六年十月壬戌并州大總管府長史竇靜表請於太原署屯田以省餽運議者以為煩擾不許靜切論不已敇徵靜入朝使與裴寂蕭瑀封德彜相論難於上前寂等不能屈乃從靜議嵗收穀數千斛上善之命檢校并州大總管臣若水通曰餽運之勞孰與坐食之安閒曠之兵孰與耕桑之利狃於茍且而病其更張天下國家之事無一可為者矣竇靜之請屯田其慮逺矣裴寂輩習於一時之安而欲沮之豈足與謀國者哉唐祖從靜之議而行之豈特一時之利此萬世之利也唐髙宗龍朔二年劉仁軌鎮百濟修屯田儲糗糧訓士卒以圖髙麗臣若水通曰國之大事在戎而戎之大命在食修屯田所以備食而即戎也如從仁軌之言髙麗可以不圖而坐制矣唐中宗嗣聖十八年十一月以郭元振為凉州都督令甘州刺史李漢通開置屯田盡水陸之利舊凉州粟麥斛至數千至是一縑糴數十斛軍糧支數十年臣若水通曰元振都督凉州率漢通修屯田之政盡水陸之利以收富實之效則天之時功顯節完如元振者幾何人哉唐𤣥宗開元五年宋慶禮為營州都督慶禮清勤嚴肅開屯田八十餘所數年之間倉廪充實市里寖繁臣若水通曰屯田之設有古兵農之遺法且耕且守可以免內挽之勞可以嚴外侮之備農作相勵守望相助冦敵相保以實待虛以逸待勞安邊足用之策莫此為善者也慶禮營州之備可以為後世法矣開元十二年五月制聽逃戶自首闢所在閒田隨宜收稅毋得差科征役租庸一皆蠲免仍以兵部員外郎兼侍御史宇文融為勸農使巡行州縣與吏民議定賦役臣若水通曰閒田而征科則民未獲開墾之利而已苦督責之患矣𤣥宗聽逃戶自首所闢閒田隨宜收稅悉蠲租庸可謂善於治地舒於取利者矣戶口之蕃宜哉唐德宗貞元九年五月陸贄上奏謂宜罷諸道將士防秋之制令本道但供衣糧募戍卒願留及蕃漢子弟多開屯田官為收糴冦至則人自為戰時至則家自力農與夫倐來忽往者豈可同等而論哉臣若水通曰先王之時所恃以為萬全取勝之計者以兵農為一也屯田之制食出於民亦備邊之良法也陸贄所謂冦至則人自為戰時至則家自力農其利一何博哉惜乎德宗徒善其言而不能盡用也後之有天下者必求其法順天時因地利酌其宜而行之則財無不豐而兵無不足矣貞元元年陸贄草大赦制曰朕憫念蒼生務恤征討頻有詔命許其自新其歸順百姓仍委節度觀察使刺史給空閒地任便安居優復終身務令全濟待事平已後聽歸本貫又曰諸道有解退官建州府長吏切務安存仍量以空閒田地給付免其差役任自營生臣若水通曰帝王以好生為德法天因地以盡利者也是故閒地授于歸順之民而民樂其生閒田授于解退之官而官遂其性土膏無遺棄之利生人無喪貧之嘆王者之政也嗚呼世稱贄為王佐之才其近是耶韓愈送水陸運使韓重華歸所治序曰六年冬振武軍吏走驛馬詣闕告飢公卿廷議以轉運使不得其人宜選才幹之士往換之吾族子重華適當其任至則出贓罪吏九百餘人脫其桎梏給耒耜與牛使耕其傍便近地以償所負釋其粟之在吏者四十萬斛不徵吏得去罪死假種糧齒平人有以自效莫不涕泣感奮相率盡力以奉其令而又為之奔走經營相原隰之宜指授方法故連二嵗大熟吏得盡償其所亡失四十萬斛者而私其贏餘得以蘇息軍不復饑君曰此未足為天子言請益募人為十五屯屯置百三十人而種百頃令各就髙為堡東起振武轉而西過雲州界極於中受降城出入河山之際六百餘里屯堡相望冦來不能為暴人得肆耕其中少可以罷漕挽之費朝廷從其議秋果倍收嵗省度支錢千三百萬八年詔拜殿中侍御史錫服朱銀其冬來朝奏曰得益開田四千頃則盡可以給塞下五城矣田五千頃法當用人七千臣令吏於無事時督習弓矢為戰守備因可以制敵庶幾所謂兵農兼事務一而兩得者也大臣方持其議吾以為邊軍皆不知耕作開口望哺有司常僦人以車船自他郡往輸乘沙逆河逺者數千里人畜死蹄踵交道費不可勝計中國坐耗而邊吏恆苦食不繼今君所請田皆故秦漢時郡縣地其課績又已驗白若從其言其利未可遽以一二數也臣若水通曰甚矣屯田之為務重而有關於國家之大利也今夫二人之鬬必須之於力力之足否勝負之所由判力之足者食為之也况夫振武之告饑已非一人之命非一軍之命而一國之命脉所由係也重華至則捐逋租釋贓罪而使之盡力於農遂收其入以償四十萬斛之粟由是而推廣之屯愈多而利益博使當時公卿不沮盡行其說其為國家之賴可量也哉行之而不弛則唐至今猶存可也宋太宗淳化四年三月以何承矩為河北屯田制置使時契丹撓邊承矩請於順安寨西開易河蒲口導水東注於海東西三百餘里南北五七十里資其陂澤築堤貯水為屯田以遏敵騎之奔軼俟朞嵗間關南諸河悉壅闐即播為稻田其緣邊州軍臨塘水者止留城守軍士不煩發兵廣戍收地利以實邊設險固以防塞春夏課農秋冬習武休息民力以助國經將見彼弱我強彼勞我逸此禦邊之要策也太宗嘉納之臣若水通曰邊陲之所需者兵而已矣兵之所急者食而已矣舍屯田以求足食之道舍足食而求足兵之策奚可得哉是故屯田有法則兵農合而守戰利內挽之勞可省而外侮之備可嚴矣承矩之為屯田也兵農兼至而國家大賴其利安邊之要策誠無以踰於此矣有天下者可不擇是人而用之哉宋仁宗天聖七年三月給契丹流民田契丹饑流民至境上帝曰皆吾赤子也詔給以唐鄧州閒田仍令所過給食臣若水通曰契丹饑而來以中國之有仁君也及境而給田賜食無內外彼此之私所謂既來之則安之者矣仁宗曰皆吾赤子則愛民之心又與天地同體矣吁其仁矣哉宋髙宗建炎三年七月廣州教授林勳上本政書十三篇言國朝兵農之政大抵因唐末今農貧而多失職兵驕而不可用地利多遺財用不足皆本政不修之故宜倣古井田之制使民一夫占田五十畝其有羡田之家毋得市田其無田與游惰末作者皆驅之使為𨽻農以耕田之羡者而雜紐錢穀以為什一之稅每十六夫為一井每井賦二兵馬一匹蠶婦之貢絹三尺綿一兩非蠶鄉則布六尺麻二兩其說甚備書奏詔以為桂州節度掌書記其後朱熹甚愛其書陳亮亦曰此書考古驗今思慮周密世之為井田之學者無以加矣臣若水通曰古者兵與農一三時務農一時講武無事則耕有事則戰皆出於井田之制爾後世則兵與農二故有屯田之名夫屯田固不若井田矣然今之所謂屯田者抑豈如趙充國諸葛亮之所經營者乎林勳痛知此弊欲復古制以井田為言可謂豪傑之士矣然井田之行在有君有臣爾髙宗之時奸檜當國非其器矣惜哉宋髙宗紹興四年七月嶽飛復襄陽等六郡因奏金人所愛惟子女金帛志已驕惰劉豫僣僞人心終不忘宋如以精兵二十萬直搗中原恢復故疆誠易為力襄陽隨郢地皆膏腴茍行營田其利甚厚臣候糧足即過江北𠞰敵時方重深入之舉而營田之議自是興矣臣若水通曰嶽飛以恢復為己任此大事也而以營田厚利為請必候糧足而後動其慮逺矣及其用兵規置烏珠屢躓至以父呼豈非屯田之利助之也乎使其志得行不困於和議之非恢復中原特易易爾宋髙宗時陳規守德安嘗條上營屯田事宜欲倣古屯田之制合射士民兵分地耕墾軍士所屯之田皆相險隘立堡寨冦至則保聚捍禦無事則乘時田作射士皆分半以耕屯田民户所營之田水田畝賦粳米一斗陸田賦麥豆各五升滿三年無逋輸給為永業流民自歸者以田還之凡屯田事營田司兼行營田事府縣官兼行皆不更置吏詔嘉奬之仍下其法於諸鎮臣若水通曰營田屯田名雖不同其為足國之道一也規守德安條陳營屯田事其說善矣髙宗既嘉奬之又下其法於諸鎮可不謂從善之君乎宋儒楊時邊事劄子有云聞燕地尚多閒田不若募邊民為弓箭手如陜西例蠲其租賦使習騎射亦足殺常勝軍之勢仍立定額無使增置不三五年可漸消矣臣若水通曰張闡有言非田之不可耕也無耕田之民也此所以地多閒田乎棄地之利失民之天禍莫甚焉故募邊民以耕之而因之以習騎射開衣食之源為戰守之備孔子所謂足食足兵盡在於是矣後之人君之制四夷主將之為邊備盍亦效法於是乎張栻云持節利路興洋間多營田與民田錯官軍怙強為擾田且多荒張梲上其事於宣撫使請令民亦得佃耕穀用以廣臣若水通曰軍民皆耕足用之道也然而民田與營田雜錯則不無侵擾之患矣所以治之者必得以軍法行之則軍民皆和畏法而各安其業矣張栻述吏部侍郎李浩奏曰臣親見兩淮可耕之田盡為廢地心實痛之條畫營田便利甚悉臣若水通曰土地之生物也力勤者穰力惰者荒是故有沃人而無沃地矣夫以兩淮之沃壤棄而不耕遂為廢土是天之所以養民者而使民棄之此仁人之所宜痛心也及其條畫營田便利仁人君子之用心固如是乎孟子曰仁者宜在髙位人君得若人而用之則民物各得其所矣國朝洪武十九年九月庚申西平侯沐英奏雲南土地甚廣而荒蕪居多宜置屯令軍士開耕以備儲偫上諭户部曰屯田之攻可以紓民力足兵食邊防之計莫善於此趙充國始屯金城而儲蓄充實漢享其利後之有天下者亦莫能廢英之是謀可謂盡心有志古人宜如所言然邊城久荒榛莽蔽翳用力實難宜緩其嵗限之粟使彼樂於耕作數年之後徵之可也臣若水通曰屯田內有不費之惠外有守禦之備古今足兵食守邊境之良法莫有過焉者也是以善為國者必因天時盡地利不以邊荒之地而輟人為之功廢天地自然之利也雲南地廣而荒沐英首建開墾置屯之議可謂有志復古矣皇祖知屯田之利而善之可謂能用善謀矣至於緩其嵗徵之例則又一念之仁而為生財之本矣惟聖明留意聿修祖德俾守在四夷社稷幸甚洪武三十二年己卯詔遣延安侯唐勝宗長興侯耿炳文巡視陜西城督軍屯田臣若水通曰邊守者中國外夷之大防而天下安危之所關也邊兵之不足以食之不給也道路之逺輸將之難率數十倍而致其一此朝錯所以謂守邊備塞勸農力本為當世之急務也我皇祖撥亂反治安內備外之事靡不悉舉其屯田之制則於閒曠之土分軍以立屯堡俾其且耕且守守者十七耕者十三而更畨之遇有警急朝發夕至是於守禦之中而收耕穫之利一舉而兩得矣至是詔遣二侯巡視城池督軍屯種其督責之法何其嚴也臣竊以為每人受田二十畝出租六石比之民為重恐軍人不堪而屯法易廢也伏願聖明體皇祖之心擴優恤之令較其腴瘠之分均其輕重之入宜稍倣井田之制嵗收公田之入上無科徵之促下無逋負之患則屯種之軍樂於耕勇於戰既得以足軍國之儲又得以遂室家之樂公私兩便上下俱足矣國朝諸司職掌凡邊防郡縣守禦去處新立衛分撥軍開墾荒田屯種須計算頃畝數目及田地肥瘠人力勤惰務在不曠征徭不失軍餉合用農器有司鑄造發用木植自行採辦牛隻不敷移文索取官廄數多發遣如果路逺官價收買給用國朝問刑條例凡用強占種屯田者問罪官調邊衛帶俸差操旗軍軍丁人等發邊衛充軍民發口外為民管屯等官不行用心清查者糾奏治罪臣若水通曰古者寓兵於農屯田之設其遺意與語曰千里餽糧士有饑色故趙充國屯田金城孔明屯田渭上誠足食足兵之要道也然必廣設而多聚之嚴禁而勤督之其庶幾行而不廢收久逺之利焉永樂十一年四月太宗皇帝坐御幄中召問足食足兵之策大學士楊榮對宜擇將帥力屯田將得人則軍士弗擾軍士既安則耕不違時何患兵食之不足哉臣若水通曰屯田者富國強兵自然之利也然或將帥不得其人則占役以違其時刻剝以侵其利而法遂廢爾茍得其人則軍士弗擾而均得以力於農將見食不求足而自足兵不求強而自強矣若大學士楊榮者豈非謀國之善者哉伏惟聖明為經國久逺之圖宜體太宗之意而推行之如有占役侵利之將即以軍法從事則其事可修舉而不壞矣永樂二十二年十一月仁廟諭戶部尚書夏原吉曰古者寓兵於農而不奪其時所以民無轉輸之勞而兵食足後世莫善於漢之屯田先帝所立屯田法甚善蓋用心亦甚至但後來所司數以征徭擾之既失其時遂無其效所儲蓄十不及二三有事不免勞民轉輸矣其令天下衛所凡屯田軍士自今不許擅差妨其農務違者處以重法臣若水通曰兵農一則所謂足食足兵民信之矣孟子云不違民時榖不可勝食也是以古之聖王必以農事為重而不可輕役其民焉我朝屯田之制甚善其效不著以征役妨其時而不得以盡力於南畝故也仁廟之諭洞見弊端修舉善政且嚴其法禁可謂知務之急矣臣竊觀今日屯田之士其困蓋有不止於昔時者惟聖明深念之國朝憲綱一荒閒田土行屬正官設法召民開墾趂時布種其合納錢糧須候年限滿日科徵毋致拋荒國朝問刑條例河南北直𨽻各處空閒地土祖宗朝俱聽民儘力開耕永不起科若有占奪投獻者照屯田及民田寺觀田例問發臣若水通曰國以民保民以土養故易曰何以守位曰仁何以聚人曰財郊野之有閒田而使民得以耕焉或徵收以限或永不起科恤其時而不妨其功嚴其令使不奪其利此我祖宗之仁敬天勤民之意其出於尋常萬萬矣聖子神孫宜深體焉格物通卷八十三
