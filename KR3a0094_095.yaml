body:
  text: 格物通卷九十五明湛若水撰薄斂上易損損有孚元吉無咎可貞利有攸往臣若水通曰此損卦之彖辭也損之為卦艮上兌下兑澤益深艮山益高為損下益上之義故曰損損謂減殺也凡陽為有餘隂為不足損上而益於下則為益取下而益於上則為損在人上者施澤以及下則益也取下以自厚則損也故損者取損下益上之義有孚者謂損之道誠信而順於理也當損而損則有孚而在下者亦誠心應上而無疑故元吉夫民可損也不可過也不損則國無所資過則傷民矣斟酌其當損之宜順天理合人心而有孚焉上下俱足而斂不橫大吉而無咎也如是則可貞貞者常也守之為經常之典有弗易也如是則利往利者順也推之為通利之道無弗順皆本於有孚也彼厚斂以征民則妄矣妄則有咎矣豈可以謂之元吉可以貞可以利有攸往哉書夏書禹貢厥賦貞作十有三載乃同臣若水通曰此大禹水土初平薄斂之事賦謂取土地之所出於民者也貞正也君天下者以薄賦為正兖賦最薄故謂之正作治也蔡沉傳曰作十有三載乃同者兖當河下流之衝水患雖平而卑濕沮洳未必盡去土廣人稀生理鮮少必作治十有三載然後賦法同於他州也臣謂於此可見聖人以民為貧富不敢剝下以自奉之意君天下者當體聖人恤民之仁遇災薄稅必以實惠寬之數嵗然後荒歉可濟也禹貢庶土交正底慎財賦咸則三壤成賦中邦臣若水通曰此乃大禹制財賦土賦之事也底致也咸皆也則品節之也中邦中國也庶土交正底慎財賦者謂禹以庶土之等肥瘠高下名物交相正焉因土所出之財而致謹其財賦之入如周大司徒以土宜之法辨十有二土之名物以任土事之類是也咸則三壤成賦中邦者又以九州穀土之等品節之以上中下三則以成中國之賦如周大司徒辨十有二壤之名物以致稼穡之類是也蓋土賦或及於四夷而田賦則止於中國而已夫衣食足然後禮義興制田里薄稅斂固聖人仁政之首務也人君有志於治者盍於此而用心乎周書無逸文王不敢盤于遊田以庶邦惟正之供臣若水通曰此周公戒成王無逸之訓也逰如巡狩春省耕秋省斂之事田謂四時之田獵皆於農隙以講武事者逰田國有常制若不以其時及過其度則謂之盤樂矣文王不敢盤逰無度上不濫費故下無過取而能以庶邦惟正之供於常貢正數之外無橫斂也夫十一者天下之中正也量入為出僅足以充軍國賔祭之供耳若過於逰田則取民必過於中正乃可足用故文王不敢過於逰田者正以不敢過取而庶邦得以中正貢於上也臣謂不敢之一言深足以發文王之心事文王所以視民如傷小心翼翼者不敢之心也不敢之心乃天理也後之人君欲得天下民心者當謹征斂欲謹征斂者當戒盤逰欲戒盤逰者當體文王不敢之心然後可也詩大雅公劉篤公劉既溥既長既景乃岡相其隂陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒臣若水通曰此召康公詠公劉所以定軍賦與稅法而厚民之事以告成王也賦也篤厚也公劉后稷之曽孫也溥廣也景考日景以正四方也岡登高以望也相視也隂陽向背寒暖之宜也流泉水泉灌溉之利也徹通也一井之田九百畝八家皆私百畝同養公田耕則通力而作收則計畝而分也山西曰夕陽允信也荒大也詩言公劉之厚民也芟夷墾闢土地既廣而且長矣乃景日影焉以正方向乃岡焉以望形勢乃相視焉以審其向背寒暖之宜乃觀焉以察其水泉灌溉之利曰景曰岡曰相曰觀蓋辨乎土宜而授民以田也然有田必有軍則以三單之法定其軍賦有田必有稅則以什一之法定其稅糧復以疆理之田不足以給乎所徙之民也又度山西之田以廣之而豳人之居日益大矣夫人君之治天下固貴於授田以養民尤貴於薄斂以取民公劉授民以田而徹田為糧則取於民者薄矣周之徹法實自此而始也厥後周公不過因其舊而修之耳魯自宣公稅畝而徹法不行無怪乎民日貧而國用以之不足也夫君民一體也民富則君不至獨貧民貧則君不能獨富然則欲足乎國用者可不先足乎民而薄其稅斂乎春秋宣公十五年初稅畝臣若水通曰此何以書初稅畝也譏宣公始廢徹而用稅也魯宣當國水旱相仍國用空乏於是廢井徹之法而為稅畝之制焉夫初者創事之名變法之始也稅畝者逐畝稅之也夫什一天下之中正故殷制公田為助周因其法為徹百世不可易者也宣公以其公田之入為薄遂變其私田之稅先王之舊章成憲蕩然不復存矣其後作丘甲用田賦至於二猶不足未必非宣公啓之也故書初稅畝以貶之是故有國家者必守成法而不變惟務本之為貴哀公十二年春用田賦臣若水通曰此用田賦何以書不宜用也譏厚斂也魯哀外慕強吳內竭國用至是二猶不足乃用田賦軍旅之征焉田賦者以丘賦一乘為未足故以田賦之也夫先王制土籍田以力而砥其逺邇賦里以入而量其有無故田以足食而賦以足兵也周室之制弛力薄征當以農民為急至於夫里有布漆林有稅所以抑末業而歸之農也非欲兼利之也哀公不復先王之法又背時王之制夫里漆林之外既承丘賦之弊又以田而加賦焉是重困農民而削其邦本矣何以為國耶禮記檀弓曰孔子過太山側有婦人哭於墓者而哀夫子式而聽之使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也臣若水通曰此記暴斂害民之政也式謂憑軾以起敬也重謂所憂者非一也苛謂暴虐之政如橫征暴斂之類也識猶記也天下之至惡而傷人者莫如虎死於虎者三而不去則所去之邑暴虐可知矣民寧居於猛虎之區而不適苛政之地是則虎之猛不如政之苛而人畏苛政有甚於虎也何也虎之害人有時而可避而政之剝削無地而可逃也故曰苛政猛於虎然則仁恩及民者謂之騶虞苛政迫人者謂之猛虎人君其可不薄斂以聚民乎伏惟聖明在上不欲厚斂吾民天下信之矣凡所以布列四方而牧養斯民者其有為虎者耶臣不得而盡知之也然或有重傷於虎而哀號於郊野者九重之上安得而盡聞之乎嗚呼出賦之民吾君之赤子也苛政之官吾君之猛虎也誠愛赤子其母養虎以傷之也哉坊記曰君子不盡利以遺民臣若水通曰傳云天地之財有數不在官則在民故利盡於上則竭於下而民無遺利矣故取民之稅不過十一用民之力嵗止三日所以遺利於民而不敢盡也為民上者可不隱之於心乎周禮大宰以九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰郊都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦臣若水通曰九賦者何也口率出泉其處有九也斂財賄者其無泉而取財賄以當算也邦中者賦國中之民也四郊者賦逺郊百里內之民也邦甸者賦百里之外二百里之民也家削者賦大夫采地之外公邑之民也邦縣者賦四百里公邑之民也邦都者賦五百里公邑之民也關市者賦商賈也山澤者賦取物於山澤之民也幣餘者賦取物於織幣之民也關市也山澤也幣餘也不出上六者而特言以末作當增賦也夫聖人之治天下不能無取於民而因地異制以為厚薄惟恐橫暴之及焉所以厚其民者至矣至於關市山澤幣餘必增賦者所以抑其逐末而使之知務本也仁之至義之盡矣大司徒以土均之法辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政臣若水通曰此周禮大司徒之職也均者平也五物五地之物也九等者騂剛赤緹之類也民職者九職也地貢者貢地所生物也財賦者九賦也均之辨之作之令之夫然後斂之天下之政無弗均賦斂以正而不至於橫暴矣小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅斂之事臣若水通曰此周禮小司徒之職也井牧者春秋傳謂井衍沃牧隰臯故二牧而當一井也九夫為井地方一里積而至於都凡一千二十四井九千二百一十六夫地方三十二里也地事者農牧虞衡也貢者九榖山澤之材也賦者出車徒給徭役也先王之取於民如是可謂薄矣論語哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足臣若水通曰哀公魯君名蔣有若者孔子弟子也飢謂嵗荒不熟也用謂軍國賔祭之需也盍何不也徹通也徹周制也中為公田外八家皆私通力合作計畝均收也此魯哀公因嵗荒欲用田賦以取民而有若對之以何不行徹法蓋欲公節用以厚民也哀公疑十取其二猶不足何況徹取其十一乎有若又告以君民貧富通共之義也夫君民同心一體而痛癢欣戚相通者也故心一則體一體一則其愛之以均聚散之必同而忍於公私貧富之不一者以其心之不一故不仁不恕也哀公之心取民無厭而不恤年飢則百姓之不足已先為餓莩久矣可謂之仁恕乎孟子曰耕者助而不稅則天下之農皆悅而願耕於其野矣廛無夫里之布則天下之民皆悅而願為之氓矣臣若水通曰此孟子言人君行先王之政則民心歸之也助而不稅者但出力以耕公田而不復稅其私田也廛者市地也謂賦其市宅之稅也夫里之布者宅不種桑麻者罰之出一里二十五家之布民無常業者罰之使出一夫百畝之稅一家力役之征也戰國時一併取之廛無夫里之布者謂若賦其市宅之廛則不征其夫里之布也夫民之與君其好惡一也所好好之所惡惡之則民心有感之而不動者乎故耕而不稅廛而無夫布則斂薄而民心悅皆願耕於其野而為之氓矣為民上者奈何厚斂以棄其民哉夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也臣若水通曰此孟子論三代制民常産與其取之之制也夏時一夫受田五十畝而每夫計其五畝之入以為貢商人始為井田之制以六百三十畝之地畫為九區區七十畝中為公田外八家皆私田但借其力以助耕公田不復稅其私田周因商之制一夫受田百畝鄉遂用貢法十夫有溝都鄙用助法八家同井耕則通力合作收則計畝均分故謂之徹三代之法其名與制雖不同而什分而取其一則同也以其通作故謂之徹以其助耕故謂之藉也夫什一天下之中正也三代行之而用以充後世倍之而財不足然則其足與不足不係於取民之厚薄矣治天下者盍思其故哉中庸時使薄斂所以勸百姓也臣若水通曰中庸言九經之事此其一也使者力役之征也斂者粟米之征也皆有國者所不能免也使之以時而不盡其力斂之者薄而不竭其利焉百姓豈有不勸乎時使則不急之工息薄斂則無藝之征止則民財可裕而民用以充如是則百姓享其飽食暖衣之樂遂其樂生興事之業相勸以為尊君親上之義而百姓之勸有不期然矣雖然薄斂當自節用始節用當自恭儉始故九經以修身為先治天下者可以知本矣左傳哀公十一年季孫欲以田賦使冉有訪諸仲尼仲尼曰丘不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取於厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽十有二年春用田賦臣若水通曰田賦者謂以丘賦為不足而欲以田賦之也三發凡三發問也卒終也為國老謂孔子為魯國之元老也度於禮者度其合於禮而後行也施取於厚者謂其施恩惠寧取過於厚者也事舉其中者謂其舉政事必得其中也斂從其薄者謂其取賦斂寧過於薄者也貪冒貪財盡利也夫季孫欲田賦而使冉有訪諸仲尼者其心必有所不安矣季孫使問三發而仲尼不對者則其意固有在既而私告冉有者即所以告季孫而以諷之也惜乎弗聽而明年田賦行矣田賦行而周公井田什一中正之法蕩然矣此古今治亂之大機有志願治之君當不能不為之一慨嘆也已國語周語芮良夫曰夫利百物之所生也天地之所載也而或専之其害多矣天地百物皆將取焉胡可専也臣若水通曰芮良夫周大夫芮伯也載成也百物受天地之氣以生成天地成百物乃公共之利也民皆將取用之何可専其利夫利者天之所生地之所養民之所用可以同不可以獨可以散不可以聚否則神人百物不協其極彼榮夷公貪利不厭不足以語此也為民上者可不知所以公天地之利乎晉語趙簡子使尹鐸為晉陽請曰以為繭絲乎抑為保鄣乎簡子曰保鄣哉尹鐸損其户數簡子誡襄子曰晉國有難而無以尹鐸為少無以晉陽為逺必以為歸臣若水通曰尹鐸簡子家臣晉陽趙氏邑也為治也繭絲賦稅保鄣蔽扞也小城曰保損其户數則民優而稅少襄子簡子之子無恤也夫君民一體痛癢相關故書曰民惟邦本本固邦寧彼貨殖以亡身可謂智乎故尹鐸之為晉陽必先損其户數薄斂以得民厥後沉竈産蛙民無叛意非其明效大驗耶君民者宜有感於斯云里克曰克聞之夫義者利之足也貪者怨之本也廢義則利不立厚貪則怨生臣若水通曰里克晉大夫里季也有義然後利立故曰利之足也無足故不立易曰利者義之和也是故義順則利矣義所以主乎利者也是謂自然之利故義立則利均義廢則利熄是故君子正其義不謀其利里克不惑於丕鄭之謀非所謂以義為利者耶楚語伍舉曰天子之貴也唯其以公侯為官正而以伯子男為師旅其有美名也唯其施令德於逺近而小大安之也若斂民利以成其私欲使民蒿焉忘其安樂而有逺心其為惡也甚矣臣若水通曰蒿耗也逺心畔離也夫財者民之命也利者人之心也君天下者惟務施德以立民之命而得其心也若聚利以自封私欲宏侈則民命索然而人心去矣騷離距違不亦宜乎有天下者當鑑伍舉之言戒章華之侈以收萬民之心可也鬬且曰夫古者聚貨不妨民衣食之利又曰公貨足以賓獻家貨足以供用不是過也夫貨馬郵則闕於民民多闕則有離畔之心將何以封矣臣若水通曰貨珠玊之屬自然物也貨馬多則求養者衆妨財力也賓享贈也家大夫也郵過也封封國也夫天之生是君將以為民也故明君賢臣與天下共其利不敢専利以妨下故損租却貢拔葵罷織後世稱譽之而不衰今于常談利如餓豺狼是以鬬且知其必敗也為君相者可不鑒諸周威烈王二十三年智伯求蔡臯狼之地於趙襄子襄子弗與智伯怒帥韓魏之甲以攻趙氏襄子將出曰吾何走乎從者曰長子近且城完厚襄子曰民罷力以完之又斃死以守之其誰與我從者曰邯鄲之倉廪實襄子曰浚民之膏血以實之又因而殺之其誰與我其晉陽乎先王之所屬也尹鐸之所寬也民必和矣乃走晉陽三家以國人圍而灌之城不浸者三版沉竈産蛙民無叛意臣若水通曰重役厚斂怨之府也孟子曰天時不如地利地利不如人和民怨則不和雖有天時地利何足恃乎是故為國之本在人和人和之實在省賦尹鐸能寬賦以和晉陽之人心而襄子因之以保垂亡之國是得其人和之效也然則後之人君可不輕徭薄斂以和天下之人心固國家之大本乎漢武帝元鼎六年齊相卜式為御史大夫乃言郡國多不便縣官作鹽鐡器苦惡價貴或強令民買之而船有算商者少物貴上由是不悅卜式臣若水通曰縣官作鹽鐡者言朝廷興鹽鐵之利故郡國多不便之也強民買之而船有算商少物貴者言武帝稅及舟車故商人少商少故物貴而又強買故器濫惡以相欺也胡寅曰武帝好武功而用不足式以此兩端中上意官既尊矣乃始正言以邀名然臣謂知其不利能反之以正言不顧忤君之意其賢於執迷誤國殃民而不悛者逺矣臣故表而書之以警専利之臣焉光武建武六年十二月癸巳詔曰頃者師旅未解用度不足故行十一之稅今糧儲差積其令郡國收見年田租三十稅一如舊制臣若水通曰孟子云欲重之於堯舜之道者大桀小桀也漢之賦斂之法則名堯舜而實桀紂矣夫十一之稅中正之法也漢以三十稅一為常制而以十一之稅為權其取於民也若甚輕矣而民困愈甚者豈非額外之征猶數倍於此者耶然則人君固以薄斂為貴猶以橫斂為戒晉穆帝永和元年春正月燕記室參軍封裕上書諫以為古者十一而稅天下之中正也降及魏晉仁政衰薄假官田官牛者不過稅其十六自有牛者中分之猶不取其七八也自永嘉以來海內蕩析武宣王綏之以德中外之民萬里輻湊襁負而歸之者若赤子之歸父母是以户口十倍於舊無田者什有三四及殿下繼統南摧強趙東兼高句麗北取宇文拓地三千里增民十萬户是宜悉罷苑囿以賦新民無牛者官賜之牛不當更收重稅也臣若水通曰孔子云寬則得衆魏晉之際稅及官牛而海內蕩析永嘉之後綏之以德而百姓歸往可以見寬苛之驗矣慕容皓雖燕之賢明者猶復踵重稅之失向非封裕示以魏晉之弊歆以先世之盛則遼陽之民其塗炭矣乎宋明帝泰始五年二月己卯魏自天安以來比嵗旱飢重以青徐用兵山東之民疲於賦役顯祖命因民貧富為三等輸租之法等為三品上三品輸平城中輸他州下輸本州又魏舊制常賦之外有雜調十五至是悉罷之由是民稍贍給臣若水通曰魏主於兵戈擾攘之時而為均輸罷調之政其賢矣乎夫兵戈擾攘民猶倒懸矣又急之以賦役是猶於倒懸之下而又燎之以烈火也然則均輸罷調之舉猶為能寬一分之惠矣梁武帝大同十一年十二月散騎常侍賀琛啓陳四事其一以為今北邊稽服正是生聚教訓之時而天下户口減落關外彌甚郡不堪州之控總縣不堪郡之裒削更相呼擾惟事徴斂民不堪命各務流移此豈非牧守之過歟東境户口空虛皆由使命繁數窮幽極逺無不皆至每有一使所屬騷擾駑困守宰則拱手聽其漁獵桀黠長吏又因之重為貪殘縱有亷平郡猶掣肘如此雖年降復業之詔屢下蠲賦之恩而民不得反其居也臣若水通曰蠲賦之詔世之人君往往有之而實惠不及於民者沮之於牧守迫之於命使耳無怪乎恤詔日下而民日窮促以流徙而為盜也故有志之君欲下詔薄賦以恤民者必自恭儉清靜始焉隋文帝仁夀三年龍門王通嘗稱重斂之國其財必削臣若水通曰大學云貨悖而入者亦悖而出此不易之理也故其用之也舒則其取之也亷其斂之也重則其散之也輕欲其財用之不削不可得也王通儒而達於治體者也其言蓋本於孔門之意乎使隋能用之則治道其有興矣惜乎託於空言也後世人君采其言而用之其於國家尚亦有利哉格物通卷九十五
