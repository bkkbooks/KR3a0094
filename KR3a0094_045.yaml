body:
  text: 格物通卷四十五明湛若水撰事君使臣下漢光武建武五年馮異治關中出入三歳上林成都人有上章言異威權至重百姓歸心號為咸陽王帝以章示異異惶懼上書陳謝詔報曰將軍之於國家義為君臣恩猶父子何嫌何疑而有懼意臣若水通曰君臣之間嫌隙易生光武之於馮異不以人言而間示之章奏恩如父子真所謂推赤心置人腹中矣此其所以豪傑響應而再延漢祚也後之人君御臣之道當以光武為法漢光武建武九年潁陽成侯祭遵為人廉約小心克己奉公賞賜盡與士卒約束嚴整所在吏民不知有軍取士皆用儒術對酒設樂必雅歌投壺臨終遺戒薄𦵏問以家事終無所言帝愍悼之䘮至河南車駕素服臨之望哭哀慟復親祠以大牢詔大長秋謁者河南尹䕶䘮事大司農給費至𦵏車駕復臨之既𦵏又臨其墳存見夫人室家其後朝㑹帝每歎曰安得憂國奉公如祭征虜者乎臣若水通曰君止於仁臣止於敬祭遵之憂國奉公光武之哀痛𦵏祭君仁臣敬兩無愧矣然則人君於効忠之臣可不知所以厚之哉人臣於恩禮之君孰不思所以報之哉漢光武建武十二年帝以睢陽令任延為武威太守親見戒之曰善事上官無失名譽延對曰臣聞忠臣不和和臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也臣若水通曰履正奉公人臣事君之忠也舉直錯枉人君用人之道也有臣如任延斯可勝公卿之任矣何必國䜟之求哉晉孝武帝咸寧四年羊祜疾篤舉杜預自代辛卯以預為鎮南大將軍都督荆州諸軍事臣若水通曰薦賢所以為國羊祜疾篤舉預自代以人事君之心死而不忘若祜者可以為大臣事君之法矣人之有技􅎱嫉以惡之人之彦聖而違之俾不通其上負於君下負天下之賢才多矣有臣如此迸諸四夷不與同中國豈不宜哉北漢劉殷常戒子孫曰事君當務幾諫凡人尚不可面斥其過况萬乗乎夫幾諫之功無異犯顔但不彰君之過所以為優爾殷在公卿間常恂恂有卑色故能處驕暴之國保其富貴不失令名臣若水通曰書稱爾有嘉謀嘉猷入告爾后於内爾乃順之于外曰斯謀斯猷惟我后之徳其幾諫之意乎夫人臣諫君欲以全其徳愛也而以幾諫不欲顯君之過善則歸之以全令名又愛之至也然直諫難容幾諫易入期於補過則一而幾諫之收功多矣此在後世為臣者尤所當法焉漢主劉聰殺兄之惡而劉殷忘同姓之恥以二女為貴嬪殷豈幾諫之人聰豈幾諫所能正哉其為此言葢欲為全身保富貴之計耳晉成帝咸和二年宣城内史桓􅉓欲起兵以赴朝廷其長史禆惠以郡兵寡弱山民易擾謂宜且按甲以待之彛厲色曰見無禮於其君者若鷹鸇之逐鳥雀也今社稷危逼義無宴安臣若水通曰桓彛既不怯於兵力之薄又不貳於禆惠之言討賊一念終始不渝既而忠貞之志感夫禆將雖死猶不負彜猶彜之不負國也嗚呼雖不幸而敗人臣之義何愧哉晉簡文帝咸安元年王猛以六州任重言于秦王堅請改授親賢及府選便宜堅報曰朕之於卿義則君臣親踰骨肉雖復桓昭之有管樂𤣥徳之有孔明自謂踰之夫人主勞於求才逸於得士既以六州相委則朕無東顧之憂非所以為優崇乃朕自求安逸也夫取之不易守之亦難茍任非其人則患生慮表豈獨朕之憂亦卿之責也故虛位台鼎而以分陜為先卿未照朕心殊乖素望新政俟才宜速銓補俟東方化洽當衮衣西歸猛乃視事如故臣若水通曰猛辭任讓賢事君之忠也堅委心付托待臣之誠也比諸桓公之管仲燕昭之樂毅劉備之孔明真無愧哉北魏成帝命古弼輔太子决庶政古弼為人忠慎質直嘗以上谷苑囿太廣乞减大半以賜貧民入見魏主欲奏其事帝方與給事中劉樹圍棋志不在弼弼侍坐良乆不獲陳聞忽起捽樹頭掣下牀摶其耳毆其背曰朝廷不治實爾之罪帝失容捨棋曰不聽奏事朕之過也樹何罪置之弼具以狀聞帝皆可其奏弼曰為人臣無禮至此其罪大矣出詣公車免冠徒跣請罪帝召入謂曰吾聞築社之役蹇蹷而築之端冕而事之神降之福然則卿有何罪其冠履就職茍可以利社稷便百姓者竭力為之勿顧慮也臣若水通曰古弼之捽樹直諫而以身請罪成帝之霽怒優容而勉使竭力君臣可謂兩得矣至於玩人䘮徳玩物䘮志之規未聞而自怨自艾改過遷善之勇不著惜哉唐太宗貞觀元年有上書去佞臣者上因告之曰君源也臣流也濁其源而求其流之清不可得矣君自為詐何以責臣下之直乎臣若水通曰唐太宗君臣源流之喻切矣然徒知源之不可濁而不能浚之以清知其自為詐而不能養之於誠乃至以已之尚詐而恕其佞臣而不問夫佞者固不臣矣容佞者果得其為君之道乎唐太宗貞觀元年十二月或告右丞魏徵私其親戚上使御史大夫温彦博按之無狀彦博言於上曰徵不存形迹逺避嫌疑心雖無私亦有可責上令彦博讓徵且曰自今宜存形迹他日徵入見言於上曰臣聞君臣同體宜相與盡誠若上下俱存形迹則國之興喪尚未可知臣不敢奉詔上瞿然曰吾已悔之徵再拜曰臣幸得奉事陛下願使臣為良臣勿為忠臣上曰忠良有以異乎對曰稷契臯陶君臣協心俱享尊榮所謂良臣龍逢比干面折廷争身誅國亡所謂忠臣上悦賜絹五百疋又六年閏月乙卯上宴近臣於丹霄殿長孫無忌曰王珪魏徵昔為仇讎不謂今日得此同宴上曰徵珪盡心所事故我用之然徵每諫我不從我與之言輙不應何也魏徵對曰臣以事為不可故諫陛下不從而臣應之則事遂施行故不敢應上曰且應而復諫庸何傷對曰昔舜戒群臣爾無面從退有後言臣心知其非而口應陛下乃面從也豈稷契事舜之意邪上大笑曰人言魏徵舉止踈慢我視之更覺娬媚正為此爾徵起拜謝曰陛下開臣使言故臣得盡其愚若陛下拒而不受臣何敢數犯顔色乎臣若水通曰太宗之於魏徵可謂信任矣然聞人之言猶不能不假他人之考按者是得為任賢勿疑乎魏徵之告太宗欲為良臣矣然而無臯䕫稷契之學故不能致其主得盡事君之忠乎故為君者舍堯舜禹湯之學未盡其為君也為臣者舍臯䕫稷契之學未盡其為臣也仰惟聖明天授聰明負堯舜禹湯文武之資陋太宗而不屑為也而輔養聖學者必皆臯䕫稷契其人然後可也賈誼新書曰上設亷恥禮義以遇其臣而群臣不以節行而報其上者即非人類也故化成俗定則為人臣者主爾忘身國爾忘家公爾忘私臣若水通曰上以亷恥禮義遇之則使臣以禮矣下以節行忘私報之則事君以忠矣故上以禮則下以忠感應之必然也為人君欲得臣之報禮以圖治理者何憚而不以禮乎劉向説苑曰人臣之行有六正六邪行六正則榮犯六邪則辱榮辱者禍福之門也賢臣處六正之道不行六邪之術故上安而下治生則見樂死則見思臣若水通曰六正者曰聖曰良曰忠曰智曰貞曰直善雖不同同歸於治也六邪者曰具曰諛曰姦曰䜛曰賊曰亡國惡雖不同同歸於亂也故與治同道罔不興與亂同事罔不亡矣君子小人分而治忽見矣則何以辨之曰自君心好惡始故人君之心能公則明明則邪正不混矣故臣之事君當正其術君之取臣當正其心劉向曰虚心白意進善通道勉主以禮義論主以長䇿將順其美匡救其惡功成事立歸善於君不敢獨伐其勞臣若水通曰陳善閉邪敬之至也歸善不有尊之至也劉向之言其知事君之道哉食君之禄荷君之恩者宜佩之無斁也班固白虎通曰君使臣以禮臣事君以忠謙謙君子利涉大川以貴下賤大得民也臣若水通曰君臣一心而治化行矣君臣二心則禍亂至矣是故以貴下賤禮以使臣君之心即臣之心也利涉大川忠以事君臣之心即君之心也夫一心者豈人之所不能哉不為爾一之何如曰在講學學一則徳一徳一則心一矣宋儒程顥曰今天下之士人在朝者又不能言退者遂忘之又不肯言此非朝廷吉祥雖未見從又不曾有大横見加便豈可自絶也君臣即如父子也父子之義不可絶豈有身為侍從尚食其禄視其危亡曾不論列君臣之義固如此乎臣若水通曰古之君臣之喻多矣有喻之以父子者非不親也然而有父子不相顧者矣有喻之以元首股肱腹心手足者非不一體也然而有痛癢不相闗者矣至於喉舌之喻則一體死生以之可不懼乎夫君猶心腹也臣之侍從言論猶喉舌也侍從臺諫之官不言如喉舌不通其身心將與喉舌俱死矣此非特人君家國之憂亦為人臣者終身之憂也臣愚敢以此廣程顥孟軻之説以為明主獻以為言路規程頤曰為人臣者居其位食其禄必思何所得爵禄来處乃得君也必思所以報其君凡勤勤盡忠為報君也臣若水通曰程頤之説葢就中人以下食禄思報者之警䇿也語曰肉食者謀之又曰朝不坐燕不與殺三人足以反命議者謂其自待之薄夫君臣之義不可解於心者也有去就而無厚薄扶危濟傾之力多出於踈逺下位之臣豈以其禄之厚薄異其心哉故臣之盡忠非欲以相報也乃自盡也人之所以根於天性者也夫豈有所為而為之者哉必如此而後君臣之義正或謂程頤曰先生於上前委曲已甚不亦過乎曰不於此致力盡心而於何所臣若水通曰孟子稱我非堯舜之道不敢以陳於王前程頤學似孟子者也故其在經筵容貌極其莊誠敬極其至宜乎或人有已甚之疑也他日文彦博聞其講説嘗歎曰真侍講也若程頤者可謂萬世事君者之法矣龜山楊時曰人臣之事君豈可佐以刑名之説如此是使人主失仁心也人主無仁心則不足以得人故人臣能使其君視民如傷則王道行矣臣若水通曰易曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義人主之學在知道而已矣知道則仁義並行而天地隂陽剛柔備矣故禮以勸之刑以懲之同於仁義也同於道也故春以生之秋以殺之而萬物成矣楊時之所惡刑名者葢謂商鞅韓非慘刻者之刑爾非謂弼教之刑也所謂仁者葢能好惡人之仁也非姑息之仁也時之言葢有為而發也歟五峰胡宏曰自三代之道不行君臣之義不明君誘其臣以富貴臣干其君以文藝夫君臣相與之際萬化之原也既汩於利矣末流其可禁乎此三代之治所以不復也臣若水通曰三代君臣以道相與以義相合誠而已矣上下交誠然而徳業不成者未之有也後世君誘其臣以富貴臣干其君以文藝相率為偽而已矣上下交偽然而災害不生者未之有也治不古若無恠乎其然矣為人君者其可專以文辭取士而徒以富貴誘其臣哉張栻囘嚴主簿啓有云皇家設科本收多士之用而君子從事豈為一身之謀故官無尊卑而報國則均事無大小而行志則一臣若水通曰君之取士也為其賢也臣之事君也為其道也故君有取於其臣臣有期於其君期之者至矣夫何有尊卑大小之間哉臣於人者可以悟矣張九成曰君不信其臣故以術而御其臣臣不信其君故以術而防其君君臣上下無非以術相與欲其終始無間難矣臣若水通曰君臣相與之際信與不信而已夫信者結於心者也信則用誠不信則用術誠則始終皆一術則始終皆二君以術而御其臣臣以術而應其君相二相間則臣之寵愛不終而君之盛徳有累而亂亡之所由起也臣故掲之以為萬世君臣之戒張浚曰事君者必此心純一而後能有感格臣若水通曰上下之心一而已矣理一而已矣故純一則不雜不雜則誠未有誠而不動者一心之感應也故言無不聽諫無不行信在言前也然則為人臣欲格君心者其可不求夫純一之學也哉國朝洪武十七年十一月乙丑上御東閣從容謂侍臣曰責難之辭人所難受明君受之為無難諂諛之語人所易從昏主信之為易入朕觀唐虞君臣賡歌責難之際氣象雍容後世以諂諛相歡如陳後主江總輩汙穢簡䇿貽譏千古此誠可為戒右春坊右贊善董倫對曰誠如陛下所諭惟明主則能慎擇之上曰責難易入於賢君而諂諛難動乎明主人臣以道事君惟在守之以正若患得失則無所不至矣臣若水通曰書云有言逆于汝心必求諸道有言巽于汝志必求諸非道責難者逆心之言也故難受諂諛者巽志之言也故易入賢明之君在審之而已矣責難之言入則天下䝉其福諂諛之言入則天下受其殃故人君以難受為藥以易入為毒人臣以責難為恭以諂諛為賊則君臣上下各盡其道而國治矣皇祖諭侍臣及此灼見其弊非天下之至明其孰能與於斯此聖子神孫當念之以為御臣下聽言之法也國朝太祖高皇帝大誥曰昔者人臣得與君同遊者其竭忠誠全其君飲食夢寐未嘗忘其政所以政者何惟務為民造福拾君之失撙君之過補君之闕顯祖宗於地下歡父母於生前榮妻子於當時身名流芳千萬載不磨臣若水通曰此聖祖君臣同遊之誥也葢君臣之分如天尊地卑之嚴嚴則踈踈則上下不交而徳業日廢矣故唐虞三代之時君臣相親於一堂之上都俞吁咈將順匡救無非講學之時也此徳業之所以隆盛乎自漢唐以下諸君非不有時而同遊不過宴賞觴詠助欲喪徳而已我聖祖君臣同遊之誥直欲拾其失撙其過補其闕不忘其政以福乎民而涵養徳性變化氣質之益又黙寓於其間所以格心成徳尤有出於言語之外者仰惟聖明脩復舊章而力行之則君聖臣賢一舉兩得而萬化成矣天下幸甚正統四年欽定憲綱居風憲者須用持身端肅公勤詳慎毋得䙝慢怠惰凡飲食供帳只宜從儉不得踰分風憲之職其任至重行止語黙必須循理守法若纎毫有違則人人得而非議之為風憲之累矣故所至州縣取假分毫之物即自玷溷在我無瑕方可律人若於各衙門囑託公事比常人加三等有贓者從重論臣若水通曰風憲之職在亷以律己正以格物而已矣英廟以是諭其臣得使臣之道矣為臣以是奉其公得事君之道矣臣故敬表而出之以為萬世使臣事君之龜鑑焉憲綱出廵同事之人須相協和若有所見不同而行事乖碍者可於無人之處從容陳説利害以開導之彼心既悟自能從正凡人言語須虚心以聽不可偏執己見若聽者能從則言者亦不可矜為己功大抵同事當如兄弟相親相愛積誠相與未有不相契者凡有善相勸有過相規相規亦不可對衆發之庶其能從不可推惡避勞不可妨彼利己不可揚己抑人必務協和以相助益不但風憲如此諸司處同僚者亦皆當然臣若水通曰共事之道不貴於同而貴於和同則不和而和所以濟其同也同者私也和者公也甲曰可乙亦曰可所謂同也是未得可之正也甲曰可乙曰不可是必求得夫可之正矣所謂和也鹽梅酸醎不同而同於和羮以梅濟梅以鹽濟鹽其能有和乎書曰庶官乃和不和政厖夫和者人臣事君之忠也祖宗憲綱所謂不同乖碍有過相規則亦不貴乎同也所謂必於無人之處從容開導則亦所以為和也雖然世之士夫外每失於同而内則不足於和何耶則盍反其本矣書曰同寅協恭和𠂻哉故欲相濟於和者必有寅恭之心然後可格物通卷四十五
