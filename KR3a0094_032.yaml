body:
  text: 格物通卷三十二明湛若水撰正嫡庶上易序卦傳主器者莫若長子故受之以震臣若水通曰器謂鼎也鼎之用亨之以享上帝宗廟社稷大亨以養聖賢鑄之以定九州天下國家之重器也主之者君繼君以主重器者長子也立嫡以長所以重重器也後世之君溺於私愛而嫡庶易位鼎之安危繫於此矣故繼鼎以震震於乾坤乃長子也聖人序卦之意微矣哉詩小雅小辨何辜于天我罪伊何心之憂矣云如之何臣若水通曰申后幽王正后生宜臼宜臼已立為太子幽王惑於褒姒遂黜申后而廢太子使之怨慕其傅為作此詩以發其憂抑之情言我何以得罪于天而我之罪何在邪求得罪於天之故而無得徒使我心之憂悶將如之何哉幽王亂嫡庶之大分而使天性之恩怨慕迫切如此若罔聞知此心之天理不復有矣禍亂之作豈不宜哉後之人君溺於袵席之私有廢后易嫡之失者宜鑒幽王之禍云春秋桓公六年九月丁卯子同生臣若水通曰同莊公名桓之長子也同生何以書明嫡也正國本也書子同生則嫡明而儲嗣之分定將為土地人民社稷之主而國本立矣故書子同生所以明父子嫡庶之定分不書世子未有王命之誓所以明君臣上下之大義父子親而後君臣定嫡庶之義所係豈小也哉桓公十一年宋人執鄭祭仲突歸于鄭鄭忽出奔衛臣若水通曰此三事也而同書者何同譏也祭仲見執而屈於宋故宋得以歸突于鄭突歸而忽出事之相因也祭仲鄭相也宋人執之蓋欲脅之以廢忽而立突爾夫突庶忽嫡大義昭然於天下使仲正色直詞力辨其非以死繼之則宋不得逞卿之職也而不能焉甘就束縛無可否於廢立之大變則仲亦篡君之賊也故書之所以大仲之罪也突者鄭莊之庶子也藉宋以篡國突不稱公子絶之也不以突繫之鄭者明不當有鄭也書歸者言宋歸之也正逆黨之罪也忽者莊之嫡子書其國氏正也出奔而名之罪不能守社稷也夫傳子以嫡天地之常經也失之於父得之於子失之於君得之於臣可也莊公不能正其始祭仲不能守其終突庶而篡忽嫡而弱至使嫡庶之名分為之蕩然其咎將安歸哉蓋自莊公克假于鄢既有以開其篡逆之源弧矢既懸又不能早定國本卒致身沒未幾庶孽交爭詩曰誰生厲階至今為梗莊之謂矣昭公二十二年劉子單子以王猛居于皇二十三年天王居于狄泉尹氏立王子朝臣若水通曰劉蚠單旗王之卿士尹氏亦卿士也皇與狄泉皆地名景王三子猛丐朝胡安國云王猛當立而未能立故稱大臣以之而不言立敬王當立又能立矣故直稱居于狄泉而不言立子朝庶孽奪正以賤妨貴基亂周室不當立者也故特稱立而目尹氏臣謂公正者人君立皇極正綱常之本也景王寵愛子朝疏薄猛丐其心偏私已甚矣故死未幾嫡庶紛亂綱常不正皇極不立偏之為害也春秋書劉子單子以王猛居皇譏其不能立也書天王居狄泉正名分也書尹氏立王子朝譏助逆也然則有天下者可不以公正存心早定國本乎禮記曲禮天子有后有夫人有世婦有嬪有妻有妾臣若水通曰后一而已下而夫人而世婦而嬪而妻而妾皆三以參之而嫡庶之分嚴矣何以皆奇也以事一人則偶矣古之聖王所以備內政有夙夜之賢無宴安之習也曲禮支子不祭祭必告於宗子臣若水通曰支子庶子也不祭者以已非正體故不敢也明其宗也祭必告於宗子者支子為大夫而有祭告必告於宗子以主之所以明其宗也故曰家無二主尊無二上茍庶子而祭是二主也祭而不告是二上也其何以别貴賤明嫡庶乎此古人所以立宗法蓋以正嫡庶也後世嫡庶不明而骨肉之間多至於仇怨忿爭者以無宗子之法爾程頥曰宗子無法則朝廷無世臣宗子立而人知重本朝廷之勢自尊矣其關於天下國家者尤為不小吁是可不加之意哉內則適子庶子祗事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入子弟猶歸器衣服裘衾車馬則必獻其上而後敢服用其次也若非所獻則不以入於宗子之門不敢以貴富加於父兄宗族若富則具二牲獻其賢者於宗子夫婦皆齊而宗敬焉終事而後敢私祭臣若水通曰適子適室所生之子宗子弟也宗子者大宗子也子弟亦謂適子猶若也歸器子弟有功德而䝉上歸遺也獻其上以上等獻於宗子也非所獻非宗子所當用不可獻者也富者貴也賢者善也獻於宗子致祭大宗也夫宗子者承祖之正體也敬宗所以尊祖也孝之至也屏貴勢尚寡約所以敬宗也獻上用次所以尊宗子也非所獻而不入所以尊之也夫婦齊而宗敬齊戒往助祭致敬宗廟也私祭祖禰也先宗祭而後私祭所以敬始祖也推祖禰之意於始祖也內則國君世子生告于君接以太牢宰掌具三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑弧蓬矢六射天地四方保受乃負之宰醴負子賜之束帛臣若水通曰國君之於世子也接見以太牢牲之大也掌禮以太宰官之尊也卜士之吉者齊宿朝服必於寢門外而詩負之詩者承也承負以抱又人之賢也射以桑弧蓬矢射天地四方者示志也宇宙內事即已性分內事也保母受而負之宰醴賜以束帛重其事也蓋以太子者國天下之本也而可忽哉若周幽王廢嫡立庶卒召驪山之變齊桓公㑹衆定襄遂善首止之盟嗚呼聖人定王世子之法於三代之前而後世猶有巫蠱之寃庶人之廢可慨矣夫喪服小記庶子不祭祖者明其宗也又曰庶子不祭禰者明其宗也臣若水通曰庶子為適士猶得以祭禰惟不及祖爾其不為士者雖禰亦不得祭矣所以然者適子本也庶子支也所以明重本也臣嘗因是而考夫宗矣曰别子為祖謂非適子而别與後世為祖也繼别為宗謂繼别子之適子而為百世不遷之大宗也繼禰者為小宗謂别子之子以適自繼而為五世則遷之小宗也夫宗法者為諸侯大夫庶子以下者設也而諸侯之系天子之統君也不必言宗而已為宗矣故宗廟宗人之稱亦可以類見矣周禮九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御叙於王所臣若水通曰婦德者貞順也婦言者辭令也婦容者婉娩也婦功者絲枲也各帥其屬九九相次進勸王息也御者進御於君所也凡羣妃進御之法卑者先尊者後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而遍皆所以進養君德也而有數焉所以定其嫡庶之分也聖人之教天下之大防也左傳桓公十八年周公欲弒莊王而立王子克辛伯告王遂與王殺周公黑肩王子克奔燕初子儀有寵於桓王桓王屬諸周公辛伯諫曰並后匹嫡兩政耦國亂之本也周公弗從故及臣若水通曰嫡庶正則家理而國本定矣子儀有寵於桓王私也桓王屬諸周公則又私矣為周公者雖微辛伯之諫猶當深明嫡庶之分以止禍亂之源庶或可及諫既弗聽矣且欲淫焉以逞雖欲不亡不可得已莊公八年齊侯使連稱管至父戌葵丘瓜時而往曰及瓜而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂臣若水通曰仲年僖公之同母弟則襄公之叔父也生公孫無知則襄公弟也嫡庶之分定矣然而衣服禮秩僣於嫡猶以私愛致亂襄公雖欲絀而救正之然不正其本而齊其末禍亂至矣非僖公啓之哉人君鑒此可不戒乎莊公二十八年晉獻公娶于賈無子蒸於齊姜生秦穆夫人及太子申生又娶二女於戎大戎狐姫生重耳小戎子生夷吾晉伐驪戎以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公曰曲沃君之宗也蒲與二屈君之疆也不可以無主宗邑無主則民不威疆場無主則啓戎心戎之生心民慢其政國之患也若使太子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐使俱曰狄之廣莫於晉為都晉之啓土不亦宜乎晉侯說之夏使太子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在綘二五卒與驪姬譛羣公子而立奚齊晉人謂之二五耦臣若水通曰君心之蠱非人能蠱之也乃自蠱也木之蠧非蟲能蠧之也乃木自蠧也太子奉冢祀社稷之粢盛以朝夕視君膳者也太子出之外羣公子皆鄙唯二姬之子在絳則嫡庶不正彞倫攸斁禍亂將作人心天理之明孰不知之者晉獻惑於二五之言而不悟咎將誰執哉然則所謂二五耦者非二五得耦之也晉獻自耦之也昭公二十六年九月楚平王卒令尹子常欲立子西曰太子壬弱其母非適也王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也國有外援不可瀆也王有適嗣不可亂也敗親速讐亂嗣不祥我受其名賂吾以天下吾滋不從也楚國何為必殺令尹令尹懼乃立昭王臣若水通曰令尹子常之欲立子西者以其長也以其好善也則非私於子西也顧未明重嫡之義爾而子西乃峻拒之不敢貪天以為功且挈國柄而授之昭王因之改紀其政以復楚業亦賢矣哉可以為世勸也已國語周語魯武公以括與戲見王王立戲樊仲山父諫曰不可立也不順必犯犯王命必誅夫下事上少事長所以為順也今天子立諸侯而建其少是教逆也若魯從之而諸侯效之王命將有所壅若不從而誅之是自誅王命也臣若水通曰武公獻公之子敖也括武公長子伯御也戲括弟懿公也仲山父王卿士食采於樊王命言先王立長之命夫嫡庶之分不可毫髮紊者也故王者正宗立嫡所以息爭苟舍長建少是犯王命而紊分矣王欲立戲而樊仲山父之諫九復而不回誠非為宗社計者也家天下者可不慎乎漢髙帝二年秋七月上寵戚姫生趙王如意上以太子仁弱欲廢之而立趙王大臣爭之皆莫能得御史大夫周昌廷爭之彊上問其說昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑臣若水通曰傳云溺愛者不明太子國本本動國搖夫人能知之以高帝之智曽不之知乎戚姬之愛溺之也周昌極諫而不能去其心之鴆毒苟非留侯四皓之䇿則漢之為漢猶秦之二世爾可懼哉漢武帝征和二年生戾太子甚愛之及長性仁恕溫謹上嫌其才能少不類已皇后太子寵寖衰有不自安之意上覺之謂大將軍青曰漢家庶事草創加以四夷侵陵中國朕不變更制度後世無法不出師征伐天下不安為此者不得不勞民若後世又如朕所為是襲亡秦之跡也太子敦重好靜必能安天下欲求守文之主安有賢於太子者乎聞皇后與太子頗有不安之意可以意曉之青頓首謝臣若水通曰父子之愛天性也於是而不用其情烏乎用其情武帝嫌戾太子才不類已與后寵愛寖衰而不知嫡庶之定分則其欲易之根已萌伏於中矣及后太子不自安乃為好言以餂之豈其情乎此讒譛之謀所以易入而太子危矣漢光武建武十九年郭后既廢太子疆意不自安郅惲說太子曰久處疑位上違孝道下近危殆不如辭位以奉養母氏太子從之數因左右及諸王陳其懇誠願備藩國上不忍遲回者數嵗六月戊申詔曰春秋之義立子以貴東海王陽皇后之子宜承大統皇太子疆崇執謙退願備藩國父子之情重久違之其以疆為東海王立陽為太子改名莊臣若水通曰禮嫡子冠乎阼衆子不得與所以辨嫡庶明尊卑定國本也光武不世出之主而乃溺其私愛輕於廢后易嫡曾是以為燕翼貽謀之善乎吕祖謙謂其大體却遺其以此夫袁宏曰東海謙恭明帝友于是亦不能三年之喪而緦小功之察者歟晉元帝建武元年有司請立太子王愛次子宣城公裒欲立之謂王導曰立子當以德導曰世子宣城俱有明雋之美而世子年長王從之丙辰立世子紹為王太子封裒為琅邪王奉恭王後臣若水通曰告君之言當正而婉故君易知而不得不從晉元欲立宣城公裒者其溺於愛也非淺矣宜正大義婉而進之也王導之諫槩稱裒之美而於紹特云年長爾未能白嫡庶之大義使不可易其從之立紹者幸爾非諫之力也然而明敏有斷克復帝業紹亦何愧哉隋文帝仁壽四年嘗謂羣臣曰前世天子溺於嬖幸嫡庶紛爭遂有廢立或至亡國朕旁無姬侍五子同母可謂真兄弟也豈有此憂邪帝又懲周室諸王微弱故使諸子分據大鎮專制方面權侔帝室臣若水通曰莫定於名分莫紛爭於僣擬而産之同異不與焉隋高祖懲前世嫡庶紛爭之患謂諸子同産無此憂顧乃使諸子分據大鎮非僣擬而何惟嫡庶之義明則分定分定則不僣雖在異母兄弟猶無憂也厥後譛毁由姬廢立以意顧以誚前世者為後世誚悲夫格物通卷三十二
