body:
  text: 格物通卷九十七明湛若水撰恤窮上書周書無逸先知稼穡之艱難乃逸則知小人之依臣若水通曰此周公作無逸以訓成王之言也蔡沈傳曰依者指稼穡而言小民所恃以為生者也農之依田猶魚之依水木之依土魚無水則死木無土則枯民非稼穡則無以生也乃逸則知小人之依者言及其逸居君位則知小民依稼穡以生也周公謂四民之事惟稼穡最為勞苦古之人君於稼穡艱難先已曉然於心是故居上臨民則不溺於安逸便能知小人之依稼穡朝饔夕飱仰事俯育皆于是而取給如此則凡逰田興作勞民傷財之事一切不敢輕舉自不能不所其無逸矣後世人主生於深宫長於豢養不知閭閻之疾苦無怪其為昏為虐輕棄民財而不知恤也及邦本既㧞而危亡隨之可不懼乎無逸其在祖甲不義惟王舊為小人作其即位爰知小人之依能保惠于庶民不敢侮鰥寡臣若水通曰此亦周公戒成王無逸之言也不義惟王者鄭𤣥曰高宗欲廢祖庚立祖甲祖甲以為不義逃於民間故有此稱而又曰舊為小人也作其即位者謂及其作而即位也言舊為小人居民間之時已知稼穡之艱難及其作而即位則知小民之所依以生者在稼穡故能保愛庶民而於鰥寡之人無父母妻子之養者尤不敢侮而輕忽之也臣謂恤窮之政發於一念之仁人君茍有同胞共與之心則親見困窮疾苦之狀而怵惕惻隠之心自不可遏矣茍能即此一念而擴充之則仁不可勝用而足以保四海矣故人君深居宫中未嘗見稼穡艱難及小民窮苦之狀當令臣下圖其形以進置之座右使常動惻隠之心焉可也君牙夏暑雨小民惟曰怨咨冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寜臣若水通曰此穆王命君牙為大司徒之言也祁大也怨在心而咨發於慨嘆也艱者飢寒之艱易者衣食之易暑雨祁寒天時之常而小民怨咨者自傷其生之艱難也厥惟艱哉嘆小民誠為艱難也思念其飢寒為生之艱為之制産薄歛而衣食之以圖其生之易民豈有不安乎穆王告君牙以養民之難有如此臣謂民生之難易係於為人上思與圖之一念耳是上之一念乃萬民性命之主也可不重留心而加之意乎詩小雅鴻鴈鴻鴈于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡臣若水通曰此周室離散之民因宣王能勞來還定而安集之故喜之而作此詩也鴻鴈之大者肅肅羽聲也之子流民自相謂也征行也劬勞病苦也矜憐也老而無妻曰鰥老而無夫曰寡夫君者民之父母一民失所如赤子之失乳哺非人君父母之心也周室中衰萬民離散劬勞鰥寡窮亦甚矣宣王中興撫而恤之勞來還定而安集之亦可謂有仁心者矣作是詩追叙其始興起而言鴻鴈之飛則肅肅其羽矣而我離居蕩析則劬勞于野矣然相與劬勞于野者皆可矜憐之人而所矜憐者於鰥寡之窮民猶宜重致其哀恤也然鴻鴈之謠方已而黄鳥之詩復作有初靡終者何歟葢宣王之仁特鼓舞於一時而本之一心者未能至誠而無間耳使本諸心者至誠而無間如文王之止於仁焉則將視民如傷保民如子乾乾而不息矣寜有仁於始而不仁於終邪故治必本於仁仁必本於至誠不息而悠久矣禮記王制曰少而無父者謂之孤老而無子者謂之獨老而無妻者謂之鰥老而無夫者謂之寡此四者天下之窮而無告者也皆有常餼臣若水通曰聖人之治天下不能保其無鰥寡孤獨之窮民也聖人之政能使之有養而已故堯之不虐無告文王不敢侮鰥寡此先王恤窮之政也故王制有常餼以養之然後無一物不得其所而仁覆天下矣國家仁厚之澤下及孤老無告之人甚渥也府州縣設為養濟院而又嵗時有給賜焉固無有一夫之不被者矣然臣猶恐深山窮谷之中頽簷破屋之下或有困窮之民無力以自致於養濟而吏胥索錢莫之恤者矣我聖明其亦軫念之乎周禮秋官大司冦以肺石達窮民凡逺近惸獨老幼之欲有復於上而其長弗達者立于肺石三日士聽其辭以告于上而罪其長臣若水通曰此周禮秋官之職也君門咫尺萬里使下情壅蔽則雖有欲赴愬于王者孰從而上達邪于是立之以肺石凢逺近惸獨老幼窮民之無告者欲愬于上而長令不以聞則使立於肺石之上至於三日之久則真情得矣然後士師聽其辭以告于上而罪其長吏焉何則君腹心也民四體也四體受病而腹心弗察此身心不相聫属者莫大之症矣先王灼知乎此必使之相通則民隠無不達而後人君恤窮之心可盡而窮民得其所也為人君者其可忽諸孟子春省耕而補不足秋省歛而助不給臣若水通曰此孟子引晏子對齊景公逰觀之典以為宣王告也損下益上益也而謂之損損上益下損也而謂之益者何也百姓足君孰與不足百姓不足君孰與足故先王一廵狩之行必省乎民春補其種秋助其收所以恤乎不足不給者也至於家給人足則君之藏富於民者亦厚矣非自足之道乎夫耕者民之業歛者國之用業無常盛而用有常入非人君知損益之道者其孰能軫念之哉左傳僖公十三年晉薦饑使乞糴于秦秦伯謂子桑與諸乎對曰重施而報君將何求重施而不報其民必攜攜而討焉無衆必敗謂百里與諸乎對曰天災流行國家代有救災恤鄰道也行道有福㔻豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟于晉自雍及絳相繼臣若水通曰荐饑者連年饑饉也乞糴于秦者使使告糴于秦國也子桑公孫枝也百里百里奚也㔻豹在秦者㔻鄭之子豹奔于秦也雍秦都絳晉都相繼者運粟不絶也夫晉之乞糴于秦其難亟矣百里奚以救災恤鄰為道仁人之言矣異哉子桑之為秦伯謀乎方施之而遽責報之既責報之又欲俟其攜而討之於恤鄰之義何有丕豹之請則又甚焉然晉饑秦輸之粟秦饑晉閉之糶則晉之負義於天下何以為覇哉宣公二年初宣子田於首山舍于翳桑見靈輙餓問其病曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉寘諸橐以與之既而與為公介倒㦸以禦公徒而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡也臣若水通曰宣子晉大夫靈輙晉人田首山田獵於晉之首山也食之者宣子賜輙以食也舍其半既食乃留其半也宦三年者出外宦學三年問其名居問其姓名與所居也不告而退不望報故不告而去也昔人有一飯之恩必報睚眦之怨必償者此淺丈夫者之所為也若趙宣子之施靈輙恤翳桑之餓而遺及其母無所為而施者也靈輙之報宣子不言其名居而遂自亡無所為而報者也無所為而施報者天理也臣故書之以為恤窮者之法焉國語魯語魯飢臧文仲言於莊公曰夫為四鄰之援結諸侯之信重之以婚姻申之以盟誓固國之艱急是為鑄名器藏寳財固民之殄病是待今國病矣君盍以名器請糴於齊公使文仲以鬯圭與玉磬如齊告糴齊人歸其玉而予之糴臣若水通曰臧文仲魯大夫臧孫氏名辰援所攀援以為助也申重也名器鍾鼎也寳財玉帛也殄絶也市榖曰糴鬯圭祼鬯之圭長尺二寸有瓉以祀宗廟玊磬鳴璆也夫名器寳財鬯圭玉磬皆國之寳也而民惟邦本則重寳矣卿大夫國之貴臣也而得夫丘民為天子則為至貴矣夫天之立君承以大夫師長凡以為民也民饑國病則主憂臣辱此臧文仲所以請往莊公所以不愛圭玉而告糴於齊齊反玉而與之糴皆得濟窮之道矣君天下者其可不念困窮之民而亟思所以濟之之術哉漢章帝建初八年以侍中鄭𢎞為大司農在職二年所省息以億萬計遭天下旱邊方有警民食不足而帑藏殷積𢎞又奏宜省貢獻减徭費以利飢民帝從之臣若水通曰一民之饑由己饑之故子惠困窮人主矜恤之仁也天下旱災民食不足窮亦甚矣顯宗從鄭𢎞之言省貢减費以利饑民可不謂之仁君乎齊武帝求明十一年九月壬寅魏孝文帝至泗州道路民有跛眇者停駕慰勞給衣食終身臣若水通曰孟子云今人乍見孺子將入於井皆有怵惕惻隠之心又曰凡有四端於我者知皆擴而充之矣若火之始然泉之始達茍能充之足以保四海茍不充之不足以事父母魏文見道路民有跛眇者停駕慰勞給之衣食不可謂無惻隠之心矣茍能由此心擴而充之則保四海之民而衣食之無難也今特施於道路之所見則夫天下之所不見者多矣可得而盡衣食之耶故人君恤窮之政由其所見以達於其所不見則仁覆天下矣唐高祖武徳九年冬十月甲申民部尚書裴矩奏民遭突厥暴殘者請户給絹一疋太宗曰朕以誠信御下不欲虚有存恤之名而無其實户有大小豈得雷同給賜乎於是計口為率臣若水通曰易曰有孚惠心勿問元吉太宗之愛民而不徇其名可謂有孚矣易户給而為口給其惠廣矣夫君之於民猶父母之於子也察其飢寒而體悉之周父母之心豈有為名哉人君以父母斯民為王道則凡恩出於上而及於下者非有所為而為之也必如此然後可以為民父母矣唐中宗嗣聖二十一年四月李嶠上疏以為天下編户貧弱者衆造像錢見有一十七萬餘緡若將散施拯飢寒之弊省勞役之勤霑聖君生育之意人神胥悅功徳無窮臣若水通曰聖帝明王未有不加志於窮民者也武后陰悍女主惟思竭財佞佛以求福而天下之貧窮何暇恤也李嶠乃欲散造像之錢而拯飢寒之弊其仁民之深意不以亂世而少變豈非忠義之臣哉唐代宗永泰元年三月左拾遺洛陽獨孤及上䟽曰今陛下師興不息十年矣人之生産空於杼軸擁兵者第館亘街陌奴婢厭酒肉而貧人羸餓就役剥膚及髓長安城中白晝椎剽吏不敢詰官亂職廢將墮卒暴百揆隳刺如沸粥紛麻民不敢訴於有司有司不敢聞於陛下茹毒飲痛而無告陛下不以此時思所以救之術臣實懼焉臣若水通曰兵擾則民窮民窮則變生故在上者不可無恤之之政也獨孤及憫時哀窮上䟽極言欲其急思所以救之之術可謂盡忠於代宗者也至讀剥膚及髓茹毒飲痛之言則為之掩卷太息流涕不忍復觀之矣唐代宗永泰元年四月裴諝入奏事上問㩁酤之利嵗入幾何諝乆之不對上復問之對曰臣自河東來所過見菽粟未種農夫愁怨臣以為陛下見臣必先問人之疾苦乃責臣以營利臣是以不敢對也上謝之唐僖宗乾符元年春正月丁亥翰林學士盧攜上言以為臣竊見闗東去年旱災自虢至海麥纔半收秋稼幾無冬菜至少貧者磑蓬實為麵蓄槐葉為虀或更衰羸亦難收拾常年不稔則散之隣境今所在皆飢無所依投坐守鄉閭待盡溝壑其蠲免餘稅實無可徴而州縣以有上供及三司錢督趣甚急動加捶撻雖撤屋伐木雇妻鬻子止可供所由酒食之費未得至於府庫也或租税之外更有他徭朝廷儻不撫存百姓實無生計乞勅州縣應所欠錢税並一切停徴以俟蠶麥仍發所在義倉亟加賑給至春深之後有菜葉木芽繼以桑椹漸有可食在今數月之間尤為窘急行之不可稽緩敕從其言臣若水通曰裴諝告代宗以農夫愁怨之情盧攜告僖宗以窮民窘急之狀皆可謂恤乎民而忠於君者矣二帝聞之其有不為之流涕者乎人君為民父母何為而使民至于此極哉葢由不知天地萬物一體之仁視民之休戚若無與於已故耳後之人君當以此為鑒哉周太祖廣順元年夏四月壬辰朔濵淮州鎮上言淮南饑民過淮糴榖未敢禁止詔曰彼之生民與此何異宜令州縣津鋪無得禁止臣若水通曰五覇葵丘之盟猶曰無遏糴後世一遇饑嵗往往以閉糴為先何不仁之甚哉周太祖曰彼之生民與此何異何其公也曰無得禁止何其仁也可謂有不忍人之心而惠及於鄰國者矣其亦賢矣哉格物通卷九十七
