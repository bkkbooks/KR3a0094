body:
  text: 格物通卷八十四明湛若水撰馬政詩魯頌駉駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黃以車彭彭思無疆思馬斯臧臣若水通曰此詩言僖公牧馬之盛由其立心之逺也駉駉腹幹肥張之貌林外謂之坰彭彭盛貌思無疆言其思之深廣無窮也臧善也記曰問國君之富數馬以對則馬之盛衰其有關於國家之盛衰矣僖公之馬薄言其在坰者有驈皇驪黃而色無不備以車彭彭而力無不齊是豈偶然而致哉蓋由其立心逺大無見小欲速之私故思及於馬凡所以牧養而調用者不狥私以廢法故馬之在官在民者各無不善矣茍立心不逺輕謀淺慮則凡施之國家大小皆無成矣豈獨一馬政哉伏惟聖明於思無疆之學益深講求以為蓄牧富強之本焉禮記月令曰游牝别羣則縶騰駒班馬政臣若水通曰此仲夏之令也别羣者離其羣也季春游牝於牧至仲夏妊孕已遂故别羣也縶維之也騰駒者騰躍之駒也於此時繫騰躍之駒恐踶囓以傷其孕也二者皆以遂長養也班布也馬政養馬之政令也月令曰是月也天子乃教於田獵以習五戎班馬政臣若水通曰此季秋之令也先王於季秋之月天氣平和之時教人田獵以逐禽獸因以習五戎之事即車攻所謂因田獵以選車徒者也斯時也又班布馬政必齊色度力然後同乘焉夫田獵所以得利人之所欲莫甚於利者軍戎所以效死人之所惡莫甚於死者以所惡寓所欲而習焉先王之深意也然必繼之以班馬政者蓋行獵必以車駕車必以馬故必班馬政比乘車然後田獵之事可因之而舉而軍戎之教寓於其中矣今天下雖無事然不可忘戰而馬政亦所當修有太僕之官以專其事有御史之烙以稽其弊蓋亦嘗備矣伏惟聖明嚴加戒飭以復先王之遺意焉周禮夏官馬質掌質馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈綱惡馬臣若水通曰此周禮夏官之政也馬質官名質平也主買馬而平其價者也謂之量三物者别三馬之材有髙下之等必有以量之然後可以知其賈也其材力可以供兵戎之事者曰戎馬可以供田獵之事者曰田馬以至駑馬則駑下之材所以供冗事也三者皆有物賈焉曰綱惡馬者以索綱而縶之使不得奔逐蹄齧也此先王養馬之政布在方冊後之人主果能行之則馬生日蕃而軍國之用無窮矣校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物凡頒良馬而養乘之乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廄廄一僕夫六廄成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫天子十有二間馬六種邦國六間馬四種家四間馬二種凡馬特居四之一春祭馬祖執駒夏祭先牧頒馬攻特秋祭馬社臧僕冬祭馬步獻馬講馭夫臣若水通曰此亦周禮夏官之馬政也校人掌蕃育之官也種馬者上善似母者也物猶色也毛色之不同也六馬者玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役也師圉趣馬馭夫僕夫皆掌馬之官吏也良馬者即五路之馬也乘馬四馬也四馬故四圉而一師也由師而上以至左右校則良馬一種為匹四百三十二五種凡二千一百六十七匹也駑馬三之則為匹千二百九十六五良一駑凡三千四百五十六匹而王馬大備矣麗也者耦也八皆當作六駑馬師十二匹則馭夫四百三十二匹矣夫然後三之其無僕夫者不駕於五路卑之也間猶闌也十二間者六廄成校校有左右也六間者齊馬道馬田馬為三間而駑馬三之也四間者良馬一駑馬三也四種二種何也四種無種與戎二種田與駑也特居四之一者為牝三也欲其生之衆也馬祖天駟也執駒者春通淫之時駒弱恐乘匹傷之也先牧始養馬者也攻特者為其蹄囓不可乘用也馬社始乘馬者也馬步神之為馬灾害者也講馭夫者簡練習熟馭馬之人也左傳莊公二十九年春新作延廄書不時也凡馬日中而出日中而入臣若水通曰不時者非作廄之時也凡馬凡養馬之法也日中者春分秋分也春分則芻繁而馬牧于野秋分則水寒而馬還於廄也書新者則前此未有也書新于春非其時也非其時而馬方出而徒以妨農非所以為馬政矣夫馬出入於日中何也所以順天之道因地之宜而盡物之性也延廄之作其意則異乎是矣詩曰秉心塞淵騋牝三千衛文公之所以復國也夫以忘親釋怨如莊公者又烏足以語此哉漢文帝初年廄馬止有百餘匹下取給於邊郡班氏居塞則致馬數千群橋桃居塞則致馬千匹是時內郡之盛則衆庶街巷有馬阡陌之間成群乘牸牝者擯不聚㑹邊郡之盛則三十六苑分置西北邊其良者以給乘輿臣若水通曰動植之物天之所生地之所養而人則參贊裁成焉漢文之時馬不過百餘匹及班氏橋桃馬政一修遂至阡陌成羣夫天地之生養如故也其所以盛衰相逺者則由人爾矣司馬政者當求得如班氏橋桃者任之可也漢景帝時造苑馬以廣用四年御史大夫鄧綰奏禁馬髙九尺五寸以上齒未平不得出關時太僕牧師諸苑三十六所分布西北邊以郎為苑監官奴婢三萬人養馬三萬匹臣若水通曰牧馬之政在嚴法禁明分數而已法禁嚴則馬無妄用而得以盡其材分數明則人有定牧而得以専其責鄧綰所謂馬髙九尺五寸以上齒未平不得出關者其法禁之嚴乎其奴婢三萬人養馬三萬匹者其分數之明乎此所以人專其責馬盡其材而牧馬之所以蕃昌也歟漢武帝征伐四夷益盛養馬以西河上郡為萬騎太守而馬政始掌於郡二千石矣蓄積廄馬有四十萬自遣衛霍之師追胸奴而馬大耗焉晚年乃詔修復馬令以補缺使毋之武備而已臣若水通曰郡二千石掌馬政此其創始乎蓄馬之盛古未有也自此以還而馬大耗於胸奴之逺追矣嗚呼蓄之難而棄之甚易夫武王歸馬放牛留有餘不盡之偹於後也孰謂武帝號為雄材大略之主而乃計不出此耶輪臺之悔蓋亦晚矣語曰前車覆後車戒伏惟聖明察焉漢昭帝元鳳二年令郡國毋斂今年馬口錢又令民有車騎馬一匹者復卒三人是時有馬者閒居則免三人之算有事則當三人之卒其制優異此內郡之制也至於邊郡則縱民畜牧而官不禁臣若水通曰漢初內郡之盛則衆庶有馬阡陌成羣邊郡之盛則三十六苑分置西北而昭帝之時申明舊制并其所謂馬口錢者而去之其意亦善矣昭帝能法祖以修馬政之善如此可以為後世嗣君率由舊章之法矣漢靈帝光和四年春正月初置騄驥廄丞領受郡國調馬豪右辜𣙜馬一匹至二百萬臣若水通曰馬政乃兵戎之重務國之命脉繫焉不可不預為之備也漢至靈帝國事已去始置廄丞領受調馬豪右辜𣙜又從而踊騰其直雖有非子司其事亦末如之何矣有天下者宜鑒戒之唐𤣥宗開元十三年十一月以王毛仲為開府儀同三司初隋末國馬皆為盜賊及邊冦所掠唐初才得牝牡三千匹於赤岸澤徙之隴右命太僕張萬嵗掌之萬嵗善於其職自貞觀至麟德馬蕃息及七十萬匹分為八坊四十八監各置使以領之是時天下以一絹易一馬垂拱以後潜耗大半𤣥宗初即位牧馬有二十四萬匹以王毛仲為內外間廄使張景順副之至是有馬四十三萬匹上之東封以牧馬數萬匹從色别為羣望之如雲錦加毛仲官臣若水通曰唐承周隋離亂之後四方征伐之餘馬政之廢也久矣鳩括殘騎但得赤岸澤之牝牡三千爾及其徙之隴右掌之張萬嵗馬大蕃息有一絹一匹之盛逮至𤣥宗掌之以毛仲馬復大蓄有望如雲錦之美是蓋唐都關中其地宜馬而又監牧之得其人芻牧之有其法是何患乎馬之不盛也後之修馬政者當取法於是焉開元十五年聽突厥於西受降城為互市每嵗齎絹帛數十萬匹就市戎馬以助軍旅且為監牧之種由是國馬益壯焉臣若水通曰馬莫壯於西北以其風氣剛徑而牧地茂碩也唐羣牧之馬既富而又市戎馬以為之種此唐之馬政所以駕秦漢而獨盛也故謂開元天寶時海內富實此非其驗歟唐德宗建中元年市關輔馬三萬實內廄貞元三年吐蕃羌渾犯塞詔禁大馬出潼蒲武關者元和十年伐蔡命中使以絹一萬市馬河曲其始置四十八監據隴西金城平凉天水圓廣千里繇京度隴置八坊為㑹計都領其間善水草腴田廄旋以給貧民及軍吏間及佛寺道館幾千頃十一年廄使張茂宗舉故事盡牧岐陽坊地失業者甚衆十三年以蔡州牧地為龍陂監十四年置臨漢監於襄州牧馬三千二百費田四百頃臣若水通曰天地之性人為貴土地所以養民也戎馬所以衛民也二者並行而不以相害可也故牧地與農畝各有界限牧地必不可耕可耕者必不雜以為牧地則二者有相濟而無相妨矣若德宗之初牧地有定民田有界固無不善矣及張茂宗之為廄使牧馬三千二百費田四百頃則是以其所衛民者而害養民者矣此司其事者所當致謹焉宋太祖以五代時監牧多廢官失其守國馬不蕃息時但有左右飛龍院帝始置養馬之務嵗遣中使諸邊州市馬自是間廄始充矣臣若水通曰五代監牧廢弛而馬不蕃息宋祖市馬修政而間廄始充是故事之廢興皆由乎人匪由乎天也然則修舉廢墜在君臣之責爾宋太宗既平太原遂觀兵范陽得汾晉燕薊之馬凡四萬二千餘匹國馬增多乃詔於景陽門外新作四廄名曰天駟監左右各二以左右飛龍使為左右天廄使間廄使為崇儀使內廄馬既充牣始分置諸州牧養雍熙初禁邊臣於邊外市蕃馬勿得虧其直改太廄院為騏驥院天駟監為天廄坊自河北洛陽至許州鎮監凡十八監又詔北冦未平方資戰騎分遣使臣收買京城諸道私家所産之以下原本闕宋真宗咸平三年羣牧司總內外馬政其後嵗遣判官一人巡行諸監取孳生駒二嵗已上者㸃印之左右騏驥院六坊監止留馬二千餘匹餘皆三月出就牧放秋冬而入其御馬凖備用者在京師臣若水通曰馬之生也日蕃而人之僞也日滋真宗取其駒而㸃印之防𨼆匿也夫隱匿之弊也久矣惟智者為能防其未然而弊可已也然則宋真宗可謂智哉我國家則既行之矣事久法玩在戒飭之而已耳伏惟聖明留神焉宋仁宗時舊制以羣牧司總天下馬政其屬有左右騏驥院分領左右天駟監左右天廄坊其畜病馬有收飬上下監收兵校長有提舉指揮使副使諸監之在外者知州通判兼領之各據芻地列棚並課士卒春夏出牧秋冬入廄孳息有賞耗亡有罰其為條教甚備丁度為群牧使上言天聖中牧馬至十餘萬其後言者以天下無事遂廢八監陜西河東嵗市馬一萬二百尤能補京畿塞下之闕自用兵數年所市馬比常嵗特三之一請下令河東京東京西淮南籍丁壯為兵處有能蓄一戰馬者與免二丁仍不升戶等以備緩急如此則國馬蕃矣臣若水通曰宋制掌馬之官甚備而牧馬之政甚詳丁度請為蓄馬免丁之令修數年市馬之缺亦良策也馬之蕃盛固其宜矣由是而觀馬之盛衰係法之修否司是政者不可不因時以補其弊也宋英宗時唐介知太原請於交城縣置馬監詔比部員外郎崔台符相視得汾州故牧地三千餘頃其千二百餘頃民以租佃者令入租以給寒月芻豆已從介請置監自沙苑發牝馬五百匹往交城帝謂文彥博曰馬政之盡善繇羣牧判官國冀其蕃息以給騎兵遂以台符權群牧判尋詔台符及劉航刪收群牧司敕令臣若水通曰兵之有馬猶身之有足也身非足則無以行兵非馬則無以進知身之不可以無足則知兵之不可以無馬矣唐介之請英宗之言其亦有見於此也乎是故人君之修馬政非以外觀也所以備用也其可不盡心乎宋神宗即位留意於馬政於是樞密使邵亢請以牧馬餘田修稼政以資牧馬之利而羣牧司言馬監草地四萬餘頃今以五萬為率一馬占地五十畝大名廣平四監餘田無幾宜且仍舊而原武單鎮洛陽沙苑淇水安陽東平等監餘田萬七千頃可賦民以芻粟從之又詔河南北分置監牧使以劉航崔台符為之又置都監各一員其在河南者為孳生監凡外諸監並分屬兩使諸監官吏若牧田縣令佐並委監牧使舉劾專𨽻樞密院不𨽻於羣牧制置臣若水通曰周禮圉人掌養馬芻牧之事以役圉師皆屬於大司馬若夫樞密所掌者調度機務大事而以下侵羣牧之職不亦謬乎蓋牧所以放馬者也放之即所以養之爾惟其養之也專則生息多而壯健緩急之用有備矣此神宗即位之初而拳拳於馬政其亦知國之所賴者兵而兵之所賴者馬歟後之為人君欲詰爾戎兵者取法焉可也宋髙宗謂輔臣吕頥浩曰若復孳生馬當就水草地是日條畫於饒州四望山等處以為牧地郡守帶提領選差使臣五員專管牧飬事臣若水通曰髙宗謂兵以馬政為先可謂知守備之要矣然牧之在有其地掌之在得其人有其地而又有其人矣在專其任知斯三者則唐之雲錦成羣之效豈不可見哉為人君修馬政者宜知此三要焉否則徒文具爾國朝洪武三十年乙巳曹國公李景隆還自西蕃先是命景隆賫金符往西蕃以茶易馬凡用茶五十餘萬斤得馬一萬三千五百一十八匹至是還命分給京衛騎士操養臣若水通曰周禮夏官卿掌兵而以司馬名之是兵戎之用在於馬古先王未嘗不以此為重也欲修馬政必聖人在上盡人之性而有以盡物之性又必得同心一德之臣以分職於下則芻牧有道而生育蕃息矣我皇祖拳拳留意於馬政兼用前代之善在內地則散於民即宋户馬之令也在邊地則牧於官即唐監牧之制也至於川陜又有茶馬之設豈非宋之市於夷者乎令臣賫符以茶易馬於西蕃歸則分給京衛騎士操養可謂得之不費而處之有方矣夫戎人得茶不能為我害中國得馬足以為我利其潜移默奪之機則密矣但承平日久法玩弊生詰爾戎兵亦聖學中之一事也伏惟聖明體皇祖立法之心為國家先事之圖幸甚國初都金陵設太僕寺于滁州其後定都于北又設太僕寺于京師凡兩淮及江南馬政則屬于南其順天等府暨山東河南馬政則屬于北其後又用言者每府州若縣添設佐二官一員専管馬政在外設行太僕寺於山西陜西遼東凡三處苑馬寺亦三處陜西甘肅各轄一監二十四苑遼東僅一監二苑焉內地則民牧以給京師之用外地則官牧以給邊方之用又於四川陜西立茶馬五司以茶易蕃戎之馬亦用以為邊備臣若水通曰此我朝國馬之制也夫國之大事莫大於戎戎之所急莫急於馬故我朝於戎馬之政尤甚詳焉其地屬有南北各以其便以茶易馬又有其法自內及外周悉詳備此馬之用所以無乏絶也然今之蕃育生息不知能如國初之盛者乎其所司之官不知能如前之得人乎修廢振弊惟在聖明之一心爾格物通卷八十四
