body:
  text: 格物通卷六十八明湛若水撰課功下隋文帝開皇元年岐州刺史安定梁彦光有惠政隋主下詔褒羙賜束帛及御傘以勵天下之吏久之徙相州刺史岐俗質厚彦光以靜鎮之奏課連爲天下最時又有相州刺史陳留樊叔畧有異政帝以璽書褒羙頒示天下徵拜司農新豐令房恭懿政爲三輔之最帝賜以粟帛累遷徳州司馬帝謂諸州朝集使曰房恭懿志存體國愛飬我民此乃上天宗廟之所佑朕若置而不賞上天宗廟必當責我卿等宜師範之因擢爲海州刺史由是州縣吏多稱職百姓富庻臣若水通曰奏課奏計帳及輸籍也隋志每元㑹諸州悉遣使赴京師朝集謂之朝集使夫人性好善而惡惡也勸之以其善懲之以其惡君之責也賞罰之典也有功不賞有罪不罰雖堯舜無以治天下也故賞其善所以戒不善賞一人而千萬人勸矣隋之課功而賞其最者三人開皇之治吏稱民安豈非勸懲之效歟人君欲使民勸顧已之賞罰何如爾道豈逺乎哉法豈多乎哉開皇五年二月始令刺史上佐每歲暮更入朝上考課臣若水通曰上佐謂長史司馬也唐虞之法明試以功車服以庸夫庸者民功也民功莫大於教化而簿書期㑹次焉後世之課功惟以獄訟之平反㑹計之遲速而催科政拙斯爲下下矣則其所謂功者其亦異於古乎噫課功旣異乎古欲得古賢才而用之不亦難哉夫取賢於簿書期㑹而不責效於教化之本此古今之所以異治也歟開皇十一年二月平鄉令劉曠有異政以義理曉諭訟者皆引咎而去獄中草滿庭可張羅遷臨潁令高熲薦曠清名善政爲天下第一上召見勉之謂侍臣曰若不殊奬何以爲勸優詔擢爲莒州刺史臣若水通曰古之治者先徳教而後刑罰故人知恱恱者出其本心也後之治者先刑罰而後徳教故人知畏畏者非其本心也劉曠以義理諭人而使民無訟其所謂道徳齊禮而有恥且格者邪人君察天下之令有如曠者崇奬而超擢之其所以勸天下之守令以勸天下之民心者至矣夫使天下之民心知勸治之極也煬帝大業二年制百官不得計考増級必有徳行功能灼然顯著者進擢之臣若水通曰計考増級所謂拘於資格之常也徳行功能則非資格所能拘矣用人而拘以資格之常則賢能者滯於下位僥倖者循次而上升賢否莫辨以是治國雖堯舜不能致理矣隋煬帝不足道也孰謂其有此善法乎雖然記曰取人以身煬帝之荒淫旣無其本雖有堯舜之善法不能用矣後之人君欲爲天下得其人者姑取其法行之不以人廢言可也唐太宗貞觀三年房𤣥齡王珪掌内外官考治書侍御史權萬紀奏其不平上命侯君集推之魏徵諫曰𤣥齡珪皆朝廷舊臣素以忠直爲陛下所委所考旣多其間能無一二人不當察其情終非阿私且萬紀比来恒在考堂曽無駁正及身不得考乃始陳論此正欲激陛下之怒非竭誠徇國也使推之得實未足禆益朝廷若其本虚徒失陛下委任大臣之意臣所愛者治體非敢茍私二臣上乃釋不問臣若水通曰𤣥齡王珪在唐所謂忠直大臣也惟忠與直則考課之是非當不忒也然而知人則哲惟堯其難萬紀欲指其失以濟一己之私怨以太宗知二臣之深且猶惑焉甚矣讒人之易以蠱人主也向㣲魏徵之辨則貞觀之治未可知也故考天下之君子小人者銓衡之責也而考大臣之君子小人則存乎人君之心耳貞觀十七年上命圖畫功臣趙公長孫無忌等於淩煙閣臣若水通曰唐太宗以文武平定天下大抵得羣賢而用之以共成其功也而圖像二十四人於凌煙以示不忘其酬徳報功之意隆矣其爲功徳之勸豈小小也哉𤣥宗天寳九載祿山獻奚俘八千人上命考課之日書上上考臣若水通曰奚契丹未見罪釁而祿山爲設㑹飲誘而坑之且貪為己功以獻所謂功辜也爲𤣥宗者宜明正典刑以爲擅誅者戒夫何考課之日命書祿山以上上則是非之心不明已動奸雄之竊笑矣他日竄身失國豈獨歸罪於祿山也哉徳宗貞元十年夏四月陸贄論長吏以増户加税闢田爲課績其畧曰立法齊人久無不弊理之者若不知維御損益之宜則巧僞萌生恒因沮勸而滋矣請申命有司詳定考績若當管之内人益阜殷所定稅額有餘任其據户口均减以减數多少爲考課等差其當管稅物通此每户十分减三者爲上課减二者次焉减一者又次焉臣若水通曰地有定數户有消長稅以地定非以户増也漢唐以來時君世主每以増戸加稅爲功必至於刻掊小民之膏脂以爲功也故王成以僞増戸口蒙賞識者至今譏之徳宗之時以加稅爲最而贄獨請以减稅爲最最在民功也嗚呼人君奉天惠民設守令也爲人君者之最守令其可不以民爲功以贄之言爲法也哉班固白虎通曰三嵗一考績何三年有成故於是賞有功黜不肖臣若水通曰三載考績三考黜陟幽明此唐虞之制也固之所云三年賞黜其周制乎成周日成月要歲㑹之法至是三周矣天道朞三百有六旬有六日者亦至是三周將變而閏矣聖人體天人之道而立三載考績黜陟之法所以責有成也我國家立法三年各省來朝即考覈而行黜陟焉其倣成周之制隨時因俗之道至矣宋太宗淳化四年二月置審官院初帝慮中外官吏清濁混淆命官考課號磨勘院至是改爲審官院掌審京朝官其幕職州縣官别置考課院主之臣若水通曰官吏之清濁混淆由在上者無激揚之道而任激揚之責者或無公正之心故清者無所勸濁者無所懲則亦安得而不混淆也宋太宗置審官院誠爲盛舉矣然置院則易得人則難人非難也以難得光明正大之心者也使得是人而有是心焉則所謂仁人能好人能惡人當不以己之愛憎爲人之清濁而天下自平矣國朝洪武二年正月太祖皇帝勅中書省臣曰元末政亂禍及生靈朕倡義臨濠以全鄉曲繼率英賢渡大江遂西取武昌東定姑蘇北下中原南平閩廣越有十六載始克混一每念諸將相從捐軀戮力開拓疆宇有共事而不睹其成建功而未食其報追思前勞痛切朕懐人孰無死死而不朽乃爲可貴若諸將者生建忠勇之節死有無窮之榮身雖沒而名永不磨矣其命有司立功臣廟於雞鳴山序其封爵爲像以祀之臣若水通曰書云徳懋懋官功懋懋賞禮曰以死勤事則祀之以勞定國則祀之此先王崇徳報功之典所以榮生者於前而追死者於後也太祖高皇帝立廟於鷄鳴山所以報諸臣者至矣其亦先王之遺意乎其視麒麟凌煙之圖而無報功之祀典者不可同年而語矣聖子神孫所宜法守焉洪武四年五月丁巳以李守道詹同爲吏部尚書太祖諭之曰吏部者衡鑑之司鑑明則物之姸媸無所遁衡平則物之輕重得其當蓋政事之得失在庻官任官之賢否由吏部任得其人則政理民安任非其人則􅟂官曠職卿等居持衡秉鑑之任宜在公平以辨别賢否毋得庸庸碌碌充位而已臣若水通曰周官冢宰統百官均四海今之吏部即其職也其任最重必得人以司之則任官惟賢惟能而天下治矣不得其人則賢否倒置而天下亂矣人主誠不可不慎擇之也我太祖高皇帝諭李守道詹同爲吏部尚書以衡鑑爲言真切至矣夫鑑者必其本體之明衡者必其本體之平然後能舉以定乎物之妍媸輕重也否則我先不平不明何以正物哉所謂明平者非他也在於吾心也聖祖之見高出漢唐宋之君而上追三代矣伏惟聖明以祖宗爲法天下幸甚洪武十一年河間府知府楊翼安等考績来朝上命吏部曰考績之法所以旌别賢否以示勸懲今官員來朝宜察其言行考其功能課其殿最爲第三等稱職而無過者爲上賜坐而宴有過而稱職者爲中宴而不坐有過而不稱職者爲下不預宴序立於門宴者出然後出庻使有司知所激勸臣若水通曰羞惡者人之良心也故聖人立賞罰之典因其良心而勸懲之耳皇祖諭吏部考績之法立三等之勸懲即成周旌别淑慝之遺意乎有是大政之行而人不知羞惡者無人心者也無人心者非人也使天下之臣庻反求諸心以體認之而得其羞惡是非之實焉則賞罰不必遍於天下而天下知勸懲矣惟聖明留意焉永樂元年十二月丁亥太宗皇帝謂吏部尚書蹇義左都御史陳瑛等曰爲國牧民莫切於守令守令賢則一郡一邑之民有所恃而不得其所者寡矣如其不賢當速去之蓋吏部選授出一時倉卒未能悉其才行必考察所行乃見賢否其令廵按監察御史及按察司凡府州縣官到任半歲之上者察其能否㢘貪之實具奏臣若水通曰守令者國家治亂之所係民物休戚之攸闗也故郎官上應列宿其職尤爲近民茍不得循良之吏以分任之鮮有不受其殃者使天下守令皆非其人則天下之民皆受其殃矣此大亂之道也我太宗皇帝身居九重念及四海拳拳以守令爲言必欲審用之於先而考覈之於後可謂知當務之急者矣伏兾聖明以祖宗之心爲心留意民事綜核吏治俾銓曹慎之於選授之初而撫廵監司察之於蒞官之後則人人知所勸懲矣百姓寕有不安堵者乎本朝三年一朝覲天下布政按察諸司府州縣官吏各齎湏知文冊來朝六部都察院行查其所行事件有未完報者當廷劾奏之以行黜陟舊制官員考滿給由到部考得平常及不稱職者亦皆復任必待九年之久三考之終然後黜陟焉其有緣事降職除名亦許其伸理雖當臨刑亦必覆奏臣若水通曰考以三年察之詳也公也必九年黜陟縁事伸理待之厚也恕也此我朝考績黜陟之法公恕並行者也書曰三載考績三考黜陟幽明萬世課功之原也是故太祖於考滿官員必待九年之久三考之終然後黜陟焉者其有得於此與其後執政者不體祖宗久任賢才之典造生靈之福乃有一考或未及一考而去其官降其任者借使所降所去果中其人猶爲公恕之累也如非其人或有少忤上司即與此例以朝廷之重典爲一人私怨之報何以勸功而懲過哉大明令凡各處府州縣官員任内以戶口増田野闢爲尚所行事蹟從監察御史按察司考覈明白開坐實跡申聞以慿黜陟臣若水通曰郡縣之職所以親民也茍得其人則如赤子之得慈母而民受其福矣我聖祖命臺憲考覈具實跡申聞以慿黜陟所以勵天下之爲郡縣者使各奉其職以宣布徳意而已爾其爲民之意不亦深哉國朝諸司職掌考功部凡六部五品以下官太常寺光祿寺通政司大理寺國子監太僕寺欽天監翰林院太醫院儀禮司屬官歴任三年聽於本衙門正官察其行能驗其勤惰從公考覈明白開寫稱職平常不稱職詞語送監察御史考覈本部覆考其在京軍職文官俱從監察御史考覆各以九年通考其四品以上官員任滿黜陟取自上裁其在外有司官三年考滿給由到京考覈平常稱職者遇缺借除京官亦以九年通考一凡内外入流并雜職應考官員任滿給由赴京本部從實考較才能優劣依例黜陟果有殊功異能超邁等倫者取自上裁臣若水通曰漢唐以下考課之法不同行之不能無弊我聖祖斟酌古制凡内外官三年一考九年通考而黜陟之與唐虞三載考績三考黜陟之法脗合矣夫如是則賢才無淹滯之虞不賢者無僥倖之望而天下治矣其盛矣哉國朝節行事例在京六部太常寺光禄寺通政司大理寺國子監太僕寺欽天監翰林院太醫院屬官五府各衛軍職文官應天府首領并上元江寧二縣官俱從本衙門正官考覈應天府五品以下官從監察御史考覈監察御史從都御史考覈給事中從都給事中考覈東宮官王府官尚寳司中書舍人都給事中儀禮司行人司正官從本衙門將該考官員行過事蹟并應有過犯備細開寫送吏部考覈又曰凡在外府州縣官三年考滿先行呈部移付選部作缺銓註司勲開黄仍令給由其見任官將本官行過事蹟保勘覆實明白攅造文册文簿交付本官親齎如縣到州州官面察言行勤惰從實考覈稱職平常不稱職詞語送府州到府府到布政司亦如之以上俱從按察司考覆仍將各詞語呈部直𨽻府官送監察御史考覈吏部覆考類奏以上三年考滿平常稱職者對品别用不稱者降黜俱以九年通考又曰凡各布政司按察司鹽運司屬官從本司正官考覈按察司首領官從監察御史考覈其餘衙門並從本按察司覆考茶馬鹽課司正官至首領官并在外軍職文官俱布政司考覈按察司覆考布政司四品以上按察鹽運司五品以上正佐官三年考滿給由進牌俱從都察院考覈吏部覆考黜陟取自上裁臣若水通曰自帝舜咨二十有二人之後立考績黜陟之法而課功之典肇於此矣然才徳出衆者固非三考之可拘其庸劣茍容者而亦例以三考進焉安在其能咸熈也故曰執簿呼名一吏足矣蓋事固有時異勢殊者變而通之神而明之存乎其人若夫常格之設可以待常材者耳師其意而不師其迹以成咸熈之績惟在聖明善體祖宗之良法羙意焉格物通卷六十八
