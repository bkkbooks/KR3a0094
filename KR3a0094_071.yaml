body:
  text: 格物通卷七十一明湛若水撰任相下周世宗顯德元年夏四月庚申太師中書令瀛文懿王馮道卒道少以孝謹知名唐莊宗世始貴顯自是纍朝不離將相三公三師之位為人清儉寬宏人莫測其喜愠滑稽多智浮沉取容嘗著長樂老叙自述纍朝榮遇之狀時人往往以德量推之臣若水通曰馮道之失節先儒固已交譏之矣然道之所以處之而不愧人君之所以用之而不疑者蓋由世教衰而學不明是以良心斫喪天理絶滅禮義廉恥不存上下莫知其非耳然則為人君者見如是之人宜誅之擯之以為相臣不忠所事之戒幸勿以為厚德雅量而相之哉顯德四年秋九月中書舍人竇儼上疏以為為政之本莫大於擇人擇人之重莫先於宰相自有唐之末輕用名器始為輔弼即兼三公僕射之官故其未得之也則以趨競為心既得之也則以容默為事但思解密勿之務守崇重之官逍遙林亭保安宗族乞令即日宰相於南宮三品兩省給舍以上各舉所知若陛下素知其賢自可登庸若其未也且令以本官權知政事朞歲之間察其職業若果能堪稱其官已高則除平章事未高則稍更遷官權知如故若有不稱則罷其政事責其舉者臣若水通曰宰相係天下之重非得人之難而知人之為難也使其知之真則如湯之於伊尹高宗之於傅說文王之於太公一旦用之於畎畝板築漁釣之間何有不可若非知之之明則從竇儼之說先以本官權知政事朞歲察其職業之稱乃遷其官否則罷之庶幾為不失人也然此亦我祖宗之所已行者惟聖明圖之顯德六年帝嘗問大臣可為相者於兵部尚書張昭昭薦李濤上愕然曰濤輕薄無大臣體朕問相而卿首薦之何也對曰陛下所責者細行也臣所舉者大節也昔晉高祖之世張彥澤虐殺不辜濤纍疏請誅之以為不殺必為國患漢隱帝之世濤亦上疏請解先帝兵權夫國家安危未形而能見之此真宰相器也臣是以薦之上曰卿言甚善且至公然如濤者終不可置之中書濤喜詼諧不修邉幅與弟浣俱以文學著名雖甚友愛而多謔浪無長幼體上以是薄之臣若水通曰張昭之薦李濤曰臣所薦者大節也漢隱帝之世濤上疏請解先帝兵權此真宰相器也夫既請解先帝兵權可謂忠於漢矣而復事周其大節與忠安在也其無忠節於漢安有忠節於周耶大抵五代之臣多忘君事讎以為常宜其兄弟謔浪習以成風因恬而不知天理滅矣張昭李濤其事相類宜其以此而薦彼也世宗雖善其言而終不取其人意者其在此乎賈誼新書曰大相上承大義而啓治道總百官之要調天地之宜正身行廣教化修禮樂以美風俗兼領而和一之以合治安故天下失宜國家不治則大相之任也臣若水通曰天下一人而已天子是也天子下一人而已大相是也大相得其人則天地宜國家治大相不得其人則天地失宜國家喪亂是故大相不可以不擇也為人君者其鑑於此哉韓文愈曰愈聞周公之為輔相其急於見賢也方一食三吐其哺方一沐三捉其髮當是時天下之賢才皆已舉用姦邪讒佞欺負之徒皆已除去四海皆已無虞九夷八蠻之在荒服之外者皆已賔貢天災時變昆蟲草木之妖皆已銷息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徵嘉瑞麟鳳龜龍之屬皆已備至而周公以聖人之才慿叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而已豈復有賢於時百執事者哉豈復有所計議能補於周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沭矣豈特吐哺捉髮之勤而止哉維其如是故于今頌成王之德而稱周公之功不衰臣若水通曰為相以用人為務用人以好賢為急何者其心好之則不得不急見而用之矣故韓愈稱周公見賢則一飯三吐其哺一沐三握其髮其急於求賢如此此周公之所以聖而賢才之所以盛治之所以成也歟後之為君者當求如是好賢之相為相則天下治矣栁文梓人傳曰裴封叔之第在光德里有梓人欵其門願傭隟宇而處焉所職尋引規矩繩墨家不居礱斫之器問其能曰吾善度材視棟宇之制高深圓方短長之宜吾指使而羣工役焉捨我衆莫能就一宇故食於官府吾受祿三倍作於私家吾收其直大半焉他日入其室其牀闕足而不能理曰將求他工余甚笑之謂其無能而貪祿嗜貨者其後京尹將飾官署余往過焉委羣材㑹衆工或執斧斤或執刀鋸皆環立嚮之梓人左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趨而左俄而斤者斫刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢愠焉畫宮於堵盈尺而曲盡其制計其毫釐而構大厦無進退焉既成書於上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣繼而歎曰彼將捨其手藝專其心智而能知體要者歟吾聞勞心者役人勞力者役於人彼其勞心者歟能者用而智者謀彼其智者歟是足為佐天子相天下法矣物莫近乎此也彼為天下者本於人其執役者為徒𨽻為鄉師里胥其上為下士又其上為中士為上士又其上為大夫為卿為公離而為六職判而為百役外薄四海有方伯連率郡有守邑有宰皆有佐政其下有胥吏又其下皆有嗇夫版尹以就役焉猶衆工之各有執伎以食力也彼佐天子相天下者舉而加焉指而使焉條其綱紀而盈縮焉齊其法制而整頓焉猶梓人之有規矩繩墨以定制也擇天下之士使稱其職居天下之人使安其業視都知野視野知國視國知天下其逺邇細大可手據其圖而究焉猶梓人畫宮於堵而績于成也能者進而用之使無所德不能者退而休之亦莫敢愠不衒能不矜名不親小勞不侵衆官日與天下之英才討論其大經猶梓人之善運衆工而不伐藝也夫然後相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循跡而慕曰彼相之才也士或談殷周之理者曰伊傅周召其百執事之勤勞而不得紀焉猶梓人自名其功而執用者不列也臣若水通曰栁宗元梓人之喻可謂得為相之體矣書曰昧昧我思之若有一個臣斷斷猗無他技又曰人之有技若已有之人之彥聖其心好之不啻若自其口出實能容之其得為相之道乎故為宮室者規矩繩墨司其用其環立奔左右者司其能其怒而退者司其勸懲其畫宮于堵者司其規模而梓人獨若無所技能焉然其成也獨書其姓字者何哉大匠不自用其技能而衆工之技能皆其技能也故為相者不自任其聰明而天下之聰明皆其聰明也雖然為相之體宗元能言之而為相之道則宗元未必知也惟知聖學者知之宗元非其人矣然亦不以人廢言可也宋太宗端拱元年以趙普為太保兼侍中呂䝉正同平章事帝欲相呂蒙正以其新進藉趙普舊德為之表率㑹普以籍田入朝帝遂留為太保兼侍中蒙正質厚寬簡有重望以正道自持遇事敢言每論時政有未允者必固稱其不可帝嘉其無隱故與普俱命普開國元老蒙正以後進歷官一紀進同相位普雅重之臣若水通曰周官三公官不必備惟其人苟得其人耆舊可也新進亦可也茍不得其人不必備亦可也惟其賢而已矣庸知新進與耆舊之人也哉故趙普蒙正之並用亦惟其德爾䝉正有天下重望豈必待普以為之重哉史蓋誤之矣宋神宗元豐八年哲宗即位司馬光自洛入臨夏五月詔求直言光居洛十五年天下以為真宰相田夫野老皆號為司馬相公婦人女子亦知其為君實也神宗崩光欲入臨避嫌不敢時程皓在洛勸光行乃從之衛士見光皆以手加額曰此司馬相公也所至民遮道聚觀馬至不得行曰公無歸洛留相天子活百姓光懼亟還臣若水通曰孟子云仁者宜在高位不仁而在高位是播其惡於衆也朝廷建相所以仁天下也茍加之於所非望之人則是亦不仁天下也必求合天下之望者而後從而與之則與之者非吾與之也天下共與之也非以天下之位與人也是以仁人與天下也光自居洛時天下以為真宰相者十五年于兹矣雖田夫野老婦人女子亦知賢之願以為相信可謂孚天下心而為天下望矣及為門下侍郎四海拭目以觀新政自是言路一開新法漸革正人見用生民復蘇天下之望竟不孤也嗚呼人君為天下求賢相而必得如光者用之庶乎為天下得人矣為天下得人者斯可謂之仁矣宋理宗端平三年六月葛洪免召崔與之參知政事不至與之上疏曰天生人才自足以供一代之用惟辨其君子小人而已忠實而有才者上也才不高而忠實存者次也用人之道無逾于此帝嘉納之臣若水通曰聖君賢相之治天下無他道在得人而已矣夫治非自治治之者人也亂非自亂亂之者人也故孔子曰為政在人取人以身此崔與之所以於理宗之召雖不至而必進君子小人之辨也若與之辨忠實而有才與才不高而忠實為二等然未有忠實而不才者也易曰貞固足以幹事大學言無他技而有容漢之周勃重厚少文皆足以當大任者矣與之知理宗不足以有為至帝親七札而不起真可謂所不召之臣歟宋儒程頥應詔上英宗皇帝書曰夫以海宇之廣億兆之衆一人不可以獨治必賴輔弼之賢然後能成天下之務夫圖任之道以慎擇為本擇之慎故知之明知之明故信之篤信之篤故任之專任之專故禮之厚而責之重擇之慎則必得其賢知之明則仰成而不疑信之篤則人致其誠任之專則得盡其才禮之厚則體貌尊而其勢重責之重則自任切而功有成是故推誠任之待以師傅之禮坐而論道責之以天下治隂陽和故當之者自知禮尊而任專責深而勢重則挺然以天下為己任故能稱其職也臣若水通曰程頥言人君之於相知明信篤任專禮厚而責之重皆本於慎擇真知言乎蓋慎擇而知信之則其禮厚責重自有不能己者矣大臣任天下之重其能辭乎故成湯三聘伊尹聿求元聖此伊尹所以任天下之重也乎象山陸九淵曰燕昭王之於樂毅漢高帝之於蕭何蜀先主之於孔明苻秦之於王猛相知之深相信之篤這般處所不可不理㑹讀其書不知其人可乎臣若水通曰九淵之言引而不發臣以為上下之道感應而已矣感應之道不可强也其心一也其理一也夫然後能感應易曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩故四君之於四臣蓋相得於感應感應蓋本於一心一理同聲氣者也易曰上下交而其志同也其可以聲音笑貌為之哉君相之道其深矣可不念乎西山真德秀曰欲諫其君者必先能受人之諫儻在己則知盡言以諫君而於人則不欲盡言以諫我是以善責君而未嘗以善責己也其可乎哉故為大臣必以羣下有言為救己之過而不以為形己之短以為愛己而不以為輕己以為助己而不以為異己然後可稱宰相之度矣臣若水通曰大學云所藏乎身不恕而能喻諸人者未之有也故宰相能正己然後能正君能取正直之言以善乎己然後能進正直之言以善其君真德秀之言切當矣為人君者安得如是之人以為相哉惟聖明其留意焉幸甚國朝洪武十三年十月敕四輔官王本等曰自胡惟庸不法之後特召天下賢才而有司又多泛舉尚書范敏獨能薦卿等以輔朕朕視卿等皆高年篤厚故九月告于太廟議立四輔以王本杜祐龔斆為春官杜斆趙民望吳源為夏官惟秋冬官闕以本等攝之是年自春徂秋災異疊見維秋之暮天氣尚暄當諭本等沭浴致齊精勤國務以均四時本等奉命盡誠逮立冬朔風釀寒以成冬令嗚呼天其兆吉人乎感應之機如響斯答古三公四輔論道經邦理隂陽順四時其或有乖戾則曰公輔失職蓋人事有不齊則天應之有如此者卿等尚當竭忠誠以勵厥職庶幾感格天心茍在己之誠一有不至則不足以動人况於動天乎可不慎歟臣若水通曰天道不言以四時之氣而成歲功人君無為以三公四輔而成治化夫君相法天以為治感應之機捷於影響誠不可誣也我皇祖擇名賢以充四輔之官其敕諭拳拳責以竭誠勵職以格天圖治得先王命相之道矣夫人心與天心一也輔相之職在論道經邦燮理隂陽以順四時所謂心學也夫道者中而已矣中者天理之本體也惟中則和輔相能立中和則心誠矣由是啓乃心以沃君心君臣一心則天地位萬物育隂陽有不理四時有不順者乎故相臣之學在於正心輔君之道在於格心伏惟聖明留神焉洪武二十八年六月己丑上御奉天門敕諭文武羣臣曰自古三公論道六卿分職自秦始置丞相不旋踵而亡漢唐宋因之雖有賢相然其間所用者多有小人專權亂政我朝罷丞相設五府六部都察院通政司大理寺等衙門分理天下庶務彼此頡頏不敢相壓事皆朝廷總之所以穩當以後嗣君並不許立丞相臣下敢有奏請設立者文武羣臣即時劾奏處以重刑臣若水通曰天道之所以成歲功者四時五行宣其氣也聖人之所以寧萬邦者三公六卿張其教也職官之設莫善於周未有如秦漢以來所謂丞相者君不明以獨任相不賢以擅權治亂不常無足怪者我皇祖法天為治高見逺慮超出百王之上乃痛革丞相而設六部任六卿佐一人而理天下之務立五府禦四夷以統天下之兵又設都察院以察六卿之政也設通政司以通六卿之政也設大理寺以評六卿之斷也又設六科十三道以紏劾六卿之賢否得失也古之冢宰今之吏部尚書其職也古之司徒今之户部尚書其職也然而周則掌教化今則專理財賦此其損益也古之宗伯今之禮部尚書其職也古之司馬今之兵部尚書其職也周以之統六師平邦國今則掌兵權而兼之五府則聼調而不得專焉此其犬牙相制其意深矣古之司寇今之刑部尚書其職也今則又有都察院大理寺兼審允之焉古之司空今之工部尚書其職也周之所掌者居四民時地利今專理營造工作之務焉分部分職各率其屬如網之有綱如絲之有紀上下相統內外交應彼此頡頏不敢相壓脉絡相通體統不紊庶幾分理於下大權悉歸於上深得周官六典之意而尤密焉是以百六十年來朝廷無紛更之弊臣宰無專擅之禍上安其政下保其位如一日是皆聖祖貽謀之逺也聖子神孫體皇祖之心求得其人而已矣永樂二十二年九月仁廟賜少傅兼吏部尚書蹇義少保兼華蓋殿大學士楊士竒太子少傅兼謹身殿大學士楊榮太子少保兼武英殿大學士金幼孜銀圖書各一其文曰繩愆紏謬仍諭之曰卿等皆國家舊臣祗事先帝二十餘年又事朕於春宮練達老成今朕嗣位之初軍國之務重須卿等協心贊輔凡政事有闕失或羣臣言之而朕未允或卿等之言朕有不從悉用此印密疏以聞其毋憚於再三言之君臣之間盡誠相與庶幾朝無闕政民不失所而朕與卿等皆不負祖宗付托之重義等頓首受命臣若水通曰相者所以佐君以道治天下者也得其人而任之專則治不得其人與任之不專則亂治亂之所由分可不慎乎惟我仁宗有見於此故賜相臣以繩愆紏謬圖書托之重而信之深無以加矣故得以展其忠誠而天下可理也其致雍熙之治而為萬世法者不有本於斯哉伏惟皇上法而行之幸甚永樂二十二年十一月仁宗御西角門閲廷臣誥詞顧謂大學士楊榮等曰卿三人暨蹇夏二尚書皆先帝親任舊臣朕方倚卿等自輔凡朕所行卿等共知其有未善皆當盡言朕觀前代人主一履尊位輒惡聞直言雖素所親信亦皆畏威順㫖諛說取容或有忠良時進一言一有不納則退而杜口以圖自全致令人主因循肆志卒至覆敗今朕與卿等當以此為戒君臣一體始終協心庶幾可以共圖永久因取五人者誥詞親御宸翰增二語云勿謂崇高而難入勿以有所從違而或怠曰此朕實心卿等勉之榮對曰皇上聖德之至臣等其敢不勉臣若水通曰上下交而其志同志同則政出於一而天下治否則不以君日亢而臣日諂而生其亂哉仰觀仁祖委任先朝舊臣親御宸翰君臣之間矢心相與湯之於伊尹成王之於周公何以異哉不勞而成光前之治宜矣聖子神孫其尚取法於斯乎英宗皇帝天資英武益明習政務天下奏牘一一親覽或有毫末差失便能察見凡有發下裁斷李賢等一出至公上知其無私委任益隆凡事不肯輕易即出必召問可否或遣中官來問務得其當然後行是以政事無大差失法度振舉人心警懼平昔放縱者莫不收斂中官惟一二耆舊特加重焉其餘雖寵眷至厚一旦有失即置于法略不假借臣若水通曰孔子論為政曰敬大臣則不眩書曰其侍御僕從罔非正人以旦夕承弼厥辟夫臣有內外性無內外其善心一而已矣在人主慎擇之也英宗皇帝外知李賢之公而委任之內擇耆舊之宦而加重之誠得古人敬大臣正侍從之道矣蓋大臣者有經綸之道有忠貞之節有休戚之義其力足以任重其色足以消邪其德足以變化譬之太陽行空而羣隂盡伏也若夫中官之耆舊老成者其血氣定其閲歷多其持守正其勳名尊使新進近昵之人皆敬而效之以歸於正以旦夕與人主燕處匡其不及繩愆紏謬格其非心尤為親切如丹所近者之必赤也墨所近者之必黑也然而皆本於輔相之賢矣仰惟聖明留意焉格物通卷七十一
