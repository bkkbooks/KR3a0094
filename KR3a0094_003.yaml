body:
  text: 格物通卷三明湛若水撰立志上易臨初九咸臨貞吉象曰咸臨貞吉志行正也臣若水通曰臨卦初九陽明居正遍臨四陰君子臨照小人之情狀故有咸臨之象以其陽剛居正故云貞吉象又發明爻辭之義以為咸臨所以貞吉者以其志行正也以剛德得正位以正為志者也又上與六四近君柔中之人相應則又志於行己之正以正乎小人之不正而其志可大行也臨則羣邪去而大道斯行矣非君子之志之正其能不惑于小人者乎孟子曰惟大人為能格君心之非君正莫不正一正君而國定矣是故人君大臣之志莫大於至正以正朝廷正百官正萬民而王道畢矣恆象曰雷風恆君子以立不易方臣若水通曰雷風相與有恆之象君子觀此以常久其德立者中立不倚三十而立之立有立者道也不易者志也道無定方感而發於事然後義形而方義無窮而志有定吾志之道應萬變之義而不變與天道常運日月常明悠久而無疆何易之有故君子定其志而道義出矣兊九二孚兊吉悔亡象曰孚兊之吉信志也臣若水通曰兊說也以九陽剛居二中為以孚信自守而說者雖比陰柔小人和而不同說而不失剛中故吉而悔亡也於是象又發明爻義云所謂孚兊之吉者蓋九陽剛為孚信二在中為志以孚信存於中心為志存天理之正也故於小人說之以正小人感而說之何悔之有君志莫貴於至誠誠則天下小人革面君子革心而皆我說矣書商書太甲王懋乃德視乃烈祖無時豫怠臣若水通曰此乃伊尹告太甲之言也懋勉怠惰皆謂有志無志也德者心所得之理也烈祖有功之祖謂成湯也伊尹言太甲亦當勉於其德視烈祖之所為所謂日新又新者不可頃刻而逸豫怠惰也夫人之為善在於立志豫怠則其志荒矣其志荒則天理滅而德亡矣故人君當以法祖為志法祖當以懋德為志洪惟我太祖豐功茂烈德庇萬世誠今日聖明之所當法以勉德不可豫怠者也周官功崇惟志業廣惟勤惟克果斷乃罔後艱臣若水通曰此成王申戒卿士果於立志以廣功業之言也事之所成為功心之所存為志志於王者則王矣志於道德者則道德矣志於聖賢者則聖賢矣夫志氣之帥也志之所至氣必至焉豈有志於是而事之所成有不至於是者邪故言功崇者在於志也業廣者在於勤也若能果斷則無後艱之患矣宋儒程皓曰義理不先定則多聽而易惑志意不先定則守善而或移其示人立志之說尤深切矣故果斷則志立志立則勤勤則功崇業廣而可以裕後於無窮矣何後艱之有哉後之聖君賢相欲圖悠久之治者必先自立志始詩魏風伐檀坎坎伐檀兮置之河之干兮河水清且漣漪不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮臣若水通曰此詩人言伐檀者之勵志也坎坎伐斧之聲言用力伐檀將以為車今乃置之河干而無所用不得自食其力矣如不耕則不可以得禾不獵則不可以得獸是以寧甘心窮餓而不素餐也然其勵志何以能若此哉原其志之所存必有在矣非真有以見夫天理之本體富貴貧賤處之一而不少易其志者能之乎志定則守定守定則非其道一介不取非其力一食不受也嗚呼賢哉伐檀之志乎由此推之立此志於學則必為先難而後獲矣立此志於仕則必為先事而後食矣立此志於天下則必為先天下之憂而憂後天下之樂而樂矣故曰不患志之不立惟患心之無見故君子之學必先求見大而後可周頌敬之維豫小子不聰敬止日就月將學有緝熙于光明臣若水通曰此成王既受羣臣之戒乃自為答之之言也小子成王自謂也熙亦明也成王言我不聰而未能敬也然當自勉於學庶幾日有所就月有所將續而明之廓清昏蔽使吾心光大髙明之本體以復可也夫聖學莫先於立志立志莫先於見大見大者非他即天理也天理者非他即吾心之本體也心體本自廣大本自髙明人惟不見此體則志無定向而學有間斷廣大髙明之體失矣成王言學而以緝熙光明為志蓋有以見大矣豈非堯舜禹湯文武心學之傳乎嗚呼賢哉人主誠志乎成王之所志而自求本體之光明則聰明聖智皆由此出何憂乎德不如唐虞治不如三代哉春秋莊公十二年春王正月紀叔姬歸于酅臣若水通曰叔姫歸酅者何明志也曰歸者何明所天也叔姫紀侯之媵妾也酅者紀國之屬邑也叔姬者以宗廟在酅歸奉其祀也夫仁不以盛衰改節義不以存亡易心志定故也天一而已故也叔姫以一婦人尚能全節守義立綱常於萬世其志亦可壯也詩曰髧彼兩髦誓弗二天殆與共姜之節同垂不朽後之賣國降虜奄奄出婦人下其志亦可悲夫禮記禮運曰大道之行也與三代之英丘未之逮也而有志焉臣若水通曰大道之行謂上古道洽之時也三代之英謂名世之臣也當時君臣皆以天下為一身者也未逮而有志謂慕而願學之也慕之故志之志之故學之學之故身有之故曰老者安之朋友信之少者懷之其夫子慕大道之志乎孔子閒居曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉臣若水通曰五至一而已矣何以曰一志而已矣夫志心之之也心有所之而不已焉必形諸言而詩成矣由詩之所至而不已焉必將加于民而禮以動之矣由禮之所至而不已焉必將樂民之樂而樂以和之矣由樂民之樂而不已焉必將憂其將壞而哀思民勤至矣夫由哀以遡于詩而卒本之志焉則人君之志誠萬事之本而不可不立焉者由是推之凡志於正者必無往而不正志於邪者必無往而不邪邪正公私立乎中而以類應于外者若影響焉人君之志可不慎歟是故格物之道審幾要矣立志急焉儒行曰身可危也而志不可奪也雖危起居竟信其志臣若水通曰危起居謂比黨者因事傷之也所謂身危也竟終信不屈也所謂志不可奪也夫立志至身危矣而不可奪焉夫然後謂之志志也者志於道也伸志則伸道矣射義曰天地四方者男子之所有事也故必先有志於其所有事然後敢用穀也臣若水通曰上下四方曰宇古今往來曰宙宇宙內事即已性分內事也此性道渾淪之體也志也者志於此而已矣故男子之生必先懸桑弧蓬矢六以射天地四方而後乃使母食之所以示志也論語子曰吾十有五而志于學臣若水通曰此章聖人自言其進德之序而始之以此也然以此而始亦以此而終夫學莫先於立志而所志莫大乎道志於學即志於道也人之志道如木之有根然株幹花實皆與根一貫者也三十而立志之立也四十不惑志之不惑也五十而知天命窮知此志之藴也耳順從心則極其變化而所志始畢矣然則志也者其聖學始終之要乎故世之學者未有不先定其志能任重而道逺者也然而持志有要焉忘則不及助則過皆非善學也勿忘勿助此孟子之所以善持其志而為學者之所當從事歟子曰茍志於仁矣無惡也臣若水通曰仁與不仁之間不能以髮者也入乎此則出乎彼惡者非仁也吾心之邪念也仁者天理也吾心之中正也人於頃刻之間邪念生焉則為惡而不仁矣頃刻之間而正念生焉則為天理而不仁逺矣故其心誠在於仁隨時隨處體認天理一毫私意亦退聽矣惡念何自而生哉故曰無惡也然則如是何以至於聖乎曰係乎誠否何如耳誠則不已不已則變變則化孟子曰夫仁亦在乎熟之而已有志於仁者其可以不勉乎顔淵季路侍子曰盍各言爾志子路曰願車馬衣輕裘與朋友共敝之而無憾顔淵曰願無伐善無施勞子路曰願聞子之志子曰老者安之朋友信之少者懷之臣若水通曰此章記聖賢言志大小不同而同有所志也子路之車裘共敝乃以物公共於人者也且其仁及朋友耳顔淵之不伐善施勞乃以善公共於人者也其仁所及稍廣矣至於夫子所言之志則物各付物又有以盡天下之人矣其仁蓋與天地萬物為一體者也故程頥曰夫子安仁顔淵不違仁子路求仁由此觀之則孔門之學志於仁而已矣學者欲求聖賢之志同物之仁必先忘子路之車裘乃可以忘顔子之勞善然後聖人天地之志可造矣子曰志於道據於德依於仁游於藝臣若水通曰此章聖人言為學進修之序道德仁藝四者名雖異而實則同天理一而已矣自其天理渾淪而言謂之道志則心之所存惟在乎此而已矣志而後有得自其得天理而言謂之德據則常守之不失據而後有仁自其純於天理而言謂之仁依則與之一而不違自其天理之散殊而言謂之藝游則涵養吾心之天理而已要之始終惟用力於天理耳蓋天理二字乃千聖千賢之大頭腦學者之學聖賢舍此宜無用力者矣子曰三軍可奪帥也匹夫不可奪志也臣若水通曰志者心之所主也三軍之勇其帥可奪者以其機非在己者匹夫雖微其志不可奪者以其機非在人者一成于志天地不能奪而况於人乎使其可奪則不可謂之志矣然其所志必如所謂志於學志於道志於仁斯有實體乃能堅定確乎其不可拔若無所見而徒執守以為志所志者何事邪春秋傳曰吾志其目言有所主也然則欲立其志者又不可無見道之明學問涵養之功左傳襄公二十七年諸侯將盟於宋西門之外楚人衷甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已茍得志焉焉用有信太宰退告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之信亡何以及三臣若水通曰志也者信之主也信也者志之成也楚欲棄信劫盟而求逞志楚誠夷狄也言忠信雖蠻貊之邦行矣民無信不立棄信是棄志也其能有逞乎志立而信行孚及豚魚而况於人乎雖得志行乎中國可也故信者人君之大寶志者行信之大本君天下者可不知所務乎襄公二十七年鄭伯享趙孟于垂隴子展伯有子西子産子大叔二子石從趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志子展賦草蟲趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁趙孟曰牀第之言不踰閾况在野乎非使人之得聞也子西賦黍苖之四章趙孟曰寡君在武何能焉子産賦隰桑趙孟曰武請受其卒章子大叔賦野有蔓草趙孟曰吾子之惠也印假賦蟋蟀趙孟曰善哉保家之主也吾有望矣公孫假賦桑扈趙孟曰匪交匪敖福將焉往若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮其能久乎幸而後亡叔向曰然已侈所謂不及五稔者夫子之謂矣文子曰其餘皆數世之主也子展其後亡者也在上不忘降印氏其次也樂而不荒樂以安民不淫以使之後亡不亦可乎臣若水通曰七子之賦一時之事也然而其志不可掩矣觀其志而吉凶不可逃矣然則君子之於志豈可不立而養之於素也哉昭公二十年齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君子韙之臣若水通曰器與道一道與官一者也故有官守者盡其職有言責者盡其忠是亦道而已矣守其官則與道而俱得判官與道而二之非聖人之所謂道也夫子官道之論聖門合一之㫖也虞人其亦志道之士隱於下位者邪孟子曰志士不忘在溝壑虞人以之格物通卷三
