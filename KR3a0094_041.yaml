body:
  text: 格物通卷四十一明湛若水撰御臣妾上易剝六五貫魚以宫人寵無不利臣若水通曰剝卦一陽居衆隂之上隂受制於陽宫人受制於君也六五后也宫人之長也率其類如魚行之有序以承君之寵也妻道也治家有法而亂階不啓故無不利也非君子之刑于寡妻其能致宫人之順序者如是哉遁九三係遁有疾厲畜臣妾吉臣若水通曰九三下比二隂故有係纍於遁之戒君子之於小人異類也逺之惟恐其不亟也有所係而遁之不速其為危道也必矣惟施之於臣妾則可爾臣妾非可逺也供使令者也以之畜臣妾恩以繫之則得其心而忠於上矣何也彼不知義而知恩也人君恩以御夫臣妾而不失其義焉則得矣書周書伯冏昔在文武聰明齊聖小大之臣咸懷忠良其侍御僕從罔非正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休臣若水通曰此周穆王舉先王謹於僕御臣妾之事以命伯冏為太僕正也聰者無不聞明者無不見齊者齊一聖者通明忠者直也良者善也弼輔也辟君也欽敬也臧善也若順也休美也言文武之君既聰明齊聖而小大之臣又咸懷忠良如此似無待於侍御僕從之承弼者然此時左右奔走皆得正人以承順正救之故於出入起居無時不敬號令無有不善故民敬順而國治美也夫文武君聖臣良尚有賴於侍御僕從之臣如此况其下者乎此穆王所以拳拳於伯冏之命也後世人主視此為賤品而不知擇曾不知朝夕與居氣體移養常必由之所謂潛消默奪於冥冥之中者為功甚多而明爭顯諫於昭昭之際抑末矣伯冏僕臣正厥后克正僕臣諛厥后自聖后德惟臣不德惟臣臣若水通曰此亦穆王命伯冏之辭以見僕御之重也后君也諛佞順也臣即僕臣也自聖自以為聖也言僕臣之賢否係君德之輕重如此不可不擇其人也吕氏曰自古小人之改君德為昏為虐為侈為縱曷其有極至於自聖猶若淺之為害穆王獨以是蔽之者蓋小人之蠱其君必使之虛美薰心傲然自聖則謂人莫已若而欲豫言莫之違然後法家拂士日逺而快意肆情之事亦莫或齟齬其間自聖之證既見而百疾從之昏虐侈縱皆其枝葉而不足論也吕氏之言可謂痛切著明為人君者可不深思而懲戒之乎詩大雅瞻卬哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時惟婦寺臣若水通曰此刺幽王嬖褒姒任奄人以致亂之詩也哲知也城猶國也哲婦蓋指褒姒也長舌能多言者也寺奄人也言男正位乎外有哲則能立國婦人無所事哲哲則能傾人之城矣何者以為懿之哲婦則如鴟梟之隂怪有長舌多言足以為人之危階而禍亂由是而生矣然書曰胥教誨乃賢德之臣也若夫此人言語雖多殊無胥教胥誨之道其惟婦寺乎非特匪教誨而已非譖人之行則壞君之德也由是言之有以知人主之御臣妾不可不明且逺也茍見之不明明之不逺則蔽於近而婦寺之言入之矣豈國家之福哉何也彼婦寺者出入宫掖探知主意常冀其言之或中以假竊威福之柄故甘言悲辭日浸潤於君側人主茍不明心察理聽而信之則變亂是非上召天災下速人禍皆自此始故曰昊天不惠邦國殄瘁幽王往事亦可鑒矣後世乃不此之鑒西漢去此未逺而王莽之禍起於外戚黨錮之亂萌於宦官亦獨何哉成帝之優柔桓靈之暗弱其心之不明且逺無足怪矣然則人主之於臣妾奈何孔子曰惟女子與小人為難養也必莊以蒞之慈以畜之明以斷之斯為得御之之道矣春秋宣公十年齊崔氏出奔衛臣若水通曰春秋書崔氏出奔衛譏齊君無御臣之道也臣下有罪則與衆棄之可也若其無罪恃國之紀綱而自立爾彼崔杼何為而奔衛也髙固畏其逼而逐之也使臣下以力相逐猶為御之有道乎抑不思髙氏既得以逐崔氏則髙氏之強不為崔氏乎曰然則何以書氏槩之於諸崔也崔杼既去國人宜可帖席矣君子則曰禍之生不生於生之之日崔氏之雄於齊者不獨一杼也盤根錯節終有蔓延之理鼠竄狐伏豈無竊窺之勢茍不預為之圖反噬之禍吾知其不免矣故春秋書崔氏以見為崔氏猶在也又以見强臣之宗類於崔氏皆當辨之早也昭公五年宋華合比出奔衛臣若水通曰書華合比出奔衛譏宋公之信讒失御臣妾之道也然則何以曰譏蓋華合比之奔衛宋寺人栁為之也坎牲埋書告以將納亡人之族此栁之中傷合比也宋公聽其言而逐之其心蔽矣嗚呼人君之心惟在於有養養生明明生斷明足以燭奸斷足以克愛雖有百寺人無能投其間矣否則昏淫縱欲日化於宦寵而莫之覺也敗亡之禍如秦之趙髙漢之恭顯唐之王守澄田令孜亦可以鑒矣禮記曲禮曰國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾臣若水通曰御臣妾者莫大於禮禮達而分定故上下能相親而不亂也卿老者貴卿也世婦者兩媵也次夫人貴於妾者也世臣者父之臣也姪娣者妻之兄女及妹也長妾者妾之有子者也卿老也世臣也家相也外之佐也世婦也姪娣也長妾也內之佐也不名之斯重之矣上重之而人不知自重者非人也人知自重而患不消事不成者未之有也內外之政舉而國不治者未之有也是故人君修德行政不敢侮於臣妾焉月令曰命奄尹申宫令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習毋有不禁臣若水通曰此仲冬之政令也奄尹群奄之長也宫令宫中之政令也重閉內外皆閉也淫者女工之過巧也貴戚天子之姻族近習嬖幸者也重閉何也應天地之閉藏也省女工教隂靜以養天地之靜也是故御之得其道而禍亂不作矣緇衣子曰邇臣不可不慎也是民之道也臣若水通曰武王不泄邇蓋謹之於狎侮也夫君德之成由於邇臣之習而民之所瞻又在夫人君之德也是故邇臣必得正直端莊之士道德純備之人以居之則規益既多而君之習染亦日與之化可以為民之具瞻矣否則其禍有不可勝言者此明王之所以必慎而御之也故程頤曰人主一日之間接賢士大夫之時多親宦官宫妾之時少則可以涵養氣質薰陶德性是矣周禮內宰以隂禮教六宫以隂禮教九嬪以婦職之法教九御使各有屬以作二事正其服禁其竒邪展其功緒臣若水通曰古者明王之御臣妾非専威以制之也蓋有禮以教之也教行則內治而姦亂不生故禮者禁於未然者也故六宫治內所以修隂教也隂禮即隂教也六宫一后三夫人九嬪二十七世婦八十一女御主之者一后也言教九嬪則夫人世婦在其中矣九御即女御也婦職之法組紃縫線之事也有屬以九九為屬也二事絲枲之事也正服禁竒邪展功緒所以作之也聖人之御臣妾可謂至矣左傳昭公元年晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉子産曰僑聞之內官不及同姓其生不殖美先盡矣則相生疾君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也男女辨姓禮之大司也今君內實有四姬焉其無乃是也乎若由是二者弗可為也已四姬有省猶可無則必生疾矣臣若水通曰娶同姓者瀆類嬖四姬者蠱心瀆類蠱心是侮於臣妾矣子産原晉平公之疾曰君內實有四姬又曰有省猶可足為人君處妾御者之法矣國語晉語范文子曰昭私難必作臣若水通曰文子晉大夫士燮也私嬖臣妾也昭顯也寵私必去舊去舊必作難書曰德盛不狎侮故私昵之恩聖人戒焉以其示天下以私也夫驕泰以昭厥私其何能久此文子祈死之詞示於宗祝御臣妾者勿寵私昵以釁難召禍焉晉語陽畢曰行權不可以隱於私又曰行權隱於私則政不行政不行何以道民臣若水通曰陽畢晉大夫穆侯唐叔八世之孫桓叔之父也以私恩隱蔽其罪無以正國也道訓也語有之法之不行自貴近者始自古威權不正多隱於私昵隱於私昵則政令不行矣焉有政令不行而可以為君乎平公患寇及身而不能忍於欒氏民何以威不能起瑕原韓魏而賞之民何以懷陽畢之論其忠於晉亦至矣為人君者欲行威令以畏天下者當自不隱於私昵始漢文帝所幸慎夫人在禁中常與皇后同席坐袁盎引却慎夫人坐慎夫人怒上亦怒盎因前說曰臣聞尊卑有序則上下和今既已立后慎夫人乃妾爾豈可與同坐哉陛下獨不見人彘乎上乃說召語慎夫人慎夫人賜盎金五十斤臣若水通曰人君之御臣妾惟其正而已矣尊卑有序天下之至正也故人君愛其嬖妾不可過於寵幸寵幸之過是害之也人彘之禍慘矣人謂吕后殺之而不知乃髙祖殺之也然則盎之引卻慎夫人坐非忠愛慎夫人者哉宜其賜金以酬之也漢安帝建光元年夏四月帝以江京嘗迎帝於邸封都鄉侯封李閏為雍鄉侯閏京並遷中常侍京兼大長秋與中常侍樊豐黃門令劉安鈎盾令陳達及王聖聖女伯榮扇動內外競為侈虐伯榮出入宫掖傳通姦賂司徒楊震上疏曰女子小人近之喜逺之怨實為難養宜速出阿母令居外舍斷絶伯榮往來臣若水通曰甚矣女子小人之難養也御之之道在恩嚴兼濟而已爾安帝不能用楊震之言不勝其閏京迎立之私恩寵過情溺於阿母乳哺之愛而伯榮潛通怙勢恣橫甚至譖廢太子而不能辨安帝之柔暗嚴不勝恩一至於此吁可戒也哉北魏明帝入宫以髙道穆為御史中尉帝姊壽陽公主行犯清路赤棒卒呵之不止道穆令卒擊破其車公主泣訴於帝帝曰髙中尉清直之士彼所行者公事豈可以私責之也道穆見帝帝曰家姊行路相犯極以為愧道穆免冠謝帝曰朕以愧卿卿何謝也臣若水通曰剛正者御近臣之道也公主帝姊也髙道穆帝臣也臣呵帝姊容而自愧臣不以勢撓法君不以情廢法可謂上下兩得其正矣惜乎穢后專權君不得以有為嗚呼人君剛德可少也哉梁武帝大同十一年詔後宫貴妃以下衣不曵地陳宣帝太建九年周詔後宫惟置妃二人世婦三人御妻三人此外皆减之臣若水通曰飲食男女人之大欲也善反之則天理存焉梁武儉於服御周武約於宫嬪其資性蓋近道矣而不能充其類以御萬方聖學之功可少也哉後世號為英君誼辟往往溺情於奉御之私而不能自振者觀此亦可愧矣唐髙祖武德九年八月癸亥詔以宫女衆多幽閟可愍宜簡出之各歸親戚任其適人貞觀二年九月天少雨中書舍人李百藥上言往年雖出宫人竊聞太上皇宫及掖庭宫人無用者尚多豈惟虛費衣食且隂氣鬱積亦足致旱上曰婦人幽閉深宫誠為可愍灑掃之餘亦何所用宜皆出之任求伉儷於是遣尚書左丞戴胄給事中杜正倫於掖庭西門簡出之前後所出三千餘人臣若水通曰人君之御下在順其情而不逆爾聖王之治天下鳥獸魚鱉咸若夫物則亦有然者也而况於人乎人情之順逆取之已而已矣順其情則和逆其情則乖和則和氣可致祥瑞可格而况於人乎乖則戾氣可致災異斯見而况於人乎昔者太王之興也內無怨女唐太宗之心猶太王乎後世頌其盛德焉人君之御宫妾可不法諸唐太宗貞觀二年正月帝謂魏徵曰人主何為而明何為而暗對曰兼聽則明偏聽則暗昔堯清問下民故有苗之惡得以上聞舜明四目達四聰故共鯀歡兜不能蔽也秦二世偏信趙高以成望夷之禍梁武帝偏信朱异以取臺城之辱隋煬帝偏信虞世基以致彭城閣之變是故人君兼聽廣納則貴臣不得壅蔽而下情得以上通也帝曰善臣若水通曰帝王之御天下立於至公至明而已矣惟公故能兼聽惟明故能遍照其要在人君之一心爾心存天理則公公則明明則耳目不蔽於近習故書曰視逺惟明聽德惟聰太宗問明暗之辨而魏徵有兼聽偏信之對可謂當矣使太宗能因徵之言反求於學存天理之公以明諸心焉則何隱弗燭何逺弗届乎惜乎君臣之間徒知明暗之辨而不知本亦徒講說爾宜其明於此而或暗於彼漸不克終有以也夫貞觀二年十二月壬午以黃門侍郎王圭為守侍中上嘗閒居與圭語有美人侍側上指示圭曰此廬江王瑗之姬也瑗殺其夫而納之圭避席曰陛下以廬江納之為是耶為非耶上曰殺人而取其妻卿何問是非對曰昔齊桓公知郭公之所以亡由善善而不能用然棄其所言之人管仲以為無異於郭公今此美人尚在左右臣以為聖心是之也上悅即出之還其親族臣若水通曰人君閨門之私至易溺也人臣房闥之私至難言也郅惲曰父不可得之於子君不可得之於臣而况臣之於君乎太宗之納美人而不知其為廬江殺夫之所致則惑矣然聞言即悟改過不吝非勇於從善者能之邪後世人臣之諫語及房闥人君輒肆加責其愧於太宗逺矣有志修身齊家者當於人言求之貞觀十六年帝嘗指殿下樹愛之殿中監宇文士及從而譽之不已帝正色曰魏徵嘗勸我逺佞人我不知佞人為誰意疑是汝今果不謬士及叩頭謝臣若水通曰孔子曰逺佞人又曰佞人殆蓋佞人者樂阿順事容悅使人君以徇欲為樂而忘理以從利為心而滅義人君於此不辨而逺之危亡之禍至不旋踵矣太宗知宇文士及之佞而正色以折之可謂有御物之明者矣而不能即黜逺之以親正人講正學此太宗所以不得為純德之君也已格物通卷四十一
