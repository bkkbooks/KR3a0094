body:
  text: 格物通卷八十二明湛若水撰屯田上受間田水利附國語周語虢文公曰民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之供給於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦厖純固於是乎成臣若水通曰文公虢仲之後為王卿士粢盛黍稷也即所謂國之大事在祀與戎蕃庶生育冨庶也供給備祀戎之用者也和協輯睦謂交鄰合衆也蕃殖謂積蓄也敦厖純固謂俗厚民安也數者皆取給於農農用不興百事廢矣故為人君者能因虢文公之言而有悟焉則知重農力本而天下國家之財用備矣虢文公曰隂陽分布震雷出滯土不備墾辟在司寇乃命其旅曰徇農師一之農正再之后稷三之司空四之司徒五之太保六之太師七之太史八之宗伯九之王則大徇臣若水通曰旅衆也徇行也滯猶蟄也辟刑也司寇刑官卿一二三四五六七八九者言其行之先後也大徇者帥公卿大夫以徇行農事也夫自天子公卿皆農籍躬行以先天下之農所以教民力本也周以闕農事而興文公之言其有所受之矣治天下者其毋以民事為緩也哉魯語仲尼曰先王制土籍田以力而砥其逺邇賦里以入而量其有無臣若水通曰制土制其肥磽以為差也籍田謂稅也砥平也平逺邇因其道里以為之差而使之平也里廛也以入計其利入多少而量其財業有無以為差也夫先王體國經野田賦有常載之周官若康子以井出賦是以一井之田出十六井之賦民有不堪矣仲尼不答冉有之問而私語先王之典豈非欲其聞之而止也歟為民主者其尚亦思之哉漢武帝征和四年六月桑𢎞羊與丞相御史奏言輪臺東有溉田五十頃以上可遣屯田卒置校尉三人分護益種五穀張掖酒泉遣騎假司馬為斥候募民壯健敢徙者詣田所益墾溉田稍築列亭連城而西以威西國輔烏孫臣若水通曰屯田之事所謂一舉而三善集焉者也足食足兵而民信矣桑𢎞羊計利之臣也其論輪臺屯田一事司國計者有取焉語曰君子不以人廢言後之人君其尚采之哉宣帝神爵元年七月趙充國上屯田奏曰計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上其間郵亭多壞者臣前部士入山伐材木六萬餘枚在水次臣願罷騎兵留步兵萬二百八十一人分屯要害處氷解漕下繕郵亭浚溝渠治隍狹以西造橋七十所令可至鮮水左右田事出賦人二十畝至四月草生發郡騎及屬國胡騎各千就草為田者遊兵以充入金城郡益積蓄省大費今大司農所轉榖至者足支萬人一嵗食謹上田處及器用簿臣若水通曰趙充國興金城之師自急近功者觀之非不可以嵗月下而彼獨持以經久之計者何哉蓋固根本而不輕用乎技擊務全勝而不徒恃乎兵力所謂逸以待勞者也卒之兵食俱足虜不敢窺而乃振旅凱旋此固丈人之師也留田之疏至今流傳度越漢家諸將之上矣老成謀國者宜取法焉漢光武建武十一年朝臣議欲棄金城破羌之西馬援上言不可棄帝從之民歸者三千餘口援為置長吏繕城郭起塢堠開溝洫勸以農桑郡中樂業又招撫塞外氐羌皆來附降臣若水通曰金城破羌之西朝臣皆欲棄之矣然唇齒之勢繫焉馬援獨弗棄又從而經理其務勸課其業使民既內安而夷亦外附則所以脫邊境於左袵為西邊之藩籬者援之功也後之司閫計者能法援之計焉夷夏其寧一矣漢和帝永元十四年春安定降羌燒何種反郡兵擊滅之曹鳳上言宜及此時廣設屯田殖榖富邊國家可以無西顧之憂帝從之拜鳳為金城西部都尉屯龍耆後增屯田列屯夾河合三十四部臣若水通曰降羌之所以背服不常者以其恃有大小榆谷土地肥美也曹鳳廣設屯田之議誠可以絶窺欲之源省委輸之役其利於國家大矣然而三十四部之功垂立而諸羌復叛非其謀之罪也此又不可以成敗論焉漢順帝永建五年夏帝以伊吾膏腴之地傍近西域胸奴資之以為鈔暴三月辛亥復令開設屯田如永元時事臣若水通曰邊地可田而棄之外夷誠所謂賫糧以資盜矣順帝遵永元故事令復屯田則鈔暴可絶邊儲可實一舉而兩得其為國計之利豈小哉漢獻帝建安元年羽林監棗祗請建置屯田曹操從之以祗為屯田都尉任峻為典農中郎將募民屯田許下得穀百萬斛於是州郡例置田官所在積穀倉廩皆滿故操征伐四方無運糧之勞遂能兼并羣雄臣若水通曰曹操屯田之議發之者毛玠定之者棗祗成之者任峻也夫以曹操一姦雄耳當亂離之餘猶能聽從羣謀收富強之效以成兼併之計使明君乘無事之時而圖之以助國計以寬民租則其效之所致豈但如操而已哉漢後主建興四年吳陸遜以所在少榖表令諸將增廣農畝吳主報曰甚善今孤父子親受田車中八牛以為四耦雖未及古人亦欲令與衆均等其勞也臣若水通曰增廣農畝遜誠周於謀國矣而吳主遂欲親執其勞吳之君臣同心協力此其所以鼎峙於江表也建興十二年四月諸葛亮由斜谷伐魏以前者數出皆以運糧不繼使己志不伸乃分兵屯田為久住之計耕者雜於渭濱居民之間而百姓安堵軍無私焉臣若水通曰兵以食而強古者兵農為一無事則耕有事則戰自食其力而無轉輸之勞所在有備而無匱乏之患則何所往而不成功也諸葛亮伐魏分兵屯田則其志豈小小耶噫天不假年而不使天下蒙其澤奈之何哉後主延熙四年魏欲廣田蓄穀於揚豫之間使鄧艾行陳項以東至壽春艾以為昔太祖破黃巾因為屯田積穀許都以制四方今三隅已定事在淮南令淮北二萬人淮南三萬人且田且守嵗充五百萬斛以為軍資六七年間可積十萬之衆五年食也以此乘吳無不克矣司馬懿善之始開廣漕渠每大興軍旅泛舟而下達於江淮資食有餘而無水害臣若水通曰魏以偏安之國有外敵之患宜其應接不給矣乃信用鄧艾屯田淮潁卒之國用有備而大功遂成豈非富強之長策乎人君享有天下豈可緩民事而不知所以經理之反視魏人之不若哉晉武帝泰始五年羊祐鎮襄陽減戍邏之卒以墾田八百餘頃其始至也軍無百日之糧及其季年乃有十年之積臣若水通曰羊祜與陸抗之邊境相持命使交通抗與之亦孚信無疑宜若無所事備矣至其墾田八百頃致十年之積其自治何其密哉內備國用外孚敵人以安兩國之民其為邊計可謂萬全者矣宜書之以為後世耕守備邊之法焉晉武帝太康元年杜預還襄陽引滍溝水以浸田萬餘頃開楊口通零桂之漕公私賴之臣若水通曰甚矣兵食資於農畝農畝資於水利也叔敖起芍陂則楚受其惠文翁穿腴口則蜀以富饒史起引漳於魏而鄴旁有稻粱之詠鄭國道涇於秦而谷口有禾黍之謡今杜預當倥偬多事之日而能為此兵農久逺之謀其亦善於經畫者矣宋文帝元嘉七年十二月長沙王義欣鎮壽陽壽陽土荒民散城郭頽敗義欣隨宜經理見芍陂久廢修治堤防引河水入陂溉田萬餘頃無復旱災臣若水通曰周禮遂人主鄉遂損膏腴之地以為溝洫者多於田匠人主都鄙率井田之民以治溝洫者多於賦而所以專主乎稻人者以瀦蓄水雖旱不乾以防止水雖水不溢此聖人經制之大利湮廢已久義欣鎮壽陽而能留心於此可謂知所先務矣宋文帝元嘉十六年十二月魏主燾問為政何先時魏多封禁良田髙允曰臣少賤唯知農事若國家廣田積穀公私有備則飢饉不足憂矣帝乃命悉除田禁以賦百姓臣若水通曰語云百姓足君孰與不足地生物以養民民輸賦以足國上下富足而不治者未之有也若封禁良田君專其利也民有不堪則亂亡至矣允之對其善矣哉齊髙帝建元三年魏薛虎子上表以為國家欲取江東先須積穀彭城切惟在鎮之兵不減數萬資糧之絹人十二匹用度無凖未及代下不免飢寒公私損費今徐州良田十萬餘頃水陸肥沃清汴通流足以溉灌若以兵絹市牛可得萬頭興置屯田一嵗之中具給官食半兵藝殖餘兵屯戍且耕且守不妨捍邊一年之收過於十倍之絹暫時之耕足充數載之食於後兵資皆貯公庫五稔之後榖帛俱溢非直戍卒豐飽亦有吞敵之勢魏人從之臣若水通曰虎子屯田之疏足食足兵一舉而兩得矣茍能行之不替則萬世之利而萬全之計也孝文從之亦可謂知大計者哉齊和帝中興二年東歸以蕭憺為荆州刺史荆州軍旅之後公私困乏憺勵精為治廣屯田省力役存問兵死之家供其困乏臣若水通曰廣屯田則兵食有所資省力役則屯種無所奪故曰勿奪其時八口之家可以無飢矣當五代兵爭之日適禍變相尋之時而蕭憺留心於此可謂良刺史矣陳文帝天嘉元年十二月齊置屯田初齊顯祖之末穀糴踊貴濟南王即位尚書左丞蘇珍芝建議修石鱉等屯自是淮南軍防足食肅宗即位平州刺史嵇曄建議開督亢陂置屯田嵗收稻粟數十萬石北境周贍又於河內置懷義等屯以給河南之費由是稍止轉輸之勞臣若水通曰齊以興屯田之政其利所濟如此其大况今天下之大地有遺利民有遺力擇間曠之田以授天下之兵則兵不必仰給於民民不致轉輸於兵國富人足而兵強矣不然東南之財賦有時而竭兵亦何所賴耶為經國長久之計者其尚留意於此焉隋文帝開皇十年五月乙未詔曰魏末喪亂軍人權置坊府南征北伐居處無定家無完堵地罕苞桑朕甚憫之凡是軍人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式罷山東河南及北方緣邊之地新置軍府臣若水通曰罷新置軍府而驅兵於農開皇之制善矣蓋喪亂既平兵有無事之夫地有不耕之田故兵授恆産以耕之則衣食足矣居則散而為農戰則聚而為兵兵農合一古之制也此開皇之治所以為可觀也已有國家者豈可少隋之治而以為不足法耶格物通卷八十二
