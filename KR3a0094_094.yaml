body:
  text: 格物通卷九十四明湛若水撰蠲租禮記王制曰古者公田藉而不稅市廛而不稅關譏而不征林麓川澤以時入而不禁夫圭田無征臣若水通曰藉者借其力以助耕公田也不稅者不取私稅也藉而不稅取以義也廛市地也廛而不稅者賦其市宅而不征其貨也譏察也譏而不征者察異服異言之人而不稅往來之貨也時入者取之以時也所謂草木零落而後入山林獺祭魚而後漁人入澤梁也不禁不禁民之取與民共利也圭田者祿外之田也無征謂不稅之也所以厚賢也夫籍也㕓也以時入也所以取之者也不稅也不征也不禁也所以蠲之者也其取之也以義其蠲之也以仁國語周語芮良夫曰夫王人者將導利而布之上下者也使神人百物無不得其極猶日怵惕懼怨之來故頌曰思文后稷克配彼天立我蒸我莫匪爾極大雅曰陳錫載周是不布利而懼難乎臣若水通曰良夫周大夫芮伯也導開也布賦也上謂天神下謂人物極中也頌周頌經緯天地曰文言后稷播百穀以利民莫非中道陳亦布也錫賜也載成也大雅文王之二章言文王能布利賜民以成周道也夫利者天之所生百物之所為與天下共之布之可也專之則私其有也榮公好利而不知大難以利導君其能免於難乎芮良夫謂王人布利於上下而引后稷周文以見布利於民者以懼難也夫專利者人之所怨也天下之怨歸之大難將至矣為人君者其輕賦薄斂蠲租以與民可也其可專利而斂怨以自及於難哉漢文帝二年九月詔曰農者天下之大本也民所恃以生也而民或不務本而事末故生不遂今兹親率羣臣農以勸之其賜天下民今年田租之半臣若水通曰蠲租所以勸農事也勸農所以重國本也文帝恭儉仁厚出於天性勸農蠲租之詔實惠及於民矣當時之富庶豈無自哉漢武帝元鼎四年六月是時吏治皆以慘刻相尚獨左內史兒寬勸農桑緩刑罰理獄訟務在得人心擇用仁厚士推情與下不求名聲吏民大信愛之收租稅時裁闊狹與民相假貸以故租多不入後有軍發左內史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租􅀈屬不絶課更以最上由此愈竒寬臣若水通曰兒寬為政收租稅時與民相假貸而租多不入國計若虧矣及有軍發以負租課殿當免而牛車擔負輸租􅀈屬不絶何其有餘也所謂藏富於民百姓足君孰與不足者此其驗歟至唐陽城撫字心勞催科政拙蓋有此風焉漢光武建武十九年九月壬申上幸汝南南頓縣舍置酒會賜吏民復南頓田租一嵗父老前叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩願賜復十年帝曰天下重器常恐不任安敢逺期十年乎吏民又言陛下實惜之何言謙也帝大笑復增一嵗臣若水通曰傳云君子大居正夫田賦自有中正之法國用給焉多則桀寡則貊非中正可久之道也南頓以帝鄉蠲租一嵗恩亦過矣而吏民復有十嵗之望何其不以天下之大公自待哉光武復增一嵗則於篤舊之仁裁制之義庶幾兩得之矣漢殤帝延平元年秋七月詔司𨽻校尉部刺史曰間者郡國或有水災妨害秋稼朝廷惟咎憂惶悼懼而郡國欲獲豐穰虛飾之譽遂覆蔽災害自今以後將糾其罰二千石長吏其各實核所傷害為除田租芻稿臣若水通曰諱災飾穰郡國之不仁也宜置之罪而免其官則天下郡吏知崇飾者未必得福欺諱者未免得禍各有所警下情達而民受其惠矣而又令督吏核實所傷為除田租芻稿可謂軫念民困者矣隋文帝開皇十二年十二月有司上言府藏皆滿無所容積於廊廡乃下詔曰寧積於人無藏府庫河北河東今年田租三分減一臣若水通曰傳云王人者導利而布之上下者也利而專之雖十室之長不可以為治况天下乎故古者藏富於民視其在民猶其在官也隋文帝謂寧積於民無藏府庫則似是矣然而至積無所容者非刻剝聚斂何以致之哉及其於河北河東今年田租三分減一則亦有意於民矣然必無所容積然後行之且有限地有限年有限分則所惠亦有限矣得為積富於民之道耶唐髙宗武德八年八月甲子詔關內及蒲芮虞泰陜鼎六州免二年租調自餘給復一年臣若水通曰蠲租仁政也每聞於創業之始而不多見於守成之時何耶豈創業之始用省於守成而守成之後用反費於創業之時邪節與不節豐儉之道殊而敬肆之心異爾夫侈用生於欲欲生於逸逸生於無憂無憂則情勝欲動惟日不足矣尚何望蠲租之惠及於民邪唐太宗貞觀元年六月山東大旱詔所在賑恤無出今年租賦臣若水通曰國家之所係租賦為輕民為重有民則有賦矣有賦則有國矣唐太宗以山東大旱下賑恤之詔而免其今年租賦所以愛民者至矣貞觀之治其有以也夫後世人君聞民之愁嘆而不加恤者於唐太宗得無愧乎唐玄宗開元十七年十一月辛卯上行謁橋定獻昭乾五陵戊申還宫赦天下百姓今年地稅悉蠲其半開元二十七年羣臣請加尊號曰聖文二月己巳許之因赦天下免百姓今年田租天寶六載春正月丁亥上享太廟戊子合祭天地於南郊赦天下制免百姓今載田租天寶十四載八月辛卯免今載百姓租庸臣若水通曰天下之財不在國則在民與其藏富於國寧藏富於民玄宗當開元天寶之間海內豐稔府庫充贏屢赦田租人皆以為有與天下同樂之意矣使其躬行節儉始終不渝國之安富可保於無虞也惜其驕於佚樂煩費倍興向之蠲之於屢年者一時取之殆盡昔之恭儉恩惠豈非聲音笑貌為之也乎有仁天下之志者宜以實心行實惠焉肅宗至德二載十一月戊午上御丹鳯樓赦天下郡縣來載租庸三分蠲一臣若水通曰祿山之亂民窮財盡天下蕭然不能聊生矣租庸之蠲實續民命夫肅宗以匹馬至靈武合弱旅鉏疆冦收復兩京百姓喁喁以望更生之福既而重之以此惠一時舞蹈之歡可知矣噫此肅宗所以成中興之業也歟肅宗乾元元年二月丁未上御明鳯門赦天下改元免百姓今載租庸臣若水通曰乾元之民即天寶之末之民也昔也國稅困於征求今也私租獲其蠲免昔之怨咨今之欣悅特在一心轉移之間爾故肅宗克復大業無他焉以其能慰來蘇之望而收渙散之民心也記曰財散則民聚人君可不審察其幾哉穆宗長慶二年夏四月户部侍郎判度支張平叔奏徴逺年逋欠江州刺史李渤上言度支徴當州貞元二年逃户所欠錢四千餘緡當州今歲旱災田損什九陛下奈何於大旱中徴三十六年前逋負詔悉免之臣若水通曰自古興利之臣急於征斂莫不以其忠於君而不知其不忠之大者也莫不以其益於國而不知其病國之大者也蓋征斂則民怨民怨則國本危矣於國果為益於君果為忠乎張平叔奏徴逺年逋負使非李渤諫而止之則民怨於下其國家之禍有不可勝言者矣故曰不有君子其能國乎後晉髙祖天福六年九月吳越王𢎞佐即王位民有獻嘉禾者𢎞佐問倉吏今蓄積幾何對曰十年王曰然則軍食足矣可以寬吾民乃命復其境內稅三年臣若水通曰𢎞佐一方之雄爾量軍食既足尚知復租稅以寬民况萬乘之尊而富有四海者乎周太祖廣順三年春正月乙丑敕悉罷户部營田務以其民𨽻州縣其田廬牛農器並賜見佃者為永業悉除租牛課是嵗户部增三萬餘户民既得為永業始敢葺屋植木獲地利數倍或言民田有肥饒者不若鬻之可得錢數十萬緡以資國帝曰利在於民猶在國也朕用此錢何為臣若水通曰周太祖利在於民猶在國斯言也其得先王之遺意乎尹起莘曰人主茍有愛民之心則必有愛民之政矧如五代亂離之極尤賴撫養之仁周太祖之敕有四善焉罷營田之務使不為民擾一也以其田廬牛器永業見佃二也除租牛之課以寬民三也地利數倍四也此亦可謂有恤民之心而能達之政事者矣詩曰民亦勞止汔可小康其周太祖之謂乎賈誼新書曰鄒穆公有令食鳬鴈者必以粃毋敢以粟吏請曰粃食鴈無為費也今求粃於民二石粟而易一石粃以粃食鴈則其費矣請以粟食之公曰夫君者民之父母也粟之在倉與其在民於吾何擇臣若水通曰食者飼鳬鴈也穆公言粟之在倉與其在民於吾何擇深得君民一體之義矣令飼鴈者以粃而禁其用粟蓋粟可以養人而粃不可以養人也穆公蓋不使禽獸食人之食公私一視可謂仁矣吏之請其所見者不亦小乎雖然穆公茍能由是而充之仁義不可勝用惜乎其未能也已栁宗元捕蛇者説曰永州之野産異蛇黑質而白章觸草木盡死以齧人無禦之者然得而臘之以為餌可以已大風攣踠瘻癘去死肌殺三蟲其始太醫以王命聚之嵗賦其二募有能捕之者當其租入永之人爭奔走焉有蔣氏者專其利三世矣問之則曰吾祖死於是吾父死於是今吾嗣為之十二年幾死者數矣言之貌若甚蹙者余悲之且曰若毒之乎余將告于蒞事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾氏三世居是鄉積于今六十嵗矣而鄉鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙飢渴而頓踣觸風雨犯寒暑呼噓毒癘往往而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死則徙爾而吾以捕蛇獨存悍吏之來吾鄉呌囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而甘食其土之有以盡吾齒蓋一嵗之犯死者二焉其餘則熙熙而樂豈若吾鄉鄰之旦旦有是哉今雖死于此比吾鄉鄰之死則已後矣又安敢毒耶余聞而愈悲孔子曰苛政猛於虎也吾嘗疑乎是今以蔣氏觀之尤信嗚呼孰謂賦斂之毒有甚是蛇者乎故為之説以俟夫觀風者得焉臣若水通曰桞宗元之為此説所以警夫毒賦者也蓋征賦常事也而捕蛇者觸之即死然而人有願為此不為彼者豈人之情也哉然則賦斂之毒甚於毒蛇可知矣蓋蛇可以技術而禦而征賦之慘不可得而控禦蛇毒或可幸而免而征租則不可幸而免也嗚呼今之為政者其毋使斯民畏之甚於永州之蛇也哉陸贄奏議唐興元元年大赦制曰自頃軍旅所給賦役繁興吏因為姦人不堪命咨嗟怨望道路無聊汔可小康與之休息其墊陌及稅間架竹木茶漆𣙜鐡等諸色名目悉宜停罷京畿之內屬此冦戎攻劫焚燒靡有寧室王師仰給人以重勞特宜減放今年夏稅之半朕以凶醜犯闕遽用于征爰度近郊息駕兹邑軍儲克辦軍旅攸寧式當褒旌以志吾過其奉天宜升為赤縣百姓並給復五年臣若水通曰大兵之前必有橫斂大兵之後必有凶年夫橫斂于人凶荒于天茍以常賦取民則民不堪命國必危矣德宗之時師旅之興日頻征斂之門日開幸而克復之餘能行寬恤之詔民復更生國脈不絶豈非散財得民之驗歟宋髙宗紹興十八年七月寬諸郡雜稅帝曰人知取之為取而不知豫之為取若稍與展免俟家給人足稅斂自然易辦於是蠲廬光二州上供錢米汀漳二州秋稅處州三縣被水民家紬絹鄂州舊額絹各一年又蠲四州積貸常平錢十三萬緡京西路請佃田租及州縣場務稅錢臣若水通曰髙宗謂人知取之為取而不知豫之為取何其得失之明也寬諸郡雜稅誠所謂寬一分則民受一分之賜矣然此特雜稅爾又安知其所謂正稅者果能推此意而達之乎否也然則所取而不知豫之者尚恐無算爾是尚為能充其類也乎夫必有不忍人之心斯有不忍人之政自非有聖學慎德君子又烏足以語此哉宋儒楊時與胡安國書略曰閩中二三年來盜賊羣起上四州軍被害為甚夷傷之餘民力凋弊極矣蒙恩放免紹興二年秋夏二稅及役錢一料非朝廷勤恤民隱何以得此既而漕司檢準紹興令諸赦降放及倚閣稅租者各不得過三分行下州縣依舊催納七分急於星火民被其澤方歡欣鼓舞未逾月遂轉而為怨咨良可惜也臣若水通曰當是之時權臣竊國盜賊蜂起生民之塗炭極矣縱免秋夏二稅役錢一料是猶為以一杯水救一車薪之火况稅未及蠲而征之愈急是猶火薪而注之膏矣上有蠲免之名而下不被蠲免之實遂使人君之令不足以取信於天下無信不立是又甚於乏食以死矣嗚呼國之有民民之有信猶身之有元氣也不以信治民是自賊其元氣也元氣亡而存者寡矣宋業之衰職此之由可以為鑒哉楊時陳論政事其略曰近日蠲除租稅而廣濟軍以放稅降官視詔令為虛文爾安土之民不被惠澤而流亡為盜者獨免租賦百姓何憚不為盜哉臣若水通曰蠲租之道所以慰安土之民使不至流亡為盜也必仁以行之信以成之然後可以有濟也若夫蠲除租稅仁矣而以放稅降官可謂信乎不信何以成其仁也不仁不信是以惠不施於安土之良而反施於流亡之盜是教安土而流亡為盜矣烏在其為蠲除也哉楊時陳論政事而拳拳於此者良有見也伏惟聖明一念之發仁如甘澤一令之行信如四時則天下幸甚國朝吳元年正月太祖皇帝謂中書省臣曰豫嘗親歷田野見人民凋弊土地荒蕪失業者多蓋因久困兵革生息未遂譬之觸熱者思得清涼冒寒者思就溫燠為之上者固當念之且如太平應天宣城諸郡乃吾渡江開創之地供億先勞之民其有租賦宜與量免少蘇民力省臣傅瓛對曰恤民王者善政主上念之及此真發政施仁之本也民之受賜如大旱之得霖雨其喜當何如太祖因嘆曰吾昔在軍中嘗乏糧空腹出戰歸得一食雖甚粗糲食之甚甘今尊居民上飲食豐美心未嘗忘之况吾民居於田野所業有限而又供需百出豈不重困於是免太平府租賦二年應天宣城等處租賦一年臣若水通曰古言王者以四海為家然未知言之有味也豈有一家之人飢寒不相恤者哉然而仁惠之施也必自近者始若太平等郡實我太祖皇帝開疆之首租賦之先矣親歷之地矜恤之政蠲免之仁在所先務之急者也若此者得非由我太祖存如傷之心懷保之仁所發哉伏惟聖明心太祖之心修太祖之政則萬世無疆之業端在是矣洪武二年二月免租之詔凡三焉其一謂中原之民久困兵殘免山東北平燕南河東山西河南秦壠夏秋之稅山東二年其餘一年其二謂創業之初取辦太平應天鎮江寧國四郡免其租一年其三謂建都金陵以鎮江太平宣城廣德為京師之翼其應天太平鎮江宣城再免一年其廣德及滁州和州無為州亦與免一年洪武三年三月又詔免應天以至滁和等七郡徽州池州廬州金華嚴州衢州處州廣信饒州九郡及山東河南二布政司一年四年五月又有免兩浙江西之詔五年十月有免應天等五府之詔九年二月有免山東陜右之詔十一年八月有免太平等六州宜興等四縣之詔十二年有全免北平之詔至十三年乃下詔曰荷上天眷佑君主華夏十有三年倉廩盈府庫充今民力未蘇凡天下今年夏稅秋糧盡蠲免之臣若水通曰此御製文集之言也夫我太祖登極之初干戈甫定凡百興作皆資於財然而免租之詔無嵗無之蓋太祖不忍之心存於中故不忍之政發於外蓋有不期而必至者矣悲人窮以凝天命此豈非其大端也歟洪武二十五年二月涼國公藍玉奏涼州衛民千七百餘户附籍嵗久所種田畝宜徴其賦令輸甘肅上曰涼州歸附雖久貧民至今未蘇俟年豐食足然後徴之臣若水通曰語云既來之則安之所謂安之者奠其居止寬其徭役蠲其賦斂以仁心行仁政而惠養之而已矣我皇祖之得天下也以仁觀藍玉奏徴涼州衛民田租皇祖以其附籍雖久貧民未蘇而必俟之豐年非其仁人之政發於仁心者乎所以安其來者至矣聖子神孫所宜憲章焉仁宗皇帝即位之初山東布政司言登萊諸郡今嵗雨水傷麥其纍嵗所逋稅乞令民以他物代輸命户部議所以寬貸之者户部以國用不足為言仁宗曰君民一體民貧不可不恤宜從所言其永樂二十年以前所逋稅悉蠲之二十一年稅令以鈔代輸臣若水通曰仁宗皇帝即位之初山東水災發政施仁莫先於此時也户部以國用不足為言蓋未知為德為民之道矣既而逋稅之蠲輸鈔之令出自淵衷皆發於君民一體之仁也語曰百姓足君孰與不足至於民有饒裕之休國無匱乏之慮何嘗不利哉實聖子神孫萬世守成之程度也天順四年秋天下大水江南尤甚田盡淹沒時上益明察凡事臣下莫敢發端一日李賢因召對從容為言上曰為之奈何賢曰若非大施恩典安得蘇息於是詔令被災州縣申報巡撫巡按官災重者全免稍重者免半又輕者免三分臣若水通曰此我英宗皇帝蠲租之詔也皆發於一念恤荒愛民之仁可謂至矣夫漢文帝時或賜民田租之半或盡除之唐宋諸君亦多行焉然有名而無實者往往而是或先期而取盈或己徴而報免或黃放而白催上有虛名民無實惠則亦何益之有哉伏惟聖明其垂察焉萬一或有遇此而使有司不以虛應故事可也格物通卷九十四
