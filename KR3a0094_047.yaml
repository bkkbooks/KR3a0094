body:
  text: 格物通卷四十七明湛若水撰立教興化中漢光武建武元年宛人卓茂寬仁恭愛為密令視民如子舉善而教口無惡言吏民親愛不忍欺之民嘗有言部亭長受其米肉遺者茂曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎民曰往遺之爾茂曰遺之而受何故言邪吏顧不當乘威力強求請爾亭長素善吏嵗時遺之禮也民曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝汝何所措其手足乎且歸念之初茂到縣有所廢置吏民笑之鄰城聞者皆嗤其不能河南郡為置守今茂不為嫌治事自若數年教化大行道不拾遺遷京部丞密人老少皆涕泣隨送及以病免歸詔曰夫名冠天下當受天下重賞今以茂為太傅封褒德侯臣若水通曰善政不如善教之得民也卓茂以禮教治邑民不忍欺教化大行謂非得其本哉其折禮遺亭長之數言藹然尚德君子矣吏民始嗤而久服之秉彞之在人者不可誣也光武褒德之賞其為世教之勸大矣哉漢桓帝延熹四年夏四月以太常劉矩為太尉初矩為雍丘令以禮讓化民有訟者常引之於前提耳訓告以為忿恚可忍縣官不可入使歸更思訟者感之輒各罷去臣若水通曰為國以禮讓為本孔子曰必也使無訟乎劉矩令雍丘以禮讓化民而訟者罷去得其本之明效也然則人君之為治豈可不端其本哉延熹七年陳留仇香至行純默鄉黨無知者年四十為蒲亭長民有陳元獨與母居母詣香告元不孝香到元家為陳人倫孝行譬以禍福之言元感悟卒為孝子考城令王奐署香主簿謂之曰聞在蒲亭陳元不罰而化之得無少鷹鸇之志邪香曰以為鷹鸇不若鸞鳯故不為也奐曰枳棘之林非鸞鳯所集百里非大賢之路乃以一月俸資香使入太學郭泰符融齎刺謁之因留宿明旦泰起下牀拜之曰君泰之師非泰之友也臣若水通曰甚矣教化之易以感人也得乎人心之所同然故也仇香陳人倫孝行卒能化成蒲民之孝其所以見署於王奐取重於郭泰非得其同然者如是乎延熹八年秋七月議郎王暢嘗為南陽太守奮厲威猛張敞諫曰懇懇用刑不如行恩孶孶求姦未若禮賢化人在德不在用刑暢深納其言更崇寬政教化大行臣若水通曰化人在德不在刑德者順也刑者逆也信乎張敞之言矣王暢然其言改威猛而崇寬厚卒之教化大行貴戚豪族斂手革心而前所謂發屋伐樹堙井夷竈之嚴猛將焉用哉延熹八年十一月徵東海相劉寬為尚書令寬歷典三郡溫仁多恕雖在倉卒未嘗疾言遽色吏民有過但用蒲鞭罰之示辱而巳終不加苦每見父老慰以農里之言少年勉以孝弟之訓人皆恱而化之臣若水通曰傳云孝弟順德也觀劉寬歷典三郡溫仁多恕蒲鞭示辱藹然愷悌君子矣及慰父老以農里之言所謂上老老而長長者耶其訓勉少年以孝弟卓乎順德之化矣此其所以感人心而受上賜也歟然則為治者奚以嚴峻苛刻為哉延熹九年賈彪嘗為新息長小民困貧多不養子彪嚴為其制與殺人同罪城南有盜劫害人者北有婦人殺子者彪出案驗掾吏欲引南彪怒曰賊盜害人此則常理母子相殘逆天違道遂驅車北行案致其罪城南賊聞之亦面縛自首數年間人養子者以千數曰此賈父所生也皆名之為賈臣若水通曰乍見孺子入井在他人猶有怵惕惻隱之心而況於骨肉乎甚哉風俗之移人雖人心天性尤不能不為之奪也賈彪之治新息不治劫人之盜而獨案殺子之罪可以教人慈矣遂使民間養子俱稱賈父天性之愛豈終泯也臣聞兩浙之間以婚嫁侈靡殺其女雖名士大夫之家慈母之愛猶不能免況貧困小民乎其滅天之性傷天之和莫大於此甚為國家治化之纍也伏望聖明推大孝之心以為慈幼之政詔浙江有司嚴禁示以殺人之罪徐以遍及天下則人倫之愛同天理之和積而休徵至矣幸甚齊武帝永明五年十二月魏主問高祐曰何以止盜對曰昔宋均立德猛虎渡河卓茂行化蝗不入境況盜賊人也苟守宰得人治化有方止之易矣臣若水通曰教化之於人大矣猛虎蝗蟲異類無知猶且感格而況於盜賊乎而況於人乎所以然者以其氣之一也夫守令近民也人君為國得人以立教化如均茂焉則人人施其教而天下平矣齊武帝永明十年八月魏司徒尉元大鴻臚卿遊明根纍表請老魏主許之引見賜元玄冠素衣明根委貌青紗單衣及被服雜物等而遣之魏主親養三老五更於明堂己酉詔以元為三老明根為五更帝再拜三老親袒割牲執爵而饋肅拜五更且乞言焉元明根勸以孝友化民又養庶老國老於階下禮畢各賜元明根以步挽車及衣服祿三老以上公五更以元卿臣若水通曰魏主禮尉元明根為三老五更所以老老賢賢之禮其至矣及元根勸之孝友化民卒以孝稱詩曰無言不酬無德不報元根之於魏主以之北朝之君猶能行之以立教化亦可以見天理之在人心矣為中國之大君者可不動心哉齊明帝建武三年二月丙午魏詔畿內七十已上暮春赴京師行養老之禮三月丙寅宴羣臣及國老庶老於華林園詔國老黃耉以上假中散大夫郡守耆年以上假給事中縣令庶老直假郡縣各賜鳩杖衣裳臣若水通曰上老老而民興孝上長長而民興弟魏主詔畿內七十以上至京師行養老之禮所謂老老而長長矣所以厚風俗而崇治化豈小小哉先王養老之政至五代蕩不復存矣孰知舉盛典於久曠之餘乃出於北魏之君也耶陳宣帝太建六年五月周禁佛道二教經像悉毁臣若水通曰異端之害道凡志於道皆知拒之然卒未能殄絶之者何也凡以吾道之未明也孟子曰君子反經而已矣經正則庶民興庶民興斯無邪慝矣周武帝知排佛老可謂難矣使能明先王之道以教國天下則二氏之學不毁而自廢矣雖然後世之君尚崇信焉其視武帝又何如耶唐太宗貞觀四年十二月上之初即位也嘗與羣臣語及教化魏徵對曰久安之民驕佚驕佚則難教經亂之民愁苦愁苦則易化譬猶飢者易為食渴者易為飲也封德彞非之曰三代以還人漸澆訛故秦任法律漢雜霸道蓋欲化而不能豈能之而不欲耶魏徵曰五帝三王不易民而化若謂古人淳朴漸至澆訛則至于今日當化為鬼魅矣人主安得而治之上卒從徵言臣若水通曰唐太宗不可謂無志於教化者矣惜乎魏徵之徒知教化之可興而不知興教化之有本是以貞觀之治不能如三代之時雍也夫形之不端影將何正立身刑家多欲慚德尚能以教而化人哉易曰聖人以神道設教而天下服知神道者而後可以語治化矣貞觀十六年十一月壬申上曰朕為兆民之主皆欲使之富貴若教以禮義使之少敬長婦敬夫則皆貴矣臣若水通曰太宗欲教民興禮義使之少敬長婦敬夫庶乎知天之良貴矣然教化之立豈無所謂本與則者哉記曰所藏乎身不恕而能喻諸人者未之有也人君為教化之主者可不端本以善則哉劉向説苑曰道之所在天下歸之德之所在天下貴之仁之所在天下愛之義之所在天下畏之臣若水通曰道德仁義一理而巳以其事理之常行則謂之道以其得諸心則謂之德以其全體好生則謂之仁以事得其宜則謂之義此理不出於吾心也以是而立教焉則以心感心天下豈有不興起者哉宋理宗嘉熙二年蒙古建太極書院于燕京時濂溪周子之學未至於河朔楊惟中用師于蜀湖京漢得名士數十人始知其道之粹乃收集伊洛諸書載送燕京師還與姚樞謀建太極書院及周子祠以二程張楊遊朱六子配食請趙復為師選俊秀有識度者為道學生由是河朔始知道學臣若水通曰元自太祖至世祖用兵百四十年至滅宋而始一天下其戰勝攻取古所未有之盛及觀史至楊惟中與姚樞奮然興起道學而嘆其有以也豈非知守天下者乎夫蒙古北俗也乃能興道學之教而當時南宋乃禁錮道學指為偽學使天理民彞之在人心澌滅殆盡以歸於敗亡之轍而不悟為能保天下者耶欲其不亡難矣元儒劉因詩云王綱一紊國風沈人道方乖鬼境侵生理本直宜細玩蓍龜千古在人心蓋嘆宋也書曰商俗靡靡利口惟賢餘風未殄後之主教化之責者可不獨觀而深省之以救流俗之弊乎元成宗大德十一年武宗即位七月制加孔子號曰大成制曰先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述堯舜憲章文武儀範百主師表萬世者也可加大成至聖文宣王遣使闕里祀以太牢於戲父子之親君臣之義永惟聖教之遵天地之大日月之明奚罄名言之妙尚資神化祚我皇元臣若水通曰自有生民以來聖神之倫衆矣而未有孔子自有孔子以來帝王之尊之者多矣而未有如元武宗者至矣備矣傳之萬世而無以有加矣然則天理之在人心豈嘗一日息耶夫元以此而開教化之原此所以能自立其國乎不然則雖有天下不能一朝居也元大德十一年八月賜諸王孝經中書右丞博囉特穆爾以國字譯孝經進詔曰孔子微言王公庶民皆當由是而行命刻板模印諸王公以下咸賜之臣若水通曰孝經乃曾參與師孔子問答之辭自天子至於庶人孝事父母之道立教之大本也其道始於立身中於事親終於事君自家而國而天下通于神明光于四海天之經地之義而民之行固有不可一日不講者況朔漠之俗禮教未嫺而諸王家世驕貴尤其所易犯此義不明則亂臣賊子不可勝誅矣元武知其然乃譯而頒之諸王使其知愛親則不敢惡於人知敬親則不敢慢於人愛敬始于事親而德教加于百姓則雖堯舜之聖何以加此惜乎元武徒知尊崇其書而未有以立天下之大本又何以經綸天下之大經乎格物通卷四十七
