body:
  text: 格物通卷六十明湛若水撰學校三禮樂政教附晉元帝建武元年戴邈上疏以為世道久喪禮俗日弊猶火消膏莫之覺也今王業肇建萬物權輿謂宜篤道崇儒以勵風化帝從之始立太學臣若水通曰學校之教風化之本國之元氣也采芹泮水魯之所以盛青襟城闕鄭之所以衰而治亂係焉晉元即位之始而邈勸以立學可謂知風教之先務者矣第惜太學雖立徒有師儒之名而無作人之本爾夫作之者人也教由人生者也晉之一代無一真儒無怪其然哉晉成帝咸康三年正月國子祭酒袁瓌太常馮懷以江左寖安請興學校帝從之臣若水通曰袁瓌請興學校蓋知轉移風化之本也教弛風頽蔽固已久上無精一執中之君下無反身一德之臣教道所以終於不振也惜哉晉孝武帝太元五年秦王堅作教武堂於渭城命太學生明陰陽兵法者教授諸將祕書監朱彤諌曰陛下東征西伐所向無敵四海之地十得其八是宜偃武修文乃更始立學舍教人戰鬬之術殆非所以馴致升平也堅乃止臣若水通曰衛靈公問陳孔子對曰俎豆之事則嘗聞軍旅之事未之學也明日遂行堅不務崇禮教以立國而徒作教武堂專意於戰鬬之術充其類不至於糜爛其民不已也堅誠佳兵也哉又烏足以語升平之致也晉安帝隆安三年三月魏吏部尚書崔宏請置五經博士增國子太學生員合三千人魏主圭問博士李先曰天下何物最善可以益人神智對曰莫若書籍圭曰書籍凡有幾何如何可集對曰自書契以來世有滋益以至于今不可勝計茍人主所好何憂不集圭信之命郡縣大索書籍悉送平城臣若水通曰代北之俗尚武魏主圭因崔宏請置博士增國子太學生三千人聞李先書籍益人神智之説則大索書籍可謂崇文之主矣獨不知所謂神智者人之虛靈天之聰明也書籍但能開發之爾不然則自書契以來世有滋益何神聖之寡耶宋文帝元嘉十五年豫章雷次宗好學以處士徵至建康為開館于雞籠山使聚徒教授帝雅好藝文使丹陽尹廬江何尚之立玄學太子率更令何承天立史學司徒參軍謝元立文學并次宗儒學為四學臣若水通曰三代之學皆所以明人倫也理一而巳學一而已一者堯舜禹湯文武周公孔子相傳之正學也外此而二三焉則所謂異端也故古之為學者一今之為學者四天道一本也本一而四支之支則離離則去道逺矣此大亂之所由起乎宋文雅好藝文而并立四學則其學之二三而不得其正可知矣孔子曰攻乎異端斯害也已其宋文之謂乎宋明帝泰始二年魏始立郡學置博士助教生員從中書令高允相州刺史李沂之請也臣若水通曰五代兵爭之日但以竊據為事不講教學久矣魏起北荒數世之後始及此舉嗚呼何斯世之不幸君子不得聞大道之要小人不得蒙至治之澤也然而斯文命脈墜而復起此臣所以既悲之而復幸之也歟齊高帝建元元年四月給事黃門郎清河崔思祖上言以為人不學則不知道此悖逆禍亂所由生也今無員之官空共祿力雕耗民財宜開文武二學課臺府州國限外之人各從所樂依方習業若有廢惰者遣還故郡經藝優殊者待以不次又今陛下雖躬履節儉而羣下猶安習侈靡宜褒進朝士之約素清修者貶退其驕奢荒淫者則風俗可移矣臣若水通曰五代之風至此衰廢極矣建學以明道崇儉以移俗崔思祖一言及此如盧醫扁鵲之良劑欲回生於久病氣息奄奄之際也其亦賢哉齊明帝建武二年八月魏金墉宫成立國子太學四門小學於洛陽臣若水通曰小學所以養其正也太學所以成其賢也自少而長大人之事備矣孟子曰大人者不失其赤子之心者也由赤子之心養之而不失聖人之教也魏徒立學而未聞所以教之學者何事其亦未之知本者歟梁武帝天監九年幸國子學親臨講肄詔皇太子以下及王侯之子年可從師者皆入學臣若水通曰梁武帝以佛法隳政而不知聖賢大學之道者也一旦視學而有此詔其亦秉彞之良心不終寂滅者歟使其因此而覺悟以反正焉豈至有臺城之禍也哉梁武帝大同五年魏丞相泰於行臺置學取丞郎府佐德行明敏者充學生悉令旦治公務晚就講習臣若水通曰語云仕而優則學學而優則仕言仕學之合一而餘力可相及也然則立學旦治公務晚就講習其亦近是耶賢於後世仕學分為二途者逺矣雖然即公務而學無不在者孔門執事敬之謂也何有於旦暮之分哉唐高祖武德七年二月己酉詔諸州有明一經以上未仕者咸以名聞州縣及鄉皆置學丁巳上幸國子監釋奠詔諸王公子弟各就學臣若水通曰唐承五代之餘風俗澆漓甚矣有王者作則學校之興豈容一日緩乎髙祖遲遲於七年之久始以明經舉士立學校於天下其志意之趨向可知矣故終唐之世溺於詞章正學不明真儒未見豈非垂統者之咎歟我太祖高皇帝甫平元亂而教化大興彞倫攸敘翕然反正其賢於唐逺矣傳至百六十年其流弊之漸不能無也端本澄源一洗卑陋而新之惟聖明留意焉唐太宗貞觀十四年二月上大徵天下名儒為學官數幸國子監使之講論學生能明一經巳上皆得補官增築學舍增廣生員自屯營飛騎亦給博士使授以經有能通經者聽得貢舉於是四方學者雲集京師乃至高麗百濟新羅高昌吐蕃酋長亦遣子弟請入國學升講筵者至八千餘人臣若水通曰自古聖帝明王未有不先建學立師以主教化者也然學之要不過明倫而成德達材他日達而致君澤民此其具矣唐太宗幸國學增生徒使屯營之士蕃夷之子翕然從教誠可謂盛矣然博士明經不越乎口耳之間而所藏乎身者不恕一時觀聽之美何足取乎願治之君尚其思之哉唐代宗大厯元年正月敕復補國子學生自安史之亂國子監室堂頽壞祭酒蕭昕上言學校不可遂廢敕復補之臣若水通曰學校不可一日而不設倫理不可一日而不明唐自安史之亂學之廢也久矣教基既墜人心不天如之何而望世之治也逮夫蕭昕上言而肅宗敕復斯文亦幸其如線而不絶歟周太祖廣順三年六月蜀九經板成自唐末以來所在學校廢絶蜀母昭裔出私財百萬營學館且請刻板印九經蜀主從之由是蜀中文學復盛臣若水通曰天下之治亂係乎人才之盛衰人才之盛衰由於學校之興廢五代亂亡之際孰知學校之當興哉蜀主從母昭裔之請遂致文學復盛宜其獲得人之效也然卒未聞有補於治者何哉良由所謂盛者特文辭之士焉爾故所養非所用所用非所養其弊有自來矣使得德行而用之其功烈豈止若是而已邪嗚呼文藝盛而聖人之道衰矣主學教者可不擇乎周世宗顯德六年命竇儼討論古今考正雅樂王朴素曉音律帝以樂事詢之朴上疏以為禮以檢形樂以治心形順於外心和於內然而天下不治者未之有也是以禮樂修於上萬國化於下聖人之教不肅而成其政不嚴而治用此道也臣若水通曰禮由內履樂以內和夫然後形於身發於聲教於天下而已王朴以禮樂分心形內外因襲漢儒之陋而失孔子人而不仁如禮樂何之指矣周世宗命儒臣考制度正雅樂不可謂無志但禮樂本於仁積德百年而興恐亂亡之世仁德之學蓋未之講爾如用之則自一身之禮樂不可斯須去者始焉可也賈誼新書曰先王為天下設教因人所有以之為訓道人之情以之為真臣若水通曰先王之教因人之所有而覺之非以人之所無而強之也如導水者因水之性而利導之激則濫矣下者水之性也善者人之情也孟子曰乃若其情則可以為善矣是乃人之真心也全其真純道其惻隱羞惡辭讓是非之情之性故易則易知簡則易從教道立矣教道立而善人多善人多而天下治矣劉向説苑曰天下有道則禮樂征伐自天子出夫功成制禮治定作樂禮樂者行化之大者也孔子曰移風易俗莫善於樂安上治民莫善於禮是故聖王修禮文設庠序陳鐘鼓天子辟雍諸侯泮宫所以行德化詩云鎬京辟雍自西自東自南自北無思不服此之謂也臣若水通曰禮樂者化民之具庠序者化民之所也以化民之所而化民不可也以化民之具而化民亦不可也其必有所以為之本者矣是以古者天子諸侯皆象地形而為之學蓋以身所有者推之制作以顯設於天下無所待於外也德化之行天下之心固有得乎吾心之同然者爾使不知此而惟求之度數聲音之間固已遺其本矣豈先王建學之意哉嗚呼治之隆替皆本諸此惟聖明留意焉班固白虎通曰天子立辟雍何所以行禮樂宣教化也臣若水通曰天子之學其澤如璧故謂之辟雍禮者見於升降揖讓節文度數之間而其本則序而已矣樂者形於鐘鼓管籥歌詠節奏之間其本則和而已矣和序者教化之本也故能宣教化是故和序體於身而後禮樂備禮樂行於學而後教化宣天地位萬物育致中和之功用廣矣大矣班固曰王者所以盛禮樂何節文之喜怒樂以象天禮以法地人無不含天地之氣有五常之性者故樂所以蕩滌反其邪惡也禮所以防淫佚節其侈靡也臣若水通曰本之喜怒而節文之禮樂之本也本於五常之性也故能節人之喜怒而邪侈不生樂主氣故象天禮主質故法地夫有有形之禮有無形之禮有有聲之樂有無聲之樂無形之禮嚴而泰及其至也位天地無聲之樂和而節及其至也育萬物天地位禮孰大焉萬物育樂孰廣焉是故知禮樂之非二矣是故知天地萬物之一體矣班固曰王者設三教者何所以承衰救弊欲反正道也臣若水通曰三教者何也忠敬文也何以並施也夫道中正而已矣三者因時而施所以致於中正之道也是故文而無忠其失薄敬而無文其失陋忠而無敬其失野三教並施弊斯已矣故曰教者所以追補敗政靡弊也格物通卷六十
