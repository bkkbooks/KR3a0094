body:
  text: 格物通卷五十明湛若水撰使衆臨民易臨象曰澤上有地臨君子以敎思无窮容保民無疆臣若水通曰臨卦上坤下兑故為澤上有地之象上臨下者也君子體此以盡臨下之道以兑水之能入物而敎之以趨於善資深逢原日新不已也奚有窮焉以坤地愽厚之能容物保民以遂其生包含徧覆无逺弗届也奚有疆焉盡是二者而臨下之道得矣為人君有臨下之任者不可不取法焉明夷象曰明入地中明夷君子以莅衆用晦而明臣若水通曰聰明睿知足以有臨文理密察足以有别此自然之明照也孟子曰所惡於智者為其鑿也鑿則傷於明而非自然之覺矣明夷一卦有明入地中之象則傷於明而以察察之私智臨乎民民有不安矣君子觀此象以臨民當神明内藴無作聰明而自用晦故民之是非邪正無能遁其情矣語曰察見淵魚者不祥智料隠慝者有殃為上莅衆者警之書虞書大禹謨皋陶曰帝德罔愆臨下以簡御衆以寛罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心茲用不犯于有司臣若水通曰此皋陶以民不犯法歸功於舜得臨御之道也愆過也簡者不煩之謂嗣與世皆謂子孫也延逺及也過者不識而誤犯也故者知之而故犯也辜罪也經常也皋陶言臣庶不干正民協于中者非予之功乃帝之德無過也上煩密則下無所容帝則臨之以簡御者急促則衆擾亂帝則御之以寛刑罰則父不及子爵賞則逺及其世其惡惡短而善善長也過誤所犯雖大必宥不忌故犯雖小必刑即所謂𤯝災肆赦怙終賊刑也與其殺之而害無罪者之生寧姑全之而自失於刑法之常此其仁愛忠厚之至皆所謂好生之徳也此徳流衍洋溢漸涵浸漬有以入於民心則天下之人無不愛慕感恱興起於善而自不犯于有司也夫帝舜之徳大矣至矣而皋陶賛之不過曰簡曰寛曰好生何耶夫天地之大徳曰生而已矣乾坤之廣大曰易簡而已矣聖人者體天地之大德而法其易簡故其並生之心與天地凖故天地並育並行而萬物不悖聖人並生而萬民不犯職此故也後世法網愈密而犯法益衆盍亦反求其本矣周書無逸徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民臣若水通曰此周公舉文王保民之勤以告成王也徽懿皆美也昃日昳也柔謂之徽則非柔懦之柔恭謂之懿則非足恭之恭文王有柔德而徽有恭德而懿其德之盛及於民於小民則懐保之愛之如赤子也於鰥寡則惠鮮之垂首喪氣者賚予賙給使之有生意也自朝至於日之中自中至於日之昃一食之頃有不遑暇欲舉天下之民而咸和之使無一不得其所也文王之拳拳於民一食不暇者皆自其視民如傷一念之仁發之也為人君者臨民撫衆當以文王之心為心周書君陳無依勢作威無倚法以削寛而有制從容以和臣若水通曰此成王命君陳治洛之言也依勢倚法皆好惡有加之意所以戒其偏也寛而制和而從容皆並行之意所以勉其中也此數言者最為精密心若茍偏喜怒予奪毫髮私意之萌即非公理也即是作威以削君陳之世當寛和之時也然寛而有其制則不偏於寛矣從容以和之則不偏於和矣夫戒其偏勉其中而後可以成中和之政也詩大雅靈臺經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來臣若水通曰此詩述民樂之詞而此章見民樂文王之作臺也經始經營之始靈臺臺名亟急也言文王始為靈臺經營之時庶民皆來趨事赴功而供土木之役則成之有不待終日矣文王憂民之勞則戒以經始不可如是之急也於是庶民感文王之仁如子趨父之事赴父之功自有不能遏焉夫文王之作靈臺不免勞乎民也斯民樂之而不怨豈其情邪君民相體惟此心而已矣故經始勿亟文王之心真父母之心也庶民子來斯民之所以體父母之心也君民一體如父子一心故歡欣踴躍自有以鼓動其心而自忘其勞也為民父母者可無愛民之心乎誠使臨民使衆如文王勿亟之心則民亦有子來之心至於危難變急之中尚可以得其死命而不忍去者況土木之勞奚怨哉後之人主無愛民之心視民如草管至有閭閻弗食弗息愁苦怨極猶且土木煩興戰鬬弗息使之展轉而死為民父母如此豈望下民如子弟之衞父兄哉及其一夫作難四方瓦解如驪山之役徒反為仇讐倒戈之民血流漂杵可不懼哉商頌長發受小球大球為下國綴旒何天之休不競不絿不剛不柔敷政優優百禄是遒臣若水通曰此詩宋儒朱熹以為祫祭之詩也小球大球小國大國所贄之玉也旒旗之垂者也言為天子而為諸侯所係屬如旗之縿為旒所綴著也競强也絿綬也優優寛裕之意言湯之負荷天命在於得人而得人之道在得其中而巳故過剛則猛猛則民殘過柔則寛寛則民慢皆非得中之道也惟湯執中故其敷政於民者不競而過於強不絿而不及以緩故不競則不剛矣不絿則不柔矣優優乎大道之中此人心之所以歸天命之所以集也雖然湯之政所以得其中者豈外於一心哉蓋心之本體中正而已湯惟聖敬日躋顧諟明命不失乎此心之本體故政之所施一中正之本體流行而不息爾後之為政者不求此心以立中正之體徒欲事事以求其中雖偶有所合議擬之際不覺巳墮於過不及之偏矣安能恒其中耶故善為政者必本諸心以先立其大者禮記王制曰凡使民任老者之事食壯者之食臣若水通曰此古者御衆臨民役之之恕也任老者之事言輕也食壯者之食言厚也任輕而食厚則民心得矣夫人情莫不欲逸茍食重而任輕則所欲與聚而民心歸矣是故靈臺之役庶民有子來之詠申國執戍而一時有楊水之嗟則亦可以見民心之向背也嗚呼鑒諸雜記孔子曰張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也臣若水通曰夫道中而已矣或弛或張亦中而已矣故偏於張則過偏於弛則不及天地之否泰日月之盈虧寒暑之徃來則固有然者矣故久於勞則力憊久於息則志逸而淫文武之治陰陽合道剛柔同德天理之中正也使民如此則天下之民悦而願為之使矣緇衣君民者子以愛之則民親之信以結之則民不倍恭以莅之則民有孫心臣若水通曰子者慈也孫者遜也夫慈信恭敬君民上下同心者也以慈感慈則民心親以信感信則民心固以恭感恭則民心讓使民親遜而不倍惟上之所以臨御而感之者何如爾論語子曰道千乘之國敬事而信節用而愛人使民以時臣若水通曰此章夫子雖為道千乘之國而言然治天下之道亦不外此敬者主一信者實心節用者量入為出不濫費也愛人者惠鮮子惠仁乎民也時使者凡有力役必以農隙之時不違其春耕夏耘秋收之時也五者事雖不同皆在人主之一心爾誠能存此愛民之心則施諸政事之間無非此心之形見而事自能敬民自能信人自能愛用自能節不時使民斷有不忍為者矣故君心正而萬事理矣然則五者固為為治之要而君心者得非出治之本乎子曰臨之以莊則敬孝慈則忠舉善而敎不能則勸臣若水通曰此聖人答季康子之言也然康子之意在欲使民之自盡而聖人之說惟欲其以身而先民蓋以身敎者從以言敎者訟故吾之臨之者敬存於中而莊見乎外瞻視容貌之尊嚴威可畏儀可象則民興起其敬上之心矣孝於親慈於衆孝足以為民之效慈足以結民之心則民興起其忠上之念矣善者舉之以歆動其善心不能者敎之以善誘其志向則善者益善而不能者亦勉於善矣民豈有不勸乎是故御衆臨民之道在乎為人上者躬行心得之間爾夫豈外慕而逺求之哉孟子曰得其心有道所欲與之聚之所惡勿施爾也臣若水通曰孟子此言得民心者在聚其所欲而勿施其所惡爾蓋如富夀安逸是人之所欲者亦我之所同欲必由我之所欲而知人之所欲則必生之厚之扶之節其力所以聚其欲也貧夭危勞是人之所惡者亦我之所惡必由我之所惡知人之所惡則必不傷其生不困其財不危其身不盡其力而勿施之可也是則民之好惡不外乎吾之好惡而民心可得矣夫好惡民之心也亦我之心也欲得民之心必得吾之心則民心在是矣然則臨民之道豈不於吾心而得之哉孝經曰言思可道行思可樂徳義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德敎而行其政令臣若水通曰言思可道者度民之可道而後言則言有物也行思可樂者度民之可悦而後行則行有恒也徳義可尊者凡立德行義必得大中之道為民之所共尊也作事可法者舉行政事必合至中之規可為民之所共法也容止威儀必中乎禮而可觀進退動静皆有定則而可度也如是而臨民民其畏威懐德而取象之是故德敎成而政令行矣國語周語内史過曰先王知大事之必以衆濟也故祓除其心以和惠民考中度衷以涖之昭明物則以訓之制義庶孚以行之祓除其心精也考中度衷忠也昭明物則禮也制義庶孚信也然則長衆使民之道非精不和非忠不立非禮不順非信不行臣若水通曰祓猶拂也考中度衷者考省巳之中心以度人之中心恕以臨之也物事也則法也庶衆也制義庶孚者當制立事宜為衆所信而行之也夫不得其民不足以濟事不得其心不足以得民故君子使民如承大祭而不敢忽焉精以和之忠以立之禮以順之信以行之夫然後得其心而得其民以之圖事何事不濟哉晉侯背外内之賂而怠棄四者吾知其逺不來近不和而大事去矣有天下者慎無以丘民之微而忽易之也漢宣帝地節四年十二月渤海太守龔遂入為水衡都尉先是渤海左右郡歳饑盜賊並起二千石不能擒制上選能制者丞相御史舉遂上拜為渤海太守召見問何以治渤海息其盜賊對曰海瀕遐逺不霑聖化其民困於饑寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中爾今欲使臣勝之耶將安之也上曰選用賢良固欲安之也遂曰治亂民如治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黄金乘傳至渤海界郡聞新太守至發兵以迎遂皆遣還移書勅屬縣悉罷逐捕盜賊吏諸持鉏鉤田器者皆為良民吏毋得問持兵者乃為盜遂單車獨行至府盜賊聞遂敎令即時解散棄其弓弩而持鉤鉏於是悉平遂乃開倉廩假貧民選用良吏慰安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約觀民農桑民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢勞來循行郡中皆有畜積獄訟止息臣若水通曰民不可以威制而可以恩感者得其心也龔遂治渤海之盜以恩信代兵甲而羣盜化為良民可以為使衆臨民者法矣漢宣帝神爵三年八月東郡太守韓延夀為左馮翊始延夀為潁川太守潁川承趙廣漢搆㑹吏民之後俗多怨讐延夀改更敎以禮讓黄霸代延夀居潁川霸因其迹而大治延夀為吏上禮義好古敎化接待下吏恩施厚而約誓明或欺負之者延夀痛自刻責曰豈其負之何以至此吏聞者自傷悔至自刺自剄其在東郡三歳令行禁止斷獄大減由是入為馮翊延夀出行縣至高陵民有昆弟相與訟田自言延夀大傷之曰幸得備位為郡表率不能宣明敎化至令民有骨肉爭訟既傷風化咎在馮翊因閉閤思過於是訟者自悔願以田相移終死不敢復争郡中翕然相敕厲不敢犯延夀恩信周徧二十四縣莫復以詞訟自言者推其至誠吏民莫忍欺臣若水通曰延夀守潁川崇尚敎化接待下吏恩厚約明或欺負之則痛自刻責及入為馮翊民有爭田閉閤思過郡中翕然所謂其身正不令而從者矣昔孔子為政於魯有訴其子不孝者孔子不治而季孫尤焉季孫未知聖人之道者也故暴母之陳元可使泣血而從善鸞鳯之德過於鷹鸇逺矣治天下者豈徒以法律為哉漢光武建武七年冬南陽太守杜詩政治清平興利除害百姓便之又修治陂池廣拓土田郡内比屋殷足時人方於召信臣南陽為之語曰前有召父後有杜母臣若水通曰詩曰愷悌君子民之父母言其仁政之施足以盡使衆臨民之道也杜詩南陽之政無愧於所謂愷悌矣召父杜母之德可以為千萬世臨民者之法矣漢獻帝初平四年北平田疇奉使長安得報馳還謁祭劉虞墓北歸無終率宗族及他附從者數百人掃地而盟曰君仇不報吾不可以立於世遂入徐無山中躬耕以養父母百姓歸之數年間至五千餘家疇謂其父老曰今衆成都邑而莫相統一又無法制以治之恐非久安之道疇有愚計願與諸君共施之可乎皆曰可疇乃為約束相殺傷犯盜爭訟者隨輕重抵罪重者至死凡三十餘條又制為婚姻嫁娶之禮興學講授之業班行於衆衆皆便之至道不拾遺北邊翕然服其威信臣若水通曰莅衆之道禮法二者而已田疇立法制以為維持之具具禮敎以為化導之本此威信所以行於邊郡而翕然化服也後世有專以法把持天下而不知禮敎之具其如民心之服何哉居上臨下者尚留意焉唐高祖武德元年九月丁未上嘗曰王者視四海如一家封域之内皆朕赤子臣若水通曰仁者以天地萬物為一體四海一家非體仁者不能與於此也四海困窮天禄永終堯之所以光被四方有罪罪在朕躬湯之所以永清君天下者不師堯舜禹湯之仁而欲保安至治雖有所施皆不過意見而已何以體四海一家之仁哉唐太宗貞觀二十一年二月辛卯上曰朕於漠北所以能取古人所不能取臣古人所不能臣者皆順衆人之所欲故也昔禹帥九州之民鑿山槎木疏百川注之海其勞甚矣而民不怨者因人之心順地之勢與民同利故也臣若水通曰湯武之得天下順乎天而應乎人葢天人之心一也太宗順民之欲民皆忘勞故能攘冦敵而臣服之以成振古所無之功然則君臨天下者盍亦順民之所欲哉劉向說苑曰聖人之於民也其猶赤子乎饑者則食之寒者則衣之將之養之育之長之惟恐其不至於大也臣若水通曰如保赤子言保民也傳曰民吾同胞物吾與也有同胞共與之仁則保赤子之心自不容已矣民之視其君猶赤子之視其父母饑寒疾苦罔不仰望焉為人上者茍能誠心愛民如慈母之保赤子則必為之求順其欲矣非天下之至仁曷足以語此今聖明好學體行仁道所以子臨億兆之道當不外聖心而自得之矣天下臣民幸孰大焉栁宗元郭槖駞傳曰駞業種樹凡長安豪富人為觀游及賣果者皆爭迎取養視駞所種樹或移徙無不活且碩茂蚤實以蕃他植者雖窺伺傚慕莫能如也有問之對曰槖駞非能使木夀且孶也能順木之天以致其性焉爾凡植木之性其本欲舒其培欲平其土欲故其築欲宻既然已勿動勿慮去不復顧其蒔也若子其置也若棄則其天者全而其性得矣故吾不害其長而已非有能碩茂之也不抑耗其實而已非有能宻而蕃之也他植者則不然根拳而土易其培之也若不過焉則不及茍有能反是者則又愛之太殷憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯揺其本以觀其疎宻而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讐之故不我若也吾又何能為哉問者曰以子之道移之官理可乎駞曰我知種樹而已官理非吾業也然吾居鄉見長人者好煩其令若甚憐焉而卒以禍旦暮吏來而呼之曰官命促爾耕朂爾植督爾穫蚤繰而緒蚤織而縷字而幼孩遂而雞豚嗚鼔而聚之擊木而召之吾小人輟饔飱以勞吏者且不得暇又何以蕃吾生而安吾性耶故病且怠若是則與吾業者其亦有類乎問者嘻曰不亦善乎吾聞養樹得養人術傳其事以為官戒也臣若水通曰堯典曰疇若予上下草木聖人盡人物之性在順之而已矣栁宗元槖駞之論蓋本諸此方今之弊日甚矣蓋使司一局面也監司一局面也分巡一局面也分守一局面也州府一局面也縣邑一局面也是所謂一羊而九牧者也上有所令則下必承之而擾民耗財又不特一吏不但如饔飱勞吏而已也是故長吏之不才者既多端以迫之而吏胥之尤不才者復藉其威以害之而令之所頒況非促耕督穫之意乎聖明明見萬里之弊慎擇守令以任之或命羣臣各舉所知以充厥任舉得其人者賞之失其人者置而弗賞聖明必親疏其名于屏風以驗之三載考績守令有功者加賞而舉者亦賞焉或服采以章之或爵命以榮之而九載則超以擢之如是則舉者實得其人為之守令無弗奮庸熈帝之載矣夫守令得人天下未有不治者故人主當愽訪廣詢以為天下計而又清心以昭賢否之鑒然後近習不得而惑焉臣不勝願望之至宋儒程頥曰常見伯淳所在臨政便上下響應到了人衆後便成風成風則有所鼓動天地間只是一箇風以動之也臣若水通曰天之生人同此心同此理而已矣故人心誠而己臨政者以至誠感之則民無不應民無不應則化行而俗善矣程顥所在臨政而上下響應者豈非得其心之同然哉為政者當思所以感之者何物然後可也易曰聖人感人心而天下和平豈無所本哉楊時謂莫表深莅官臨政嚴而不苛寛而有制故吏畏其威民懐其徳決滯訟去民瘼洞照幽隠雖逢其族迎刃立解世之名能吏者皆自以為莫及也臣若水通曰書稱不剛不柔厥德允修言得中也表深臨莅嚴而不苛寛而有制其近是乎政寛則民慢慢則糾之以嚴政嚴則民殘殘則濟之以寛非寛嚴合徳得其中者也寛嚴得中政是以和此二者之所以不容於偏廢也伏惟聖明推而達之天下焉張栻云今之為吏其號為能者則或以察為明以刻為公以不恤為能任而其號為賢者則又或以姑息為惠以縱弛為寛以磨稜為善䖏故其能適以賈怨貽毒撅害邦本而其賢反以流弊基禍及其後曰嗟乎此豈真所謂賢能也哉臣若水通曰政貴有恒所謂恒者得中道之常也故過則為察為刻為不恤焉不及則為姑息為縱弛為磨稜焉皆足以戕其國本禍其邦家以傷忠厚和平之氣也使無過無不及則剛柔中正可以納民於皇極之福矣此有天下者不可不慎抑揚之權黜陟之典也國朝憲綱凡按察司官斷理不公不法等事果有寃抑者許赴巡按監察御史處聲寃監察御史枉問許赴通政司逓狀送都察院伸理都察院不與理斷或枉問者許擊登聞鼓陳訴臣若水通曰君之於民一體者也民之情鬱而不伸其猶四肢之氣失其平而為疾者乎愛身者順其氣而通之愛民者達其情而安之斯已矣舜命士曰惟明克允張釋之亦曰廷尉天下之平也司刑法者尚其念諸憲綱凡國家政令得失軍民利病一切興革等事並聽監察御史按察司官各陳所見直言無隠若建言創行事理必須公同評議互相可否務在得宜方許實封陳奏憲綱風憲為朝廷耳目之司宣上德達下情乃其職任所至之處須訪軍民休戚及利所當興弊所當革者隨即舉行或有水旱災傷當奏者即具奏不可因循茍且曠廢其職臣若水通曰臣伏讀憲綱二章仰見祖宗達上下之情明利弊之故拳拳為民之深意也夫天生民不能自治而作之君程頥曰為民立君所以養之也君不能獨治而委之臣使興利而革弊正以順民情而安民生養之大者也所欲與聚所惡勿施其興革之謂與為風憲者當以第一義視之斯可無負於上天付託聖主聖主付託人臣之至意也格物通卷五十
