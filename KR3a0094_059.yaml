body:
  text: 格物通卷五十九明湛若水撰學校二禮樂政教附周禮地官大司徒之職掌建邦之五典以佐王擾邦國訓萬民一曰父子有親二曰君臣有義三曰夫婦有别四曰長幼有序五曰朋友有信臣若水通曰此吳澄所補缺文也邦之五典者五品之人倫凡邦國人人所同有者也故司徒立此五典而佐王馴擾邦國以訓萬民使習熟教化五品遜而百姓親焉五典者父子有親也君臣有義也夫婦有别也長幼有序也朋友有信也親義序别信乃出於人心之同然故以是教之非強其性之所無也特因人之所固有而教之爾為君師有教人之責者盍亦思之哉地官大司徒以五禮防萬民之偽而教之中以六樂防萬民之情而教之和臣若水通曰禮樂之功用大矣禮也者理也心存乎理則邪妄之私釋而無不中矣樂也者樂也心得其樂則淫蕩之情平而無不和矣故聖人之立教必先務焉禮以理之樂以樂之致天下於中和而教化之事畢矣周禮大司樂掌成均之法以治建國之學政而合國之子弟焉凡有道者有德者使教焉死則以為樂祖祭於瞽宗以樂德教國子中和祗庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大頀大武臣若水通曰成均者五帝之學名也以典樂之官掌成均之法者樂有聲音度數可以養人中和之德而救其氣質之偏也故聚公卿大夫之子弟於國學而使士之道明德立者教之死則尊之為樂祖祭之于瞽宗示不忘其所教也中者心不偏倚和者情無乖戾祗者肅恭之謂庸者平常之謂善事父母為孝善處兄弟為友此之謂樂德也興者托物興詞道者直陳其事諷者微言以寓意誦者吟咏以達情自言其志曰言因問而答曰語此之謂樂語也雲門大卷黃帝之樂大咸帝堯之樂大㲈大舜之樂大夏大禹之樂大頀成湯之樂大武武王之樂此之謂樂舞也教之樂德以養其易直子諒之心教之樂語以慎其溫厚和平之發教之樂舞以動蕩其血脈流通其精神則其中和之德成矣然則禮樂之功用其至矣哉地官鄉大夫正月之吉受教法于司徒退而頒之于其鄉吏各以教其所治以考其德行察其道藝臣若水通曰鄉大夫者六鄉之長也鄉吏者州長黨正族師閭胥比長也教法者大司徒之職十二教以下也德行者德之行也道藝者六藝也道之藝也二業並行先王之所以教也春官大宗伯以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物臣若水通曰樂由陽來禮以地制皆本於天地中和之至故能合天地之化百物之産也由是以之事鬼神則郊焉天神假廟焉人鬼享以之諧萬民則羣后讓庶尹諧以之致萬物則百獸舞鳯凰儀聖人制禮作樂所以參天地贊化育者如此其教化之至矣論語子曰道之以政齊之以刑民免而無恥道之以德齊之以禮有恥且格臣若水通曰此章孔子敘政教之本末也道引導之也政者法制禁令也刑者墨劓浙宫大辟之五刑也德者得於心之理也禮者見於人倫日用之體也皆一理也以其設施乎此以正人者謂之政以其禁違乎此以罰人之過惡者謂之刑以其心得乎此者謂之德以身履乎此者謂之禮但政刑制乎外者也故引之以政令如令民以孝弟則民宜有以自正其不孝不弟矣其有不率正而犯法者則有不孝不弟之刑以一之使不外乎孝弟之化則民茍免其不孝不弟而未能得孝弟之真心故未有愧恥也德禮感於中者也故引之以躬行心得之理有孝弟之真心以感之則民宜有以觀感自得孝弟之善念矣其有淺深不同者則有盡孝盡弟之實事以一之使同歸孝弟之禮則民履於身得於心既恥於不孝不弟而又有以至於孝弟之至善矣然則人君為治以化民者豈可徒恃其末而不務其本乎季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正臣若水通曰季康子魯大夫帥猶引也康子以政問於孔子欲知為政之道孔子則因其問而對之言政之為言正也所以正人之不正也然欲正人之不正必先自正其身蓋必自其念慮之微以至於號令之發念必正念言必正言行必正行有端莊方直之公而無偏倚反側之私則所謂正矣然此正乃人心之本體天理之極致也子既帥以正則有以感其同然之心興其固有之善孰敢有不正乎故無反無側會極歸極自有不能已者矣孟子謹庠序之教申之以孝悌之義頒白者不負戴於道路矣臣若水通曰此章言既富之後不可無學校之教乃致王之本也然而學校之教莫重於人倫而人倫之中莫切於孝悌孝悌乃人之真心人所同有者也故因心之愛敬而以孝親悌長之道根於天性者而三令而五申之致其丁寧之意以發其天性之真則知愛親敬長而代其勞自五十以上頭半白黑者可以不負於背戴於首勤勞於道路矣此義明則推之五倫皆明所謂人倫明於上小民親於下親親長長而天下平矣雖以堯舜之治其所以成協和風動之化者亦豈有外於此哉此孟子於齊梁之君獨致意於此也求平天下之要道者尚於此圖之設為庠序學校以教之庠者養也校者教也序者射也夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也人倫明於上小民親於下臣若水通曰此孟子告滕文公以三代教人之法也夫井田立而衣食足矣先王乃立庠序學校以教民於其間夫所謂庠者以養老為名所謂校者以教民為名所謂序者以習射為名在夏則曰校在殷則曰序在周則曰庠三者皆鄉學也若夫學則在殷者猶在夏之名也其在周者猶其在殷之名也皆國學也鄉學國學之名雖不同而明人道之序其實則同所謂人道之序者父子之親君臣之義夫婦之别長幼之序朋友之信皆是也五者雖不同而同一天理也天理明則人道明而親義别序信發乎心感乎民民感而化之親義别序信之心油然而生有同體之仁百姓親而五品遜矣蓋教民之道有所以感之者也後之鄉學國學猶古也其講説親義别序信之道猶古也而小民未見其親者何哉徒有其具天理不明人心不正無所以感之者爾人君可不求立教之本乎后稷教民稼穡樹藝五穀五穀熟而民人育人之有道也飽食暖衣逸居而無教則近於禽獸聖人有憂之使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之聖人之憂民如此而暇耕乎臣若水通曰后稷名棄有虞養民之官樹亦種也藝殖也契亦舜臣名司徒掌教之官也有道言有秉彞之性也孟子告陳相言舜之時水土平然後可以教稼穡衣食足然後可以施教化故后稷教民樹五穀而人民各得其養矣然不教則放逸怠惰而失其所有之常性入於禽獸之歸故使契為司徒教之以人道之序所謂人道之序者非他也天理也天理存之心發而為親義序别信見於父子君臣夫婦長幼朋友之間也放至勳功也史臣稱堯之功大而孟子因以為堯號又引堯言勞而勤於是者則勞之來而歸於是者則來之邪者枉者而悖於是則正而直之輔以使之立翼以使之行使自得其性矣又從而提撕警覺以加惠之堯之命契為司徒如此其詳且盡大抵皆於此心此性此秉彞上致力因人之所固有而抑揚反覆以覺之爾有君師政教之責宜深體焉仁言不如仁聲之入人深也善政不如善教之得民也善政民畏之善教民愛之善政得民財善教得民心臣若水通曰孟子此章論政教之道而重於教言為人上者有仁德之言出乎身加乎民發號施令非不能令行而禁止也若夫有仁之聲聞積之於平素播之鄉黨朋友則有以入人之耳感人之心淪於肌膚入於骨髓故人得之為尤深也紀綱法度之施出乎上布乎下非不能正其邪禁其惡也若夫有善教者立學校明禮義則化之所及民之所感尤為深也且善教何以得民之深哉蓋善政制之於外故民畏其威而不敢犯善教則感之於內故民愛其德而不忍犯也善政則以下奉上而民財得矣未必得其心也善教則以誠感誠而民心得矣而財亦不能外也畏之者外愛之者內也民財者外民心者內也其得民之淺深此其所以有不同乎為人君者本之以仁聲行之以善教則入民而民心得其於政令之末蓋有不言而信不怒而威者矣可不務哉左傳襄公二十九年吳公子札來聘請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌弼鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然何憂之逺也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也見舞象簫南籥者曰美哉猶有憾見舞大武者曰美哉周之盛也其若此乎見舞韶頀者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉大矣如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣雖有他樂吾不敢請已臣若水通曰古之學者成於樂故傳曰唯君子為能知樂是故審聲以知樂審樂以知政而治道備矣札其知樂君子也歟於其歷代之音列國之風既皆稱贊而品别之而韶之一樂獨贊其天地之覆載為盛德之蔑加信乎見之真也夫子在齊之嘆曰不圖為樂之至於斯也札之見其殆庶幾乎若夫歌陳而嫌于無主固也至於秦則有主矣歌秦而止謂之能夏而大不贊其美者何也札之意其有所感而憾者矣嗚呼聞其樂而知其德君子所以差等百王也可不慎歟襄公三十一年鄭人遊于鄉校以論執政然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也臣若水通曰學校者人才之所由出公議者公道之所由行治化之基也天下一鄉之積也春秋教衰鄭之鄉校僅存元氣猶在爾人猶以其議執政而欲毁之不亦異乎子産曰其所善者吾則行之其所惡者吾則改之是吾師也夫又焉往而非自得師子産於是乎知學矣他日亦嘗告子皮曰僑聞學而後入政未聞以政學者也子産其知學矣夫知學者然後能教人可不務乎昭公二年春晉侯使韓宣子來聘觀書于太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之德與周之所以王也臣若水通曰韓宣子晉大夫聘問於魯太史官名周禮周道也宣子見易之卦義及魯之春秋而嘆周之道盡在魯蓋易以明道之時春秋以明道之是非皆道之所寓者也聖人既往道在遺經誦言而忘味者鮮不以為糟粕無用而教微矣宣子一聘魯得大道於遺編而知周公之德之盛與周王之所以興可謂善觀書而不泥于書者矣昭公二十六年齊侯與晏子坐於路寢公曰吾今而後知禮之可以為國也晏子對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王尚之臣若水通曰禮者道之體而教之本也國有禮則治無禮則亂人有禮則順而善無禮則逆而惡晏子告齊侯不越乎君臣父子兄弟夫妻姑婦之間可謂知禮之要矣其曰先王所稟於天地以為民者既有以見夫命于天性于我而教于民者又有以見道教之大原出於天不可易也奈何景公徒善之而弗行自夫此禮不行於君臣也而上下紊自夫此禮不行於父子也而國本隳自夫此禮不行於兄弟也而同氣手刃自夫此禮不行於夫婦也而嫡庶混自夫此禮不行於婦姑也而誶語反唇教不立禮不興國安得而不亂乎當是之時大夫陳氏厚施于國齊之亂萌矣由禮之壞也夫禮也者理也道之體也三代之教天子公卿躬行於上故其化行臣不勝願望於今日國語周語景王鑄無射單穆公曰先王之制鍾也大不出鈞重不過石律度量衡於是乎生小大器用於是乎出故聖人慎之臣若水通曰鈞所以鈞音之法也以木長七尺有弦繫之以為鈞法百二十斤為石律陰律陽律各六以正五音之法也度丈尺也量斗斛也衡有斤兩之數皆生於黃鍾黃鍾之管容秬黍千二百粒粒百為銖是為一籥籥二為合合重一兩故曰律度量衡於是乎生出出於黃鍾也小謂錙銖分寸大謂斤兩丈尺先王作樂以宣教化而關石和鈞律度量衡器用由兹焉出故曰黃鍾萬事根本傳曰禮樂積德百年而後興今其時矣伏望聖明考先王黃鍾之制以興禮樂之化追三代之治天下幸甚周語伶州鳩曰有和平之聲則有蕃殖之財於是乎道之以中德詠之以中音德音不愆以合神人神是以寧民是以聽臣若水通曰伶司樂官州鳩其名也作樂則氣和故可以殖財也中德中和之德舞也中音中和之音也合神人謂祭祀享宴也聽從也先王之作樂也將以平心宣化阜民殖財昭格天神也如匱財罷民以逞淫心聽之不和比之不度惡在其為樂哉周景王欲鑄無射逮崩而鍾不和失其道矣為人君之尊蒞中國而操制作之權者可不慎其禮樂之本乎伶州鳩曰上作器民備樂之則為和臣若水通曰此言聲音之道與政相通也夫樂者和也和生於心感於民者也茍樂作而民有怨咨則何以成其和氣而達諸聲音乎故功成治定而禮樂可興為人君者其可不慎其所以和民心之道哉齊語正月之朝鄉長復事君親問焉曰於子之鄉有居處好學慈孝於父母聰慧質仁發聞於鄉里者有則以告有而不以告謂之蔽明其罪五有司己於事而竣桓公又問焉曰於子之鄉有拳勇股肱之力秀出於衆者有則以告有而不以告者謂之蔽賢其罪五有司己於事而竣桓公又問焉於子之鄉有不慈孝於父母不長弟於鄉里驕躁暴淫不用上令者有則以告有而不以告者謂之下比其罪五有司己於事而竣是故鄉長退而修德進賢桓公親見之遂使役官臣若水通曰鄉長鄉大夫也復白也周禮正月之吉鄉大夫受法於司徒退班於鄉吏以考其行脛本曰股肱臂也大勇為拳上君長也役為也夫聖王之立教化必始於鄉矣鄉大夫者所以傳君之教以達於民令其父兄教其子弟因其土俗通其性情故子弟之從之也輕夫鄉人之善也鄉大夫必知之鄉人之不善也鄉大夫必知之故考於鄉大夫而鄉人之善惡可知矣此三代所以成材之易而鄉舉里選之法所以行乎人君者欲法三代之治必復舉選之法欲復舉選之法必復鄉大夫之教焉漢高帝六年帝悉去秦苛法為簡易羣臣飲酒爭功醉或妄呼拔劒擊柱帝益厭之叔孫通説上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀帝曰得無難乎叔孫通曰五帝異樂三王不同禮禮者因時世人情而為之節文者也臣願頗采古禮與秦儀雜就之臣若水通曰大亂之後必有大治三代之禮雖隨時損益然而皆緣人情而設故三千三百無一而非性也叔孫通以此時而復三代之禮皆順人之情性其從也沛然矣況漢初去古未逺禮樂雖壞於秦文獻則固有可考者也叔孫失此不圖而徒竊古禮之粳粃且與秦儀雜就之雖能少正擊柱之狂而禮樂自此壞矣古禮之不復見於天下其由於叔孫通乎有志之士至今惜之漢武帝建元元年十月董仲舒對策曰古之王者南面而治天下莫不以教化為大務立大學以教於國設庠序以化於邑漸民以仁摩民以義節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也臣若水通曰古之王者南面而治如天運於上示無為也立學分教如元氣之行於四時示有功也是以治隆於上俗美於下人將格心矣仲舒以是而欲行於武帝之世其如天地之德元氣之運何哉漢成帝綏和元年劉向説成帝興辟雍設庠序陳禮樂以風化天下如此而不治未之有也夫教化之比於刑法刑法輕教化所恃以為治刑法所以助治也今廢所恃而獨立其所助非所以致太平也臣若水通曰胡寅云劉向之論美矣而未循其本也孔子曰人而不仁如禮何人而不仁如樂何真萬世定禮樂之本也故有仁心者心之所履而敘則為禮禮之文成矣心之所樂而和則為樂樂之文成矣故禮樂者由心生者也劉向之學於此蓋未之講爾而欲教化天下難矣哉格物通卷五十九
