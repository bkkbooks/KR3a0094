body:
  text: 格物通卷九明湛若水撰警戒一易乾九三君子終日乾乾夕惕若厲無咎臣若水通曰九三以陽剛居正故有能乾乾之象乾乾健而不息之意敬也終日而敬體天理也至夕而惕若則敬之不息也敬也者存吾心天理之本體也一息有間則天理滅矣道不可須臾離也敬亦不可須臾忘也敬則心存而理得順理則裕也雖危何咎焉傅曰君子終日對越在天其乾乾之謂邪既濟象曰水在火上既濟君子以思患而豫防之臣若水通曰天下之濟莫大於交通坎水在離火之上上潤下下炎上隂陽之氣交通故有既濟之象時之既濟若治平而無復為矣然亂常生於治思患也者患其亂之生於治圖之於無形也防諸己者嗜欲也防諸人者奸佞也防諸外患者寇敵也防諸紀綱法度者僣竊而廢弛也凡踰越於天理之外者皆患也皆豫防之也身心為尤切矣邵雍曰防乎其防邦家之昌其永既濟之盛於無窮也乎繫辭子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑臣若水通曰危者以危為心也亡者以亡為心也亂者以亂為心也非深憂過計也所以存警戒也警戒存而保存治安警戒之所致也人君於安存久治之日存危亂喪亡之戒則驕奢淫欲不生故君德修而王政舉矣安富尊榮之福臻矣有國家者宜慎之震象曰洊雷震君子以恐懼修省臣若水通曰震一陽生於二隂之下動而上者故為震其象為雷重震故有洊雷之象雷之聲洊而重乃天之威也天無心而人心則因天怒而警省人心與天一者也不恐懼修省則與天不相似而棄天矣君子事天者也恐懼以自持思省其過而改之存心養性以事天也致中和以位天地也天人交應之理也孔子迅雷風烈必變與天一矣為天之元子者可不知乎虞書大禹謨益曰吁戒哉警戒無虞罔失法度罔遊于逸罔淫于樂任賢勿二去邪勿疑疑謀勿成百志惟熙罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王臣若水通曰此乃伯益廣大禹克艱惠迪之謨於帝舜之前罔失法度以下皆警戒之意虞慮也罔勿也法度法則制度也淫過也謀圖為也咈逆也九州之外世一見曰王百志猶易所謂百慮益言當四方無可慮之時人心易懈故當警戒也此時法度易至縱弛故戒其罔失此時逸樂易至縱恣故戒其遊淫此時任賢易以小人間之故戒其勿二此時去邪必不能果斷故戒其勿疑此時圖為或行其疑故戒其勿成凡若此者則百慮熙明方寸之間光輝明白心正身修義理昭著而於違道干譽咈人從欲之私皆能禁絶朝夕戒懼無怠於心無荒於事則治道益隆四夷之逺莫不歸往矣夫四夷之歸由於無怠荒無怠荒由於警戒其始起於一念之微其效感化乎四夷之逺為人君者可不知所務乎虞書禹戒舜曰無若丹朱傲惟慢遊是好傲虐是作罔晝夜額額罔水行舟朋淫于家用殄厥世臣若水通曰此乃禹戒帝舜之言朱堯之子名丹朱所封國名也額額不休息之狀罔水行舟如奡蕩舟之類朋淫于家者朋比小人而淫亂於家也丹朱不肖堯以天下與舜故曰殄世禹戒於帝舜曰無若丹朱之傲好慢遊作傲虐蓋丹朱額額然晝夜不少休息無水而行舟朋比而淫亂以自滅其世也夫舜大聖人也不為慢遊傲虐豈惟禹知之雖愚人亦當知之然惟聖罔念作狂况處崇高之位易至傲逸使一念之邪生則此一念便是慢遊便是傲虐便與丹朱無異矣故人君當防微杜漸日以莊敬自强然後可也夏書五子之歌曰訓有之內作色荒外作禽荒甘酒嗜音峻宇雕牆有一於此未或不亡臣若水通曰此亦五子述禹之訓以戒太康之意色荒惑嬖寵也禽荒耽遊畋也荒者迷亂之謂甘嗜皆無厭也峻高大也宇棟宇也雕繪飾也言六者有其一皆足以致滅亡也禹之訓昭明如此太康乃不念祖訓而盤遊于有洛之表十旬不反安得不致有窮后羿之距而自取滅亡乎臣愚謂此六者乃庸君世主之所必犯有一亦足以亡國不必六者之兼備矣後之人君欲守祖宗之大業當以禹之訓自省而以太康之禍為戒𦙍征先王克謹天戒臣人克有常憲百官修輔厥后惟明明臣若水通曰此乃𦙍侯述先王君臣警戒之意天戒如日蝕災異之類天所以警動開發人主者也董仲舒謂天心仁愛人君故以災異警動之即此也𦙍侯誓師言先王嚴於事天見天戒則恐懼修省克自抑畏以致謹於上而一時臣人百工又能戒謹常法各自修省以輔於下由是君德益以修明而災變不為之損矣故曰厥后惟明明觀堯舜有九年之水成湯有七年之旱而無損於至德者何邪蓋由其存兢業敕天之心反躬自責之誠故也夫天居高聽卑至不可欺也後之人君遇上天之戒可不以誠心修省而徒以文應天乎商書仲虺之誥欽崇天道永保天命臣若水通曰此仲虺以天命勸勉成湯也欽崇者恭敬奉承之意殖有禮覆昏暴福善禍淫天之道也恭敬奉承乎天之道則能敬天矣敬天則與天合德天命歸之故能永保其天命而不替矣為人君者喜怒刑賞之間可不以欽崇為心乎伊訓制官刑警于有位曰敢有恆舞于宫酣歌于室時謂巫風敢有殉于貨色恆于遊畋時謂淫風敢有侮聖言逆忠直逺耆德比頑童時謂亂風惟兹三風十愆卿士有一于身家必喪邦君有一于身國必亡臣下不匡其刑墨具訓于䝉士臣若水通曰此伊尹述成湯警戒之政令以訓太甲也制立也官刑官府之刑也墨者墨刑也匡正也三風綱也十愆目也卿士諸侯十有其一已喪其家亡其國矣臣下而不能匡正其君則以墨刑加之童蒙始學之士則詳悉以是告之欲其入官而知所以正諫也夫人心惟危道心惟微一不警戒則怠忽之心生人欲肆而天理滅矣夫天理存亡之幾安危治亂之决係於一念之微爾可不謹乎商書太甲先王顧諟天之明命以承上下神祗社稷宗廟罔不祗肅臣若水通曰此伊尹告太甲以成湯之敬天者欲其法之也顧者常目在之也諟古是字明命者上天顯然之理而命之我者也即天理是也承者奉也上下神祇天神地祇也祗敬也肅畏也伊尹言成湯察見天理動靜食息常目在之焉故於奉祀天地神祇社稷宗廟之時無不敬肅也蓋天理無時無處不在此特其著見之大者爾其所謂顧諟即孔子所謂立則見其參於前在輿則見其倚於衡也如此則其心誠敬可以交於神明是故祭天地則能敬天地祭社稷宗廟則能敬社稷宗廟蓋罔不祗肅即顧諟之心發之爾人君為天地社稷宗廟百神之主其可不敬天明命以為感格之本乎商書太甲惟天無親克敬惟親臣若水通曰此亦伊尹告太甲之言也伊尹言上天無常親能敬者則親之人君動靜語默不使一毫之慢則能敬矣敬則德與天合天豈有不親之乎商書咸有一德曰嗚呼天難諶命靡常常厥德保厥位厥德匪常九有以亡臣若水通曰此伊尹將歸而告太甲之言也嗚呼嘆辭諶信也靡不也九有九州也嘆息而言天之難信以其命之或去或留而不常也然天命雖不常惟德是與君德有常則天命亦常而保厥位矣君德不常則天命亦去雖九州之廣亦以亡矣然則人君可不修德以永天命保其位於無窮乎周書旅獒玩人喪德玩物喪志臣若水通曰此召公因西旅貢獒而戒武王之言也德者己之所得也志者心之所之也玩者狎慢怠忽之意言玩人則以驕而滅敬故喪德玩物則以欲而勝剛故喪志夫人怠忽之心生則狎慢之念起至於玩人玩物而喪其德與志矣可不戒哉周書召誥曰嗚呼皇天上帝改厥元子兹大國殷之命惟王受命無疆惟休亦無疆惟恤嗚呼曷其奈何弗敬臣若水通曰此召公託周公達成王之言也皇大也以天之主宰而言謂之帝休美也恤憂也言皇天上帝既立商受為天子矣以其惡而改之故大國殷之命亦從而改焉夫元子不可改而天改之大國之命未易亡而天亡之皇天上帝其命之不可恃如此今王受命固有無窮之美然亦有無窮之憂於是嘆息言王曷其奈何弗敬乎蓋深言不可以弗敬也夫敬肆在於一念邪正之間而存亡關於天命人心之大有天下者可不惕然起敬乎召誥我不敢知曰有夏服天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命我不敢知曰有殷受天命惟有厯年我不敢知曰不其延惟不敬厥德乃早墜厥命臣若水通曰此亦召公告成王之言也厯年永年也延長也德者心之理敬者德之聚也言夏商厯年長短皆不敢知我所知者惟不敬則德不修德不修則天命去矣故曰早墜厥命然則後之人君欲永命而厯年者可不敬德乎召誥王敬作所不可不敬德臣若水通曰此召公告成王之言也敬者程皓云主一之謂所處所也敬者心之本體德者心之天理也王能以敬為所則動靜語默出入起居心無往而不一而德存矣謂之處所者乃出入起居之地以敬作處所則是常戒慎恐懼而不能須臾離矣程皓曰天地設位而易行乎其中只是敬也敬則無間斷故才間斷則非僻之心入而本心之德亡矣况君德不立何以為化服臣民之本故又曰不可不敬德所以致丁寧之意也為人君者可不敬以立德為萬化之本乎多方惟聖罔念作狂惟狂克念作聖臣若水通曰此周公傳成王之言以告多方也聖者通明之稱狂者愚惑之謂念者警惺之謂言聖而罔念之時則失其本心而為狂矣愚而能念之時則得其本心而為聖矣作狂作聖在於一念存亡之間可不謹乎周官若昔大猷制治于未亂保邦于未危臣若水通曰此成王訓百官之言也言亂不生於亂而生於治未亂而為制治之策則亂可弭危不起於危而起於安未危而為保邦之計則危可免若至危亂之時則緩不逮事噬臍何及此古昔聖王大道之世治不忘亂安不忘危而制治保邦之心常拳拳於無事之時也有天下者所當知焉周官居寵思危罔不惟畏弗畏入畏臣若水通曰此亦成王訓迪百官之言也言居寵盛者則思危辱蓋盛則必衰滿則招損天之道也當無不致其祗畏茍不知祗畏則驕侈之心生亡身滅族之禍至入于可畏之中矣可不以盛滿為警戒乎人君之愛臣下亦不宜以寵利處之乃所以保全之也詩豳風鴟梟逮天之未隂雨徹彼桑土綢繆牖戶今此下民或敢侮豫臣若水通曰此詩周公因三叔流言成王疑之故自陳其警戒豫防之意託鳥言於天未隂雨之時取桑根之土纒綿堅固其巢之牖戶思患豫防如此今此衆人孰有因隂雨之至而覆巢取卵者乎以比國家於禍亂未萌之先及時而豫為之備則禍亂不能為之患周公為此詩自陳其忠誠備患之悃以冀王之悟也嗚呼以公之忠聖警戒豫防如此而猶不免流言之禍而成王之疑必待公作詩以自明如此成王亦非明哲之主矣使無周公之聖自忘警戒之心而天不動威則王終不悟周之為周未可知也嗚呼危哉後之人君又當以為警戒齊風雞既嗚矣朝既盈矣匪雞則鳴蒼蠅之聲臣若水通曰雞鳴乃古之賢妃御於其君夙興警戒於將旦之時必告君以雞既鳴而候朝之臣已盈滿矣然而匪雞鳴也乃蒼蠅之聲而惕然若雞鳴爾夫以蒼蠅為雞鳴則警惕之心不溺宴欲如此可謂賢矣夫虛靈不昧心之本體豈待人而後能之也氣習物欲蔽之則本體昏塞迷而不知返天理滅矣故人君者外有師傅弼正之臣內有妃嬪僕從之賢無非欲以警省其良心開發其聰明則人心不死而天理長存矣夫惟有昧爽丕顯之聖學則乾剛不息而內外將化之矣是又不待警戒而存者也春秋隱公五年春公觀魚于棠臣若水通曰傳有之天理人欲同行異情顧其心之邪正爾茍所好者正則見魚之躍淵悟道體之活潑見魚之洋洋則曰吾民之樂生得如是乎見魚之圉圉則曰吾民之困亦如此乎隨處知警容亦何妨若以為樂則戕心之斧斤也隱公為政春不省耕而恣情縱欲慢遊于棠觀魚為樂以蕩其心其能知警戒者寡矣天理之存者寡矣向使克自惕厲體認天理則與天地萬物同體何者非樂奚必於魚邪而乃玩物喪志未見其能樂也人君欲樂物之樂不若能樂民之樂宣公八年楚人滅舒蓼臣若水通曰楚人滅舒蓼何以書志警也何警也楚疆舒蓼及滑汭盟吳越將為中國憂也夫中國不貴其無四夷之虞惟患其無四夷之警無四夷之虞者弛德忘備安而不安也有四夷之警者思患固封危而不危也知危而危者危可使平知安而安者易可使傾此舒蓼之滅春秋書之以為經世者之一警云禮記曲禮曰敖不可長欲不可從志不可滿樂不可極賢者狎而敬之畏而愛之愛而知其惡憎而知其善積而能散安安而能遷臨財毋茍得臨難毋茍免狠毋求勝分毋求多臣若水通曰人心之動幾也幾也者理欲之分而善惡之原也君子知其幾而謹焉故能領惡而全好也是故長敖者賊也從欲者荒也志滿者驕也樂極者淫也若是者欲之熾而惡幾之成也故在逺之而已矣狎而敬敬所忽也畏而愛愛所嚴也愛憎好惡不失其正也施仁徙義必得其道也若是者理之充而善幾之成也故在為之而已矣毋茍得所以取義也毋茍免所以求仁也毋求勝所以養讓也毋求多所以養亷也若是者去人欲而存天理領惡而全好者故在謹之而已矣然所以逺之為之謹之者敬也敬也者人心之所以不死天理之所以長存也易曰君子終日乾乾夕惕若人主可不知乎曲禮曰嵗凶年榖不登君膳不祭肺馬不食榖馳道不除祭事不縣大夫不食粱士飲酒不樂臣若水通曰此言凶荒之變君臣自貶損以憂民也肺者周人所重食必先祭不祭示不殺牲為盛饌也馬不食榖不以粟秣之也馳道天子所行之路不除不敢勞民人也祭事必縣鍾鼓不縣言不敢作也夫國以民為本民以食為天嵗凶年榖不登則民無以為生災異莫此為甚君臣與民一體者也於飲食祭饗之供無不裁抑所以致憂恤於民而祈之於天也乃若遇此而恬不知修省則棄天矣棄天者天亦棄之為人君者可不警戒乎玉藻曰卒食𤣥端而居動則左史書之言則右史書之御瞽幾聲之上下年不順成則天子素服乘素車食無樂臣若水通曰𤣥端者幽隂之色宴息向晦之服也𤣥端而居者貴幽靜以養其心也史書言動者察身之得失也瞽幾聲上下者察政之得失也年不順成縞素無樂者察天時之得失以罪己也察焉則知所警知警則無怠荒而政治行矣少儀曰執虛如執盈入虛如有人臣若水通曰敬者心之本體也心無時而不在則敬亦無時而可忽手執虛器如捧盈焉身入虛室如有人焉言人心無一時而可忽也語曰執圭鞠躬如也如不勝詩曰相在爾室尚不愧于屋漏其斯之謂乎人君能存此敬則推其執虛之心而執天下之大柄可以不下移矣推其入虛之心則於深宫永巷儼乎法家拂士之在前敵國外患之將至矣臣於此不勝拳拳表記子曰君子莊敬日强安肆日偷君子不以一日使其躬儳焉如不終日臣若水通曰莊者嚴於心敬者一於心莊敬則神完而氣固故日强安肆則神散而氣昏故日偷儳者參錯之意內不莊敬則心不專一而其身參錯不齊如不能終日矣况人君以一心應天下之變以一身臨天下之上茍不莊敬而日偷焉雖有天下不能一朝居也豈不可戒哉周禮春官保章氏掌天星以志日月星辰之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二嵗之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之祲象以十有二風察天地之和命乖别之妖祥凡此五物者以詔救政訪序事臣若水通曰天人上下一氣感應者也其兆有五所以致警戒之道也故天有日月星辰之變動人有吉凶之變遷也天地有星辰封域之分野人有妖祥值遇之感應也時有十有二嵗之相人有先見之妖祥也天有五雲之物色人有水旱豐荒之祲氛也天有十二風之和戾人有乖别之妖祥也此謂之五物五物者天地人相與流通者也達上下而一之者在君身君身不修何以反凶為吉化妖為祥轉荒為豐哉故洪範以人應天而取必於五事故曰詔救政謂上告于君不徒告也稽君身無不修以弭其變也又曰訪序事謂下謀於臣不徒謀也稽臣職無不盡以相夫君也如是則君臣警戒克謹于天政無不舉而祥瑞至矣大卜以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政臣若水通曰大卜灼龜而命之有八者何也以盡天下之變也曰征者何也卜行師之勝負也曰象者何也卜天象之妖祥也曰與者何也卜與人共事之成否也曰謀者何也卜謀事與人之得失也曰果者何也卜事之成與否也曰至者何也卜人之至與否也曰雨者何也卜時之隂晴也曰瘳者何也卜疾之進退也是故欲有卜焉以此而命于龜也卜之龜筮之蓍考之夢則國家之或吉或凶可以前知矣果凶咎歟不可坐待其變而必進告於君使之恐懼修省而祈之於天也故曰以觀國家之吉凶以詔救政故為君者幸毋曰天變不足畏可焉格物通卷九
