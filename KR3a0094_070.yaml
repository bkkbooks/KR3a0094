body:
  text: 格物通卷七十明湛若水撰任相中周赧王五十六年初魏安釐王聞子順賢遣使者奉黄金束帛聘以爲相子順曰若王能信用吾道吾道固爲治世也雖𬞞食飲水吾猶爲之若徒欲制服吾身委以重禄吾猶一夫耳魏王奚少於一夫使者固請子順乃之魏臣若水通曰孔子云所謂大臣者以道事君不可則止又云鄙夫可與事君也與哉其未得之患得之旣得之患失之子順之言宛然孔氏家法也使魏能舉國以聽焉則魏可以得志於天下矣惜乎迎之致敬以有禮言弗能行其言此子順之所以終去魏也子順去而魏之國事可知也矣漢王元年陽武人陳平家貧好讀書里中社平爲宰分肉食甚均父老曰善陳孺子之爲宰平曰嗟乎使平得宰天下亦如是肉矣臣若水通曰人君之宰天下平而已矣相臣相君以治天下亦平而已矣故周官冢宰之任在統百官均四海其亦平之已乎陳平宰肉均而言宰天下亦當如此此言雖小可以喻大其得爲相之體矣雖然必平其心而後平乎物也後之人君取相者必求平心之人然後可漢高帝十二年吕后問曰陛下百歲後蕭相國旣死誰令代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平知有餘然難獨任周勃重厚少文然安劉者必勃也可令爲太尉吕后復問其次上曰此後亦非乃所知也臣若水通曰宰相者君之所擇與公卿大夫議於公朝者也后理隂政於内不宜問及此者也吕后此問所謂牝鷄之晨非耶高帝宜以是告之以沮其臨朝之漸而慮不出此雖其所對如持權衡以上下人物豈亦逆知其萌而爲獖豕之牙之計耶惠帝二年七月癸巳以曹參爲相國參聞何薨告舎人趣治行吾將入相居無何使者果召參臣若水通曰古之用人者人以是許之彼以是自許焉何也是非之公也高祖亦嘗與吕氏言之參可繼何矣及何死而參亦自知其必入相豈非公耶夫以何畫一之法其爲漢謀者至矣繼之者使非曹參之清靜則民之初定者何自而安耶此高祖所遺命以保於後王而亦參之所自許者也世之人君立相皆得乎人心之公如此則天下豈有不服哉文帝元年八月陳平曰宰相者上佐天子理隂陽順四時下遂萬物之宜外鎮撫四夷諸侯内親附百姓使卿大夫各得任其職焉臣若水通曰陳平之言可謂知相體矣至於相道則恐未之知也孟軻氏曰惟大人爲能格君心之非此相道也軻能言之亦軻之所有也斯其至矣惜乎陳平不足以語此安得大人者而與之論相哉光武建武七年夏五月大司農江馮上言宜令司𨽻校尉督察三公司空椽陳元上䟽曰臣聞師臣者帝賔臣者霸陛下宜修文武之聖典襲祖宗之遺徳屈節待賢誠不宜使有司𨽻察公輔之名帝從之臣若水通曰三公相天子而論道經邦所以師表百僚者也選任不可不精耳乃復以司𨽻校尉而督察之則非尊師重傅之誠矣是豈勸大臣之道哉陳元一言其畜君之過者至矣惜乎事歸臺閣而置三公於散地豈古人賔師之義也哉安帝永初元年秋九月庚午太尉徐防以災異冦賊䇿免辛未司空尹勤以水雨漂流䇿免仲長統昌言曰光武皇帝政不任下雖置三公事歸臺閣自此以來三公之職備員而已今人主誠專委三公分任責成而在位病民舉用失賢天地多變人物多妖然後可以分此罪矣臣若水通曰宰相職在爕理人君必任之以實事然後可以責其成功也漢自光武以來事歸臺閣三公者徒擁虚器於百僚之上所謂有其名而無其實者也則夫隂陽失和怪異數至是可得而歸罪於相耶若仲長統之言可以爲待相之法矣冲帝永嘉元年太后委政宰輔李固所言太后多從之宦官爲惡者一皆斥遣天下咸望治平臣若水通曰郎顗薦李固曰固王佐之臣若任以時政則可以垂景光致休祥矣及永嘉初年得太后之委遇忠以進言徳以輔政宦官之惡一切屏去天下屬望焉夫然後顗之薦爲不誣而太后其亦可謂賢矣惜乎梁冀竊權竟爲所害天之不祚漢也固如是哉靈帝光和元年詔問以災異及消復之術議郎蔡邕對曰天於大漢屢出妖變以當譴責欲令人君感悟改危即安夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣也臣若水通曰書云推賢譲能庻官乃和不和政厖夫庻官和則和氣至而災𤯝消庻官不和則戾氣至而災𤯝作靈帝不知相爲四體反以台鼎之大臣遭小吏之雕琢如自傷其四體虧爕理之道不和甚矣如是則欲妖𤯝之不生何可得哉吁邕之斯言豈非人君不知畏相者之鑑戒哉漢後主建興三年呉主權以太常顧雍爲丞相王常令中書郎詣雍有所咨訪若合雍意事可施行即相與反復究而論之如不合意雍即正色改容黙然不言郎退告王王曰顧公歡恱是事合宜也其不言者即事未平也孤當重思之臣若水通曰呉孫權之擅江表也孰不以爲骨體非常仁而多斷之功哉殊不知委政宰輔推誠相與一可一否視其欣戚以爲從違已得人君用相之體矣則其成鼎峙之業也有由焉哉夫權割據一方不足道也而猶有斯羙况天子爲萬國之主者可以反不如權乎哉晉惠帝永熈元年帝以楊駿爲太傅大都督假黄鉞録朝政百官總已以聽傅咸謂駿曰聖上謙冲委政於公天下不以爲善懼明公未易當也竊謂山陵旣畢明公當審思進退之宜駿不平欲出咸爲郡守臣若水通曰夫相者所以相人主也必選名徳之士然亦未有獨任者獨任則所相者於誰哉晉惠庸愚使賢者輔之猶懼不免况如駿者乎傅咸盡其忠益而駿反見疾晉氏之亂蓋已兆於此矣夫豈俟八王造禍而後見哉易曰鼎折足覆公餗其刑渥㓙駿之謂也臣故書之以爲失於任相者之戒唐太宗貞觀三年二月上謂房𤣥齡杜如晦曰公爲僕射當廣求賢人隨才授任此宰相之職也比聞聽受辭訟日不給暇安能助朕求賢乎因敕尚書細務屬左右丞惟大事應奏者乃闗僕射臺閣規模皆二人所定二人深相得同心徇國故唐世稱賢相推房杜焉臣若水通曰統百官均四海以人事君此宰相之職也聽受辭訟一獄吏之事耳豈爲相之道哉唐太宗以是語房杜可謂知相體矣夫宰相之職非但用人也論道爕理固其職矣今使出則受辭訟以譏察爲心入則與人主論道爕理焉其精誠感格復㡬何哉惜乎房杜稱賢相而不知也貞觀三年四月帝謂侍臣曰中書門下機要之司詔敕有不便者皆應論執比來唯睹順從不聞違異若但行文書則誰不可爲何必擇才也房𤣥齡等皆頓首謝臣若水通曰書云子違汝弼汝無面從宰相掌經綸代王言以播諸天下天下之治亂係焉不可茍面從也故天子曰可宰相曰不可天子曰然宰相曰不然而後詔令之施於天下者盡善庻幾有益於生民有禆於治道矣茍君焉出令而相臣不敢矯其非則是阿諛順從遂非長惡焉用彼相爲哉此太宗所以拳拳爲房杜戒也夫房杜賢相也而亦有此咎哉貞觀十四年十二月魏徵上䟽以爲在朝羣臣當樞機之寄者任之雖重信之未篤是以人或自疑心懷苟且陛下寛於大事急於小罪臨時責怒未免愛憎夫委大臣以大體責小臣以小事爲治之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將求致治其可得乎若任以大官求其細過刀筆之吏順㫖成風舞文弄法曲成其罪自陳也則以爲心不伏辜不言也則以爲所犯皆實進退惟谷莫能自明則苟求免禍矯偽成俗矣上納之臣若水通曰任賢勿貳唐虞所以敬信大臣以致治也太宗於任之則大臣重於小臣而信之則小臣過於大臣可謂勿貳乎此魏徵之言所以深著其弊也貞觀十九年正月太宗發京師命房𤣥齡得以便宜從事不復奏請或詣留臺稱有宻謀𤣥齡問宻謀所在曰公則是也𤣥齡驛送行在上問告者爲誰曰房𤣥齡上曰果然叱令腰斬璽書讓𤣥齡以不能自信更有如是者可專决之臣若水通曰太宗專以生殺付𤣥齡得無啟臣下作福作威之心而權將下移乎曰此不可以爲常法也方太宗自將輕身於萬里之外使不專任𤣥齡畱守京師吾恐腹心空虚而輦轂之下變生不測矣及其腰斬告宻之人則奸邪之萌絶𤣥齡之心安京師不復可慮矣雖然此特一時之權耳然必得忠於奉國如𤣥齡者然後可以當此任也如晉惠之於楊駿旣施於平時又付於匪人則亦奚可哉高宗永徽元年六月有洛陽人李𢎞泰誣告長孫無忌謀反上命立斬之無忌與禇遂良同心輔政上亦尊禮二人恭已以聽之故永徽之政百姓阜安有貞觀之風顯慶四年許敬宗誣奏長孫無忌謀反上以爲然下詔削無忌太尉及封邑於黔州安置敬宗又奏無忌謀逆由褚遂良搆扇而成於是詔追削遂良官爵臣若水通曰記稱去讒逺色賤貨而貴徳所以勸賢也經曰任賢勿貳貳者小人間之也無忌遂良悉心奉國而高宗復賔禮之不可不謂知其賢矣旣而自敬宗用而讒邪進無忌遂良乃以竄削前日高宗賔禮之意安在哉此詩人之惡讒所以必欲投彼有北也人君任相可不戒之哉𤣥宗開元元年十月姚崇爲相嘗奏請序進郎吏帝仰視殿室崇再三言之終不應崇懼趨出高力士諫曰陛下新總萬機宰相奏事當面加可否奈何一不省察帝曰朕任崇以庻政大事當奏聞共議之郎吏卑秩乃一一以煩朕邪㑹力士宣事至省中爲崇道帝語崇乃喜聞者皆服帝識人君之體臣若水通曰書稱任賢勿貳𤣥宗有焉雖然帝之所專任者以得崇之公正君子也是以致開元之治耳使如裴延齡者委任之如此則其蠧國殃民其可極耶故人君之徳莫大於擇相相擇則百僚羣吏以正舉正而天下治矣故曰勞於求賢逸於任人必如是然後爲無弊也開元二年姚崇宋璟相繼爲相二人志操不同然恊心輔佐使賦役寛平刑罰清省百姓富庻唐世賢相前稱房杜後稱姚宋他人莫得比焉二人每進見上輒爲之起去則臨軒送之臣若水通曰𤣥宗身踐憂患旣即位得姚宋二人蚤夜孜孜納君於道開元之際幾致太平何其盛也自天寳已還小人道長林甫進而厲階作謀之不臧前功併棄夫以一人之身而治亂前後不同者何也相之賢否耳可不懼哉開元二十一年三月韓休爲相甚允時望上曰蕭嵩奏事常順㫖旣退吾寢不安韓休常力爭旣退吾寢乃安吾用韓休爲社稷耳非爲身也臣若水通曰韓休爲相力爭不阿帝亦知信用安社稷矣而竟不如姚宋之功何哉書曰允迪厥徳謨明弼諧蓋謨弼在相而明諧之者在君之迪徳也故君志滿則忽其所謀意驕則拒其所弼外雖許可而中未必然者至於禄山亂而身播遷豈徒歸諸天哉不用相之咎也開元二十四年十一月上欲以李林甫爲相問於張九齡對曰宰相繫國安危陛下相林甫臣恐異日爲社稷之憂上不從時上漸肆奢欲怠於政事而九齡遇事無細大皆力爭林甫巧伺上意日思所以中傷之臣若水通曰此明皇治亂之機也使九齡一日而不退唐猶開元也林甫一日而進唐其天寳矣然九齡之進退係於林甫之用否也夫明皇以一人之身始以相之賢而致治終以相之奸而致亂任相之效昭然矣君天下者可不鍳哉可不慎哉天寳十一載以楊國忠爲相國忠爲人彊辯而輕躁旣爲相公卿以下頥指氣使莫不震慴臺省官有才行時名不爲己用者皆出之臣若水通曰林甫相則養天下之亂矣國忠相則促天下之亂矣書曰邦之杌隉曰由一人况二人邪亂非二人能獨成也由一人二人以至引其惡類斯亂亡必矣噫以昏闇之君而委奸賊之相雖無貴妃之妖淫禄山之桀驁其國亦不可保矣况其朋類自有不期而至者矣乎代宗大厯十二年元載伏誅楊綰爲相綰性清簡儉素制下之日朝野相賀郭子儀方宴客聞之減座中聲樂五分之四京兆尹黎幹騶從甚盛即日省之止存十騎中丞崔寛第舎宏侈亟毁撤之大厯十二年七月上方倚楊綰使釐革弊政㑹綰有疾薨上痛悼之甚謂羣臣曰天不欲致太平耶何奪楊綰之速臣若水通曰楊綰之在官惟以清儉稱耳白麻一下而子儀黎幹崔寛皆約其情以就繩墨况名世之士得君而居相位旣專且久上下交泰其風化所被豈小也哉帝方倚以革弊及死之日痛悼之而咎天奪綰之速不以死生易矣宋儒范祖禹謂綰爲相而天下從之况人君正己以先海内其有不率者乎是以先王必正其心修其身而天下自治此又探本之論也嗚呼堯舜禹湯之爲君臯夔伊周之爲臣各克其艱而黎民敏徳萬世所共仰者也惟聖明圖之徳宗建中二年正月初帝即位崔祐甫爲相務從寛大故當時政聲藹然以爲有貞觀之風又盧杞爲相知上性多忌因以疑似離間羣臣始勸上以嚴刻御下中外失望臣若水通曰國之治亂係於相之邪正焉耳故祐甫相則引君當道而政聲藹然盧杞相則勸君嚴刻而中外失望此唐室所以由之不競矣雖然杞誤國之罪誠可誅徳宗誤國之罪尤可憾也然則人君之於任相而可不知所以擇乎徳宗貞元三年李泌爲相帝謂泌曰自今凡軍旅糧儲事卿主之吏禮委延賞刑法委渾泌曰不可陛下不以臣不才使待罪宰相宰相之職不可分也非如給事則有吏過兵過舎人則有六押至於宰相天下之事咸共平章若各有所主是乃有司非宰相也帝笑曰朕適失辭卿言是也臣若水通曰徳宗以六事屬三相而不知宰相之職其致一而已矣泌之對得任相之體也故范祖禹曰古者惟任一相是以治出於一後世多疑而職分君以爲權在己臣以爲政在君治亂休戚無所任責誠哉言也然未盡人君擇相之道古者伊傅周召之爲相其君擇之之精所謂真知灼見其心者也故其任之專以久然後正大光明之業可與共成焉我國家六卿分理而内閣論思亦甚重矣其擇之也必如虞廷四岳之問乎必如商周夣卜之求乎其任之也必有一徳之合交修之託乎如有之帝王之治將復見矣天下幸甚貞元四年春二月上從容與李泌論即位以來宰相曰盧杞忠清彊介人言杞姦邪朕殊不覺其然泌曰人言杞姦邪而陛下獨不覺其姦邪此乃杞之所以爲姦邪也儻陛下覺之豈有建中之亂乎杞以私隙殺楊炎擠顔真卿於死地激李懐光使叛頼陛下聖明竄逐之人心頓喜天亦悔禍不然亂何由弭臣若水通曰知人之難自古爲然幽求諸夣卜明求諸人情則亦何難之有說者云人情賢於夣卜盧杞之姦誰不知之是非之在人心也徳宗則以爲不覺其姦爲是其智之不若常人哉以其心有蠱惑失其是非之本心耳彼姦人之肆欺千態萬狀有不可得而測者故曰大姦似忠大詐似信使非察見夫天理使吾心之本體不蔽於物欲之私幾何而不被其欺乎憲宗元和三年九月丙申以户部侍郎裴垍爲中書侍郎同平章事上雖以李吉甫故罷垍學士然寵信彌厚故未幾復擢爲相初徳宗不任宰相天下細務皆自决之由是裴延齡輩得用事上在藩邸心固非之及即位選擢宰相推心委之嘗謂垍等曰以太宗𤣥宗之明猶藉輔佐以成其理况如朕不及先帝萬倍者乎垍亦竭誠輔佐臣若水通曰憲宗雖嘗罷垍相然寵信彌厚故復相之垍亦竭誠輔佐觀其對爲理之要而曰先正其心亦庻幾乎知宰相之體矣然徒知正心而不知所以正心之學使憲宗止於憲宗爲可惜耳嗚呼此宰相所以貴於知學歟元和十年六月裴度同平章事初徳宗多猜忌朝士有相過者金吾皆伺察以聞宰相不敢私第見客及度爲相奏言今冦盗未平宰相宜招延四方賢才與參謀議始請於私第見客許之臣若水通曰帝舜詢于四岳闢四門明四目達四聦蓋欲開天下之門以廣天下之聦明也徳宗伺察宰相使不得私接賔客是欲自塗其耳目而廢其聦明也使時有周公且一沭三握其髪一食三吐其哺以延天下之士惟恐其聦明之不廣矣徳宗乃又反之此其所以致敗也故裴度當大任而首以爲言即有周公吐哺握髪之風矣憲宗從之未幾四表降心羣雄歸命度之言誠可以自效焉任相之驗豈可誣哉元和十三年八月帝問宰相𤣥宗之政先理而後亂何也崔羣對曰𤣥宗用姚崇宋璟盧懐慎蘇頲韓休張九齡則理用宇文融李林甫楊國忠則亂故用人得失所係非輕人皆以天寳十四年安祿山反爲亂之始臣獨以爲開元二十四年罷張九齡相專任李林甫此理亂之所分也願陛下以開元初爲法以天寳末爲戒乃社稷無疆之福皇甫鏄深恨之臣若水通曰崔羣以相之賢否爲𤣥宗治亂之判是矣臣又以人主一心之邪正爲相之賢否世之治亂所由判也蓋心得其正則正人道合而相得其人此世之所以正也心陷於邪則邪人同惡而不得其人此世之所以亂也故𤣥宗方用姚宋六公之時心未失其正耳其用宇文林甫國忠之時心先蠧矣周惇頥曰心純則賢才輔非此之謂乎故人君欲任相以圖天下之治者必自純心始焉惟聖明畱念文宗開成五年正月武宗即位九月以李徳裕爲門下侍郎同平章事徳裕言於帝曰致理之要在於辨羣臣之邪正夫宰相不能人人忠良或爲欺罔主心始疑於是旁詢小臣以察執政如徳宗末年所聼任者唯裴延齡輩宰相署敕而已此政事所以日亂也陛下誠能慎擇賢才以爲宰相有姦罔者立黜去之常令政事皆出中書推心委托堅定不移則天下何憂不理哉臣若水通曰人主無職擇相其職宰相無職用賢其職是故相得其賢者其用人賢是其君之賢也相不得其賢者其用人不賢是其君之不賢也故書曰任賢勿貳去邪勿疑此人君之職故人君擇一相相擇百官而庶政理則天下治矣徳裕之言可謂識宰相之體而引其君以當道者矣不然則貳心生於疑疑心生於惑小人進君子退則天下不亂者未之有也此古今人主之龜鑑也伏惟聖明畱意焉格物通卷七十
