body:
  text: 格物通卷九十三明湛若水撰慎賞賜下唐太宗貞觀十四年十二月髙昌之平也諸將皆即受賞行軍總管阿史那社爾以無勑旨獨不受及别勑既下乃受之所取唯老弱故幣而已上嘉其廉慎以髙昌所得寶刀及雜綵十假賜之臣若水通曰髙昌之平諸將皆以功受賞者也阿史那社爾以無敕旨獨不受而太宗乃復以寶刀雜綵重賜之者何也旌其廉慎也夫廉慎美德也凡賜豫之道德為上功次之夫以廉慎而受上賞旌其德也然則太宗之賜豫豈妄施者哉唐髙宗顯慶五年三月皇后宴親戚故舊鄰里於朝堂婦人於內殿班賜有差臣若水通曰賞賜所以酬功德以示勸也無功而加賞不惟不足以勸而又至於濫國財而耗國用其流之弊有不可勝言者矣武后之賜親戚故舊鄰里及其婦人抑何名耶由是觀之竊政之漸蠧國之姦識者蓋已知其萌於此矣唐中宗景龍二年夏四月癸未置修文館大學士四員直學士八員學士十二員選公卿以下善為文者李嶠等為之每遊幸禁苑或宗戚宴集學士無不畢從賦詩屬和使上官昭容第其甲乙優者賜金帛同預宴者惟中書門下及長參王公親貴數人而已至大宴方召八座九列諸司五品以上預焉於斯天下靡然好事以文華相尚儒學忠讜之士莫得進矣臣若水通曰中宗之好遊幸一費也宴宗戚二費也以賦詩之甲乙而為金帛受賞之優劣三費也大宴八座九列諸司五品以上四費也夫財源之出者一而其用流之費者四則國安得而不困民安得而不窮哉唐玄宗開元二十三年初公主實封止三百户中宗時太平公主至五千户率以七丁為限開元以來皇妹止千户皇女又半之皆以三丁為限駙馬皆除三品員外官而不任以職事公主邑入至少至不能具車服左右或言其太薄上曰百姓租賦非我所有戰士出死力賞不過束帛女子何功而享多户耶且欲使之知儉嗇爾臣若水通曰明皇裁損公主户封一則曰女子何功而享多賜明祿賞所以報有功也一則曰欲使之知儉嗇明多財所以纍儉德也所謂愛之以德而兼有節用之道矣户口之蕃其有自哉天寶八載二月引百官觀左藏賜物有差帝以國用豐衍故視金帛如糞壤賞賜貴寵之家無有限極臣若水通曰財者天之物地之利民之膏也故不能以不用亦不可以輕用也傳曰可以與可以無與與傷惠有功者賞之可以與者也無功者不得以幸賜可以無與者也故與不與用不用之間有義存焉爾錫豫之典在人君信不可以不慎也濫豫侈用則傷財以害民之膏棄地之利暴天之物而亂亡至矣明皇以國用豐衍取左藏之積賜百官賞貴寵無有限極可謂輕視三才之用而不知慎重者矣禍之所以不免而國之所以不競有由然哉天寶十載帝命有司為安祿山起第於親仁坊敕令但窮壯麗不限財力既成具幄帟器皿充牣其中雖禁中服御之物殆不及也祿山生日帝及貴妃賜衣服寶器酒饌甚厚後三日召祿山入禁中貴妃以錦繡為大襁褓裹祿山使宫人以綵輿舁帝觀之喜賜貴妃洗兒金錢復厚賜祿山盡歡而罷自是祿山出入宫掖不禁或與貴妃對食或通宵不出頗有醜聲聞於外帝亦不之疑也臣若水通曰書云臣無有作福臣無有作威臣無有玉食臣之有作福作威玉食其害于而家凶于而國言權不可下移也臣謂三者尤萌於玉食之僣名器輕濫而不已則威福之權下移又不已則篡弒之禍起矣此國家之所以凶亂乎明皇之於祿山侈其第宅盛其幄帟聚其寶器上擬王公殊無品制豈但玉食而已即由是威福之柄人自趨而成之不能已矣至於亂宫掖動鼙鼓禍四方逼京師乘輿播遷宗廟不守幾危社稷成曠古所無之大變而為天下笑豈非明皇賜豫之過有以召之乎嗚呼真可以為萬世之大戒矣肅宗至德元載九月上皇賜張良姊七寶鞍李泌言於上曰今四海分崩當以儉約示人良姊不宜乘此請撤其珠玉付庫吏以俟有戰功者賞之良姊自閣中言曰鄉里之舊何至於是上曰先生為社稷計也遽命撤之臣若水通曰玄宗寵厚貴戚賞賜無算所以致乘輿之播遷也肅宗宜鑒前愆而良姊七寶鞍之賜幾復蹈其覆轍矣賴李泌賞功之言一入深知為社稷之計遽撤其珠玉然則克復舊物再造唐室其係此一念出入之幾乎肅宗至德二載春正月上謂李泌曰今郭子儀李光弼已為宰相若克兩京平四海則無官以賞之奈何對曰為今之計莫若疏爵土以賞功臣雖大國不過二三百里可比今之小郡豈難制哉於人臣乃萬世之利也上曰善臣若水通曰書云列爵唯五分土唯三此先王賞功之典也夫賞功以土惠而不為費公而不私者也李泌言以官賞功非才則廢事權重則難制誠確論也如裂土以封功臣則上之所錫有定分而不踰制下之所得有實利而非虛名夫下有實利而上有定分則又何損於國用何傷於民財哉憲宗元和七年十月李絳上言魏博五十餘年不霑皇化一旦舉六州之地來歸刳河朔之腹心傾叛亂之巢穴不有重賞過其所望則無以慰士卒之心使四鄰勸慕請發內庫錢百五十萬緡以賜之左右宦官以為所與太多後復有此將何以給之帝以語絳絳曰田興不貪專地之利不顧四鄰之患歸命聖朝陛下奈何愛小費而遺大計不以收一道人心錢用盡更來機事一失不可復追借使國家發十五萬兵以取六州期年而克之其費豈止百五十萬緍而已乎帝悅曰朕所以惡衣菲食蓄聚貨財正為欲平定四方不然徒貯之府庫何為十一月遣知制誥裴度至魏博宣慰以錢百五十萬緍賞軍士六州百姓給復一年軍士受賜歡聲如雷成德兖鄆使者數輩見之相顧失色嘆曰崛強者果何益乎臣若水通曰語云逺人不服則修文德以來之既來之則安之言來而安之以德也孟子曰分人以財者謂之惠故安之以德者上也分之以惠者次也德者所以結其心惠者所以報其功非相餂以利私之也蘇轍言倡莫善乎私私也者厚賞以悅人心之謂則是小人之術以利相籠絡者之為也豈古之帝王賞豫大賚之公哉唐憲宗從李絳之言出百五十萬緍以賜田興六州來歸之軍士百姓給復一年可謂能用忠謀不惑於羣議者矣已而歸順之功既賞而四方之不順者知勸固其勢也自時厥後元濟授首師道革面韓𢎞效力承宗歸疆亦其處之者有道也雖要之與安以德而心服者異然賞惠之於人國豈小小哉後之人君其尚知所慎焉賈誼新書曰晉文公率師征賊定周國之亂復襄王之位於是襄王賞以南陽之地文公辭南陽即死得以隧下襄王弗聽曰周國雖微未之或代也天子用隧伯父用隧是二天子也臣若水通曰古者天子葬用隧諸侯用縣禮也功懋懋賞諸侯有功爵之以地未聞以天子之葬賜諸侯也襄王能慎賞賜而不以禮許人此見周之禮樂猶在天子也劉向説苑曰諸侯三年一貢士士一適謂之好德再適謂之尊賢三適謂之有功有功者天子一賜以輿服弓矢再賜以鬯三賜以虎賁百人臣若水通曰記云薦賢受上賞古者諸侯貢士有功天子嘉其進賢而懋賞之可見人主之賞必皆當其功也後世之君豫奪一出於心之喜怒或有功而吝或無功而濫則何以為勸懲哉劉安世曰人主所以鼓動天下制馭臣民之柄莫大於賞罰惟聖明念之班固白虎通曰禮記九錫車馬衣服樂朱户納陛虎賁鈇鉞弓矢秬鬯皆隨其德臣若水通曰賞賜者天子之大權也濫則國用以侈功過以混國用侈則民食艱矣功過混則風俗弊矣故王者必有九德九功然後有九錫行焉此古之天下所以平也後世曹操司馬懿姦雄之資皆假九錫以為狐媚篡奪之計可以為萬世戒矣元順帝至正元年帝如上都時帝數以歷代珍寶分賜近侍御史崔敬上疏曰臣聞世皇時大臣有功所賜不過槃革重惜天物為後慮至逺也今山東大飢燕南亢旱海潮為災天文示警地道失寧京畿南北飛蝗蔽天正當聖主恤民之日近侍之臣不知慮此奏稟承請殆無虛日甚至於府庫百年所積之寶物遍賜僕御閽寺之流乳稚童孩之子帑藏或空萬一國有大事人有大功又將何以為賜乎乞追回所賜以示恩不可濫庶允公論臣若水通曰記云陳其宗器説者以為先祖所藏之重器若赤刀之類是也夫赤刀之微亦何益於理亂之數而謂之重器以陳之祖廟何哉重先世之微澤也書曰分寶玉于伯叔之國時庸展親故寶器者上以陳於宗廟下以伸其親親者也元順帝當水旱飢饉災蝗之際不知修德節用以答天譴而以府庫百年所積之寶物遍賜僕御閽寺之流乳稚童孩之子是不唯暴殄天物輕遺宗器賞不以功賚不以親而于世守之義亦安在哉嗚呼寶玉大弓之失春秋不能為魯定公貸其責而敝袴之賞以待有功史有取于韓昭侯也入君茍能重其宗器而不輕用慎其賞賜而不濫與則萬一國有大事有備無患矣宋儒程頥曰太祖初有天下士卒人許賞二百緍及即位以無錢久不賜士卒至有題詩於後苑太祖一日遊後苑見詩乃曰好詩遂索筆和之以故每於郊時各賜賞給至今因以為例不能去或問今欲新兵不給郊賞數十年後可革曰新兵本無此望不與可也臣若水通曰子産以其乘輿濟人於溱洧孟子曰惠而不知為政又曰分人以財者謂之惠夫帝王之為治也有公平正大之體而已耳未聞以私惠也私惠所及有限而大政所濟無窮宋太祖初有天下許賞士卒人二百緡是以私惠嗛人也必至於無錢以償所許焉又必至於怨望而詩作焉又必至於郊時而賞給焉又必至於後世為例而不能去焉又必至於數十年之久而不革焉夫初有天下許賞郊時而例賞皆非有義之用也一啓其源而流遂至於如此然則欲為天下惜財者其可輕於賚與也哉國朝洪武三年朱友文為大榮衛知事初指揮張溫守蘭州元將王保保兵圍城溫率將士備守夜二鼓圍兵登城千户郭祐被酒醉卧不之覺巡城官軍擊却之圍既解溫執祐將斬之友文諍之曰當賊犯城時將軍斬祐以令衆所謂以軍令從事人無得而議之今賊既退乃追罪之非惟無及於事且有擅殺之名竊以為不可溫悟杖祐而釋之太祖皇帝聞之謂輔臣曰友文以幕僚能守朝廷法直言開諭長官此正人也宜加賚豫以勸其餘遂賜綺帛各五匹臣若水通曰朱友文以正人受賞賞善也賞之當矣賞而當善則不善者不得以濫賞而國用不困矣此太祖髙皇帝所以髙出於漢唐宋之上也伏惟皇上以祖宗為法好惡以公則賞不濫而財用恆足矣韓太初妻劉氏事姑寧氏甚謹事聞太祖皇帝遣中使賜劉氏衣一襲鈔二十錠官為送其姑喪歸葬旌表其門復其家徭役臣若水通曰周有大賚善人是富武王之所以興也夫孝善之首也太祖聞劉氏事姑甚孝賜衣及鈔非所謂善人是富乎此所以保有天下而垂裕於無疆也今天下未必無善者也伏唯聖明以祖宗為法而惟善是富焉則賞賜不濫而享安富尊榮之福矣洪武十年二月學士宋濂辭歸瀕行太祖賜紙幣文綺及御製文集皇太子贈以衣三襲太祖諭之曰朕最慎于賞豫嘉卿忠誠可貫金石故以是贈卿今年幾何濂曰六十有八太祖曰藏此綺俟三十二年後作百嵗衣也濂叩首謝太祖復囑曰大江漲不可舟卿宜循內河達家庶幾無虞仍俾孫慎護行臣若水通曰學士宋濂乃開國之文臣所謂忠誠者也我太祖知之明而信之深矣賜以文綺之物旌其忠也表其誠也是故足以為天下之忠誠者勸矣是之謂惠而不傷也其賚與之不茍也如是哉洪武二十五年二月辛巳潁國公傅友德請懷逺縣等官地九頃六十餘畝以為田圃上曰爾貴為上公食祿數千石而猶請地獨不聞公儀休事邪友德慚而退臣若水通曰荀子以賞不當功為不祥也夫賞必以功無功而賞則僥幸之門開而祈請之風行在國則空其府庫之積在民則奪其衣食之源而亂亡之禍起矣非所謂不祥乎傅友德貴為上公食祿數千石而希恩無厭奪民利而不恤不祥之大者矣皇祖戒諭以沮之而示以公儀休拔園葵去織婦之事則沮一人而千百人息於財用可節矣人君有志於天下之平治者可不慎乎洪武二十九年九月大賚天下致仕武臣皇祖因嘆曰同歷艱難致有今日顧朕子孫保無窮之天下則爾等子孫亦享無窮之爵祿諸將臣無不感激至有墮淚者臣若水通曰此太祖大賚致仕武臣而諭之之言也夫爵賞所以報功也然歷代人主常行於征戰之時以為激勵勸功之地而我太祖乃大賚於致仕之日而諭告之至皆出於念功念勞之誠無所為而為者諸將之感激而墮淚也宜哉聖子神孫所當萬世憲章而不失焉天順日録既上太后徽號復加贈其親及蔭子弟數人有為其次兄求升者上謂李賢曰孫氏一門盛矣復希恩澤不知太后正不以此為慰比者授子弟官請數次方允且不樂纍日曰有何功於國家濫受祿秩如此然物盛必衰一旦有干國憲吾亦不能救矣今若聞此必怒賢曰此足以見太后盛德臣若水通曰書云車服以庸賞文治也詩曰彤弓弨兮賞武功也以戚里而侈爵賞於文武之功乎何有以豫奪之義乎何居善哉太后之不樂可謂愛人以德親親之至者矣英宗之不與可謂能養親志者矣慈孝豈不兩盡也哉此我朝家法所以髙出於漢唐之上也格物通卷九十三
