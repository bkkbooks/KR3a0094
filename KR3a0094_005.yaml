body:
  text: 格物通卷五明湛若水撰謀慮上易訟象曰天與水違行訟君子以作事謀始臣若水通曰天上水下其行相違相訟之象作事謀始所以止訟端也張載曰戲動作於謀也謀而善則善謀而不善則不善不善則訟端啓矣謀始者何也人心發慮之初也吉凶善惡於是乎分而訟不訟兆焉故謀之慮之求盡乎天理而人心安矣孰得而訟乎人君事失其謀天下訟之也其可不謹始而慮終也耶履上九視履考祥其旋元吉臣若水通曰上者履之終九以剛明之才處之故能自考於其終視其所履行以考其祥不祥而善惡禍福之分數見矣蓋禍福無不自己求之者祥生於所履之善考祥非徼福也以自考也審視其所履者果天理邪人欲邪善邪私邪私則不祥生焉善則周旋無虧吉孰大焉人君履天下之事隨處體認天理其履而皆善則天下治矣豈非所謂元吉哉蠱彖傳先甲三日後甲三日終則有始天行也臣若水通曰三日言久也故齋以三日喪歛以三日先甲三日後甲三日并甲為七日矣書曰服念五六日言甚乆也久則慮之詳而事無不善治蠱之道審而人謀盡矣人謀非他也盡乎天理之極致而無歉者也如是則亂於是乎終而治於是乎始矣天道之運行無終不始無往不復其理然也而况於人乎人君之治蠱致其先甲後甲之謀則何憂乎蠱之不可治哉巽九五貞吉悔亡旡不利旡初有終先庚三日後庚三日吉臣若水通曰巽之九五剛徤中正故為貞正而吉吉則悔亡而無不利矣先庚後庚猶蠱先甲後甲之義甲者干之始庚者干之中故舉以互言之五為上之中庚為干之中故有無初之義言貞吉如此雖無初而亦有終况有初者乎先庚後庚謀之六七日則謀之審而無不正矣以是居巽其有不吉乎繫辭人謀鬼謀百姓與能臣若水通曰物我人鬼理一而已矣人謀者謀諸人驗其理之同然者也鬼謀者謀諸蓍龜驗其理之自然者也蓋人心之理即易也易之理即吾心也故二謀盡而理得矣吉凶决而亹亹成百姓日用而不迷矣豈惟百姓為然哉古之帝王詢于芻蕘鬼神其依而龜筮恊從夫然後盡天下之謀也謀其可以不審耶繫辭能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者臣若水通曰箕子稱汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮以其心一而已矣理一而已矣說諸心則理得矣謀諸己也研精諸侯之慮則盡羣臣卿士之謀謀諸人也夫然卜筮之用盡矣决吉凶而不疑成事功之亹亹而不倦焉學易者合物我人鬼而一之則天下之能事畢矣書虞書大禹謨舜贊堯曰稽于衆舎己從人臣若水通曰稽謀也此理在人心本自固有然或有所蔽則此理不明所以不能不資人問詢以警發其良知蓋此理人人同得故也然徒謀於人而不能從從而不能舎己皆不足以成徳致治也故宋儒程頥曰舎己從人最為難事己者我之所有雖痛舎之猶懼守己者固而從人者輕也夫人君一有自聖之心則不能兼有衆善而忠言不聞謟諛日至欲其治也得乎堯大聖也而舜稱之不過如此故舜好問好察所以為大智他日告禹亦曰弗詢之謀勿庸禹拜昌言其得於舜深矣三大聖皆資人言以自益况其他乎伏惟聖明欲法唐虞之治宜法三聖求善之心可焉商書太甲慎乃儉徳惟懐永圖臣若水通曰慎者謹也儉徳者儉約之徳也永長也圖謀也伊尹告太甲當謹其儉約之徳不可以欲敗度縱敗禮夫欲與縱皆奢侈失之無長逺之謀者然以約失之者鮮矣故不可不謹於儉約而懐長久之謀也夫人君一身萬化之原奢侈之心一萌則将無所不至此伊尹之所以告太甲必欲謹其儉徳也然常情奢侈皆因徒見目前之欲而無長逺之慮有逺慮者自不容於不儉矣故又繼之曰惟懐永圖後之人君不可不以伊尹之言為切己對病之藥也商書太甲弗慮胡獲弗為胡成臣若水通曰此亦伊尹告太甲之言也慮謀也獲得也言人不慮則何所得乎欲其謹思之也不為則何所成乎欲其篤行之也然思者行之主也不思則不能行矣故一人元良萬邦以貞夫萬國之正本於人君之善人君之善本於思為故思者萬善之原聖功之本也為人君者可不加之意乎商書説命慮善以動動惟厥時臣若水通曰善當乎理也時時措之宜也傅説告髙宗言凡事當謀之於始必念慮之善合於天理然後動慮者心之思也動者思慮之萌達於事者也慮善以動慎動之功也善固可動動以時乃所謂善也若動非其時便是私意程頥曰發不以時紛然無度雖正亦邪亦此意也為人君者可不謹動於念慮之善使發當其時以及天下乎周書洪範汝則有大疑謀及乃心謀及卿士謀及庻人謀及卜筮臣若水通曰此乃箕子陳洪範稽疑之疇於武王也大疑謂祭祀征伐之事以至凡國家欲有舉動有闗於生靈社稷者皆是謀及乃心斷之已以定其志之是非也謀及卿士庻人㕘之衆以天理人心之所同然也然謀於人之有心不若謀於神之無心之為公焉故終謀之卜筮也夫古之人君不徒謀於心又謀於卿士不徒謀於卿士而又謀於庻人不徒謀於庻人而又謀於卜筮焉其謀之詳如此是以謀無不善而事無不濟後之人君每徇一己之私而不恤卿士庻人之議鬼神之怒者亦獨何哉周書周官蓄疑敗謀臣若水通曰此乃成王訓告百官之言也言人之有所謀為必决斷然後可以成天下之亹亹若積蓄其疑而不决則所謀之事見之不明行之不果必至於敗而不成矣故曰猶豫者事之賊也後之人君人臣共謀天下之治者可不決之於理乎詩大雅文王有聲詒厥孫謀以燕翼子臣若水通曰孟子稱君子創業垂綂為可繼也古之帝王之創業孰不欲為子孫千萬世之計哉頋其所謀之臧不臧而天理人欲判焉謀出於天理則以仁義立國而有可繼之綂為可大可久之業矣謀出於人欲則以功利遺後而無可繼之規非久安長治之道矣故周武王之遷鎬即臨辟雝講學行禮以敦天下之大化以淑天下之人心則其所謀者一天理之正所謂以仁義立國矣此其所以為子孫之可繼而綿綿八百年有道之長也雖然豈無所本哉武王受戒丹書深明敬義以成聖學及其出謀發慮無非仁義之懿天理之正有天下者欲為子孫千萬世之計外天理又豈復有逺圖哉始皇徒欲以長城萬里為子孫萬萬世之業而不知二世已無秦矣豈非逆天理不行仁義之故乎噫可鑒矣大雅抑訏謨定命逺猶辰告臣若水通曰訏大謨謀也猶圖也辰時也告戒也衛武公自儆之詩以為謀之在於己者大不為一身之謀而有天下之慮則令之播於人者定不朝出而夕改也所謂信如四時堅如金石矣事之圖於心者逺不為一時之計而有千百年之規也故辭命之播於下者以時非不戒視成所謂三命而五申是矣然謀猶命令二者皆見於事而實本於心也茍吾心純於天理有所謨猶一天理也天理則公公則大大則逺矣有所告命一天理也天理則正正則定定則時矣夫謀發於中令行於外由中達外一天理之中正則道徳在我而人之訓之順之有不期然而然者矣嗚呼武公知此其亦聖賢之徒歟原其要惟在不愧屋漏之一言爾春秋荘公十八年夏公追戎于濟西臣若水通曰書追戎者何譏無備也何以譏無備無逺謀也書曰惟事事乃其有備有備無患濟西魯地也西戎逺戎也魯茍有備預防戎何為而至於此未雨無徹桑之謀居安乏思危之計無惑乎戎之入境而不知已去而乃追故曰無備也無逺謀也而國已坐受其弊矣然則為人君者固當思患預防為千百年之計然後可僖公三年秋齊侯宋公江人黄人㑹于陽穀臣若水通曰用兵在謀謀生於機有正有竒所以神其機也聚諸侯之師次陘為正以宣中國之威江人黄人守境為竒以應八國之援使之腹背受敵進退無所據自非老於謀國智於料敵者不能然也夫惟三代仁義之兵乃能正而不竒以制勝也歟宣公十二年晉人宋人衛人曹人同盟于清丘臣若水通曰書同盟譏也何譏爾不與其盟也譏失謀也春秋無善盟盟者忠信之薄也茍能以忠信相固結結固而不可解各信任仁賢修明政事上下相孚於忠信之化使國無可乗之釁則楚雖强入陳圍鄭敗晉滅蕭之謀焉能載逞乎頋不出此而徒盟誓於鬼神而不謀吾心忠信之不可解者春秋書以譏之不待乎人列國之卿而義自見也宜其盟血未乾将不免於塗地卒致寝門蒲胥之辱析骸易子之慘而盟果安在哉謀之不臧亦可嘆也已襄公九年冬公㑹晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲臣若水通曰鄭之受伐者何違子展之謀也晉之同盟于戲者何用知罃之策也夫鄭之見伐於楚欲從楚以茍安者子駟也請完守以老楚杖信以待晉者子展也子展之謀賢于子駟逺矣簡不用之而盟楚無惑乎今日之受伐也鄭之行成於晉欲圍鄭以激楚者荀偃也請還師以敝楚分軍而逆來者知罃也知罃之策過於荀偃逺矣晉能用之而盟鄭無惑乎後日之成功也是則進謀在臣聽謀在君鄭以違善謀而䝉辱晉以用善謀而成功君天下者可不審於用謀也哉禮記内則四十始仕方物出謀發慮道合則服從不可則去臣若水通曰方猶對也物猶事也方物而出其謀發其慮則因事制宜而謀慮不過矣知謀慮之道則知仕止之道仕止者謀慮之知幾者也周禮秋官小司宼之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君其位王南鄉三公及州長百姓北面羣臣西靣羣吏東靣小司宼擯以叙進而問焉以衆輔志而弊謀臣若水通曰此小司宼之職專以詢民者何哉詩曰詢于芻蕘書曰謀及庻人夫天下之人心同此虛靈所謂聰明也一已之聰明有限而天下之聰明無窮况夫國之危國之遷國之欲立其君三者天下之大事而可以弗詢之衆乎故始則稽于衆而終則斷諸獨衆無不出之謀而已無不斷之志則大疑以定而事無不善矣然此豈可易能哉亦在於忘已而已忘已則衆自盡衆自盡則謀恊謀協則天下之聰明皆已之聰明沛然而無疑也論語子曰人無逺慮必有近憂臣若水通曰慮者謀也憂者患害也逺謀莫過於道道無窮盡以道存心體認天理則自一念之微以至四海之廣自一息之間以至千百年之逺皆道也道無不善善無不吉何憂乎反是則未能貽四海之憂而憂先及其身未能致千百年之患而患先見於瞬息之頃矣世之人君觀此可不為寒心哉夫惟篤於學慎於動則可以免矣子曰不曰如之何如之何者吾末如之何也已矣臣若水通曰如之何如之何乃反覆慮於心謀於人之辭也為政為學皆當如此庻有進修之幾而為政者尤不可不謹先儒有言善為天下國家者謹於微而已謹微之道在於熟思而審處是以欲興一念作一事取一物用一人必思諸已謀之人真見其為天理之公然後行之如此則不至於逆人心而悖天理危亡之禍可免矣茍或不然徒率意妄行以取一時之快一旦禍敗将至雖噬臍無及聖人所謂吾末如之何也禹之告君曰安汝止惟幾惟康在聖君賢相猶拳拳致謹若此而况於其下者乎後世君臣欲審於幾事者必自安汝止始子曰君子有九思視思明聽思聰色思温貌思恭言思忠事思敬疑思問忿思難見得思義臣若水通曰學之要在隨處體認天理而已體認者心思之用也故曰思則睿睿作聖孟子曰思則得之茍於視聽色貌言事疑忿見得而各致其思焉則書所謂慮善以動動惟厥時隨處體認而天理見矣夫事雖九而思一也一思之通乎九事如土之通乎五行記曰聰明聖知達天徳思之用廣矣大矣孟子曰權然後知輕重度然後知長短物皆然心為甚王請度之臣若水通曰是非之心人皆有之故人之知幾應物皆本於心心之是非之矩譬物之有權度也差毫釐而謬千里其本體惑矣故權度立而輕重長短之差見矣本體立而是非邪正之分明矣故謀事者必正其本以揆萬變君子絜矩聖人不踰矩古之人所以大過人者無他善推其所為而已矣親親而後仁民仁民而後愛物分定故也然則君人者可不講於心術之微以為制事之本哉格物通卷五
