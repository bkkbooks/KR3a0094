body:
  text: 格物通卷八十五明湛若水撰漕運漢文帝時賈誼上疏曰天子都長安而以淮南東道為奉地鏹道數千不輕致輸郡或乃越諸侯而遂調均發徵至無狀也古者天子地方千里中之而為都輸將繇使逺者不在五百里而至公侯地百里中之而為都輸將繇使逺者不在五十里而至輸者不苦其繇繇者不傷其費故逺人安及秦不能分人寸地欲自有之輸將起海上而來一錢之賦數十錢之費不輕而致也上之所得甚少人之所苦甚多也臣若水通曰此漢賈誼上文帝之疏也長安即關中也夫關中漢之所都也漢都關中則固資淮南以為奉地矣然自淮至關中數千里甚逺地之輸將類皆費數十錢始能致一錢之賦其間或有越諸侯之境而調均發徵者是以所費者多而所致者少至無謂也夫古天子諸侯地不過千里百里都其中土四面輸將其道里天子止五百里諸侯止五十里爾至秦併天下都關中去海有數千里之逺其輸將由邊海而至都又數十錢之費乃致一錢矣然則人君不可不以節財用為先務也臣故揭之以為後世規焉漢武帝元光六年春大司農鄭當時言穿渭為渠下至河漕關東粟徑易又可以溉渠下民田萬餘頃春詔發卒數萬人穿渠如當時䇿三嵗而通人以為便臣若水通曰鄭當時穿渠之利有二焉一則可以通漕粟一則可以利溉田暫勞而永逸論者至今稱之蓋由當時講求水利毋邀近功無惜小費毅然任之而不疑然非武帝之明决未必不沮之於群議廢之於慮始也然則啓之者當時之功用之者武帝之明是宜並書之漢明帝永平十三年夏汴渠成河汴分流復其舊迹臣若水通曰軍國之儲屯種為上漕運次之飛挽為下海運則不得已而用之也蓋費力漸多則漸為下䇿爾史稱明帝時河汴决壞久而不修至是遣王景發卒修汴渠隄十餘里隄既成則河東北入海而汴東南入泗兖豫之民得以安居而運道通矣明帝之為國計也不亦善哉漢後主建興十二年二月丞相諸葛亮勸農講武作木牛流馬運米集斜谷口治斜谷邸閣息兵休士三年而後用之臣若水通曰蜀地出褒斜不通舟楫轉運甚艱故亮為木牛流馬之法今其制不可考而蜀道﨑嶇飛挽咸集要非尋常智謀所可辦者非振古之竒才其孰能神其術如是哉晉惠帝永寧元年四月成都王穎表稱大司馬前在陽翟與賊相持既久百姓困敝乞運河北邸閣米十五萬斛以振陽翟饑民臣若水通曰國之儲積為軍國計也穎表運河北邸閣之粟十五萬以振陽翟饑民者何哉蓋軍國之所以存亡勝敗以其有民也故曰民為重社稷次之君為輕而况軍國之需乎穎之計可謂有深長之慮矣後之人君為瓊林大盈之積或乃多聚內帑以為私財而不恤民饑者亦何心哉晉惠帝永興元年正月羅尚遣别駕李興詣鎮南將軍劉𢎞求糧𢎞綱紀以運道阻逺且荆州自空乏欲以零陵米五千斛與尚𢎞曰天下一家彼此無異吾今給之則無西顧之憂矣遂以三萬斛給之又遣治中何松領兵屯巴東為尚後繼時流民在荆州者十餘萬户羈旅貧乏多為盜賊𢎞大給其田及種糧臣若水通曰綱紀𢎞之幕官也夫天下如人之一身四肢百骸氣相通貫則為康强否則病且死矣世之為人臣者多以分職自私不相應如痿痺之人血氣不貫其不誤人國家者鮮矣荆州巴涪相為唇齒巴涪軍乏固荆州之憂也劉𢎞不以分職自私慷慨許尚以漕米三萬可謂公以存心忠於所事矣噫賢矣哉唐都關中嵗漕東南之粟高祖太宗之時用物有節而易贍水陸漕運不過二十萬石臣若水通曰李唐創業之初漕運不若繼世之多而主國計者未嘗以財屈告何也用之有節也是故天之生財有限人之運力有窮不可不節也使用之無節焉則雖罄民之資竭民之膏而其用亦有所不足矣故運事無善節用其善為人君者可不究心哉唐太宗貞觀十八年上將征髙麗敕閻立德等詣洪饒江三州造船四百艘以載軍糧以韋挺為饋運使又命蕭鋭運河南諸州糧入海臣若水通曰太宗親征逺夷預為足食之計命官造船置使督運可謂輕民命而暴民財矣夫以中國之命之財而事帝王所不治之逺夷譬猶竭心腹氣血而以益於指爪皮毛不可得也其不亡亦幸矣臣特書以為人君逺運虛內事外者之戒焉唐𤣥宗開元二十一年關中久雨穀貴上將幸東都裴耀卿謀之曰臣聞貞觀永徽之際歲漕關中一二十萬石足以周贍今若使司農租米悉輸東都自東都轉漕以實關中則關中有數年之儲而水旱無憂矣且吳人不習河漕請於河口置倉使吳船輸米而去官自雇載分入河洛或開山路車運而過則無留滯矣上深然其言臣若水通曰耀卿此謀節級轉運不滯於逺船不疲於逺輦雖用民力而民不知其勞誠為轉運之良法也開元之盛君子彚進雖轉運之司而其建明有如此者其可嘉也夫開元二十二年裴耀卿為江淮河南轉運使於河口置輸場於輸場東置河隂倉西置柏崖倉三門東置集津倉西置鹽倉又令江淮舟運悉輸河隂倉更用河舟運至含嘉倉及太原倉自太原倉入渭輸關中凡三嵗運米七百萬斛省僦車錢三十萬緡臣若水通曰耀卿轉運之計善矣省僦車錢三十萬而官不告乏凡三四遞運而民不告勞其獲效多而所費少自漢以來莫之過也開元天寶間海內富實而京師之府庫益充非斯人之功也哉天寶元年正月陜州刺史季齊物穿三門運渠臣若水通曰齊物鑿砥柱為門以通漕開其山巔以為挽路自以為計得矣至於棄石激水舟不得入乃候水漲而以人挽之曠日久而用力多非徒無益而又害之也卒之賂宦官以蔽主其人烏足齒哉臣故書之以為後戒天寶二年江淮租庸等使韋堅引滻水抵苑東望春樓下為潭以聚江淮運船役夫匠通漕渠發人丘壟自江淮至京城民間蕭然愁怨臣若水通曰堅之計非欲便於國益於民將以飾觀視之美而逢君之欲也𤣥宗見其連檣數里珍貨滿目則侈然自足矣而復恤其民怨而國危乎天寶去開元無幾而轉運之弊如此乘輿播遷豈徒歸諸天哉噫可以為世鑒矣唐肅宗乾元二年諸軍屯戍日久財竭糧盡假秀實獨運芻粟以奉鎮西行營相繼於道臣若水通曰兵以食彊也食足則兵足而民信之斯無往不利矣食盡則兵憊士心必二其果能信乎秀實獨運芻糧以給行營其知當務之急者歟唐代宗廣德二年三月劉晏為轉運使以江汴河渭水力不同各隨便宜造運船教漕卒江船達揚州汴船達河隂河船達渭口渭口達太倉其間緣水置倉轉相受給自是每歲運穀或至百餘萬斛無升斗沉覆者臣若水通曰劉晏轉運之法世稱理財之善也蓋由躬執籌算自昕逮晦雖休浣不費務其專精於此也久矣而又取濟於鹽利宜其事之易辦而成其功也雖然大學曰未有上好仁而下不好義者也未有好義其事不終者也晏亦專利之臣爾未聞以仁義之利事其君者故曰長國家而務財用者必自小人矣然則晏亦非國家之大利也唐德宗貞元二年四月關中倉廩竭禁軍或自脫巾呼於道曰拘吾於軍而不給糧吾罪人也帝憂之甚㑹韓滉運米三萬石至陜李泌即奏之帝喜遽謂左右曰米已至陜吾父子得生矣時禁中不釀命吳坊市取酒為樂又遣中使諭神䇿六軍軍士皆呼萬歲時比歲饑饉兵民皆瘦黑至是麥始熟市有醉人當時以為嘉瑞人作飽食死者復五之一數月人膚色乃如故矣臣若水通曰經曰制節謹度滿而不溢所以長守富也德宗以聚斂為良臣以掊克為長䇿而不節無度既已久失人心而肇禍亂矣播遷之餘乃至倉廩匱竭上下乏食是不守其富矣韓滉運米至陜而帝有得生之喜軍有萬歲之呼然則非良運則寃怨生變即有不得生之禍矣轉運之利於國家豈小也哉昔者公劉好貨詩曰乃積乃倉乃裹餱糧于槖于囊思戢用光帝之好與公劉同而其效相反者蓋天理人欲之不同情爾人君可不以德宗為戒而以公劉為法哉陸贄奏議贄告德宗曰陛下誠能聽臣愚計不受沮傷百日之間收貯總畢轉運常行之務既無失於舊規太倉歲入之儲亦不闕其恆數圖慮至熟更無所妨謹具楊𣙜上陳惟陛下留意省察舊制以關中王者所都萬方輻輳人殷地狹不足相資加以六師糗糧百官祿廩邦畿之稅給用不充所以控引東方歲運租米冒淮湖風浪之弊泝河渭湍險之艱所費至多所濟蓋寡習聞見而不達時宜者則曰國之大事不計費損故承前有用一斗錢運一斗米之言雖知勞煩不可廢也習近利而不防逺患者則曰每至秋之時但令畿內和糴既易集事又足勸農何必轉輸徒耗財賦臣以兩家之論互有短長各申偏執之懷俱昧變通之術其於事理可得粗言夫聚人以財而人命在食將制國用須權重輕食不足而財有餘則弛於積財而務實倉廩食有餘而財不足則緩於積食而嗇用貨泉若國家理安錢穀俱富蒸黎蕃息力役靡㢮然後可操羡財益廣漕運雖有厚費適資貧人三者不失其時之所宜則輕重中權而國用有制矣開元天寶之際承平日久財力阜殷祿食所頒給用亦廣所以不計縻耗勵贍軍儲至使流俗過言有用一斗錢運一斗米之說然且散有餘而備所乏雖費何害焉斯所謂操羡財以廣漕運者也貞元之始巨盜初平太倉無兼月之儲關輔遇連年之旱而有司奏停水運務省腳錢至使郊畿之間煙火殆絶都市之內餒殍相望斯所謂覩近利而不防逺患者也近歲關輔之地年穀屢登數减百姓稅錢許其折納粟麥公儲委積足給數年田農之家猶困穀賤今夏江淮水潦漂損田苗比於常時米貴加倍氓庶匱乏流痡頗多關輔以穀賤傷農宜加價糴穀以勸稼穡江淮以穀貴民困宜减價糶米以救凶災今宜糴之處則無錢宜糶之處則無米而又運彼所乏益此所餘斯所謂習見聞而不達時宜者也今淮南諸州米每斗當錢一百五十文從淮南轉運至東渭橋每斗船腳又約用錢二百文計運米一斗總當錢三百五十文其米既糙且陳尤為京邑所賤今據市司月估每斗只糶得錢三十七文而已耗其九而存其一餒彼人而傷此農制事若斯可謂失矣頃者每年從江西湖南浙東浙西淮南等道運米一百一十萬石送至河隂其中减四十萬石留貯河隂倉餘七十萬石送至陜州又减三十萬石留貯太原倉唯餘四十萬石送赴渭橋輸納臣詳問河隂太原等倉留貯之意蓋因往年蟲旱關輔荐饑當崔浩作相之初懲元琇罷運之失遂請每年轉漕米一百萬石以贍京師比之中途力殫歲盡所以節級停减分貯諸倉每至春水初通江淮所般未到便取此米入運免其停滯舟船江淮新米至倉還復留納填數輪環貯運頗亦協宜不必每歲加般以增不給之費所司但遵舊例曽不詳究源由邇來七年積數滋廣臣近勘河隂太原等倉見米猶有三百二十餘萬石河隂一縣所貯尤多倉廩充盈隨便露積舊者未盡新者轉加歲月漸深耗損增甚縱絶江淮轉輸且運此米入關七八年間計猶未盡况江淮轉輸船次不停但恐過多不慮有闕今歲關中之地百穀豐登京尹及諸縣令頻以此事為言憂在京米粟大賤請廣和糴以救農人臣今計料所糴多少皆云可至百餘萬石又令量定所糴估價通計諸縣貴賤并雇船車般至太倉穀價約四十有餘米價七十以下則一年和糴之數足當轉運二年一斗轉運之資足以和糴五斗比較即時利害運務且合悉停臣竊慮運務若停則舟船無用舟船無用則壞爛莫修儻遇災凶復須轉漕臨時鳩集理必淹遲夫立法裁規久必生弊經略之念始慮貴周不以積習害機宜不以近利隳永制不貴功於當代不流患於他時慮逺防微是其均濟臣今所獻庶近於斯减所運之數以實邊儲存轉運之務以備時要其於詳審必免貽憂臣若水通曰陸贄論轉運一事變通盡利至為詳悉視此處歲穀之豐歉餘乏以為彼處轉運之盈縮多寡達時宜而不溺於見聞防逺患而不狃於近利贄可謂通達國體者矣後之人君講運事者宜采擇焉宋定都於汴漕運之法分為四路江南淮南浙東西荆湖南北六路之粟自淮入汴至京師陜西之粟自三門白波轉黃河入汴至京師陳蔡之粟自閔河蔡河入汴至京師京東之粟歷曹濟及鄆入五大渠至京師四河惟汴最重臣若水通曰汴梁四衝八達之地也宋建鼎於此故其運道所至凡四路蓋因其勢而為之也若漢漕仰於山東唐漕仰於江淮則異於是矣是故法無古今便民者為良法也元史食貨志元都於燕去江南極逺而百司庶府之繁衛士編民之衆無不仰給於江南自伯顔獻海運之言而江南之糧分為春夏二運蓋至於京師者歲多至三百萬餘石民無挽輸之勞國有儲蓄之富豈非一代良法歟臣若水通曰虞集云至元十二年既平宋始運江南糧以河運弗便至元二十九年用伯顔言初通海道漕運抵直沽以達京城立運糧萬户府三以南人朱清張瑄羅璧為之初歲運四萬餘石後纍增及三百餘萬石春夏分二運至舟行風迅有時自浙西不旬日而達於京師內外官府大小吏士至於細民無不仰給於此臣愚亦以為此一代之良法也夫所謂法之良者豈直以為足國之用而已乎蓋其法有三利焉夫漕河係於地者也舟挽係於人者也海運係於天者也係於地者地或得以阻之係於人者人亦得以玩之係於天者惟能順天之時地阻人力不得而與焉是故有順天之利一也無漕河之阻二也免挽舟之勞三也此所以為良法也雖然今之漕河疏濬地利已非元之比矣督運嚴密人事已非元之比矣此其萬世之經也若夫海運之法費力甚少而致粟甚多其說亦不可廢必不得已而用之其亦權一時之變乎程皓曰饋運之術雖自古亦無不煩民不動搖而足者然於古則有兵車其中載糗糧百人破二十五人然古者行兵在中國又不逺敵若是深入逺處則决無省力且如秦運海隅之粟以饋邊率三十鍾而致一石是二百倍以來今日師行一兵行一夫饋只可供七日其餘日必俱乏食也且計之須三夫而助一兵仍須十五日便回一日不回則一日乏食以此較之無善術故兵也者古人必不得已而用者知此爾臣若水通曰程皓謂一夫可饋一兵七日而計三夫助一兵蓋有見乎運餉之難至精密矣是故古者慎於用兵非獨不忍驅無罪之民而置之鋒鏑之下也亦以饋運之難耳蓋用兵所以利民也至於疲其力傷其財則是以其所利之者反害之矣故古之用兵須精而少靜而制動蓋為省饋餉之費爾張栻云北邊方用兵總財賦者議調西州民轉餉張棁謂有三不可西州賦重於三路不待調夫民力已疲矣自蜀至利役夫徒手走千里始得負糧而行又千里乃至西和古人以為千里饋糧士有饑色今且倍矣獨奈何且劒利調夫一人之費為錢八萬西州道逺費必倍以一夫十六萬錢計之直米五十石致六斗之粟利害又相絶矣卒寢其議臣若水通曰轉餉之役病民以二千里之逺而轉餉又病民之至者也張棁三不可之說深見其病可謂能知時務者矣若以為不達時務而泥於守常者豈知棁者哉後之為國計者當如棁之深稽其弊然後可以謂之永圖也列傳記楊時陳時政之弊有曰燕雲之師宜退守內地以省轉輸之勞募邊民為弓弩手以殺常勝軍之勢臣若水通曰轉輸之事用民力則病民者也地愈逺則為病愈甚宋運江淮以南之米去燕雲甚逺矣時言退守以省民勞募邊民以為弓弩手可謂知兵食之至計者矣楊時上淵聖皇帝書其略曰祖宗設制置發運司蓋得劉晏之遺意朝廷捐數百萬緡與為糴本使總六路之計通融移用以給中都之費六路豐凶更有不常一路豐稔則增糴以充漕計饑凶去處則罷糴使輸折斛錢而已故上下俱寬而中都不乏最為良法自胡師文以糴本為羡餘以獻而制置發運司拱手無可為者此直達之議所從起也今復轉般而糴本乃取之諸路昔者諸路每歲一路所得鹽課無慮數十萬緡自鈔法行鹽課悉歸𣙜貨務諸路一無所得漕計日已不給今又斂取之非出於漕臣之家亦取諸民而已臣若水通曰運餉之法莫善於轉般莫不善於直達是時雖復轉般之名而直達之實猶在諸路漕米至真揚楚泗未嘗入厫徒為取支文具而已夫鹽法與轉般相因以為利也久矣自直達行而鹽法隨變所謂相因為利者咸失之矣今復轉般之名而無轉般之實豈非徒然哉此楊時之論所以有感於時弊而為後世變法者之戒矣國朝洪武二十六年八月上命崇山侯李新往溧水縣督視有司開胭脂河上諭之曰兩浙賦稅漕運京師嵗實浩繁一自浙河至丹陽捨舟登陸轉輸甚勞一自大江泝流而上風濤之險覆溺者多朕甚憫之今欲自畿甸疏鑿河流以通於浙俾運輸者不勞商旅獲便故特命爾往督其事爾其臨事雖勤役民勿暴新頓首受命而行暨河成人皆便之臣若水通曰食者軍民之大命而漕運又朝廷之大命也聖祖命李新往督開胭脂河且諭之以轉輸之浩繁與夫輸挽覆溺之勞苦遂欲河流大通往來獲便所以利國計而寬民力者至矣然是特運於南都者爾今日都北自揚淮至於㑹通而達京師其道路之遙洪閘之險浩繁勞苦又不可勝言者矣聖明宜體皇祖之心以備國而恤民使其所養者皆有功於國有益於民之人不徒費可也不然何以苦我有用之民而養彼無用之人為彼無益之事哉誠使授一官興一役費一物必以此為念而痛為之撙節焉國用其有不給民生其有不安者乎伏惟聖明留意焉洪武三十年海內運糧七十萬石給遼東軍餉永樂初海運七十萬石至北京至十三年㑹通河通利始罷海運臣若水通曰此國朝罷海運之始也夫轉運糧米取以資京師而已今之漕運盡善而盡美也至於海運一切罷之臣竊以為非所以備意外之虞而示人以不可窮之計也故漕運以為萬世之經海運所以備一時之變二者並存斯得之矣然欲舉海運必屬之近海之藩司庶乎知海港之勢而為操舟趨避之方則萬全無失可使一費而收百利矣國朝諸司職掌凡有軍馬去處所需錢糧等項本部必先查考某處蓄積有餘某處歲用不給量其水陸路程地里逺近難易計其人夫多寡明白具奏差官於糧多去處撥運缺糧衛分支用臣若水通曰轉運之法國家大計其在歷代行之其法不同然大要不過隨其地之豐歉量其里之逺近難易而權宜之而已矣此不易之法也我朝著為法令提其大綱挈其要領可謂至約而博矣永樂四年六月廣東布政司奏每歲海外番夷入貢方物水路以舟楫運載惟南雄至南安舟楫不通自今請用民力接運太宗曰為君務養民今番貢無定期而農少暇日假令自春至秋番夷入貢不絶皆役民接運豈不妨其農事自今番夷入貢如值農務之時其方物並於南雄收貯俟十一月農隙却令運赴南安著為令復顧侍臣曰民不失其養雖勞之鮮怨民失所養雖休之不德臣若水通曰古之王者不以邊逺窮人之力故禹貢之制止於甸服千里之內猶曰百里賦納總二百里納銍三百里納秸四百里粟五百里米因其地之逺近為之輕重而於侯綏要荒之外則無賦也朝錯曰人情莫不欲逸三王節其力而不盡蓋以為民也觀我太宗之言誠有以合古帝王之意繼世而有天下盍以太宗為法乎格物通卷八十五
