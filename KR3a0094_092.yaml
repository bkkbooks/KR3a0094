body:
  text: 格物通卷九十二明湛若水撰慎賞賜上詩小雅彤弓彤弓弨兮受言藏之我有嘉賓中心貺之鐘鼓既設一朝饗之臣若水通曰此天子燕有功諸侯而錫以弓矢之樂歌也彤弓朱弓也弨弛貌嘉賓指有功諸侯而言也貺與也大飲賓曰饗夫諸侯有四夷之功而獻之王則王賜之弓矢以覺報宴此有國者之常典也詩言王者有弓其色彤然其體弨然受之弓人而藏之王府以待乎有功其藏之也重矣逮夫我有嘉賓敵王所愾而功在四夷者則中心實欲以此弓而與之夫與之出於中心其與之也誠矣然與不徒與也必鍾鼓既設一朝舉以與之而遲留顧惜之心不少懷焉又何與之之決哉是則始而藏弓以待有功之人則不敢輕及其推誠以錫有功之人則不敢吝蓋藏之重則必能不與其所不當與與之決則必能與其所當與藏之重而與之決王者賞功之大權當如是矣伏惟聖明留意於斯則賚與之際必致其謹不至於過而財用節矣小雅采菽采菽采菽筐之筥之君子來朝何錫豫之雖無豫之路車乘馬又何豫之玄衮及黼臣若水通曰此詩采菽之首章天子美諸侯來朝而言其賞賜之意也菽大豆也君子諸侯也路車金路以賜同姓象路以賜異姓也玄衮玄衣而盡以卷龍也黼如斧形刺之於裳也夫濫賞則妄費妄費則傷財而耗國矣故天子因諸侯來朝而言采菽采菽則必以筐筥盛之君子來朝則必有以賜豫之又言今雖無以豫之然已有路車駕之乘馬以為乘御之寵玄衮兼之黼裳以為佩服之榮則所以賜之者乃國家之常典亦賜所當賜而慎且重矣何嘗或濫及哉後之人主無公正之心賞賜出於私喜者多矣故武庫之兵或賜於弄臣貂璫之寵或加於近侍或一媚而蒙千金之賞或微勞而冒爵邑之封不知賞賜之物雖出於朝廷而貢賦之輸實剝乎百姓也人君當存心於喜怒之正則賞不濫而財自舒矣春秋成公八年秋七月天子使召伯來賜公命臣若水通曰書天子使召伯來賜公命者何也譏失賞也魯成公未有大功顯德而周簡王特遣召伯以賜之命非禮也書天子者君天下之稱夫賞罰豫奪自天子出者也故天子於諸侯終喪入見則有賜歲時來朝則有賜敵王所愾而獻功焉則有賜今魯成公免喪嗣位而不入見既更五服一朝之歲而不來朝又未嘗敵王所愾而無功之可獻周胡為而賜命于魯乎魯胡為而受之于周乎夫天命有德五服五章賜豫者天之命也不當賜而賜之是謂僣賞僣賞是違天矣違天是失其所以為天子之道矣此春秋之所以譏之也歟禮記王制曰有功德於民者加地進律臣若水通曰此言古之天子巡狩所至見有功勞及於民有德澤布於下者則從而加其封域之制進其爵命之等所以報其功崇其德也夫賞罰之義人君非故厚薄天下也所以礪世磨鈍也蓋不賞不勸不罰不恥人無所用勸恥焉天下所由以不振也故曰有功不賞有罪不誅雖堯舜不能以化天下也夫賞賜必以其功德則賞賜之行非褒其人也褒其功德也故賞以其功德罰以其罪惡已不得而私焉後世此義不明人君不以功德而取人惟以私喜而授賞則夫蒙其賞者亦輕之矣嗚呼古之賞賜也重後之賞賜也輕故賞愈重人視之愈輕而國家之財愈困則亦何益之有哉此今日不可以不慎者也月令曰賞公卿大夫於朝命相布德和令行慶施惠下及兆民慶賜遂行毋有不當臣若水通曰此孟春之令也天子於立春之日帥三公九卿諸侯大夫迎春東郊而還乃賞公卿大夫於朝又恐其恩未溥故命相行慶以賞有功之人又施惠布澤下及兆民慶惠之典遂行矣毋有不當所以謹之者至矣周禮夏官司勳掌六卿賞地之法以等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多凡有功者銘書于王之太常祭於大蒸司勳詔之大功司勳藏其二臣若水通曰此周禮夏官之屬掌司勳之職吳澄定以為天官是也下同曰賞地者即當田在逺郊之內也王功如周公輔成王業其功最大故謂之勳也國功如伊尹保全國家其功次之故謂之功也民功者如后稷法施於民是也故謂之庸事功如大禹勤勞於事是也故謂之勞治功曰力如臯陶強力以制治也戰功曰多如韓信多算以勝敵也凡若此者悉書其名于王之太常太常旗也畫日月於旗故曰太常以旌其功又祭于大蒸以報其功不但已也又以配享之功告于神藏于紀功之副以待考若此則賞必以功而無功者不得以濫賞而國用節矣夏官司士以詔王治以德詔爵以功詔祿以能詔事以久奠食唯賜無常臣若水通曰此夏官之屬司士所掌之職也然曰詔王治者告王以當治之事也有德者告王而爵之有功者告王而祿之有能者告王而任以事以至任職之久者則定其餼廪之多寡不必告于王也然此皆以常職而食於上者至於賜則出於人君之特恩勵世之權也何常數乎夫有常者一定之制而無常者一定之義義之與比何常之有由是觀之先王之賞賚豈作好作惡為之哉左傳文公十二年秦伯使西乞術來聘且言將伐晉襄仲辭曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賔答曰寡君願徼福乎周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之臣若水通曰先君謂魯先君也大器謂圭璋也腆厚也徼要也魯公伯禽也下臣西乞術自稱不敢斥尊故言致諸執事節信也執圭璋為信故言以為瑞信致謂致玉也賄贈也西乞術之聘為伐晉也襄仲既不欲棄二國之好而辭玉矣曷為而復賄之乎善其不辱命也賄以不辱命則其所賜亦有節而非無義之費矣宣公十五年晉侯賞桓子狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職説是賞也曰周書所謂庸庸祗祗者謂此物也夫士伯庸中行伯君信之亦庸士伯此之謂明德矣文王所以造周不是過也故詩曰陳錫哉周能施也率是道也其何不濟臣若水通曰桓子荀林父也士伯即士貞子也微無也喪伯氏言邲之敗晉侯欲殺林父因士伯之諫而止也羊舌職叔向父也庸庸祗祗謂用所可用敬所可敬也此書康誥之言而言文王之克明德者如上所云也詩大雅文王之篇率循也夫先王之賞賜必有功德者乃施之士伯得與荀林父同受晉侯之賞何也蓋晉侯用荀林父而成獲狄之功荀林父則由士伯而進用保全林父以成功者也以是而施諸有功之臣而推及薦賢為國之人則用為有義矣羊舌職之説是賞也不亦宜乎襄公二十六年鄭伯賞入陳之功三月甲寅朔享子展賜之先路三命之服先八邑賜子産次路再命之服先六邑子産辭邑曰自上以下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑公固豫之乃受三邑公孫揮曰子産其將知政矣讓不失禮臣若水通曰子展為元帥鄭伯賜之享之皆以賞其入陳之功也先路次路皆周王所賜車也八邑三十二井也六邑二十四井也子産位次當受二邑以公固豫之故受三邑示不當受也不失禮謂不失其班次之禮也夫入陳之功首子展次子産其分固自有不同者鄭伯請于周而賞之似也然子産位在四則義宜賜二邑爾公賜之六焉過矣及子産辭之義也而卒受其三者以君之命亦義也故受之三則下不至失禮上不至違君子産於義得矣鄭伯之賜豫能免過舉乎襄公二十七年公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上祿亂也臣弗敢聞且寧子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰大叔儀不二能贊大事君其命之乃使文子為卿臣若水通曰公謂衛獻公免餘公孫氏衛大夫六十指一乘之邑而言寧子名喜死謂死於禍為少師以免餘為少師之官也不二謂事君無二心也贊佐也命之勸獻公命大叔儀為卿也書曰天命有德五服五章哉則知賞曰天命非人君所得私也衛獻與免餘之邑果天命之公乎蓋其賞免餘者賞其能殺寧喜也殺寧喜者德其因之而返國也逐我者出納我者死此子鮮之所以終身不仕也免餘其可德之哉國語周語晉文公既定襄王于郟王勞之以地辭請隧焉王弗許曰昔我先王之有天下也規方千里以為甸服以供上帝山川百神之祀以備百姓兆民之用以待不庭不虞之患其餘以均分公侯伯子男使各有寧宇以順及天地無逢其災害先王豈有賴焉內官不過九御外官不過九品足以供給神祇而已豈敢厭縱其耳目心腹以亂百度亦惟是死生之服物采章以臨長百姓而輕重布之王何異之有臣若水通曰王勞之以地謂陽樊溫原攢茅之田隧王之葬禮闕地為道故曰隧百姓百官族姓有世功者用財用也庭直也虞度也其餘甸服之外地也寧安也宇居也賴利也死之服謂六隧之民引王柩輅輕重布之貴賤各有等也何異之有言帝王皆然夫文公定襄王於郟其翊戴之功可謂大矣請隧宜無不從者然地可多與而名器不可以假人使襄王茍溺一時之私如其請焉則周之禍未可量也故孔子先正名之政重繁纓之惜豈徒然哉周語王孫説曰魯叔孫之來也必有異焉其享覲之幣薄而言諂殆請之也若請之必欲賜也魯執政惟強故不歡焉而後遣之且其狀方上而鋭下宜觸冒人王其勿賜若貪陵之人來而盈其願是不賞善也且財不給臣若水通曰説周大夫魯執政惟強故不歡焉而後遣之者謂魯執政之人唯畏其強禦難距其欲故不歡悅而復遣之也夫賞錫者天王之殊恩自上而下者非可得而請也可請則惠褻矣叔孫僑如幣薄而言諂宜王孫説豫有以待之歟故明主愛一顰一笑况錫與之大者哉魯語臧文仲曰善有章雖賤賞也臣若水通曰章著也謂善之章著者也夫天命有德所以懋賞也天命者天之理也故君天下賞一人而千萬人勸奉天之理而得乎民之同然者也故賞惟其善不惟其人奚貴賤之間是以刑賞不必遍於天下而天下服者凡以得其心故也君天下者可不監文仲之言乎魯語仲尼曰古者分同姓以珍王展親也分異姓以逺方之職貢使無忘服也臣若水通曰展重也玉謂若夏后氏之璜也無毋通服事也使毋忘所事也夫古之明王重一顰一笑親親賢賢各有攸當故分同姓以珍玉分異姓以逺物疏戚不踰其常親賢不失其倫以示不茍也後之賢君如漢文帝猶有鄧通銅山之賜况其下者乎操威福之柄者蓋思所以慎其賜豫哉周顯王十八年韓昭侯有弊袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑今袴豈特嚬笑哉吾必待有功者臣若水通曰詩云彤弓弨兮受言藏之此古昔帝王之所以待有功也必待有功則無功者不得以濫賞賞不濫則國用舒矣夫弊袴微物也昭侯以待有功則凡大於弊袴其肯輕以與人乎由是言之則昭侯之能節用以足其國可知矣後之人君賞賜無度寧不亦可愧乎漢章帝性寬仁篤於親親故叔父濟南中山二王每數入朝特加恩寵又賞賜羣臣過於制度倉帑為虛何敞奏記宋由曰尋公家之用皆百姓之力明君賜賚宜有品制忠臣受賞亦應有度臣若水通曰豫奪辭受義焉而已過焉濫也故上不濫與下無濫受上下相孚於義然後國家可保也上過豫下過受上下相誘於利則財困民離將并其有而亡之矣安能保其國家乎章帝數加恩寵於二王而羣臣賞賜無度則傷財害民矣何敞獨能言於宋由其亦忠臣愛國之心哉是故明君之賞賜不可以不慎焉晉惠帝永康元年九月吏部尚書劉頌曰昔漢之錫魏魏之錫晉皆一時之用非可通行周勃霍光其功至大皆不聞有九錫之命也臣若水通曰聖帝明王謹賜賚之禮所以防僣妄而生厲階也錫命賜豫之大者也况九錫之命權臣肆姦之漸爾曹瞞司馬懿挾天子以令諸侯得非九錫為之崇乎漢魏之祚所由終晉亦可以監矣劉頌言之所以抑姦臣無上之心何其切哉格物通卷九十二
