body:
  text: 格物通卷十五明湛若水撰敬祖考易豫象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考臣若水通曰此豫卦象辭言聖人體豫之功用也殷盛也豫卦震在坤上有雷出地奮之象雷出地則萬物欣育故有和樂之意先王體之以作樂崇德其德盛者其樂盛也殷薦之上帝以配祖考蓋樂主和也陽也氣也達陽和之氣於上帝以祖考配天所以通其誠敬也宜乎上帝時歆祖考來格矣聖人體豫之功用大矣哉然究其本必聖人和德於中心和則氣和氣和則聲和而天地之和應矣方今國家百有六十餘年聖明御極致治中興處豫之時夙夜奮勵制禮作樂以盡保豫之道此其時矣臣不勝顒望之至萃彖曰王假有廟致孝享也臣若水通曰此明萃卦彖王假有廟之時也假至也致孝享者即聚己之精神以聚祖考之精神也夫祖考之於子孫一氣也固無時而不聚也王必假于有廟者何蓋祖考之精神雖在於廟而實通乎吾身也故王者當萃之時必假有廟以致孝享則吾身之精神以在廟而聚祖考之精神以吾身而聚庶幾幽明感格百順攸聚萃之道莫大於此矣雖然仁孝之心豈必假廟而後聚哉故曰惟聖人為能享帝惟孝子為能享親蓋養之于素爾渙象曰風行水上渙先王以享于帝立廟臣若水通曰此渙卦象辭言聖人濟渙之道也夫風行水上有渙散之象聖人體之以濟渙固各有道矣而必先之以享帝立廟者何蓋萬物本乎上帝人本乎祖考上帝之與萬物祖考之與子孫其氣一故其精神一也然其分則殊故不能不散渙茍非有以聚之二者一渙天人間矣故先王濟渙必先之以此享于郊以聚上帝之精神祭于廟以聚祖考之精神故天神人鬼散而有合而萬物生生不息矣濟渙之道其至矣哉雖然必仁孝誠敬之至者方可以語此否則中心無合一之理而欲為合渙之文其何以能濟渙乎書周書武成丁未祀于周廟邦甸侯衛駿奔走執豆籩臣若水通曰此周書言武王克商祭告于祖廟也邦甸侯衛皆諸侯之國駿疾也武王癸巳克商丁未即率諸侯執豆籩駿奔走以祭告于祖廟所以致孝享萃人心崇大化之本者莫盛於此舉矣武王之心豈有他哉孝思一念自有不容己爾此武王之所以為達孝也然則有天下者思祖宗功德之盛報本追逺之禮可不重與周書冏命惟豫弗克于德嗣先人宅丕后怵惕惟厲中夜以興思免厥愆惟豫一人無良實賴左右前後有位之士匡其不及繩愆糾謬格其非心俾克紹先烈臣若水通曰此周書穆王命伯冏之辭也穆王始以弗德嗣先人丕后有夙夜危厲之誠繼欲羣臣匡輔格非以紹先烈夫穆王望伯冏以輔己德然必以先人先烈為言者蓋己德之進否有係於祖考之隆替一時尊祖敬宗之心惻然若不自遑矣卒之巡遊無度勞民傷財敗先王成憲何其言行先後之不類也嗚呼人心惟危可不畏哉詩大雅思齊惠于宗公神罔時怨神罔時恫臣若水通曰此詩以詠歌文王之德此曰惠于宗公罔時怨恫者以言其德能格乎祖考也惠順也宗公宗廟先公也恫痛也蓋周之先王皆有盛德使文王厥德弗修弗克肖于先王則冥冥之中不免有怨痛矣惟文王之德克順其心無怨無恫所謂惟孝子為能享親者此也肆我祖宗聖德在天正惟聖明聿修厥德以慰在天之心萬世幸甚大雅江漢告于文人錫山土田臣若水通曰此詩宣王䇿命召虎之辭也夫爵人必於宗廟者何也尊祖也尊祖故不敢專事死如事生也故夫人子之於親生也出入必告有事必告孝敬之至也况山川爵土皆祖宗功德之所在乃專以與人而不告豈事死如生之禮與故召虎平夷之功錫之山川土田宜矣而必告于文人宣王其知敬祖者歟中興周道固其宜矣後世乃有挾其私恩專封爵邑而不告于祖者其為不敬祖考孰甚焉周頌我將儀式刑文王之典日靖四方臣若水通曰此宗祀文王以配上帝之樂歌蓋言其法典安民而知其必享也儀式刑皆法也典即其禮樂制度所以致治于天下者皆是也靖安也法典致治何以知其必享也蓋願其子孫之法成憲以致治者祖考之心也茍弗念厥紹顛覆典刑則神靈方且怨憤之矣安能享其祭乎故曰儀式刑文王之典日靖四方則法祖之道備矣孝子之心盡矣不待祭而己享矣故以是知孝子仁人之所以敬其祖考者固不專於祭享而在於遵成憲以致治爾春秋文公六年閏月不告朔猶朝于廟十有六年夏五月公四不視朔臣若水通曰此春秋書魯文公始廢告朔之禮也夫告朔之禮行于祖廟所以重正朔尊祖考萃人心勤政事一舉而衆善集焉魯之先公嗣而行之無敢廢者至于文公六年閏不告朔己有不視朔之漸矣十有六年夏五月四不視朔其尊祖之心已蕩然矣故春秋兩書其事以著此禮之廢實始于此而文公不得辭其無上慢祖之罪矣禮記曲禮國君下齊牛式宗廟臣若水通曰宗廟者祖之神所在而齊牛又為祭祖而備者也國君茍存孝敬之心則見齊牛過宗廟敬祖之念油然生矣其式而下之蓋出於敬祖之誠而不能已也夫敬其祖以及其牛孝敬之至也後之國君遇祀事而不敬者慢祖孰甚焉禮器太廟之內敬矣君親牽牲大夫贊幣而從君親制祭夫人薦盎君親割牲夫人薦酒卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也臣若水通曰贊助也制祭謂絶肺也盎者盛肺之器也牲熟體也太廟之事惟一敬而已矣君親牽牲大夫幣以從所以迎牲也君親制祭夫人薦盎所以祭肺也君親割牲夫人薦酒所以薦熟也夫卿大夫從君命婦從夫人凡在廟者罔不洞洞乎其敬之淵深也屬屬乎其忠之始終無間也惟敬以忠勿勿乎於恍惚幽密之中而欲其神之饗之也是敬也從之者夫人也卿大夫也而主之者君也故牲曰親牽祭曰親制體曰親割所謂自致者也夫然後為敬之至也大傳人道親親也親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂臣若水通曰宗謂宗子言為祭祀之所宗也此記大傳明王者親親之效大也親親何以尊祖祖者親之所出也尊祖何以敬宗宗者祖之統也敬宗何以能收族族者宗之屬也收族何以嚴宗廟人心萃故宗廟肅也宗廟嚴何以為重社稷社稷受之宗廟者也重社稷何以愛百姓百姓社稷之本也愛百姓刑罰何以中也庶民何以安也財用何以足也百志何以成也禮俗何以刑也和樂何以起也蓋樂生於禮禮形于志志集于用用足于民安民安于法平法平于仁民仁民逹于親親故一親親而尊祖也敬宗也收族也嚴宗廟也重社稷也愛百姓也平刑罰也足財用成百志興禮樂也而百順萃焉此之謂理一分殊物我兩盡先王繼志述事之大者莫過於此矣伏惟聖明體乾父坤母之心萬物一體之念以承祖宗休德以廣先王達孝萬世幸甚祭法天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親疏多少之數臣若水通曰此言祖祭之禮之義建國封諸侯也置邦立邑為卿大夫之采地及賜士有功者廟宗廟也祧祧主廟也築土曰壇除土曰墠親疏昭穆祖考也多少七五三二廟數也親而徹倫而有别先王仁孝之心其達乎是故王立七廟三昭三穆與太廟而七皆月祭之逺廟為祧若周之文武四時祭之由是去祧為壇去壇為墠禱則祭之去墠曰鬼不之祭矣諸侯五廟考祖曾祖月祭之髙祖始祖四時祭之去祖為壇去壇為墠禱斯為祭去墠不祭矣大夫三廟考祖曽祖四時祭之髙祖始祖禱則為壇祭之去壇已矣適士二廟考祖已矣曽祖則禱于壇官師一廟祀考也而祖同焉去壇已矣庶士庶人薦于寢死不祭矣嗚呼兹隆殺之别而親親之徹也兹先王仁孝之達也是故諸侯而上於親有加焉所以致崇尊也大夫以下於親漸減焉所以卑卑而致崇尊也故祭于壇墠附于廟寢而天下無不祭之四親夫是之謂隆殺之别親親之徹知親親之義而上下達矣上下達而仁孝同祖祭之禮根乎一心推之凖而達之治也不亦大乎不明祖祭之禮而能治天下者鮮矣祭法王立七廟三昭三穆與太廟而七一壇一墠曰考廟考成也父有成己之德也曰王考廟祖也曰皇考廟皇大也曽祖也曰顯考廟髙祖也曰祖考廟始祖也此五者與文武不遷合為七也皆月祭之每月祭也一逺廟為祧孔氏曰謂文武在祧以功德不祧也有二祧享嘗乃止二祧即文武也文武以功德特留故不月祭但四時祭而止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼去者離逺之義逺祖藏於祧廟又於廟外為壇逺祖之父則離於壇則為墠禱祝也當祭時則出而祭之若又逺則去墠為鬼而不祭矣諸侯立五廟一壇一墠曰考廟父也曰王考廟祖也曰皇考廟曽祖也皆月祭之顯考廟髙祖也祖考廟始祖也享嘗乃止止享嘗不月祭也去祖為壇自祖之上無廟止為壇去壇為墠祖之父以上又無壇止為墠耳壇墠有禱焉祭之無禱乃止去墠為鬼髙祖父祖寄太祖之廟至祭時則出而祭於壇墠也大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止不月祭也顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止皇考曽祖也無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之共祭考廟去王考曽祖也為鬼曽祖以上就廟薦之而已庶士庶人無廟薦於寢死曰鬼臣若水通曰此祭法之文或者疑焉其秦漢之間之傳乎祭者何繼養也則凡四代之親無不養也然而有差矣夫祭者服之推四代之親無不服則亦無不祭也然而有差矣故自天子諸侯大夫士庶人皆宜得祭四親焉何也其親同故其繼養與服之者同也然而廟制則有差矣故王七諸侯五大夫三適士二官師一庶士庶人無廟而寢其分殊也分雖殊而心則一也盡分者禮也盡心者孝也故禮曰祖考同廟由是觀之則天子諸侯分得為之則異廟大夫以下至官師分不得為之則同廟禮也然則貴賤無不祭之親而其孝同矣記曰父母之喪無貴賤一也故得為而不為謂之慢不得為而為謂之瀆瀆與慢皆弗敬也弗敬神弗享故人之於親多不盡分者豈惟不及者之罪過猶不及祭義是故君子合諸天道春禘秋嘗霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之樂以迎來哀以送往臣若水通曰祭祀之所由生繼養也已食之則時思之矣時思之則時養之矣是故天時感之而祭祀之禮舉焉樂以迎來哀以送往其心一也夫君子之心無時而忘其親也何待天時之履而後感哉蓋曰時之變也則感焉而後祭因之起非謂至此而後思者也是故禴于春則祀于夏可知矣嘗于秋則蒸于冬可知矣四時之祭合諸天道而吾之思見焉然存之乎心者則無時而或忘也嗚呼思者祭之本也無思則無祭彼夫儀文之托而思或怠焉者其殆生事之疏而繼養之衰歟可悲已矣祭義曰致齊於內散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者祭之日入室僾然必有見乎其位周還出户肅然必有聞乎其容聲出户而聼愾然必有聞乎其歎息之聲是故先王之孝也色不忘乎目聲不絶乎耳心志嗜欲不忘乎心致愛則存致慤則著著存不忘乎心夫安得不敬乎君子生則敬養死則敬享思終身弗辱也臣若水通曰致齊者散齊後三日之齊也內謂齊所也散齊者致齊前七日之戒不飲酒茹葷也外未就齊所也齊之日凡親之身所當思者無或忘焉內外致一齊之至也見所為齊思之至也是則敬之始也出入周還必有見聞乎聲容歎息者祭如在也敬之至也是故先王之孝致其追念之愛則聲色志欲不忘而存焉致其想見之慤則聲容歎息不微而著焉然而慤也者愛之所為也著也者存之所為也愛則慤存則著愛慤無二心存著無二事是故孝子之敬貫始終而一之者也生則敬養盡吾愛也死則敬享繼吾養也思終身弗辱焉終己之身也敬之至也然則人子事親之道可一言而盡者其敬乎祭義曰君子有終身之喪忌日之謂也臣若水通曰忌日親亡日也人子於此念親之終如喪親之日焉哀之至也祭義文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然其文王歟又曰仲尼嘗奉薦而進其親也慤其行也趨趨以數臣若水通曰堯舜之道孝弟而已矣文王孔子之孝其堯舜之道乎夫聖人人倫之至萬世帝王之則也伏惟我聖明以是為則日省于心而擴充之則文王孔子之孝在我而堯舜之道盡人倫之至可建極於天下矣祭義曰孝子將祭慮事不可以不豫比時具物不可以不備虛中以治之臣若水通曰夫祭有三備焉豫事者禮儀之習所以修禮也具物者器物之陳所以修養也中虛者齊莊靜一清明在躬所以修心交于神也三者備而后能享合外內之道也祭義曰宫室既修墻屋既設百物既備夫婦齊戒沐浴奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與薦其薦爼序其禮樂備其百官奉承而進之於是諭其志意以其慌惚以與神明交庶或饗之庶或饗之孝子之志也臣若水通曰當祭之時致享之道不可少有不慎焉宫室墻屋百物所以慎之於物也夫婦齊戒所以慎之於心也沐浴盛服所以慎之於體也洞洞屬屬所以慎之於誠也弗勝如失所以慎之於貌也百官承進所以慎之於嚴事也諭其志意所以慎之於祝告以孝也恍惚與交欲饗所以慎之於致養也夫是之謂備孝不如是不可以享夫禍莫大於不享矣是故孝子之心一以貫之故曰備孝之道也祭統是故天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊亦以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也臣若水通曰天子諸侯之耕王后夫人之蠶者何也以祭祀也凡己之身天地父母之身也故竭身以事之所以致誠信也粢盛之薦冕服之飾所以交于神明者而莫或親之則不能身致其誠信而逹敬於神明則夫唯物之具豈交神之道乎夫何後世雖有耕蠶之禮或視為故事草草應文而誠信莫存為之臣者諂媚以從而不知養其君誠敬之心天地神明其可罔乎噫至於犬馬皆能有養不敬何以饗乎此可以鑒戒矣祭統先期旬有一日宫宰宿夫人夫人亦散齊七日致齊三日君致齊於外夫人致齊於內然後會於太廟君純冕立於阼夫人副褘立於東房君執圭瓉瓉祼神器以圭為柄祼以瓉酌鬱鬯酒灌地降神也尸大宗或夫人有故大宗攝之執璋瓉亞祼以璋為瓉柄酌鬱鬯酒以降神及迎牲君執紖牽牲者卿大夫從士執芻藁也殺牲時用薦之宗婦同宗之婦執盎從夫人薦涗水明水也盎齊差清和以清酒泲之謂之涗酌涗即盎齊以盎齊加明水君執鸞刀羞嚌一朝踐之時取肝以膋貫之入室燎於爐灰出薦之一饋熟之時君執鸞刀割所羞嚌肺橫切之使不絶奠于爼上尸嚌之夫人薦豆此之謂夫婦親也臣若水通曰夫婦兼祭象隂陽之行乎變化也兼祭則兼致其齊兼齊則兼執其事是故親執則鸞刀羞嚌不敢以假者不敢以尊處也親薦則涗水則豆不敢以假者不敢以貴加也親莫大焉恩莫重焉君夫人雖尊且貴亦不過夫人之子之婦焉爾父子之道無所逃於天地之間而豈尊貴之所能敵哉嗚呼此義不明先王之孝不盡傳于天下也久矣語以子弟之職則若耻其卑賤而失其尊崇之勢者為是心者豈以父子之道之在天下也有二乎哉可以深思矣周禮天官中春詔后帥外內命婦始蠶于北郊以為祭服臣若水通曰中春蠶桑盛時也北郊隂方且潔地也以時蠶桑于此以為祭服必后帥命婦親為之者禮曰王后夫人非莫蠶也身致其誠信是也敬祖考之至矣春官以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王臣若水通曰曰肆曰獻曰祼者五年之禘曰饋食者三年之祫夫禘之以五年而又祫之以三年其義周矣而四時之享獨非仁人孝子之心歟故祠者祠也春物初生以祠為主故以祠而享乎先王禴者薄也夏物未成其意尚薄故以禴而享乎先王嘗者食也秋物漸成其味可食故以嘗而享乎先王蒸者衆也冬物畢藏可陳者衆故以蒸而享乎先王是故四時之享異而孝子之誠一也非天下之至仁其孰能與於此漢靈帝熹平元年春正月車駕上原陵司徒掾陳留蔡雍曰吾聞古不墓祭朝廷有上陵之禮始謂可損今見威儀察其本意乃知孝明皇帝至孝惻隱不易奪也禮有煩而不可省者此之謂也臣若水通曰古不墓祭未備禮也古者不封不樹何墓祭之有然而仁人孝子之心怵惕悽愴之情其能已乎故親之始死則慿戶而哭之斂則慿棺而哭之葬則就墓而求焉凡出於孝心之誠而已此墓祭之所由起乎靈帝昏弱之主也原陵之上其良心之不能已矣向使由此念而擴充之則仁孝不可勝用保其社稷以光于四海豈至亂與亡哉傳曰不能充之不足以保妻子晉武帝泰始二年晉文帝之喪臣民皆從權制三日除服既葬帝亦除之然猶素冠蔬食哀毁如居喪者後羣臣請易服復膳詔曰每念幽冥而不得終苴絰之禮以為沈痛况當食稻衣錦乎適足激切其心非所以相解也四年三月葬文明皇后有司又奏既虞除衰服詔曰受終身之愛而無數年之報情所不忍也有司固請不已乃許之然猶素冠蔬食以終三年如文帝之喪臣若水通曰三年之喪自天子逹於庶人要皆出於人心之所固有者也後世帝王不能逺追先王之禮而徒藉口於漢文之陋食稻衣錦於心安乎至於晉武獨以天性矯而行之謂非仁孝之發不可也而有司庸劣顧乃蹈常安故而不能將順其美悲乎梁武帝普通七年十一月丁貴嬪卒太子水漿不入口上使謂之曰毁不滅性况我在邪乃進粥數合太子體素肥壯腰帶十圍至是減削過半臣若水通曰孝也者人之良心真切者也昭明喪母水漿不入孝心篤矣使有伊周為之師傅舉先王養太子之道則商之太甲周之成王可為也惜乎一時之臣無以將順之而徒區區於文藝之末也雖然元服既加之後懿德彰聞卒之日朝野惋愕男女垂泣嗚呼使天永其年國祚其可量哉國朝洪武六年祖訓録成於是頒賜諸王且録于謹身殿東廡乾清宫東壁仍令諸王書于王宫正殿內以時觀省上因謂侍臣曰朕著祖訓録所以垂訓子孫朕更厯世故創業艱難常慮子孫不知所守故為此書日夜以思具悉周至紬繹六年始克成編後世子孫守之則永保天祿茍作聰明亂舊章是違祖訓矣侍臣對曰自古創業之主其慮事周詳立法垂訓必有典則若後世子孫不知而輕改鮮有不敗故經云不愆不忘率由舊章上曰日月之能久照萬世不改其明堯舜之道不息萬世不改其行三代因時損益者其小過不及爾若一代定法具存不可輕改故荒墜祖緒幾於亡夏顛覆典刑幾於亡商後世子孫當思敬守祖法臣若水通曰書云明明我祖萬邦之君有典有則貽厥子孫我皇祖祖訓之著即大禹之典則乎皇祖應天順人肇造鴻業大經大法可以萬世行之而無弊尤慮世逺紛更乃以心思之微著為一書以垂訓後昆誠一代之定法也嗣皇守之可以永安宗社藩王守之可以長保富貴然欲法祖在於修德也德修即能敬守祖法聿追來孝矣格物通卷十五
