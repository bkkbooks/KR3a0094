body:
  text: 格物通巻二十六明湛若水撰進徳業一易乾文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四徳者故曰乾元亨利貞臣若水通曰天人一也在天則為元亨利貞之四徳在人則為仁義禮智之四徳天即人人即天也故以言乎天徳之在人者一理之貫而元亨利貞分焉元者理之生生不息道義之所從出而為萬善之長者也亨者理之通達而粲然有等為事物之典要而衆羙之萃也利者理以裁制事物無所乖戾而至和也貞者終始乎理事事物物歸根復命而幹具矣然而元之於人也為仁以仁存心視萬物為一體而愛之博矣故曰長人亨之於人也為禮所履者禮而天序天秩行焉故曰合禮利之於人也為義義以制事物各付物而無不順故曰和義貞之於人也為智智以成物不失正理其事無不立故曰幹事君子行此四德全體天理脗合天道與天為一矣如是則天之剛健在我而元亨利貞之徳在我我即天矣故曰乾元亨利貞盖至此則徳與天合而聖人之能事畢矣文言子曰龍徳而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐徳博而化易曰見龍在田利見大人君徳也臣若水通曰乾體皆剛故為龍徳二在卦之正中故曰龍徳而正中有中正之龍徳故能信言愼行閑其邪而誠自存則天下之理得矣善孰大焉然不過盡吾性分而已何伐焉于時出潜離隱徳施普也民日遷善而不自知其化矣惟天下至聖為能化九二者在下之聖人也雖非君位而具人君之徳也宜其人之利見也歟有志於聖人之徳業者當以正中為志文言子曰君子進徳脩業忠信所以進徳也脩辭立其誠所以居業也知至至之可與㡬也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣臣若水通曰程頤云三居下之上君徳已著將何為哉唯進徳脩業而已臣謂徳業非二也本諸心而體用分焉徳何為而進也内主忠信而无不實心與道一而徳進矣業何為而脩也發吾心之誠而達於辭誠以辭立而業居矣徳業以言其學之至也知行其功矣察見天理之本體知至矣而求以至之知先於行其知㡬矣要終道體之大用知終矣而實踐以終之行隨知後其存義矣徳業一理也知行同功也知行並進而徳業脩徳業脩則居上下之際而驕吝之心亡三處上下之際可危懼者也然而無咎矣此聖人之學也乾道也君子體乾者可不務乎文言君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君德也臣若水通曰君徳之成在學而已學之道知行而已學者覺也覺然後知疑而問學聚問辨以擴吾心之良知知之事也其道至大不可不寛宏其心以體之不可不純粹其心以行之寛居仁行以存吾心之天理行之事也知行並進如目視而足履學之道盡於此矣君徳成而人斯利見之豈能已哉坤文言直其正也方其義也君子敬以直内義以方外敬義立而徳不孤直方大不習无不利則不疑其所行也臣若水通曰坤體六二柔順中正有直方大之徳故解其義如此夫人心一理也以言乎本體之正則直矣以言乎制用之宜則方矣皆性之徳也敬義者合内外之道也君子學以復其性者也學之道敬義而已矣勿忘勿助敬存而心直立其體也隨事順理義形而事方制其用也敬義非二也在心為敬在事為義敬義並行心事合一上達天徳而徳盛不孤全體不虧大孰過焉由直方以至大舉而措之則用周而施利也夫何疑哉抑嘗因程顥之言而推之誠明並進聖人之學也乾道也敬義並立賢人之學也坤道也由賢以至聖則坤進於乾道矣其學之極功乎文言君子黄中通理正位居體美在其中而暢於四支發於事業美之至也臣若水通曰黄中色也坤之六五中正故為黄中正位之象黄中通理者中徳之在内通該乎萬理也正位居體者坤為臣道雖居正位而處臣體也然雖居臣體而中正故德美中積性立而道行焉本諸在中之美而和生焉暢於四支則動容周旋中禮矣發於事業則脩道教致中和成治化而天地萬物位育矣皆中徳之貫通也美之著也其盛徳大業至矣哉蒙象曰山下出泉蒙君子以果行育徳臣若水通曰蒙艮上坎下故為山下出泉之象泉之初出山下如物之初生蒙穉故為蒙君子觀蒙之象以果行育徳徳者心之天理行者心之存發君子於蒙之初初心未遠天理著見天徳未鑿何以育之果於行而已果者陽剛之决也君子於心之所存所發而行之果决則可涵養其徳性擴充其良知良能之徳而進於聖矣不然終其身而困於蒙也吝孰甚焉升象曰地中生木升君子以順徳積小以高大臣若水通曰程頤云木生地中長而上升為升之象君子觀升之象順脩其徳積累微小以至高大也臣謂徳者性之本體廣大而高明也脩徳者之復其初也非可以超造也隨時隨處敬以存夫天理之本體積其小而高明廣大焉復其初之本體而已矣徳日積而不自知美大聖神豈不可以馴至矣乎繋辭易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之徳可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣臣若水通曰乾易坤簡者造化之理人得造化之理以生所謂天理也天理自然無所矯强故謂之易天理流行不事安排故謂之簡易則明白可見故易知易知則日見切近故有親而可久矣非賢人之徳乎簡則行所無事故易於從事易從則日見積累故有功而可大矣非賢人之業乎由守而化則聖矣其至易至簡乎至易以該乎天下之至博也至簡以該乎天下之至煩也易簡之徳天地人一之者也其參天地而為三宜矣富有之謂大業日新之謂盛徳盛徳大業至矣哉繫辭子曰易其至矣乎夫易聖人所以崇徳而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門臣若水通曰易者非他也理也聖人歎易理之至其感深矣所以致徳業之盛者此也所以行天地之中者此也徳業者一理而體用分焉者也故聖人之崇徳廣業皆理也察見天理而極其精則知崇矣其效天之高明乎體行天理而極其篤則禮卑矣其法地之博厚乎天地一氣也知禮一致也天常包乎地知常包乎禮而皆不外乎易理也易理何所寓乎天地立乾坤設而易理寓乎其中矣故曰乾坤毁則無以見易此之謂也聖人知知禮行則天命本然之性存之又存大本立而達道行本立而道生則天地之易在我矣其猶門乎夫始則體易以成性終則易自我出聖人用易之功化至矣哉繫辭精義入神以致用也利用安身以崇徳也過此以徃未之或知也窮神知化徳之盛也臣若水通曰神化者張載云推行有漸為化合一不測為神徳業一理也進脩一事也非二也故本體虚明精察其義之微妙而入於神者徳也徳者業之本也故曰以致用徳外無業也隨事適宜處之安而無不利者業也業者徳之蓄也故曰崇徳業外無徳也交養互發賢人之學可以致力焉者此也等而上之則無所用力而㡬非在我聖人之事也故以言其心之本體則合一不測神也以言其心之妙用則推行有漸化也神化也者聖而不可知也天道也其徳之至極而無以加者乎聖學之能事畢矣書虞書堯典曰若稽古帝堯曰放勲欽明文思安安允恭克讓光被四表格于上下克明俊徳以親九族九族既睦平章百姓百姓昭明協和萬邦黎民於變時雍臣若水通曰此史臣記堯徳業之盛曰若者發語詞言稽考堯功之大故曰放勲然功之大由其徳之盛故以徳性言之欽敬而明通文理而思深安安而自然也其全體如此是以其發於行實則信以恭持已由中而出故曰允又能讓以與人力足以優為之故曰克其大用又如此有此盛徳之光華及於四方之外格至於天地之逺然四表上下不過天下國家爾故又言堯能明此欽明文思允恭克讓之大徳故以之齊家則親九族而九族既睦以之治國而平均章明乎百姓則百姓昭明以之平天下協和萬邦而黎首之民皆於是而雍和其所謂被四表格上下者如此先曰克明俊徳見自身而家而國而天下不過體用一原爾夫堯之放勲必始於欽之一字大學誠意正心脩身齊家治國平天下必始於格物明徳親民必在止於至善此可見古人之功業皆本諸身心後世不先立其本徒以已之未嘗為者而强施之於天下此道學政術之分為二事而唐虞三代之治所以不可復也夫徳性之得於天者堯與桀一也堯能全其本體故功徳及於天下桀失其本體故惡毒病於四方存之失之皆起於自已一念之微爾伏惟聖明以堯舜為法而擴充之俾功徳逺及天下幸甚舜典曰若稽古帝舜曰重華協于帝濬哲文明温恭允塞𤣥徳升聞乃命以位臣若水通曰此史臣紀帝舜之徳也華光華也協合也帝謂堯也濬深也哲智也温和粹也塞實也𤣥幽逺也升上也言堯既有光華而舜又有光華可合於堯以言其徳性則深沉而有智文理而光明如堯之欽明文思也以言其行實則和粹而恭敬誠信而篤實如堯之允恭克讓也有此四者幽潜之徳上聞於堯堯乃命之以職位也濬哲則非淺露之智文明則非察察之明温恭則非嚴厲允塞則非偽為矣皆以形容舜徳之自然也堯因四岳之薦命之以位自司徒百揆四岳以至禪受至於功業之大無非由此𤣥徳中來於性分何嘗添得一分後之人君做盡暴惡亦何曾减得一分其初與堯舜性分一也孟軻曰憂之如何如舜而已矣為人君者可不復其所以如舜者乎大禹謨益曰都帝徳廣運乃聖乃神乃武乃文皇天眷命奄有四海為天下君臣若水通曰此益賛堯徳業之盛也帝謂堯也眷顧也奄盡也蔡沈曰廣者大而無外運者行之不息大而能運則變化不測故自其大而化之而言則謂之聖自其聖而不可知而言則謂之神自其威之可畏而言則謂之武自其英華發外而言則謂之文臣謂其實一徳之廣運也易繋辭曰富有之謂大業日新之謂盛徳盛徳大業至矣哉帝徳之廣其富有之謂乎帝徳之運其日新之謂乎故孔子曰巍巍乎唯天為大唯堯則之徳同乎天故能克厭天心天乃眷命之自唐侯特起為帝夫豈無所自耶由是言之天命之去留係乎君徳之盛衰為人君者可不脩徳以永天命乎伏惟聖明留神焉臯陶謨曰若稽古臯陶曰允廸厥徳謨明弼諧禹曰俞如何臯陶曰都愼厥身脩思永惇叙九族庶明勵翼邇可逺在兹禹拜昌言曰俞臣若水通曰此臯陶與禹陳謨於帝舜之前者也允信也迪蹈也謨謀也臯陶言為君而信蹈其徳則臣之所謀者而君無不明臣之所弼者而君無不諧以其君徳之明足以知之虚足以受之也俞如何者禹然其言而復問其詳也都者臯陶美其問也庶明謂羣哲也翼輔也言愼於身脩則言行致謹愼於思永則深長其謀身刑于家則厚叙九族親親恩篤而家齊矣身刑于國則羣哲勉輔而國治矣近者身逺者天下近而可推天下之逺者在此脩身一道也盖身脩家齊國治而天下平矣臯陶此言所以推廣允迪謨明之義故禹復俞而然之也夫謨明弼諧由於迪徳敦叙勵翼可逺由於脩身為人君者可不脩身迪徳以為家國天下之本乎商書仲虺之誥惟王不邇聲色不殖貨利徳懋懋官功懋懋賞用人惟已改過不吝克寛克仁彰信兆民臣若水通曰此仲虺釋湯之慙徳也邇近殖聚也懋茂也克能也仲虺稱成湯不近聲色不聚貨利盖聲色貨利所以壊此心之徳者不邇不殖則本源澄澈純乎徳者如此然後用人處已而莫不各得其當人之懋於徳者則懋之以官人之懋於功者則懋之以賞用人惟己謂好人之善若己有之改過不吝謂惡已之惡不加乎身故於臨民之際是以能寛而不失於縱能仁而不失於柔君徳昭著而孚信於天下之民矣後之人君欲用人處己以彰信於天下者必自不邇聲色不殖貨利始仲虺之誥徳日新萬邦惟懐志自滿九族乃離王懋昭大徳建中於民以義制事以禮制心垂裕後昆予聞曰能自得師者王謂人莫已若者亡好問則裕自用則小臣若水通曰此亦仲虺勸勉成湯之言也懋勉也昭明也仲虺言日新其徳而不已則萬邦之逺且懐矣志自滿足不求日新則九族之親且離心矣王其勉明大徳立中道於天下在心為徳在事為道體用之謂也欲立中道必明大徳此徳此中天下人人之所同有也君行之則民法之而中道立矣禮義者所以昭徳建中者也義者宜也禮者理也在心為理處事為義亦體用之謂也有義以制事則事得其宜有禮以制心則心得其正内外合徳而中道立焉如此則近以建中於民而逺以垂諸後世亦綽乎有餘裕矣盖上下逺近同此心同此理也然是道也必學焉而後至故又舉古人之言以為隆師好問則徳尊而業廣自賢自用者反是自得師者虚心受益之謂也仲虺言懐諸侯之道推而至於脩徳檢身又推而至於能自得師夫自天子至於庶人未有舍師而能成者真可為帝王之法也歟太甲伊尹曰先王昩爽丕顯坐以待旦臣若水通曰此伊尹告太甲之言也先王成湯也昩晦爽明欲明未明之時也丕大也顯亦明也伊尹言先王於昩爽之時洗濯澡雪大明其徳坐以待旦不遑寜處盖此心此理本自廣大高明氣習累之故有昏昩於昩爽未與物接之時乗此夜氣清明更加澄定大明其徳坐以待旦其乾乾不息之誠如此也此成湯日新之學伊尹為太甲言之仰惟聖明天授聰明成湯之聖在所優為者宜法成湯丕顯日新之學以致成湯正大光明之治幸甚伊尹曰脩厥身允徳恊于下惟明后臣若水通曰此伊尹致敬以復太甲也脩身者身之不善如敗度敗禮之事皆治去之不善之事去則徳允矣允信也允徳者誠身誠意之謂徳成于上恊和于下惟明后然也上下一理君民一心欲為明君者必恊天下之民恊下在於允徳允徳在於脩身脩身者去其不善之動而已矣伏惟聖明留意焉伊尹曰奉先思孝接下思恭視逺惟明聽徳惟聰臣若水通曰此伊尹告太甲以懋徳之所從事者也先謂祖考奉者自祭祀以至於守成憲皆是思者存念不忘之意惟亦思也思孝者興其愛敬之心則不敢違其祖矣思恭者致其禮遇之誠則不敢忽其臣矣思明者無所不見則所視者逺而不蔽於淺近矣思聰者無所不聞則所聽者徳而不惑於憸邪矣此四者皆懋德之事而思之一字尤為要約故伊尹以告太甲欲其致力於思以脩四者之徳也盖思者萬善之原聖學之要故洪範五事其要在思曰睿睿作聖中庸言至聖之徳足以有容有執有敬有别而冠之以聰明睿智盖聰明睿智者思之神也故足以達天徳仰惟聖明擴聰明睿智之神務達天徳以行王道天下幸甚咸有一徳今嗣王新服厥命惟新厥徳終始惟一時乃日新臣若水通曰此亦伊尹告太甲進脩之言也新者去其舊之謂也心徳本自光明惟氣昏欲蔽則失其本體故伊尹言太甲新服天子之命亦當新其徳然新徳之要在於有常而已終始有常而無間斷是乃所以日新也夫徳之在人猶天行至健纔間斷便非一徳故易曰君子以自强不息堯舜兢兢業業文王望道未見湯之日新又新率是心爾後之人君欲致二帝三王之治者可不以新徳為首務乎咸有一徳徳無常師主善為師善無常主恊于克一臣若水通曰此伊尹論取善自得之要徳以心之所得者言其總統者也善以事之所發者言其實行者也師人之心徳不若師人之善行為深切著明可警發吾之心也師人之善不若得之於已合于吾心至一之理為萬善之本原也博而求於人約而會於已此聖學始終條理之貫後之人君欲求聖學者可不務乎說命惟學遜志務時敏厥脩乃來允懐于兹道積于厥躬臣若水通曰此傅說告髙宗以聖學之言也遜謙虚也務專力也時敏者無時而不勉也允信也懐念也兹此也指所脩之理而言傅說言為學之道在遜其志而謙虚以受善既知其善又當時時而勉之所謂學而時習之也如是則習熟而恱其所脩之理如泉始達源源乎其來矣由是又加以篤信而念念不忘乎此理無少間斷則大本以立達道斯行道積於身不可勝用矣臣觀古之傳道自精一執中之後學之一字惟傅說始發之此一節又聖學始終之序至為精宻伏惟聖明留神而深體之幸甚周書泰誓曰我聞吉人為善惟日不足臣若水通曰此武王誓師之言也吉人者善人也惟日不足者言終日為之猶若不足也善者吾心之天理也此天理與生俱生頃刻不存則失其所以為人之道矣故終日乾乾猶若不足者為此故也文侯之命丕顯文武克愼明徳昭升于上敷聞在下臣若水通曰此平王命文侯為方伯之言也曰顯曰明曰昭曰聞皆指此心之徳徳即天理也此心本體原自髙明所謂明徳也惟能敬愼則不為物欲所污壊復其本然之明由是發之事業則為丕顯由是功闕皇天則為昭升由是光被四表則為敷聞皆自此心之本體發用非有他也在為人君者反而求之爾豈逺乎哉格物通卷二十六
