body:
  text: 格物通目録儒家類卷一誠意格審幾上卷二審幾下卷三立志上卷四立志下卷五謀慮上卷六謀慮下卷七感應上卷八感應下卷九儆戒一卷十儆戒二卷十一儆戒三卷十二儆戒四卷十三敬天上卷十四敬天下卷十五敬祖考卷十六畏民上卷十七畏民下卷十八正心格正心上卷十九正心中卷二十正心下卷二十一脩身格正威儀上卷二十二正威儀下卷二十三慎言動上卷二十四慎言動中卷二十五慎言動下卷二十六進徳業一卷二十七進徳業二卷二十八進徳業三卷二十九進徳業四卷三十齊家格謹妃匹上卷三十一謹妃匹下卷三十二正嫡庶上卷三十三正嫡庶下卷三十四事親長上卷三十五事親長下卷三十六養太子上卷三十七養太子下卷三十八嚴内外上卷三十九嚴内外下卷四十恤孤幼卷四十一御臣妾上卷四十二御臣妾下卷四十三治國格事君使臣上卷四十四事君使臣中卷四十五事君使臣下卷四十六立教興化上卷四十七立教興化中卷四十八立教興化下卷四十九事長慈幼卷五十使衆臨民卷五十一正朝廷上卷五十二正朝廷下卷五十三正百官上卷五十四正百官下卷五十五正萬民上卷五十六正萬民下卷五十七平天下格公好惡卷五十八學校一卷五十九學校二卷六十學校三卷六十一學校四卷六十二學校五卷六十三舉措一卷六十四舉措二卷六十五舉措三卷六十六舉措四卷六十七課功上卷六十八課功下卷六十九任相上卷七十任相中卷七十一任相下卷七十二任將上卷七十三任將中卷七十四任將下卷七十五六官卷七十六脩虞衡上卷七十七脩虞衡下卷七十八抑浮末上卷七十九抑浮末中卷八十抑浮末下卷八十一飭百工卷八十二屯田上卷八十三屯田下卷八十四馬政卷八十五漕運卷八十六勸課卷八十七禁奪時卷八十八省國費一卷八十九省國費二卷九十省國費三卷九十一省國費四卷九十二慎賞賜上卷九十三慎賞賜下卷九十四蠲租卷九十五薄斂上卷九十六薄斂下卷九十七恤窮上卷九十八恤窮下卷九十九賑濟上卷一百賑濟下臣等謹案格物通一百卷明湛若水撰若水有春秋正傳已别著録是編乃嘉靖七年若水任南京禮部侍郎時所進體例略仿大學衍義以致知併於格物而以格物統貫誠意正心脩身齊家治國平天下六條凡誠意格十十卷分審㡬立志謀慮感應儆戒敬天敬祖考畏民八子目正心格三卷無子目脩身格九卷分正威儀慎言語進徳業三子目齊家格十三卷分謹妃匹正嫡庶事親長養太子嚴内外恤孤幼御臣妾七子目治國格十四卷分事君使臣立教興化事長慈幼使衆臨民正朝廷正百官正萬民七子目平天下格四十四卷分公好惡用人理財三子目而用人之中又分學校舉錯課功任相任將六官六目理財之中又分脩虞衡抑浮末飭百工屯田馬政漕運勸課禁奪時省國費慎賞賜蠲租薄歛恤窮賑濟十四目皆襍引諸儒之言參以明之祖訓而各以己意發明之大致與邱濬大學衍義補相近而濬書多徵舊事以為法戒之資此書多引前言以為講習之助二書相輔而行均於治道有禆者也乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書格物通卷首明湛若水撰表南京吏部右侍郎臣湛若水誠惶誠恐稽首頓首昧死上言臣伏覩嘉靖四年七月初四日邸報該司禮監官捧御筆㫖意一道命文臣將歴代鑑書中撮其有關於帝王徳政之要者撰直解講并周易詩經中庸序次聫冩日逐進覽又欲將尚書作為文詞或詩或賦以成一代美事用備開冩臣誠懽誠忭不揣疎愚謹采五經諸子史及我聖祖聖宗格言大訓疏解成帙名曰聖學格物通謹進上聞者伏以龍興而雲從聖作而物覩故上有采菲之誠則下懐獻芹之悃上有光天之徳則下共臣帝之願乃感召之一心亦不應而徯志在物理則固有然者是以㒺避夫位逺言親之嫌必致其廸徳沃心之懇况乎位有崇卑而臣子之心則一乃臣舊忝講官而忠愛之念不忘者哉臣聞帝王之治本乎道而道徳之懿存乎心心無事而不包事無一而非道惟心有所蔽則道不見如鑑有所塵則明弗昭故聖帝明王必先務學而修徳講學皆以治心將達諸事業而成其治化焉如磨彼寳鑑以大其光照也蓋心事合一體用同原雖殊塗而同歸實一致而百慮有天徳則有王道具内聖則具外王故溥博淵泉而時出流水盈科而後進滄溟之廣不外勺水而求華嶽之崇必自卷石而累是知萬變萬化只在一徳一心故堯舜禹三聖授受惟曰精一執中成湯文武千古相傳亦云懋徳敬止孔顔明博文約禮之教孟軻示詳說反約之功夫羣籍所載皆務此本而曽子之傳尤得其宗故大學之書全功在乎格物而格物之要其道本乎知行知止定静安慮相承即其功夫意心身家國天下貫穿乃其實地必綱舉而目斯張惟領挈而裔乃理雖心有良知不假外求然學于古訓乃可有獲六經諸史皆所以明心而千聖萬賢必歸乎窮理總是同條同貫那堪二本三本言念臣乃嶺海鮿儒舊忝翰林末品以三十餘年而力學至六十之外而無聞竊嘗有得於大學之正經自謂不詭於聖賢之中路下契乎程張至其理乃格物之言上稽諸聖祖論大學在脩身之訓乃於職務之暇輒加蒐羅之功粤自帝王之經有倫有要爰逮祖宗之訓有典有則輯事以從其類取義以暢其情因事以明其理㑹理而感諸心故一聞一見若决江河而前言往行可以畜徳雖或掛一而漏夫萬可因以觸類而盡其餘所以開發聰明擴充良知庶幾為祖述憲章之一助也茲蓋伏遇皇帝陛下聰明天授孝敬神通篤志聖賢之學既日新而又新期致天下之治必㑹極而歸極奮振委靡之餘大𢎞中興之業仰攬乾綱俯補坤維掀掲天地彌綸宇宙並明日月奔走鬼神誠振古大有為之君實歴代僅間見之材也經筵日講不間夫寒暑隨處用力豈貳於宫庭故敬一有箴洪範有序仰仭神衷深造聖域猶不以能而自滿抑且以虚而受人即與堯之清問下民舜之好問好察何以異哉此臣所以不辭夫四載編摩之勞必盡其一心夙夜之瘁竭精畢神刳心戮力而欲效愚於聖徳庶有禆于涓埃也干犯天威伏祈電覽倘於萬幾之暇不遺一得之愚逺宗聖哲之謨近法祖徳之懿㑹萬理於一心由成徳而致治式恢蕩蕩之徳用𢎞丕丕之基如天之覆如地之載勵無前之休烈如川之至如日之升永多所之厯年臣無任激切屏營之至謹以所纂撰聖學格物通一百卷并序纂要目録共為二十八冊黄綾套袱封襲謹隨表上進以聞嘉靖七年六月初一日南京吏部右侍郎臣湛若水謹上表序臣若水序曰夫聖學格物通何為者也明聖學也明聖學何以謂之格物通也宋儒程頥曰格者至也物者理也至其理乃格物也致知在所養養知莫過於寡欲夫以涵養寡欲言格物則格物有知行之實非但聞見之粗矣然則何以至其理也知止知也定静安慮行也知而弗去格物之功盡於此矣夫通有四倫焉有總括之義焉有疏解之義焉有貫穿之義焉有感悟之義焉夫聖人之道莫備於大學大學曰欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平夫自天下逆推本於格物是格物乃其本始用功之要也又自物格順循其效於天下是格物乃其本始致效之原也經曰物有本末事有終始物格者其本始之謂乎宋臣彭龜年曰大學之書其節雖繁而道甚要格致而已張栻答曰自誠正以至治平固無非格致事也伏覩我太祖髙皇帝諭侍臣曰大學一書其要在脩身而大學古本以脩身釋格至曰此謂知本此謂知之至也經文兩推天下國家身心意皆歸其要於格物則聖祖盖深契夫古本大學之要矣乎由是言之聖人之學通在於格物矣故曰有總括之義焉凡意之事則誠意之類舉之矣凡心之事則正心之類舉之矣凡身之事則脩身之類舉之矣凡家之事則齊家之類舉之矣凡國之事則治國之類舉之矣凡天下之事則平天下之類舉之矣輯事以從其類取義以暢其情故曰有疏解之義焉列誠意所以示人於意焉格之也列正心所以示人於心焉格之也列脩身所以示人於身焉格之也列齊家所以示人於家焉格之也列治國所以示人於國焉格之也列平天下所以示人於天下焉格之也意心身之於家國天下之事非二也一以貫之也故大學於誠意曰好惡曰慎獨於正心曰忿懥曰憂患曰恐懼曰好樂於脩齊曰辟曰好惡於齊治曰孝弟慈曰心誠求曰恕於治平曰絜矩曰辟曰好惡曰忠信曰仁義皆以其心言之也而通之於各條因事以明其理因理而㑹諸心通一無貳故曰有貫穿之義焉是故君子之學讀誠意之事則感其意之理讀正心之事則感其心之理讀脩身之事則感其身之理讀齊家之事則感其家之理讀治國之事則感其國之理讀平天下之事則感其天下之理理也者吾之良知也學之者所以覺其良知也知也存之又存存存而不息由一念以達諸萬事皆行也故曰有感悟之義焉是故讀斯通者意心身家國天下之理皆備於我矣故君得之以成其仁臣得之以成其敬學士得之以成其徳家國天下之民得之以㑹極而歸極是故聖人之學無餘藴矣或曰諸通無格致者何也臣曰誠意正心脩身齊家治國平天下之事無非格致之地也夫又何贅焉或又曰夫格致而不及天地萬物者何也臣曰意心身家國天下一貫聖門切問近思之學也然而天地萬物同體無外矣雖位育配天可也何别髙逺之求或疑曰真徳秀之衍義丘濬之補具矣而乃又有格物通者何居臣應之曰孔門一本無二之指臣幸得之於正經證之於諸儒仰稽於我皇祖之訓者上下十餘年而思欲效其愚見者久矣乃今伏聞聖明四年七月初四日詔令文臣撮經書史鑑有關帝王徳政之要者直解進覽臣實欣慶聖學日升務求典要竊念臣亦舊忝詞臣講官也心在皇室忠切勸學故不揣疏愚逺自伏羲二帝三王與夫諸儒之格言近至我祖宗列聖之謨烈章采而節釋之不詭於衍義與補而容或少有發明而一助焉庶或上禆聖明進徳脩業合一之要領且明經文直以格物為諸條之綂㑹樞紐也有隨事體認之實合孔門求仁一貫之指夫聖人之學體用一原本末逺近兼致知行並進者也此臣格物通之所以作也嘉靖七年六月初一日南京吏部右侍郎臣湛若水謹序纂要録臣若水既謹纂撰聖學格物通一百卷矣又撮此書之中篇目小序及所采經訓以為纂要録焉何也夫學莫貴於知約知約然後可以盡博也是故挈裘者先挈其領則其裔可理舉網者先舉其綱則其目可張夫物則亦有然者矣而况聖人之學乎是故臣今纂要之録亦一書之綱領也仰惟聖明萬幾之暇倘蒙畱神先覽于此録則頃刻之間可了一書之大指然後隨日逐條以盡書中所載之經訓子史及祖宗聖制而隨處體認開發涵養以自得焉則易所謂知至至之知終終之心事一貫進脩兼致盛徳大業日臻於髙明而堯舜禹湯文武之治可比隆矣誠意格臣若水序曰何以不著致知格曰經曰致知在格物則格物即致知也誠意何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也於意焉而至之也至其意之理也是故審幾也立志也謀慮也感應也儆戒也敬天也敬祖考也畏民也皆意之事也人主讀是編焉感通吾意之理念念而知於斯存存而行於斯以有諸己則格物之功庶乎於誠意焉而盡之矣凡八目審幾凡三十九條立志凡四十條謀慮凡四十七條感應凡五十四條儆戒凡一百二條敬天凡五十一條敬祖考凡二十九條畏民凡三十六條右篇内采易書詩春秋禮記周禮孝經論語中庸孟子左傳國語史鑑新書說苑白虎通周敦頥程顥程頤張載楊時韓愈胡安國真徳秀張栻朱熹司馬光尹焞胡宏諸儒録集及國朝皇祖皇宗聖諭正心格臣若水序曰正心何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也於心焉而至之也至其心之理也人主讀是編焉而感通吾心之理念念而知於斯存存而行於斯以有諸己則格物之功庶乎於正心焉而盡之矣正心上凡二十五條正心中凡二十八條正心下凡三十一條右篇内采易書詩春秋禮記論語孟子左傳國語史鑑新書周敦頥程顥程頥張載邵雍朱熹陸九淵吕大臨胡宏楊時張栻陳植魏了翁諸儒録集及國朝皇祖皇宗聖諭脩身格臣若水序曰脩身何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也故大學舊本以脩身申格物曰此謂知本此謂知之至也於身焉而至之也至其身之理也是故威儀也言動也徳業也皆身之事也人主讀是編焉感通吾身之理念念而知於斯存存而行於斯以有諸己則格物之功庶乎於脩身焉而盡之矣凡三目正威儀凡四十七條慎言動凡五十九條進徳業凡九十二條右篇内采易書詩春秋禮記周禮孝經論語中庸孟子左傳國語史鑑新書說苑周敦頤程顥程頥張載邵雍楊時張栻朱熹韓愈陸贄吳澄許衡諸儒録集及國朝皇祖皇宗聖諭齊家格臣若水序曰齊家何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也於齊家焉而至之也至其家之理也故大學齊家章以辟以好惡言之乃吾心應之之理也是故妃匹也嫡庶也親長也太子也内外也孤幼也臣妾也皆家之事理也人主讀是編焉感通吾心處家之理念念而知於斯存存而行於斯以有諸己則格物之功庶乎於齊家焉而盡之矣凡七目謹妃匹凡四十四條正嫡庶凡三十九條事親長凡五十三條養太子凡二十九條嚴内外凡四十六條恤孤幼凡十六條御臣妾凡四十三條右篇内采易書詩春秋禮記周禮孝經論語孟子左傳國語史鑑白虎通韓愈程顥程頤張載楊時劉安世朱熹吕希哲陳植許衡諸儒録集及國朝皇祖皇宗聖諭治國格臣若水序曰治國何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也於國焉而至之也至其在國之理也故大學治國章以孝弟慈以心以仁讓以恕言之吾心感應乎國之理也是故事君使臣也立教興化也事長慈幼也使衆臨民也正朝廷也正百官也正萬民也皆國之事理也人主讀是編焉感通吾心治國之理念念而知於斯存存而行於斯以有諸己則格物之功庶乎於治國焉而盡之矣凡七目事君使臣凡七十條立教興化凡五十八條事長慈幼凡十九條使衆臨民凡二十八條正朝廷凡四十九條正百官凡五十三條正萬民凡五十二條右篇内采易書詩春秋禮記周禮論語孝經孟子左傳國語史鑑新書說苑白虎通陸贄周敦頤程顥程頥邵雍張載蔡沈范祖禹胡宏楊時張浚張栻朱熹栁宗元顔之推劉蕡張九成諸儒録集及國朝皇祖皇宗聖制聖諭平天下格臣若水序曰平天下何以言格物也程頤曰格者至也物者理也至其理乃格物也至也者知行並進之功也於平天下焉而至之也至其應天下之理也故大學平天下章以絜矩以好惡以忠信以仁義言之無非吾心應天下之理也是故公好惡焉其要矣其用人焉則學校也舉措也課功也任相也任將也六官也其理財焉則脩虞衡貢賦也抑浮末也飭百工也屯田水利也馬政也漕運也勸課也禁奪時也省國費也慎賞賜也蠲租也薄斂也恤窮也賑濟也皆天下之事理也人主讀是編焉感通吾心平天下之理念念而知於斯存存而行於斯以有諸己則格物之功庶乎於平天下焉而盡之矣凡三綱二十目公好惡凡二十一條用人學校禮樂政教附凡一百五條舉措凡九十八條課功凡四十七條任相凡七十一條任將凡六十一條六官凡三十五條理財脩虞衡貢賦附四條凡四十抑浮末禁淫巧奢侈附凡四十九條飭百工凡一十五條屯田授閒田水利附凡四十五條馬政凡二十四條漕運凡一十六條勸課凡二十五條禁奪時凡二十七條省國費冗官冗食冗兵冗役之類凡一百五條慎賞賜凡三十八條蠲租凡二十九條薄斂凡五十六條恤窮凡三十四條賑濟凡三十九條右篇内采易書詩春秋禮記周禮論語中庸孟子國語左傳新書說苑白虎通史鑑陸贄韓愈栁宗元周敦頤程顥程頤張載胡瑗胡宏邵雍羅從彦楊時張栻胡安國范祖禹陸九淵真徳秀陳植王栢許衡諸儒録集及國朝皇祖皇宗聖諭聖制
