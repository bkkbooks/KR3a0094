body:
  text: 格物通卷七十七明湛若水撰修虞衡下貢賦附漢順帝永建元年帝即位以遺詔罷郡國鹽鐵之禁縱民煮鑄臣若水通曰鹽鐵者天地自然之利先王之世與民同之後世之君鑄山煮海欲以富強於天下至安帝收鹽鐵固非先王公天下之利矣順帝即位以遺詔弛其禁而縱民以煮鑄懲創前弊其庶幾先王之意晉武帝咸寧四年司冀兖豫荆揚州大水螟傷稼度支尚書杜預上疏以為今者水災東南尤劇宜敕兖豫諸州留漢氏舊陂繕以蓄水餘皆決令飢者盡得魚菜螺蚌之饒此目下日給之益也水去之後填淤之田畝收數鍾此又明年之益也典收種牛有四萬五千餘頭可分以給民使及春耕種榖登之後責其租稅此又數年以後之益也帝從之民賴其利臣若水通曰大水天地之災也魚菜螺蚌填淤之田天地之利也或決陂或留陂而反災為利杜預權時之宜經畫出自意外真得度支之體矣周詩曰靡人不周無不能止恤患之仁固如是也梁武帝天監五年四月魏御史中尉甄琛表稱周禮山林川澤有虞衡之官為之厲禁蓋取之以時不使戕賊而已故雖置有司實為民守之也夫一家之長必惠養子孫天下之君必惠養兆民未有為人父母而吝其醯醢富有羣生而榷其一物者也今縣官鄣護河東鹽池而收其利是専養口腹而不及四體也乞弛鹽禁與民共之臣若水通曰甄琛口腹四體之喻可謂切至矣君之於民如口腹四體民胞物與之仁也徒知榷民之利以奉上而不知均利以養民則民日貧而君亦不能獨富矣不亦猶口腹四體與俱喪乎故周禮山林川澤皆有厲禁撙節培養以待用無非為民也後世反以之自為而榷其利亦獨何哉唐肅宗至德元載三月第五琦為山南等五道度支使琦作𣙜鹽法用以饒臣若水通曰琦初變鹽法就山海井竈近利之地為鹽院業鹽者免其雜徭私市者論以法使人不益稅而上用以饒當肅宗初年間關戰伐而琦也為之經營國費亦可謂能臣矣惜乎不講於先王虞衡與民同利之政爾代宗大歷十二年秋八月霖雨河中府池鹽多敗判度支韓滉恐鹽户減稅奏雨雖多不害鹽仍有瑞鹽生帝疑其不然遣蔣震往視之臣若水通曰鹽之為物天地自然之利所以養人也古之虞衡之官為之厲禁其實為民守之也韓滉之判度支秋霖敗鹽宜以實奏乃復為瑞鹽以進諛則是罔上賊民也以是為富國之計可乎德宗建中元年五月轉運使劉晏専用𣙜鹽法充軍國之用時自許汝鄭鄧之西皆食河東池鹽汴滑唐蔡之東皆食海鹽其江嶺間去鹽鄉逺者轉官鹽於彼貯之或商絶鹽貴則減價鬻之謂之常平鹽由是國用充足而民不困弊臣若水通曰山林川澤之利鹽其一也禁之是上下爭利也不禁則民相爭利也求其下不至於互爭其利上不爭民之利夫然後不失先王之意也唐至中葉起兵天下軍餉祿俸皆仰給於鹽夫以天下之大其賦之多而専利於鹽則當時之民貧可知矣劉晏雖善理財獨非病民者乎柳宗元零陵郡復乳穴記曰石鐘乳餌之最良者也楚越之山多産焉于連于韶者獨名於世連之人告盡焉者五載矣以貢則買諸他部今刺史崔公至踰月穴人來以乳復告邦人恱是祥也雜然謡曰氓之熙熙崔公之來公化所徹土石蒙烈以為不信起視乳穴穴人笑之曰是惡知所謂祥邪向吾以刺史之貪戾嗜利徒吾役而不吾貨也吾是以病而紿焉今吾刺史令明而志潔先賴而後力欺誣屛息信順休治吾是以誠告焉且夫乳穴必在深山窮林氷雪之所儲豺虎之所廬由而入者觸昏霧扞龍蛇束火以知其物縻繩以志其返其勤若是出又不得吾直吾用是安得不以盡告今令仁而乃誠吾告故也何祥之為士聞之曰謡者之祥也乃其所謂怪者也笑者之非祥也乃其所謂真祥者也君子之祥也以政不以怪誠乎物而信乎道人樂用命熙熙然以效其有斯其為政也而獨非祥也歟臣若水通曰上下相與之際公而已矣上以公利之心感其下下以公利之心應其上矣栁宗元鍾乳廢復之説得非在人情間哉上苟以公不失民之利則利之歸於上必多故曰未有上好仁而下不好義者也又曰未有義而後其君者也故後之人君欲得天下之利必先公天下之利則其為利也慱矣宋儒程皓劄子云聖人奉天理物之道在乎六府六府之任治於五官山虞澤衡各有常禁故萬物阜豐而財用不乏今五官不修六府不治用之無節取之不時豈惟物失其性材木所資天下皆已童赭斧斤焚蕩尚且侵尋不禁而川澤漁獵之繁暴殄天物亦已耗竭則將若之何此乃窮弊之極矣惟修虞衡之職使將養之則有變通長久之勢臣若水通曰虞廷之治咨益作虞周禮虞衡屬於地官參贊化育其職匪輕矣自古以來官得其人則品物咸亨國用不匱而民賴以安自夫山林川澤之禁弛而萬物弗若其性府庫空民用困矣故後世有圖治之君者虞衡之修山澤之禁乃王政之先務也陜西曽有議欲罷鑄銅錢者以謂官中費一貫鑄得一貫為無利程頥曰此便是公家之利利多費省私鑄者衆費多利薄盜鑄者息權歸公上非利而何又曽有議解鹽鈔欲髙其價者增六千為八千頥曰若增鈔價賣數須減鹽出既衆低價易之人人食鹽鹽不停積嵗入必敷臣若水通曰鑄銅煮鹽皆山澤之利也鑄錢者利在收公權而不在於多入也論鹽鈔者利在乎廣食户贏嵗入而不在乎髙價也是山澤之利始以裕民終以裕國惟理之無其道則始以求利終以致害矣程頥之言其真見利害之實乎然則理財之職豈可任之匪人哉是故治天下者當知用人又為理財之本程頥論鄭白渠書云昔韓欲罷秦兵使鄭國説以鑿涇水溉田注填閼之水溉㵼鹵之地四萬頃畝收常一鍾關中遂為沃壤無凶年秦以富強至漢白公復引涇水以溉田民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後衣食關中億萬之口此兩渠之功也秦漢而下皆獲其利臣若水通曰鄭國渠鑿涇水自中山西抵瓠口為渠並北山東注洛三百餘里白渠引涇水首起谷口尾入櫟陽注渭中袤三百里兩渠之利秦漢而下咸賴之是故水利興則民食足水利廢則民食匱故自然之利在天府事之修在人然則水利誠不可以不講也有裁成輔相之責者可不究哉胡瑗在湖州置治事齋學者有欲明治道者講之於中如治兵治民水利算數之類嘗言劉彛善治水利後纍為政皆興水利有功臣若水通曰財用治國之首務也水利生財之大道也是故水利興則上可以足國下可以足民矣劉彛以治水利有功豈無自而然哉嘗有言曰二股河北流今已閉塞然御河水由冀州下流尚當疏導以絶河患此其學之所見者也雖然天下之用皆原於心教者以是為教而學者亦以是為學水利諸事乃其心中所發之事業耳楊時論金人入冦第二劄子有云夫天地之藏取之不竭實在山澤摘山煮海之利天下財計所從出也臣若水通曰自古有天下者必厲山海之禁何哉蓋以天下之財多山海之所生其生也有時其取也無窮故也是故山澤之令弛而財用困矣楊時當金人入冦之急而為此言似迂濶而逺於事情矣然衣食者人之命財賦者國之命不可朝夕無者也是故欲禦冦者在強兵欲強兵者在富國欲富國者在山澤若外此以求富國之術如王安石之為則國未及富而國本已蹶矣然後知時之説為義利兩全富強之至計也奚其迂然則虞衡之職最今日所當重者伏惟聖明留意焉楊時上淵聖皇帝書略云自漢唐以來善治財賦者必以劉晏為稱首晏之言曰理財當以養民為先户口衆多賦稅自廣此至論也然晏専用鹽利以充軍國之用其為法止於出鹽鄉置官收買鹽户所煮之鹽轉鬻商人任其所之無餘事也其始江淮鹽課嵗不過四十萬緡季年乃至六百餘萬緡不啻相什百也豈當時可行而今不可行耶臣若水通曰劉晏之時天下之賦鹽居其半何修而可以至此極也不過剝削竈户轉鬻商賈之所致爾夫以天子萬民之父母而為轉販剝削之事其於王道之愛民也不亦逺乎書曰利用厚生孔子曰因民之所利而利之所謂利者皆為民而言也若夫瓊林大盈之積果足以為利耶人臣為其君之深計者固當以義為利也楊時上茶法劄子有云𣙜茶自唐末始有祖宗蓋嘗行之矣而官自鬻之積年之久流弊滋甚仁祖令有司會𣙜茶淨利均為茶租而户輸之弛其禁使自興販縣官坐收𣙜茶之利而民得自便無冒禁之患可謂公私兩利也故當時詔書有曰民被誅求之困日惟咨嗟官受濫惡之入嵗以陳腐私藏盜販犯者實繁嚴刑重誅情所不忍是以江湖數千里設陷穽以害吾民也臣若水通曰茶者天地自然之利生人之所日用不可闕者也人君與之以利民宜矣而唐德宗時趙贊議稅茶以為常平本錢然尋即亟罷貞元九年張滂又請以稅茶錢代水旱田租民猶未至於病也穆宗時王播增天下茶稅率百錢增五十及為相置𣙜使自領之延及有宋太祖乾德五年又有私賣之禁民之受害於是滋矣仁宗始令有司會𣙜茶淨利均為茶租而户輸之弛其禁使自興販楊時以為公私兩利似矣雖然書曰以萬民惟正之供故先王之治天下義有貢賦之正而不利𣙜酤之私此又公私兩利之至道也然則利害之辨為人君者可不省念之哉楊時鹽法劄子有云熙寧間有獻議再𣙜者方神考大有為之時凡可以益國而利民者知無不為以是為不可沮其議而不行是終不可行也臣若水通曰利害公私之辨不明由於聖學之不講爾管夷吾相齊負山海之利始有鹽鐵之征以為利國之術而不知其大不利也其論鹽則曰少男少女所食皆欲計之其法自以為詳而不知其為大踈也自夷吾以下又可知矣宋熙寧間有獻議再𣙜者神宗寢其議而不行嗚呼亦悟矣語曰一之為甚而可再乎後之為人君者宜講明利害公私之極致審於王霸之辨神宗之為君管仲之為臣未足以法也楊時鹽法劄子有云山谷之民食鹽之家十無二三而州縣均敷鹽鈔民間陪費與茶引等迫於殿最之嚴往往計口授之以充嵗額人何以堪臣若水通曰先王山海之禁所以為民畜利而已初無所利焉後世管商功利之説興始有征其稅者矣又不已則有𣙜其沽者矣又不已則有户收食鹽之鈔者矣又不已則又有不食鹽而亦取其鹽鈔者矣此楊時所以感而有言乎大學曰未有上好仁而下不好義者也上之取之剝刻無所不至而望下之以義報其上不亦難乎為人君者可以思矣楊時坑冶劄子有云取礦皆穴地而入有深及五七里處僅能容身一有摧陷則無遺類矣非有厚利人誰為之縱大興發亦民間私自貨易官中亦無所得雖有重法不能禁也若以數千萬緡分在諸場中使以時給與則坑冶自興不須他求也楊時坑冶劄子又有云元符中亦嘗遣使踏逐坑冶姦吏詭妄百出乃以新坑銅量增價市之嵗終與舊坑銅通融以充嵗額監官無虧課之責不復檢東而坑户得以自便以舊為新冒取善價而新坑實無有也其欺罔莫此為甚臣若水通曰此二節皆楊時坑冶奏劄中語也金銀未成器謂之礦周禮丱人掌金玉錫石之地為之厲禁蓋防民之竊取君未嘗利之也楊時坑冶劄子前一節懸價以與坑户以期坑冶之興後一節言以舊坑為新坑而欲禁姦欺之弊其興利除弊固無所不悉矣臣愚以為人主者天下之表上苟以利存心則下莫不競於利上下交利而能治者未之有也上茍以義存心則下莫不趨於義上下交義而不治者未之有也夫天下之大亨而利於正利孰過焉進言於君者當正義利之辨苟以利言矣猶區區於得失利病之間抑末矣國朝教民榜民間或有某水可以灌溉田苗某水為害可以隄防某河壅塞可以疏通里老人等會集踏勘丈量畫圖貼説以憑興利除害諸司職掌凡各處水道可灌田畝以利農民者務要時常整理疏浚如有河水橫流泛溢損壞房屋田地禾稼者須要設法隄防止遏踏勘丈尺濶狹及工力多寡若本處人民不敷令鄰近添助所用木石或見有支用或附近采取務要農隙之時興工毋妨民業其急於害民功可卒成者隨時修築以禦其患憲綱墟岸埧堰陂塘行屬常川體勘境內遇有坍塌壅塞務要趂時修濬以備旱潦問刑條例河南地方盜決及故決河防毁害人家漂失財物淹沒田禾犯該徒罪以上為首者充軍臣若水通曰帝之命益曰往哉汝諧孔子之稱禹盡力乎溝洫王制司空度地居民山川沮澤時四時量逺近興事任力蓋國依於民民依於食食依於地水土之用不亦大哉害者除之利者興之而民斯樂業矣書曰民非后不能胥匡以生我祖宗拳拳保民之至意可以為萬世元后者之法矣宣德九年六月行在工部尚書吳中言湖廣及山西蔚州産木山場宜禁民採伐上曰卿為國計意甚厚但山林川澤之利古者與民共之不必屑屑其已之臣若水通曰文王之囿方七十里民以為小者與民同其利故也齊宣之囿方四十里民以為大者不與民同其利故也君不私其利而公於民民不有其利而忠於君上下懷仁義以相與欲天下無治不可得矣君専其利而攘其民民私其有而遺其君上下懷利以相與欲天下之治不可得矣此我宣宗弛山澤之禁而與民同之雖三代公天下之心何以過此聖子神孫所宜萬世遵之而不可忘焉者也旨哉格物通卷七十七
