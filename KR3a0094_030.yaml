body:
  text: 格物通卷三十明湛若水撰齊家格凡七目謹妃匹正嫡庻事親長養太子嚴内外恤孤㓜御臣妾臣若水通曰齊家何以言格物也程頥曰格者至也物者理也至其理乃格物也至也者知行並進之功也於齊家焉而至之也至其在家之理也故大學齊家章以僻以好惡言之乃吾心應之之理也是故妃匹也嫡庻也親長也太子也内外也孤㓜也臣妾也皆家之事理也人主讀是編焉感通吾心處家之理念念而知於斯存存而行於斯以有諸已則格物之功庻乎於齊家焉而盡之矣謹妃匹上易家人九五王假有家勿恤吉象曰王假有家交相愛也臣若水通曰程頥云王假有家五君位故以王言假至也極乎有家之道也夫王者之道修身以齊家家正而天下治矣又曰有家之道既至則不憂勞而天下治矣臣謂德足以刑家是至其家之道也夫婦者正始之道也如是則勿恤而吉矣象又釋之五以剛中正而感二以柔中正而應夫義婦聽一心相愛家之所以齊也王季之於大任文王之於大姒武王之於邑姜皆得之矣此其齊家以開有周之治也歟歸妹彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也臣若水通曰夫為陽婦爲陰夫為天婦爲地歸妹則婦從夫陰從陽地承天如是則天尊地卑天地之大義以正矣然而天地不交通則萬物不生育歸妹以陰從陽正家之始也陰陽交感則萬事萬化皆成而家道終矣故為人道之終始也可不慎乎人君之治天下以正家為始正家以求配為始序卦傳有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可不久也故受之以恒臣若水通曰夫婦者原於天道而闗於人道其用大矣夫夫婦原於男女之成男女之成由於萬物之生萬物之生由於天地之判是夫婦原於天道之大也夫婦相感而後有生育生之者父所生者子父者君道子者臣道君臣位則上下分而禮義之道行於上下君臣父子之間大道行而天下治矣是夫婦闗於人道之大也若非夫婦則始而天地之道息矣終而人倫之道㓕矣夫婦之道其可以不恒久邪古今不易之經也易首咸恒聖人之意深矣哉書虞書堯典女于時觀厥刑于二女釐降二女于媯汭嬪于虞帝曰欽哉臣若水通曰此史臣記堯以二女妻舜之事明正始也女以女與人也時是也刑法也二女堯二女娥皇女英也釐理也䧏下也媯水名水此曰汭舜所居地也嬪婦也虞舜氏史臣記堯言其將試舜以二女事之以觀其内蓋夫婦之間隱微之際正始之道所係尤重也史又言堯遂治裝下嫁二女于媯水之北使為舜婦于虞氏之家也又述堯戒二女之辭曰欽哉昏禮遣女之辭亦曰徃之女家必敬必戒况以天子之女而嫁于匹夫尤易怠忽故堯深戒其敬所以正其始也夫禮謹大昏大昏者萬世人道之始也其始不正必不能正終矣始終不正則家不齊必不能治國平天下矣後世人君徃徃以貴勢而忽此禮昏嫁之際至使三綱倒置以為當然欲平治得乎觀於堯舜之事實為萬世綱常之龜鑑也歟詩周南闗雎闗關雎鳩在河之洲窈窕淑女君子好逑臣若水通曰此羙后妃之詩文王正始之道也妃配得其賢則男女正而萬化行况人君為天之子后妃母儀天下可不擇德以相配乎故曰窈窕淑女君子好逑蓋言文王之聖而得太姒之賢以德配德徤順相承王教自此始矣故曰好逑雖然閨門托始實在人主一念理欲之間人主茍知重人道之始好德而逺色則必擇德以相匹文王太姒是也茍一念不正惟知樂色而忘德則悖理犯義其禍有不可言者然則夫婦者正家之始擇配者正夫婦之始正念者又擇配之始可不慎與大雅既醉其僕維何釐爾女士從以孫子臣若水通曰釐謂治裝而嫁也女士女之賢者所謂淑女是也旣醉之詩父兄稱願王者之子孫而曰釐爾女士何哉葢國家之命脉係於子孫子孫之賢否本於所生故人君於配匹之際誠得女士之賢以德配德則和氣攸鍾而聖子賢孫從之而出矣觀周家自太姜以來世有賢妃故世有賢子孫一徳相承肇啓八百年有道之長信不偶也後世庸君世主懐耽淫樂色之心罔知嗣續之重故妃匹之際不擇淑德之女多得隂愎之人如二趙之於漢獨孤之於隋武后之於唐剗削國家元氣子孫陵替國脉不長良可悲矣以此觀之人主於妃匹之際可不知所重與春秋隱公二年九月紀履緰來逆女桓公三年公子翬如齊逆女臣若水通曰履緰紀之臣也翬魯臣也逆迎也君子之道造端乎夫婦逆女必親謹有家之始也故奠鴈示守也御之以綏示受之也導之以行示陽先隂後之義也二君乃委命於臣不正其始夫婦之道乖矣春秋書之以為後鑒宜哉桓公八年祭公來遂逆王后于紀桓公九年春紀季姜歸于京師臣若水通曰逆迎也不親迎而使臣徃迎春秋之習則然矣此則為王者畧之然而始迎則書王后正名分也及歸則書季姜正婦道也且知所謂王后者乃季姜也互相發矣京師四方之極閨門風化之始始正名分繼明婦道而風化之本正矣襄公十五年劉夏逆王后于齊臣若水通曰王后天下之毋卿逆而公監之禮也單靖非公乎劉夏非士乎臨以公而逆以士得失不相掩矣故胡安國曰不書使者不與天子之使夏也不書靖公見婚姻得禮常事不書也禮記曲禮男女非有行媒不相知名非受幣不交不親故日月以告君齊戒以告鬼神為酒食以召鄉黨僚友以厚别也取妻不取同姓故買妾不知其姓則卜之臣若水通曰大昏之禮其至矣乎有問名焉有納幣焉有親迎焉問名而意通納幣而分定親迎而禮成意通而后分定分定而后禮成禮成而后明告于君幽告於鬼神近吿於鄉黨僚友所以厚人倫之始至矣故禍莫大於亂類亂類何也同姓者其初本於祖一人之分爾故不取同姓逺别也買妾而卜之則所以逺别者至矣曽子問孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭於禰成婦之義也臣若水通曰夫婦成則繼體承重之義始于此矣故思嗣親傷而不能樂也廟祭成婦何也事死如事生也皆所以重始也郊特牲天地合而后萬物興焉夫昏禮萬世之始也取於異姓所以附逺厚别也幣必誠辭無不腆吿之以直信信事人也信婦德也壹與之齊終身不改臣若水通曰腆厚也附逺者附於逺嫌之義也厚别者重其有别之禮也告直信吿為婦者以正直誠信之道也信事人信其盡事人之道也信婦德信其有為婦之德也齊謂共牢而食同尊卑也夫大昏其重矣天地交而萬物育夫婦配而男女生男女相生生生無窮故曰萬世之始也夫以夫婦擬諸天地可不重乎是故附逺厚别誠幣腆辭告直信所以重之也郊特牲男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執䞇以相見敬章别也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安臣若水通曰此言親迎執摯之義也先者倡導之也其義一者與天地君臣之義同陽倡隂和之道也執䞇敬章别者奠鴈以見不再偶之志敬以明其有别之義也有别則本一而父子親故禮義行乎其中則萬物萬事各安其所矣其始則自親迎奠鴈之禮也其至矣乎郊特牲𤣥冕齊戒鬼神隂陽也將以為社稷主為先祖後而可以不致敬乎臣若水通曰𤣥冕以爲服齊戒以爲敬所以事鬼神也而昏禮者將以外主社稷之祭内奉先祖之嗣其於事神明之禮尤重可以不敬乎人君於此誠念夫社稷祖先之重而不可不重致敬焉如舜之刑法於二女文王之好逑於闗雎斯善矣哀公問孔子曰敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親舎敬是遺親也弗愛不親弗敬不正愛與敬其政之本與臣若水通曰冕而迎者敬之至也必親迎者親之至也然敬之即所以親之也故曰興敬為親舎敬是遺親也及夫親迎之後必愛之而後爲親如琴瑟友之鐘鼔樂之是也至於相輔以正則所謂敬而正者厥後至江漢汝墳之化而德教加於百姓可以見其為政之本矣後之人君以后宫盛色而廢嫡立庻傷教敗化亂由此始其視三代端本之治也何如哉昏義古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章婦順故天下内和而家理臣若水通曰六宫者大寢一小寢五也家者天下之則家正則天下正矣正妃匹者正家之本也是故内和而家理天下化順也婦道極矣而配諸外治明治平之本于家齊也孟子曰五霸桓公為盛葵丘之㑹諸侯束牲載書而不㰱血初命曰無以妾為妻臣若水通曰夫婦人倫之本閨門風化之原匡衡曰婚姻之禮正然後品物遂而天命全况乎妃后之所係為尤重三代廢興未有不由於此者可不謹哉桓公霸者爾於葵丘之㑹獨申明於五禁之先猶能知本也而况天王之尊乎後世之君率多犯此其亦五霸之罪人矣欲正名分而端本原者盍於此圖之左傳隠公八年四月甲辰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入于鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育臣若水通曰禮娶婦必先告廟而後行重繼嗣也故楚公子圍吿莊共之廟不敢廢焉鄭忽能辭強齊之昏卒不免陷於誣祖之罪昏禮不正忘本不仁何後之有國語周語周襄王降翟師以伐鄭王德翟人將以其女為后富辰諌曰不可夫婚姻禍福之階也利内則福由之利外則取禍今王外利矣無乃階禍乎臣若水通曰翟隗姓之國赤翟也階梯也利内親親也利外離親也夫人孰為大禮為大禮孰為大大昏為大故婚姻之際人道之始聖人愼焉况人君身先兆庻唯民所視而可以不謹乎姜任世為妃嬪非翟之此襄王廼欲舎姜任而右翟女怠棄七德禍階從兹始矣然則妃匹之禮可不慎歟可不慎歟晉語司空季子曰異姓則異徳異德則異類異類雖近男女相及以生民也同姓則同德同德則同心同心則同志同志雖逺男女不相及畏黷敬也黷則生怨怨亂毓災災毓㓕姓是故取妻避其同姓畏亂災也故異徳合姓同德合義義以道利利以阜姓姓利相更成而不遷乃能攝固保其圡房臣若水通曰季子晉大夫胥臣臼季也近謂有屬名也相及相嫁取也合姓合二姓爲婚姻也攝持也保守也房居也異姓相及同姓不相及所以逺别章敬也否則怨亂毓災其何以保其土居以端風化之本乎人君於此盍亦知所慎焉格物通卷三十
