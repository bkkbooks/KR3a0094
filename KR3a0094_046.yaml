body:
  text: 格物通卷四十六明湛若水撰立教興化上易觀象曰風行地上觀先王以省方觀民設教臣若水通曰觀卦上巽下坤風行地上動蕩周遍有行教以觀於民之象先王體觀之象立為省方觀民設教之禮王者省於方嶽諸侯省於境內因民俗而設教以觀之布其政教號令之典奢則約之以儉儉則示之以禮抑其過引其不及而約民於中也後世此典不行而民俗之善與否人君罔或知之安望其化民成俗之治耶坎象曰水洊至習坎君子以常德行習教事臣若水通曰坎為水習重也洊亦重疊之義重坎故有水洊至之象君子體此內常其德行外習其教事亦皆重洊之義君子之盡性物我無間也故德行存乎己教事施於人一理也皆待習而後熟也常德行則動靜無間內外一致而為教事之體矣習教事則勤於教詔詳於辨論而為德行之用矣書曰惟斆學半自學教人並行兼濟者也成己成物皆性之德合內外之道也在己為德行在人為教事不盡乎己則無以推於人不盡乎人則己之性分有歉也故君子舉其性之全體而盡之夫然後可以成其至治也歟書虞書舜典慎徽五典五典克從臣若水通曰此史臣敘舜歷試諸難此則教化之事也徽美也五典五常也從順也言堯使舜為司徒美其五常之教使父子有親君臣有義夫婦有别長幼有序朋友有信而天下化之自相親相義相别相序相信而無不從順矣不曰敷五典而曰慎徽五典慎者謹其立教之本也謹而徽之使人倫各盡其分無一毫欠闕舜蓋以身教天下者所以當時各從其教無有梗化所謂以身教者從也後世為教己無躬行之實而徒用心於科條之煩無怪乎民之不從而俗之不善也歟皋陶謨天敘有典敕我五典五惇哉天秩有禮自我五禮有庸哉同寅協恭和衷哉臣若水通曰此皋陶陳安民之謨於帝舜之言也敘倫也典常也敕正也惇厚也秩品也庸用也衷中也言天生人以君臣父子兄弟夫婦朋友之倫敘然正之使敘倫而益厚在我而己天生人以五典之中有尊卑貴賤等級降殺之品秩然用之使品敘而有常則在我而己然惇之庸之必本於一德故君臣當同其寅畏協其恭敬誠一無間融會貫通而民彞物則各得其正使和順中正以歸人倫之極可也臣嘗論之人君惇典庸禮非有外益之也不過因其固有者裁之爾孟子曰孩提之童無不知愛其親及其長也無不知敬其兄是其良知良能本然天理故謂之天敘天秩也然氣質之偏氣習之蔽漸不如初或失之太過或失之不及不能歸於中道是故必待於人君與臣惇之庸之而和衷之也所以惇庸之和衷之者亦不過復其本然者而巳故寅恭者立教之本也上下一於恭敬則天地之中以立而皇極建矣伏惟聖明留意寅恭和衷以立天下之極幸甚商書湯誥惟皇上帝降衷于下民若有恆性克綏厥猷惟后臣若水通曰此成湯克夏以誥萬方言君道所係之重如此夫天以陰陽五行化生萬物而氣之中者即性無所偏倚故謂之降衷劉子所謂人受天地之中以生是也人能順其自然而不鑿以私智固有仁義禮智信之常性矣然氣習不能無異故必待人君建極立教而後能使之安於其道故曰克綏厥猷惟后子思作中庸首章言性道教其原蓋出於此夫道者用也性者體也天也者性道之原也故道本於性性出於天人君立極以教天下者不可不知性道之原伏惟聖明留意焉周書多方慎厥麗乃勸厥民刑用勸臣若水通曰此成王舉成湯之教化乎民者以告多方也慎謹也麗依也刑儀刑也言成湯深謹其所依所依謂仁也仁者人心之天理君民同然者也上行之則下效之而興其同然之心故以勸勉其民則民皆儀刑而用勸勉也人君之於天下仁而已矣天下之民心亦仁而已矣為人君者欲興教化豈待外求之哉君陳惟民生厚因物有遷違上所命從厥攸好爾克敬典在德時乃罔不變允升于大猷臣若水通曰此成王命君陳往下都監殷頑民之言也典者常道君臣父子夫婦長幼朋友是也德者心之所得之理也允信也猷道也言斯民得天地之和氣以生故其性本淳厚知誘物化遂漸移而澆薄爾然厚既可遷而薄則薄者豈不可反而厚乎厚者乃其本然也反之之道惟在於上爾民之於上固不從其令而從其好爾當敬其君臣父子夫婦長幼朋友之常道而無不在於德蓋在心為德在事為道德者體而道者用也敬典而在德則道由中出教由我行以身教者從故其感人捷於桴鼓所以時乃罔不變而信升于大猷也蓋人人各率其性各由其道則天下為大道之世矣後之人君欲移風易俗必自身心之德始也伏願聖明留神講求修德凝道以升大猷之治幸甚君牙𢎞敷五典式和民則爾身克正罔敢弗正民心罔中惟爾之中臣若水通曰此穆王命君牙為司徒之言也𢎞大也敷布也式敬也和者和衷之和身亦心也則者有物有則之則言大布君臣之義父子之親夫婦之别長幼之序朋友之信五者之常道敬以和民之則典以道言用也則以心言體也即親義序别信之心下文所謂中正是也正也中也即民則之體而人之所同然者也正以不偏不倚言中以無過不及言皆所謂則也又言爾克正則民化之無不正矣民有不中則在爾心之中以化之矣其中其正皆係於一心之敬敬立則上感下應民則和而五典克從矣詩周頌時邁明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之臣若水通曰式敬也櫜藏弓矢之囊也戢聚也肆陳也夏中國也此巡守而朝會祭告之樂歌也詩言明顯昭彰乎我周也既以慶讓黜陟之典敬序在位之諸侯又斂其干戈弓矢益求懿美之德以布列此中國則信乎王之能保天命矣蓋偃武修文則立教化而國祚可永也武王以革命之初即大明黜陟式序諸侯則大政舉矣又戢其武備陳其懿德則文教興矣政教並行天命丕新蓋由武王實有安天下之心故一政一教皆發於仁義之自然有不容巳爾茍無仁義之心徒欲行乎政教以鼓舞於一時則是後世駕御之術將治之而不服教之而不從矣安能保人心而永天命哉春秋定公十二年叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費臣若水通曰郈費者叔孫季孫之邑也春秋之時君臣之禮不行政在三家固城自強公室不能制矣及陪臣執命據邑以叛三家亦不能制矣一聞孔子禮可治國之教家不藏甲邑無百雉之言叔孫季孫感化而帥師以墮之焉然則禮教者可以定分可以化強可以撥亂教化之大本也向使推而行諸天下興道致治可以回關雎麟趾之風東周之嘆豈虛語哉惜乎聖人有通天下之化天下莫能用也樂記曰然後聖人作為父子君臣以為紀綱紀綱既正天下大定臣若水通曰聖人之教立於國行於天下者也故教立而父子君臣之名作矣父子君臣之名作而紀綱立矣夫作者非聖人作之也天作之也故紀綱立而天下無無人倫之人者矣紀綱也者紀綱乎人道者也祭義孔子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命孝以事親順以聽命錯諸天下無所不行臣若水通曰此言先王立教於國之要也孝弟者人之心也孝弟本乎心行乎家而國之教立矣感乎民而民化之放諸四海而凖以其心之同也使人而無是心也又何感化之有伏惟聖明躬行孝弟以教於國由是擴而充之則天下感慕而化有不期然者矣祭義曽子曰夫孝置之而塞乎天地溥之而橫乎四海施諸後世而無朝夕推而放諸東海而凖推而放諸西海而凖推而放諸南海而凖推而放諸北海而凖臣若水通曰孝者立教之本也人心同然之理良知良能者也故四海之凖以其同然也豈但四海哉上下四方之宇古今往來之宙理一而已矣故古之先王以孝理天下亦因其同然之心爾為人君者可不務乎祭統夫祭之為物大矣其興物備矣順以備者也其教之本與是故君子之教也外則教之以尊其君長內則教之以孝於其親是故明君在上則諸臣服從崇事宗廟社稷則子孫順孝盡其道端其義而教生焉臣若水通曰祭祀之禮所以事天也而教乎人所以事先也而教乎後外祭天地使人知有尊尊之義也然而諸臣服從矣內祭宗廟使人知有親親之義也然而子孫順孝矣孝敬盡于一人德教興于一國然則盡道端義者其惟君乎人君之學求之此心而已矣孝敬存於心而教化立於家行於國達於天下是之謂要道也表記子言之君子之所謂仁者其難乎詩云凱弟君子民之父母凱以強教之弟以説安之樂而毋荒有禮而親威莊而安孝慈而敬使民有父之尊有母之親如此而後可以為民父母矣非至德其孰能如此乎臣若水通曰為民父母在於嚴慈兼濟而已非嚴不敬非慈不愛愛而不敬則流敬而不愛則離父以尊之則民知嚴母以親之則民知恩強教説安同歸於親愛而已矣若夫失於刑法之酷而以為強教失於姑息之弊而以為説安則何凱弟之有哉周禮地官以鄉三物教萬民而賓興之一曰六德知仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不姻之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑臣若水通曰物猶事也以鄉三物而教乎民是故六德藴之於心也六行見之於行也六藝遊之於藝也以三者而教之夫然後教之事備矣教之而不化又輔之以八刑是故勸之有道而懲之有具宜乎民日遷善而不自知也有國家者盍亦留意於斯哉論語君子篤於親則民興於仁故舊不遺則民不偷臣若水通曰親者全其親故者全其故親故者人之情天之理也然上之人同此心也同此理也下之人亦同此心也同此理也故我能盡此心於親親則下興其仁愛之心同然矣我能循此理而不遺故舊則下亦感化而厚勃然矣是故文武興則民好善幽厲興則民好暴感應之機何異於影響之捷哉人君惟慎其所感而已矣孝經曰先王見教之可以化民也是故先之以博愛而民莫遺其親陳之以德義而民興行先之以敬讓而民不爭導之以禮樂而民和睦示之以好惡而民知禁臣若水通曰博愛者老吾老以及人之老故無不愛也陳之以德義者陳説其德行道義以感動之得其心之所同然故興行也先以敬讓者躬行恭敬辭讓則感其辭讓之本心故不爭也禮以理其心樂以樂其心故和睦也示好以引之示惡以止之故知禁也博愛也德義也敬讓也禮樂也好惡也上之教也不遺親也興行也不爭也和睦也知禁也下之化也是故觀其教化而人心之同然者可知矣孝經曰故親生之膝下以養父母日嚴聖人因嚴以教敬因親以教愛聖人之教不肅而成其政不嚴而治其所因者本也臣若水通曰何以謂親生之膝下也親愛之心自孩提之時生也何以謂養日嚴也既長而養父母則知識漸開明乎父子尊卑之分故日加敬於父母也親也嚴也是人之良心也故聖人因之教以敬愛焉是故教不肅而成政不嚴而治也然後知聖人之政教非強為之也根之於天性者如是也孝經曰教民親愛莫善於孝教民禮順莫善於悌移風易俗莫善於樂安上治民莫善於禮臣若水通曰教親愛以孝者何也孝親之心即親愛其君之心也教禮順以悌者何也敬兄之心即禮順長上之心也樂作而平中故風移而俗易也禮達而分定故上安而下順也孝弟禮樂其立教之本乎孝經曰君子之教以孝也非家至而日見之也教以孝所以敬天下之為人父者也教以悌所以敬天下之為人兄者也教以臣所以敬天下之為人君者也臣若水通曰孝悌忠人心之固有者也君子之教盡心焉爾矣人各盡其心然後不獨盡其心以其得所同然者爾君子以孝教乎國而凡天下之為子者無弗敬其父焉以悌教其國而凡天下之為弟者無弗敬其兄焉以忠教其國而凡天下之為臣者無弗敬其君焉是則天下之孝悌忠皆君子教之也非德之至乎格物通卷四十六
