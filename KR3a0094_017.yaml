body:
  text: 格物通卷十七明湛若水撰畏民下左傳文公十三年邾文公卜遷于繹史曰利於民而不利於君邾子曰茍利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷于繹臣若水通曰遷都大事也在書稽諸人神至再至三而後舉孟子亦以太王之去岐為不得已蓋民不可以輕動邾文公之遷繹雖未知其得已與否觀其稽諸人神者始欲以民之利為利終欲以民之命為命其利其命無非為民其仁也夫彼徒犬羊其民者烏足以語此國語周語召公曰民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以阜財用衣食者也夫民慮之於心而宣之於口成而行之胡可壅也壅其口其與能幾何臣若水通曰山川所以宣地氣而出財用猶口之宣人心而言善敗廣平曰原下濕曰隰下平曰衍有溉曰沃善謂民所善者敗謂民所惡者阜厚也與語辭能幾何言不久也夫人君考德必聼於民故百工陳諌庶人傳語嘗使之宣其情而勿壅也厲王乃使衛巫以監謗是壅民之口民將叛之亡無幾矣為人君居民之上者慎勿壅其口以自潰也周語內史過曰不親於民而求用焉民必違之臣若水通曰內史周大夫過其名用用其財力也人君臣妾兆民貢賦萬國以勢視之何者非其所當用財者民之心也失其民則失其心矣而欲用其財可得乎傳曰有德此有人有人此有土有土此有財又曰未有上好仁而下不好義者也是故慈保惠懷薄斂輕徭親民之謂也虢公動匱百姓以逞其違雖欲利將焉利哉內史過謂求用先於親民此真君天下者所當法周語單襄公曰書曰民可近也而不可上也詩曰愷悌君子求福不回在禮敵必三讓是則聖人知民之不可加也故王天下者必先諸民然後庇焉則能長利臣若水通曰回邪也加猶上也先諸民先求民志也庇猶䕃也謂先安民然後自䕃也長利長有福利也夫人君居九重之上故常有輕視下民之心則凡縱欲以害民者無不至矣惟聖人之心能畏於民嵓而不敢忽故有不可上不可加之心則知所以畏矣傳曰得乎丘民而為天子有天下者可不懼乎漢和帝永元元年春竇憲將征胸奴待御史魯恭上疏曰萬民者天之所生天愛其所生猶父母愛其子一物有不得其所則天氣為之舛錯况於人乎故愛民者必有天報今始徵發而大司農調度不足上下相迫民間之急亦已甚矣奈何以一人之計棄萬人之命不恤其言乎臣若水通曰書云惟天惠民惟辟奉天故人君者體上天子惠之意而致之民者也則夫惠鮮子育如父母之愛子不傷其力則民心可得而天意亦可副矣茍以徵發而傷民之力棄民之命其不逆天矣乎噫魯恭之言其可謂知重民者矣唐髙祖武德九年九月上曰王者至公無私故能服天下之心朕與卿輩日所衣食皆取諸民者也故設官分職以為民也臣若水通曰君者食民之力民者賴君之治君而非民民而非君皆不能獨生是上下相須以為命者也然民徒知畏君之勢而君不知畏民之勢此所以以私滅公民心不服而危亡至矣髙祖之言真可為萬世人君之戒哉唐太宗貞觀十一年八月魏徵曰臣觀自古以來百姓愁怨聚為盜賊其國未有不亡者人主雖欲追改不能復全故當修於可修之時不可悔之於己失之後也蓋幽厲嘗笑桀紂矣煬帝亦笑周齊矣不可使後之笑今如今之笑煬帝也臣若水通曰書云敬修其可願四海困窮天祿永終故保天祿在於裕民裕民在於敬修可願可願者善也天理也人君不修其善端則天理日滅縱欲日甚民生日困飢寒日迫愁怨日生其相去而為盜也必矣君位其可保乎魏徵謂修於可修之時是矣獨未聞其引君當道志於仁以不忍人之心行不忍人之政爾為人君者尚當正其本焉後梁均王龍德二年十二月普王李存朂以魏博觀察判官晉陽張憲兼鎮冀觀察判官權鎮州軍府事魏州稅多逋負普王以讓司録濟隂趙季良季良曰殿下何時當平河南王怒曰汝職在督稅職之不修何敢預我軍事季良對曰殿下方謀攻取而不愛百姓一旦百姓離心恐河北亦非殿下之有况河南乎王恱謝之自是重之每預謀議臣若水通曰孟軻云得天下有道得其民斯得天下矣得其民有道得其心斯得民矣夫財者民之心普王方謀攻取乃急於征稅而不愛百姓是欲用民力而先傷民心也倒戈之禍皆鹿臺巨橋傷心之民為之也可不畏哉後之為君者宜鑒季良之言賈誼新書曰君子之富貴也至於子孫而衰則士民皆曰何君子之道衰也數也不肖暴者禍及其身則士民皆曰何天誅之遲也夫民者萬世之本也不可欺臣若水通曰斯民也三代之所以直道而行也民之公是公非其可畏哉是故君子之澤沒世不忘何其長也小人之禍時日曷喪何其速也書曰吉人為善惟日不足凶人為不善亦惟日不足吁抑孰知惟日不足者乃自促其禍也邪劉向說苑曰武王問政於尹逸曰吾何德之行而民親其上對曰使之以時而敬順之忠而愛之布令信而不食言王曰其度安在對曰如臨深淵如履薄氷王曰懼哉對曰天地之間四海之內善之則畜也不善則仇也若何其無懼也臣若水通曰民心之向背善惡而已矣所謂善者敬忠信而已矣所以行敬忠信者臨深履薄之心而已矣書曰兢兢業業其謂是乎人君恆存兢業之心則能敬忠信于天下之民而民歸之矣否則民將不背而為仇乎宜武王聞之而發懼哉之嘆也歟韓愈曰財已竭而斂不休人已窮而賦愈急其不去為盜也亦幸矣臣若水通曰民之為盜非天性然也飢寒迫之也民之飢寒非自致然也賦斂剝之也傳曰文王視民如傷夫如傷者如傷己也書曰恫瘝乃身使為人上者視民之饑寒如疾痛之在身視民之傷如傷己焉則必不至於暴斂以自傷痛矣夫痛癢不相關謂之不仁也是故惟仁君然後能畏民矣宋仁宗至和元年春正月京師疫內出犀角二令太醫和藥以療民其一通天犀也左右請留供服御帝曰吾豈貴異物而賤百姓哉立命碎之臣若水通曰君道以堯舜為至治道以唐虞為至仁宗立碎通天犀以療民疫此即宣王不忍觳觫之心足以王矣使當時有能將順其美推召災之由而反求致中和之道則堯舜可為矣况天下之疫或有如京師而通天犀亦不能盡天下之藥劑也邪遂使帝心以此為至左右以此為難仁宗之不得為堯舜者其無格心之臣矣宋儒程皓嘗言鄭戩作縣定民陳氏為里正既暮有姓陳人乞分居戩立笞之曰安有朝定里正而夕乞分居既而察之乞分居者非定里正也今夫赤子未能言其志意嗜欲人所未知其母必不能知之然不至誤認其意者何也誠心愛敬而已若使愛敬其民如其赤子何錯誤之有臣若水通曰記云若保赤子心誠求之雖不中不逺矣夫父子之愛天性也誠心而愛敬之則志意嗜欲未有不得者也若夫喜怒之私先橫於胸中則刑及無辜而爵及惡德者將無所不至矣豈直錯撻人而已哉此忽民而不知愛敬者之咎也程皓作縣凡坐處皆書視民如傷四字常曰皓常愧此四字臣若水通曰視民如傷此文王之所以聖也如傷者如傷己也夫視民之傷如傷己焉一體之仁也仁之至也醫書以手足痿痺為不仁語曰不仁便是死漢不知痛癢痛癢相關此文王視民如傷之心也為人君欲師文王者當因程皓之言以求惠鮮之仁則仁不可勝用矣程頥應詔上英宗皇帝書云百姓窮蹙日以加甚而重斂繁賦消削之不息天下户口雖衆而自足者益寡司牧者治其事爾非有師保左右之也其善惡勤惰趨利避害或昧而反之一從其自然而困之陷之之道又非一塗人用無聊茍度嵗月驅之於治則難格率之於惡則易搖民惟邦本本根如是邦國奈何民無生業困極則慮生不漸善教思利而志動乘間隙則萌姦宄逼凍殍則為盜賊今兹幸無大故尚爾茍安設或遇大饑饉有大勞役奸雄一呼所在必應以今無事之時尚恐力不能制况勞擾多事之際乎天下安危實係於此臣若水通曰記云得衆則得國失衆則失國民猶水也水能載物亦能溺物故君之防民如防水也防之於未潰也易防之於既潰也難語曰願主君無得罪於羣臣百姓其防民之至也夫張栻經筵講畢復進有云天生民以立君非欲其立乎民之上以自逸也蓋欲分付天之赤子而為之主人主不以此為職分以何為職分人主不於此存心於何所存心若人主之心念念在民惟恐傷之則百姓之心自然親附如一體若在我者先散了此意思與之不相管攝則彼之心亦將泮渙而離矣可不懼哉臣若水通曰物我一體天之道也故其感應也如響君之於民也其心聚則民心亦聚其心散則民心亦散所謂至愚而神者也書曰元后作民父母有父母之心則無念而不在民所欲與之聚之所惡勿施而民焉有不父母其君者乎是故得為元后者得父母之道也得父母之道者得其民也得其民者得其心也得民心者得吾之心也為大君者可不念乎國朝洪武十五年七月庚戌上謂翰林院學士宋訥曰朕每觀尚書至敬授人時嘗嘆敬天之事後世中主猶能知之敬民之事則鮮有知之者蓋彼自謂崇髙民皆事我者分所當然故威嚴日重而恩撫寖薄所以然者只為視民輕也視民輕則與己不相干而畔渙離散惟能知民與己相資則必無慢視之弊故曰可愛非君可畏非民衆非元后何戴后非衆罔與守邦古之帝王視民何嘗敢輕故致天下長久者以此而已臣若水通曰書云撫我則后虐我則讐民以為讐則后非其后矣故得乎丘民為天子失乎丘民為匹夫民不亦可重乎不亦可畏乎書曰弗畏入畏故在於人君一念之微爾君心知畏仁以撫之則戴之為君君心弗畏不仁以虐之則叛而為讐自古之治亂興亡未有不在是也皇祖諭宋訥及此真知君民一體而得興邦致治之本為萬世之所當法也歟洪武十八年七月上問近臣今天下百姓安否左春坊左贊善劉三吾對曰賴陛下威德四方無虞盜賊屏息比嵗豐登民皆安樂上曰天下人民之衆豈能保其皆安朕為天下主心常在民惟恐其失所故每加詢問未嘗一日忘之三吾對曰聖心拳拳若此恩德之及民者深矣上曰恩德亦非徒然醫如盧扁不施藥石病不自瘳匠如公輸不施繩墨木不自正君如堯舜無紀綱法度之施而但曰恩德所謂徒善不足以為政也臣若水通曰傳云聖人既竭心思焉繼之以不忍人之政而仁覆天下矣皇祖心常在民每問安否可謂竭仁心矣猶欲施於綱紀法度之間所謂先王有不忍人之心斯有不忍人之政乎惜乎當時侍臣不能將順其美而徒以諛言進也聖明統理民物尚當以聖祖之心為心永樂元年十二月太宗皇帝宴閒顧問侍臣曰今一嵗又終外間軍民安否如何對曰陛下臨御以來所施無非仁政今軍民皆安正太平無事之時曰太平豈易言朕惟遵皇考成憲以為治如得雨暘時若年穀豐登兵革不興兆民安樂朝無奸邪然後可為太平無事臣若水通曰君民一體民安則君安民危則君危其相關有如此者後世昏主以秦越視之不亦異乎此所以治日少而亂日多也惟我太宗皇帝方嵗云暮念及軍民安否而不敢以太平自居所謂視民如傷者邪其仁天下之心何其至哉聖子神孫萬代當鑒也書曰欽若先王成烈以休於前政惟聖明留神焉格物通卷十七
