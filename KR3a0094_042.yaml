body:
  text: 格物通卷四十二明湛若水撰御臣妾下唐中宗神龍元年八月戊申以水災求直言右衛騎曹參軍西河宋務光上疏以為水隂類臣妾之象恐後庭有干外朝之政者宜杜絶其萌臣若水通曰君德以剛為主剛則陽陽則明剛明者御臣妾之道也臣妾隂類也水隂氣也務光上疏欲杜絶宫闈預政之端以消水潦之變真確論也帝溺於袵席之愛終使政歸房帷天子拱手貽笑天下後世可謂之剛明矣乎端本善則之君其鑒之哉唐玄宗開元十五年夏五月命妃嬪以下宫中育蠶欲使之知女功丁酉夏至賜貴近絲人一綟臣若水通曰人勞則思思則善心生善心生則邪慝不作妃嬪群居飽食玩日玄宗命育蠶宫中使勤女工可謂御之有道矣夏至賜貴近絲人一綟皆女工所給也然天寶以後艷妃亂政何制御之不克終耶故人君欲御下者當先御其心玄宗開元十九年正月王毛仲賜死自是宦官勢益其髙力士尤為帝所寵信嘗曰力士上直吾寢則安故力士多留禁中稀至外第四方表奏皆先呈力士然後奏御事小力士即決之勢傾內外臣若水通曰書稱惟辟作福惟辟作威此言人君之御臣下不可假以威福之柄也明皇寵任力士而使之省決章奏可謂威福下移矣故力士竊權怙寵而威福之作無所不至卒之引類植黨而貽禍無窮豈非明皇無御下之道所致乎開元二十四年武惠妃譖太子瑛鄂王瑶光王琚帝大怒以語宰相欲皆廢之張九齡諌曰陛下踐祚垂三十年太子諸王不離深宫日受聖訓天下之人皆慶陛下享國久長子孫蕃昌今三子皆已成人不聞大過陛下奈何一旦以無根之語喜怒之際盡廢之乎且太子天下之本不可輕搖昔晉獻公聽驪姬之讒殺申生三世大亂漢武帝信江充之誣罪戾太子京城流血晉惠帝用賈后之譖廢愍懷太子中原塗炭隋文帝納獨孤后黜太子勇立煬帝遂失天下由此觀之不可不慎陛下必欲為此臣不敢奉詔帝不悅李林甫初無所言退而私謂宦官之貴幸者曰此主上家事何必問外人帝猶豫未決惠妃密使官奴牛貴兒謂九齡曰有廢必有興公為之援宰相可長處九齡叱之以其語白帝帝為之動色故終九齡罷相太子得無動明年將廢太子帝召宰相謀之林甫對曰此陛下家事非臣等宜預帝意乃決臣若水通曰甚矣邪佞之言入人主之腹心割骨肉之至愛故人主之御臣妾不可不慎也自古宫闈之禍亂多生於后妃嬖幸之讒譖雖以父子之愛出於天性猶能易之為寇讎而兵加骨肉焉英明之主名德之士往往墮其計中豈特明皇之於武惠妃欲廢三子哉雖賴輔相忠直如九齡者維持於一時豈能終釋乎代宗優寵宦官奉使者不禁其求取嘗遣中使賜妃族還問所得頗少代宗不悅以為輕我命妃懼遽以私物償之由是中使公求賂遺無所忌憚宰相常貯錢於閣中每賜一物宣一旨無徒還者出使所厯州縣移文取貨與賦稅同皆重載而歸德宗素知其弊及即位遣中使邵光超賜李希烈旌節希烈贈之僕馬及縑七百匹黃茗二百斤帝聞之怒杖超六十而流之於是中使之未歸者皆潛棄所得於山谷雖與之莫敢受臣若水通曰同一宦官也代宗縱之則賄賂公行德宗懲之則姦貪屏迹故人主於臣妾亦視其御之之道何如爾昔齊威王烹阿大夫為其善事左右以取譽也人徒知齊威之怒阿大夫而不知懲善事左右者也人徒知齊威之懲善事左右者而不知乃深懲所事左右之人也御臣妾之道齊威其得矣蓋祿位者人主之大柄毁譽者左右之利口故貪祿位者必取於譽言通譽言者必賂於左右今以譽言之至而推及於善事左右之姦而遂并誅焉威王之見卓矣代宗者乃獨賞善事而怒不善事何其謬於齊威也德宗懲之是矣不知異日白志貞竇文瑒之掌禁兵乃又授之以天下大柄自是數代子孫之廢置皆出其手血流禁庭而唐遂以亡何德宗之能明于其小而暗於其大哉故學術不可不講也唐敬宗寶厯三年帝遊戲無度狎昵群小善擊毬好手搏禁軍及諸道爭獻力士又以錢萬緡付內園令召募力士晝夜不離側又好深夜自捕狐狸性復褊急力士或恃恩不遜輒配流籍沒宦官小過動遭捶撻皆怨且懼十二月辛丑帝夜獵還宫與宦官劉克明田務澄許文端及擊毬軍將蘇佐明王嘉憲石從寬閻惟直等二十八人飲酒帝酒酣入室更衣殿上燭忽滅蘇佐明等弒帝於室內劉克明等矯稱帝旨命翰林學士路隋草遺制以絳王悟句當軍國事壬寅宣遺制絳王見宰相百官於紫宸外廡克明等欲易置內侍之執權者於是樞密使王守澄楊承和中尉魏從簡梁守謙定䇿以衙兵迎江王涵入宫發左右神䇿飛龍兵進討賊黨盡斬之克明赴井出而斬之絳王為亂兵所害癸卯以裴度攝冢宰百官謁見江王於紫宸殿外廡甲辰見諸軍使於少陽院乙巳文宗即位更名昂臣若水通曰臣讀史至敬宗宫闈之變而嘆人主御臣妾之道誠不可不講也孔子曰惟女子與小人為難養也近之則不孫逺之則怨傳者云莊以蒞之慈以畜之然後能無二者之弊敬宗狎昵群小晝夜不離可謂近之矣擊毬手搏可謂莊乎動遭捶撻配流籍沒可謂慈乎不莊不慈可謂御臣妾之道乎宜其身弒國危而二日之間三易其主自開闢所無之禍變一時迭見嗚呼慘哉然裴度位居上相而身繫安危弒逆之賊而不能討廢置之謀而不能預噫敬宗昏童殺身固其自取不足論也以度之勳德而有此焉何耶春秋書趙盾弒其君以盾為正卿出不越境入不討賊故弒君之罪不得辭焉若度者其能免春秋之誅乎文宗太和九年十一月帝與李訓鄭注謀誅中官訓及王璠郭行餘李孝本羅立言誅中宫不克訓出奔仇士良等知帝預謀怨憤出不遜語帝慙懼不復言士良等遣禁兵露創出閣門逢人即殺死者千六百餘人橫尸流血狼籍塗地擒王涯賈餗舒元輿等繫兩軍或斬李訓首送京師左神䇿出兵三百人以李訓首引王涯王璠羅立言郭行餘右軍出兵三百人擁賈餗舒兀輿李孝本獻於廟社徇於兩市命百官臨視斬於獨栁之下梟其首於興安門親屬無問親踈皆死孩稚無遺時數日之間殺生除拜皆決於兩中尉帝不預知鳯翔監軍斬鄭注獻其首梟之滅其族仇士良等各進階遷官自是天下事皆決於北司宰相行文書而已宦官氣益盛迫脅天子下視宰相凌暴朝士如草芥焉臣若水通曰人君之於臣妾在慎所以御之之術爾有曲突徙薪之防則無焦頭爛額之災禁兵之柄蓋人主授之則人主亦可得收之也宋初諸將之兵權亦不細也太祖以從容杯酒解之若無事然故在善御之而已爾茍能任賢擇相修復紀綱罷中尉之設以還祖宗之舊左右權幸諭之以禍福不絶其富貴人心既安法官廷議公去渠魁餘皆罔治則弒君之罪正逮下之恩孚蓋若良醫之去病病去而人不知乃兩得兼善矣不知出此而妄行邪謀禍亂愈熾惜矣其不講於御小人之術也唐武宗會昌三年仇士良以左衛上將軍內侍監致仕其黨送歸私第士良教以固權寵之術曰天子不可令間常宜以奢靡娛其耳目使日新月盛無暇更及他事然後吾輩可以得志慎勿使之讀書親近儒生彼見前代興亡心知憂懼則吾輩踈斥矣其黨拜謝而去臣若水通曰仇士良愚君固寵之術人以為巧矣臣獨以為拙也拙於自謀也今夫同舟之人中道遇風濤之險雖在素所讎怨者猶同心共願其舟之不破何者蓋各自為也天下如一舟也君相者舟師之執柁者也勳戚臣庶內宦嬖近皆舟中之人也其濟其溺死生共之今仇士良乃教其黨類愚弄迷惑其人主是猶同舟者鴆毒其舟師俾破鑿其舟折毁其柁及舟溺身死而不悟然則士良之術巧乎拙乎害人乎害已乎其黨慮不下千百人無一人靈覺者何也噫後世內外之臣不知此義而終日鑿舟自溺者多矣臣故附其説於御臣妾之後庶聞者亦當傾聽平心以共濟於大治也哉會昌三年八月帝從容言文宗好聽外議諌官言事多不著名有如匿名書李德裕曰臣頃在中書文宗猶不爾此乃李訓鄭注教文宗以術御下遂成此風人主但當推誠任人有欺罔者威以明刑孰敢哉帝善之臣若水通曰人主御下之道至誠而已矣至誠而不動者未之有也不誠未有能動者也故上御之以誠則下亦以誠應之矣上御之以術則下亦以術應之矣訓注以術惑文宗文宗以術令臺諌上下內外一於術而誠信之風亡矣夫任術者未有不反殃其身者也識者蓋已先卜文宗訓注之不免矣人君御下之道可不以至誠為本乎唐僖宗乾符二年帝之為晉王也小馬坊使田令孜有寵及即位使知樞密遂擢為中尉帝時年十四專事遊戲政事一委令孜呼為阿父令孜頗讀書多巧數招權納賄除官及賜緋紫皆不關白於帝每見常自備米食兩盤與帝相對飲啖從容良久而退帝與內園小兒狎昵賞賜樂工伎兒所費動以萬計府藏空竭令孜説帝籍兩市商旅寶貨悉輸內庫有陳訴者付京兆杖殺之宰相以下鉗口莫敢言臣若水通曰政權者人主御天下之術如太阿之柄而以授人是反創自戕也田令孜果何人斯僖宗使之知樞密擢中尉而政權一以委之且呼之為阿父與之以對食任其縱恣攬權納賄而不之禁非授之以太阿之柄乎卒之毒流中外而禍唐家國豈非僖宗之自貽也哉於乎履霜堅氷至君天下者誠不可不知慎其微也已僖宗廣明元年二月左拾遺侯昌業以盜賊滿關東而帝不親政事專務遊戲賞賜無度田令孜專權無上天文變異社稷將危上疏極諌帝大怒召昌業至內侍省賜死臣若水通曰人主之於臣妾一失其御遂為邪佞所入本心蠱惑則是非黑白莫能辨矣僖宗之惑於田令孜天有顯戒人有顯愆臣有直言而不悟反殺之則御下之道於君德豈小也哉然昌業於唐室之將危而上疏極諌其忠足稱矣事之無益而徒以殺身悲夫范祖禹謂其忠而未仁臣則謂其忠而未智也於乎惜哉昭宗天復元年六月崔胤請帝盡誅宦官宦官屬耳頗聞之韓全誨等涕泣求哀於帝帝乃令胤百事密封疏以聞勿口奏宦官求美女知書者數人內之宫中隂令伺察其事盡得胤密謀全誨等大懼每宴聚流涕相訣日夜謀所以去胤之術時胤領三司使全誨等教禁軍喧譁訴胤減損冬衣帝不得已解胤鹽鐡使時朱全忠李茂貞各有挾天子令諸侯之意全忠欲帝幸東都茂貞欲帝幸鳯翔胤知謀泄急遺朱全忠書稱被詔令全忠以兵迎車駕且言上反正公之力而鳯翔入朝引功自歸今不速至必成罪豈惟功為他人所有且見征討全忠得書十月舉兵發大梁全忠至河中表請車駕幸東都京城大駭士民亡竄山谷百官皆不入朝十一月壬子全誨等陳兵殿前奏曰全忠以大兵逼京師欲劫天子幸洛陽求傳禪臣等請陛下幸鳯翔收兵拒之帝不許仗劍登乞巧樓全誨等急即火其下帝降樓乃與皇后妃嬪諸王百餘人皆上馬慟哭聲不絶全誨等遂火宫城壬戌車駕至鳯翔二年六月全忠敗李茂貞之師于虢縣之北進軍攻鳯翔九月全忠圍鳯翔十月茂貞出兵擊之又敗還汴軍每夜鳴鼓角城中地如動是冬大雪城中食盡凍餒死者不可勝計或卧未死肉已為人所咼市中賣人肉斤直錢百犬肉直錢五百茂貞儲㣥亦竭以犬彘供御膳帝鬻御衣及小皇子衣於市以充用削漬松柿以飼御馬十二月帝召李茂貞等食議與朱全忠和帝曰十六宅諸王以下凍餒死者日有數人在內諸王及公主妃嬪一日食鬻一日食湯餅今已竭矣卿等意如何皆不對帝曰速當和解爾三年正月茂貞請誅韓全誨等與朱全忠和奉車駕還京帝即遣內養帥鳯翔卒四十人收全誨等斬之以第五可範仇承坦為左右軍中尉王知古楊虔朗為樞密使是夕又斬李繼筠等十六人遣使囊全誨等首以示全忠時鳯翔所誅宦官已七十三人全忠使京兆捕九十人甲子帝幸全忠營己巳入長安庚午崔胤奏誅宦官是日全忠以兵驅第五可範以下數百人於內侍省盡殺之寃號之聲徹於內外其出使者詔所在捕誅之止留黃衣幼弱者三十人以備灑掃帝愍可範等咸無罪為文祭之自是宣傳詔命皆以宫人其兩軍內外八鎮兵悉屬六軍以崔胤兼判六軍十二衛臣若水通曰有唐宦官之禍慘矣人皆以宦官之擅權而不知德宗以下諸君假之權也及其敗也人皆以宦官之自取而不知德宗以下諸君假之權實殺之也蓋權莫大於征伐而彼典禁兵矣事莫重於廢置而彼専豫奪矣故始也與南司水火而已其既也呼天子為負義門生愛則非次而立之惡則改慮而除之至僖昭而極矣然天道好還逆甚失速邠岐之託雖親宣武之勢實熾至是天子祈請而二虜交歡反本窮源則惟宦者之是誅爾一舉而誅七十再舉而誅九十三舉而誅數百而在省者瀦其宫出使者梟諸驛號聲動地而諸帝之寃雪矣衆正之氣伸矣萬民之憤紓矣然而宦官非能自擅也諸君失御之之術而以權假之也諸君假之權而使伏誅非諸君殺之而何哉使其徒知足安分而以忠謹自保亦將福祿攸同而何至此極也吁宋儒程頤舊在講筵説論語南容三復白圭處內臣帖却容字因問之內臣云是上舊名先生講罷因説適來臣講書見內臣帖却容字夫人主處天下之尊居億兆之上只嫌怕人尊奉過當便生驕心是皆左右近習之人養成之也嘗觀仁宗時宫嬪謂正月為初月蒸餅為炊餅皆此類請自後只諱正名不諱嫌名及舊名臣若水通曰書云位不期驕非止自驕也乃左右驕之斯自驕矣人君至尊且貴尤易至於驕也近正人明正學猶恐不免而况溺於臣妾者乎夫臣妾志在要寵凡可以諛悅者無所不至人主不可不察焉程頤之言可謂中古今之病者伏惟皇上三復之程頤在講筵每講一處有以開導人主之心者便説始初內臣宫嬪們皆携筆在後抄録後來見説著佞人之類皆惡之吕微仲使人言今後且不可傷觸人范祖禹云但不道著名字儘説不妨臣若水通曰昔鄭莊公縱其弟叔段之驕橫以及於誅君子以為莊公之薄於其弟夫愛而節之愛之至也然則人主節宦官之權橫非惡之也乃所以愛而保全其富貴爾儒臣之以是進講於君非惡宦官也乃所以欲君節而全之謂非愛之不可也為宦官者聞其言而惡之是惡其人之愛已也不亦誤乎人主御臣妾之道不可不辨好惡之實焉楊時上欽宗皇帝書略曰臣竊考自古奄人用事未有無後患者漢之竇武何進以肺腑之親因天下怨怒收攬英豪如李膺陳蕃諸人共起而誅之卒不勝皆駢頸受戮唐之昭宗信狎宦者至東宫之幽其為厯世之禍大矣臣若水通曰人主之於宦官嬖幸之人誠不可不善其制御之術也御之不得其術縱之則至於文昭廢主之禍攻之則至於何竇諸人駢頸之戮兩敗俱傷其機始於一念爾語曰前車覆後車戒然則後之人君御之之道如何則可亦在慈嚴兼盡仁義並行爾與之以富貴而不假之以威權夫然後為嚴慈仁義兩得也朱熹曰宫闈之內端莊齊肅后妃有關雎之德後宫無盛色之譏貫魚順序而無一人敢恃恩私以亂典常納賄賂而行請謁此則家之正也退朝之後從容燕息貴戚近臣擕僕奄尹陪侍左右各恭其職而上憚不惡之嚴下謹戴盆之戒無一人敢通內外竊威福招權市寵以紊朝政此則左右之正也臣若水通曰臣妾狎恩恃愛甚為難處者也近則不孫逺則怨御之不外乎中正之道焉爾中正之道在正心始心正身修則恩威兩盡矣於御臣妾也何有伏惟皇上立中道以御下幸甚元城劉安世曰雖大無道之君亦惡亂亡而明皇中材之主知姦邪而用之何也曰此蔽於左右之佞幸爾蓋所謂佞幸者嬪御也內臣也戚里也幸臣也此皆在人主左右而可以進言者也臣若水通曰人君之蔽於近習非近習能蔽之也自蔽也由於御之無道則臣妾得以肆其姦而曲投所好是以不覺其入而信之深也故夫人君之德莫大乎剛明剛足以斷明足以照則衆邪無以遁其情而畏服之矣唐明皇任用姦邪而不能去者得非不剛不明而私愛有以蔽之也耶國朝洪武元年三月辛未上命翰林儒臣修女戒謂學士朱升等曰治天下者修身為本正家為先正家之道始於謹夫婦后妃雖母儀天下然不可使預政事至於嬪嬙之屬不過備職事侍巾櫛若寵之太過則恐犯分上下失序觀厯代宫閫政由內出鮮有不為禍亂者也夫內嬖惑人甚於鴆毒惟賢明之主能察之於未然其他未有不為所惑者卿等為我述女戒及古賢妃之事可為法者使後世子孫知所持守臣若水通曰自古宫闈之變非但后妃爾亦雜出於嬖妾之人所以然者蓋由創業之君私愛寵嬖不能修身正家以立法垂訓也我皇祖知其然乃修女戒以訓內宫且曰后妃不預政事嬪嬙備職巾櫛凛然而不可犯者御臣妾之道備矣大哉聖言其即文王刑于寡妻之教也聖子神孫以皇祖之心為心不牽於私愛則宫闈和敬天下太平豈不為有道之世也哉天順初副都御史年富被石亨姪彪奏自大同逮繫至京英宗問學士李賢曰此人何如對曰行事公道能革宿弊上曰必石彪被阻不遂其私爾召錦衣衛推問明白已而進狀果不實賢請遣人體勘庶不枉人上曰然乃遣給事中郎中二人又曰再遣武職一人不然縱得其實彼必以為回護賢曰陛下所慮極是勘回果無實富得致仕而歸臣若水通曰人君御下之道在於明明則讒邪無所遁其情彪奏年富欲以逞報怨之私而英宗皇帝即詢於賢輔導又審於三人之勘則彪之讒譖無所投而後之為彪之姦者可息矣得非御臣妾之要道乎英宗皇帝留心政務漸覺左右招權納賂之非嘗謂李賢曰為之奈何賢謂人君之權不可下移果能自攬彼之勢自消惟此為良法其私情既不得行趨附之人漸亦少矣上以為然且曰無此相礙何事不順吾早辰拜天謁祖畢視朝後閲章奏易決者即批出可議者送先生處參決賢曰臣等所見不到更望再加詳審斟酌然後施行上曰然左右乃曰此等章奏何必一一親覽亦不必送與閣下看且曰差便差到底姦邪不忠如此賢曰惟陛下明見臣若水通曰臣妾之柔佞縱之則驕激之則變漢唐之迹可鑒矣李賢謂果能攬權彼勢自消其真得御臣妾之道乎使唐德宗諸君而知出此則上無廢置之禍下無殺戮之慘而上下安寧保全福慶矣格物通卷四十二
