body:
  text: 格物通卷三十三明湛若水撰正嫡庶下唐太宗貞觀十六年八月帝曰當今國家何事最急禇遂良曰今四方無虞唯太子諸王宜有定分最急帝曰此言是也時太子承乾失德魏王泰有寵羣臣日有疑議帝聞而惡之謂侍臣曰方今羣臣忠直無踰魏徴我遣傅太子絶天下之疑九月以徴為太子太師時徴有疾小愈當詣朝表辭帝手詔諭以周幽晉獻廢嫡立庶危國亡家漢高祖幾廢太子賴四皓然後安我今賴公即其義也知公疾病可卧護之徴乃受詔臣若水通曰與子定於立嫡𫝊子以嫡天下之逹禮也故有君薨而世子未生之禮植遺腹朝委裘而天下不亂者以名分素明而民志定也唐太宗既立承乾為太子當矣猶選魏徴以輔導之定名分塞亂源庶固不敢以僣嫡孽且不得以代宗也承乾失德魏王有寵正嫌疑之秋宜善處兩全恩義嫡庶之分不於是而正乎魏徵素負忠直未聞善處之計亦獨何哉唐太宗貞觀十六年禇遂良上疏以為聖人制禮尊嫡卑庶世子用物不令與王者共之庶子雖愛不得踰嫡所以塞嫌疑之漸除禍亂之源也若當親者踈當尊者卑則佞巧之姦乘機而動矣昔漢竇太后寵梁孝王卒以憂死宣帝寵淮陽憲王亦幾至於敗今魏王新出閣宜示以禮則訓以謙儉乃為良器此所謂聖人之教不肅而成者也上從之臣若水通曰禇遂良進太子諸王宜有定分之說太宗固是之矣使於此大正嫡庶之分以消太子之疑忌絶魏王之窺覦則禍亂自此息矣奈何溺於私愛不能自克卒之承乾既廢泰亦不立因著定法以為太子失道藩王窺伺者之戒於失之中又有得焉司馬光曰太宗不以天下大器私其所愛以杜禍亂之原可謂能逺謀矣人君正家之道可不謹哉唐肅宗至德元載建寧王倓性英果有才略從上自馬嵬北行兵衆寡弱屢逢冦盜倓自選驍勇居上前後血戰以衛上上或過時未食倓悲泣不自勝軍中皆屬目向之上欲以倓為天下兵馬元帥使統諸將東征李泌曰建寧誠元帥才然廣平兄也若建寧功成豈可使廣平為吳太伯乎上曰廣平冡嗣也何必以元帥為重泌曰廣平未正位東宫今天下艱難衆心所屬在於元帥若建寧大功既成陛下雖欲不以為儲副同立功者其肯已乎太宗上皇即其事也上乃以廣平王俶為天下兵馬元帥諸將皆以屬焉臣若水通曰嫡庶之分不可以不正肅宗溺愛建寧王欲以為天下兵馬元帥廢立之幾已萌矣賴李泌一言遂屬廣平王俶嫡庶之倫於是定矣泌之有功於唐其不大矣哉唐憲宗元和七年秋七月乙亥立遂王宥為太子更名恆恆郭貴妃之子也諸姬子澧王寬長於恆上將立恆命崔羣為寬草讓表羣曰凡推已之有以與人謂之讓遂王嫡子也寬何讓焉上乃止臣若水通曰立子以嫡不以長天之理也憲宗以澧王寬長於恆而以為讓是名實紊矣天理何在焉是故為人君者必明於嫡庶之定分不蔽於私意以開亂階可也唐宣宗大中十三年六月初帝長子鄆王溫無寵居十六宅餘子皆居禁中䕫王滋第三子也欲以為嗣為其非次故久不建東宫帝餌醫官李𤣥伯道士虞紫芝山人王樂藥疽發於背八月疽甚宰相及朝臣皆不得見帝密以䕫王屬樞密使王龜長馬公儒宣徽南院使王居方使立之三人及右軍中尉王茂𤣥皆帝平日所厚也獨左軍中尉王宗實素不同心三人相與謀出宗實為淮南監軍宗實已受勑於宣化門外將自銀臺門出左軍副使丌元實謂宗實曰聖人不豫踰月中尉止隔門起居今日除改未可辨也何不見聖人而出宗實感悟復入諸門已踵故事增人守捉矣元實翼導宗實直至寢殿帝已崩東首環泣矣宗實叱龜長等責以矯詔皆捧足乞命乃遣宣徽北院使齊元簡迎鄆王壬辰下詔立鄆王為皇太子權勾當軍國政事仍更名漼收龜長公儒居方皆殺之癸巳宣遺制以令狐綯攝冢宰臣若水通曰商周有道之長以太子之名分早定而伊召之付託得人也齊桓定嗣於易牙而國大亂其勢使之然也唐宣宗於嫡庶之義以溺愛而不早定矣及顧命託遺之寄不畀之大臣而以委之宦寺為付託得人乎易牙之事可鑒矣卒之刀鋸相殘廢立在手數世不已遂以亡唐宣宗安得而逭其責哉後之為人君者尚深懲於斯云唐僖宗文德元年三月壬寅帝疾大漸皇弟吉王保長而賢羣臣屬望十軍觀軍容使楊復恭請立其弟夀王傑是日下詔立傑為皇太弟監軍國事臣若水通曰宋臣范祖禹云懿宗之崩中官廢長而立幼僖宗疾革楊復恭亦如之臣謂宦竪之計惟利於立昏與幼而已主昏且幼則天憲在口賞罰在意威權在手可以逞矣然不知煬帝既滅世基亦亡蓋未有不反中其身者也定䇿國老門生天子則亦何賴之有後唐莊宗同光元年四月己巳即皇帝位尊母晉國太夫人曹氏為皇太后嫡母秦國夫人劉氏為皇太妃臣若水通曰風化之本始於閨門明嫡庶之分正尊卑之等風化之所由行也莊宗尊其母為皇太后而以嫡母為皇太妃嫡妾之分亂矣何以正天下乎嗚呼嫡妾並后然且不可而况於倒置邪宜帝之不終也後唐明宗天成三年吳史館修撰張昭逺上言有曰古者人君即位則建太子所以明嫡庶之分塞禍亂之源今卜嗣建儲臣未敢輕議至於恩澤賜與之間昏姻省侍之際嫡庶長幼宜有所分示以等威絶其僥兾帝賞歎其言而不能用臣若水通曰嫡庶之分不可不明也所謂明者明之於素辨等威絶嫌疑皆起於恩賜昏姻省侍之小也等威之小不辨禍亂之大所由起也張昭逺之言蓋深有所感而然爾帝歎賞其言而不能用所謂恱而不繹者歟南唐齊王璟固辭太子九月乙丑唐主許之詔中外致箋如太子禮臣若水通曰太子係國家之安危非一身之榮辱而已當立則立謀之固非辭之亦未為是也唐主許之其必意有所在邪璟之辭亦必有以也後晉髙祖天福七年漢髙祖寢疾以其子秦王宏度晉王宏熙皆驕恣少子越王宏昌孝謹有智識與右僕射兼西御院使王翻謀出宏度鎮雍州宏熙鎮容州而立宏昌制命將行㑹崇文使蕭益入問疾以其事訪之益曰立嫡以長違之必亂乃止臣若水通曰益所謂立嫡以長違之必亂此萬世之蓍龜也漢主舍嫡立庶之計决矣非蕭益引經據義言之則漢之亂豈不慘哉後晉齊王天福八年唐宣城王景逹剛毅開爽烈祖愛之屢欲以為嗣宋齊丘亟稱其才唐主以齊王璟年長而止璟以是怨齊丘唐主幼子景逖毋种氏有寵齊王璟母宋皇后稀得進見唐主如璟宫遇璟親調樂器大怒誚讓者數日种氏乘間言景逖雖幼而慧可以為嗣唐主怒曰子有過父訓之常事也國家大計女子何得豫知即命嫁之臣若水通曰唐主沮种氏奪嫡之謀而且嫁之史稱其明斷嗚呼真可謂明斷矣夫以漢髙帝之明尚溺於戚姬之愛而欲易太子向非留侯招四皓之功大事去矣孰謂五代之君乃有如烈祖者哉蓋其天資之美所行偶合乎義者若此使得聞聖賢之學其所立豈止若是而已邪班固白虎通曰君薨適夫人無子有育遺腹必待其産立之何尊適重正也臣若水通曰立嫡以長古今不易之道也遺腹尚俟其産而况其已生者乎宋神宗元豐八年春正月帝疾甚羣臣請立皇太子及請皇后髙氏權同聽政許之三月甲午朔立延安郡王傭為皇太子賜名煦先是岐王皓嘉王頵日問起居太后既垂簾命二王毋輒入且隂勑中人梁惟簡製十嵗兒一黃袍懷以來蓋密為踐祚倉卒備也初太子之未立也職方員外郎邢恕與蔡確成謀密語太后之姪髙公繪公紀曰上疾不可諱延安幼冲宜早有定論岐嘉皆賢王也公繪驚曰此何言君欲禍吾家邪恕知計不行反宣言太后屬意岐王而與王圭表裏導確約圭入問疾陽鉤致圭語使知開封府蔡京伏劔士於外須圭小持異則執而誅之既而圭言上自有子定議立延安恕益無所施及太子已立猶與確自謂有定䇿功傳播其語於朝臣若水通曰記云凡事預則立况太子天下之本乎不可不預為之所也髙太后定志延安預為之偹勑岐嘉二王毋得輒入及延安正位人人自安其為宗社之計大矣若西漢髙帝溺於戚姬幾紊乎嫡庶之倫不免為髙太后之罪人也若邢恕者又為忠臣之罪人也宋儒程頥曰古所謂支子不祭者惟使宗子立廟主之而已支子雖不得祭至於齊戒致其誠意則與主祭者不異可與則以身執事不可與則以物助但不别立廟為位行事而已後世如欲立宗子當從此義雖不祭情亦可安若不立宗子徒欲廢祭適足長惰慢之志不若使之祭猶愈於已也臣若水通曰宗子者祖禰之正體也故祭以宗子主之欲正體之精神感格也然支子齊戒助物以致其誠意焉則亦如祭也矣張載理窟曰宗子者為宗主祭祀宗子為士庶子為大夫以上牲祭於宗子之家非獨宗子為士為庶人亦然臣若水通曰祭必宗子者尊宗也尊宗所以尊祖也雖大夫之貴不敢干焉其嫡庶之分嚴矣爭奪之禍何由生乎朱熹曰妻齊體於上妾接承於下而嫡庶之分定者家之齊也臣若水通曰家道之不正者多起於妻妾之無分也是故嫡庶明則家可齊矣况天子者天下之主正家以正天下者豈不尤當謹乎濳室陳植曰宗法為諸子之庶子設恐其後流派寖多姓氏紛錯易至殽亂故於源頭有大宗以統之則人同知尊祖分派處有小宗以統之則人各知敬禰且始封之君其適子襲封則庶子為大夫大夫不得以禰諸侯故自别為大夫之祖是謂别子為祖也别子之適子則為大宗使繼其祖之所自出從此直下適子世為大宗合族同宗之是謂繼别為宗也别子之庶子又不得以禰别子却待其子繼之而自别為禰繼禰者遂為小宗凡小宗之適子服屬未盡常為小宗凡小宗之庶子又别為禰而其適子又各為小宗兄弟同宗之謂繼禰為小宗是也大宗是始祖正派下雖其後支分派别皆同宗此祖則合族皆服齊衰九月初不以親屬近逺論是為百世不遷之宗小宗是禰正派下親盡則絶如繼禰者親兄弟宗之為之服朞繼祖者則從兄弟宗之為之服大功繼曽祖者再從兄弟宗之為之服小功繼髙祖者三從兄弟宗之為之服緦自此以後代常䟎一代是為五世則遷之宗宗法之立嫡長之尊有君道焉大宗所以統其宗族凡合族中有大事當禀大宗而後行小宗所以統其兄弟如同禰者有大事則同禰之兄弟當禀繼禰之小宗而後行一族之中大宗只是一人小宗儘多故一人之身從下數至始祖大宗惟一數至髙祖小宗則四此古者宗族人情相親人倫不亂豈非明嫡庶之分有君臣之義由大宗小宗之法而然歟臣若水通曰宗法不立則不免世逺殽亂之弊故立大宗以統之則人知尊其祖矣立小宗以統之則人知敬其禰矣是故宗法有嫡庶之分焉有君臣之義焉有愛敬之道焉不可不慎也後之君子其毋以宗法為輕哉元許衡曰有家有國所以立嫡嗣無所爭者出於無為而分定故也如走兔在野人競逐之積兔在市過而不顧此之謂分定臣若水通曰兔一也在野則人競逐在市則人不顧何也分之定與否故也同一家國也嫡不立則人起覬覦之心嫡既立則人有安分之意者何也預定與不預定之驗也許衡無為而分定之論不可易矣格物通卷三十三
