body:
  text: 格物通卷二十五明湛若水撰慎言動下賈誼新書曰言有四術言敬以固朝廷之言也文言有序祭祀之言也屏風折聲軍旅之言也言若不足喪紀之言也臣若水通曰言一也而有四術焉何也隨感而發不可僭忒天之理也而或僭忒焉是不能謹矣故敬謹者在人為之爾謹於心謹在言前天理渾存隨感而見各有攸當也於言己發而始思謹焉則駟不及舌矣況人君一言兆民賴之天地臨之鬼神司之可不慎乎賈誼曰令行者必謹於言臣若水通曰言者命令之所寓也命令教誡必允而後出則令出如流水以順人心其行也沛然莫之能禦矣劉向說苑曰師經鼓琴衛文侯起儛賦曰使我言而無見違師經曰若堯舜之為君也惟恐言而人不違桀紂之為君也惟恐言而人違之臣若水通曰書云豫違汝弼汝無面從退有後言是堯舜恐人不違其言也龍逢比干以諫而死是桀紂恐人之違其言也恐人不違其言則言必謹矣恐人違其言則言必不謹矣孔子曰如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎蓋人君言動之際實興喪之源一言而善則舉天下蒙其福一言而不善則舉天下受其殃君人者誠不可不慎也茍惟其言而莫豫違則一人附之十人比之讒諂面諛無所不至禍天下可勝言哉劉向曰口者關也舌者機也出言不當駟馬不能追也口者關也舌者兵也出言不當反自傷也臣若水通曰出言如機言失不可轉也出言如兵言失反自傷也夫一言之失不可轉而反自傷豈不可懼也哉劉向此言真可為人君慎言者之深警矣韓愈擇言解曰火泄於密而為用且大能不違於道可燔可炙可鎔可甄以利乎生物及其放而不禁反為災矣水發於深而為用且逺能不違於道可浮可載可飲可灌以濟乎生物及其導而不防反為患矣言起於微而為用且博能不違於道可化可令可告可訓以推於生物及其縱而不慎反為禍矣火既我災有水而可伏其熖能使不陷於灰燼矣水既我患有土而可遏其流能使不仆於波濤矣言既我禍即無以掩其辭能不罹於過者亦鮮矣所以知理者又焉得不擇其言歟其為慎而甚於水火臣若水通曰韓愈擇言解水火之喻不違則為用違之則為災其意亦云切矣然而未知本也夫導水者於其源治火者於其熖有本者如是也火之失而水得以制之水之失而土得以制之猶假於他物也若夫言者心之發也自心失之自心慎之在我而已矣豈假乎外哉亦敬諸心而已矣敬立則心存心存則理定理定則明生夫其明之生也隨感而應雖欲其言之過焉弗可得已而又奚待於擇乎是故君子之學貴務其本而語默惟時周惇頥通書曰文辭藝也道德實也篤其實而藝者書之美則愛愛則傳焉賢者得以學而至之是為教故曰言之無文行之不逺臣若水通曰文辭末也故謂之藝道德本也故謂之實然本末不可偏廢故曰篤其實而藝者書之則所謂仁義之言藹如也故美則人愛而傳之逺矣雖然猶似以藝實為二臣每讀程皓作字時甚敬曰非欲字好只此是學而深愛之由是而推焉則讀書作文而吾心之敬無不隨時而在則實與藝一時並行而德業文章合一矣此正今世時病之藥惟聖明體而行之以變士風之陋天下後世幸甚周惇頥曰聖人之道入乎耳存乎心藴之為德行行之為事業彼以文辭而已者陋矣臣若水通曰聖賢千言萬語皆為心也人心同然讀之者可以感其心矣故聖賢之言為感人心而設也是故可以開發聰明而喚醒人之良知如醉者夢者必喚之乃能醒也及其醒也乃已之知覺非人與之醒也後世之習遂以文辭為學而喪志於書懲之者乃欲遂廢經書是猶懲醉夢之深者而遂不喚之也故夫廢古訓而語者孔子不能也喪志於書冊者孔子不為也是必有其道矣程皓曰聖人之言中和之氣也貫徹上下臣若水通曰聖人之言貫徹上下者何也以其中和也中和故其理一也德之盛也是故有德者必有言也賢人則不然語本而遺末語精而遺粗也何中和貫徹之有邵雍曰應變而言言不在我也臣若水通曰言語之道感應而已矣未應不能顯已應不能默是故應變之言如扣鐘矣扣則鳴不扣則不鳴鳴不鳴在物而鐘未嘗不定也知此者可以知言語之道矣張載曰辭取意達多則反害也臣若水通曰言者心聲也故辭所以宣意也無意而言言愈多而意愈窒也已是故傷易而誕傷煩而支德之纍也孔子曰辭達而已矣張載之言其出於此乎張載曰知德之難言知之至也孟子謂我於辭命則不能又謂浩然之氣難言易謂不言而信存乎德行又以尚辭為聖人之道非知德達乎是哉臣若水通曰孟子云梓匠輪輿能與人規矩不能使人巧有形者可以言盡而無形者不可以言盡德無形者也故其言之難知言之難則真知矣孟子謂浩然之氣難言程皓知其實有是氣亦可以見有德者之言矣楊時上淵聖皇帝書略曰自正月以來屢降德音盡復祖宗之舊賦外征斂並行蠲除閭巷歡欣鼓舞日需膏澤今既數月矣未有一事如祖宗之時者賦外征斂率由舊貫自崇寧迄於宣和寬恤之詔歲一舉之宣之通衢而人不聽掛之墻壁而人不視以其文具而實不至故也陛下嗣守神器尤宜慎始詔令如此是亦文具而已後雖有德意人誰信之臣若水通曰詔令者人君之大號也信則天下信之不信則天下疑之天下疑之雖小事而何濟天下信之何大事之不成孔子曰民無信不立況人君乎昔商鞅欲變法先徙木立信於民況天下之主乎孔子曰上好信則民莫敢不用情此為人君者之所當慎也程頥嘗謂其兄皓云吾兄弟近日說話太多皓云使見吕晦叔則不得不少見司馬君實則不得不多臣若水通曰孔子曰可與言而不與之言失人不可與言而與之言失言二者無一可者也是以君子或默或語顧其時何如爾此程皓之所以因人而施者其有得於孔子之遺意歟元儒許衡曰人君不患出言之難而患踐言之難知踐言之難則其出言不容不慎矣茍從古者大學之道以修身為本凡一事之來一言之發必求其所以然與其所當然熟思而審處之雖有不中者蓋鮮矣臣若水通曰曾子曰出辭氣斯逺鄙倍矣出也者謂出於中也言辭由中而出則言自謹而無不踐之患矣惟不出諸中則朝更暮改欲民之信不可得也語曰信如四時堅如金石惟聖明留意焉國朝洪武二年三月戊申上謂翰林侍讀學士詹同曰古人為文章或以明道德或以通當世之務如典謨之言皆明白易知無深怪險僻之語至如諸葛孔明出師表亦何嘗雕刻為文而誠意溢出至今使人誦之自然忠義感激近世文士不究道德之本不達當世之務有詞雖艱深意實淺近即使過相如揚雄何禆實用自今翰林為文但取通道理明世務無事浮藻臣若水通曰人之言皆本於心也故心有所養明於道德通於世務則其發於言辭皆吾自得之實事典謨出師表之渾厚平正是也不培養其本而徒靡麗於末滕口說爾此文風士習之所以日弊可歎也皇祖偃武修文之初拳拳以明道德通世務為至文崇典謨出師之渾厚黜相如楊雄之浮藻此文風士習之所以一丕變矣乎今國家歷百六十年文辭之富麗甚矣轉移而挽回之復洪武淳朴之風在聖明一念之間爾語曰上有好者下必有甚焉者矣文運與國運同隆汚夫豈細故哉洪武六年詔禁四六文詞先是上命翰林儒臣擇唐宋名儒表箋可為法者翰林諸臣以柳宗元代柳公綽謝表及韓愈賀雨表進上命中書省臣録二表頒為天下式因諭羣臣曰唐虞三代典謨訓誥之詞質實不華誠可為千萬世法漢魏之間猶近古晉宋以降文體日衰駢麗奇靡而古法蕩然矣唐宋之時名儒輩出雖欲變之而卒未能盡變近代制誥表章之類仍蹈舊習朕嘗厭其雕琢殊異古體且使事實為虛文所蔽其自今凡告諭臣下詞務從簡古以革舊習爾中書宜播告中外臣民凡表箋奏疏毋用四六對偶悉從典雅臣若水通曰制誥王言也四六之文近俳文士之有識者猶恥為之而況人君之嚴重乎表箋告君父之言也四六之文近戲對尊己者猶不敢用之況君父之至尊乎皇祖諭辭臣以典謨訓誥質實無華次取漢魏韓柳誠有意於復古而振衰世之陋矣故當時制誥皆質實不用偶麗四六文風為之丕變臣每從舊臣家拜讀誥敕及洪武永樂試録而欽慕之奈何近代誥敕復為四六之習似與國初漸不同矣書曰大哉王言此聖明之主所宜不崇朝而變之以復舊章者也臣不勝願望之至洪武九年十二月庚戌朔頒建言格式時刑部主事茹太素上書論時務五事纍萬餘言上令中書郎中王敏誦而聽之虛文多而實事少次夕於宫中復令誦之再三採其切要可行者四事才五百餘言因喟然曰為君難為臣不易朕所以求直言欲其切於事情而有益於天下國家彼浮詞者徒亂聽爾遂令中書行其言之善者具為定式頒示中外使言者直陳得失無事繁文復自序其事於首臣若水通曰伏觀皇祖於言求之以實而太素之言乃應之以文非善言矣雖纍萬餘言無足取者宜在所惡也皇祖乃令擇其善者而行之可謂惡而知其美矣詩曰他山之石可以為錯非好問好察之大智其孰能之懿哉洪武十年七月甲申置通政使司太祖髙皇帝遂命曾秉正為通政使以應天府尹劉仁為左通政諭之曰壅蔽於言者禍亂之萌専恣於事者權姦之漸故必有喉舌之司以通上下之情以達天下之政昔者虞之納言唐之門下省皆其職也今以是職命卿等官以通政為名政猶水也欲其常通無壅遏之患卿其審命令以正百司達幽隱以通庶務當執奏者勿忌避當駁正者勿阿隨當敷陳者無隱蔽當引見者無留難毋巧言以取容毋苛察以邀功毋讒間以欺罔公清直亮以處厥心庶不負委任之意臣若水通曰舜命龍云朕堲讒說殄行震驚朕師命汝作納言夙夜出納朕命惟允夫允者信也言信之於心也聖祖命曾秉正為通政使勉其通達戒其壅蔽而必本於公清直亮之心其與舜命龍之出納而必欲其允於心者同一揆也夫通政者王言之得失所關也通政得其人則王言審矣若龍之在虞庭與臯䕫稷契並稱皆有聖賢之德者也夫何後之任其職者取其聲華而不取其人品豈聖祖選擇秉正之盛心哉伏惟聖明其留意焉國朝太祖皇帝欽定諸司職掌通政司職専出納帝命凡有帝命必當詳審覆奏允當然後施行臣若水通曰書云慎乃出令夫令者人君之喉舌所以通德意致和氣於天下者也命令不慎則喉舌病矣一身之精神血氣且不通而況望其通德意致和氣於逺乎此聖祖之所以立通政專出納之深意也格物通卷二十五
