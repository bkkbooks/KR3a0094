body:
  text: 格物通卷一百明湛若水撰賑濟下唐太宗貞觀元年闗中飢斗米直絹一疋二年天下大蝗三年大水上勤而撫之民雖東西就食未嘗嗟怨四年天下大稔流散者咸歸鄉里臣若水通曰古者雖有水旱之災而不為困後世飢饉之多何也以古有溝洫為之蓄洩耳此禹之所以致力也後世井田廢而溝洫湮故旱乾水溢之災作而賑濟之政所以行矣葢嘗觀於近世之富室有塘數頃則水不為災䟽洩以時而旱不為虐乃知井田之制聖人之慮周而謀逺也唐太宗勤撫關中亦能致稔不可謂非仁賢之君矣獨當時無以此言進講者以為王政之倡不亦為之遺憾乎噫太宗欲復封建則井田之政太宗亦優為之矣惜乎有君而無其臣莫能將順其羙以講於關睢麟趾之意爾𤣥宗開元二十二年二月秦州地連震壊公私屋殆盡吏民壓死者四千餘人命左丞相蕭嵩賑恤臣若水通曰坤以静為徳者也地震則失其常為災變矣况壊屋壓人死衆非變之大者乎存恤賑濟之典固所不能緩然此特小惠耳君相所職爕理隂陽位天地育萬物者也蕭嵩相𤣥宗茍能因變而脩省致中和以求爕理之道則天下民物各得其所矣壊而後救所益能幾何哉𤣥宗不能然此開元之治所以不終也歟開元二十九年春正月制曰承前諸州飢饉皆待奏報然後開倉賑給道路悠逺何救懸絶自今委州縣長官與採訪使量事給訖奏聞臣若水通曰飢民以垂絶之命待哺於須㬰爾必須數千里之奏報則死骨已朽矣其何能及𤣥宗此命以賑濟之事付之州縣是雖一時救世之權其實萬世通行續命之劑也徳宗建中元年秋七月劉晏上䟽以為户口滋多則賦稅自廣故其理財以愛民為先諸道各置知院官每旬月具州縣雨雪豐歉之狀白使司豐則貴糴歉則賤糶或以榖易雜貨供官用及於豐處賣之知院官始見不稔之端先申至某月須如千蠲免某月須如千救助及期晏不俟州縣申請即奏行之應民之急未嘗失時不待其因弊流亡餓殍然後賑之也由是民得安其居業户口蕃息臣若水通曰飢然後賑則後時無及先事應急則民未病飢此劉晏濟荒之䇿為最上者也後之論者皆薄晏言利之臣然曰户口多則地自廣故其理財以養民為先此牧民之主所當力行者也徳宗之時晏以其計行賑施而民安其居業户口蕃息宜哉憲宗元和四年春正月南方旱飢庚寅命左司郎中鄭敬徳等為江淮二浙荆湖襄鄂等道宣慰使賑恤之將行上戒之曰朕宫中用帛一匹皆籍其數惟賙救百姓則不計費卿輩宜識此意勿效潘孟陽飲酒遊山而已臣若水通曰憲宗每籍數於宫中之用而不計費於賙救之時其愛民之心勝於自奉何其誠切也茍由是心而擴充之繼之以不忍人之政則仁覆天下和氣應而豐穰至矣尚何水旱之災饑饉之慮哉周世宗顯徳六年二月淮南饑上命以米貸之或曰民貧恐不能償上曰民吾子也安有子倒懸而父不為之解哉安在責其必償也臣若水通曰胡寅云稱貸所以惠民亦以病之惠者紆其目前之急也病者責其他日之償也其責償也或嚴其期或徴其耗或取其息或予之米而使之歸錢或貧無可償而督之不置或胥吏以詭貸而徴諸編民凡此皆民之所甚病也世宗視民猶子匡救其乏而不責其必償仁人之心王者之政也臣謂胡寅此言其深知稱貸之弊而得世宗之心者矣夫父母之愛根於同體者也認得同體仁愛之心何所不至尚何責其必償而反病之哉故人君之學莫大於求仁劉向説苑晉文公時翟人有封狐文豹之皮者文公喟然嘆曰封狐文豹何罪哉以其皮為罪也大夫欒枝曰地廣而不平則聚而不散非狐豹之罪乎文公曰善哉説之欒枝曰地廣而不平人將平之財聚而不散人將爭之於是裂地以分民散財以賑貧臣若水通曰鹿臺之財鉅橋之粟乃商紂封狐文豹之皮也大學曰貨悖而入亦悖而出民之欲得此皮者久矣倒戈之徒可以見也武王克商散鹿臺之財發鉅橋之粟大賚四海而萬姓悦服豈非散財得民之明效大驗哉文公能善欒枝之言遂裂地以分民散財以賑貧此所以成霸業而顯於天下也歟唐貞元元年陸䞇草大赦制有曰闗畿之内連嵗興戎薦屬天災稼穡不稔榖糴翔貴烝黎困窮倉廪空虚莫之賑贍每一興念憫然痛心宜令度支江西湖南見運到襄州米十五萬石設法般赴上都以救百姓荒饉如山路險阻車乗難通仍募貧人令其般運以米充脚價務於全活流庸庶事優饒副朕勤恤臣若水通曰移粟移民先王荒政之所不廢也梁惠王於河内河東之凶以為盡心焉然而孟子不見取而引之以王政者何哉以移粟之濟民有限而王政之澤無窮也徳宗移襄州江湖之粟以賑關畿之饑民可謂有仁心矣然其惠止於關畿爾脱有四方旱澇之災並時薦見則又將何以賑之哉故諸葛孔明曰治世以大徳而不以小惠真王佐之道也宋仁宗皇祐元年夏五月河北京東大水民流就食知青州富弼勸所部民出粟益以官廪得公私廬舍十餘萬區散處其人以便薪水官吏自前資待缺寄居者皆給其禄使即民所聚選老弱病瘠者廪之仍書其勞約他日為奏請受賞率五日輙遣人持酒肉飯糗慰籍出於至誠人人為盡力山林陂澤之利可資以生者聽民擅取死者為大冢𦵏之目曰叢冡及麥大熟民各以逺近受糧而歸凡活五十餘萬人募為兵者萬計前此救災者皆聚民城郭中為粥食之蒸為疾疫及相蹈藉或待哺數日不得粥而仆名為救之而實殺之自弼立法簡便周盡天下傳以為式帝聞遣使褒勞加拜禮部侍郎弼曰救災守臣職也固辭不受臣若水通曰聚民而食之粥蒸欎為疫待哺不及而死雖欲救之反以殺之此濟饑之弊政也庸夫為之若富弼以公私廬舍散處之而分之以粟使官吏之寓居者主其事且懸賞以勸其盡力山澤之利縱其自取焉可謂賑濟之盡善者矣宜乎其全活之衆哉雖然弼之法他人亦或及此而收效則異者何耶葢人之為法或同而至誠惻怛之心不能如弼故承行之人不為之盡心竭力故也故曰神而明之存乎其人宋孝宗淳熈八年九月以朱熹提舉浙東常平茶鹽冬十二月下熹社倉法於諸路帝謂王淮曰朱熹政事却有可觀淮言脩舉荒政是行其所學民被實惠宜進職以旌之乃進熹直徽猷閣臣若水通曰處荒之政預備為上賑救為下有備則所濟萬全賑救則緩或不及朱熹社倉之立所以備荒也茍非出於至誠惻怛之心則又焉能規畫之詳法制之善而可以為天下法如是哉孝宗下其法於諸路則饑民之受惠不特浙東而已也後之有賑荒之志者宜玩焉元成宗元貞元年六月陜西旱饑行省右丞許扆議發廪賑之同列以未經奏請不可扆曰民為邦本今饑餒若此若俟命下無及矣擅發之罪吾當任之遂發粟賑貸命亦㝷下臣若水通曰關中旱饑許扆發粟以賑而以身當擅發之罪卓乎有汲黯之風矣夫關中逺京師若待命而發則仰哺之民化為野中之餓殍矣成宗乃不之罪而命亦尋下其亦仁矣哉程頥論立賑濟法事救饑者使之免死而已非欲其豐肥也當擇寛廣之處宿戒使晨入至己則闔門不納午而後與之食申而出之日得一食則不死矣其力自能營一食者皆不來矣此之不擇而與當活數倍之多也凡濟饑當分両處擇羸弱者作稀粥早晩兩給勿使至飽俟氣稍完然後一給第一先營寛廣居處切不得令相枕藉如作粥飯須官員親嘗恐生及入石灰不給浮浪㳺手無是理也平日當禁游惰至其饑餓則哀矜之一也臣若水通曰救饑者非聖賢意也勢也夫聖人立法則三年耕而有一年之積民未病饑也惟後世國用無經取民無制是以或遇災旱而民豈能聊生乎程頥之説其法詳矣善矣然亦不得已也是故聖人在上可使菽粟如水火可使天下無饑民張栻與吳晦叔書有云賑民之事葢有二端賑濟也賑糶也賑濟須官中捐米以救之賑糶即用上户所認可也官中吝米不肯捐専仰上户之糶可乎今潭城諸倉受納已有米近八萬斛前勸陳帥借此上供米均濟農民乏食者或借與亦可却一面具以奏聞待罪比至獲罪而十數萬生齒已活矣况未必獲罪耶未知渠能辦否耳若待常平司全永州糴米來濟則索我於枯魚之肆矣臣若水通曰賑饑之事以朝夕為死生者也故其機宜速不宜緩賑饑之用以多寡為財費者也故宜豐不宜吝使徒責賑糴於上户而官粟則吝焉其濟果能普乎使必待報於君命而機宜則緩焉其濟果可及乎此張栻之論所以有枯魚之嘆上供之借待罪之奏可謂切於救民而周於時變賑濟之善者也為人上者不可不深究焉王栢論賑濟利害曰賑荒之體先公庾而後私家賑荒之要抑有餘而補不足嗟夫田不井授王政堙蕪官不養民而民養官矣農夫資巨室之土巨室資農夫之力彼此自相資有無自相恤而官不與也故曰官不養民農夫輸於巨室巨室輸於州縣州縣輸於朝廷以之禄士以之餉軍經費萬端其始盡出於農也故曰民養官矣不幸凶年饑嵗在上者不得已散財發粟而賑恤之使之得免於流離溝壑之憂尚有是可以寓其愛民之心耳春省耕而補不足秋省歛而助不給此王政之所先也切惟今日義倉創于慶厯初令民上三等每稅米一斗輸二升以備水旱其後興廢不常今下及小户矣是官無以賑民使民預輸以自相賑恤已戾古意臣若水通曰君之與民相資相報者也君施以治民民報以奉君在平時則什一而稅任土而貢民之施於上也有災變則散財發粟春補秋助君之報於民也故曰相資相報者也若平時使民以奉上災變又使民以自賑何施報之有哉宜乎上下離心君民解體禍亂將起而莫之能救矣為人君者可不體施報之義察治亂之幾乎國朝洪武初費震為漢中府知府多善政大軍平蜀之後陜西旱饑漢中尤甚鄉民多聚為盜莫能禁戢是時府倉儲糧十餘萬石震與僚属謀曰民饑如此豈可坐視其斃倉廪糧儲尚多吾欲發以貸民賑其饑荒俾秋熟還倉且易陳為新何如衆以為然即日發倉令民受粟且以狀奏聞自是攘竊之盜與鄰境之民多來歸者震皆令占宅自為保伍驗丁給之頼以活者甚衆因籍為民得數千家至秋大熟民悉以粟還倉後以事被逮于京太祖皇帝曰震良吏也釋之以為牧民者勸臣若水通曰奉命而後行者人臣之經也先賑而後以聞者濟變之權也費震發儲糧以濟饑秋成而民償則上不費公家之財而下可活萬人之命矣行濟世之權而不失其事君之經者也及後以狀聞太祖是之他日又以是而釋其罪嗚呼此固聖祖御世勸賢之道或者亦費震隂徳及民之報也洪武十七年九月丙子河南北平水命駙馬都尉李祺歐陽倫王寜李堅梅殷陸賢往賑之敕曰天生烝民所以立命者衣與食也民非衣食何以為生邇來河南河決北平水災稼穡蕩盡時將嚴寒不早為賑恤民何頼焉今命爾駙馬都尉李祺歐陽倫王寜詣河南李堅梅殷陸賢往河北同有司驗其户口以賑之汝往欽哉臣若水通曰河之南北水災稼穡蕩盡衣食無頼民將就溝壑矣人君茍念溝中之瘠其能不動心乎我皇祖特命親臣分賑南北豈非文王惠鮮懐保之仁哉聖子神孫體皇祖之仁心而充養之則重熙累洽而災害不作矣洪武中嘗遇水旱嵗凶孝慈皇后進食必間設麥飯野蔬帝因告以賑恤之事后曰妾聞水旱無時賑䘏之有方不如蓄積之先備卒不幸有九年之水七年之旱將何法以賑之帝深以為然臣若水通曰古者三年耕而有一年之積九年耕而有三年之積皆所以為水旱備也然不但積備而已又為之檢制節儉所以備不虞者至矣孝慈皇后天縱聖善故進食必間麥飯野蔬所以示儉而先天下也又知賑䘏之有方不如積蓄之先備可謂救荒之上䇿者矣真得毋天下之道哉臣謹録之以為中宫之法焉國朝仁宗皇帝為皇太子時自南京過山東境内遇民饑即令布政司發粟賑之及入見以聞太宗皇帝曰正是昔范仲淹之子猶能舉麥舟濟其父之故舊况百姓吾赤子乎臣若水通曰夫視民之饑猶己之饑王者之仁心也我仁宗時為太子不忍山東之民饑餓不及以聞輙命發粟以賑之可謂有仁心先意承志者矣太宗聞而是之其所以養其仁心者何其至歟國朝景泰間山東連嵗災傷天順初人猶饑窘已發内帑銀三萬兩賑濟有司以為不敷乞増之詔増銀四萬兩臣若水通曰闕格物通卷一百
